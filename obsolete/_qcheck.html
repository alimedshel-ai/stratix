<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Quick Check</title>
    <style>
        body {
            font-family: monospace;
            background: #1a1a2e;
            color: #e2e8f0;
            padding: 20px;
        }

        .pass {
            color: #4ade80;
            font-weight: bold;
        }

        .fail {
            color: #ef4444;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <h1>🧪 patternKey Check</h1>
    <div id="r"></div>
    <script>
        var R = document.getElementById('r');
        try {
            var pa = JSON.parse(localStorage.getItem('painAmbition') || '{}');
            R.innerHTML = '<pre>' + JSON.stringify(pa, null, 2) + '</pre>';
            R.innerHTML += '<hr>';
            R.innerHTML += '<div>patternKey = <b>' + (pa.patternKey || 'MISSING') + '</b></div>';
            R.innerHTML += '<div>v10Role = ' + (pa.v10Role || '?') + '</div>';
            R.innerHTML += '<div>v10Size = ' + (pa.v10Size || '?') + '</div>';

            var expected = 'financial_struggling';
            if (pa.patternKey === expected) {
                R.innerHTML += '<div class="pass">✅ PASS — medium + risk = ' + expected + '</div>';
            } else {
                R.innerHTML += '<div class="fail">❌ FAIL — expected ' + expected + ' but got ' + pa.patternKey + '</div>';
            }
        } catch (e) { R.innerHTML = 'Error: ' + e.message; }
    </script>
</body>

</html>
