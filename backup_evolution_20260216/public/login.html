<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ستراتيكس - تسجيل الدخول</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <style>
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .login-container {
      width: 100%;
      max-width: 400px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      padding: 40px;
      text-align: initial;
    }

    .login-header {
      text-align: center;
      margin-bottom: 30px;
    }

    .login-header h1 {
      font-size: 28px;
      font-weight: 700;
      color: #333;
      margin-bottom: 8px;
    }

    .login-header p {
      color: #666;
      font-size: 14px;
      margin: 0;
    }

    .login-header .icon {
      font-size: 48px;
      color: #667eea;
      margin-bottom: 10px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      font-weight: 600;
      color: #333;
      margin-bottom: 8px;
      display: block;
    }

    .form-control {
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 10px 12px;
      font-size: 14px;
      transition: border-color 0.3s;
    }

    .form-control:focus {
      border-color: #667eea;
      box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
    }

    .btn-login {
      width: 100%;
      padding: 11px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
      border-radius: 6px;
      color: white;
      font-weight: 600;
      font-size: 15px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      margin-top: 10px;
    }

    .btn-login:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
    }

    .btn-login:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .demo-credentials {
      background: #f8f9fa;
      border-radius: 8px;
      padding: 15px;
      margin-top: 25px;
      border-left: 4px solid #667eea;
    }

    .demo-credentials-title {
      font-weight: 600;
      font-size: 13px;
      color: #333;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .demo-btn {
      width: 100%;
      padding: 9px;
      margin-bottom: 8px;
      background: white;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      color: #666;
      font-weight: 500;
      transition: all 0.3s;
    }

    .demo-btn:last-child {
      margin-bottom: 0;
    }

    .demo-btn:hover {
      background: #667eea;
      color: white;
      border-color: #667eea;
    }

    .alert {
      border-radius: 6px;
      margin-bottom: 20px;
      display: none;
    }

    .alert.show {
      display: block;
    }

    .spinner-border {
      width: 16px;
      height: 16px;
    }

    .login-footer {
      text-align: center;
      margin-top: 20px;
      color: #999;
      font-size: 12px;
    }
  </style>
</head>

<body>
  <div class="login-container">
    <div class="login-header">
      <div class="icon">
        <i class="bi bi-graph-up"></i>
      </div>
      <h1>ستراتيكس</h1>
      <p>منصة إدارة الاستراتيجية</p>
    </div>

    <div id="alertBox" class="alert alert-danger alert-dismissible fade"></div>

    <form id="loginForm">
      <div class="form-group">
        <label for="email" class="form-label">عنوان البريد الإلكتروني</label>
        <input type="email" id="email" name="email" class="form-control" placeholder="user@example.com" required>
      </div>

      <div class="form-group">
        <label for="password" class="form-label">كلمة المرور</label>
        <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required>
      </div>

      <button type="submit" class="btn btn-login" id="loginBtn">
        <i class="bi bi-box-arrow-in-right"></i> تسجيل الدخول
      </button>
    </form>

    <div class="demo-credentials">
      <div class="demo-credentials-title">📋 حسابات توضيحية</div>
      <button type="button" class="demo-btn" id="demoAdmin">
        <i class="bi bi-shield-lock"></i> حساب المسؤول
      </button>
      <button type="button" class="demo-btn" id="demoManager">
        <i class="bi bi-person"></i> حساب المدير
      </button>
    </div>

    <div class="login-footer">
      <p>تم ملء بيانات التوضيح مسبقاً للاختبار</p>
    </div>
  </div>

  <script>
    const loginForm = document.getElementById('loginForm');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const loginBtn = document.getElementById('loginBtn');
    const alertBox = document.getElementById('alertBox');

    // Pre-fill with demo credentials
    emailInput.value = 'admin@stratix.com';
    passwordInput.value = 'Admin123!';

    function fillDemoAccount(email, password) {
      emailInput.value = email;
      passwordInput.value = password;
      emailInput.focus();
    }

    document.getElementById('demoAdmin').addEventListener('click', () => fillDemoAccount('admin@stratix.com', 'Admin123!'));
    document.getElementById('demoManager').addEventListener('click', () => fillDemoAccount('manager@stratix.com', 'User123!'));

    function showAlert(message, type = 'danger') {
      alertBox.className = `alert alert-${type} alert-dismissible fade show`;
      alertBox.innerHTML = `
        ${message}
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
      `;
    }

    function hideAlert() {
      alertBox.classList.remove('show');
    }

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideAlert();

      const email = emailInput.value.trim();
      const password = passwordInput.value;

      if (!email || !password) {
        showAlert('يرجى إدخال البريد الإلكتروني وكلمة المرور');
        return;
      }

      loginBtn.disabled = true;
      loginBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>جاري تسجيل الدخول...';

      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ email, password }),
        });

        const data = await response.json();

        if (response.ok) {
          // Store token in localStorage
          localStorage.setItem('token', data.token);
          localStorage.setItem('user', JSON.stringify(data.user));

          // Redirect to dashboard
          window.location.href = '/dashboard';
        } else {
          showAlert(data.message || 'فشل تسجيل الدخول. يرجى المحاولة مجددا.');
        }
      } catch (error) {
        showAlert('خطأ في الاتصال. يرجى المحاولة مجددا.');
        console.error('Login error:', error);
      } finally {
        loginBtn.disabled = false;
        loginBtn.innerHTML = '<i class="bi bi-box-arrow-in-right"></i> تسجيل الدخول';
      }
    });
  </script>
</body>

</html>
