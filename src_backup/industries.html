<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ستارتكس - إدارة الأنشطة</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #667eea;
      --primary-dark: #5a67d8;
      --secondary: #764ba2;
      --bg: #0f1117;
      --bg-card: #1a1d2e;
      --bg-card-hover: #232640;
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --border: rgba(255, 255, 255, 0.08);
      --success: #22c55e;
      --warning: #facc15;
      --danger: #ef4444;
      --info: #38bdf8;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      font-family: 'Tajawal', sans-serif;
      color: var(--text);
      min-height: 100vh;
    }

    /* NAVBAR */
    .top-nav {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      padding: 14px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }

    .top-nav .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      color: white;
      text-decoration: none;
      font-size: 20px;
      font-weight: 700;
    }

    .top-nav .nav-links {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .top-nav .nav-links a {
      color: rgba(255, 255, 255, 0.85);
      text-decoration: none;
      padding: 8px 14px;
      border-radius: 8px;
      font-size: 13px;
      transition: all 0.2s;
    }

    .top-nav .nav-links a:hover,
    .top-nav .nav-links a.active {
      background: rgba(255, 255, 255, 0.15);
      color: white;
    }

    .user-area {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .user-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: white;
      font-size: 14px;
    }

    .user-info {
      text-align: left;
      color: white;
    }

    .user-info .name {
      font-weight: 600;
      font-size: 13px;
    }

    .user-info .role {
      font-size: 11px;
      opacity: 0.75;
    }

    .btn-logout {
      background: rgba(255, 255, 255, 0.15);
      color: white;
      border: none;
      padding: 6px 14px;
      border-radius: 8px;
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-logout:hover {
      background: rgba(239, 68, 68, 0.6);
    }

    /* LAYOUT */
    .layout {
      display: flex;
      min-height: calc(100vh - 60px);
    }

    /* SIDEBAR — managed by sidebar.js */

    /* MAIN */
    .main-content {
      flex: 1;
      padding: 30px;
      max-width: calc(100% - 220px);
    }

    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    .page-header h1 {
      font-size: 24px;
      font-weight: 800;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .page-header h1 i {
      color: var(--primary);
    }

    .btn-add {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      border: none;
      padding: 10px 22px;
      border-radius: 10px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-add:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 25px rgba(102, 126, 234, 0.4);
    }

    /* STATS */
    .mini-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-bottom: 24px;
    }

    .mini-stat {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      text-align: center;
    }

    .mini-stat .ms-value {
      font-size: 28px;
      font-weight: 800;
    }

    .mini-stat .ms-label {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    /* SEARCH */
    .search-bar {
      margin-bottom: 20px;
      position: relative;
    }

    .search-bar input {
      width: 100%;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 16px 12px 44px;
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      transition: border-color 0.2s;
    }

    .search-bar input:focus {
      outline: none;
      border-color: var(--primary);
    }

    .search-bar input::placeholder {
      color: var(--text-muted);
    }

    .search-bar i {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 16px;
    }

    /* CARDS */
    .items-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    .item-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 22px;
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
    }

    .item-card:hover {
      border-color: rgba(255, 255, 255, 0.12);
      transform: translateY(-3px);
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.25);
    }

    .item-card .accent-bar {
      position: absolute;
      top: 0;
      right: 0;
      left: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--info), var(--primary));
    }

    .ic-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 16px;
    }

    .ic-icon {
      width: 50px;
      height: 50px;
      border-radius: 14px;
      background: linear-gradient(135deg, rgba(56, 189, 248, 0.15), rgba(102, 126, 234, 0.15));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      color: var(--info);
      flex-shrink: 0;
    }

    .ic-title h3 {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 2px;
    }

    .ic-title .ic-subtitle {
      font-size: 13px;
      color: var(--text-muted);
    }

    .ic-details {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 16px;
    }

    .ic-detail {
      background: rgba(255, 255, 255, 0.03);
      border-radius: 8px;
      padding: 10px 12px;
    }

    .ic-detail-label {
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 2px;
    }

    .ic-detail-value {
      font-size: 14px;
      font-weight: 600;
    }

    .ic-badges {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .ic-badge {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .badge-code {
      background: rgba(56, 189, 248, 0.12);
      color: var(--info);
    }

    .badge-entities {
      background: rgba(34, 197, 94, 0.12);
      color: var(--success);
    }

    .ic-actions {
      display: flex;
      gap: 8px;
      border-top: 1px solid var(--border);
      padding-top: 14px;
    }

    .ic-actions .btn-action {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 8px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .ic-actions .btn-action:hover {
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
    }

    .ic-actions .btn-action.btn-view:hover {
      border-color: var(--info);
      color: var(--info);
    }

    .ic-actions .btn-action.btn-edit:hover {
      border-color: var(--warning);
      color: var(--warning);
    }

    .ic-actions .btn-action.btn-delete:hover {
      border-color: var(--danger);
      color: var(--danger);
    }

    /* EMPTY */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
    }

    .empty-state i {
      font-size: 48px;
      color: var(--text-muted);
      margin-bottom: 16px;
      display: block;
    }

    .empty-state h3 {
      font-size: 18px;
      margin-bottom: 8px;
    }

    .empty-state p {
      color: var(--text-muted);
      font-size: 14px;
    }

    /* PAGINATION */
    .pagination-bar {
      display: flex;
      justify-content: center;
      gap: 6px;
      align-items: center;
    }

    .page-btn {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text-muted);
      font-family: inherit;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .page-btn:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    .page-btn.active {
      background: var(--primary);
      border-color: var(--primary);
      color: white;
    }

    .pagination-info {
      font-size: 12px;
      color: var(--text-muted);
      margin-right: 12px;
    }

    /* MODAL */
    .modal-backdrop {
      background: rgba(0, 0, 0, 0.7);
    }

    .modal-content {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      color: var(--text);
    }

    .modal-header {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      border-radius: 16px 16px 0 0;
      padding: 18px 24px;
      border-bottom: none;
    }

    .modal-header .modal-title {
      font-weight: 700;
      font-size: 16px;
    }

    .modal-body {
      padding: 24px;
    }

    .modal-footer {
      padding: 16px 24px;
      border-top: 1px solid var(--border);
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--text-muted);
    }

    .form-input {
      width: 100%;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      transition: border-color 0.2s;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--primary);
    }

    .btn-modal-save {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      border: none;
      padding: 10px 24px;
      border-radius: 8px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-modal-save:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
    }

    .btn-modal-cancel {
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 10px 24px;
      border-radius: 8px;
      font-family: inherit;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-modal-cancel:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .form-error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: var(--danger);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      margin-top: 12px;
      display: none;
    }

    /* Details */
    .details-panel {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
    }

    .entity-list {
      list-style: none;
      padding: 0;
    }

    .entity-list li {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 8px;
      margin-bottom: 4px;
      font-size: 13px;
      background: rgba(255, 255, 255, 0.02);
    }

    .entity-list li i {
      color: var(--primary);
    }

    /* LOADING */
    .loading-skeleton {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
    }

    .skeleton-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 22px;
      animation: pulse 1.5s infinite;
    }

    .skeleton-line {
      height: 14px;
      background: rgba(255, 255, 255, 0.06);
      border-radius: 6px;
      margin-bottom: 10px;
    }

    .skeleton-line.short {
      width: 60%;
    }

    .skeleton-line.medium {
      width: 80%;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.5;
      }
    }

    @media (max-width: 768px) {

      .sidebar,
      .stx-sidebar {
        display: none;
      }

      .main-content {
        max-width: 100%;
        padding: 15px;
      }

      .items-grid {
        grid-template-columns: 1fr;
      }

      .mini-stats {
        grid-template-columns: 1fr;
      }

      .top-nav .nav-links {
        display: none;
      }
    }

    /* Sector filter */
    .filter-row {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      align-items: center;
    }

    .filter-row .search-bar {
      flex: 1;
      margin-bottom: 0;
    }

    .sector-filter {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 16px;
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      min-width: 200px;
      cursor: pointer;
    }

    .sector-filter:focus {
      outline: none;
      border-color: var(--primary);
    }

    .sector-filter option {
      background: var(--bg-card);
      color: var(--text);
    }

    /* Sector chips on cards */
    .sector-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-bottom: 10px;
    }

    .sector-chip {
      background: rgba(118, 75, 162, 0.15);
      color: #c4b5fd;
      border: 1px solid rgba(196, 181, 253, 0.2);
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 10px;
      font-weight: 600;
    }

    .sector-chip.pvt {
      background: rgba(34, 197, 94, 0.12);
      color: #4ade80;
      border-color: rgba(34, 197, 94, 0.2);
    }

    .sector-chip.gov {
      background: rgba(56, 189, 248, 0.12);
      color: #38bdf8;
      border-color: rgba(56, 189, 248, 0.2);
    }

    .sector-chip.npo {
      background: rgba(250, 204, 21, 0.12);
      color: #facc15;
      border-color: rgba(250, 204, 21, 0.2);
    }

    /* Sector checkboxes in modal */
    .sector-checks {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .sector-check {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.03);
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
    }

    .sector-check:has(input:checked) {
      border-color: var(--primary);
      background: rgba(102, 126, 234, 0.1);
      color: var(--primary);
    }

    .sector-check input {
      accent-color: var(--primary);
    }
  </style>
</head>

<body>
  <nav class="top-nav">
    <a href="/dashboard" class="brand"><i class="bi bi-graph-up-arrow"></i> ستارتكس</a>
    <div class="nav-links">
      <a href="/dashboard"><i class="bi bi-house"></i> الرئيسية</a>
      <a href="/kpis"><i class="bi bi-graph-up"></i> المؤشرات</a>
      <a href="/intelligence"><i class="bi bi-bell"></i> التنبيهات</a>
    </div>
    <div class="user-area">
      <div class="user-info">
        <div class="name" id="userName">—</div>
        <div class="role" id="userRole">—</div>
      </div>
      <div class="user-avatar" id="userInitial">—</div>
      <button class="btn-logout" id="logoutBtn">خروج</button>
    </div>
  </nav>

  <div class="layout">
    <!-- SIDEBAR — يُدار بواسطة sidebar.js -->
    <nav class="sidebar"></nav>

    <main class="main-content">
      <div class="page-header">
        <h1><i class="bi bi-grid"></i> إدارة الأنشطة</h1>
        <button class="btn-add" id="addBtn"><i class="bi bi-plus-circle"></i> نشاط جديد</button>
      </div>

      <div class="mini-stats">
        <div class="mini-stat">
          <div class="ms-value" id="statTotal" style="color:var(--info)">--</div>
          <div class="ms-label">إجمالي الأنشطة</div>
        </div>
        <div class="mini-stat">
          <div class="ms-value" id="statEntities" style="color:var(--success)">--</div>
          <div class="ms-label">إجمالي الكيانات</div>
        </div>
        <div class="mini-stat">
          <div class="ms-value" id="statActive" style="color:var(--primary)">--</div>
          <div class="ms-label">أنشطة نشطة</div>
        </div>
      </div>

      <div class="filter-row">
        <select class="sector-filter" id="sectorFilter" onchange="loadData(1)">
          <option value="">كل القطاعات</option>
        </select>
        <div class="search-bar"><i class="bi bi-search"></i><input type="text" id="searchInput"
            placeholder="ابحث بالاسم أو الرمز..."></div>
      </div>

      <div id="container">
        <div class="loading-skeleton">
          <div class="skeleton-card">
            <div class="skeleton-line medium"></div>
            <div class="skeleton-line short"></div>
            <div class="skeleton-line"></div>
          </div>
          <div class="skeleton-card">
            <div class="skeleton-line medium"></div>
            <div class="skeleton-line short"></div>
            <div class="skeleton-line"></div>
          </div>
          <div class="skeleton-card">
            <div class="skeleton-line medium"></div>
            <div class="skeleton-line short"></div>
            <div class="skeleton-line"></div>
          </div>
        </div>
      </div>
      <div class="pagination-bar" id="pagination"></div>
    </main>
  </div>

  <!-- CREATE/EDIT MODAL -->
  <div class="modal fade" id="formModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="modalTitle">نشاط جديد</h5><button type="button" class="btn-close btn-close-white"
            data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form id="itemForm">
            <div class="form-group"><label>الاسم بالإنجليزية *</label><input type="text" class="form-input" id="nameEn"
                placeholder="e.g. Healthcare" required></div>
            <div class="form-group"><label>الاسم بالعربية *</label><input type="text" class="form-input" id="nameAr"
                placeholder="مثال: الرعاية الصحية" required></div>
            <div class="form-group"><label>الرمز *</label><input type="text" class="form-input" id="code"
                placeholder="مثال: HEALTH" required></div>
            <div class="form-group"><label>القطاعات المرتبطة</label>
              <div class="sector-checks" id="sectorChecks"></div>
            </div>
            <div class="form-error" id="formError"></div>
          </form>
        </div>
        <div class="modal-footer"><button type="button" class="btn-modal-cancel"
            data-bs-dismiss="modal">إلغاء</button><button type="button" class="btn-modal-save" id="saveBtn">حفظ</button>
        </div>
      </div>
    </div>
  </div>

  <!-- DETAILS MODAL -->
  <div class="modal fade" id="detailsModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="detailsTitle">تفاصيل النشاط</h5><button type="button"
            class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body" id="detailsBody"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const token = localStorage.getItem('token');
    const user = localStorage.getItem('user');
    if (!token || !user) { sessionStorage.setItem('stratix_return_url', location.pathname + location.search); location.href = '/login?from=restore'; }
    const userData = JSON.parse(user);
    document.getElementById('userName').textContent = userData.name;
    document.getElementById('userRole').textContent = userData.role;
    document.getElementById('userInitial').textContent = (userData.name || 'U').charAt(0).toUpperCase();

    let currentPage = 1, editingId = null, formModalInstance, detailsModalInstance;
    let allSectors = [];

    async function api(url, opts = {}) {
      const r = await window.apiRequest(url, { ...opts, headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json', ...(opts.headers || {}) } });
      if (r.status === 401) { logout(); return null; }
      return r.json();
    }

    // Load sectors for filter and checkboxes
    async function loadSectors() {
      const d = await api('/api/sectors?limit=100');
      if (!d) return;
      allSectors = d.sectors || [];
      // Populate filter dropdown
      const sel = document.getElementById('sectorFilter');
      allSectors.forEach(s => {
        const opt = document.createElement('option');
        opt.value = s.id;
        opt.textContent = s.nameAr;
        sel.appendChild(opt);
      });
      // Populate checkboxes in modal
      const checks = document.getElementById('sectorChecks');
      checks.innerHTML = allSectors.map(s => `
        <label class="sector-check">
          <input type="checkbox" value="${s.id}" name="sectors">
          ${s.nameAr}
        </label>
      `).join('');
    }

    async function loadData(page = 1) {
      currentPage = page;
      const search = document.getElementById('searchInput').value;
      const sectorId = document.getElementById('sectorFilter').value;
      const params = new URLSearchParams({ page, limit: 12 });
      if (search) params.append('search', search);
      if (sectorId) params.append('sectorId', sectorId);
      const data = await api(`/api/industries?${params}`);
      if (!data) return;
      const items = data.industries || [];
      let totalEntities = 0, active = 0;
      items.forEach(s => { const c = s._count?.entities || 0; totalEntities += c; if (c > 0) active++; });
      document.getElementById('statTotal').textContent = data.total || 0;
      document.getElementById('statEntities').textContent = totalEntities;
      document.getElementById('statActive').textContent = active;
      renderItems(items);
      renderPagination(data.totalPages || 1, page, data.total || 0);
    }

    function esc(str) { return (str || '').replace(/'/g, "\\'").replace(/"/g, '&quot;'); }

    function renderItems(items) {
      const c = document.getElementById('container');
      if (!items.length) {
        c.innerHTML = `<div class="empty-state"><i class="bi bi-grid"></i><h3>لا توجد أنشطة</h3><p>أضف نشاطك الأول لتنظيم بياناتك</p></div>`;
        return;
      }
      c.innerHTML = `<div class="items-grid">${items.map(s => {
        const cnt = s._count?.entities || 0;
        const sectorChips = (s.sectors || []).map(sec => {
          const cls = sec.code === 'PVT' ? 'pvt' : sec.code === 'GOV' ? 'gov' : sec.code === 'NPO' ? 'npo' : '';
          return `<span class="sector-chip ${cls}">${sec.nameAr}</span>`;
        }).join('');
        return `<div class="item-card"><div class="accent-bar"></div>
          <div class="ic-header"><div class="ic-icon"><i class="bi bi-grid"></i></div><div class="ic-title"><h3>${s.nameAr || s.nameEn}</h3><div class="ic-subtitle">${s.nameEn}</div></div></div>
          ${sectorChips ? `<div class="sector-chips">${sectorChips}</div>` : ''}
          <div class="ic-details"><div class="ic-detail"><div class="ic-detail-label">الرمز</div><div class="ic-detail-value" style="color:var(--info)">${s.code || '—'}</div></div><div class="ic-detail"><div class="ic-detail-label">عدد الكيانات</div><div class="ic-detail-value" style="color:var(--success)">${cnt}</div></div></div>
          <div class="ic-badges"><span class="ic-badge badge-code"><i class="bi bi-hash"></i> ${s.code || '—'}</span><span class="ic-badge badge-entities"><i class="bi bi-building"></i> ${cnt} كيان</span></div>
          <div class="ic-actions">
            <button class="btn-action btn-view" onclick="viewItem('${s.id}')"><i class="bi bi-eye"></i> عرض</button>
            <button class="btn-action btn-edit" onclick="editItem('${s.id}')"><i class="bi bi-pencil"></i> تعديل</button>
            <button class="btn-action btn-delete" onclick="deleteItem('${s.id}','${esc(s.nameAr || s.nameEn)}')"><i class="bi bi-trash"></i> حذف</button>
          </div></div>`;
      }).join('')}</div>`;
    }

    function renderPagination(totalPages, current, total) {
      const p = document.getElementById('pagination');
      if (totalPages <= 1) { p.innerHTML = ''; return; }
      let h = `<span class="pagination-info">الصفحة ${current} من ${totalPages} (${total})</span>`;
      if (current > 1) h += `<button class="page-btn" onclick="loadData(${current - 1})"><i class="bi bi-chevron-right"></i></button>`;
      for (let i = Math.max(1, current - 2); i <= Math.min(totalPages, current + 2); i++) h += `<button class="page-btn ${i === current ? 'active' : ''}" onclick="loadData(${i})">${i}</button>`;
      if (current < totalPages) h += `<button class="page-btn" onclick="loadData(${current + 1})"><i class="bi bi-chevron-left"></i></button>`;
      p.innerHTML = h;
    }

    function openCreate() { editingId = null; document.getElementById('itemForm').reset(); document.querySelectorAll('#sectorChecks input').forEach(c => c.checked = false); document.getElementById('modalTitle').textContent = 'نشاط جديد'; document.getElementById('formError').style.display = 'none'; formModalInstance.show(); }

    async function editItem(id) {
      const d = await api(`/api/industries/${id}`);
      if (!d?.industry) return;
      const s = d.industry;
      editingId = id;
      document.getElementById('nameEn').value = s.nameEn;
      document.getElementById('nameAr').value = s.nameAr || '';
      document.getElementById('code').value = s.code || '';
      // Check sector checkboxes
      const sectorIds = (s.sectors || []).map(sec => sec.id);
      document.querySelectorAll('#sectorChecks input').forEach(c => {
        c.checked = sectorIds.includes(c.value);
      });
      document.getElementById('modalTitle').textContent = 'تعديل النشاط';
      document.getElementById('formError').style.display = 'none';
      formModalInstance.show();
    }

    async function save() {
      const nameEn = document.getElementById('nameEn').value.trim(), nameAr = document.getElementById('nameAr').value.trim(), code = document.getElementById('code').value.trim();
      const sectorIds = [...document.querySelectorAll('#sectorChecks input:checked')].map(c => c.value);
      const err = document.getElementById('formError');
      if (!nameEn || !nameAr || !code) { err.textContent = 'جميع الحقول مطلوبة'; err.style.display = 'block'; return; }
      const url = editingId ? `/api/industries/${editingId}` : '/api/industries';
      try {
        const r = await window.apiRequest(url, { method: editingId ? 'PATCH' : 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify({ nameEn, nameAr, code, sectorIds }) });
        const d = await r.json();
        if (!r.ok) throw new Error(d.message || 'خطأ');
        formModalInstance.hide(); loadData(currentPage);
      } catch (e) { err.textContent = e.message; err.style.display = 'block'; }
    }

    async function deleteItem(id, name) {
      if (!confirm(`هل تريد حذف النشاط "${name}"؟`)) return;
      try { const r = await window.apiRequest(`/api/industries/${id}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` } }); const d = await r.json(); if (!r.ok) { alert(d.message || 'خطأ'); return; } loadData(currentPage); } catch (e) { alert('خطأ: ' + e.message); }
    }

    async function viewItem(id) {
      const d = await api(`/api/industries/${id}`);
      if (!d?.industry) return;
      const s = d.industry;
      document.getElementById('detailsTitle').textContent = s.nameAr || s.nameEn;
      let h = `<div class="details-panel"><div class="ic-details" style="margin-bottom:0"><div class="ic-detail"><div class="ic-detail-label">الاسم بالإنجليزية</div><div class="ic-detail-value">${s.nameEn}</div></div><div class="ic-detail"><div class="ic-detail-label">الاسم بالعربية</div><div class="ic-detail-value">${s.nameAr || '—'}</div></div><div class="ic-detail"><div class="ic-detail-label">الرمز</div><div class="ic-detail-value" style="color:var(--info)">${s.code || '—'}</div></div><div class="ic-detail"><div class="ic-detail-label">عدد الكيانات</div><div class="ic-detail-value" style="color:var(--success)">${s.entities?.length || 0}</div></div></div></div>`;

      // Sectors
      if (s.sectors?.length) {
        h += `<h4 style="font-size:15px;font-weight:700;margin-bottom:12px"><i class="bi bi-diagram-3" style="color:var(--secondary)"></i> القطاعات المرتبطة</h4><div class="sector-chips" style="margin-bottom:16px">${s.sectors.map(sec => {
          const cls = sec.code === 'PVT' ? 'pvt' : sec.code === 'GOV' ? 'gov' : sec.code === 'NPO' ? 'npo' : '';
          return `<span class="sector-chip ${cls}" style="font-size:12px;padding:4px 14px">${sec.nameAr}</span>`;
        }).join('')}</div>`;
      }

      // Entities
      if (s.entities?.length) { h += `<h4 style="font-size:15px;font-weight:700;margin-bottom:12px"><i class="bi bi-building" style="color:var(--primary)"></i> الكيانات المرتبطة</h4><ul class="entity-list">${s.entities.map(e => `<li><i class="bi bi-building"></i><span>${e.legalName || e.displayName}</span></li>`).join('')}</ul>`; }
      else { h += `<div style="text-align:center;padding:20px;color:var(--text-muted)"><i class="bi bi-building" style="font-size:24px;display:block;margin-bottom:6px"></i>لا توجد كيانات مرتبطة</div>`; }
      document.getElementById('detailsBody').innerHTML = h;
      detailsModalInstance.show();
    }

    function logout() { localStorage.removeItem('token'); localStorage.removeItem('user'); window.location.href = '/login'; }

    document.getElementById('logoutBtn').addEventListener('click', logout);
    document.getElementById('addBtn').addEventListener('click', openCreate);
    document.getElementById('saveBtn').addEventListener('click', save);
    let st; document.getElementById('searchInput').addEventListener('input', () => { clearTimeout(st); st = setTimeout(() => loadData(1), 300); });

    document.addEventListener('DOMContentLoaded', async () => {
      formModalInstance = new bootstrap.Modal(document.getElementById('formModal'));
      detailsModalInstance = new bootstrap.Modal(document.getElementById('detailsModal'));
      await loadSectors();
      loadData();
    });
  </script>
  <script src="/assets/js/api.js"></script>
    <script src="/assets/js/sidebar.js"></script>
    <script src="/assets/js/ai-advisor.js"></script>
</body>

</html>
