<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مصفوفة TOWS - ستارتكس</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/css/shared.css">
    <style>
        :root {
            --bg-primary: #0f0e17;
            --bg-card: #1a1a2e;
            --bg-elevated: #16213e;
            --text-primary: #e8e8f0;
            --text-muted: #8b8ba7;
            --accent-so: #22c55e;
            --accent-st: #3b82f6;
            --accent-wo: #f59e0b;
            --accent-wt: #ef4444;
            --accent-purple: #a78bfa;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        /* ===== NAVBAR ===== */
        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 24px;
            background: rgba(15, 14, 23, 0.95);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .top-nav .brand {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--accent-purple);
            text-decoration: none;
        }

        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--text-primary);
            background: var(--glass);
        }

        /* ===== HEADER ===== */
        .page-header {
            padding: 32px 32px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }

        .page-header h1 {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent-so), var(--accent-st));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .page-header .subtitle {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        /* ===== STATS BAR ===== */
        .stats-bar {
            display: flex;
            gap: 16px;
            padding: 0 32px 24px;
            flex-wrap: wrap;
        }

        .stat-chip {
            background: var(--glass);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
            min-width: 140px;
        }

        .stat-chip .number {
            font-size: 1.4rem;
            font-weight: 700;
        }

        .stat-chip .label {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        /* ===== CONTROLS ===== */
        .control-bar {
            padding: 0 32px 24px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }

        .btn-generate,
        .btn-add {
            border: none;
            padding: 10px 16px;
            border-radius: 10px;
            font-family: 'Tajawal', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.2s;
            color: white;
        }

        .btn-generate {
            background: linear-gradient(135deg, var(--accent-purple), #7c3aed);
        }

        .btn-add {
            background: linear-gradient(135deg, var(--accent-so), #16a34a);
        }

        .btn-generate:hover,
        .btn-add:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        /* ===== MATRIX GRID ===== */
        .matrix-grid {
            display: grid;
            grid-template-columns: 80px 1fr 1fr;
            grid-template-rows: 80px auto auto;
            gap: 2px;
            border-radius: 16px;
            overflow: hidden;
        }

        .matrix-corner {
            background: var(--bg-card);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.8rem;
            color: var(--accent-purple);
        }

        .matrix-col-header {
            background: var(--bg-card);
            padding: 16px;
            text-align: center;
            font-weight: 700;
            font-size: 0.95rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .matrix-col-header small {
            font-weight: 400;
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .matrix-row-header {
            background: var(--bg-card);
            writing-mode: vertical-rl;
            text-orientation: mixed;
            transform: rotate(180deg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.9rem;
            padding: 16px 8px;
        }

        .quadrant {
            background: var(--bg-elevated);
            padding: 16px;
            min-height: 200px;
            transition: all 0.3s;
        }

        .strategy-card {
            background: var(--glass);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .strategy-card:hover {
            border-color: rgba(255, 255, 255, 0.15);
            transform: translateY(-1px);
        }

        .strategy-text {
            font-size: 0.82rem;
            line-height: 1.5;
            margin-bottom: 8px;
        }

        .strategy-meta {
            display: flex;
            gap: 6px;
            align-items: center;
            flex-wrap: wrap;
        }

        .point-tag {
            font-size: 0.65rem;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 600;
        }

        .tag-strength {
            background: rgba(34, 197, 94, 0.15);
            color: #4ade80;
        }

        .tag-weakness {
            background: rgba(239, 68, 68, 0.15);
            color: #f87171;
        }

        .tag-opportunity {
            background: rgba(59, 130, 246, 0.15);
            color: #60a5fa;
        }

        .tag-threat {
            background: rgba(245, 158, 11, 0.15);
            color: #fbbf24;
        }

        .priority-badge,
        .status-badge {
            font-size: 0.6rem;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 600;
        }

        .priority-HIGH {
            background: rgba(239, 68, 68, 0.15);
            color: #f87171;
        }

        .priority-MEDIUM {
            background: rgba(245, 158, 11, 0.15);
            color: #fbbf24;
        }

        .priority-LOW {
            background: rgba(107, 114, 128, 0.15);
            color: #9ca3af;
        }

        .status-badge {
            background: rgba(167, 139, 250, 0.15);
            color: #a78bfa;
        }

        .strategy-actions {
            margin-right: auto;
        }

        .strategy-actions button {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 2px;
        }

        .empty-quadrant {
            color: var(--text-muted);
            text-align: center;
            padding: 40px 16px;
            font-size: 0.8rem;
        }

        /* ===== MODAL ===== */
        .modal-content {
            background: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            color: var(--text-primary);
        }

        .form-control,
        .form-select {
            background: var(--bg-elevated) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: var(--text-primary) !important;
            font-family: 'Tajawal', sans-serif;
        }

        .loading {
            text-align: center;
            padding: 60px;
            color: var(--text-muted);
        }

        .loading i {
            font-size: 2rem;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        @media (max-width: 768px) {
            .matrix-grid {
                grid-template-columns: 1fr;
            }

            .matrix-corner,
            .matrix-col-header,
            .matrix-row-header {
                display: none;
            }

            .page-header {
                padding: 16px;
            }

            .stats-bar,
            .control-bar,
            .matrix-container {
                padding-left: 16px;
                padding-right: 16px;
            }
        }
    </style>
</head>

<body>
    <nav class="top-nav">
        <a href="/dept-dashboard.html" class="brand"><i class="bi bi-graph-up-arrow"></i> ستارتكس</a>
        <div class="nav-links">
            <a href="/dept-dashboard.html"><i class="bi bi-speedometer2"></i> لوحة الإدارة</a>
            <a href="/swot.html"><i class="bi bi-grid-3x3-gap-fill"></i> SWOT</a>
        </div>
        <button class="btn btn-sm" style="background:rgba(255,255,255,0.06);color:var(--text-muted);border:none;"
            onclick="logout()">
            <i class="bi bi-box-arrow-left"></i> خروج
        </button>
    </nav>

    <div class="page-header">
        <div>
            <h1><i class="bi bi-grid-3x3-gap-fill"></i> مصفوفة TOWS</h1>
            <div class="subtitle">تقاطع نقاط القوة والضعف مع الفرص والتهديدات → استراتيجيات تطبيقية</div>
        </div>
    </div>

    <div class="stats-bar" id="statsBar">
        <div class="stat-chip">
            <div>
                <div class="number" id="statTotal">-</div>
                <div class="label">إجمالي الاستراتيجيات</div>
            </div>
        </div>
        <div class="stat-chip">
            <div>
                <div class="number" id="statSO" style="color:var(--accent-so);">-</div>
                <div class="label">SO هجومية</div>
            </div>
        </div>
        <div class="stat-chip">
            <div>
                <div class="number" id="statST" style="color:var(--accent-st);">-</div>
                <div class="label">ST دفاعية</div>
            </div>
        </div>
        <div class="stat-chip">
            <div>
                <div class="number" id="statWO" style="color:var(--accent-wo);">-</div>
                <div class="label">WO علاجية</div>
            </div>
        </div>
        <div class="stat-chip">
            <div>
                <div class="number" id="statWT" style="color:var(--accent-wt);">-</div>
                <div class="label">WT تجنبية</div>
            </div>
        </div>
    </div>

    <div class="control-bar">
        <button class="btn-generate" onclick="autoGenerate()"><i class="bi bi-magic"></i> توليد تلقائي</button>
        <button class="btn-add" onclick="openAddModal()"><i class="bi bi-plus-lg"></i> إضافة استراتيجية</button>
    </div>

    <div class="matrix-container" style="padding: 0 32px 32px;">
        <div id="matrixArea">
            <div class="loading"><i class="bi bi-arrow-repeat"></i><br>جاري تحميل المصفوفة...</div>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal fade" id="strategyModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">إضافة استراتيجية TOWS</h5><button type="button"
                        class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="editId">
                    <div class="row g-3">
                        <div class="col-md-6"><label class="form-label">النقطة الداخلية (قوة / ضعف)</label><select
                                class="form-select" id="internalPointSelect"></select></div>
                        <div class="col-md-6"><label class="form-label">النقطة الخارجية (فرصة / تهديد)</label><select
                                class="form-select" id="externalPointSelect"></select></div>
                        <div class="col-12"><label class="form-label">نص الاستراتيجية</label><textarea
                                class="form-control" id="strategyText" rows="3"
                                placeholder="صف الاستراتيجية المقترحة..."></textarea></div>
                        <div class="col-md-4"><label class="form-label">الأولوية</label><select class="form-select"
                                id="prioritySelect">
                                <option value="HIGH">عالية</option>
                                <option value="MEDIUM" selected>متوسطة</option>
                                <option value="LOW">منخفضة</option>
                            </select></div>
                        <div class="col-md-4"><label class="form-label">الحالة</label><select class="form-select"
                                id="statusSelect">
                                <option value="PROPOSED">مقترحة</option>
                                <option value="APPROVED">معتمدة</option>
                                <option value="IN_PROGRESS">قيد التنفيذ</option>
                                <option value="COMPLETED">مكتملة</option>
                            </select></div>
                        <div class="col-md-4"><label class="form-label">الربع (تلقائي)</label><input
                                class="form-control" id="quadrantPreview" readonly disabled></div>
                        <div class="col-12"><label class="form-label">ملاحظات</label><textarea class="form-control"
                                id="notesText" rows="2" placeholder="ملاحظات إضافية..."></textarea></div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">إلغاء</button>
                    <button type="button" class="btn" style="background:var(--accent-purple);color:white;"
                        onclick="saveStrategy()"><i class="bi bi-check-lg"></i> حفظ</button>
                </div>
            </div>
        </div>
    </div>

    <div class="toast-container">
        <div id="liveToast" class="toast" role="alert" aria-live="assertive" aria-atomic="true" data-bs-autohide="true"
            data-bs-delay="3000">
            <div class="toast-body" id="toast-message"></div>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/utils.js"></script>
    <script src="/js/context-manager.js"></script>
    <script src="/js/steps-config.js"></script>
    <script src="/js/sidebar.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // ===== UTILITIES =====
        let currentData = null;
        let toastInstance = null;
        const statusLabel = { PROPOSED: 'مقترحة', APPROVED: 'معتمدة', IN_PROGRESS: 'قيد التنفيذ', COMPLETED: 'مكتملة' };
        const priorityLabel = { HIGH: 'عالية', MEDIUM: 'متوسطة', LOW: 'منخفضة' };
        const MAX_STRATEGIES = 50;

        function showToast(message, type = 'success') {
            const toastEl = document.getElementById('liveToast');
            if (!toastInstance) toastInstance = new bootstrap.Toast(toastEl);
            document.getElementById('toast-message').textContent = message;
            toastEl.classList.remove('text-bg-success', 'text-bg-danger');
            toastEl.classList.add(type === 'error' ? 'text-bg-danger' : 'text-bg-success');
            toastInstance.show();
        }

        function getDept() {
            const params = new URLSearchParams(window.location.search);
            let dept = params.get('dept');
            if (!dept && typeof Context !== 'undefined') dept = Context.getDept();
            return dept;
        }

        async function loadSwotData(dept) {
            try {
                const data = await window.callApiWithTimeout(`/api/swot/${dept}`);
                const toArray = (raw) => {
                    if (Array.isArray(raw)) return raw.filter(s => s && s.trim());
                    if (typeof raw === 'string') return raw.split(/[،,\n]/).filter(s => s.trim());
                    return [];
                };
                return {
                    strengths: toArray(data.strengths).map((text, idx) => ({ id: `s_${idx}`, text, type: 'STRENGTH' })),
                    weaknesses: toArray(data.weaknesses).map((text, idx) => ({ id: `w_${idx}`, text, type: 'WEAKNESS' })),
                    opportunities: toArray(data.opportunities).map((text, idx) => ({ id: `o_${idx}`, text, type: 'OPPORTUNITY' })),
                    threats: toArray(data.threats).map((text, idx) => ({ id: `t_${idx}`, text, type: 'THREAT' }))
                };
            } catch (e) {
                console.warn('Failed to load SWOT:', e);
                return { strengths: [], weaknesses: [], opportunities: [], threats: [] };
            }
        }

        async function loadTowsData(dept) {
            try {
                return await window.callApiWithTimeout(`/api/tows/${dept}`);
            } catch (e) {
                if (e.status !== 404) console.warn('Failed to load TOWS:', e);
                return { strategies: [] };
            }
        }

        async function generateStrategies(swotPoints) {
            const strategies = [];
            const { strengths, weaknesses, opportunities, threats } = swotPoints;
            for (const s of strengths) {
                for (const o of opportunities) {
                    if (strategies.length >= MAX_STRATEGIES) break;
                    strategies.push({
                        id: Date.now() + Math.random().toString(36),
                        internalPoint: s, externalPoint: o, quadrant: 'SO',
                        strategy: `استفد من القوة "${s.text}" لاستغلال الفرصة "${o.text}"`,
                        priority: 'MEDIUM', status: 'PROPOSED', notes: ''
                    });
                }
                for (const t of threats) {
                    if (strategies.length >= MAX_STRATEGIES) break;
                    strategies.push({
                        id: Date.now() + Math.random().toString(36),
                        internalPoint: s, externalPoint: t, quadrant: 'ST',
                        strategy: `استخدم القوة "${s.text}" لمواجهة التهديد "${t.text}"`,
                        priority: 'MEDIUM', status: 'PROPOSED', notes: ''
                    });
                }
            }
            for (const w of weaknesses) {
                for (const o of opportunities) {
                    if (strategies.length >= MAX_STRATEGIES) break;
                    strategies.push({
                        id: Date.now() + Math.random().toString(36),
                        internalPoint: w, externalPoint: o, quadrant: 'WO',
                        strategy: `تجاوز الضعف "${w.text}" باستغلال الفرصة "${o.text}"`,
                        priority: 'MEDIUM', status: 'PROPOSED', notes: ''
                    });
                }
                for (const t of threats) {
                    if (strategies.length >= MAX_STRATEGIES) break;
                    strategies.push({
                        id: Date.now() + Math.random().toString(36),
                        internalPoint: w, externalPoint: t, quadrant: 'WT',
                        strategy: `قلل من الضعف "${w.text}" وتجنب التهديد "${t.text}"`,
                        priority: 'MEDIUM', status: 'PROPOSED', notes: ''
                    });
                }
            }
            return strategies;
        }

        function renderMatrix(matrixData, swotPoints) {
            const strategies = matrixData.strategies || [];
            const quadrants = { SO: [], ST: [], WO: [], WT: [] };
            strategies.forEach(s => quadrants[s.quadrant].push(s));

            document.getElementById('matrixArea').innerHTML = `
            <div class="matrix-grid">
              <div class="matrix-corner">TOWS</div>
              <div class="matrix-col-header" style="border-bottom:3px solid var(--accent-so);"><span>✨ الفرص</span><small>${swotPoints.opportunities.length} نقاط</small></div>
              <div class="matrix-col-header" style="border-bottom:3px solid var(--accent-wt);"><span>⚡ التهديدات</span><small>${swotPoints.threats.length} نقاط</small></div>
              <div class="matrix-row-header" style="border-left:3px solid var(--accent-so);">💪 القوة (${swotPoints.strengths.length})</div>
              ${renderQuadrant(quadrants.SO, 'SO')}
              ${renderQuadrant(quadrants.ST, 'ST')}
              <div class="matrix-row-header" style="border-left:3px solid var(--accent-wt);">⚠️ الضعف (${swotPoints.weaknesses.length})</div>
              ${renderQuadrant(quadrants.WO, 'WO')}
              ${renderQuadrant(quadrants.WT, 'WT')}
            </div>`;
            updateStats(quadrants);
        }

        function renderQuadrant(strategies, quadrant) {
            if (!strategies.length) return `<div class="quadrant q-${quadrant.toLowerCase()}"><div class="empty-quadrant"><i class="bi bi-plus-circle"></i><br>لا توجد استراتيجيات</div></div>`;
            return `<div class="quadrant q-${quadrant.toLowerCase()}">${strategies.map(s => `
                <div class="strategy-card" onclick="editStrategy('${s.id}')">
                    <div class="strategy-text">${escapeHtml(s.strategy)}</div>
                    <div class="strategy-meta">
                        <span class="point-tag tag-${s.internalPoint.type.toLowerCase()}">${escapeHtml(s.internalPoint.text.slice(0, 30))}</span>
                        <span>×</span>
                        <span class="point-tag tag-${s.externalPoint.type.toLowerCase()}">${escapeHtml(s.externalPoint.text.slice(0, 30))}</span>
                        <span class="priority-badge priority-${s.priority}">${priorityLabel[s.priority]}</span>
                        <span class="status-badge status-${s.status}">${statusLabel[s.status]}</span>
                        <div class="strategy-actions"><button onclick="event.stopPropagation();deleteStrategy('${s.id}')"><i class="bi bi-trash"></i></button></div>
                    </div>
                </div>`).join('')}</div>`;
        }

        function updateStats(quadrants) {
            const total = Object.values(quadrants).reduce((a, b) => a + b.length, 0);
            document.getElementById('statTotal').textContent = total;
            document.getElementById('statSO').textContent = quadrants.SO.length;
            document.getElementById('statST').textContent = quadrants.ST.length;
            document.getElementById('statWO').textContent = quadrants.WO.length;
            document.getElementById('statWT').textContent = quadrants.WT.length;
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
        }

        function populatePointSelects() {
            const swotPoints = currentData.swotPoints;
            const internalSel = document.getElementById('internalPointSelect');
            const externalSel = document.getElementById('externalPointSelect');
            internalSel.innerHTML = '<option value="">-- اختر نقطة داخلية --</option>';
            externalSel.innerHTML = '<option value="">-- اختر نقطة خارجية --</option>';
            [...swotPoints.strengths, ...swotPoints.weaknesses].forEach(p => {
                internalSel.innerHTML += `<option value="${p.id}">${p.type === 'STRENGTH' ? '💪' : '⚠️'} ${escapeHtml(p.text.slice(0, 45))}</option>`;
            });
            [...swotPoints.opportunities, ...swotPoints.threats].forEach(p => {
                externalSel.innerHTML += `<option value="${p.id}">${p.type === 'OPPORTUNITY' ? '✨' : '⚡'} ${escapeHtml(p.text.slice(0, 45))}</option>`;
            });
            const updateQuadrant = () => {
                const intPoint = [...swotPoints.strengths, ...swotPoints.weaknesses].find(p => p.id === internalSel.value);
                const extPoint = [...swotPoints.opportunities, ...swotPoints.threats].find(p => p.id === externalSel.value);
                if (!intPoint || !extPoint) { document.getElementById('quadrantPreview').value = ''; return; }
                const map = { STRENGTH_OPPORTUNITY: 'SO', STRENGTH_THREAT: 'ST', WEAKNESS_OPPORTUNITY: 'WO', WEAKNESS_THREAT: 'WT' };
                const q = map[`${intPoint.type}_${extPoint.type}`];
                const names = { SO: 'هجومية', ST: 'دفاعية', WO: 'علاجية', WT: 'تجنبية' };
                document.getElementById('quadrantPreview').value = `${q} — ${names[q]}`;
            };
            internalSel.onchange = updateQuadrant;
            externalSel.onchange = updateQuadrant;
        }

        function openAddModal() {
            if (!currentData || !currentData.swotPoints) return showToast('تحميل البيانات لم يكتمل', 'error');
            document.getElementById('editId').value = '';
            document.getElementById('strategyText').value = '';
            document.getElementById('notesText').value = '';
            document.getElementById('prioritySelect').value = 'MEDIUM';
            document.getElementById('statusSelect').value = 'PROPOSED';
            document.getElementById('quadrantPreview').value = '';
            document.getElementById('modalTitle').textContent = 'إضافة استراتيجية TOWS';
            populatePointSelects();
            new bootstrap.Modal(document.getElementById('strategyModal')).show();
        }

        function editStrategy(id) {
            const s = (currentData.matrix.strategies || []).find(st => st.id === id);
            if (!s) return;
            document.getElementById('editId').value = s.id;
            document.getElementById('strategyText').value = s.strategy;
            document.getElementById('notesText').value = s.notes || '';
            document.getElementById('prioritySelect').value = s.priority;
            document.getElementById('statusSelect').value = s.status;
            document.getElementById('modalTitle').textContent = 'تعديل استراتيجية TOWS';
            populatePointSelects();
            document.getElementById('internalPointSelect').value = s.internalPoint.id;
            document.getElementById('externalPointSelect').value = s.externalPoint.id;
            document.getElementById('internalPointSelect').onchange();
            new bootstrap.Modal(document.getElementById('strategyModal')).show();
        }

        async function saveStrategy() {
            const dept = getDept();
            const editId = document.getElementById('editId').value;
            const internalPointId = document.getElementById('internalPointSelect').value;
            const externalPointId = document.getElementById('externalPointSelect').value;
            const strategyText = document.getElementById('strategyText').value;
            if (!strategyText) return showToast('نص الاستراتيجية مطلوب', 'error');

            const allPoints = [...currentData.swotPoints.strengths, ...currentData.swotPoints.weaknesses, ...currentData.swotPoints.opportunities, ...currentData.swotPoints.threats];
            const internalPoint = allPoints.find(p => p.id === internalPointId);
            const externalPoint = allPoints.find(p => p.id === externalPointId);
            if (!internalPoint || !externalPoint) return showToast('يجب اختيار النقاط', 'error');

            const quadrantMap = { STRENGTH_OPPORTUNITY: 'SO', STRENGTH_THREAT: 'ST', WEAKNESS_OPPORTUNITY: 'WO', WEAKNESS_THREAT: 'WT' };
            const strategy = {
                id: editId || Date.now().toString() + Math.random().toString(36),
                internalPoint, externalPoint, strategy: strategyText,
                quadrant: quadrantMap[`${internalPoint.type}_${externalPoint.type}`],
                priority: document.getElementById('prioritySelect').value,
                status: document.getElementById('statusSelect').value,
                notes: document.getElementById('notesText').value || null
            };

            let allStrategies = [...(currentData.matrix.strategies || [])];
            if (editId) {
                const idx = allStrategies.findIndex(s => s.id === editId);
                if (idx !== -1) allStrategies[idx] = strategy;
            } else {
                allStrategies.push(strategy);
            }

            try {
                await window.callApiWithTimeout(`/api/tows/${dept}`, { method: 'POST', body: { strategies: allStrategies } });
                currentData.matrix.strategies = allStrategies;
                renderMatrix(currentData.matrix, currentData.swotPoints);
                bootstrap.Modal.getInstance(document.getElementById('strategyModal'))?.hide();
                if (window.Context && Context.markStepCompleted) await Context.markStepCompleted('tows');
                showToast('تم الحفظ بنجاح');
            } catch (e) { showToast(e.message || 'خطأ في الحفظ', 'error'); }
        }

        async function deleteStrategy(id) {
            if (!confirm('هل تريد حذف هذه الاستراتيجية؟')) return;
            const dept = getDept();
            let all = currentData.matrix.strategies.filter(s => s.id !== id);
            try {
                await window.callApiWithTimeout(`/api/tows/${dept}`, { method: 'POST', body: { strategies: all } });
                currentData.matrix.strategies = all;
                renderMatrix(currentData.matrix, currentData.swotPoints);
                if (window.Context && Context.markStepCompleted) await Context.markStepCompleted('tows');
                showToast('تم الحذف');
            } catch (e) { showToast('فشل الحذف', 'error'); }
        }

        async function autoGenerate() {
            const dept = getDept();
            if (!confirm('سيتم توليد مقترحات استراتيجية. متابعة؟')) return;
            try {
                const newStrats = await generateStrategies(currentData.swotPoints);
                const existingIds = new Set((currentData.matrix.strategies || []).map(s => s.internalPoint.id + '-' + s.externalPoint.id));
                const filtered = newStrats.filter(s => !existingIds.has(s.internalPoint.id + '-' + s.externalPoint.id));
                const merged = [...(currentData.matrix.strategies || []), ...filtered];
                await window.callApiWithTimeout(`/api/tows/${dept}`, { method: 'POST', body: { strategies: merged } });
                currentData.matrix.strategies = merged;
                renderMatrix(currentData.matrix, currentData.swotPoints);
                if (window.Context && Context.markStepCompleted) await Context.markStepCompleted('tows');
                showToast(`تمت إضافة ${filtered.length} استراتيجية جديدة`);
            } catch (e) { showToast('فشل التوليد', 'error'); }
        }

        async function loadPageData(dept) {
            const [swot, tows] = await Promise.all([loadSwotData(dept), loadTowsData(dept)]);
            currentData = { swotPoints: swot, matrix: tows };
            renderMatrix(tows, swot);
        }

        async function init() {
            const dept = getDept();
            if (!dept) { window.location.href = '/dept-dashboard.html'; return; }
            await loadPageData(dept);
        }

        function logout() { if (window.globalLogout) window.globalLogout(); else location.href = '/login'; }
        init();
    </script>
</body>

</html>
