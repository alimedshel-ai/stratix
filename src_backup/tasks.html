<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ستارتكس - المهام</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #667eea;
            --secondary: #764ba2;
            --bg: #0f1117;
            --bg-card: #1a1d2e;
            --bg-card-hover: #232640;
            --text: #e2e8f0;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.08);
            --success: #22c55e;
            --warning: #facc15;
            --danger: #ef4444;
            --info: #38bdf8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            font-family: 'Tajawal', sans-serif;
            color: var(--text);
            min-height: 100vh;
        }

        .top-nav {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            padding: 14px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .top-nav .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            color: white;
            text-decoration: none;
            font-size: 20px;
            font-weight: 700;
        }

        .user-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: white;
        }

        .btn-logout {
            background: rgba(255, 255, 255, 0.15);
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 8px;
            font-family: inherit;
            font-size: 12px;
            cursor: pointer;
        }

        .layout {
            display: flex;
            min-height: calc(100vh - 60px);
        }

        .main-content {
            flex: 1;
            padding: 30px;
            max-width: calc(100% - 220px);
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 24px;
        }

        .page-header h1 {
            font-size: 26px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .page-header h1 i {
            color: var(--primary);
        }

        .page-subtitle {
            color: var(--text-muted);
            font-size: 14px;
            margin-top: 4px;
        }

        .btn-add {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .btn-add:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(102, 126, 234, 0.4);
        }

        /* Cascading Flow */
        .cascade-flow {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 24px;
            padding: 14px 20px;
            background: rgba(102, 126, 234, 0.06);
            border: 1px solid rgba(102, 126, 234, 0.15);
            border-radius: 12px;
            flex-wrap: wrap;
        }

        .cascade-step {
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            color: var(--text-muted);
        }

        .cascade-step:hover {
            background: rgba(255, 255, 255, 0.06);
            color: var(--text);
        }

        .cascade-step.active {
            background: var(--primary);
            color: white;
        }

        .cascade-arrow {
            color: var(--text-muted);
            font-size: 16px;
        }

        .sync-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 10px;
            padding: 3px 8px;
            border-radius: 6px;
            background: rgba(102, 126, 234, 0.1);
            color: var(--primary);
            margin-right: 6px;
        }

        /* Stats */
        .mini-stats {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 14px;
            margin-bottom: 24px;
        }

        .mini-stat {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 16px;
            text-align: center;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .mini-stat::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
        }

        .mini-stat:nth-child(1)::before {
            background: var(--primary);
        }

        .mini-stat:nth-child(2)::before {
            background: var(--success);
        }

        .mini-stat:nth-child(3)::before {
            background: var(--info);
        }

        .mini-stat:nth-child(4)::before {
            background: var(--warning);
        }

        .mini-stat:nth-child(5)::before {
            background: var(--danger);
        }

        .ms-value {
            font-size: 24px;
            font-weight: 800;
        }

        .ms-label {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 3px;
        }

        /* Filter + Search */
        .toolbar {
            display: flex;
            gap: 10px;
            margin-bottom: 18px;
            flex-wrap: wrap;
            align-items: center;
        }

        .ftab {
            padding: 8px 16px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text-muted);
            transition: all 0.3s;
        }

        .ftab:hover {
            border-color: rgba(255, 255, 255, 0.15);
        }

        .ftab.active {
            border-color: var(--primary);
            color: var(--primary);
            background: rgba(102, 126, 234, 0.08);
        }

        .search-box {
            margin-right: auto;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 8px 14px;
            color: var(--text);
            font-family: inherit;
            font-size: 13px;
            min-width: 200px;
        }

        .search-box:focus {
            outline: none;
            border-color: var(--primary);
        }

        /* Task List */
        .task-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .task-item {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 14px;
            transition: all 0.3s;
            cursor: pointer;
        }

        .task-item:hover {
            border-color: rgba(255, 255, 255, 0.15);
            background: var(--bg-card-hover);
        }

        .task-item.done {
            opacity: 0.6;
        }

        .task-check {
            width: 22px;
            height: 22px;
            border-radius: 6px;
            border: 2px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .task-check:hover {
            border-color: var(--success);
        }

        .task-check.checked {
            background: var(--success);
            border-color: var(--success);
            color: white;
        }

        .task-info {
            flex: 1;
            min-width: 0;
        }

        .task-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 3px;
        }

        .task-item.done .task-title {
            text-decoration: line-through;
            color: var(--text-muted);
        }

        .task-chain {
            font-size: 11px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }

        .task-chain-tag {
            padding: 2px 8px;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.03);
        }

        .task-assignee {
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 120px;
        }

        .task-av {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 700;
            color: white;
            flex-shrink: 0;
        }

        .task-assignee-name {
            font-size: 12px;
            color: var(--text-muted);
        }

        .task-priority {
            min-width: 70px;
        }

        .task-priority-badge {
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 600;
        }

        .priority-HIGH {
            background: rgba(239, 68, 68, 0.12);
            color: var(--danger);
        }

        .priority-MEDIUM {
            background: rgba(250, 204, 21, 0.12);
            color: var(--warning);
        }

        .priority-LOW {
            background: rgba(34, 197, 94, 0.12);
            color: var(--success);
        }

        .task-due {
            font-size: 12px;
            color: var(--text-muted);
            min-width: 100px;
            text-align: center;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .task-due.overdue {
            color: var(--danger);
            font-weight: 600;
        }

        .task-actions {
            display: flex;
            gap: 4px;
        }

        .task-btn {
            width: 30px;
            height: 30px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
        }

        .task-btn:hover {
            background: rgba(255, 255, 255, 0.06);
        }

        .task-btn.edit:hover {
            border-color: var(--warning);
            color: var(--warning);
        }

        .task-btn.del:hover {
            border-color: var(--danger);
            color: var(--danger);
        }

        /* Group headers */
        .group-header {
            font-size: 14px;
            font-weight: 700;
            padding: 10px 0;
            margin-top: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border);
            margin-bottom: 8px;
        }

        /* Modal */
        .modal-content {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            color: var(--text);
        }

        .modal-header {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border-radius: 16px 16px 0 0;
            padding: 18px 24px;
            border-bottom: none;
        }

        .modal-body {
            padding: 24px;
        }

        .modal-footer {
            padding: 16px 24px;
            border-top: 1px solid var(--border);
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--text-muted);
        }

        .form-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 14px;
            color: var(--text);
            font-family: inherit;
            font-size: 14px;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .form-input option {
            background: var(--bg-card);
            color: var(--text);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .btn-modal-save {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 10px;
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-modal-cancel {
            background: rgba(255, 255, 255, 0.06);
            color: var(--text);
            border: 1px solid var(--border);
            padding: 10px 24px;
            border-radius: 10px;
            font-family: inherit;
            cursor: pointer;
        }

        .toast-container {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 9999;
        }

        .toast-msg {
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            animation: slideUp 0.3s ease;
            margin-top: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(34, 197, 94, 0.9);
            color: white;
        }

        @keyframes slideUp {
            from {
                transform: translateY(20px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @media (max-width: 768px) {
            .mini-stats {
                grid-template-columns: repeat(2, 1fr);
            }

            .main-content {
                max-width: 100%;
                padding: 16px;
            }

            .task-assignee,
            .task-due {
                display: none;
            }
        }
    </style>
</head>

<body>
    <nav class="top-nav">
        <a href="/dashboard.html" class="brand"><i class="bi bi-gem"></i> ستارتكس</a>
        <div class="user-area">
            <div class="user-avatar">م</div>
            <button class="btn-logout" onclick="localStorage.clear(); location.href='/login.html'"><i
                    class="bi bi-box-arrow-right"></i> خروج</button>
        </div>
    </nav>

    <div class="layout">
        <aside class="sidebar-placeholder" id="sidebarContainer"></aside>
        <div class="main-content">
            <div class="page-header">
                <div>
                    <h1 id="pageTitle"><i class="bi bi-check2-square"></i> المهام اليومية</h1>
                    <p class="page-subtitle" id="pageSubtitle">المهام المنزّلة من المشاريع — كل مهمة مربوطة بالسلسلة
                        الاستراتيجية من الهدف
                        حتى التنفيذ الفعلي</p>
                </div>
                <button class="btn-add" onclick="openCreateModal()"><i class="bi bi-plus-lg"></i> مهمة جديدة</button>
            </div>

            <!-- Cascading Flow -->
            <div class="cascade-flow">
                <a href="/objectives.html" class="cascade-step"><i class="bi bi-bullseye"></i> الأهداف</a>
                <i class="bi bi-chevron-left cascade-arrow"></i>
                <a href="/initiatives.html" class="cascade-step"><i class="bi bi-rocket-takeoff"></i> المبادرات</a>
                <i class="bi bi-chevron-left cascade-arrow"></i>
                <a href="/projects.html" class="cascade-step"><i class="bi bi-folder2-open"></i> المشاريع</a>
                <i class="bi bi-chevron-left cascade-arrow"></i>
                <span class="cascade-step active"><i class="bi bi-check2-square"></i> المهام</span>
                <span style="margin-right: auto"></span>
                <span class="sync-badge"><i class="bi bi-arrow-repeat"></i> متزامن مع dePower / Asana / Odoo</span>
            </div>

            <!-- Stats -->
            <div class="mini-stats">
                <div class="mini-stat">
                    <div class="ms-value" id="sTotal">20</div>
                    <div class="ms-label">إجمالي المهام</div>
                </div>
                <div class="mini-stat">
                    <div class="ms-value" id="sDone">8</div>
                    <div class="ms-label">مكتملة</div>
                </div>
                <div class="mini-stat">
                    <div class="ms-value" id="sInProgress">7</div>
                    <div class="ms-label">قيد التنفيذ</div>
                </div>
                <div class="mini-stat">
                    <div class="ms-value" id="sTodo">5</div>
                    <div class="ms-label">لم تبدأ</div>
                </div>
                <div class="mini-stat">
                    <div class="ms-value" id="sOverdue">2</div>
                    <div class="ms-label">متأخرة</div>
                </div>
            </div>

            <!-- Coverage Bar -->
            <div id="coverageBar"
                style="background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:14px 18px;margin-bottom:16px;">
            </div>

            <!-- Filter -->
            <div class="toolbar">
                <div class="ftab active" onclick="filterTasks('all',this)">الكل</div>
                <div class="ftab" onclick="filterTasks('todo',this)">⬜ لم تبدأ</div>
                <div class="ftab" onclick="filterTasks('in_progress',this)">🔵 جارية</div>
                <div class="ftab" onclick="filterTasks('done',this)">✅ مكتملة</div>
                <input type="text" class="search-box" placeholder="🔍 بحث في المهام..."
                    oninput="searchTasks(this.value)">
            </div>

            <!-- Task List -->
            <div class="task-list" id="taskList"></div>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal fade" id="taskModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle"><i class="bi bi-plus-circle"></i> مهمة جديدة</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="editId">
                    <div class="form-group"><label>عنوان المهمة</label><input type="text" class="form-input"
                            id="formTitle" placeholder="مثال: تصميم صفحة تسجيل الدخول"></div>
                    <div class="form-row">
                        <div class="form-group"><label>🎯 ربط بـ OKR</label>
                            <select class="form-input" id="formOKR">
                                <option value="">— بدون ربط —</option>
                            </select>
                        </div>
                        <div class="form-group"><label>🚀 المبادرة</label>
                            <select class="form-input" id="formInitiative">
                                <option value="">— بدون مبادرة —</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group"><label>المكلف</label><input type="text" class="form-input"
                                id="formAssignee" placeholder="اسم الموظف"></div>
                        <div class="form-group"><label>تاريخ التسليم</label><input type="date" class="form-input"
                                id="formDue"></div>
                    </div>
                    <div class="form-row">
                        <div class="form-group"><label>الأولوية</label>
                            <select class="form-input" id="formPriority">
                                <option value="HIGH">🔴 عالية</option>
                                <option value="MEDIUM">🟡 متوسطة</option>
                                <option value="LOW">🟢 منخفضة</option>
                            </select>
                        </div>
                        <div class="form-group"><label>الحالة</label>
                            <select class="form-input" id="formStatus">
                                <option value="todo">لم تبدأ</option>
                                <option value="in_progress">قيد التنفيذ</option>
                                <option value="done">مكتملة</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group" id="formDeptGroup">
                        <label>📂 الإدارة</label>
                        <select class="form-input" id="formDept">
                            <option value="">— كل الإدارات —</option>
                            <option value="hr">الموارد البشرية</option>
                            <option value="finance">المالية</option>
                            <option value="marketing">التسويق</option>
                            <option value="sales">المبيعات</option>
                            <option value="operations">العمليات</option>
                            <option value="it">تقنية المعلومات</option>
                            <option value="compliance">الامتثال والحوكمة</option>
                            <option value="cs">خدمة العملاء</option>
                            <option value="quality">الجودة</option>
                            <option value="projects">إدارة المشاريع</option>
                            <option value="support">الخدمات المساندة</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn-modal-cancel" data-bs-dismiss="modal">إلغاء</button>
                    <button class="btn-modal-save" onclick="saveTask()"><i class="bi bi-check-lg"></i> حفظ</button>
                </div>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/assets/js/api.js"></script>
    <script src="/assets/js/sidebar.js"></script>
    <script src="/assets/js/ai-advisor.js"></script>
    <script>
        if (window.StartixAPI?.showEntityBanner) {
            StartixAPI.showEntityBanner({ toolName: 'المهام' });
        }
    </script>
    <script>
        /* ═══════════════════════════════════════
           Phase 11A — Tasks Bridge
           Live data from localStorage + OKRs
           + Department-aware filtering
        ═══════════════════════════════════════ */
        let currentFilter = 'all';
        let searchQuery = '';
        const avColors = ['#667eea', '#22c55e', '#38bdf8', '#facc15', '#ef4444', '#a78bfa', '#f97316', '#06b6d4', '#ec4899', '#14b8a6'];

        // ── كشف الإدارة من URL أو localStorage ──
        const DEPT_NAMES = {
            hr: 'الموارد البشرية', finance: 'المالية', marketing: 'التسويق',
            operations: 'العمليات', sales: 'المبيعات', it: 'تقنية المعلومات',
            cs: 'خدمة العملاء', compliance: 'الامتثال والحوكمة', quality: 'الجودة',
            projects: 'إدارة المشاريع', support: 'الخدمات المساندة'
        };
        const _urlDept = new URLSearchParams(location.search).get('dept') || '';
        const _storedDept = localStorage.getItem('stratix_v10_dept') || '';
        const _DEPT_MAP = {
            'DEPT_HR': 'hr', 'DEPT_FINANCE': 'finance', 'DEPT_MARKETING': 'marketing',
            'DEPT_OPS': 'operations', 'DEPT_SERVICE': 'cs', 'DEPT_SALES': 'sales',
            'DEPT_IT': 'it', 'DEPT_LEGAL': 'compliance', 'DEPT_QUALITY': 'quality', 'DEPT_PMO': 'projects'
        };
        const _savedDeptKey = localStorage.getItem('stratix_dept') || '';
        const _mappedDept = _DEPT_MAP[_savedDeptKey] || '';
        const currentDept = _urlDept || _storedDept || _mappedDept || '';
        const currentDeptName = DEPT_NAMES[currentDept] || '';

        // ── تحديث العنوان حسب الإدارة ──
        if (currentDeptName) {
            document.getElementById('pageTitle').innerHTML = `<i class="bi bi-check2-square"></i> مهام ${currentDeptName}`;
            document.getElementById('pageSubtitle').textContent = `المهام الخاصة بإدارة ${currentDeptName} — مربوطة بالسلسلة الاستراتيجية`;

        // ── إخفاء حقل الإدارة في المودال لو فيه إدارة مختارة ──
        if (currentDept) {
            const deptGroup = document.getElementById('formDeptGroup');
            if (deptGroup) deptGroup.style.display = 'none';
        }

        // ── Load from localStorage or seed dept-specific defaults ──
        function loadTasks() {

            }
            // Seed with sample tasks
            const seeds = {
                hr: [
                    { id: 'hr1', title: 'تحديث سياسة التوظيف', dept: 'hr', project: 'تطوير الموارد البشرية', initiative: 'برنامج الاستقطاب', objective: 'تحسين جودة التوظيف', okrId: '', assignee: 'منى الشهري', priority: 'HIGH', status: 'in_progress', due: '2026-03-20' },
                    { id: 'hr2', title: 'تصميم برنامج تدريب القيادات', dept: 'hr', project: 'تطوير المواهب', initiative: 'تطوير الكوادر', objective: 'رفع كفاءة القيادات', okrId: '', assignee: 'فاطمة', priority: 'HIGH', status: 'todo', due: '2026-04-01' },
                    { id: 'hr3', title: 'إطلاق استبيان رضا الموظفين', dept: 'hr', project: 'قياس الرضا', initiative: 'بيئة عمل محفّزة', objective: 'رفع رضا الموظفين', okrId: '', assignee: 'سارة', priority: 'MEDIUM', status: 'todo', due: '2026-03-25' },
                    { id: 'hr4', title: 'توثيق إجراءات الـ Onboarding', dept: 'hr', project: 'تحسين الإجراءات', initiative: 'برنامج الاستقطاب', objective: 'تحسين تجربة الموظف الجديد', okrId: '', assignee: 'عبدالله', priority: 'MEDIUM', status: 'done', due: '2026-02-28' },
                    { id: 'hr5', title: 'مراجعة هيكل الرواتب والمزايا', dept: 'hr', project: 'تحليل التعويضات', initiative: 'بيئة عمل محفّزة', objective: 'المحافظة على الكفاءات', okrId: '', assignee: 'منى الشهري', priority: 'HIGH', status: 'in_progress', due: '2026-03-15' },
                ],
                finance: [
                    { id: 'fin1', title: 'إعداد التقرير المالي الربعي', dept: 'finance', project: 'التقارير المالية', initiative: 'الشفافية المالية', objective: 'تحسين جودة التقارير', okrId: '', assignee: 'محمد العمري', priority: 'HIGH', status: 'in_progress', due: '2026-03-31' },
                    { id: 'fin2', title: 'مراجعة الميزانية التشغيلية', dept: 'finance', project: 'إدارة الميزانية', initiative: 'ضبط التكاليف', objective: 'خفض المصروفات 10%', okrId: '', assignee: 'نورة', priority: 'HIGH', status: 'todo', due: '2026-04-05' },
                    { id: 'fin3', title: 'تحديث سياسة المشتريات', dept: 'finance', project: 'الحوكمة المالية', initiative: 'ضبط التكاليف', objective: 'تحسين كفاءة الإنفاق', okrId: '', assignee: 'فهد', priority: 'MEDIUM', status: 'done', due: '2026-02-20' },
                ],
                default: [
                    { id: '1', title: 'تصميم صفحة تسجيل الدخول', project: 'تطوير واجهة التطبيق', initiative: 'إطلاق التطبيق الرقمي', objective: 'رفع رضا العملاء', okrId: '', assignee: 'أحمد المطيري', priority: 'HIGH', status: 'done', due: '2026-02-10' },
                    { id: '2', title: 'تصميم لوحة التحكم الرئيسية', project: 'تطوير واجهة التطبيق', initiative: 'إطلاق التطبيق الرقمي', objective: 'رفع رضا العملاء', okrId: '', assignee: 'أحمد المطيري', priority: 'HIGH', status: 'done', due: '2026-02-15' },
                    { id: '3', title: 'بناء API المصادقة (JWT)', project: 'بناء Backend APIs', initiative: 'إطلاق التطبيق الرقمي', objective: 'رفع رضا العملاء', okrId: '', assignee: 'خالد العتيبي', priority: 'HIGH', status: 'done', due: '2026-02-05' },
                    { id: '4', title: 'ربط بوابة الدفع mada/VISA', project: 'بناء Backend APIs', initiative: 'إطلاق التطبيق الرقمي', objective: 'رفع رضا العملاء', okrId: '', assignee: 'فهد', priority: 'HIGH', status: 'in_progress', due: '2026-03-10' },
                    { id: '5', title: 'اختبار الاستجابة على الجوال', project: 'تطوير واجهة التطبيق', initiative: 'إطلاق التطبيق الرقمي', objective: 'رفع رضا العملاء', okrId: '', assignee: 'نور', priority: 'MEDIUM', status: 'todo', due: '2026-03-15' },
                ]
            };
            return seeds[currentDept] || seeds.default;
        }

        let tasks = loadTasks();

        function saveTasks() {
            // حفظ كل المهام (مع dept tag)
            let allTasks = [];
            try { allTasks = JSON.parse(localStorage.getItem('stratix_tasks') || '[]'); } catch (e) { }
            // إزالة المهام القديمة لهذا الـ dept وإضافة الجديدة
            if (currentDept) {
                allTasks = allTasks.filter(t => t.dept && t.dept !== currentDept);
                allTasks = [...allTasks, ...tasks];
            } else {
                allTasks = tasks;
            }
            localStorage.setItem('stratix_tasks', JSON.stringify(allTasks));
        }

        // ── Read OKRs from localStorage ──
        function getOKRs() {
            return JSON.parse(localStorage.getItem('stratix_okrs') || '[]');
        }

        // ── Read Initiatives (from localStorage or default list) ──
        function getInitiatives() {
            const saved = localStorage.getItem('stratix_initiatives');
            if (saved) return JSON.parse(saved);
            return [
                { id: 'init_1', name: 'إطلاق التطبيق الرقمي للعملاء', objective: 'رفع رضا العملاء', status: 'IN_PROGRESS' },
                { id: 'init_2', name: 'برنامج التحول الرقمي الداخلي', objective: 'أتمتة العمليات', status: 'IN_PROGRESS' },
                { id: 'init_3', name: 'توسيع الفريق التقني', objective: 'تطوير الكوادر', status: 'IN_PROGRESS' },
                { id: 'init_4', name: 'الحصول على شهادة ISO 9001', objective: 'تطبيق ISO 9001', status: 'REVIEW' },
                { id: 'init_5', name: 'تطوير منصة التقارير الذكية', objective: 'أتمتة العمليات', status: 'PLANNED' },
            ];
        }

        // ── TASK TEMPLATE MAP: auto-generate tasks per initiative ──
        const TASK_TEMPLATES = {
            'إطلاق التطبيق': [
                { title: 'تحليل متطلبات المستخدم', priority: 'HIGH', daysOut: 14 },
                { title: 'تصميم واجهة المستخدم (UI/UX)', priority: 'HIGH', daysOut: 30 },
                { title: 'تطوير الـ Backend APIs', priority: 'HIGH', daysOut: 45 },
                { title: 'اختبار الأداء والأمان', priority: 'MEDIUM', daysOut: 55 },
                { title: 'إطلاق النسخة التجريبية', priority: 'MEDIUM', daysOut: 60 },
            ],
            'التحول الرقمي': [
                { title: 'مسح العمليات اليدوية', priority: 'HIGH', daysOut: 10 },
                { title: 'اختيار نظام ERP/CRM', priority: 'HIGH', daysOut: 20 },
                { title: 'تدريب الفريق على النظام الجديد', priority: 'MEDIUM', daysOut: 40 },
                { title: 'ترحيل البيانات', priority: 'HIGH', daysOut: 50 },
            ],
            'الفريق': [
                { title: 'تحديد الاحتياجات الوظيفية', priority: 'HIGH', daysOut: 7 },
                { title: 'نشر إعلانات التوظيف', priority: 'MEDIUM', daysOut: 14 },
                { title: 'إجراء المقابلات', priority: 'HIGH', daysOut: 30 },
                { title: 'برنامج Onboarding', priority: 'MEDIUM', daysOut: 45 },
            ],
            'ISO': [
                { title: 'تحليل الفجوات مع المعايير', priority: 'HIGH', daysOut: 14 },
                { title: 'توثيق الإجراءات والعمليات', priority: 'HIGH', daysOut: 30 },
                { title: 'تدقيق داخلي تجريبي', priority: 'MEDIUM', daysOut: 45 },
                { title: 'التدقيق النهائي والحصول على الشهادة', priority: 'HIGH', daysOut: 60 },
            ],
            'default': [
                { title: 'وضع خطة العمل التفصيلية', priority: 'HIGH', daysOut: 7 },
                { title: 'تحديد الموارد والميزانية', priority: 'MEDIUM', daysOut: 14 },
                { title: 'التنفيذ والمتابعة', priority: 'HIGH', daysOut: 30 },
                { title: 'التقييم والتقرير النهائي', priority: 'MEDIUM', daysOut: 45 },
            ],
        };

        const statusLabels = { todo: 'لم تبدأ', in_progress: 'جارية', done: 'مكتملة' };
        const priorityLabels = { HIGH: 'عالية', MEDIUM: 'متوسطة', LOW: 'منخفضة' };

        function isOverdue(due, status) {
            return status !== 'done' && new Date(due) < new Date();
        }

        function getFiltered() {
            let data = tasks;
            if (currentFilter !== 'all') data = data.filter(t => t.status === currentFilter);
            if (searchQuery) data = data.filter(t => t.title.includes(searchQuery) || t.project?.includes(searchQuery) || t.assignee?.includes(searchQuery) || t.initiative?.includes(searchQuery));
            return data;
        }

        function filterTasks(f, el) {
            currentFilter = f;
            document.querySelectorAll('.ftab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            renderAll();
        }
        function searchTasks(q) { searchQuery = q; renderAll(); }

        function renderStats() {
            document.getElementById('sTotal').textContent = tasks.length;
            document.getElementById('sDone').textContent = tasks.filter(t => t.status === 'done').length;
            document.getElementById('sInProgress').textContent = tasks.filter(t => t.status === 'in_progress').length;
            document.getElementById('sTodo').textContent = tasks.filter(t => t.status === 'todo').length;
            document.getElementById('sOverdue').textContent = tasks.filter(t => isOverdue(t.due, t.status)).length;
        }

        function toggleTask(id) {
            const t = tasks.find(x => x.id === id);
            if (t) {
                t.status = t.status === 'done' ? 'todo' : 'done';
                saveTasks();
                renderAll();
                showToast(t.status === 'done' ? 'تم إكمال المهمة ✓' : 'تم إعادة فتح المهمة');
            }
        }

        // ── Coverage bar ──
        function renderCoverage() {
            const el = document.getElementById('coverageBar');
            if (!el) return;
            const initiatives = getInitiatives();
            const initNames = initiatives.map(i => i.name);
            const coveredNames = new Set(tasks.map(t => t.initiative).filter(Boolean));
            const covered = initNames.filter(n => coveredNames.has(n)).length;
            const total = initNames.length;
            const pct = total > 0 ? Math.round((covered / total) * 100) : 0;
            const uncovered = total - covered;

            el.innerHTML = `
            <div style="display:flex;justify-content:space-between;align-items:center;">
                <span style="font-size:12px;font-weight:700;color:var(--text);">🔗 تغطية المبادرات بالمهام</span>
                <span style="font-size:13px;font-weight:800;color:${pct >= 80 ? 'var(--success)' : pct >= 50 ? 'var(--warning)' : 'var(--danger)'};">${pct}%</span>
            </div>
            <div style="height:6px;border-radius:3px;background:rgba(255,255,255,.06);margin-top:6px;overflow:hidden;">
                <div style="height:100%;width:${pct}%;border-radius:3px;background:linear-gradient(90deg,var(--primary),var(--secondary));transition:width .5s;"></div>
            </div>
            <div style="display:flex;justify-content:space-between;align-items:center;margin-top:6px;">
                <span style="font-size:10px;color:var(--text-muted);">${covered} من ${total} مبادرة مغطاة ${pct >= 100 ? '✅' : ''}</span>
                ${uncovered > 0 ? `<button onclick="autoGenerateTasks()" style="font-size:10px;font-weight:700;padding:5px 12px;border-radius:6px;border:1px solid rgba(102,126,234,.3);background:rgba(102,126,234,.06);color:#818cf8;cursor:pointer;font-family:'Tajawal',sans-serif;">
                    ⚡ ولّد مهام للـ ${uncovered} المتبقية
                </button>` : ''}
            </div>`;
        }

        // ── Auto-generate tasks from initiatives ──
        function autoGenerateTasks() {
            const initiatives = getInitiatives();
            const coveredNames = new Set(tasks.map(t => t.initiative).filter(Boolean));
            let count = 0;
            const today = new Date();

            initiatives.forEach(init => {
                if (coveredNames.has(init.name)) return;

                // Find best template
                let tmplKey = 'default';
                for (const key of Object.keys(TASK_TEMPLATES)) {
                    if (key !== 'default' && init.name.includes(key)) { tmplKey = key; break; }
                }
                const templates = TASK_TEMPLATES[tmplKey];

                templates.forEach(tmpl => {
                    const dueDate = new Date(today);
                    dueDate.setDate(dueDate.getDate() + tmpl.daysOut);
                    tasks.push({
                        id: 'gen_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5),
                        title: tmpl.title,
                        project: init.name,
                        initiative: init.name,
                        objective: init.objective || '',
                        okrId: '',
                        assignee: '',
                        priority: tmpl.priority,
                        status: 'todo',
                        due: dueDate.toISOString().split('T')[0],
                        source: 'auto',
                    });
                    count++;
                });
            });

            if (count === 0) { showToast('جميع المبادرات مغطاة ✅'); return; }
            saveTasks();
            renderAll();
            showToast(`✅ تم إنشاء ${count} مهمة لـ ${initiatives.length} مبادرة`);
        }

        function renderList() {
            const data = getFiltered();
            // Group by initiative (or project)
            const groups = {};
            data.forEach(t => {
                const group = t.initiative || t.project || 'بدون مبادرة';
                if (!groups[group]) groups[group] = [];
                groups[group].push(t);
            });

            const okrs = getOKRs();

            let html = '';
            for (const [group, items] of Object.entries(groups)) {
                const doneCount = items.filter(t => t.status === 'done').length;
                const groupPct = Math.round((doneCount / items.length) * 100);
                html += `<div class="group-header">
                    <i class="bi bi-rocket-takeoff"></i> ${group}
                    <span style="font-size:11px;font-weight:400">(${items.length} مهمة — ${groupPct}% مكتمل)</span>
                    <div style="flex:1;max-width:100px;height:4px;border-radius:2px;background:rgba(255,255,255,.06);margin-right:8px;">
                        <div style="height:100%;width:${groupPct}%;border-radius:2px;background:${groupPct >= 70 ? 'var(--success)' : groupPct >= 40 ? 'var(--warning)' : 'var(--danger)'};"></div>
                    </div>
                </div>`;
                items.forEach(t => {
                    const overdue = isOverdue(t.due, t.status);
                    const avChar = (t.assignee || '?').charAt(0);
                    const avColor = avColors[(t.assignee || '').charCodeAt(0) % avColors.length];

                    // Source badge
                    const okr = t.okrId ? okrs.find(o => o.id === t.okrId) : null;
                    const okrBadge = okr ? `<span class="task-chain-tag" style="color:var(--primary)"><i class="bi bi-bullseye"></i> ${okr.objective ? okr.objective.substring(0, 30) : t.objective}</span>` :
                        (t.objective ? `<span class="task-chain-tag" style="color:var(--primary)"><i class="bi bi-bullseye"></i> ${t.objective}</span>` : '');
                    const initBadge = t.initiative ? `<span class="task-chain-tag" style="color:var(--warning)"><i class="bi bi-rocket-takeoff"></i> ${t.initiative.substring(0, 30)}</span>` : '';
                    const sourceBadge = t.source === 'auto' ? `<span style="font-size:9px;padding:1px 6px;border-radius:4px;background:rgba(102,126,234,.1);color:var(--primary);font-weight:600;">⚡ تلقائي</span>` :
                        (t.source === 'meeting' ? `<span style="font-size:9px;padding:1px 6px;border-radius:4px;background:rgba(250,204,21,.1);color:var(--warning);font-weight:600;">📋 اجتماع</span>` : '');

                    html += `
          <div class="task-item ${t.status === 'done' ? 'done' : ''}">
            <div class="task-check ${t.status === 'done' ? 'checked' : ''}" onclick="toggleTask('${t.id}')">
              ${t.status === 'done' ? '<i class="bi bi-check" style="font-size:14px"></i>' : ''}
            </div>
            <div class="task-info">
              <div class="task-title">${t.title}</div>
              <div class="task-chain">
                ${okrBadge}
                ${initBadge}
                ${sourceBadge}
              </div>
            </div>
            <div class="task-assignee">
              <div class="task-av" style="background:${avColor}">${avChar}</div>
              <span class="task-assignee-name">${t.assignee || 'غير مكلف'}</span>
            </div>
            <div class="task-priority">
              <span class="task-priority-badge priority-${t.priority}">${priorityLabels[t.priority]}</span>
            </div>
            <div class="task-due ${overdue ? 'overdue' : ''}">
              <i class="bi ${overdue ? 'bi-exclamation-triangle' : 'bi-calendar3'}"></i> ${t.due || '—'}
            </div>
            <div class="task-actions">
              <button class="task-btn edit" onclick="openEditModal('${t.id}')"><i class="bi bi-pencil"></i></button>
              <button class="task-btn del" onclick="deleteTask('${t.id}')"><i class="bi bi-trash3"></i></button>
            </div>
          </div>`;
                });
            }
            if (!html) html = '<div style="text-align:center;padding:40px;color:var(--text-muted);font-size:14px;"><i class="bi bi-inbox" style="font-size:32px;display:block;margin-bottom:10px;"></i>لا توجد مهام</div>';
            document.getElementById('taskList').innerHTML = html;
        }

        function renderAll() { renderStats(); renderCoverage(); renderList(); }

        // ── Modal: populate OKR + Initiative dropdowns ──
        function populateDropdowns() {
            const okrs = getOKRs();
            const initiatives = getInitiatives();

            // OKR select
            const okrSelect = document.getElementById('formOKR');
            if (okrSelect) {
                okrSelect.innerHTML = '<option value="">— بدون ربط —</option>' +
                    okrs.map(o => `<option value="${o.id}">${o.objective || o.title}</option>`).join('');
            }

            // Initiative select
            const initSelect = document.getElementById('formInitiative');
            if (initSelect) {
                initSelect.innerHTML = '<option value="">— بدون مبادرة —</option>' +
                    initiatives.map(i => `<option value="${i.name}">${i.name}</option>`).join('');
            }
        }

        function openCreateModal() {
            document.getElementById('modalTitle').innerHTML = '<i class="bi bi-plus-circle"></i> مهمة جديدة';
            document.getElementById('editId').value = '';
            ['formTitle', 'formAssignee', 'formDue'].forEach(id => document.getElementById(id).value = '');
            document.getElementById('formPriority').value = 'MEDIUM';
            document.getElementById('formStatus').value = 'todo';
            if (document.getElementById('formOKR')) document.getElementById('formOKR').value = '';
            if (document.getElementById('formInitiative')) document.getElementById('formInitiative').value = '';
            populateDropdowns();
            new bootstrap.Modal(document.getElementById('taskModal')).show();
        }

        function openEditModal(id) {
            const t = tasks.find(x => x.id === id);
            if (!t) return;
            document.getElementById('modalTitle').innerHTML = '<i class="bi bi-pencil-square"></i> تعديل المهمة';
            document.getElementById('editId').value = t.id;
            document.getElementById('formTitle').value = t.title;
            document.getElementById('formAssignee').value = t.assignee || '';
            document.getElementById('formPriority').value = t.priority;
            document.getElementById('formStatus').value = t.status;
            document.getElementById('formDue').value = t.due || '';
            populateDropdowns();
            if (document.getElementById('formOKR')) document.getElementById('formOKR').value = t.okrId || '';
            if (document.getElementById('formInitiative')) document.getElementById('formInitiative').value = t.initiative || '';
            new bootstrap.Modal(document.getElementById('taskModal')).show();
        }

        function saveTask() {
            const id = document.getElementById('editId').value;
            const okrId = document.getElementById('formOKR')?.value || '';
            const initiative = document.getElementById('formInitiative')?.value || '';
            const okrs = getOKRs();
            const okr = okrId ? okrs.find(o => o.id === okrId) : null;

            const formDeptEl = document.getElementById('formDept');
            const taskDept = currentDept || (formDeptEl ? formDeptEl.value : '');
            const data = {
                title: document.getElementById('formTitle').value.trim(),
                project: initiative || 'بدون مبادرة',
                initiative: initiative,
                objective: okr ? (okr.objective || okr.title) : '',
                okrId: okrId,
                assignee: document.getElementById('formAssignee').value.trim(),
                priority: document.getElementById('formPriority').value,
                status: document.getElementById('formStatus').value,
                due: document.getElementById('formDue').value,
                dept: taskDept,
            };
            if (!data.title) return;
            if (id) {
                const t = tasks.find(x => x.id === id);
                if (t) Object.assign(t, data);
                showToast('تم تحديث المهمة ✓');
            } else {
                tasks.unshift({ id: Date.now().toString(), ...data });
                showToast('تم إنشاء المهمة ✓');
            }
            saveTasks();
            bootstrap.Modal.getInstance(document.getElementById('taskModal')).hide();
            renderAll();
        }

        function deleteTask(id) {
            if (!confirm('حذف المهمة؟')) return;
            tasks = tasks.filter(x => x.id !== id);
            saveTasks();
            renderAll(); showToast('تم الحذف ✓');
        }

        function showToast(msg) {
            const t = document.createElement('div');
            t.className = 'toast-msg';
            t.innerHTML = `<i class="bi bi-check-circle"></i> ${msg}`;
            document.getElementById('toastContainer').appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }

        renderAll();
    </script>
</body>

</html>
