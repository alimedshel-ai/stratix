<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ستارتكس - نقطة التعادل</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #0a0b10;
            --bg2: #12141f;
            --card: #171a2a;
            --text: #e2e8f0;
            --muted: #7a8599;
            --border: rgba(255, 255, 255, 0.06);
            --primary: #667eea;
            --secondary: #764ba2;
            --green: #22c55e;
            --red: #ef4444;
            --yellow: #f59e0b;
            --blue: #38bdf8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        .page-wrapper {
            display: flex;
            min-height: 100vh;
        }

        .main-content {
            flex: 1;
            padding: 0;
            overflow-x: hidden;
        }

        /* Header */
        .be-header {
            padding: 32px 40px 16px;
        }

        .be-back {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--muted);
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 12px;
            transition: color 0.2s;
        }

        .be-back:hover {
            color: var(--primary);
        }

        /* Hero Card */
        .be-hero {
            margin: 0 40px 24px;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.08), rgba(118, 75, 162, 0.08));
            border: 1px solid rgba(102, 126, 234, 0.15);
            border-radius: 24px;
            padding: 40px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .be-hero::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            left: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--secondary), var(--green));
        }

        .be-sector-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 16px;
        }

        .be-main-number {
            font-size: 48px;
            font-weight: 900;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
            line-height: 1.2;
        }

        .be-main-label {
            font-size: 18px;
            color: var(--muted);
            font-weight: 600;
        }

        .be-unit-line {
            font-size: 16px;
            color: var(--text);
            font-weight: 700;
            margin-top: 12px;
            padding: 8px 20px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 12px;
            display: inline-block;
        }

        /* Detail Cards */
        .be-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px;
            padding: 0 40px 24px;
        }

        .be-detail-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
        }

        .be-detail-icon {
            font-size: 28px;
            margin-bottom: 8px;
        }

        .be-detail-value {
            font-size: 22px;
            font-weight: 900;
            margin-bottom: 4px;
        }

        .be-detail-label {
            font-size: 13px;
            color: var(--muted);
        }

        /* Safety Margin Gauge */
        .be-gauge-section {
            padding: 0 40px 24px;
        }

        .be-gauge-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
        }

        .be-gauge-title {
            font-size: 16px;
            font-weight: 800;
            margin-bottom: 16px;
        }

        .be-gauge-bar-container {
            position: relative;
            height: 32px;
            background: linear-gradient(90deg, #ef4444 0%, #f59e0b 40%, #22c55e 70%, #22c55e 100%);
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 12px;
        }

        .be-gauge-marker {
            position: absolute;
            top: -4px;
            width: 4px;
            height: 40px;
            background: white;
            border-radius: 2px;
            box-shadow: 0 0 8px rgba(0, 0, 0, 0.5);
            transition: left 1s ease;
        }

        .be-gauge-labels {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: var(--muted);
        }

        /* Insights */
        .be-insights {
            padding: 0 40px 24px;
        }

        .be-insights-title {
            font-size: 18px;
            font-weight: 800;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .be-insight-card {
            display: flex;
            gap: 14px;
            padding: 16px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            margin-bottom: 10px;
        }

        .be-insight-icon {
            font-size: 28px;
            flex-shrink: 0;
        }

        .be-insight-title {
            font-size: 15px;
            font-weight: 800;
            margin-bottom: 4px;
        }

        .be-insight-desc {
            font-size: 13px;
            color: var(--muted);
            line-height: 1.6;
        }

        .be-insight-action {
            font-size: 12px;
            color: var(--primary);
            font-weight: 700;
            margin-top: 6px;
        }

        /* Actions */
        .be-actions {
            display: flex;
            gap: 12px;
            padding: 0 40px 40px;
            flex-wrap: wrap;
        }

        .be-btn {
            padding: 14px 28px;
            border: none;
            border-radius: 14px;
            font-family: inherit;
            font-size: 15px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }

        .be-btn.primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
        }

        .be-btn.primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(102, 126, 234, 0.4);
        }

        .be-btn.secondary {
            background: rgba(255, 255, 255, 0.05);
            color: var(--muted);
        }

        .be-btn.secondary:hover {
            background: rgba(255, 255, 255, 0.08);
            color: var(--text);
        }

        .be-btn.success {
            background: rgba(34, 197, 94, 0.1);
            color: var(--green);
            border: 1px solid rgba(34, 197, 94, 0.2);
        }

        /* Loading */
        .be-loading {
            text-align: center;
            padding: 80px 40px;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @media(max-width:768px) {
            .be-hero {
                margin: 0 16px 24px;
                padding: 24px;
            }

            .be-main-number {
                font-size: 32px;
            }

            .be-details,
            .be-gauge-section,
            .be-insights,
            .be-actions {
                padding-right: 16px;
                padding-left: 16px;
            }

            .be-details {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>

<body>
    <div class="page-wrapper">
        <div id="sidebar-container"></div>
        <div class="main-content">

            <div class="be-header">
                <a href="/team.html" class="be-back">
                    <i class="bi bi-arrow-right"></i> العودة لإدارة الفريق
                </a>
            </div>

            <!-- Content loaded dynamically -->
            <div id="mainContent">
                <div class="be-loading">
                    <div class="spinner"></div>
                    <div style="color:var(--muted);font-size:15px">جارٍ حساب نقطة التعادل...</div>
                </div>
            </div>

        </div>
    </div>

    <script src="/assets/js/api.js"></script>
    <script src="/assets/js/sidebar.js"></script>
    <script>
        const token = localStorage.getItem('token');
        const entityId = localStorage.getItem('entityId');

        async function init() {
            if (!token || !entityId) {
                showError('يرجى تسجيل الدخول أولاً');
                return;
            }

            const params = new URLSearchParams(location.search);
            const autoCalc = params.get('calc') !== 'false';

            try {
                let data;

                if (autoCalc) {
                    // Calculate fresh
                    const res = await window.apiRequest(`/api/break-even/calculate/${entityId}`, {
                        method: 'POST',
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    data = await res.json();

                    if (!res.ok) {
                        if (data.needsSectorConfig) {
                            showNeedsSector();
                        } else if (data.needsData) {
                            showNeedsData();
                        } else if (data.missingFields) {
                            showMissingFields(data);
                        } else {
                            showError(data.error);
                        }
                        return;
                    }
                } else {
                    // Load last result
                    const res = await window.apiRequest(`/api/break-even/result/${entityId}`, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    data = await res.json();
                    if (!res.ok) {
                        showError(data.error || 'لا توجد نتائج محفوظة');
                        return;
                    }
                }

                renderResults(data);
            } catch (e) {
                showError('خطأ في الاتصال بالخادم');
            }
        }

        function renderResults(data) {
            const r = data.results || data;
            const insights = data.insights || [];
            const sectorName = data.sectorName || r.sectorName || '';
            const sectorIcon = data.sectorIcon || r.sectorIcon || '📊';
            const unitLabel = data.unitLabel || r.unitLabel || 'وحدة';
            const entityName = data.entityName || '';

            const safetyMargin = r.safetyMargin || 0;
            const safetyColor = safetyMargin < 0 ? 'var(--red)' : safetyMargin < 15 ? 'var(--yellow)' : 'var(--green)';
            const gaugePosition = Math.max(0, Math.min(100, (safetyMargin + 20) / 70 * 100));

            const formatNum = (n) => n !== null && n !== undefined
                ? new Intl.NumberFormat('ar-SA').format(Math.round(n))
                : '—';

            document.getElementById('mainContent').innerHTML = `
                <!-- Hero -->
                <div class="be-hero">
                    <div class="be-sector-badge" style="background:rgba(102,126,234,0.1);color:var(--primary);border:1px solid rgba(102,126,234,0.2)">
                        ${sectorIcon} ${sectorName} ${entityName ? '— ' + entityName : ''}
                    </div>
                    <div style="font-size:14px;color:var(--muted);margin-bottom:8px">نقطة التعادل السنوية</div>
                    <div class="be-main-number">${formatNum(r.breakEvenRevenue)} ريال</div>
                    <div class="be-main-label">الحد الأدنى من الإيرادات لتغطية جميع التكاليف</div>
                    ${r.breakEvenUnits ? `
                        <div class="be-unit-line">
                            📦 أو: <strong>${r.breakEvenUnits}</strong> ${unitLabel} سنوياً
                        </div>
                    ` : ''}
                </div>

                <!-- Detail Cards -->
                <div class="be-details">
                    <div class="be-detail-card">
                        <div class="be-detail-icon">🏢</div>
                        <div class="be-detail-value">${formatNum(r.fixedCosts)} <small style="font-size:12px;color:var(--muted)">ريال</small></div>
                        <div class="be-detail-label">المصاريف الثابتة السنوية</div>
                    </div>
                    <div class="be-detail-card">
                        <div class="be-detail-icon">📊</div>
                        <div class="be-detail-value" style="color:${r.contributionMarginPct > 30 ? 'var(--green)' : 'var(--yellow)'}">${r.contributionMarginPct?.toFixed(1) || '—'}%</div>
                        <div class="be-detail-label">هامش المساهمة</div>
                    </div>
                    <div class="be-detail-card">
                        <div class="be-detail-icon">💰</div>
                        <div class="be-detail-value">${formatNum(r.annualRevenue)} <small style="font-size:12px;color:var(--muted)">ريال</small></div>
                        <div class="be-detail-label">الإيرادات المتوقعة</div>
                    </div>
                    <div class="be-detail-card">
                        <div class="be-detail-icon">${safetyMargin < 0 ? '⚠️' : safetyMargin < 15 ? '🟡' : '✅'}</div>
                        <div class="be-detail-value" style="color:${safetyColor}">${safetyMargin?.toFixed(1) || '—'}%</div>
                        <div class="be-detail-label">هامش الأمان</div>
                    </div>
                </div>

                <!-- Safety Margin Gauge -->
                <div class="be-gauge-section">
                    <div class="be-gauge-card">
                        <div class="be-gauge-title">📏 مقياس الصحة المالية</div>
                        <div class="be-gauge-bar-container">
                            <div class="be-gauge-marker" style="left:${gaugePosition}%"></div>
                        </div>
                        <div class="be-gauge-labels">
                            <span>🔴 خسارة</span>
                            <span>🟡 حذر</span>
                            <span>🟢 مستقر</span>
                            <span>⭐ ممتاز</span>
                        </div>
                    </div>
                </div>

                <!-- Insights -->
                ${insights.length > 0 ? `
                <div class="be-insights">
                    <div class="be-insights-title">
                        <i class="bi bi-lightbulb" style="color:var(--yellow)"></i>
                        التوصيات والتحليلات
                    </div>
                    ${insights.map(ins => `
                        <div class="be-insight-card" style="border-color:${ins.type === 'CRITICAL' ? 'rgba(239,68,68,0.2)' : ins.type === 'WARNING' ? 'rgba(245,158,11,0.2)' : 'var(--border)'}">
                            <div class="be-insight-icon">${ins.icon}</div>
                            <div>
                                <div class="be-insight-title">${ins.title}</div>
                                <div class="be-insight-desc">${ins.description}</div>
                                ${ins.action ? `<div class="be-insight-action">💡 ${ins.action}</div>` : ''}
                            </div>
                        </div>
                    `).join('')}
                </div>
                ` : ''}

                <!-- Actions -->
                <div class="be-actions">
                    <a href="/ceo-dashboard.html" class="be-btn primary">
                        <i class="bi bi-speedometer2"></i> لوحة التحكم
                    </a>
                    <a href="/dept-questionnaire.html?dept=FINANCE&role=CFO" class="be-btn secondary">
                        <i class="bi bi-pencil-square"></i> تعديل البيانات
                    </a>
                    <a href="/team.html" class="be-btn success">
                        <i class="bi bi-people"></i> دعوة الفريق
                    </a>
                </div>
            `;
        }

        function showNeedsSector() {
            document.getElementById('mainContent').innerHTML = `
                <div style="text-align:center;padding:60px 40px">
                    <div style="font-size:64px;margin-bottom:16px">🏭</div>
                    <h2 style="margin-bottom:12px">اختر القطاع أولاً</h2>
                    <p style="color:var(--muted);margin-bottom:24px">لحساب نقطة التعادل، نحتاج معرفة قطاع شركتك لاستخدام المعادلات المناسبة</p>
                    <a href="/onboarding.html" class="be-btn primary" style="text-decoration:none">
                        <i class="bi bi-gear"></i> إعداد القطاع
                    </a>
                </div>
            `;
        }

        function showNeedsData() {
            document.getElementById('mainContent').innerHTML = `
                <div style="text-align:center;padding:60px 40px">
                    <div style="font-size:64px;margin-bottom:16px">📝</div>
                    <h2 style="margin-bottom:12px">أكمل البيانات المالية</h2>
                    <p style="color:var(--muted);margin-bottom:24px">المدير المالي (CFO) لم يملأ الاستبيان بعد. أكمل البيانات لحساب نقطة التعادل</p>
                    <a href="/dept-questionnaire.html?dept=FINANCE&role=CFO" class="be-btn primary" style="text-decoration:none">
                        <i class="bi bi-pencil-square"></i> ملء الاستبيان المالي
                    </a>
                </div>
            `;
        }

        function showMissingFields(data) {
            document.getElementById('mainContent').innerHTML = `
                <div style="text-align:center;padding:60px 40px">
                    <div style="font-size:64px;margin-bottom:16px">⚠️</div>
                    <h2 style="margin-bottom:12px">بيانات ناقصة</h2>
                    <p style="color:var(--muted);margin-bottom:12px">${data.missingFields.length} حقل مطلوب لم يُملأ بعد</p>
                    <div style="background:var(--card);border-radius:12px;padding:16px;max-width:400px;margin:0 auto 24px;text-align:right">
                        <div style="font-size:12px;color:var(--muted);margin-bottom:8px">الإكمال الحالي: ${data.completion}%</div>
                        <div style="height:6px;background:var(--border);border-radius:6px;overflow:hidden">
                            <div style="height:100%;width:${data.completion}%;background:linear-gradient(90deg,var(--primary),var(--secondary));border-radius:6px"></div>
                        </div>
                    </div>
                    <a href="/dept-questionnaire.html?dept=FINANCE&role=CFO" class="be-btn primary" style="text-decoration:none">
                        <i class="bi bi-pencil-square"></i> إكمال البيانات الناقصة
                    </a>
                </div>
            `;
        }

        function showError(msg) {
            document.getElementById('mainContent').innerHTML = `
                <div style="text-align:center;padding:60px 40px">
                    <div style="font-size:64px;margin-bottom:16px">❌</div>
                    <h2 style="margin-bottom:12px">${msg}</h2>
                    <a href="/ceo-dashboard.html" class="be-btn secondary" style="text-decoration:none">
                        <i class="bi bi-arrow-right"></i> العودة للوحة التحكم
                    </a>
                </div>
            `;
        }

        init();
    </script>
    <script src="/assets/js/path-tracker.js"></script>
</body>

</html>
