<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ستارتكس - التقارير التلقائية</title>
    <meta name="description" content="توليد تقارير استراتيجية تلقائية جاهزة للطباعة">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #0a0b10;
            --bg2: #12141f;
            --card: #171a2a;
            --card-hover: #1e2236;
            --text: #e2e8f0;
            --muted: #7a8599;
            --border: rgba(255, 255, 255, 0.06);
            --primary: #667eea;
            --secondary: #764ba2;
            --green: #22c55e;
            --yellow: #facc15;
            --red: #ef4444;
            --blue: #38bdf8;
            --purple: #a78bfa;
            --orange: #f97316
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        body {
            background: var(--bg);
            font-family: 'Tajawal', sans-serif;
            color: var(--text);
            min-height: 100vh
        }

        .page-wrapper {
            display: flex;
            min-height: 100vh
        }

        .main-content {
            flex: 1;
            min-width: 0;
            padding: 28px 32px
        }

        .rpt-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 28px
        }

        .rpt-title {
            font-size: 28px;
            font-weight: 900
        }

        .rpt-title span {
            background: linear-gradient(135deg, var(--purple), #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent
        }

        /* Report Templates */
        .rpt-templates {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
            margin-bottom: 28px
        }

        .rpt-tmpl {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 22px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden
        }

        .rpt-tmpl:hover {
            transform: translateY(-3px);
            border-color: rgba(255, 255, 255, 0.12);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3)
        }

        .rpt-tmpl.active {
            border-color: var(--primary);
            box-shadow: 0 0 0 1px var(--primary), 0 8px 30px rgba(102, 126, 234, 0.15)
        }

        .rpt-tmpl::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            border-radius: 16px 16px 0 0
        }

        .rpt-tmpl-icon {
            font-size: 32px;
            margin-bottom: 10px;
            display: block
        }

        .rpt-tmpl h3 {
            font-size: 16px;
            font-weight: 800;
            margin-bottom: 4px
        }

        .rpt-tmpl p {
            font-size: 12px;
            color: var(--muted);
            line-height: 1.6
        }

        .rpt-tmpl-badge {
            position: absolute;
            top: 14px;
            left: 14px;
            padding: 3px 10px;
            border-radius: 8px;
            font-size: 10px;
            font-weight: 700
        }

        .rpt-tmpl-sections {
            margin-top: 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 4px
        }

        .rpt-tmpl-sec {
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 10px;
            background: rgba(255, 255, 255, 0.04);
            color: var(--muted)
        }

        /* Generate button */
        .rpt-generate {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-bottom: 28px
        }

        .rpt-gen-btn {
            padding: 12px 32px;
            border-radius: 14px;
            border: none;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            font-family: inherit;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px
        }

        .rpt-gen-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.4)
        }

        .rpt-gen-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none
        }

        .rpt-gen-btn.generating {
            animation: pulse 1.5s infinite
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: 0.7
            }
        }

        .rpt-period {
            padding: 10px 16px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--card);
            color: var(--text);
            font-family: inherit;
            font-size: 13px;
            cursor: pointer
        }

        /* Report Preview */
        .rpt-preview {
            display: none;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            overflow: hidden
        }

        .rpt-preview.show {
            display: block;
            animation: fadeUp 0.5s ease
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .rpt-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 20px;
            background: rgba(255, 255, 255, 0.02);
            border-bottom: 1px solid var(--border)
        }

        .rpt-toolbar-title {
            font-size: 14px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px
        }

        .rpt-toolbar-actions {
            display: flex;
            gap: 8px
        }

        .rpt-tool-btn {
            padding: 7px 14px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text);
            font-family: inherit;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px
        }

        .rpt-tool-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.12)
        }

        .rpt-tool-btn.primary {
            background: rgba(102, 126, 234, 0.1);
            border-color: var(--primary);
            color: var(--primary)
        }

        /* Report document */
        .rpt-doc {
            padding: 40px;
            max-width: 900px;
            margin: 0 auto
        }

        .rpt-doc-header {
            text-align: center;
            padding-bottom: 24px;
            border-bottom: 2px solid var(--border);
            margin-bottom: 28px
        }

        .rpt-doc-logo {
            font-size: 28px;
            font-weight: 900;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 8px
        }

        .rpt-doc-logo span {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent
        }

        .rpt-doc-subtitle {
            font-size: 14px;
            color: var(--muted)
        }

        .rpt-doc-date {
            font-size: 12px;
            color: var(--muted);
            margin-top: 6px
        }

        .rpt-section {
            margin-bottom: 28px
        }

        .rpt-section-title {
            font-size: 18px;
            font-weight: 800;
            margin-bottom: 14px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 8px
        }

        .rpt-kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
            gap: 12px
        }

        .rpt-kpi {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            text-align: center
        }

        .rpt-kpi-val {
            font-size: 28px;
            font-weight: 900
        }

        .rpt-kpi-label {
            font-size: 12px;
            color: var(--muted);
            margin-top: 4px
        }

        .rpt-kpi-change {
            font-size: 11px;
            margin-top: 4px;
            font-weight: 700
        }

        .rpt-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px
        }

        .rpt-table th {
            text-align: right;
            padding: 10px 12px;
            background: rgba(255, 255, 255, 0.03);
            border-bottom: 1px solid var(--border);
            font-weight: 700;
            color: var(--muted);
            font-size: 12px
        }

        .rpt-table td {
            padding: 10px 12px;
            border-bottom: 1px solid var(--border)
        }

        .rpt-table tr:hover td {
            background: rgba(255, 255, 255, 0.02)
        }

        .rpt-progress {
            width: 80px;
            height: 6px;
            border-radius: 3px;
            background: rgba(255, 255, 255, 0.06);
            overflow: hidden;
            display: inline-block;
            vertical-align: middle;
            margin-right: 6px
        }

        .rpt-progress-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.5s
        }

        .rpt-chart {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px
        }

        .rpt-bar-chart {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            height: 160px;
            padding-top: 10px
        }

        .rpt-bar {
            flex: 1;
            border-radius: 6px 6px 0 0;
            position: relative;
            transition: height 0.5s;
            min-width: 0
        }

        .rpt-bar-label {
            position: absolute;
            bottom: -22px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 9px;
            color: var(--muted);
            white-space: nowrap
        }

        .rpt-bar-val {
            position: absolute;
            top: -18px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 10px;
            font-weight: 700
        }

        .rpt-rec {
            display: flex;
            gap: 10px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 10px;
            margin-bottom: 8px;
            border-right: 3px solid var(--primary)
        }

        .rpt-rec-icon {
            font-size: 18px;
            flex-shrink: 0
        }

        .rpt-rec-text {
            font-size: 13px;
            line-height: 1.7
        }

        .rpt-rec-priority {
            font-size: 10px;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 6px;
            align-self: flex-start;
            flex-shrink: 0
        }

        .rpt-summary-box {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.08), rgba(118, 75, 162, 0.08));
            border: 1px solid rgba(102, 126, 234, 0.15);
            border-radius: 14px;
            padding: 20px;
            font-size: 14px;
            line-height: 2
        }

        @media print {
            body {
                background: white !important;
                color: #222 !important
            }

            .rpt-toolbar,
            .rpt-header,
            .rpt-templates,
            .rpt-generate,
            .page-wrapper>*:not(.main-content) {
                display: none !important
            }

            .main-content {
                margin: 0 !important;
                padding: 0 !important
            }

            .rpt-preview {
                display: block !important;
                border: none !important;
                background: white !important
            }

            .rpt-doc {
                padding: 20px;
                color: #222
            }

            .rpt-kpi,
            .rpt-table th,
            .rpt-chart,
            .rpt-rec {
                border-color: #ddd
            }

            .rpt-kpi-val,
            .rpt-section-title {
                color: #222 !important
            }

            .rpt-summary-box {
                background: #f8f9fa !important;
                border-color: #ddd !important;
                color: #222 !important
            }
        }

        @media(max-width:768px) {
            .main-content {
                padding: 16px
            }

            .rpt-doc {
                padding: 20px
            }
        }
    </style>
</head>

<body>
    <div class="page-wrapper">
        <div id="sidebar-container"></div>
        <div class="main-content">
            <div class="rpt-header">
                <div>
                    <h1 class="rpt-title"><i class="bi bi-file-earmark-bar-graph"></i> التقارير <span>التلقائية</span>
                    </h1>
                    <div style="font-size:13px;color:var(--muted);margin-top:4px">توليد تقارير استراتيجية شاملة بضغطة
                        واحدة</div>
                </div>
            </div>

            <!-- Templates -->
            <div class="rpt-templates" id="templates"></div>

            <!-- Generate -->
            <div class="rpt-generate">
                <select class="rpt-period" id="reportPeriod">
                    <option value="Q1">الربع الأول 2026</option>
                    <option value="Q4" selected>الربع الرابع 2025</option>
                    <option value="H2">النصف الثاني 2025</option>
                    <option value="2025">سنوي 2025</option>
                </select>
                <button class="rpt-gen-btn" id="generateBtn" onclick="generateReport()">
                    <i class="bi bi-magic"></i> توليد التقرير
                </button>
            </div>

            <!-- Preview -->
            <div class="rpt-preview" id="reportPreview">
                <div class="rpt-toolbar">
                    <div class="rpt-toolbar-title"><i class="bi bi-file-earmark-check"></i> <span
                            id="previewTitle">التقرير</span></div>
                    <div class="rpt-toolbar-actions">
                        <button class="rpt-tool-btn" onclick="window.print()"><i class="bi bi-printer"></i>
                            طباعة</button>
                        <button class="rpt-tool-btn primary" id="downloadPdfBtn" onclick="downloadPDF()"><i
                                class="bi bi-download"></i> تحميل PDF</button>
                    </div>
                </div>
                <div class="rpt-doc" id="reportDoc"></div>
            </div>
        </div>
    </div>

    <script src="/assets/js/api.js"></script>
    <script src="/assets/js/sidebar.js"></script>
    <script src="/assets/js/ai-advisor.js"></script>
    <script src="/js/data-layer.js"></script>
    <script src="/assets/js/achievements.js"></script>
    <script src="/assets/js/notifications.js"></script>
    <!-- Toast Notification -->
    <div id="toastArea"
        style="position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none">
    </div>
    <script>
        // === Toast System ===
        function showToast(msg, type = 'info', duration = 4000) {
            const area = document.getElementById('toastArea');
            if (!area) return;
            const colors = { success: '#22c55e', error: '#ef4444', warning: '#f59e0b', info: '#667eea' };
            const icons = { success: 'check-circle', error: 'x-circle', warning: 'exclamation-triangle', info: 'info-circle' };
            const t = document.createElement('div');
            t.style.cssText = `pointer-events:auto;display:flex;align-items:center;gap:10px;padding:12px 20px;border-radius:14px;background:#1e293b;border:1px solid ${colors[type]}40;color:#e2e8f0;font-size:13px;font-weight:600;box-shadow:0 8px 30px rgba(0,0,0,0.3);animation:fadeUp 0.3s ease;font-family:inherit;max-width:480px`;
            t.innerHTML = `<i class="bi bi-${icons[type]}" style="color:${colors[type]};font-size:16px"></i> <span>${msg}</span>`;
            area.appendChild(t);
            setTimeout(() => { t.style.opacity = '0'; t.style.transition = 'opacity 0.3s'; setTimeout(() => t.remove(), 300); }, duration);
        }

        // === XSS Prevention ===
        function esc(str) {
            if (str == null) return '';
            const d = document.createElement('div');
            d.textContent = String(str);
            return d.innerHTML;
        }

        // === Report Templates ===
        const templates = [
            { id: 'strategic', icon: '🎯', title: 'التقرير الاستراتيجي الشامل', desc: 'نظرة شاملة على أداء الأهداف والمبادرات والمخاطر', color: '#667eea', sections: ['ملخص تنفيذي', 'مؤشرات رئيسية', 'أداء الأهداف', 'المبادرات', 'المخاطر', 'التوصيات'], badge: 'الأكثر طلباً', badgeColor: '#22c55e' },
            { id: 'kpi', icon: '📊', title: 'تقرير مؤشرات الأداء', desc: 'تحليل مفصل لأداء مؤشرات القياس الرئيسية مع التوجهات', color: '#22c55e', sections: ['ملخص الأداء', 'مؤشرات متقدمة', 'مؤشرات متأخرة', 'رسوم بيانية', 'تحليل الفجوات'] },
            { id: 'initiative', icon: '🚀', title: 'تقرير المبادرات والمشاريع', desc: 'حالة المبادرات الجارية مع نسب الإنجاز والتأخيرات', color: '#f97316', sections: ['نظرة عامة', 'جدول المبادرات', 'المراحل', 'الميزانية', 'المخاطر'] },
            { id: 'risk', icon: '⚠️', title: 'تقرير المخاطر', desc: 'تحليل المخاطر الاستراتيجية واحتمالات التأثير', color: '#ef4444', sections: ['خريطة الحرارة', 'أعلى المخاطر', 'خطط المعالجة', 'مؤشرات إنذار'] },
            { id: 'team', icon: '👥', title: 'تقرير أداء الفريق', desc: 'تحليل إنتاجية الفريق والمهام والمشاركة', color: '#8b5cf6', sections: ['ملخص الفريق', 'إنجاز المهام', 'المشاركة', 'الأكثر نشاطاً'] },
            { id: 'executive', icon: '👔', title: 'الملخص التنفيذي', desc: 'ملخص موجز للإدارة العليا — صفحة واحدة', color: '#facc15', sections: ['الصحة العامة', 'أبرز الإنجازات', 'أبرز التحديات', 'القرارات المطلوبة'], badge: 'صفحة واحدة', badgeColor: '#facc15' },
            { id: 'seven_s', icon: '🏢', title: 'تقييم ماكينزي 7S', desc: 'تقييم شامل للعناصر السبعة الصلبة والمرنة مع تحليل التوافق والفجوات', color: '#06b6d4', sections: ['العناصر الصلبة', 'العناصر المرنة', 'مصفوفة التوافق', 'تحليل الفجوات', 'خطة التصحيح'], badge: 'أكاديمي', badgeColor: '#06b6d4' },
        ];

        let selectedTemplate = 'strategic';

        // Render templates
        function renderTemplates() {
            document.getElementById('templates').innerHTML = templates.map(t => `
        <div class="rpt-tmpl ${t.id === selectedTemplate ? 'active' : ''}" onclick="selectTemplate('${t.id}')" style="--tmpl-color:${t.color}">
          <div style="position:absolute;top:0;left:0;right:0;height:3px;background:${t.color}"></div>
          ${t.badge ? `<div class="rpt-tmpl-badge" style="background:${t.badgeColor}15;color:${t.badgeColor}">${t.badge}</div>` : ''}
          <span class="rpt-tmpl-icon">${t.icon}</span>
          <h3>${t.title}</h3>
          <p>${t.desc}</p>
          <div class="rpt-tmpl-sections">${t.sections.map(s => `<span class="rpt-tmpl-sec">${s}</span>`).join('')}</div>
        </div>
      `).join('');
        }

        function selectTemplate(id) {
            selectedTemplate = id;
            renderTemplates();
        }

        // === API Data ===
        let reportData = null;
        const token = localStorage.getItem('token');

        // === Generate Report ===
        async function generateReport() {
            const btn = document.getElementById('generateBtn');
            btn.disabled = true;
            btn.classList.add('generating');
            btn.innerHTML = '<i class="bi bi-hourglass-split"></i> جاري التوليد...';

            // Fetch real data from API
            try {
                if (token) {
                    const res = await window.apiRequest('/api/dashboard/report-data', {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    if (res.ok) {
                        reportData = await res.json();
                    }
                }
            } catch (e) {
                console.warn('Could not fetch report data, using mock:', e);
                showToast('تعذّر جلب البيانات الحقيقية — يتم عرض بيانات تجريبية', 'warning', 5000);
            }

            const tmpl = templates.find(t => t.id === selectedTemplate);
            const period = document.getElementById('reportPeriod');
            const periodText = period.options[period.selectedIndex].text;

            document.getElementById('previewTitle').textContent = `${tmpl.title} — ${periodText}`;
            document.getElementById('reportDoc').innerHTML = generateReportHTML(tmpl, periodText);
            document.getElementById('reportPreview').classList.add('show');

            btn.disabled = false;
            btn.classList.remove('generating');
            btn.innerHTML = '<i class="bi bi-magic"></i> توليد التقرير';

            document.getElementById('reportPreview').scrollIntoView({ behavior: 'smooth', block: 'start' });

            // Animate numbers
            setTimeout(() => {
                document.querySelectorAll('.rpt-kpi-val[data-target]').forEach(el => {
                    animateNum(el, parseInt(el.dataset.target));
                });
            }, 300);
        }

        // Helper: is real data available?
        function hasRealData() { return reportData && reportData.hasData; }

        function generateReportHTML(tmpl, period) {
            const today = new Date();
            const dateStr = `${today.getDate()}/${today.getMonth() + 1}/${today.getFullYear()}`;
            const entityName = hasRealData() ? esc(reportData.entity.displayName || reportData.entity.legalName) : 'ستارتكس';

            const reports = {
                strategic: strategicReport,
                kpi: kpiReport,
                initiative: initiativeReport,
                risk: riskReport,
                team: teamReport,
                executive: executiveReport,
                seven_s: sevenSReport,
            };

            return `
        <div class="rpt-doc-header">
          <div class="rpt-doc-logo">${tmpl.icon} <span>${entityName}</span></div>

        // === Report Content Generators ===

            const d = reportData;

                    objRow('تطوير الكوادر القيادية', 'تعلم ونمو', 70, 'على المسار');
            }

            // Recommendations
            let recsHtml = '';
            if (hasRealData()) {
                const recs = [];
                if (d.iniSummary.overdue > 0) recs.push(recItem('🔴', `يوجد ${d.iniSummary.overdue} مبادرة متأخرة عن الموعد المحدد — مطلوب تسريع التنفيذ`, 'عاجل', 'var(--red)'));
                if (d.kpiSummary.critical > 0) recs.push(recItem('🔴', `${d.kpiSummary.critical} مؤشرات أداء في المنطقة الحرجة — مراجعة فورية مطلوبة`, 'عاجل', 'var(--red)'));
                if (d.kpiSummary.warning > 0) recs.push(recItem('🟡', `${d.kpiSummary.warning} مؤشرات في منطقة التحذير — يُنصح بمتابعة دقيقة`, 'مهم', 'var(--yellow)'));
                if (d.kpiSummary.onTrack > 0) recs.push(recItem('🟢', `${d.kpiSummary.onTrack} مؤشرات أداء محققة للمستهدف — أداء ممتاز`, 'إيجابي', 'var(--green)'));
                if (d.riskSummary.critical > 0) recs.push(recItem('🔴', `${d.riskSummary.critical} مخاطر حرجة تحتاج معالجة فورية`, 'حرج', 'var(--red)'));
                if (recs.length === 0) recs.push(recItem('🟢', 'لا توجد مشكلات حرجة حالياً — استمر في المتابعة الدورية', 'جيد', 'var(--green)'));
                recsHtml = recs.join('');
            } else {
                recsHtml = recItem('🔴', 'تسريع مبادرة التحول الرقمي — التأخير يؤثر على 3 أهداف أخرى', 'عاجل', 'var(--red)') +
                    recItem('🟡', 'تعزيز فريق الكفاءة التشغيلية بـ 2 محللين إضافيين', 'مهم', 'var(--yellow)') +
                    recItem('🟢', 'استثمار نجاح رضا العملاء في برنامج إحالة جديد', 'فرصة', 'var(--green)');
            }

            // Summary text
            const summaryText = hasRealData()
                ? `حققت المنظمة نسبة صحة استراتيجية <strong>${health}%</strong>. يوجد <strong>${d.kpiSummary.total}</strong> مؤشر أداء — منها <strong style="color:var(--green)">${d.kpiSummary.onTrack}</strong> محقق و<strong style="color:var(--red)">${d.kpiSummary.critical}</strong> في المنطقة الحرجة. تم إكمال <strong>${d.iniSummary.completed}</strong> من <strong>${d.iniSummary.total}</strong> مبادرة.${d.riskSummary.total > 0 ? ` يوجد <strong>${d.riskSummary.total}</strong> خطر مسجل — ${d.riskSummary.mitigated} تمت معالجتها.` : ''}`
                : `حققت المنظمة أداءً <strong style="color:var(--green)">جيداً</strong> خلال الفترة بنسبة إنجاز إجمالية بلغت <strong>73%</strong>. تم إكمال <strong>5 من 8</strong> مبادرات رئيسية بنجاح. مؤشرات رضا العملاء أظهرت تحسناً ملحوظاً.`;

        <div class="rpt-section">
          <div class="rpt-section-title"><i class="bi bi-bullseye" style="color:var(--primary)"></i> أداء الأهداف الاستراتيجية</div>

        <div class="rpt-section">

        <div class="rpt-section">

          ${health < 70 ? recItem('🔍', '<a href="/swot.html" style="color:var(--primary);font-weight:700">إعادة تقييم SWOT</a> — الصحة الاستراتيجية أقل من 70%. راجع نقاط القوة والضعف الحالية', 'مقترح', 'var(--primary)') : ''}
          ${(hasRealData() && reportData.riskSummary.critical > 2) ? recItem('⚠️', '<a href="/risk-map.html" style="color:var(--primary);font-weight:700">خريطة المخاطر</a> — يوجد مخاطر حرجة متعددة. راجع خطط المعالجة وحدّثها', 'مقترح', 'var(--red)') : ''}
          ${(health < 60 || objProg < 50) ? recItem('🔄', '<a href="/select-type?from=new-cycle" style="color:var(--primary);font-weight:700">ابدأ دورة استراتيجية جديدة</a> — الأداء يستدعي إعادة تشخيص شاملة وتحديث الخطة', 'مقترح', 'var(--primary)') : ''}
          ${(health >= 70 && objProg >= 60 && iniProg >= 60) ? recItem('🟢', '<a href="/reviews.html" style="color:var(--green);font-weight:700">المراجعة الدورية</a> — الأداء جيد. جدوِل مراجعة ربعية لضمان الاستمرارية', 'جيد', 'var(--green)') : ''}
        </div>
      `;
        }

        function kpiReport() {
            let kpiRowsAbove = '', kpiRowsBelow = '';
            let totalKpis = 0, aboveTarget = 0, belowTarget = 0, noData = 0;

            if (hasRealData() && reportData.kpis.length > 0) {
                totalKpis = reportData.kpis.length;
                reportData.kpis.forEach(k => {
                    if (!k.actual || !k.target) { noData++; return; }
                    const pct = k.pct;
                    if (pct >= 100) {
                        aboveTarget++;
                        kpiRowsAbove += kpiRow(esc(k.name), `${esc(k.actual)}${esc(k.unit) || ''}`, `${esc(k.target)}${esc(k.unit) || ''}`, pct);
                    } else {
                        belowTarget++;
                        kpiRowsBelow += kpiRow(esc(k.name), `${esc(k.actual)}${esc(k.unit) || ''}`, `${esc(k.target)}${esc(k.unit) || ''}`, pct);
                    }
                });
            } else {
                totalKpis = 24; aboveTarget = 14; belowTarget = 7; noData = 3;
                kpiRowsAbove = kpiRow('الإيرادات الشهرية', '1.2M', '1M', 120) + kpiRow('رضا العملاء NPS', '82', '75', 109) + kpiRow('معدل الاحتفاظ بالعملاء', '94%', '90%', 104);
                kpiRowsBelow = kpiRow('دوران الموظفين', '18%', '12%', 67) + kpiRow('وقت الاستجابة', '48 ساعة', '24 ساعة', 50) + kpiRow('كفاءة العمليات', '62%', '80%', 78);

      `;

        function initiativeReport() {
            let iniRows = '';

                total = reportData.iniSummary.total;

                inProgress = reportData.iniSummary.inProgress;
                overdue = reportData.iniSummary.overdue;
                iniRows = reportData.initiatives.map(i => {
                    const statusAr = i.status === 'COMPLETED' ? 'مكتمل' : i.status === 'IN_PROGRESS' ? 'جارية' : 'مخطط';

                }).join('');

                total = 8; completed = 3; inProgress = 4; overdue = 1;

                    initRow('التحول الرقمي', 'سارة', 55, '78%', 'متأخر') +
                    initRow('تدريب القيادات', 'محمد', 72, '85%', 'جارية') +
                    initRow('تسويق رقمي', 'نورة', 95, '98%', 'مكتمل');

            return `

        function riskReport() {
            let riskItems = '';
            let total = 0, critical = 0, medium = 0, low = 0, mitigated = 0;

            if (hasRealData() && reportData.risks.length > 0) {
                total = reportData.riskSummary.total;
                critical = reportData.riskSummary.critical + reportData.riskSummary.high;
                medium = reportData.riskSummary.medium;
                low = reportData.riskSummary.low;
                mitigated = reportData.riskSummary.mitigated;
                riskItems = reportData.risks.map(r => {
                    const icon = r.score >= 15 ? '🔴' : r.score >= 8 ? '🟡' : '🟢';
                    const priority = r.score >= 15 ? 'حرج' : r.score >= 8 ? 'متوسط' : 'منخفض';
                    const color = r.score >= 15 ? 'var(--red)' : r.score >= 8 ? 'var(--yellow)' : 'var(--green)';
                    return recItem(icon, `${esc(r.name)}${r.mitigation ? ' — خطة المعالجة: ' + esc(r.mitigation.substring(0, 80)) : ''}. درجة الخطورة: ${r.score}`, priority, color);
                }).join('');
            } else {
                total = 12; critical = 3; medium = 5; low = 4; mitigated = 4;
                riskItems = recItem('🔴', 'تأخر مشروع التحول الرقمي. احتمال: 80% | تأثير: عالٍ', 'حرج', 'var(--red)') +

                const achs = [];

                if (chals.length === 0) chals.push('🟢 لا توجد تحديات حرجة حالياً');
                challenges = chals.join('<br>');

                const decs = [];

            }

            return `

            <div style="font-size:13px;line-height:2;color:var(--muted)">${achievements}</div>

          ${decisions}
        </div>
      `;
        }

        // === McKinsey 7S Assessment Report ===
        function sevenSReport() {
            // ─── بيانات العناصر السبعة ────────────────────────────────────
            // يسحب البيانات من أدوات ستارتكس الموزعة
            const d = reportData;
            const health = hasRealData() ? d.healthScore : 72;

            // العناصر الصلبة (Hard S) — Strategy, Structure, Systems
            const hardElements = [
                {
                    key: 'strategy', nameAr: 'الاستراتيجية', nameEn: 'Strategy',
                    icon: '🎯', color: '#667eea',
                    source: 'directions.html + الأهداف',
                    score: hasRealData() ? Math.min(100, Math.round(d.overallProgress * 1.2)) : 68,
                    desc: hasRealData() && d.objectives.length > 0
                        ? `${d.objectives.length} أهداف استراتيجية محددة — نسبة الإنجاز ${d.overallProgress}%`
                        : 'الرؤية والأهداف الاستراتيجية — كيف نتنافس وننمو',
                    findings: hasRealData()
                        ? [`${d.objectives.length} أهداف استراتيجية مسجلة`, `معدل الإنجاز: ${d.overallProgress}%`, d.overallProgress >= 60 ? 'الأهداف تسير بشكل جيد' : 'تأخر في تحقيق بعض الأهداف']
                        : ['استراتيجية واضحة مع 5 أهداف', 'ربط ضعيف بين الأهداف والمبادرات', 'يحتاج مراجعة ربع سنوية'],
                },
                {
                    key: 'structure', nameAr: 'الهيكل التنظيمي', nameEn: 'Structure',
                    icon: '🏗️', color: '#f97316',
                    source: 'entity settings + departments',
                    score: hasRealData() ? 55 : 52,
                    desc: 'الهيكل التنظيمي وتوزيع المسؤوليات بين الإدارات',
                    findings: hasRealData()
                        ? ['الهيكل محدد في النظام', 'قد يحتاج مراجعة للتوافق مع الاستراتيجية الجديدة', 'تداخل محتمل في الصلاحيات']
                        : ['هيكل هرمي تقليدي', 'تداخل صلاحيات بين الإدارات', 'يحتاج إعادة تصميم مبني على العمليات'],
                },
                {
                    key: 'systems', nameAr: 'الأنظمة والعمليات', nameEn: 'Systems',
                    icon: '⚙️', color: '#22c55e',
                    source: 'dept-deep.html (OPS + IT)',
                    score: hasRealData() ? Math.round(health * 0.85) : 61,
                    desc: 'أنظمة العمل والإجراءات والتقنيات المستخدمة',
                    findings: hasRealData()
                        ? [`درجة صحة الأنظمة: ${Math.round(health * 0.85)}/100`, 'تغطية رقمية جزئية', 'يحتاج أتمتة أكثر']
                        : ['أنظمة ERP أساسية موجودة', 'ضعف في الأتمتة (40% يدوي)', 'لا يوجد نظام إدارة معرفة'],
                },
            ];

            // العناصر المرنة (Soft S) — Shared Values, Style, Staff, Skills
            const softElements = [
                {
                    key: 'shared_values', nameAr: 'القيم المشتركة', nameEn: 'Shared Values',
                    icon: '💎', color: '#ec4899',
                    source: 'org-dna.html',
                    score: hasRealData() ? Math.round(health * 0.9) : 70,
                    desc: 'القيم الجوهرية والثقافة المؤسسية',
                    findings: hasRealData()
                        ? ['قيم مؤسسية محددة', `مستوى التوافق: ${Math.round(health * 0.9)}%`, 'يحتاج تعزيز عبر برامج داخلية']
                        : ['قيم واضحة لكن غير مُفعّلة بالكامل', 'فجوة بين القيم المعلنة والسلوك اليومي', 'يحتاج برنامج تعزيز ثقافي'],
                },
                {
                    key: 'style', nameAr: 'أسلوب القيادة', nameEn: 'Style',
                    icon: '👑', color: '#8b5cf6',
                    source: 'org-dna.html + assessments',
                    score: hasRealData() ? Math.round(health * 0.88) : 65,
                    desc: 'نمط القيادة وصنع القرار في المنظمة',
                    findings: hasRealData()
                        ? ['أسلوب قيادة محدد', 'يحتاج تقييم مدى فعاليته', 'مراجعة آليات صنع القرار']
                        : ['قيادة مركزية — بطء في القرارات', 'ضعف التفويض للإدارة الوسطى', 'يحتاج نقل تدريجي للصلاحيات'],
                },
                {
                    key: 'staff', nameAr: 'الموظفون', nameEn: 'Staff',
                    icon: '👥', color: '#06b6d4',
                    source: 'dept-deep.html (HR)',
                    score: hasRealData() ? Math.round(health * 0.82) : 58,
                    desc: 'القوى العاملة — التوظيف والتطوير والاحتفاظ',
                    findings: hasRealData()
                        ? [`تقييم الموارد البشرية: ${Math.round(health * 0.82)}/100`, 'برامج تطوير محدودة', 'يحتاج خطة احتفاظ بالكفاءات']
                        : ['26 موظف — حجم مناسب', 'دوران وظيفي 14% (مقبول)', 'لا يوجد مسار وظيفي واضح'],
                },
                {
                    key: 'skills', nameAr: 'المهارات', nameEn: 'Skills',
                    icon: '🎓', color: '#eab308',
                    source: 'dept-deep.html + assessments',
                    score: hasRealData() ? Math.round(health * 0.78) : 55,
                    desc: 'الكفاءات والقدرات التنظيمية الأساسية',
                    findings: hasRealData()
                        ? [`مستوى المهارات: ${Math.round(health * 0.78)}/100`, 'فجوة في المهارات الرقمية', 'يحتاج برنامج تدريب مكثف']
                        : ['كفاءات تقنية جيدة', 'فجوة في مهارات تحليل البيانات', 'يحتاج برنامج upskilling مكثف'],
                },
            ];

            const allElements = [...hardElements, ...softElements];
            const avgScore = Math.round(allElements.reduce((s, e) => s + e.score, 0) / allElements.length);
            const avgHard = Math.round(hardElements.reduce((s, e) => s + e.score, 0) / hardElements.length);
            const avgSoft = Math.round(softElements.reduce((s, e) => s + e.score, 0) / softElements.length);

            // Color by score
            function scoreColor(s) {
                if (s >= 75) return 'var(--green)';
                if (s >= 55) return 'var(--yellow)';
                return 'var(--red)';
            }
            function scoreLabel(s) {
                if (s >= 80) return 'ممتاز';
                if (s >= 65) return 'جيد';
                if (s >= 50) return 'مقبول';
                return 'ضعيف';
            }

            // ─── بناء التقرير ───────────────────────────────────────────────
            // 1. الملخص التنفيذي
            const overallLevel = avgScore >= 75 ? 'جيد' : avgScore >= 55 ? 'مقبول مع فجوات' : 'ضعيف — يحتاج تدخل';
            const overallColor = scoreColor(avgScore);

            let html = `
            <div class="rpt-summary-box" style="margin-bottom:24px">
                <strong>💡 الخلاصة:</strong> التوافق التنظيمي العام <span style="color:${overallColor};font-weight:800">${overallLevel} (${avgScore}/100)</span>
                <br><span style="font-size:12px;color:var(--muted)">العناصر الصلبة: ${avgHard}/100 | العناصر المرنة: ${avgSoft}/100 | الفجوة: ${Math.abs(avgHard - avgSoft)} نقطة</span>
            </div>
            `;

            // 2. KPI Cards
            html += `
            <div class="rpt-kpi-grid" style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:28px">
                ${kpiCard('التوافق العام', avgScore, '', '', avgScore >= 65 ? 'green' : 'red')}
                ${kpiCard('الصلبة (Hard)', avgHard, '', '', avgHard >= 65 ? 'green' : 'primary')}
                ${kpiCard('المرنة (Soft)', avgSoft, '', '', avgSoft >= 65 ? 'green' : 'primary')}
                ${kpiCard('فجوة التوازن', Math.abs(avgHard - avgSoft), '', '', Math.abs(avgHard - avgSoft) <= 10 ? 'green' : 'red')}
            </div>
            `;

            // 3. العناصر الصلبة (Hard S)
            html += `
            <div class="rpt-section">
                <div class="rpt-section-title"><i class="bi bi-bricks" style="color:#667eea"></i> العناصر الصلبة (Hard S) — سهلة التغيير نسبياً</div>
                <div style="display:grid;gap:16px;margin-top:12px">
            `;
            for (const el of hardElements) {
                html += sevenSElementCard(el);
            }
            html += `</div></div>`;

            // 4. العناصر المرنة (Soft S)
            html += `
            <div class="rpt-section">
                <div class="rpt-section-title"><i class="bi bi-people" style="color:#ec4899"></i> العناصر المرنة (Soft S) — تحتاج وقت وجهد أكبر</div>
                <div style="display:grid;gap:16px;margin-top:12px">
            `;
            for (const el of softElements) {
                html += sevenSElementCard(el);
            }
            html += `</div></div>`;

            // 5. Radar Chart (visual bar chart since we can't do canvas)
            html += `
            <div class="rpt-section">
                <div class="rpt-section-title"><i class="bi bi-diagram-3" style="color:#06b6d4"></i> مخطط الأداء المقارن</div>
                <div class="rpt-chart" style="margin-top:12px">
                    <div class="rpt-bar-chart" style="height:200px">
                    ${allElements.map(el => `
                        <div class="rpt-bar" style="height:${el.score}%;background:${el.color}">
                            <div class="rpt-bar-val">${el.score}%</div>
                            <div class="rpt-bar-label">${el.nameAr}</div>
                        </div>
                    `).join('')}
                    </div>
                </div>
            </div>
            `;

            // 6. مصفوفة التوافق (Alignment Matrix)
            html += `
            <div class="rpt-section">
                <div class="rpt-section-title"><i class="bi bi-grid-3x3" style="color:#f97316"></i> مصفوفة التوافق — هل العناصر تدعم بعضها؟</div>
                <div style="overflow-x:auto;margin-top:12px">
                    <table class="rpt-table" style="text-align:center">
                        <thead><tr><th style="text-align:right">العنصر</th>${allElements.map(e => `<th style="font-size:11px">${e.icon}</th>`).join('')}</tr></thead>
                        <tbody>
            `;
            for (const row of allElements) {
                html += `<tr><td style="text-align:right;font-weight:700;font-size:12px">${row.icon} ${row.nameAr}</td>`;
                for (const col of allElements) {
                    if (row.key === col.key) {
                        html += `<td style="background:rgba(255,255,255,0.03)">—</td>`;
                    } else {
                        const alignment = Math.abs(row.score - col.score);
                        const symbol = alignment <= 10 ? '🟢' : alignment <= 25 ? '🟡' : '🔴';
                        html += `<td>${symbol}</td>`;
                    }
                }
                html += `</tr>`;
            }
            html += `</tbody></table>
                <div style="font-size:11px;color:var(--muted);margin-top:8px;text-align:center">🟢 متوافق (فجوة ≤ 10) | 🟡 فجوة معتدلة (11-25) | 🔴 تعارض (> 25)</div>
                </div>
            </div>
            `;

            // 7. تحليل الفجوات والتوصيات
            const gaps = allElements
                .filter(e => e.score < 65)
                .sort((a, b) => a.score - b.score);

            html += `
            <div class="rpt-section">
                <div class="rpt-section-title"><i class="bi bi-exclamation-triangle" style="color:var(--red)"></i> تحليل الفجوات — أولويات التصحيح</div>
            `;

            if (gaps.length === 0) {
                html += `<div style="padding:16px;text-align:center;color:var(--green);font-size:14px">🟢 جميع العناصر في مستوى جيد (≥65) — لا توجد فجوات حرجة</div>`;
            } else {
                for (const g of gaps) {
                    const urgency = g.score < 50 ? 'عاجل' : 'مهم';
                    const urgencyColor = g.score < 50 ? 'var(--red)' : 'var(--yellow)';
                    const action = g.findings[g.findings.length - 1] || 'يحتاج مراجعة وتحسين';
                    html += recItem(g.icon, `<strong>${g.nameAr} (${g.score}/100):</strong> ${action}`, urgency, urgencyColor);
                }
            }
            html += `</div>`;

            // 8. خطة العمل المقترحة
            html += `
            <div class="rpt-section">
                <div class="rpt-section-title"><i class="bi bi-clipboard-check" style="color:var(--green)"></i> خطة التصحيح المقترحة</div>
                <table class="rpt-table" style="margin-top:12px">
                    <thead><tr><th>الأولوية</th><th>العنصر</th><th>الإجراء</th><th>المسؤول المقترح</th><th>المدة</th></tr></thead>
                    <tbody>
            `;

            // Sort by score (lowest first = highest priority)
            const sorted = [...allElements].sort((a, b) => a.score - b.score);
            const priorities = ['فوري 🔴', 'شهر 🟡', 'ربع سنة 🟢', 'ربع سنة 🟢', 'نصف سنة ⚪', 'نصف سنة ⚪', 'سنوي ⚪'];
            const owners = {
                strategy: 'الرئيس التنفيذي',
                structure: 'الرئيس التنفيذي + HR',
                systems: 'مدير تقنية المعلومات',
                shared_values: 'الرئيس التنفيذي + HR',
                style: 'الرئيس التنفيذي',
                staff: 'مدير الموارد البشرية',
                skills: 'مدير التطوير والتدريب',
            };
            const durations = { 0: '1-2 أسبوع', 1: '1 شهر', 2: '3 أشهر', 3: '3 أشهر', 4: '6 أشهر', 5: '6 أشهر', 6: '12 شهر' };

            sorted.forEach((el, i) => {
                const action = el.findings[el.findings.length - 1] || 'مراجعة وتحسين';
                const priColor = i < 2 ? 'var(--red)' : i < 4 ? 'var(--yellow)' : 'var(--green)';
                html += `<tr>
                    <td><span style="color:${priColor};font-weight:700;font-size:12px">${priorities[i] || priorities[6]}</span></td>
                    <td style="font-weight:700">${el.icon} ${el.nameAr}</td>
                    <td style="font-size:12px">${action}</td>
                    <td style="font-size:12px">${owners[el.key] || '—'}</td>
                    <td style="font-size:12px">${durations[i] || '12 شهر'}</td>
                </tr>`;
            });

            html += `</tbody></table></div>`;

            // 9. المصادر
            html += `
            <div style="margin-top:24px;padding:16px;background:rgba(6,182,212,0.05);border:1px solid rgba(6,182,212,0.15);border-radius:12px;font-size:12px;color:var(--muted);line-height:2">
                <strong style="color:var(--text)">📚 مصادر البيانات في ستارتكس:</strong><br>
                🎯 الاستراتيجية → <code>directions.html</code> + الأهداف الاستراتيجية<br>
                🏗️ الهيكل → إعدادات المنشأة + الإدارات<br>
                ⚙️ الأنظمة → <code>dept-deep.html</code> (العمليات + تقنية المعلومات)<br>
                💎 القيم + 👑 الأسلوب → <code>org-dna.html</code><br>
                👥 الموظفون + 🎓 المهارات → <code>dept-deep.html</code> (الموارد البشرية)<br>
                🔄 كشف التعارض → <code>contradictions.html</code>
            </div>
            `;

            return html;
        }

        // Helper: 7S Element card
        function sevenSElementCard(el) {
            const statusColor = el.score >= 75 ? 'var(--green)' : el.score >= 55 ? 'var(--yellow)' : 'var(--red)';
            const statusLabel = el.score >= 80 ? 'ممتاز' : el.score >= 65 ? 'جيد' : el.score >= 50 ? 'مقبول' : 'ضعيف';
            return `
            <div style="background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:14px;padding:16px;border-right:3px solid ${el.color}">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
                    <div style="display:flex;align-items:center;gap:10px">
                        <span style="font-size:24px">${el.icon}</span>
                        <div>
                            <div style="font-weight:800;font-size:15px">${el.nameAr} <span style="font-size:11px;color:var(--muted);font-weight:400">(${el.nameEn})</span></div>
                            <div style="font-size:11px;color:var(--muted)">${el.desc}</div>
                        </div>
                    </div>
                    <div style="text-align:center">
                        <div style="font-size:24px;font-weight:900;color:${statusColor}" data-target="${el.score}" class="rpt-kpi-val">0</div>
                        <div style="font-size:10px;color:${statusColor};font-weight:700">${statusLabel}</div>
                    </div>
                </div>
                <div class="rpt-progress" style="margin-bottom:10px;height:6px"><div class="rpt-progress-fill" style="width:${el.score}%;background:${el.color}"></div></div>
                <div style="font-size:12px;color:var(--muted);line-height:1.8">
                    ${el.findings.map(f => `<div style="display:flex;align-items:flex-start;gap:6px"><span style="color:${el.color}">▸</span> ${f}</div>`).join('')}
                </div>
                <div style="font-size:10px;color:var(--muted);margin-top:8px;opacity:0.6">المصدر: ${el.source}</div>
            </div>
            `;
        }

        // === Helper builders ===
        function kpiCard(label, val, suffix, change, color) {
            const c = color === 'green' ? 'var(--green)' : color === 'red' ? 'var(--red)' : color === 'primary' ? 'var(--primary)' : 'var(--muted)';
            return `<div class="rpt-kpi"><div class="rpt-kpi-val" data-target="${val}" style="color:${c}">0</div><div class="rpt-kpi-label">${label}</div>${change ? `<div class="rpt-kpi-change" style="color:${change.startsWith('-') ? 'var(--red)' : 'var(--green)'}">${change.startsWith('-') ? '↓' : '↑'} ${change}${suffix}</div>` : ''}</div>`;
        }
        function objRow(name, persp, pct, status) {
            const sc = status === 'متقدم' ? 'var(--green)' : status === 'متأخر' ? 'var(--red)' : 'var(--primary)';
            return `<tr><td>${name}</td><td>${persp}</td><td><div class="rpt-progress"><div class="rpt-progress-fill" style="width:${pct}%;background:${sc}"></div></div> ${pct}%</td><td><span style="color:${sc};font-weight:700">${status}</span></td></tr>`;
        }
        function kpiRow(name, actual, target, pct) {
            const c = pct >= 100 ? 'var(--green)' : pct >= 80 ? 'var(--yellow)' : 'var(--red)';
            return `<tr><td>${name}</td><td style="font-weight:700">${actual}</td><td>${target}</td><td><div class="rpt-progress"><div class="rpt-progress-fill" style="width:${Math.min(pct, 100)}%;background:${c}"></div></div> ${pct}%</td></tr>`;
        }
        function initRow(name, owner, pct, budget, status) {
            const sc = status === 'مكتمل' ? 'var(--green)' : status === 'متأخر' ? 'var(--red)' : 'var(--primary)';
            return `<tr><td>${name}</td><td>${owner}</td><td><div class="rpt-progress"><div class="rpt-progress-fill" style="width:${pct}%;background:${sc}"></div></div> ${pct}%</td><td>${budget}</td><td><span style="color:${sc};font-weight:700">${status}</span></td></tr>`;
        }
        function barItem(label, val, color) {
            return `<div class="rpt-bar" style="height:${val}%;background:${color}"><div class="rpt-bar-val">${val}%</div><div class="rpt-bar-label">${label}</div></div>`;
        }
        function recItem(icon, text, priority, color) {
            return `<div class="rpt-rec" style="border-right-color:${color}"><div class="rpt-rec-icon">${icon}</div><div class="rpt-rec-text">${text}</div><div class="rpt-rec-priority" style="background:${color}15;color:${color}">${priority}</div></div>`;
        }
        function animateNum(el, target) {
            let cur = 0; const step = Math.max(1, Math.ceil(target / 25));
            const iv = setInterval(() => { cur += step; if (cur >= target) { cur = target; clearInterval(iv); } el.textContent = cur + (el.closest('.rpt-kpi')?.querySelector('.rpt-kpi-label')?.textContent.includes('%') ? '' : ''); }, 30);
        }

        // === PDF Download ===
        async function downloadPDF() {
            const reportDoc = document.getElementById('reportDoc');
            if (!reportDoc || !reportDoc.innerHTML.trim()) {
                showToast('يرجى توليد التقرير أولاً', 'warning');
                return;
            }

            const btn = document.getElementById('downloadPdfBtn');
            const originalHTML = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<i class="bi bi-hourglass-split"></i> جاري التحميل...';

            try {
                // Clone the report for PDF generation
                const clone = reportDoc.cloneNode(true);

                // Apply print-friendly styles
                clone.style.cssText = 'direction:rtl;font-family:Tajawal,sans-serif;color:#222;background:#fff;padding:30px;max-width:800px;margin:0 auto';

                // Fix colors for PDF readability
                clone.querySelectorAll('[style]').forEach(el => {
                    const s = el.style;
                    if (s.color && s.color.includes('var(--')) {
                        s.color = '#333';
                    }
                });

                // Make KPI values visible
                clone.querySelectorAll('.rpt-kpi-val').forEach(el => {
                    if (el.dataset.target) el.textContent = el.dataset.target;
                });

                const tmpl = templates.find(t => t.id === selectedTemplate);
                const period = document.getElementById('reportPeriod');
                const periodText = period.options[period.selectedIndex].text;
                const fileName = `ستارتكس_${tmpl.title}_${periodText}`.replace(/\s+/g, '_');

                    image: { type: 'jpeg', quality: 0.95 },
                    html2canvas: { scale: 2, useCORS: true, letterRendering: true, scrollY: 0 },
                    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
                    pagebreak: { mode: ['avoid-all', 'css', 'legacy'] }
                };

                await html2pdf().set(opt).from(clone).save();

            } catch (err) {
                console.error('PDF generation error:', err);

            if (!dept) dept = JSON.parse(localStorage.getItem('stratix_dept_deep_payload') || 'null');
            const ident = JSON.parse(localStorage.getItem('stratix_identity_payload') || 'null');
            if (!diag) { showToast('لا توجد بيانات للتصدير', 'warning'); return; }

            const wb = XLSX.utils.book_new();

            // Sheet 1: Summary
            const maturity = diag.results?.maturity || 0;
            const compScore = diag.results?.compliance?.score || 0;
            const riskAmt = diag.results?.totalRisk || 0;
            const summaryData = [
                ['البيان', 'القيمة'],
                ['النضج المؤسسي', maturity + '%'],
                ['درجة الامتثال', compScore + '%'],
                ['المخاطر المكشوفة (﷼)', riskAmt],
                ['تاريخ التشخيص', diag.completedAt || '—'],
                ['الرؤية', ident?.vision || '—'],
                ['الميزة التنافسية', ident?.competitiveAdvantage?.description || '—'],
            ];
            const ws1 = XLSX.utils.aoa_to_sheet(summaryData);
            XLSX.utils.book_append_sheet(wb, ws1, 'الملخص');

            // Sheet 2: Axes
            const axisRows = [['المحور', 'الدرجة']];
            Object.entries(diag.radar?.axisScores || {}).forEach(([k, v]) => axisRows.push([k, v + '%']));
            XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(axisRows), 'المحاور');

            // Sheet 3: Departments
            if (dept?.completedDepts?.length) {
                const deptRows = [['الإدارة', 'نقاط القوة', 'نقاط الضعف', 'الأهداف', 'الأولوية', 'نموذج التشغيل']];
                dept.completedDepts.forEach(key => {
                    const d = dept[key] || {};
                    deptRows.push([
                        key,
                        (d.strengths || []).join(' | '),
                        (d.weaknesses || []).join(' | '),
                        (d.goals || []).join(' | '),
                        d.priority || '—',
                        d.operatingModel || '—',
                    ]);
                });
                XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(deptRows), 'الإدارات');
            }

            // Sheet 4: Critical Items
            const critItems = diag.results?.compliance?.critical || [];
            if (critItems.length) {
                const critRows = [['البند الحرج', 'الحالة']];
                critItems.forEach(c => critRows.push([c, 'يتطلب معالجة فورية']));
                XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(critRows), 'البنود الحرجة');
            }

            const fileName = `ستارتكس_تشخيص_${new Date().toISOString().slice(0, 10)}.xlsx`;
            XLSX.writeFile(wb, fileName);
        };

        window.exportJSON = async function () {
            // 📊 المرحلة 3: DB أولاً
            let deptDeep = null;
            try {
                const result = await StratixData.getDeptDeep();
                if (!result._error) deptDeep = result;
            } catch (e) { }
            if (!deptDeep) deptDeep = JSON.parse(localStorage.getItem('stratix_dept_deep_payload') || 'null');

            const payload = {
                diagnostic: JSON.parse(localStorage.getItem('stratix_diagnostic_payload') || 'null'),
                deptDeep,
                identity: JSON.parse(localStorage.getItem('stratix_identity_payload') || 'null'),
                swot: JSON.parse(localStorage.getItem('stratix_swot_data') || localStorage.getItem('stratix_swot_payload') || 'null'),
                exportedAt: new Date().toISOString(),
                version: 'stratix-pro-v3.2'
            };
            const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `ستارتكس_بيانات_${new Date().toISOString().slice(0, 10)}.json`;
            a.click();
            URL.revokeObjectURL(url);
        };
    </script>
</body>

</html>
