<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ستارتكس - لوحة البث المباشر</title>
    <meta name="description" content="لوحة بيانات مباشرة لعرضها على الشاشات الكبيرة">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #06070b;
            --card: #0e1019;
            --text: #e2e8f0;
            --muted: #5a6580;
            --border: rgba(255, 255, 255, 0.04);
            --primary: #667eea;
            --secondary: #764ba2;
            --green: #22c55e;
            --yellow: #facc15;
            --red: #ef4444;
            --blue: #38bdf8;
            --purple: #a78bfa;
            --orange: #f97316
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        body {
            background: var(--bg);
            font-family: 'Tajawal', sans-serif;
            color: var(--text);
            min-height: 100vh;
            overflow: hidden
        }

        .live-wrap {
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 16px;
            gap: 12px
        }

        /* Top bar */
        .live-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 4px
        }

        .live-logo {
            font-size: 20px;
            font-weight: 900;
            display: flex;
            align-items: center;
            gap: 8px
        }

        .live-logo span {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent
        }

        .live-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 5px 14px;
            border-radius: 8px;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            font-size: 11px;
            font-weight: 700;
            color: var(--red)
        }

        .live-pulse {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--red);
            animation: livePulse 1.5s infinite
        }

        @keyframes livePulse {

            0%,
            100% {
                opacity: 1;
                transform: scale(1)
            }

            50% {
                opacity: 0.5;
                transform: scale(1.3)
            }
        }

        .live-time {
            font-size: 22px;
            font-weight: 900;
            font-variant-numeric: tabular-nums;
            direction: ltr
        }

        .live-date {
            font-size: 12px;
            color: var(--muted)
        }

        .live-controls {
            display: flex;
            gap: 8px
        }

        .live-ctrl-btn {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s
        }

        .live-ctrl-btn:hover {
            background: rgba(255, 255, 255, 0.04);
            color: var(--text)
        }

        /* Main Grid */
        .live-grid {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 280px;
            grid-template-rows: auto 1fr 1fr;
            gap: 10px;
            overflow: hidden
        }

        /* Health Score */
        .live-health {
            grid-column: 1;
            grid-row: 1;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 18px;
            display: flex;
            align-items: center;
            gap: 16px
        }

        .live-health-ring {
            width: 70px;
            height: 70px;
            position: relative;
            flex-shrink: 0
        }

        .live-health-ring svg {
            width: 100%;
            height: 100%;
            transform: rotate(-90deg)
        }

        .live-health-ring circle {
            fill: none;
            stroke-width: 7;
            stroke-linecap: round
        }

        .live-health-num {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 22px;
            font-weight: 900
        }

        .live-health-info {
            flex: 1
        }

        .live-health-info h3 {
            font-size: 14px;
            font-weight: 800;
            margin-bottom: 2px
        }

        .live-health-info p {
            font-size: 11px;
            color: var(--muted)
        }

        /* KPIs Row */
        .live-kpi {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 16px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center
        }

        .live-kpi-icon {
            font-size: 22px;
            margin-bottom: 4px
        }

        .live-kpi-num {
            font-size: 28px;
            font-weight: 900
        }

        .live-kpi-label {
            font-size: 10px;
            color: var(--muted);
            margin-top: 2px
        }

        .live-kpi-change {
            font-size: 11px;
            font-weight: 700;
            margin-top: 2px
        }

        /* Progress bars panel */
        .live-objectives {
            grid-column: 1/3;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 16px;
            overflow: hidden
        }

        .live-obj-title {
            font-size: 13px;
            font-weight: 800;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px
        }

        .live-obj-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px
        }

        .live-obj-name {
            font-size: 12px;
            font-weight: 600;
            width: 140px;
            flex-shrink: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis
        }

        .live-obj-bar {
            flex: 1;
            height: 10px;
            border-radius: 5px;
            background: rgba(255, 255, 255, 0.04);
            overflow: hidden
        }

        .live-obj-fill {
            height: 100%;
            border-radius: 5px;
            transition: width 2s ease
        }

        .live-obj-pct {
            font-size: 12px;
            font-weight: 800;
            width: 40px;
            text-align: left
        }

        /* Initiatives */
        .live-initiatives {
            grid-column: 3;
            grid-row: 2/4;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 16px;
            overflow: hidden
        }

        .live-init-title {
            font-size: 13px;
            font-weight: 800;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px
        }

        .live-init-item {
            padding: 10px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 10px;
            margin-bottom: 8px
        }

        .live-init-name {
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 4px
        }

        .live-init-row {
            display: flex;
            align-items: center;
            gap: 6px
        }

        .live-init-bar {
            flex: 1;
            height: 6px;
            border-radius: 3px;
            background: rgba(255, 255, 255, 0.04);
            overflow: hidden
        }

        .live-init-fill {
            height: 100%;
            border-radius: 3px
        }

        .live-init-pct {
            font-size: 11px;
            font-weight: 700
        }

        .live-init-status {
            font-size: 10px;
            margin-top: 4px;
            color: var(--muted)
        }

        /* Activity Feed */
        .live-feed {
            grid-column: 4;
            grid-row: 1/4;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 14px;
            overflow: hidden;
            display: flex;
            flex-direction: column
        }

        .live-feed-title {
            font-size: 13px;
            font-weight: 800;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0
        }

        .live-feed-list {
            flex: 1;
            overflow: hidden
        }

        .live-feed-item {
            display: flex;
            gap: 8px;
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
            animation: feedIn 0.5s ease
        }

        @keyframes feedIn {
            from {
                opacity: 0;
                transform: translateX(10px)
            }

            to {
                opacity: 1;
                transform: translateX(0)
            }
        }

        .live-feed-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-top: 4px;
            flex-shrink: 0
        }

        .live-feed-text {
            font-size: 11px;
            line-height: 1.5;
            color: var(--muted)
        }

        .live-feed-text strong {
            color: var(--text);
            font-weight: 700
        }

        .live-feed-time {
            font-size: 9px;
            color: var(--muted);
            margin-top: 2px
        }

        /* Alerts ticker */
        .live-ticker {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            grid-column: 1/3;
            overflow: hidden
        }

        .live-ticker-icon {
            font-size: 14px;
            flex-shrink: 0;
            animation: bounce 1s infinite
        }

        @keyframes bounce {

            0%,
            100% {
                transform: translateY(0)
            }

            50% {
                transform: translateY(-3px)
            }
        }

        .live-ticker-text {
            font-size: 12px;
            white-space: nowrap;
            animation: scroll 20s linear infinite
        }

        @keyframes scroll {
            0% {
                transform: translateX(-100%)
            }

            100% {
                transform: translateX(100%)
            }
        }

        @media(max-width:1200px) {
            .live-grid {
                grid-template-columns: 1fr 1fr 1fr;
                grid-template-rows: auto 1fr 1fr auto
            }

            .live-feed {
                grid-column: 1/4;
                grid-row: auto;
                max-height: 200px
            }
        }

        @media(max-width:768px) {
            body {
                overflow: auto;
            }

            .live-wrap {
                height: auto;
                min-height: 100vh;
                padding: 10px;
                gap: 8px;
            }

            .live-grid {
                grid-template-columns: 1fr 1fr;
                overflow: visible;
            }

            .live-objectives,
            .live-initiatives,
            .live-ticker,
            .live-feed {
                grid-column: 1/3;
                grid-row: auto;
            }

            .live-feed {
                max-height: 180px;
            }

            .live-health {
                grid-column: 1/3;
            }

            .live-top {
                flex-wrap: wrap;
                gap: 8px;
            }

            .live-logo {
                font-size: 16px;
            }

            .live-time {
                font-size: 16px;
            }

            .live-kpi-num {
                font-size: 22px;
            }

            .live-kpi {
                padding: 12px;
            }

            .live-obj-name {
                width: 100px;
                font-size: 11px;
            }
        }

        @media(max-width:480px) {
            .live-grid {
                grid-template-columns: 1fr;
            }

            .live-objectives,
            .live-initiatives,
            .live-ticker,
            .live-feed,
            .live-health {
                grid-column: 1;
            }

            .live-controls {
                display: none;
            }

            .live-top {
                justify-content: center;
                text-align: center;
            }
        }
    </style>
</head>

<body>
    <div class="live-wrap">
        <!-- Top bar -->
        <div class="live-top">
            <div class="live-logo"><i class="bi bi-broadcast"></i> <span>ستارتكس</span> Live</div>
            <div class="live-badge">
                <div class="live-pulse"></div> مباشر
            </div>
            <div style="text-align:center">
                <div class="live-time" id="liveTime">--:--:--</div>
                <div class="live-date" id="liveDate"></div>
            </div>
            <div class="live-controls">
                <button class="live-ctrl-btn" onclick="toggleFullscreen()" title="ملء الشاشة"><i
                        class="bi bi-arrows-fullscreen"></i></button>
                <button class="live-ctrl-btn" onclick="location.href='/dashboard.html'" title="الرجوع"><i
                        class="bi bi-box-arrow-right"></i></button>
            </div>
        </div>

        <!-- Main Grid -->
        <div class="live-grid">
            <!-- Health -->
            <div class="live-health">
                <div class="live-health-ring">
                    <svg viewBox="0 0 100 100">
                        <circle cx="50" cy="50" r="40" stroke="rgba(255,255,255,0.04)" stroke-width="7" fill="none" />
                        <circle cx="50" cy="50" r="40" stroke="var(--green)" stroke-width="7" fill="none"
                            stroke-linecap="round" stroke-dasharray="0 252" id="healthRing" />
                    </svg>
                    <div class="live-health-num" id="healthNum">0</div>
                </div>
                <div class="live-health-info">
                    <h3>الصحة الاستراتيجية</h3>
                    <p id="healthLabel">جار التحميل...</p>
                </div>
            </div>

            <!-- KPIs -->
            <div class="live-kpi">
                <div class="live-kpi-icon">📈</div>
                <div class="live-kpi-num" style="color:var(--green)" id="kpi1">0%</div>
                <div class="live-kpi-label">إنجاز الأهداف</div>
                <div class="live-kpi-change" style="color:var(--green)">↑ 8%</div>
            </div>
            <div class="live-kpi">
                <div class="live-kpi-icon">🚀</div>
                <div class="live-kpi-num" style="color:var(--primary)" id="kpi2">0%</div>
                <div class="live-kpi-label">إنجاز المبادرات</div>
                <div class="live-kpi-change" style="color:var(--yellow)">→ 0%</div>
            </div>

            <!-- Objectives -->
            <div class="live-objectives" id="liveObjectives">
                <div class="live-obj-title"><i class="bi bi-bullseye" style="color:var(--primary)"></i> الأهداف
                    الاستراتيجية</div>
            </div>

            <!-- Initiatives -->
            <div class="live-initiatives" id="liveInitiatives">
                <div class="live-init-title"><i class="bi bi-rocket-takeoff" style="color:var(--orange)"></i> المبادرات
                    النشطة</div>
            </div>

            <!-- Activity Feed -->
            <div class="live-feed">
                <div class="live-feed-title"><i class="bi bi-activity" style="color:var(--red)"></i> النشاط المباشر
                </div>
                <div class="live-feed-list" id="liveFeed"></div>
            </div>

            <!-- Ticker -->
            <div class="live-ticker">
                <div class="live-ticker-icon">🔔</div>
                <div class="live-ticker-text" id="liveTicker"></div>
            </div>
        </div>
    </div>

    <script>
        // === Clock ===
        function updateClock() {
            const now = new Date();
            document.getElementById('liveTime').textContent = now.toLocaleTimeString('ar-SA', { hour12: false });
            document.getElementById('liveDate').textContent = now.toLocaleDateString('ar-SA', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        }
        setInterval(updateClock, 1000);
        updateClock();

        // === Health ===
        const healthScore = 78;
        setTimeout(() => {
            const circ = 2 * Math.PI * 40;
            document.getElementById('healthRing').setAttribute('stroke-dasharray', `${(healthScore / 100) * circ} ${circ}`);
            animNum('healthNum', healthScore);
            document.getElementById('healthLabel').textContent = healthScore >= 70 ? '✅ أداء جيد — فوق المتوسط' : '⚠️ يحتاج تحسين';
        }, 500);

        // === KPIs ===
        setTimeout(() => { animText('kpi1', 73, '%'); animText('kpi2', 65, '%'); }, 700);

        // === Objectives ===
        const objectives = [
            { name: 'زيادة الإيرادات 25%', pct: 82, color: 'var(--green)' },
            { name: 'تحسين رضا العملاء', pct: 78, color: 'var(--primary)' },
            { name: 'التميز التشغيلي', pct: 65, color: 'var(--yellow)' },
            { name: 'تطوير القيادات', pct: 70, color: 'var(--primary)' },
            { name: 'التحول الرقمي', pct: 55, color: 'var(--red)' },
            { name: 'التوسع الإقليمي', pct: 88, color: 'var(--green)' },
        ];

        const objContainer = document.getElementById('liveObjectives');
        objectives.forEach((o, i) => {
            const div = document.createElement('div');
            div.className = 'live-obj-item';
            div.innerHTML = `
        <div class="live-obj-name">${o.name}</div>
        <div class="live-obj-bar"><div class="live-obj-fill" style="width:0%;background:${o.color}" id="obj${i}"></div></div>
        <div class="live-obj-pct" style="color:${o.color}">${o.pct}%</div>
      `;
            objContainer.appendChild(div);
            setTimeout(() => document.getElementById(`obj${i}`).style.width = o.pct + '%', 300 + i * 200);
        });

        // === Initiatives ===
        const initiatives = [
            { name: 'التوسع الإقليمي', pct: 88, status: '✅ متقدم', color: 'var(--green)' },
            { name: 'التحول الرقمي', pct: 55, status: '⚠️ متأخر', color: 'var(--red)' },
            { name: 'تدريب القيادات', pct: 72, status: '🔵 جارية', color: 'var(--primary)' },
            { name: 'تسويق رقمي', pct: 95, status: '✅ شبه مكتمل', color: 'var(--green)' },
            { name: 'نظام ERP', pct: 40, status: '🔵 جارية', color: 'var(--primary)' },
        ];

        const initContainer = document.getElementById('liveInitiatives');
        initiatives.forEach(init => {
            const div = document.createElement('div');
            div.className = 'live-init-item';
            div.innerHTML = `
        <div class="live-init-name">${init.name}</div>
        <div class="live-init-row"><div class="live-init-bar"><div class="live-init-fill" style="width:${init.pct}%;background:${init.color}"></div></div><div class="live-init-pct" style="color:${init.color}">${init.pct}%</div></div>
        <div class="live-init-status">${init.status}</div>
      `;
            initContainer.appendChild(div);
        });

        // === Live Feed ===
        const feedItems = [
            { text: '<strong>أحمد</strong> أكمل مهمة "تقرير الربع الرابع"', color: 'var(--green)', time: 'منذ دقيقتين' },
            { text: '<strong>سارة</strong> علّقت على مبادرة التحول الرقمي', color: 'var(--blue)', time: 'منذ 5 دقائق' },
            { text: '<strong>محمد</strong> حدّث مؤشر رضا العملاء → <strong>82</strong>', color: 'var(--primary)', time: 'منذ 12 دقيقة' },
            { text: '<strong>نورة</strong> أنشأت مبادرة جديدة "تسويق الذكاء الاصطناعي"', color: 'var(--purple)', time: 'منذ 18 دقيقة' },
            { text: '<strong>خالد</strong> اعتمد ميزانية قسم التطوير', color: 'var(--yellow)', time: 'منذ 25 دقيقة' },
            { text: '<strong>أحمد</strong> أكمل 3 مهام في مشروع ERP', color: 'var(--green)', time: 'منذ 30 دقيقة' },
            { text: '<strong>سارة</strong> رفعت تقرير المخاطر الربعي', color: 'var(--orange)', time: 'منذ 45 دقيقة' },
            { text: '<strong>محمد</strong> أضاف هدف استراتيجي جديد', color: 'var(--primary)', time: 'منذ ساعة' },
        ];

        const feedContainer = document.getElementById('liveFeed');
        feedItems.forEach(f => {
            const div = document.createElement('div');
            div.className = 'live-feed-item';
            div.innerHTML = `<div class="live-feed-dot" style="background:${f.color}"></div><div><div class="live-feed-text">${f.text}</div><div class="live-feed-time">${f.time}</div></div>`;
            feedContainer.appendChild(div);
        });

        // Simulate new activities
        let feedIndex = 0;
        const newActivities = [
            { text: '<strong>ليلى</strong> أنهت مراجعة الأداء الشهري', color: 'var(--green)' },
            { text: '<strong>فهد</strong> أضاف تعليق على هدف الإيرادات', color: 'var(--blue)' },
            { text: '<strong>مها</strong> حدّثت مؤشر الكفاءة التشغيلية', color: 'var(--orange)' },
        ];
        setInterval(() => {
            const a = newActivities[feedIndex % newActivities.length];
            const div = document.createElement('div');
            div.className = 'live-feed-item';
            div.innerHTML = `<div class="live-feed-dot" style="background:${a.color}"></div><div><div class="live-feed-text">${a.text}</div><div class="live-feed-time">الآن</div></div>`;
            feedContainer.insertBefore(div, feedContainer.firstChild);
            if (feedContainer.children.length > 15) feedContainer.removeChild(feedContainer.lastChild);
            feedIndex++;
        }, 15000);

        // === Ticker ===
        const alerts = [
            '🔴 تنبيه: مبادرة التحول الرقمي متأخرة 15 يوم عن الجدول',
            '🟢 إنجاز: التوسع الإقليمي وصل 88% — أعلى من المستهدف',
            '🟡 تذكير: مراجعة ربعية مع مجلس الإدارة بعد 5 أيام',
            '🔵 تحديث: مؤشر رضا العملاء ارتفع إلى 82 — أعلى مستوى',
            '🟠 تحذير: معدل دوران الموظفين وصل 18% — أعلى من المستهدف (12%)',
        ];
        document.getElementById('liveTicker').textContent = alerts.join('   ●   ');

        // === Helpers ===
        function animNum(id, target) {
            const el = document.getElementById(id);
            let cur = 0; const step = Math.max(1, Math.ceil(target / 25));
            const iv = setInterval(() => { cur += step; if (cur >= target) { cur = target; clearInterval(iv); } el.textContent = cur; }, 30);
        }
        function animText(id, target, suffix) {
            const el = document.getElementById(id);
            let cur = 0; const step = Math.max(1, Math.ceil(target / 25));
            const iv = setInterval(() => { cur += step; if (cur >= target) { cur = target; clearInterval(iv); } el.textContent = cur + suffix; }, 30);
        }
        function toggleFullscreen() { document.fullscreenElement ? document.exitFullscreen() : document.documentElement.requestFullscreen(); }
    </script>
