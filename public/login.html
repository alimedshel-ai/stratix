<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ستارتكيس - تسجيل الدخول</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #667eea;
            --secondary: #764ba2;
            --bg: #0f1117;
            --bg-card: #1a1d2e;
            --text: #e2e8f0;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.08);
        }

        body {
            background: var(--bg);
            font-family: 'Tajawal', sans-serif;
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
        }

        /* خلفية تفاعلية مطابقة لشاشة التسجيل */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at 20% 80%, rgba(102, 126, 234, 0.08) 0%, transparent 50%), radial-gradient(ellipse at 80% 20%, rgba(118, 75, 162, 0.08) 0%, transparent 50%);
            z-index: -1;
            animation: bgPulse 8s ease-in-out infinite alternate;
        }

        @keyframes bgPulse {
            0% {
                opacity: 0.6;
            }

            100% {
                opacity: 1;
            }
        }

        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px 36px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 400px;
            animation: slideUp 0.6s ease;
        }

        @keyframes slideUp {
            from {
                transform: translateY(30px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .form-label {
            font-weight: 500;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .form-control {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            color: white;
            border-radius: 12px;
            padding: 12px 15px;
            transition: all 0.3s ease;
        }

        /* تأثير الإضاءة عند الكتابة */
        .form-control:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(102, 126, 234, 0.4);
            color: white;
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.2);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-weight: bold;
            font-size: 1.1rem;
            transition: transform 0.2s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .info-icon {
            cursor: pointer;
            color: var(--primary);
        }
    </style>
</head>

<body>

    <div class="login-card">
        <div class="text-center mb-4">
            <div style="font-size: 48px; color: var(--primary); margin-bottom: 10px;"><i class="bi bi-shield-lock"></i>
            </div>
            <h2
                style="font-weight: 800; background: linear-gradient(135deg, var(--primary), #a78bfa); -webkit-background-clip: text; color: transparent;">
                مرحباً بعودتك</h2>
            <p class="text-muted">سجل الدخول لمتابعة أداء استراتيجيتك</p>
        </div>

        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label">
                    البريد الإلكتروني
                    <i class="bi bi-info-circle info-icon" data-bs-toggle="tooltip"
                        title="أدخل بريد العمل المسجل في النظام"></i>
                </label>
                <input type="email" id="email" class="form-control" placeholder="name@company.com" required>
            </div>

            <div class="mb-4">
                <label class="form-label">
                    كلمة المرور
                    <i class="bi bi-info-circle info-icon" data-bs-toggle="tooltip"
                        title="تأكد من إدخال كلمة المرور بشكل صحيح"></i>
                </label>
                <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                <div class="text-start mt-2">
                    <a href="#"
                        style="color: var(--text-muted); font-size: 0.85rem; text-decoration: none; transition: 0.3s;">نسيت
                        كلمة المرور؟</a>
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100" data-bs-toggle="tooltip"
                title="اضغط للدخول إلى لوحة القيادة (Dashboard)">دخول أمن</button>

            <div class="text-center mt-4">
                <span class="text-muted">ليس لديك حساب؟ </span>
                <a href="/signup.html" class="text-decoration-none"
                    style="color: var(--primary); font-weight: bold;">إنشاء حساب جديد</a>
            </div>
        </form>
    </div>

    <!-- مكتبات التلميحات (Bootstrap JS) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // تشغيل التلميحات (Tooltips)
        var tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'))
        var tooltipList = tooltipTriggerList.map(function (tooltipTriggerEl) {
            return new bootstrap.Tooltip(tooltipTriggerEl)
        });

        // Login form submission
        document.getElementById('loginForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const btn = this.querySelector('button[type="submit"]');
            const originalText = btn.textContent;
            btn.disabled = true;
            btn.textContent = 'جاري الدخول...';

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            console.log('Attempting login with:', email);

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();
                console.log('Response:', res.status, data);

                if (res.ok && data.token) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));

                    // توجيه ذكي بعد تسجيل الدخول
                    const role = data.user.role || 'VIEWER';
                    const sysRole = data.user.systemRole || 'USER';
                    const uType = data.user.userType || 'EXPLORER';
                    const hasPainAmbition = !!localStorage.getItem('painAmbition');
                    const hasChosenType = localStorage.getItem('userTypeChosen');

                    if (sysRole !== 'SUPER_ADMIN' && (role === 'VIEWER' || role === 'DATA_ENTRY')) {
                        window.location.href = '/viewer-hub.html';
                    } else if (uType === 'EXPLORER' && !hasChosenType && sysRole !== 'SUPER_ADMIN') {
                        // مستخدم جديد لم يختر نوعه بعد → شاشة اختيار النوع
                        window.location.href = '/select-type.html';
                    } else if (uType === 'CONSULTANT') {
                        window.location.href = '/consultant-dashboard.html';
                    } else if (uType === 'DEPT_MANAGER') {
                        window.location.href = '/dept-dashboard.html';
                    } else if (!hasPainAmbition && sysRole !== 'SUPER_ADMIN') {
                        window.location.href = '/pain-ambition.html';
                    } else {
                        window.location.href = '/dashboard.html';
                    }
                } else {
                    // Show error
                    let errDiv = document.getElementById('loginError');
                    if (!errDiv) {
                        errDiv = document.createElement('div');
                        errDiv.id = 'loginError';
                        errDiv.className = 'alert alert-danger mt-3';
                        errDiv.style.borderRadius = '12px';
                        this.appendChild(errDiv);
                    }
                    errDiv.textContent = data.message || data.errors?.[0]?.msg || 'فشل تسجيل الدخول';
                }
            } catch (err) {
                console.error('Login error:', err);
                alert('خطأ في الاتصال بالسيرفر');
            } finally {
                btn.disabled = false;
                btn.textContent = originalText;
            }
        });
    </script>
</body>

</html>
