<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ستراتيكس - الشركات</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <style>
    body {
      background-color: #f8f9fa;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .navbar {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .navbar-brand {
      font-weight: 700;
      font-size: 20px;
      color: white !important;
    }

    .navbar-brand i {
      margin-right: 8px;
    }

    .user-menu {
      display: flex;
      align-items: center;
      gap: 10px;
      color: white;
    }

    .user-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
    }

    .sidebar {
      background: white;
      border-right: 1px solid #e0e0e0;
      padding: 20px 0;
      min-height: calc(100vh - 70px);
    }

    .sidebar .nav-link {
      color: #666 !important;
      padding: 12px 20px;
      border-left: 3px solid transparent;
      transition: all 0.3s;
      cursor: pointer;
    }

    .sidebar .nav-link:hover {
      background-color: #f8f9fa;
      color: #667eea !important;
      border-left-color: #667eea;
    }

    .sidebar .nav-link.active {
      background-color: #f0f2ff;
      color: #667eea !important;
      border-left-color: #667eea;
      font-weight: 600;
    }

    .sidebar .nav-link i {
      margin-right: 0;
      margin-left: 10px;
      width: 20px;
    }

    .main-content {
      padding: 30px;
    }

    .page-header {
      margin-bottom: 30px;
    }

    .page-title {
      font-size: 28px;
      font-weight: 700;
      color: #333;
      margin-bottom: 5px;
    }

    .page-subtitle {
      color: #666;
      font-size: 14px;
    }

    .btn-primary-custom {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
      color: white;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .btn-primary-custom:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
      color: white;
      text-decoration: none;
    }

    .search-box {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .search-box input,
    .search-box select {
      border: 1px solid #ddd;
      padding: 10px 12px;
      border-radius: 6px;
      font-size: 14px;
    }

    .search-box input:focus,
    .search-box select:focus {
      border-color: #667eea;
      box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
      outline: none;
    }

    .table-container {
      background: white;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }

    .table {
      margin: 0;
    }

    .table thead {
      background-color: #f8f9fa;
      border-bottom: 2px solid #e0e0e0;
    }

    .table th {
      color: #333;
      font-weight: 600;
      padding: 15px;
      border: none;
    }

    .table td {
      padding: 12px 15px;
      border-color: #e0e0e0;
      vertical-align: middle;
    }

    .table tbody tr:hover {
      background-color: #f8f9fa;
    }

    .status-badge {
      display: inline-block;
      padding: 5px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }

    .status-active {
      background: #d4edda;
      color: #155724;
    }

    .status-inactive {
      background: #f8d7da;
      color: #721c24;
    }

    .action-buttons {
      display: flex;
      gap: 8px;
    }

    .btn-sm {
      padding: 6px 12px;
      font-size: 13px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn-edit {
      background: #ffc107;
      color: #333;
    }

    .btn-edit:hover {
      background: #e0a800;
      color: white;
    }

    .btn-delete {
      background: #dc3545;
      color: white;
    }

    .btn-delete:hover {
      background: #c82333;
    }

    .btn-view {
      background: #17a2b8;
      color: white;
    }

    .btn-view:hover {
      background: #138496;
    }

    .pagination {
      margin-top: 20px;
      justify-content: center;
    }

    .pagination .page-link {
      color: #667eea;
      border-color: #ddd;
    }

    .pagination .page-link:hover,
    .pagination .page-link.active {
      background: #667eea;
      border-color: #667eea;
    }

    .alert {
      border-radius: 6px;
      margin-bottom: 20px;
      display: none;
    }

    .alert.show {
      display: block;
    }

    .btn-logout {
      background: #dc3545;
      color: white;
      border: none;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.3s;
      font-size: 14px;
    }

    .btn-logout:hover {
      background: #c82333;
      color: white;
      text-decoration: none;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #666;
    }

    .empty-state i {
      font-size: 48px;
      color: #ddd;
      margin-bottom: 20px;
      display: block;
    }

    .empty-state h4 {
      color: #333;
      margin-bottom: 10px;
    }

    @media (max-width: 768px) {
      .sidebar {
        border-right: 1px solid #e0e0e0;
        border-bottom: none;
      }

      .search-box {
        flex-direction: column;
      }

      .search-box input,
      .search-box select {
        width: 100%;
      }

      .page-title {
        font-size: 20px;
      }

      .action-buttons {
        flex-direction: column;
      }

      .table {
        font-size: 12px;
      }

      .table th,
      .table td {
        padding: 8px;
      }
    }
  </style>
</head>
<body>
  <!-- Navigation Bar -->
  <nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="#dashboard">
        <i class="bi bi-graph-up"></i> ستراتيكس
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <div class="user-menu">
              <div class="user-avatar">
                <span id="userInitial">A</span>
              </div>
              <div>
                <div id="userName" style="font-weight: 600;">مسؤول</div>
              </div>
              <button class="btn-logout" onclick="logout()">تسجيل الخروج</button>
            </div>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container-fluid">
    <div class="row">
      <!-- Sidebar -->
      <nav class="col-md-2 sidebar">
        <ul class="nav flex-column">
          <li class="nav-item">
            <a class="nav-link" href="#" onclick="navigateTo('dashboard'); return false;">
              <i class="bi bi-house"></i> لوحة التحكم
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" href="#" onclick="navigateTo('companies'); return false;">
              <i class="bi bi-building"></i> الشركات
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#" onclick="navigateTo('sectors'); return false;">
              <i class="bi bi-globe"></i> القطاعات
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#" onclick="navigateTo('entities'); return false;">
              <i class="bi bi-diagram-3"></i> الكيانات
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#" onclick="navigateTo('users'); return false;">
              <i class="bi bi-people"></i> المستخدمون
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#" onclick="navigateTo('settings'); return false;">
              <i class="bi bi-gear"></i> الإعدادات
            </a>
          </li>
        </ul>
      </nav>

      <!-- Main Content -->
      <main class="col-md-10 main-content">
        <div id="alertBox" class="alert"></div>

        <div class="page-header">
          <h1 class="page-title">الشركات</h1>
          <p class="page-subtitle">إدارة شركاتك والكيانات التابعة لها</p>
        </div>

        <div style="margin-bottom: 20px;">
          <button class="btn-primary-custom" onclick="openCreateForm()">
            <i class="bi bi-plus-lg"></i> إضافة شركة جديدة
          </button>
        </div>

        <div class="search-box">
          <input type="text" id="searchInput" placeholder="البحث حسب الاسم أو الكود..." style="flex: 1;">
          <select id="statusFilter" style="min-width: 150px;">
            <option value="">جميع الحالات</option>
            <option value="ACTIVE">نشطة</option>
            <option value="INACTIVE">غير نشطة</option>
          </select>
          <button class="btn-primary-custom" onclick="loadCompanies()">
            <i class="bi bi-search"></i> بحث
          </button>
        </div>

        <div class="table-container">
          <table class="table table-hover">
            <thead>
              <tr>
                <th>الاسم</th>
                <th>الاسم بالعربية</th>
                <th>الكود</th>
                <th>الحالة</th>
                <th>المستخدمون</th>
                <th style="text-align: center;">الإجراءات</th>
              </tr>
            </thead>
            <tbody id="companiesTableBody">
              <tr>
                <td colspan="6" class="text-center py-4">
                  <div class="spinner-border" role="status">
                    <span class="visually-hidden">جاري التحميل...</span>
                  </div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>

        <nav aria-label="Page navigation" id="paginationContainer"></nav>
      </main>
    </div>
  </div>

  <!-- Create/Edit Modal -->
  <div id="formModal" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center;">
    <div style="background: white; border-radius: 8px; padding: 30px; max-width: 500px; width: 90%; max-height: 90vh; overflow-y: auto;">
      <h4 id="formTitle" style="margin-bottom: 20px; font-weight: 700;">إضافة شركة جديدة</h4>
      
      <form id="companyForm">
        <div class="form-group" style="margin-bottom: 15px;">
          <label style="font-weight: 600; margin-bottom: 8px; display: block;">الاسم (إنجليزي)</label>
          <input type="text" id="companyName" class="form-control" required>
        </div>

        <div class="form-group" style="margin-bottom: 15px;">
          <label style="font-weight: 600; margin-bottom: 8px; display: block;">الاسم (عربي)</label>
          <input type="text" id="companyNameAr" class="form-control" required>
        </div>

        <div class="form-group" style="margin-bottom: 15px;">
          <label style="font-weight: 600; margin-bottom: 8px; display: block;">الكود</label>
          <input type="text" id="companyCode" class="form-control" required>
        </div>

        <div class="form-group" style="margin-bottom: 20px;">
          <label style="font-weight: 600; margin-bottom: 8px; display: block;">الحالة</label>
          <select id="companyStatus" class="form-control">
            <option value="ACTIVE">نشطة</option>
            <option value="INACTIVE">غير نشطة</option>
          </select>
        </div>

        <div style="display: flex; gap: 10px; justify-content: flex-end;">
          <button type="button" class="btn-sm" style="background: #ddd; padding: 8px 16px; border-radius: 4px; cursor: pointer;" onclick="closeFormModal()">
            إلغاء
          </button>
          <button type="submit" class="btn-primary-custom">
            حفظ
          </button>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    let currentPage = 1;
    const itemsPerPage = 10;
    let editingCompanyId = null;

    // Check authentication on page load
    document.addEventListener('DOMContentLoaded', () => {
      const token = localStorage.getItem('token');
      const user = localStorage.getItem('user');

      if (!token || !user) {
        window.location.href = '/login';
        return;
      }

      const userData = JSON.parse(user);
      document.getElementById('userInitial').textContent = userData.name.charAt(0).toUpperCase();
      document.getElementById('userName').textContent = userData.name;

      loadCompanies();
    });

    async function loadCompanies() {
      try {
        const search = document.getElementById('searchInput').value;
        const status = document.getElementById('statusFilter').value;
        const token = localStorage.getItem('token');

        let url = `/api/companies?page=${currentPage}&limit=${itemsPerPage}`;
        if (search) url += `&search=${encodeURIComponent(search)}`;
        if (status) url += `&status=${status}`;

        const response = await fetch(url, {
          headers: { 'Authorization': `Bearer ${token}` },
        });

        if (response.status === 401) {
          logout();
          return;
        }

        const data = await response.json();

        if (data.companies.length === 0 && currentPage > 1) {
          currentPage--;
          loadCompanies();
          return;
        }

        displayCompanies(data.companies);
        displayPagination(data.totalPages, data.page);
      } catch (error) {
        showAlert('خطأ في تحميل الشركات: ' + error.message, 'danger');
      }
    }

    function displayCompanies(companies) {
      const tbody = document.getElementById('companiesTableBody');
      
      if (companies.length === 0) {
        tbody.innerHTML = `
          <tr>
            <td colspan="6">
              <div class="empty-state">
                <i class="bi bi-inbox"></i>
                <h4>لا توجد شركات</h4>
                <p>ابدأ بإضافة شركة جديدة</p>
              </div>
            </td>
          </tr>
        `;
        return;
      }

      tbody.innerHTML = companies.map(company => `
        <tr>
          <td>${company.name}</td>
          <td>${company.nameAr || '-'}</td>
          <td><code>${company.code}</code></td>
          <td>
            <span class="status-badge status-${company.status.toLowerCase()}">
              ${company.status === 'ACTIVE' ? 'نشطة' : 'غير نشطة'}
            </span>
          </td>
          <td>${company._count.users} مستخدم</td>
          <td>
            <div class="action-buttons" style="justify-content: center;">
              <button class="btn-sm btn-view" onclick="viewCompanyDetails('${company.id}')">
                <i class="bi bi-eye"></i> عرض
              </button>
              <button class="btn-sm btn-edit" onclick="editCompany('${company.id}')">
                <i class="bi bi-pencil"></i> تعديل
              </button>
              <button class="btn-sm btn-delete" onclick="deleteCompany('${company.id}')">
                <i class="bi bi-trash"></i> حذف
              </button>
            </div>
          </td>
        </tr>
      `).join('');
    }

    function displayPagination(totalPages, currentPageNum) {
      const container = document.getElementById('paginationContainer');
      
      if (totalPages <= 1) {
        container.innerHTML = '';
        return;
      }

      let html = '<ul class="pagination">';

      if (currentPageNum > 1) {
        html += `<li class="page-item"><a class="page-link" href="#" onclick="goToPage(1); return false;">الأولى</a></li>`;
        html += `<li class="page-item"><a class="page-link" href="#" onclick="goToPage(${currentPageNum - 1}); return false;">السابقة</a></li>`;
      }

      for (let i = Math.max(1, currentPageNum - 2); i <= Math.min(totalPages, currentPageNum + 2); i++) {
        html += `<li class="page-item ${i === currentPageNum ? 'active' : ''}">
          <a class="page-link" href="#" onclick="goToPage(${i}); return false;">${i}</a>
        </li>`;
      }

      if (currentPageNum < totalPages) {
        html += `<li class="page-item"><a class="page-link" href="#" onclick="goToPage(${currentPageNum + 1}); return false;">التالية</a></li>`;
        html += `<li class="page-item"><a class="page-link" href="#" onclick="goToPage(${totalPages}); return false;">الأخيرة</a></li>`;
      }

      html += '</ul>';
      container.innerHTML = html;
    }

    function goToPage(page) {
      currentPage = page;
      loadCompanies();
    }

    function openCreateForm() {
      editingCompanyId = null;
      document.getElementById('formTitle').textContent = 'إضافة شركة جديدة';
      document.getElementById('companyForm').reset();
      document.getElementById('formModal').style.display = 'flex';
    }

    async function editCompany(id) {
      try {
        const token = localStorage.getItem('token');
        const response = await fetch(`/api/companies/${id}`, {
          headers: { 'Authorization': `Bearer ${token}` },
        });

        const data = await response.json();
        const company = data.company;

        editingCompanyId = id;
        document.getElementById('formTitle').textContent = 'تعديل الشركة';
        document.getElementById('companyName').value = company.name;
        document.getElementById('companyNameAr').value = company.nameAr || '';
        document.getElementById('companyCode').value = company.code;
        document.getElementById('companyStatus').value = company.status;
        document.getElementById('formModal').style.display = 'flex';
      } catch (error) {
        showAlert('خطأ في تحميل بيانات الشركة: ' + error.message, 'danger');
      }
    }

    async function deleteCompany(id) {
      if (!confirm('هل أنت متأكد من حذف هذه الشركة؟')) return;

      try {
        const token = localStorage.getItem('token');
        const response = await fetch(`/api/companies/${id}`, {
          method: 'DELETE',
          headers: { 'Authorization': `Bearer ${token}` },
        });

        const data = await response.json();

        if (response.ok) {
          showAlert('تم حذف الشركة بنجاح', 'success');
          loadCompanies();
        } else {
          showAlert(data.message || 'خطأ في حذف الشركة', 'danger');
        }
      } catch (error) {
        showAlert('خطأ: ' + error.message, 'danger');
      }
    }

    function viewCompanyDetails(id) {
      alert('سيتم عرض التفاصيل قريباً');
    }

    async function submitForm() {
      const name = document.getElementById('companyName').value.trim();
      const nameAr = document.getElementById('companyNameAr').value.trim();
      const code = document.getElementById('companyCode').value.trim();
      const status = document.getElementById('companyStatus').value;

      if (!name || !nameAr || !code) {
        showAlert('يرجى ملء جميع الحقول المطلوبة', 'danger');
        return;
      }

      try {
        const token = localStorage.getItem('token');
        const method = editingCompanyId ? 'PATCH' : 'POST';
        const url = editingCompanyId ? `/api/companies/${editingCompanyId}` : '/api/companies';

        const response = await fetch(url, {
          method,
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`,
          },
          body: JSON.stringify({ name, nameAr, code, status }),
        });

        const data = await response.json();

        if (response.ok) {
          showAlert(editingCompanyId ? 'تم تحديث الشركة بنجاح' : 'تم إنشاء الشركة بنجاح', 'success');
          closeFormModal();
          currentPage = 1;
          loadCompanies();
        } else {
          showAlert(data.message || 'خطأ في الحفظ', 'danger');
        }
      } catch (error) {
        showAlert('خطأ: ' + error.message, 'danger');
      }
    }

    function closeFormModal() {
      document.getElementById('formModal').style.display = 'none';
    }

    document.getElementById('companyForm').addEventListener('submit', (e) => {
      e.preventDefault();
      submitForm();
    });

    function showAlert(message, type) {
      const alertBox = document.getElementById('alertBox');
      alertBox.className = `alert alert-${type} alert-dismissible fade show`;
      alertBox.innerHTML = `
        ${message}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      `;
      setTimeout(() => {
        alertBox.classList.remove('show');
      }, 3000);
    }

    function navigateTo(page) {
      window.location.href = `/${page}`;
    }

    function logout() {
      localStorage.removeItem('token');
      localStorage.removeItem('user');
      window.location.href = '/login';
    }
  </script>
</body>
</html>
