<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ستارتكيس - المسار الاستراتيجي</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #667eea;
            --primary-dark: #5a67d8;
            --secondary: #764ba2;
            --bg: #0f1117;
            --bg-card: #1a1d2e;
            --bg-card-hover: #232640;
            --text: #e2e8f0;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.08);
            --diagnosis: #4F46E5;
            --choice: #059669;
            --execution: #EA580C;
            --adaptation: #7C3AED;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            font-family: 'Tajawal', 'Segoe UI', sans-serif;
            color: var(--text);
            min-height: 100vh;
        }

        /* ===== NAVBAR ===== */
        .top-nav {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            padding: 14px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .top-nav .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            color: white;
            text-decoration: none;
            font-size: 20px;
            font-weight: 700;
        }

        .top-nav .nav-links {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .top-nav .nav-links a {
            color: rgba(255, 255, 255, 0.85);
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.2s;
        }

        .top-nav .nav-links a:hover,
        .top-nav .nav-links a.active {
            background: rgba(255, 255, 255, 0.15);
            color: white;
        }

        /* ===== HERO SECTION ===== */
        .hero {
            padding: 40px 30px 20px;
            text-align: center;
        }

        .hero h1 {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea, #a78bfa, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .hero p {
            color: var(--text-muted);
            font-size: 16px;
            max-width: 600px;
            margin: 0 auto;
        }

        /* ===== PROGRESS BAR ===== */
        .overall-progress {
            max-width: 700px;
            margin: 25px auto;
            background: var(--bg-card);
            border-radius: 16px;
            padding: 20px 25px;
            border: 1px solid var(--border);
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .progress-header span {
            font-size: 14px;
            color: var(--text-muted);
        }

        .progress-header strong {
            font-size: 22px;
            color: var(--text);
        }

        .progress-track {
            height: 10px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            border-radius: 10px;
            background: linear-gradient(90deg, var(--primary), #a78bfa);
            transition: width 0.8s ease;
            min-width: 0;
        }

        .progress-stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 12px;
        }

        .progress-stats .stat {
            text-align: center;
        }

        .progress-stats .stat-num {
            font-weight: 700;
            font-size: 18px;
            color: var(--text);
        }

        .progress-stats .stat-label {
            font-size: 12px;
            color: var(--text-muted);
        }

        /* ===== TOGGLE ===== */
        .toggle-row {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 20px 0;
        }

        .toggle-btn {
            padding: 8px 20px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 13px;
            font-family: inherit;
            transition: all 0.3s;
        }

        .toggle-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .toggle-btn:hover:not(.active) {
            border-color: var(--primary);
            color: var(--primary);
        }

        /* ===== PIPELINE ===== */
        .pipeline {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px 60px;
        }

        /* ===== PHASE ===== */
        .phase {
            margin-bottom: 40px;
            position: relative;
        }

        .phase-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            padding: 0 5px;
        }

        .phase-icon {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: white;
            flex-shrink: 0;
        }

        .phase-info h2 {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 2px;
        }

        .phase-info p {
            font-size: 13px;
            color: var(--text-muted);
            margin: 0;
        }

        .phase-badge {
            margin-right: auto;
            margin-left: 0;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        /* Phase connector */
        .phase:not(:last-child)::after {
            content: '';
            position: absolute;
            bottom: -25px;
            right: 28px;
            width: 2px;
            height: 30px;
            background: linear-gradient(to bottom, var(--border), transparent);
        }

        /* ===== TOOL CARDS ===== */
        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 16px;
        }

        .tool-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 22px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .tool-card::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            left: 0;
            height: 3px;
            transition: height 0.3s;
        }

        .tool-card:hover {
            transform: translateY(-4px);
            border-color: rgba(255, 255, 255, 0.15);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
        }

        .tool-card:hover::before {
            height: 4px;
        }

        .tool-card .card-top {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .tool-card .card-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: white;
        }

        .tool-card .card-status {
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }

        .tool-card h3 {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .tool-card .card-desc {
            font-size: 13px;
            color: var(--text-muted);
            line-height: 1.5;
            margin-bottom: 14px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .tool-card .card-progress {
            height: 4px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 8px;
        }

        .tool-card .card-progress-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.6s ease;
        }

        .tool-card .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            color: var(--text-muted);
        }

        .tool-card .card-footer .progress-text {
            font-weight: 600;
        }

        /* Status colors */
        .status-not-started {
            background: rgba(148, 163, 184, 0.15);
            color: #94a3b8;
        }

        .status-draft {
            background: rgba(148, 163, 184, 0.15);
            color: #94a3b8;
        }

        .status-in-progress {
            background: rgba(250, 204, 21, 0.15);
            color: #facc15;
        }

        .status-completed {
            background: rgba(34, 197, 94, 0.15);
            color: #22c55e;
        }

        /* Primary badge */
        .badge-primary-tool {
            position: absolute;
            top: 15px;
            left: 15px;
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 10px;
            background: rgba(250, 204, 21, 0.12);
            color: #facc15;
            font-weight: 600;
        }

        /* Advanced tool styling */
        .tool-card.is-advanced {
            opacity: 0.65;
            border-style: dashed;
        }

        .tool-card.is-advanced:hover {
            opacity: 1;
        }

        /* ===== SYNC BUTTON ===== */
        .sync-btn {
            position: fixed;
            bottom: 30px;
            left: 30px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            font-size: 22px;
            cursor: pointer;
            box-shadow: 0 6px 25px rgba(102, 126, 234, 0.4);
            transition: all 0.3s;
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .sync-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 35px rgba(102, 126, 234, 0.5);
        }

        .sync-btn.syncing i {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ===== VERSION SELECTOR ===== */
        .version-bar {
            max-width: 700px;
            margin: 0 auto 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .version-bar select {
            background: var(--bg-card);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 8px 16px;
            font-family: inherit;
            font-size: 14px;
            cursor: pointer;
            min-width: 250px;
        }

        .version-bar select:focus {
            outline: none;
            border-color: var(--primary);
        }

        /* ===== LOADING ===== */
        .loading-overlay {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 20px;
            gap: 15px;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        /* ===== EMPTY STATE ===== */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
        }

        .empty-state i {
            font-size: 64px;
            color: var(--text-muted);
            opacity: 0.3;
            margin-bottom: 20px;
        }

        .empty-state h3 {
            color: var(--text-muted);
            margin-bottom: 10px;
        }

        .empty-state p {
            color: var(--text-muted);
            opacity: 0.7;
        }

        /* ===== TOAST ===== */
        .toast-container {
            position: fixed;
            bottom: 100px;
            left: 30px;
            z-index: 200;
        }

        .toast-msg {
            background: var(--bg-card);
            color: var(--text);
            border: 1px solid var(--border);
            padding: 12px 20px;
            border-radius: 12px;
            font-size: 14px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
            animation: slideUp 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .hero h1 {
                font-size: 24px;
            }

            .top-nav {
                padding: 12px 15px;
            }

            .top-nav .nav-links {
                display: none;
            }

            .tools-grid {
                grid-template-columns: 1fr;
            }

            .pipeline {
                padding: 0 12px 60px;
            }

            .progress-stats {
                gap: 15px;
            }
        }
    </style>
</head>

<body>
    <!-- Navigation -->
    <nav class="top-nav">
        <a href="/dashboard" class="brand">
            <i class="bi bi-graph-up-arrow"></i> ستارتكيس
        </a>
        <div class="nav-links">
            <a href="/dashboard"><i class="bi bi-house"></i> الرئيسية</a>
            <a href="/kpis"><i class="bi bi-graph-up"></i> المؤشرات</a>
            <a href="/intelligence"><i class="bi bi-bell"></i> التنبيهات</a>
        </div>
    </nav>

    <!-- Hero -->
    <section class="hero">
        <h1><i class="bi bi-compass"></i> المسار الاستراتيجي</h1>
        <p>ابنِ استراتيجيتك خطوة بخطوة — من التشخيص إلى التكيف</p>
    </section>

    <!-- Version Selector -->
    <div class="version-bar">
        <i class="bi bi-clock-history" style="color: var(--text-muted);"></i>
        <select id="versionSelect">
            <option value="">اختر النسخة الاستراتيجية...</option>
        </select>
    </div>

    <!-- Overall Progress -->
    <div class="overall-progress" id="overallProgress" style="display:none;">
        <div class="progress-header">
            <span>التقدم الإجمالي</span>
            <strong id="progressPercent">0%</strong>
        </div>
        <div class="progress-track">
            <div class="progress-fill" id="progressBar" style="width: 0%"></div>
        </div>
        <div class="progress-stats">
            <div class="stat">
                <div class="stat-num" id="statTotal">0</div>
                <div class="stat-label">أداة</div>
            </div>
            <div class="stat">
                <div class="stat-num" id="statStarted" style="color: #facc15;">0</div>
                <div class="stat-label">قيد العمل</div>
            </div>
            <div class="stat">
                <div class="stat-num" id="statCompleted" style="color: #22c55e;">0</div>
                <div class="stat-label">مكتمل</div>
            </div>
        </div>
    </div>

    <!-- Toggle -->
    <div class="toggle-row" id="toggleRow" style="display:none;">
        <button class="toggle-btn active" data-filter="primary">⭐ الأدوات الأساسية</button>
        <button class="toggle-btn" data-filter="all">📋 جميع الأدوات</button>
    </div>

    <!-- Pipeline Content -->
    <div class="pipeline" id="pipelineContent">
        <div class="loading-overlay" id="loadingState">
            <div class="loading-spinner"></div>
            <span style="color: var(--text-muted);">جاري التحميل...</span>
        </div>
    </div>

    <!-- Sync Button -->
    <button class="sync-btn" id="syncBtn" title="مزامنة البيانات" style="display:none;">
        <i class="bi bi-arrow-repeat"></i>
    </button>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <script>
        // ===== STATE =====
        const state = {
            token: localStorage.getItem('token'),
            versionId: null,
            tools: [],
            analyses: {},
            filter: 'primary' // 'primary' or 'all'
        };

        // Phase config
        const PHASES = {
            DIAGNOSIS: { nameAr: 'التشخيص', icon: 'bi-search', color: '#4F46E5', desc: 'فهم الوضع الحالي والبيئة المحيطة' },
            CHOICE: { nameAr: 'الاختيار', icon: 'bi-signpost-split', color: '#059669', desc: 'تحديد الاتجاه الاستراتيجي والبدائل' },
            EXECUTION: { nameAr: 'التنفيذ', icon: 'bi-rocket-takeoff', color: '#EA580C', desc: 'ترجمة الاستراتيجية لأهداف ومبادرات' },
            ADAPTATION: { nameAr: 'التكيف', icon: 'bi-arrow-repeat', color: '#7C3AED', desc: 'المراجعة والتعديل والاستعداد للمستقبل' }
        };

        const STATUS_LABELS = {
            'NOT_STARTED': 'لم يبدأ',
            'DRAFT': 'مسودة',
            'IN_PROGRESS': 'قيد العمل',
            'COMPLETED': 'مكتمل',
            'ARCHIVED': 'مؤرشف'
        };

        // ===== API HELPERS =====
        async function api(url, opts = {}) {
            if (!state.token) { window.location.href = '/login'; return; }
            const res = await fetch(url, {
                ...opts,
                headers: { 'Authorization': `Bearer ${state.token}`, 'Content-Type': 'application/json', ...opts.headers }
            });
            if (res.status === 401) { window.location.href = '/login'; return; }
            if (!res.ok) throw new Error(`API ${res.status}: ${url}`);
            return res.json();
        }

        // ===== LOAD VERSIONS =====
        async function loadVersions() {
            try {
                const data = await api('/api/versions');
                const versions = data.versions || data || [];
                const select = document.getElementById('versionSelect');

                versions.forEach(v => {
                    const opt = document.createElement('option');
                    opt.value = v.id;
                    opt.textContent = `${v.name || 'النسخة ' + v.versionNumber} — ${v.entity?.legalName || ''}`;
                    select.appendChild(opt);
                });

                // Auto-select first
                if (versions.length > 0) {
                    select.value = versions[0].id;
                    state.versionId = versions[0].id;
                    loadPipeline();
                } else {
                    showEmptyState('لا توجد نسخ استراتيجية', 'أنشئ نسخة استراتيجية من صفحة النسخ لبدء المسار');
                }
            } catch (e) {
                console.error(e);
                showEmptyState('خطأ في التحميل', 'تأكد من تسجيل الدخول وصلاحية البيانات');
            }
        }

        // ===== LOAD PIPELINE =====
        async function loadPipeline() {
            if (!state.versionId) return;

            showLoading();

            try {
                // Load tools first (always available)
                const toolsData = await api('/api/tools');
                state.tools = toolsData?.tools || [];

                if (state.tools.length === 0) {
                    showEmptyState('لا توجد أدوات بعد', 'شغّل أمر: node prisma/seed-tools.js لبذر الأدوات');
                    return;
                }

                // Try loading analysis summary (may be disabled)
                state.analyses = {};
                let stats = {};
                try {
                    const summaryData = await api(`/api/company-analysis/summary/${state.versionId}`);
                    if (summaryData && summaryData.tools) {
                        summaryData.tools.forEach(t => {
                            state.analyses[t.code] = t;
                        });
                    }
                    stats = summaryData?.stats || {};
                } catch (analysisErr) {
                    console.warn('[Tools] Company analysis API not available, showing tools without progress:', analysisErr.message);
                }

                // Update progress bar
                updateProgress(stats);

                // Render pipeline
                renderPipeline();

                // Show controls
                document.getElementById('overallProgress').style.display = 'block';
                document.getElementById('toggleRow').style.display = 'flex';
                document.getElementById('syncBtn').style.display = 'flex';

            } catch (e) {
                console.error(e);
                showEmptyState('خطأ في تحميل المسار', e.message || 'تأكد من تسجيل الدخول');
            }
        }

        // ===== RENDER =====
        function renderPipeline() {
            const container = document.getElementById('pipelineContent');

            // Filter tools
            let tools = state.tools;
            if (state.filter === 'primary') {
                tools = tools.filter(t => t.isPrimary);
            }

            // Group by category
            const grouped = {};
            tools.forEach(t => {
                if (!grouped[t.category]) grouped[t.category] = [];
                grouped[t.category].push(t);
            });

            let html = '';

            ['DIAGNOSIS', 'CHOICE', 'EXECUTION', 'ADAPTATION'].forEach(phase => {
                const phaseTools = grouped[phase] || [];
                if (phaseTools.length === 0) return;

                const config = PHASES[phase];
                const completedInPhase = phaseTools.filter(t =>
                    state.analyses[t.code]?.status === 'COMPLETED'
                ).length;

                html += `
          <div class="phase">
            <div class="phase-header">
              <div class="phase-icon" style="background: ${config.color};">
                <i class="bi ${config.icon}"></i>
              </div>
              <div class="phase-info">
                <h2>${config.nameAr}</h2>
                <p>${config.desc}</p>
              </div>
              <span class="phase-badge" style="background: ${config.color}20; color: ${config.color};">
                ${completedInPhase}/${phaseTools.length} مكتمل
              </span>
            </div>
            <div class="tools-grid">
              ${phaseTools.map(t => renderToolCard(t, config.color)).join('')}
            </div>
          </div>
        `;
            });

            container.innerHTML = html;
        }

        function renderToolCard(tool, phaseColor) {
            const analysis = state.analyses[tool.code] || {};
            const status = analysis.status || 'NOT_STARTED';
            const progress = analysis.progress || 0;
            const color = tool.color || phaseColor;
            const isAdvanced = !tool.isPrimary;

            const statusClass = status === 'COMPLETED' ? 'status-completed' :
                status === 'IN_PROGRESS' ? 'status-in-progress' : 'status-draft';

            return `
        <div class="tool-card ${isAdvanced ? 'is-advanced' : ''}" 
             style="--card-color: ${color};" 
             onclick="openTool('${tool.code}')"
             data-code="${tool.code}">
          <div style="position:absolute;top:0;right:0;left:0;height:3px;background:${color};"></div>
          ${tool.isPrimary ? '<span class="badge-primary-tool">⭐ أساسية</span>' : ''}
          <div class="card-top">
            <div class="card-icon" style="background: ${color}20; color: ${color};">
              <i class="bi ${tool.icon || 'bi-tools'}"></i>
            </div>
            <span class="card-status ${statusClass}">${STATUS_LABELS[status]}</span>
          </div>
          <h3>${tool.nameAr}</h3>
          <p class="card-desc">${tool.descriptionAr || tool.descriptionEn || ''}</p>
          <div class="card-progress">
            <div class="card-progress-fill" style="width:${progress}%;background:${color};"></div>
          </div>
          <div class="card-footer">
            <span class="progress-text" style="color:${color};">${progress}%</span>
            <span>${tool.nameEn}</span>
          </div>
        </div>
      `;
        }

        // ===== PROGRESS =====
        function updateProgress(stats) {
            document.getElementById('progressPercent').textContent = (stats.overallProgress || 0) + '%';
            document.getElementById('progressBar').style.width = (stats.overallProgress || 0) + '%';
            document.getElementById('statTotal').textContent = stats.totalTools || 0;
            document.getElementById('statStarted').textContent = stats.started || 0;
            document.getElementById('statCompleted').textContent = stats.completed || 0;
        }

        // ===== SYNC =====
        async function doSync() {
            if (!state.versionId) return;

            const btn = document.getElementById('syncBtn');
            btn.classList.add('syncing');

            try {
                const result = await api(`/api/sync/${state.versionId}`, { method: 'POST' });

                // Count synced
                const synced = Object.values(result.results || {}).filter(r =>
                    r.status === 'CREATED' || r.status === 'UPDATED'
                ).length;

                showToast(`✅ تمت المزامنة — ${synced} أدوات محدثة`);
                loadPipeline(); // Refresh
            } catch (e) {
                showToast('❌ فشلت المزامنة');
            } finally {
                btn.classList.remove('syncing');
            }
        }

        // ===== OPEN TOOL =====
        function openTool(code) {
            // Save selected version for the detail page
            if (state.versionId) {
                localStorage.setItem('selectedVersionId', state.versionId);
            }
            // Navigate to universal tool detail page
            window.location.href = `/tool?code=${code}&v=${state.versionId || ''}`;
        }

        // ===== UI HELPERS =====
        function showLoading() {
            document.getElementById('pipelineContent').innerHTML = `
        <div class="loading-overlay">
          <div class="loading-spinner"></div>
          <span style="color: var(--text-muted);">جاري التحميل...</span>
        </div>`;
        }

        function showEmptyState(title, desc) {
            document.getElementById('pipelineContent').innerHTML = `
        <div class="empty-state">
          <i class="bi bi-compass"></i>
          <h3>${title}</h3>
          <p>${desc}</p>
        </div>`;
        }

        function showToast(msg) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast-msg';
            toast.innerHTML = msg;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // ===== EVENT LISTENERS =====
        document.getElementById('versionSelect').addEventListener('change', (e) => {
            state.versionId = e.target.value;
            if (state.versionId) loadPipeline();
        });

        document.getElementById('syncBtn').addEventListener('click', doSync);

        // Toggle buttons
        document.querySelectorAll('.toggle-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                state.filter = btn.dataset.filter;
                renderPipeline();
            });
        });

        // ===== INIT =====
        if (!state.token) {
            window.location.href = '/login';
        } else {
            loadVersions();
        }
    </script>
</body>

</html>
