<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ستارتكيس - الأدوات الاستراتيجية</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #667eea;
            --primary-dark: #5a67d8;
            --secondary: #764ba2;
            --bg: #0f1117;
            --bg-card: #1a1d2e;
            --bg-card-hover: #232640;
            --text: #e2e8f0;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* ===== LAYOUT ===== */
        .page-wrapper {
            margin-right: var(--sidebar-width, 260px);
            padding: 24px 30px 60px;
            transition: margin-right 0.3s;
        }

        @media (max-width: 768px) {
            .page-wrapper {
                margin-right: 0;
                padding: 16px 12px 60px;
            }
        }

        /* ===== HERO ===== */
        .hero {
            text-align: center;
            padding: 30px 30px 20px;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.08), rgba(118, 75, 162, 0.06));
            border-radius: 20px;
            border: 1px solid var(--border);
            margin-bottom: 24px;
        }

        .hero h1 {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 6px;
        }

        .hero p {
            font-size: 14px;
            color: var(--text-muted);
            max-width: 550px;
            margin: 0 auto;
            line-height: 1.7;
        }

        /* ===== VERSION BAR ===== */
        .version-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .version-bar select {
            background: var(--bg-card);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 8px 16px;
            font-family: inherit;
            font-size: 13px;
            cursor: pointer;
            min-width: 250px;
        }

        .version-bar select:focus {
            outline: none;
            border-color: var(--primary);
        }

        /* ===== SMART ADVISOR ===== */
        .smart-advisor {
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.08), rgba(102, 126, 234, 0.05));
            border: 1px solid rgba(139, 92, 246, 0.2);
            border-radius: 18px;
            padding: 22px 24px;
            margin-bottom: 24px;
            display: none;
        }

        .advisor-head {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 14px;
        }

        .advisor-icon {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            background: linear-gradient(135deg, #8b5cf6, #667eea);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }

        .advisor-head h3 {
            font-size: 16px;
            font-weight: 800;
        }

        .advisor-head small {
            font-size: 11px;
            color: var(--text-muted);
            display: block;
        }

        .advisor-recs {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 12px;
        }

        .advisor-rec {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            color: var(--text);
        }

        .advisor-rec:hover {
            background: rgba(102, 126, 234, 0.08);
            border-color: rgba(102, 126, 234, 0.2);
            transform: translateY(-2px);
        }

        .advisor-rec .rec-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .advisor-rec .rec-name {
            font-size: 13px;
            font-weight: 700;
        }

        .advisor-rec .rec-why {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .advisor-rec .rec-badge {
            margin-right: auto;
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 8px;
            font-weight: 700;
            flex-shrink: 0;
        }

        /* ===== OVERALL PROGRESS ===== */
        .overall-progress {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 18px 22px;
            border: 1px solid var(--border);
            margin-bottom: 20px;
            display: none;
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            font-size: 14px;
            font-weight: 700;
        }

        .progress-track {
            height: 8px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 12px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            border-radius: 8px;
            transition: width 0.8s ease;
        }

        .progress-stats {
            display: flex;
            gap: 24px;
            justify-content: center;
        }

        .progress-stats .stat {
            text-align: center;
        }

        .progress-stats .stat-num {
            font-weight: 700;
            font-size: 18px;
        }

        .progress-stats .stat-label {
            font-size: 12px;
            color: var(--text-muted);
        }

        /* ===== TOGGLE ===== */
        .toggle-row {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 22px;
        }

        .toggle-btn {
            padding: 7px 18px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 12px;
            font-family: inherit;
            transition: all 0.3s;
        }

        .toggle-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .toggle-btn:hover:not(.active) {
            border-color: var(--primary);
            color: var(--primary);
        }

        /* ===== PHASE ===== */
        .phase {
            margin-bottom: 28px;
            border: 1px solid var(--border);
            border-radius: 18px;
            overflow: hidden;
            background: var(--bg-card);
        }

        .phase-header {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 16px 22px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .phase-header:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .phase-num {
            width: 38px;
            height: 38px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            font-weight: 800;
            flex-shrink: 0;
            color: white;
        }

        .phase-info {
            flex: 1;
        }

        .phase-title {
            font-size: 16px;
            font-weight: 800;
        }

        .phase-desc {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .phase-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            flex-shrink: 0;
        }

        .phase-toggle {
            font-size: 18px;
            color: var(--text-muted);
            transition: transform 0.3s;
        }

        .phase.open .phase-toggle {
            transform: rotate(180deg);
        }

        .phase-body {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease;
        }

        .phase.open .phase-body {
            max-height: 3000px;
        }

        .phase-content {
            padding: 0 22px 22px;
        }

        /* ===== TOOL CARDS ===== */
        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 14px;
        }

        .tool-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 18px;
            cursor: pointer;
            transition: all 0.25s ease;
            position: relative;
            overflow: hidden;
            text-decoration: none;
            color: var(--text);
            display: block;
        }

        .tool-card::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            left: 0;
            height: 3px;
            transition: height 0.3s;
        }

        .tool-card:hover {
            transform: translateY(-3px);
            border-color: rgba(255, 255, 255, 0.12);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
            background: rgba(255, 255, 255, 0.04);
        }

        .tool-card:hover::before {
            height: 4px;
        }

        .card-top {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .card-icon {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .card-badges {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .card-status {
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 700;
        }

        .status-not-started {
            background: rgba(148, 163, 184, 0.12);
            color: #94a3b8;
        }

        .status-in-progress {
            background: rgba(250, 204, 21, 0.12);
            color: #facc15;
        }

        .status-completed {
            background: rgba(34, 197, 94, 0.12);
            color: #22c55e;
        }

        .badge-primary {
            font-size: 9px;
            padding: 2px 7px;
            border-radius: 8px;
            background: rgba(250, 204, 21, 0.1);
            color: #facc15;
            font-weight: 700;
        }

        .card-name {
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .card-when {
            font-size: 10px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .card-progress-bar {
            height: 3px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 8px;
        }

        .card-progress-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.6s;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-action {
            font-size: 11px;
            color: var(--primary);
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .card-info-btn {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .card-info-btn:hover {
            background: rgba(102, 126, 234, 0.1);
            color: var(--primary);
            border-color: var(--primary);
        }

        .tool-card.is-advanced {
            opacity: 0.6;
            border-style: dashed;
        }

        .tool-card.is-advanced:hover {
            opacity: 1;
        }

        /* ===== MODAL ===== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(6px);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-box {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            max-width: 500px;
            width: 100%;
            padding: 28px;
            position: relative;
            animation: modalIn 0.3s ease;
        }

        @keyframes modalIn {
            from {
                opacity: 0;
                transform: scale(0.95) translateY(10px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .modal-close {
            position: absolute;
            top: 14px;
            left: 14px;
            width: 32px;
            height: 32px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-close:hover {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
        }

        .modal-head {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 18px;
        }

        .modal-icon {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }

        .modal-title {
            font-size: 18px;
            font-weight: 800;
        }

        .modal-when {
            font-size: 11px;
            padding: 3px 10px;
            border-radius: 10px;
            font-weight: 700;
            display: inline-block;
            margin-top: 4px;
        }

        .modal-desc {
            font-size: 14px;
            color: var(--text-muted);
            line-height: 1.7;
            margin-bottom: 14px;
        }

        .modal-benefit {
            background: rgba(34, 197, 94, 0.06);
            border: 1px solid rgba(34, 197, 94, 0.12);
            border-radius: 10px;
            padding: 12px 16px;
            font-size: 13px;
            color: #22c55e;
            margin-bottom: 18px;
            display: flex;
            align-items: flex-start;
            gap: 8px;
        }

        .modal-btn {
            display: block;
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            font-family: inherit;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            transition: opacity 0.2s;
        }

        .modal-btn:hover {
            opacity: 0.9;
        }

        /* ===== LOADING ===== */
        .loading-overlay {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            gap: 12px;
        }

        .loading-spinner {
            width: 36px;
            height: 36px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .hero h1 {
                font-size: 22px;
            }

            .tools-grid {
                grid-template-columns: 1fr;
            }

            .advisor-recs {
                grid-template-columns: 1fr;
            }

            .progress-stats {
                gap: 16px;
            }
        }
    </style>
</head>

<body>
    <div class="page-wrapper">
        <!-- Hero -->
        <section class="hero">
            <h1><i class="bi bi-compass"></i> الأدوات الاستراتيجية</h1>
            <p>كل أداة لها مكانها في المسار — من التشخيص إلى التنفيذ. اضغط <i class="bi bi-info-circle"></i> لمعرفة
                التفاصيل.</p>
        </section>

        <!-- Version Selector -->
        <div class="version-bar">
            <i class="bi bi-clock-history" style="color: var(--text-muted);"></i>
            <select id="versionSelect">
                <option value="">اختر النسخة الاستراتيجية...</option>
            </select>
        </div>

        <!-- Smart Advisor -->
        <div class="smart-advisor" id="smartAdvisor">
            <div class="advisor-head">
                <div class="advisor-icon">💡</div>
                <div>
                    <h3>التوصية التالية</h3>
                    <small>بناءً على تقدمك في المسار الاستراتيجي</small>
                </div>
            </div>
            <div class="advisor-recs" id="advisorRecs"></div>
        </div>

        <!-- Overall Progress -->
        <div class="overall-progress" id="overallProgress">
            <div class="progress-header">
                <span>التقدم الإجمالي</span>
                <strong id="progressPercent">0%</strong>
            </div>
            <div class="progress-track">
                <div class="progress-fill" id="progressBar" style="width: 0%"></div>
            </div>
            <div class="progress-stats">
                <div class="stat">
                    <div class="stat-num" id="statTotal">0</div>
                    <div class="stat-label">أداة</div>
                </div>
                <div class="stat">
                    <div class="stat-num" id="statStarted" style="color: #facc15;">0</div>
                    <div class="stat-label">قيد العمل</div>
                </div>
                <div class="stat">
                    <div class="stat-num" id="statCompleted" style="color: #22c55e;">0</div>
                    <div class="stat-label">مكتمل</div>
                </div>
            </div>
        </div>

        <!-- Toggle -->
        <div class="toggle-row">
            <button class="toggle-btn active" data-filter="primary">⭐ الأساسية</button>
            <button class="toggle-btn" data-filter="all">📋 الكل</button>
        </div>

        <!-- Pipeline Content -->
        <div id="pipelineContent">
            <div class="loading-overlay">
                <div class="loading-spinner"></div>
                <span style="color: var(--text-muted);">جاري التحميل...</span>
            </div>
        </div>
    </div>

    <!-- Info Modal -->
    <div class="modal-overlay" id="toolModal">
        <div class="modal-box">
            <button class="modal-close" onclick="closeModal()"><i class="bi bi-x"></i></button>
            <div id="modalContent"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/sidebar.js"></script>
    <script src="/js/ai-advisor.js"></script>
    <script>
        // ===== STATE =====
        const state = {
            token: localStorage.getItem('token'),
            versionId: null,
            toolsData: null,  // from JSON
            analyses: {},     // from API
            filter: 'primary'
        };

        const STATUS_LABELS = {
            'NOT_STARTED': 'لم يبدأ',
            'DRAFT': 'مسودة',
            'IN_PROGRESS': 'قيد العمل',
            'COMPLETED': 'مكتمل'
        };

        // ===== AUTH =====
        if (!state.token) window.location.href = '/login.html';

        // ===== API HELPER =====
        async function apiCall(url) {
            const res = await fetch(url, {
                headers: { 'Authorization': `Bearer ${state.token}`, 'Content-Type': 'application/json' }
            });
            if (res.status === 401) { window.location.href = '/login.html'; return null; }
            if (!res.ok) return null;
            return res.json();
        }

        // ===== LOAD TOOLS DATA =====
        async function loadToolsData() {
            const res = await fetch('/tools-data.json');
            state.toolsData = await res.json();
        }

        // ===== LOAD VERSIONS =====
        async function loadVersions() {
            try {
                const data = await apiCall('/api/versions');
                const versions = data?.versions || data || [];
                const select = document.getElementById('versionSelect');

                versions.forEach(v => {
                    const opt = document.createElement('option');
                    opt.value = v.id;
                    opt.textContent = `${v.name || 'النسخة ' + v.versionNumber} — ${v.entity?.legalName || ''}`;
                    select.appendChild(opt);
                });

                if (versions.length > 0) {
                    select.value = versions[0].id;
                    state.versionId = versions[0].id;
                    loadPipeline();
                } else {
                    showEmpty('لا توجد نسخ استراتيجية', 'أنشئ نسخة استراتيجية من صفحة النسخ لبدء المسار');
                }
            } catch (e) {
                console.error(e);
                showEmpty('خطأ في التحميل', 'تأكد من تسجيل الدخول');
            }
        }

        // ===== LOAD PIPELINE =====
        async function loadPipeline() {
            if (!state.versionId) return;
            showLoading();

            try {
                // Load analysis status
                state.analyses = {};
                let stats = {};
                try {
                    const summaryData = await apiCall(`/api/company-analysis/summary/${state.versionId}`);
                    if (summaryData?.tools) {
                        summaryData.tools.forEach(t => { state.analyses[t.code] = t; });
                    }
                    stats = summaryData?.stats || {};
                } catch (e) { console.warn('[Tools] Analysis API not available'); }

                updateProgress(stats);
                renderPipeline();
                buildAdvisor();

                document.getElementById('overallProgress').style.display = 'block';
            } catch (e) {
                console.error(e);
                showEmpty('خطأ في تحميل المسار', e.message || '');
            }
        }

        // ===== RENDER PIPELINE =====
        function renderPipeline() {
            const container = document.getElementById('pipelineContent');
            const td = state.toolsData;
            if (!td) { showEmpty('خطأ', 'تعذر تحميل بيانات الأدوات'); return; }

            let html = '';

            td.phases.forEach(phase => {
                // Get tools for this phase
                const phaseTools = Object.entries(td.tools)
                    .filter(([_, t]) => t.phase === phase.id)
                    .filter(([_, t]) => state.filter === 'all' || t.isPrimary);

                if (phaseTools.length === 0) return;

                const completedCount = phaseTools.filter(([code]) =>
                    state.analyses[code]?.status === 'COMPLETED'
                ).length;

                html += `
                <div class="phase open">
                    <div class="phase-header" onclick="this.parentElement.classList.toggle('open')">
                        <div class="phase-num" style="background:${phase.color}">${phase.num}</div>
                        <div class="phase-info">
                            <div class="phase-title">${phase.title}</div>
                            <div class="phase-desc">${phase.desc}</div>
                        </div>
                        <span class="phase-badge" style="background:${phase.color}15;color:${phase.color}">${completedCount}/${phaseTools.length}</span>
                        <i class="bi bi-chevron-down phase-toggle"></i>
                    </div>
                    <div class="phase-body">
                        <div class="phase-content">
                            <div class="tools-grid">
                                ${phaseTools.map(([code, tool]) => renderCard(code, tool, phase.color)).join('')}
                            </div>
                        </div>
                    </div>
                </div>`;
            });

            container.innerHTML = html;
        }

        // ===== RENDER CARD =====
        function renderCard(code, tool, phaseColor) {
            const analysis = state.analyses[code] || {};
            const status = analysis.status || 'NOT_STARTED';
            const progress = analysis.progress || 0;
            const color = tool.color || phaseColor;
            const isAdvanced = !tool.isPrimary;

            const statusClass = status === 'COMPLETED' ? 'status-completed' :
                status === 'IN_PROGRESS' ? 'status-in-progress' : 'status-not-started';

            return `
            <div class="tool-card ${isAdvanced ? 'is-advanced' : ''}" style="--card-color:${color}">
                <div style="position:absolute;top:0;right:0;left:0;height:3px;background:${color};"></div>
                <div class="card-top">
                    <div class="card-icon" style="background:${color}15;color:${color}">${tool.icon}</div>
                    <div class="card-badges">
                        ${tool.isPrimary ? '<span class="badge-primary">⭐ أساسية</span>' : ''}
                        <span class="card-status ${statusClass}">${STATUS_LABELS[status]}</span>
                    </div>
                </div>
                <div class="card-name">${tool.name}</div>
                <div class="card-when">${tool.when}</div>
                <div class="card-progress-bar">
                    <div class="card-progress-fill" style="width:${progress}%;background:${color}"></div>
                </div>
                <div class="card-footer">
                    <a href="${tool.href}" class="card-action" onclick="event.stopPropagation()">
                        <i class="bi bi-arrow-left-circle-fill"></i> ${tool.action}
                    </a>
                    <button class="card-info-btn" onclick="event.preventDefault();event.stopPropagation();showGuide('${code}')" title="معلومات عن الأداة">
                        <i class="bi bi-info-circle"></i>
                    </button>
                </div>
            </div>`;
        }

        // ===== MODAL =====
        function showGuide(code) {
            const tool = state.toolsData?.tools[code];
            if (!tool) return;

            const color = tool.color || '#667eea';

            document.getElementById('modalContent').innerHTML = `
                <div class="modal-head">
                    <div class="modal-icon" style="background:${color}15;color:${color}">${tool.icon}</div>
                    <div>
                        <div class="modal-title">${tool.name}</div>
                        <span class="modal-when" style="background:${color}12;color:${color}">${tool.when}</span>
                    </div>
                </div>
                <div class="modal-desc">${tool.desc}</div>
                <div class="modal-benefit">✅ ${tool.benefit}</div>
                <a href="${tool.href}" class="modal-btn">
                    <i class="bi bi-arrow-left-circle-fill"></i> ${tool.action}
                </a>
            `;

            document.getElementById('toolModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('toolModal').classList.remove('active');
        }

        document.getElementById('toolModal').addEventListener('click', function (e) {
            if (e.target === this) closeModal();
        });

        document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

        // ===== SMART ADVISOR =====
        function buildAdvisor() {
            const td = state.toolsData;
            if (!td) return;

            // Define recommended order
            const ORDER = ['SWOT', 'INTERNAL_ENV', 'VALUE_CHAIN', 'DIRECTIONS', 'TOWS', 'OBJECTIVES', 'KPIS', 'INITIATIVES'];
            const recs = [];

            for (const code of ORDER) {
                if (recs.length >= 3) break;
                const analysis = state.analyses[code];
                const isDone = analysis?.status === 'COMPLETED';
                if (!isDone && td.tools[code]) {
                    recs.push({ code, ...td.tools[code] });
                }
            }

            if (recs.length === 0) {
                // All primary done — suggest advanced
                for (const [code, tool] of Object.entries(td.tools)) {
                    if (recs.length >= 3) break;
                    if (!tool.isPrimary && !state.analyses[code]?.status) {
                        recs.push({ code, ...tool });
                    }
                }
            }

            if (recs.length === 0) {
                document.getElementById('smartAdvisor').style.display = 'none';
                return;
            }

            const container = document.getElementById('advisorRecs');
            container.innerHTML = recs.map((r, i) => `
                <a href="${r.href}" class="advisor-rec">
                    <div class="rec-icon" style="background:${r.color}15;color:${r.color}">${r.icon}</div>
                    <div>
                        <div class="rec-name">${r.name}</div>
                        <div class="rec-why">${r.benefit}</div>
                    </div>
                    ${i === 0 ? '<span class="rec-badge" style="background:rgba(239,68,68,0.1);color:#ef4444">التالية</span>' : ''}
                </a>
            `).join('');

            document.getElementById('smartAdvisor').style.display = 'block';
        }

        // ===== PROGRESS =====
        function updateProgress(stats) {
            document.getElementById('progressPercent').textContent = (stats.overallProgress || 0) + '%';
            document.getElementById('progressBar').style.width = (stats.overallProgress || 0) + '%';
            document.getElementById('statTotal').textContent = stats.totalTools || 0;
            document.getElementById('statStarted').textContent = stats.started || 0;
            document.getElementById('statCompleted').textContent = stats.completed || 0;
        }

        // ===== UI HELPERS =====
        function showLoading() {
            document.getElementById('pipelineContent').innerHTML = `
                <div class="loading-overlay">
                    <div class="loading-spinner"></div>
                    <span style="color:var(--text-muted)">جاري التحميل...</span>
                </div>`;
        }

        function showEmpty(title, desc) {
            document.getElementById('pipelineContent').innerHTML = `
                <div style="text-align:center;padding:50px 20px;">
                    <div style="font-size:48px;opacity:0.2;margin-bottom:12px;">🧭</div>
                    <h3 style="color:var(--text-muted);margin-bottom:8px;">${title}</h3>
                    <p style="color:var(--text-muted);opacity:0.7;font-size:13px;">${desc}</p>
                </div>`;
        }

        // ===== EVENTS =====
        document.getElementById('versionSelect').addEventListener('change', e => {
            state.versionId = e.target.value;
            if (state.versionId) loadPipeline();
        });

        document.querySelectorAll('.toggle-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                state.filter = btn.dataset.filter;
                renderPipeline();
            });
        });

        // ===== INIT =====
        (async function init() {
            await loadToolsData();
            await loadVersions();
        })();
    </script>
</body>

</html>
