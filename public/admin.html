<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>برج المراقبة - Startix Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #0f0f23;
            color: #e0e0e0;
            min-height: 100vh;
        }

        /* ===== Top Bar ===== */
        .top-bar {
            background: linear-gradient(135deg, #1a1a3e 0%, #0f0f23 100%);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding: 12px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .top-bar .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 20px;
            font-weight: 700;
            color: #fff;
        }

        .top-bar .brand i {
            color: #7c3aed;
            font-size: 24px;
        }

        .top-bar .brand span.badge-admin {
            background: linear-gradient(135deg, #7c3aed, #a855f7);
            color: white;
            font-size: 10px;
            padding: 3px 10px;
            border-radius: 20px;
            font-weight: 600;
        }

        .top-bar .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .top-bar .user-info .name {
            font-weight: 500;
            color: #ccc;
        }

        .btn-logout {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.3);
            padding: 6px 16px;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            transition: all .2s;
        }

        .btn-logout:hover {
            background: #ef4444;
            color: white;
        }

        /* ===== Admin Sidebar ===== */
        .admin-sidebar {
            position: fixed;
            right: 0;
            top: 55px;
            width: 220px;
            height: calc(100vh - 55px);
            background: #13132e;
            border-left: 1px solid rgba(255, 255, 255, 0.06);
            padding: 20px 0;
            overflow-y: auto;
        }

        .admin-sidebar .section-title {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #666;
            padding: 8px 20px;
            margin-top: 10px;
        }

        .admin-sidebar a {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            color: #999;
            text-decoration: none;
            font-size: 13px;
            transition: all .2s;
            border-right: 3px solid transparent;
        }

        .admin-sidebar a:hover {
            color: #fff;
            background: rgba(124, 58, 237, 0.1);
        }

        .admin-sidebar a.active {
            color: #a855f7;
            background: rgba(124, 58, 237, 0.12);
            border-right-color: #7c3aed;
        }

        .admin-sidebar a i {
            font-size: 16px;
            width: 20px;
            text-align: center;
        }

        .admin-sidebar hr {
            border-color: rgba(255, 255, 255, 0.06);
            margin: 10px 20px;
        }

        /* ===== Main Content ===== */
        .main-content {
            margin-right: 220px;
            margin-top: 55px;
            padding: 30px;
        }

        .page-title {
            font-size: 24px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 5px;
        }

        .page-subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 25px;
        }

        /* ===== Stats Cards ===== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #1a1a3e, #13132e);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 12px;
            padding: 20px;
            transition: transform .2s;
        }

        .stat-card:hover {
            transform: translateY(-2px);
        }

        .stat-card .icon-wrap {
            width: 42px;
            height: 42px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            margin-bottom: 12px;
        }

        .stat-card .value {
            font-size: 28px;
            font-weight: 700;
            color: #fff;
        }

        .stat-card .label {
            font-size: 12px;
            color: #888;
            margin-top: 2px;
        }

        .bg-purple {
            background: rgba(124, 58, 237, 0.15);
            color: #a855f7;
        }

        .bg-green {
            background: rgba(34, 197, 94, 0.15);
            color: #22c55e;
        }

        .bg-blue {
            background: rgba(59, 130, 246, 0.15);
            color: #3b82f6;
        }

        .bg-orange {
            background: rgba(249, 115, 22, 0.15);
            color: #f97316;
        }

        .bg-red {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
        }

        .bg-cyan {
            background: rgba(6, 182, 212, 0.15);
            color: #06b6d4;
        }

        /* ===== Companies Table ===== */
        .section-card {
            background: #13132e;
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
        }

        .section-card h3 {
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 16px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead th {
            padding: 10px 14px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #666;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            text-align: right;
        }

        tbody td {
            padding: 12px 14px;
            font-size: 13px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }

        tbody tr:hover {
            background: rgba(124, 58, 237, 0.05);
        }

        .badge-plan {
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }

        .plan-TRIAL {
            background: rgba(249, 115, 22, 0.15);
            color: #f97316;
        }

        .plan-BASIC {
            background: rgba(59, 130, 246, 0.15);
            color: #3b82f6;
        }

        .plan-PRO {
            background: rgba(124, 58, 237, 0.15);
            color: #a855f7;
        }

        .plan-ENTERPRISE {
            background: rgba(34, 197, 94, 0.15);
            color: #22c55e;
        }

        .badge-status {
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }

        .status-ACTIVE {
            background: rgba(34, 197, 94, 0.15);
            color: #22c55e;
        }

        .status-INACTIVE {
            background: rgba(107, 114, 128, 0.15);
            color: #6b7280;
        }

        .status-TRIAL {
            background: rgba(249, 115, 22, 0.15);
            color: #f97316;
        }

        .status-SUSPENDED {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
        }

        .btn-view {
            background: rgba(124, 58, 237, 0.15);
            color: #a855f7;
            border: none;
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            transition: all .2s;
        }

        .btn-view:hover {
            background: #7c3aed;
            color: white;
        }

        .btn-add {
            background: linear-gradient(135deg, #7c3aed, #a855f7);
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all .2s;
        }

        .btn-add:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(124, 58, 237, 0.3);
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .empty-state i {
            font-size: 48px;
            margin-bottom: 10px;
            opacity: 0.3;
        }

        /* ===== Loading ===== */
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .loading .spinner-border {
            color: #7c3aed;
        }
    </style>
</head>

<body>
    <!-- Top Bar -->
    <div class="top-bar">
        <div class="brand">
            <i class="bi bi-shield-lock-fill"></i>
            Startix
            <span class="badge-admin">ADMIN</span>
        </div>
        <div class="user-info">
            <span class="name" id="adminName">مدير النظام</span>
            <button class="btn-logout" onclick="logout()">
                <i class="bi bi-box-arrow-left"></i> خروج
            </button>
        </div>
    </div>

    <!-- Admin Sidebar -->
    <div class="admin-sidebar">
        <div class="section-title">الرئيسية</div>
        <a href="/admin" class="active"><i class="bi bi-grid-1x2"></i> نظرة عامة</a>
        <hr>
        <div class="section-title">إدارة العملاء</div>
        <a href="/admin" id="navCompanies"><i class="bi bi-buildings"></i> الشركات</a>
        <a href="#" id="navSubscriptions"><i class="bi bi-credit-card"></i> الاشتراكات</a>
        <hr>
        <div class="section-title">النظام</div>
        <a href="#"><i class="bi bi-people"></i> كل المستخدمين</a>
        <a href="#"><i class="bi bi-activity"></i> سجل النشاط</a>
        <a href="#"><i class="bi bi-gear"></i> إعدادات النظام</a>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <h1 class="page-title">🏰 برج المراقبة</h1>
        <p class="page-subtitle">نظرة شاملة على كل الشركات والاشتراكات في النظام</p>

        <!-- Stats -->
        <div class="stats-grid" id="statsGrid">
            <div class="loading">
                <div class="spinner-border"></div><br>جاري التحميل...
            </div>
        </div>

        <!-- Companies Table -->
        <div class="section-card">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
                <h3><i class="bi bi-buildings"></i> الشركات المسجلة</h3>
                <button class="btn-add" onclick="showAddCompanyModal()"><i class="bi bi-plus-lg"></i> إضافة
                    شركة</button>
            </div>
            <div id="companiesTable">
                <div class="loading">
                    <div class="spinner-border"></div><br>جاري التحميل...
                </div>
            </div>
        </div>
    </div>

    <!-- Add Company Modal -->
    <div class="modal fade" id="addCompanyModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content" style="background:#1a1a3e;border:1px solid rgba(255,255,255,0.1);color:#e0e0e0;">
                <div class="modal-header" style="border-bottom:1px solid rgba(255,255,255,0.06);">
                    <h5 class="modal-title">إضافة شركة جديدة</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">اسم الشركة بالعربي *</label>
                        <input type="text" class="form-control" id="companyNameAr"
                            style="background:#13132e;border-color:rgba(255,255,255,0.1);color:#fff;">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">اسم الشركة بالإنجليزي</label>
                        <input type="text" class="form-control" id="companyNameEn"
                            style="background:#13132e;border-color:rgba(255,255,255,0.1);color:#fff;">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">الكود</label>
                        <input type="text" class="form-control" id="companyCode"
                            style="background:#13132e;border-color:rgba(255,255,255,0.1);color:#fff;"
                            placeholder="COMPANY01">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">البريد الإلكتروني</label>
                        <input type="email" class="form-control" id="companyEmail"
                            style="background:#13132e;border-color:rgba(255,255,255,0.1);color:#fff;">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">خطة الاشتراك</label>
                        <select class="form-select" id="companyPlan"
                            style="background:#13132e;border-color:rgba(255,255,255,0.1);color:#fff;">
                            <option value="TRIAL">تجريبي — Trial</option>
                            <option value="BASIC">أساسي — Basic</option>
                            <option value="PRO">احترافي — Pro</option>
                            <option value="ENTERPRISE">مؤسسات — Enterprise</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer" style="border-top:1px solid rgba(255,255,255,0.06);">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">إلغاء</button>
                    <button type="button" class="btn-add" onclick="createCompany()">إنشاء الشركة</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const token = localStorage.getItem('token');
        const user = JSON.parse(localStorage.getItem('user') || '{}');

        // تحقق من الصلاحية
        if (!token || user.systemRole !== 'SUPER_ADMIN') {
            window.location.href = '/login';
        }

        document.getElementById('adminName').textContent = user.name || 'مدير النظام';

        // ===== API Helper =====
        async function api(url, method = 'GET', body = null) {
            const opts = {
                method,
                headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
            };
            if (body) opts.body = JSON.stringify(body);
            const res = await fetch(url, opts);
            return res.json();
        }

        // ===== Load Stats =====
        async function loadStats() {
            try {
                const data = await api('/api/companies/stats/overview');
                if (!data.success) throw new Error(data.message);
                const s = data.data;
                document.getElementById('statsGrid').innerHTML = `
          <div class="stat-card">
            <div class="icon-wrap bg-purple"><i class="bi bi-buildings"></i></div>
            <div class="value">${s.totalCompanies}</div>
            <div class="label">إجمالي الشركات</div>
          </div>
          <div class="stat-card">
            <div class="icon-wrap bg-green"><i class="bi bi-check-circle"></i></div>
            <div class="value">${s.activeCompanies}</div>
            <div class="label">شركات نشطة</div>
          </div>
          <div class="stat-card">
            <div class="icon-wrap bg-orange"><i class="bi bi-clock-history"></i></div>
            <div class="value">${s.trialCompanies}</div>
            <div class="label">فترة تجريبية</div>
          </div>
          <div class="stat-card">
            <div class="icon-wrap bg-blue"><i class="bi bi-building"></i></div>
            <div class="value">${s.totalEntities}</div>
            <div class="label">إجمالي الكيانات</div>
          </div>
          <div class="stat-card">
            <div class="icon-wrap bg-cyan"><i class="bi bi-people"></i></div>
            <div class="value">${s.totalUsers}</div>
            <div class="label">إجمالي المستخدمين</div>
          </div>
          <div class="stat-card">
            <div class="icon-wrap bg-red"><i class="bi bi-exclamation-triangle"></i></div>
            <div class="value">${s.expiringSubscriptions}</div>
            <div class="label">اشتراكات تنتهي قريباً</div>
          </div>
        `;
            } catch (e) {
                document.getElementById('statsGrid').innerHTML = '<div class="empty-state"><i class="bi bi-exclamation-circle"></i><br>خطأ في تحميل الإحصائيات</div>';
            }
        }

        // ===== Load Companies =====
        async function loadCompanies() {
            try {
                const data = await api('/api/companies');
                if (!data.success) throw new Error(data.message);

                if (data.data.length === 0) {
                    document.getElementById('companiesTable').innerHTML = '<div class="empty-state"><i class="bi bi-buildings"></i><br>لا توجد شركات مسجلة بعد</div>';
                    return;
                }

                let rows = data.data.map(c => `
          <tr>
            <td style="font-weight:600;color:#fff;">${c.nameAr}</td>
            <td>${c.nameEn || '—'}</td>
            <td><code style="color:#a855f7;">${c.code || '—'}</code></td>
            <td><span class="badge-plan plan-${c.subscription?.plan || 'TRIAL'}">${c.subscription?.plan || 'TRIAL'}</span></td>
            <td><span class="badge-status status-${c.status}">${c.status === 'ACTIVE' ? 'نشط' : c.status}</span></td>
            <td>${c._count?.entities || 0}</td>
            <td>
              <button class="btn-view" onclick="viewAsCompany('${c.id}')">
                <i class="bi bi-eye"></i> دخول
              </button>
            </td>
          </tr>
        `).join('');

                document.getElementById('companiesTable').innerHTML = `
          <table>
            <thead>
              <tr>
                <th>الاسم بالعربي</th>
                <th>الاسم بالإنجليزي</th>
                <th>الكود</th>
                <th>الخطة</th>
                <th>الحالة</th>
                <th>الكيانات</th>
                <th>إجراء</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        `;
            } catch (e) {
                document.getElementById('companiesTable').innerHTML = '<div class="empty-state"><i class="bi bi-exclamation-circle"></i><br>خطأ في تحميل الشركات</div>';
            }
        }

        // ===== View As Company (Impersonation) =====
        function viewAsCompany(companyId) {
            // حفظ جلسة الـ Admin
            localStorage.setItem('adminToken', token);
            localStorage.setItem('adminUser', JSON.stringify(user));
            localStorage.setItem('impersonating', companyId);

            // الانتقال لواجهة العميل
            window.location.href = '/dashboard';
        }

        // ===== Create Company =====
        async function createCompany() {
            const nameAr = document.getElementById('companyNameAr').value.trim();
            const nameEn = document.getElementById('companyNameEn').value.trim();
            const code = document.getElementById('companyCode').value.trim();
            const email = document.getElementById('companyEmail').value.trim();
            const plan = document.getElementById('companyPlan').value;

            if (!nameAr) { alert('اسم الشركة بالعربي مطلوب'); return; }

            try {
                const data = await api('/api/companies', 'POST', { nameAr, nameEn, code, email, plan });
                if (data.success) {
                    bootstrap.Modal.getInstance(document.getElementById('addCompanyModal')).hide();
                    loadCompanies();
                    loadStats();
                } else {
                    alert(data.message || 'خطأ في الإنشاء');
                }
            } catch (e) {
                alert('خطأ في الاتصال');
            }
        }

        function showAddCompanyModal() {
            new bootstrap.Modal(document.getElementById('addCompanyModal')).show();
        }

        function logout() {
            localStorage.clear();
            window.location.href = '/login';
        }

        // ===== Initialize =====
        loadStats();
        loadCompanies();
    </script>
<script src="/sidebar.js"></script>
</body>

</html>
