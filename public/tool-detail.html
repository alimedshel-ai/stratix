<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ستارتكيس - أداة التحليل</title>
    <script>
        // Redirect SWOT to dedicated page
        if (new URLSearchParams(location.search).get('code') === 'SWOT') {
            location.replace('/swot.html');
        }
    </script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #667eea;
            --secondary: #764ba2;
            --bg: #0f1117;
            --bg-card: #1a1d2e;
            --bg-card-hover: #232640;
            --text: #e2e8f0;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.08);
            --tool-color: #4F46E5;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            font-family: 'Tajawal', 'Segoe UI', sans-serif;
            color: var(--text);
            min-height: 100vh;
        }

        /* NAVBAR */
        .top-nav {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            padding: 14px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .top-nav .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            color: white;
            text-decoration: none;
            font-size: 20px;
            font-weight: 700;
        }

        .top-nav .nav-links {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .top-nav .nav-links a {
            color: rgba(255, 255, 255, 0.85);
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.2s;
        }

        .top-nav .nav-links a:hover,
        .top-nav .nav-links a.active {
            background: rgba(255, 255, 255, 0.15);
            color: white;
        }

        /* BREADCRUMB */
        .breadcrumb-bar {
            padding: 15px 30px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            color: var(--text-muted);
        }

        .breadcrumb-bar a {
            color: var(--text-muted);
            text-decoration: none;
            transition: color 0.2s;
        }

        .breadcrumb-bar a:hover {
            color: var(--primary);
        }

        .breadcrumb-bar .sep {
            opacity: 0.4;
        }

        .breadcrumb-bar .current {
            color: var(--text);
            font-weight: 600;
        }

        /* TOOL HEADER */
        .tool-header {
            padding: 20px 30px 30px;
            max-width: 1100px;
            margin: 0 auto;
        }

        .tool-header-top {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .tool-icon-lg {
            width: 64px;
            height: 64px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: white;
            flex-shrink: 0;
        }

        .tool-title-area h1 {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 4px;
        }

        .tool-title-area .tool-en {
            font-size: 14px;
            color: var(--text-muted);
        }

        .tool-meta {
            display: flex;
            gap: 12px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .tool-meta .meta-badge {
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        /* PROGRESS CARD */
        .progress-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px 25px;
            margin-bottom: 25px;
            max-width: 1100px;
            margin-left: auto;
            margin-right: auto;
        }

        .progress-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .progress-row .status-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .progress-track {
            height: 8px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 8px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            border-radius: 8px;
            transition: width 0.6s ease;
        }

        .progress-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .btn-tool {
            padding: 10px 24px;
            border-radius: 10px;
            border: none;
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-tool-primary {
            background: var(--tool-color);
            color: white;
        }

        .btn-tool-primary:hover {
            filter: brightness(1.15);
            transform: translateY(-1px);
        }

        .btn-tool-secondary {
            background: rgba(255, 255, 255, 0.06);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-tool-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        /* CONTENT AREA */
        .content-area {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 30px 60px;
        }

        /* SECTIONS GRID */
        .sections-grid {
            display: grid;
            gap: 16px;
        }

        .sections-grid.grid-2 {
            grid-template-columns: repeat(2, 1fr);
        }

        .sections-grid.grid-3 {
            grid-template-columns: repeat(3, 1fr);
        }

        .sections-grid.grid-4 {
            grid-template-columns: repeat(2, 1fr);
        }

        .section-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.3s;
        }

        .section-card:hover {
            border-color: rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
        }

        .section-header {
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
        }

        .section-header h3 {
            font-size: 16px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-header .count-badge {
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .section-body {
            padding: 16px 20px;
            min-height: 120px;
        }

        /* ITEMS LIST */
        .item-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .item-list li {
            padding: 10px 14px;
            border-radius: 10px;
            margin-bottom: 8px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.04);
            transition: all 0.2s;
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }

        .item-list li:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: var(--border);
        }

        .item-list .item-icon {
            flex-shrink: 0;
            margin-top: 2px;
            font-size: 14px;
        }

        .item-list .item-content {
            flex: 1;
        }

        .item-list .item-title {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 2px;
        }

        .item-list .item-desc {
            font-size: 12px;
            color: var(--text-muted);
        }

        .item-list .item-impact {
            flex-shrink: 0;
            padding: 2px 10px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 600;
        }

        .impact-HIGH {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
        }

        .impact-MEDIUM {
            background: rgba(250, 204, 21, 0.15);
            color: #facc15;
        }

        .impact-LOW {
            background: rgba(34, 197, 94, 0.15);
            color: #22c55e;
        }

        /* ADD ITEM FORM */
        .add-item-row {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }

        .add-item-row input {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 14px;
            color: var(--text);
            font-family: inherit;
            font-size: 13px;
        }

        .add-item-row input:focus {
            outline: none;
            border-color: var(--tool-color);
        }

        .add-item-row input::placeholder {
            color: var(--text-muted);
            opacity: 0.6;
        }

        .add-item-row button {
            padding: 8px 14px;
            border-radius: 8px;
            border: none;
            background: var(--tool-color);
            color: white;
            font-family: inherit;
            font-size: 13px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .add-item-row button:hover {
            filter: brightness(1.15);
        }

        /* SUMMARY CARD */
        .summary-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            margin-top: 20px;
        }

        .summary-card h3 {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .summary-text {
            font-size: 14px;
            color: var(--text-muted);
            line-height: 1.8;
            background: rgba(255, 255, 255, 0.03);
            padding: 15px;
            border-radius: 10px;
        }

        /* EMPTY STATE */
        .empty-section {
            text-align: center;
            padding: 30px 10px;
            color: var(--text-muted);
        }

        .empty-section i {
            font-size: 36px;
            opacity: 0.3;
            margin-bottom: 10px;
            display: block;
        }

        .empty-section p {
            font-size: 13px;
            opacity: 0.6;
        }

        /* LOADING */
        .loading-overlay {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 20px;
            gap: 15px;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* TOAST */
        .toast-container {
            position: fixed;
            bottom: 30px;
            left: 30px;
            z-index: 200;
        }

        .toast-msg {
            background: var(--bg-card);
            color: var(--text);
            border: 1px solid var(--border);
            padding: 12px 20px;
            border-radius: 12px;
            font-size: 14px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
            animation: slideUp 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 8px;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .tool-header {
                padding: 15px;
            }

            .content-area {
                padding: 0 15px 40px;
            }

            .sections-grid.grid-2,
            .sections-grid.grid-3,
            .sections-grid.grid-4 {
                grid-template-columns: 1fr;
            }

            .tool-header-top {
                flex-direction: column;
                text-align: center;
            }

            .top-nav .nav-links {
                display: none;
            }

            .progress-actions {
                flex-direction: column;
            }
        }

        @keyframes pulse-plan {

            0%,
            100% {
                box-shadow: 0 0 0 0 rgba(124, 58, 237, 0.2);
            }

            50% {
                box-shadow: 0 0 0 6px rgba(124, 58, 237, 0);
            }
        }
    </style>
</head>

        // ===== API =====
        async function api(url, opts = {}) {
            if (!state.token) { window.location.href = '/login'; return; }
            const res = await fetch(url, {
                ...opts,
                headers: { 'Authorization': `Bearer ${state.token}`, 'Content-Type': 'application/json', ...opts.headers }
            });
            if (res.status === 401) { window.location.href = '/login'; return; }
            if (!res.ok) throw new Error(`API ${res.status}: ${url}`);
            return res.json();
        }

        // ===== INIT =====
        async function init() {
            if (!state.token) { window.location.href = '/login'; return; }
            if (!state.toolCode) { window.location.href = '/tools'; return; }

            try {
                // Load tool definition
                const toolData = await api(`/api/tools/${state.toolCode}`);
                state.tool = toolData.tool || toolData;

                if (!state.tool || !state.tool.code) {
                    window.location.href = '/tools';
                    return;
                }

                // Set page title
                document.title = `ستارتكيس - ${state.tool.nameAr}`;

                // If no versionId, try to get first version
                if (!state.versionId) {
                    try {
                        const vData = await api('/api/versions');
                        const versions = vData.versions || vData || [];
                        if (Array.isArray(versions) && versions.length > 0) {
                            state.versionId = versions[0].id;
                            localStorage.setItem('selectedVersionId', state.versionId);
                        }
                    } catch (vErr) {
                        console.warn('Could not load versions:', vErr.message);
                    }
                }

                // Render header
                renderHeader();

                // Load analysis data
                if (state.versionId) {
                    await loadAnalysis();
                }

                // Render the tool content
                renderContent();

                // Render diagnosis journey bar (if diagnosis tool)
                if (['SWOT', 'PESTEL', 'PORTER', 'VALUE_CHAIN', 'CORE_COMPETENCY', 'CUSTOMER_JOURNEY'].includes(state.toolCode)) {
                    await renderDiagnosisJourney();
                }

            } catch (e) {
                console.error('Init error:', e);
                document.getElementById('contentArea').innerHTML = `
          <div style="text-align:center;padding:60px;color:var(--text-muted);">
            <i class="bi bi-exclamation-triangle" style="font-size:48px;opacity:0.3;"></i>
            <h3 style="margin-top:15px;">خطأ في التحميل</h3>
            <p>${e.message}</p>
            <a href="/tools" style="color:var(--primary);">العودة للمسار</a>
          </div>`;
            }
        }

        // ===== LOAD ANALYSIS =====
        async function loadAnalysis() {
            try {
                const data = await api(`/api/company-analysis/version/${state.versionId}/${state.toolCode}`);
                if (data && !data.error) {
                    state.analysis = data;
                }
            } catch (e) {
                console.log('No analysis found yet');
            }
        }

        // ===== RENDER HEADER =====
        // ===== DIAGNOSIS JOURNEY BAR =====
        async function renderDiagnosisJourney() {
            const diagTools = [
                { code: 'SWOT', name: 'تحليل SWOT', icon: '📊', color: '#22c55e' },
                { code: 'INTERNAL_ENV', name: 'البيئة الداخلية', icon: '🏢', color: '#0D9488', href: '/internal-env.html' },
                { code: 'PESTEL', name: 'تحليل PESTEL', icon: '🌍', color: '#0891b2' },
                { code: 'PORTER', name: 'قوى Porter', icon: '⚔️', color: '#f59e0b' },
                { code: 'VALUE_CHAIN', name: 'سلسلة القيمة', icon: '🔗', color: '#0891B2' },
                { code: 'CORE_COMPETENCY', name: 'القدرات الجوهرية', icon: '🏆', color: '#D97706' },
                { code: 'CUSTOMER_JOURNEY', name: 'رحلة العميل', icon: '🚶', color: '#DB2777' },
            ];

            // Load progress for each tool
            const toolProgress = {};
            if (state.versionId) {
                for (const dt of diagTools) {
                    try {
                        const res = await api(`/api/company-analysis/version/${state.versionId}/${dt.code}`);
                        toolProgress[dt.code] = res?.progress || 0;
                    } catch { toolProgress[dt.code] = 0; }
                }
            }

            // Build journey steps
            const stepsEl = document.getElementById('journeySteps');
            let html = '';
            let completedCount = 0;

            diagTools.forEach((dt, i) => {
                const prog = toolProgress[dt.code] || 0;
                const isCurrent = dt.code === state.toolCode;
                const isDone = prog >= 80;
                if (isDone) completedCount++;

                let bg, border, textColor, statusText;
                if (isDone) {
                    bg = `${dt.color}15`;
                    border = `${dt.color}40`;
                    textColor = dt.color;
                    statusText = `<span style="font-size:10px;color:${dt.color};font-weight:700">✅ مكتمل</span>`;
                } else if (isCurrent) {
                    bg = 'rgba(102,126,234,0.1)';
                    border = 'rgba(102,126,234,0.4)';
                    textColor = '#667eea';
                    statusText = `<span style="font-size:10px;color:#667eea;font-weight:700">👈 أنت هنا${prog > 0 ? ` (${prog}%)` : ''}</span>`;
                } else {
                    bg = 'rgba(255,255,255,0.02)';
                    border = 'var(--border)';
                    textColor = 'var(--text-muted)';
                    statusText = prog > 0
                        ? `<span style="font-size:10px;color:var(--text-muted)">${prog}%</span>`
                        : `<span style="font-size:10px;color:var(--text-muted)">لم يبدأ</span>`;
                }

                const href = isCurrent ? '#' : (dt.href || `/tool-detail.html?code=${dt.code}`);

                html += `
                    <a href="${href}" style="display:flex;align-items:center;gap:8px;padding:10px 16px;border-radius:12px;background:${bg};border:1.5px solid ${border};text-decoration:none;transition:all .3s;flex:1;min-width:140px;${isCurrent ? 'box-shadow:0 0 12px rgba(102,126,234,0.15);' : ''}">
                        <span style="font-size:18px">${dt.icon}</span>
                        <div style="flex:1">
                            <div style="font-size:12px;font-weight:700;color:${textColor}">${dt.name}</div>
                            ${statusText}
                        </div>
                    </a>
                `;

                // Arrow separator
                if (i < diagTools.length - 1) {
                    html += `<div style="font-size:14px;color:var(--text-muted);flex-shrink:0">←</div>`;
                }
            });

            // Planning phase indicator
            html += `<div style="font-size:14px;color:var(--text-muted);flex-shrink:0">←</div>`;
            if (completedCount >= 1) {
                html += `
                    <a href="/directions.html" style="display:flex;align-items:center;gap:8px;padding:10px 16px;border-radius:12px;background:rgba(124,58,237,0.1);border:2px solid rgba(124,58,237,0.3);text-decoration:none;transition:all .3s;flex:1;min-width:140px;animation:pulse-plan 2s ease-in-out infinite">
                        <span style="font-size:18px">🎯</span>
                        <div style="flex:1">
                            <div style="font-size:12px;font-weight:700;color:#7c3aed">التخطيط</div>
                            <span style="font-size:10px;color:#7c3aed;font-weight:700">جاهز! ابدأ الآن</span>
                        </div>
                        <i class="bi bi-arrow-left" style="color:#7c3aed;font-size:14px"></i>
                    </a>`;
            } else {
                html += `
                    <div style="display:flex;align-items:center;gap:8px;padding:10px 16px;border-radius:12px;background:rgba(255,255,255,0.02);border:1px solid var(--border);flex:1;min-width:140px;opacity:0.4">
                        <span style="font-size:18px">🔒</span>
                        <div style="flex:1">
                            <div style="font-size:12px;font-weight:600;color:var(--text-muted)">التخطيط</div>
                            <span style="font-size:10px;color:var(--text-muted)">أكمل تشخيص أولاً</span>
                        </div>
                    </div>`;
            }

            stepsEl.innerHTML = html;
            document.getElementById('diagnosisJourney').style.display = 'block';

            // Show planning CTA if ready
            if (completedCount >= 1) {
                document.getElementById('planningCTA').style.display = 'block';
            }
        }

        function renderHeader() {
            const tool = state.tool;
            const color = tool.color || '#667eea';
            const phase = PHASES[tool.category] || { nameAr: tool.category, color: '#667eea' };

            document.documentElement.style.setProperty('--tool-color', color);

            // Breadcrumb
            document.getElementById('breadcrumbPhase').textContent = phase.nameAr;
            document.getElementById('breadcrumbTool').textContent = tool.nameAr;

            // Icon
            const iconEl = document.getElementById('toolIcon');
            iconEl.style.background = color;
            iconEl.innerHTML = `<i class="bi ${tool.icon || 'bi-tools'}"></i>`;

            // Title
            document.getElementById('toolName').textContent = tool.nameAr;
            document.getElementById('toolNameEn').textContent = tool.nameEn;

            // Meta badges
            const metaEl = document.getElementById('toolMeta');
            metaEl.innerHTML = `
        <span class="meta-badge" style="background:${phase.color}20;color:${phase.color};">${phase.nameAr}</span>

      `;

            document.getElementById('toolHeader').style.display = 'block';

            // Progress
            const analysis = state.analysis;
            const status = analysis?.status || 'NOT_STARTED';
            const progress = analysis?.progress || 0;
            const statusInfo = STATUS_MAP[status] || STATUS_MAP['NOT_STARTED'];

            document.getElementById('statusDot').style.background = statusInfo.color;
            document.getElementById('statusText').textContent = statusInfo.label;
            document.getElementById('progressPercent').textContent = progress + '%';
            document.getElementById('progressBar').style.width = progress + '%';
            document.getElementById('progressBar').style.background = color;

            document.getElementById('progressCard').style.display = 'block';
        }

                    }
                }
            }

            html += `<div class="sections-grid ${config.grid}">`;

            config.sections.forEach(section => {
                const items = extractItems(data, section.key);
                const count = items.length;

                html += `
          <div class="section-card">
            <div class="section-header">
              <h3>
                <span style="color:${section.color};">${section.emoji}</span>
                ${section.nameAr}
              </h3>
              <span class="count-badge" style="background:${section.color}20;color:${section.color};">${count}</span>
            </div>
            <div class="section-body">
              ${count > 0 ? renderItems(items, section.color) : `
                <div class="empty-section">
                  <i class="bi ${section.icon}"></i>
                  <p>لا توجد بيانات بعد</p>
                </div>
              `}
              <div class="add-item-row">
                <input type="text" placeholder="أضف عنصراً جديداً..." 
                       id="input-${section.key}"
                       onkeydown="if(event.key==='Enter') addItem('${section.key}', this.value, '${section.color}')">
                <button onclick="addItem('${section.key}', document.getElementById('input-${section.key}').value, '${section.color}')">
                  <i class="bi bi-plus"></i>
                </button>
              </div>
            </div>
          </div>
        `;
            });

            html += '</div>';

            // Summary
            if (analysis?.summary) {
                html += `
          <div class="summary-card">
            <h3><i class="bi bi-file-text"></i> الملخص</h3>
            <div class="summary-text">${analysis.summary}</div>
          </div>
        `;
            }

            // ===== بانر الخطوة التالية (بعد اكتمال التحليل) =====
            const progress = state.analysis?.progress || 0;
            if (progress >= 80) {
                const nextSteps = generateSmartGuidance(tool.code, data, config);
                html += `
                <div style="margin-top:20px;background:linear-gradient(135deg,rgba(102,126,234,0.08),rgba(118,75,162,0.06));border:1px solid rgba(102,126,234,0.2);border-radius:18px;padding:28px;position:relative;overflow:hidden">
                    <div style="position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#667eea,#764ba2)"></div>
                    
                    <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
                        <div style="width:42px;height:42px;border-radius:12px;background:rgba(102,126,234,0.15);display:flex;align-items:center;justify-content:center;font-size:20px">🧭</div>
                        <div>
                            <div style="font-size:16px;font-weight:800;color:var(--text)">✅ أكملت ${tool.nameAr}! وش الخطوة الجاية؟</div>
                            <div style="font-size:12px;color:var(--text-muted)">بناءً على تحليلك — هذي توصياتنا:</div>
                        </div>
                    </div>

                    <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:18px">
                        ${nextSteps.insights.map(ins => `
                            <div style="display:flex;align-items:flex-start;gap:10px;padding:10px 14px;background:rgba(255,255,255,0.03);border-radius:10px;border:1px solid var(--border)">
                                <span style="font-size:16px;flex-shrink:0;margin-top:1px">${ins.icon}</span>
                                <div style="flex:1">
                                    <div style="font-size:13px;font-weight:700;color:var(--text)">${ins.title}</div>
                                    <div style="font-size:11px;color:var(--text-muted);margin-top:2px">${ins.desc}</div>
                                </div>
                                ${ins.action ? `<a href="${ins.action}" style="font-size:11px;padding:4px 12px;border-radius:8px;background:rgba(102,126,234,0.1);color:var(--primary);font-weight:700;text-decoration:none;white-space:nowrap;flex-shrink:0">${ins.actionLabel}</a>` : ''}
                            </div>
                        `).join('')}
                    </div>

                    <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
                        <a href="${nextSteps.nextLink}" style="display:inline-flex;align-items:center;gap:8px;padding:12px 28px;border-radius:12px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;text-decoration:none;font-weight:700;font-size:14px;box-shadow:0 4px 15px rgba(102,126,234,0.3);transition:all .3s">
                            <i class="bi bi-arrow-left"></i> ${nextSteps.nextLabel}
                        </a>
                        ${nextSteps.otherTools.length > 0 ? `
                            <span style="font-size:12px;color:var(--text-muted)">أو أكمل:</span>
                            ${nextSteps.otherTools.map(t => `
                                <a href="${t.href}" style="padding:8px 16px;border-radius:10px;background:rgba(255,255,255,0.04);border:1px solid var(--border);color:var(--text);text-decoration:none;font-size:12px;font-weight:600;transition:all .3s">${t.icon} ${t.name}</a>
                            `).join('')}
                        ` : ''}
                    </div>
                </div>`;
            }

            container.innerHTML = html;
        }

        // ===== توليد التوصيات الذكية =====
        function generateSmartGuidance(toolCode, data, config) {
            const insights = [];
            let nextLink = '/dashboard.html';
            let nextLabel = 'الخطوة التالية';
            let otherTools = [];

            if (toolCode === 'SWOT') {
                const strengths = extractItems(data, 'strengths');
                const weaknesses = extractItems(data, 'weaknesses');
                const opportunities = extractItems(data, 'opportunities');
                const threats = extractItems(data, 'threats');

                // تحليل ذكي للنتائج
                if (weaknesses.length > strengths.length) {
                    insights.push({
                        icon: '⚠️', title: `عندك ${weaknesses.length} نقاط ضعف مقابل ${strengths.length} قوة`,
                        desc: 'ركّز على معالجة نقاط الضعف الأكثر تأثيراً في خطتك الاستراتيجية',
                        action: '/directions.html', actionLabel: 'حدد توجهات'
                    });
                } else if (strengths.length > 0) {
                    insights.push({
                        icon: '💪', title: `عندك ${strengths.length} نقاط قوة — استغلها!`,
                        desc: 'ابنِ استراتيجيتك على نقاط قوتك الأساسية',
                        action: '/objectives.html', actionLabel: 'حدد أهداف'
                    });
                }

                if (opportunities.length > 0) {
                    const highOpp = opportunities.filter(o => o.impact === 'HIGH');
                    insights.push({
                        icon: '🌟', title: `${opportunities.length} فرصة متاحة${highOpp.length ? ` — ${highOpp.length} منها عالية التأثير` : ''}`,
                        desc: 'حوّل الفرص لمبادرات وأهداف قابلة للقياس',
                        action: '/initiatives.html', actionLabel: 'أنشئ مبادرة'
                    });
                }

                if (threats.length > 0) {
                    insights.push({
                        icon: '🔥', title: `${threats.length} تهديد يحتاج خطة مواجهة`,
                        desc: 'حدد خطط طوارئ للتهديدات الأكثر خطورة',
                        action: '/choices.html', actionLabel: 'خيارات ومخاطر'
                    });
                }

                // أدوات تشخيص إضافية (اختياري)
                otherTools = [
                    { icon: '🌍', name: 'عمّق: PESTEL', href: '/tool-detail.html?code=PESTEL' },
                    { icon: '⚔️', name: 'عمّق: Porter', href: '/tool-detail.html?code=PORTER' },
                ];

                nextLink = '/directions.html';
                nextLabel = 'ابدأ مرحلة التخطيط 🎯';

            } else if (toolCode === 'PESTEL') {
                const totalFactors = config.sections.reduce((sum, s) => sum + extractItems(data, s.key).length, 0);
                insights.push({
                    icon: '🌍', title: `حللت ${totalFactors} عامل خارجي`,
                    desc: 'هالعوامل تأثر على استراتيجيتك — خذها بالحسبان في التخطيط',
                    action: '/directions.html', actionLabel: 'حدد توجهات'
                });

                otherTools = [
                    { icon: '⚔️', name: 'عمّق: Porter', href: '/tool-detail.html?code=PORTER' },
                ];

                nextLink = '/directions.html';
                nextLabel = 'ابدأ مرحلة التخطيط 🎯';

            } else if (toolCode === 'PORTER') {
                const totalFactors = config.sections.reduce((sum, s) => sum + extractItems(data, s.key).length, 0);
                insights.push({
                    icon: '⚔️', title: `حللت ${totalFactors} قوة تنافسية`,
                    desc: 'الآن عندك صورة واضحة لبيئتك التنافسية — حان وقت التخطيط!',
                    action: '/directions.html', actionLabel: 'ابدأ التخطيط'
                });
                insights.push({
                    icon: '🎯', title: 'الخطوة التالية: حدد توجهاتك الاستراتيجية',
                    desc: 'بناءً على التشخيص — حدد التوجهات والأهداف',
                });

                nextLink = '/directions.html';
                nextLabel = 'ابدأ مرحلة التخطيط 🎯';
                otherTools = [];

            } else {
                // Default for any other tool
                insights.push({
                    icon: '✅', title: 'أكملت هالتحليل بنجاح!',
                    desc: 'استمر في بقية أدوات التشخيص أو انتقل للتخطيط',
                });
                nextLink = '/dashboard.html';
                nextLabel = 'الرجوع للوحة التحكم';
            }

            // Default insight
            if (insights.length === 0) {
                insights.push({
                    icon: '🧭', title: 'تحليلك جاهز',
                    desc: 'انتقل للخطوة التالية في مسارك الاستراتيجي',
                });
            }

            return { insights: insights.slice(0, 4), nextLink, nextLabel, otherTools };
        }

        function extractItems(data, key) {
            if (!data) return [];
            const val = data[key];
            if (Array.isArray(val)) return val;
            if (val && typeof val === 'object' && val.factors) return val.factors;
            return [];
        }

        // ===== CHECK IF SWOT DATA IS EMPTY =====
        function isDataEmpty(data, config) {
            if (!data || !config) return true;
            return config.sections.every(s => {
                const items = extractItems(data, s.key);
                return items.length === 0;
            });
        }

        // ===== BUILD SWOT FROM PAIN & AMBITION =====
        function buildSWOTFromPainAmbition() {
            const raw = localStorage.getItem('painAmbition');
            if (!raw) return null;

            let pa;
            try { pa = JSON.parse(raw); } catch (e) { return null; }
            if (!pa || (!pa.pains?.length && !pa.ambitions?.length)) return null;

            const data = { strengths: [], weaknesses: [], opportunities: [], threats: [] };

            // Pain → Weaknesses / Threats mapping
            const PAIN_MAP = {
                no_strategy: { section: 'weaknesses', title: 'لا توجد خطة استراتيجية مكتوبة', desc: 'الشركة تعمل بدون رؤية أو أهداف محددة' },
                no_measurement: { section: 'weaknesses', title: 'غياب مؤشرات قياس الأداء', desc: 'لا توجد KPIs — لا نعرف هل نتحسن أو نتراجع' },
                plan_vs_execution: { section: 'weaknesses', title: 'فجوة بين التخطيط والتنفيذ', desc: 'نخطط كثيرًا لكن التنفيذ يتأخر أو لا يتم' },
                team_alignment: { section: 'weaknesses', title: 'عدم توافق الفريق على الأولويات', desc: 'كل قسم يعمل بمعزل — لا توجد محاذاة استراتيجية' },
                market_pressure: { section: 'threats', title: 'ضغط تنافسي متزايد من السوق', desc: 'المنافسون يتقدمون بينما موقعنا غير واضح' },
                growth_stuck: { section: 'weaknesses', title: 'توقف النمو أو تراجع الإيرادات', desc: 'الإيرادات ثابتة أو منخفضة — نحتاج تشخيص السبب الجذري' }
            };

            // Ambition → Opportunities mapping
            const AMB_MAP = {
                clear_strategy: { title: 'فرصة بناء خطة استراتيجية متكاملة', desc: 'تحويل الرؤية لأهداف قابلة للقياس مع خارطة طريق' },
                data_decisions: { title: 'التحول لقرارات مبنية على البيانات', desc: 'Dashboard حي + KPIs مراقبة + تنبيهات ذكية' },
                team_ownership: { title: 'بناء فريق متحمس يعرف وجهته', desc: 'كل عضو يعرف دوره ومسؤوليته في تحقيق الاستراتيجية' },
                market_lead: { title: 'فرصة التفوق على المنافسين', desc: 'فهم السوق بعمق واستغلال الفرص قبل الآخرين' },
                sustainable_growth: { title: 'تحقيق نمو مستدام ومخطط', desc: 'توسع مدروس مبني على بيانات حقيقية' },
                execution_machine: { title: 'بناء نظام تنفيذ منتظم', desc: 'مبادرات ومشاريع ومهام متابعة ومقاسة بشكل مستمر' }
            };

            // Map pains
            if (pa.pains) {
                pa.pains.forEach(p => {
                    const mapped = PAIN_MAP[p];
                    if (mapped) {
                        data[mapped.section].push({ title: mapped.title, description: mapped.desc, impact: 'HIGH', source: 'pain_ambition' });
                    }
                });
            }

            // Map ambitions
            if (pa.ambitions) {
                pa.ambitions.forEach(a => {
                    const mapped = AMB_MAP[a];
                    if (mapped) {
                        data.opportunities.push({ title: mapped.title, description: mapped.desc, impact: 'MEDIUM', source: 'pain_ambition' });
                    }
                });
            }

            // Custom text → weaknesses/opportunities
            if (pa.painCustom && pa.painCustom.trim()) {
                data.weaknesses.push({ title: pa.painCustom.trim(), description: 'من وصف الألم المخصص', impact: 'HIGH', source: 'pain_ambition' });
            }
            if (pa.ambitionCustom && pa.ambitionCustom.trim()) {
                data.opportunities.push({ title: pa.ambitionCustom.trim(), description: 'من وصف الطموح المخصص', impact: 'MEDIUM', source: 'pain_ambition' });
            }

            // Context-based strengths (from depth data)
            if (pa.depth) {
                if (pa.depth.age === '7 - 15 سنة' || pa.depth.age === 'أكثر من 15 سنة') {
                    data.strengths.push({ title: 'خبرة طويلة في السوق', description: `الشركة تعمل منذ ${pa.depth.age}`, impact: 'HIGH', source: 'pain_ambition' });
                }
                if (pa.depth.teamSize === '51 - 200' || pa.depth.teamSize === 'أكثر من 200') {
                    data.strengths.push({ title: 'فريق عمل كبير ومتنوع', description: `حجم الفريق: ${pa.depth.teamSize} شخص`, impact: 'MEDIUM', source: 'pain_ambition' });
                }
                if (pa.depth.toolExp === 'Balanced Scorecard' || pa.depth.toolExp === 'برنامج إدارة مشاريع') {
                    data.strengths.push({ title: 'خبرة سابقة في أدوات الإدارة الاستراتيجية', description: `استخدام: ${pa.depth.toolExp}`, impact: 'MEDIUM', source: 'pain_ambition' });
                }
            }

            return { data };
        }

        // ===== AUTO-SAVE SUGGESTIONS =====
        async function autoSaveSuggestions(data) {
            if (!state.versionId) return;
            try {
                const payload = {
                    versionId: state.versionId,
                    toolCode: 'SWOT',
                    data: JSON.stringify(data),
                    status: 'IN_PROGRESS',
                    progress: 30,
                    summary: 'بيانات أولية من الألم والطموح — تحتاج مراجعة'
                };

                if (state.analysis?.id) {
                    await api(`/api/company-analysis/${state.analysis.id}`, {
                        method: 'PATCH',
                        body: JSON.stringify(payload)
                    });
                } else {
                    const result = await api('/api/company-analysis', {
                        method: 'POST',
                        body: JSON.stringify(payload)
                    });
                    if (result?.id) {
                        state.analysis = result;
                    }
                }
                console.log('✅ SWOT suggestions auto-saved');
            } catch (e) {
                console.warn('Could not auto-save suggestions:', e);
            }
        }

        // ===== CLEAR SUGGESTIONS =====
        async function clearSuggestions() {
            // Remove banner
            const banner = document.getElementById('painAmbitionBanner');
            if (banner) banner.remove();

            // Clear data and re-render
            if (state.analysis) {
                state.analysis.data = JSON.stringify({});
                state.analysis.parsedData = {};
            }
            renderContent();
        }

        // ===== MERGE PAIN/AMBITION INTO EXISTING SWOT =====
        async function mergePainAmbition() {
            const suggestions = buildSWOTFromPainAmbition();
            if (!suggestions) return;

            // Get current data
            let data = {};
            if (state.analysis?.parsedData) {
                data = { ...state.analysis.parsedData };
            } else if (state.analysis?.data) {
                try { data = typeof state.analysis.data === 'string' ? JSON.parse(state.analysis.data) : { ...state.analysis.data }; } catch (e) { }
            }

            // Merge each section
            ['strengths', 'weaknesses', 'opportunities', 'threats'].forEach(key => {
                if (!data[key]) data[key] = [];
                const newItems = suggestions.data[key] || [];
                newItems.forEach(item => {
                    // Don't add duplicates
                    const exists = data[key].some(existing => existing.title === item.title);
                    if (!exists) {
                        data[key].push(item);
                    }
                });
            });

            // Update state
            if (state.analysis) {
                state.analysis.data = JSON.stringify(data);
                state.analysis.parsedData = data;
            }

            // Save and re-render
            await autoSaveSuggestions(data);
            renderContent();
            showToast('✅ تم دمج بيانات الألم والطموح في SWOT');
        }

        function renderItems(items, color) {
            let html = '<ul class="item-list">';
            items.forEach((item, i) => {
                const title = item.title || item.factor || item.name || (typeof item === 'string' ? item : JSON.stringify(item));
                const desc = item.description || item.notes || '';
                const impact = item.impact || '';

                html += `
          <li>
            <span class="item-icon" style="color:${color};">●</span>
            <div class="item-content">
              <div class="item-title">${title}</div>
              ${desc ? `<div class="item-desc">${desc}</div>` : ''}
            </div>
            ${impact ? `<span class="item-impact impact-${impact}">${impact === 'HIGH' ? 'عالي' : impact === 'MEDIUM' ? 'متوسط' : 'منخفض'}</span>` : ''}
          </li>
        `;
            });
            html += '</ul>';
            return html;
        }

        // ===== ADD ITEM =====
        async function addItem(sectionKey, value, color) {
            if (!value || !value.trim()) return;
            if (!state.versionId) { showToast('❌ اختر نسخة استراتيجية أولاً'); return; }

            // Parse existing data
            let data = {};
            if (state.analysis?.parsedData) {
                data = { ...state.analysis.parsedData };
            } else if (state.analysis?.data) {
                try { data = typeof state.analysis.data === 'string' ? JSON.parse(state.analysis.data) : { ...state.analysis.data }; } catch (e) { }
            }

            // Add item
            if (!data[sectionKey]) data[sectionKey] = [];
            if (Array.isArray(data[sectionKey])) {
                data[sectionKey].push({ title: value.trim(), impact: 'MEDIUM' });
            }

            try {
                if (state.analysis?.id) {
                    // Update existing
                    const result = await api(`/api/company-analysis/${state.analysis.id}`, {
                        method: 'PATCH',
                        body: JSON.stringify({ data, status: 'IN_PROGRESS' })
                    });
                    state.analysis = { ...state.analysis, ...result, parsedData: data };
                } else {
                    // Create new
                    const result = await api('/api/company-analysis', {
                        method: 'POST',
                        body: JSON.stringify({
                            versionId: state.versionId,
                            toolCode: state.toolCode,
                            data,
                            status: 'IN_PROGRESS'
                        })
                    });
                    state.analysis = { ...result, parsedData: data };
                }

                showToast('✅ تمت الإضافة');
                renderHeader();
                renderContent();
            } catch (e) {
                showToast('❌ فشلت الإضافة');
                console.error(e);
            }
        }

        // ===== SYNC =====
        async function syncTool() {
            if (!state.versionId) { showToast('❌ اختر نسخة أولاً'); return; }

            const btn = document.getElementById('btnSync');
            btn.innerHTML = '<i class="bi bi-arrow-repeat" style="animation:spin 1s linear infinite;"></i> جاري المزامنة...';
            btn.disabled = true;

            try {
                // For direct-input tools: save local data first if exists
                const DIRECT_TOOLS = ['CUSTOMER_JOURNEY', 'VALUE_CHAIN', 'CORE_COMPETENCY'];
                if (DIRECT_TOOLS.includes(state.toolCode) && state.analysis?.parsedData) {
                    const data = state.analysis.parsedData;
                    const hasData = Object.keys(data).some(k => {
                        const v = data[k];
                        return Array.isArray(v) ? v.length > 0 : (v && typeof v === 'object' ? Object.keys(v).length > 0 : !!v);
                    });

                    if (hasData) {
                        // Ensure data is saved before syncing
                        if (state.analysis?.id) {
                            await api(`/api/company-analysis/${state.analysis.id}`, {
                                method: 'PATCH',
                                body: JSON.stringify({ data, status: 'IN_PROGRESS', progress: 50 })
                            });
                        } else {
                            const result = await api('/api/company-analysis', {
                                method: 'POST',
                                body: JSON.stringify({
                                    versionId: state.versionId,
                                    toolCode: state.toolCode,
                                    data,
                                    status: 'IN_PROGRESS',
                                    progress: 50
                                })
                            });
                            if (result?.id) state.analysis = { ...state.analysis, ...result, parsedData: data };
                        }
                    }
                }

                const result = await api(`/api/sync/${state.versionId}/${state.toolCode}`, { method: 'POST' });

                if (result.status === 'CREATED' || result.status === 'UPDATED' || result.status === 'SYNCED') {
                    showToast(`✅ تمت المزامنة — ${result.analysisStatus || result.status} (${result.progress}%)`);
                    await loadAnalysis();
                    renderHeader();
                    renderContent();
                } else if (result.status === 'NO_DATA') {
                    showToast('ℹ️ أضف بيانات أولاً ثم أعد المزامنة');
                } else {
                    showToast(`⚠️ ${result.message || 'نتيجة غير متوقعة'}`);
                }
            } catch (e) {
                showToast('❌ فشلت المزامنة');
            } finally {
                btn.innerHTML = '<i class="bi bi-arrow-repeat"></i> مزامنة البيانات';
                btn.disabled = false;
            }
        }

        // ===== TOAST =====
        function showToast(msg) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast-msg';
            toast.innerHTML = msg;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // ===== START =====
        init();
    </script>
</body>

</html>
