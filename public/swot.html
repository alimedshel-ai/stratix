<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ستارتكيس - تحليل SWOT</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #667eea;
            --secondary: #764ba2;
            --bg: #0f1117;
            --bg-card: #1a1d2e;
            --bg-card-hover: #232640;
            --text: #e2e8f0;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.08);
            --green: #22c55e;
            --red: #ef4444;
            --blue: #3b82f6;
            --orange: #f97316;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            font-family: 'Tajawal', sans-serif;
            color: var(--text);
            min-height: 100vh;
        }

        .top-nav {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            padding: 14px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .top-nav .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            color: white;
            text-decoration: none;
            font-size: 20px;
            font-weight: 700;
        }

        .user-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 14px;
        }

        .btn-logout {
            background: rgba(255, 255, 255, 0.15);
            border: none;
            color: white;
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            font-family: inherit;
        }

        .layout {
            display: flex;
            min-height: calc(100vh - 64px);
        }

        .sidebar {
            width: 280px;
            flex-shrink: 0;
        }

        .main-content {
            flex: 1;
            max-width: 900px;
            margin: 0 auto;
            padding: 30px;
        }

        /* HERO */
        .hero {
            background: linear-gradient(135deg, rgba(34, 197, 94, 0.10), rgba(59, 130, 246, 0.06));
            border: 1px solid rgba(34, 197, 94, 0.2);
            border-radius: 20px;
            padding: 32px;
            margin-bottom: 28px;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            left: 0;
            height: 3px;
            background: linear-gradient(90deg, #22c55e, #3b82f6, #f97316, #ef4444);
        }

        .hero h1 {
            font-size: 26px;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .hero p {
            font-size: 14px;
            color: var(--text-muted);
            line-height: 1.8;
        }

        /* WIZARD STEPS */
        .wizard-steps {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-bottom: 28px;
            flex-wrap: wrap;
        }

        .wiz-step {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 700;
            background: var(--bg-card);
            border: 1px solid var(--border);
            transition: all 0.3s;
            color: var(--text-muted);
        }

        .wiz-step.active {
            background: rgba(34, 197, 94, 0.1);
            border-color: rgba(34, 197, 94, 0.3);
            color: var(--green);
        }

        .wiz-step.done {
            background: rgba(34, 197, 94, 0.08);
            border-color: rgba(34, 197, 94, 0.2);
            color: #22c55e;
        }

        .wiz-step-num {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.06);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 800;
        }

        .wiz-step.active .wiz-step-num {
            background: rgba(34, 197, 94, 0.2);
        }

        .wiz-step.done .wiz-step-num {
            background: rgba(34, 197, 94, 0.2);
        }

        .wiz-arrow {
            color: var(--text-muted);
            font-size: 12px;
        }

        /* ANIMATIONS */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .wizard-screen {
            display: none;
            animation: fadeIn 0.4s ease;
        }

        .wizard-screen.active {
            display: block;
        }

        /* SECTION CARDS */
        .section-select {
            background: var(--bg-card);
            border: 2px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 14px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }

        .section-select:hover {
            background: var(--bg-card-hover);
            border-color: rgba(255, 255, 255, 0.12);
        }

        .section-select.active {
            border-color: var(--green);
            background: rgba(34, 197, 94, 0.06);
        }

        .section-select .sec-header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 8px;
        }

        .section-select .sec-emoji {
            font-size: 28px;
        }

        .section-select .sec-title {
            font-size: 16px;
            font-weight: 800;
        }

        .section-select .sec-desc {
            font-size: 12px;
            color: var(--text-muted);
        }

        .section-select .sec-count {
            position: absolute;
            top: 16px;
            left: 16px;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
        }

        /* QUESTION CARDS */
        .q-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 28px;
            margin-bottom: 16px;
            position: relative;
        }

        .q-card .q-num {
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 700;
            margin-bottom: 8px;
        }

        .q-card .q-text {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 6px;
            line-height: 1.7;
        }

        .q-card .q-hint {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 16px;
            padding: 8px 14px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
        }

        /* ANSWER OPTIONS */
        .answer-options {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .answer-chip {
            padding: 10px 20px;
            border-radius: 12px;
            border: 2px solid var(--border);
            background: var(--bg-card-hover);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            color: var(--text);
        }

        .answer-chip:hover {
            border-color: rgba(255, 255, 255, 0.2);
        }

        .answer-chip.selected {
            border-color: var(--green);
            background: rgba(34, 197, 94, 0.1);
            color: var(--green);
        }

        /* TEXT INPUT */
        .q-input {
            width: 100%;
            padding: 14px 18px;
            border-radius: 12px;
            border: 1.5px solid var(--border);
            background: rgba(255, 255, 255, 0.03);
            color: var(--text);
            font-family: inherit;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
            margin-top: 10px;
        }

        .q-input:focus {
            border-color: rgba(34, 197, 94, 0.4);
        }

        .q-input::placeholder {
            color: var(--text-muted);
        }

        /* NAVIGATION */
        .btn-q {
            padding: 14px 32px;
            border-radius: 14px;
            border: none;
            font-family: inherit;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .btn-q.next {
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: white;
            box-shadow: 0 4px 15px rgba(34, 197, 94, 0.3);
        }

        .btn-q.next:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .btn-q.back {
            background: rgba(255, 255, 255, 0.06);
            color: var(--text-muted);
            border: 1px solid var(--border);
        }

        .q-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 24px;
        }

        /* PROGRESS BAR */
        .progress-bar-wrap {
            background: rgba(255, 255, 255, 0.06);
            border-radius: 8px;
            height: 6px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            border-radius: 8px;
            transition: width 0.5s ease;
            background: linear-gradient(90deg, #22c55e, #3b82f6);
        }

        .progress-text {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 8px;
            text-align: center;
        }

        /* PRE-FILLED BANNER */
        .prefill-banner {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.08), rgba(118, 75, 162, 0.05));
            border: 1px solid rgba(102, 126, 234, 0.2);
            border-radius: 14px;
            padding: 16px 20px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .prefill-banner .pf-icon {
            font-size: 20px;
            flex-shrink: 0;
        }

        .prefill-banner .pf-text {
            flex: 1;
            font-size: 13px;
            color: var(--text);
        }

        .prefill-tag {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 700;
            background: rgba(102, 126, 234, 0.1);
            color: var(--primary);
        }

        /* RESULTS */
        .swot-matrix {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin-bottom: 24px;
        }

        .swot-quad {
            background: var(--bg-card);
            border-radius: 18px;
            border: 1px solid var(--border);
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        .swot-quad::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            left: 0;
            height: 3px;
        }

        .swot-quad.str::before {
            background: var(--green);
        }

        .swot-quad.wk::before {
            background: var(--red);
        }

        .swot-quad.opp::before {
            background: var(--blue);
        }

        .swot-quad.thr::before {
            background: var(--orange);
        }

        .swot-quad .sq-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 14px;
        }

        .swot-quad .sq-emoji {
            font-size: 22px;
        }

        .swot-quad .sq-title {
            font-size: 14px;
            font-weight: 800;
        }

        .swot-quad .sq-count {
            margin-right: auto;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
        }

        .swot-item {
            padding: 10px 14px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
            margin-bottom: 6px;
            font-size: 13px;
            line-height: 1.6;
            border-right: 3px solid;
            display: flex;
            align-items: flex-start;
            gap: 8px;
        }

        .swot-item .si-source {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 6px;
            white-space: nowrap;
            flex-shrink: 0;
            margin-top: 2px;
        }

        /* SCORE GAUGE */
        .score-section {
            text-align: center;
            margin-bottom: 28px;
        }

        .score-circle {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            margin: 0 auto 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            font-weight: 800;
            border: 4px solid;
        }

        .score-label {
            font-size: 16px;
            font-weight: 700;
        }

        .score-desc {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        /* RECOMMENDATIONS */
        .rec-card {
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.08), rgba(102, 126, 234, 0.05));
            border: 1px solid rgba(139, 92, 246, 0.2);
            border-radius: 18px;
            padding: 24px;
            margin-top: 20px;
        }

        @media (max-width: 640px) {
            .swot-matrix {
                grid-template-columns: 1fr;
            }

            .answer-options {
                flex-direction: column;
            }
        }

        /* COMPANY BADGE */
        .company-badge {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.10), rgba(118, 75, 162, 0.06));
            border: 1px solid rgba(102, 126, 234, 0.2);
            border-radius: 16px;
            padding: 16px 22px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .company-badge .cb-avatar {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: white;
            font-weight: 800;
            flex-shrink: 0;
        }

        .company-badge .cb-info {
            flex: 1;
        }

        .company-badge .cb-name {
            font-size: 16px;
            font-weight: 800;
        }

        .company-badge .cb-meta {
            font-size: 11px;
            color: var(--text-muted);
            display: flex;
            gap: 10px;
            margin-top: 4px;
            flex-wrap: wrap;
        }

        .company-badge .cb-tag {
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 10px;
            font-weight: 700;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid var(--border);
        }
    </style>
</head>

<body>
    <nav class="top-nav">
        <a href="/dashboard.html" class="brand"><i class="bi bi-gem"></i> ستارتكيس</a>
        <div class="user-area">
            <div class="user-avatar" id="userInitial">م</div>
            <button class="btn-logout" onclick="localStorage.clear(); location.href='/login.html'">
                <i class="bi bi-box-arrow-right"></i> خروج
            </button>
        </div>
    </nav>

    <div class="layout">
        <aside class="sidebar"></aside>
        <div class="main-content">

            <!-- Company/Entity Badge -->
            <div class="company-badge" id="companyBadge" style="display:none">
                <div class="cb-avatar" id="companyInitial">🏢</div>
                <div class="cb-info">
                    <div class="cb-name" id="companyName">جاري التحميل...</div>
                    <div class="cb-meta" id="companyMeta"></div>
                </div>
            </div>

            <!-- Hero -->
            <div class="hero">
                <h1>📊 تحليل SWOT</h1>
                <p id="heroDesc">حلّل نقاط القوة والضعف الداخلية + الفرص والتهديدات الخارجية — ٤ أقسام × ٤ أسئلة موجّهة
                    لكل قسم. الأجوبة تتحوّل تلقائياً لمصفوفة SWOT.</p>
            </div>

            <!-- Pre-fill banner -->
            <div id="prefillBanner" style="display:none"></div>

            <!-- Wizard Steps -->
            <div class="wizard-steps" id="wizSteps"></div>

            <!-- Progress -->
            <div class="progress-text" id="progressText"></div>
            <div class="progress-bar-wrap">
                <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
            </div>

            <div class="wizard-container">
                <!-- SCREEN 1: Questions -->
                <div class="wizard-screen active" id="screen1">
                    <div id="questionArea"></div>
                </div>

                <!-- SCREEN 2: Results -->
                <div class="wizard-screen" id="screen2">
                    <div id="resultsArea"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/sidebar.js"></script>
    <script src="/js/ai-advisor.js"></script>
    <script src="/js/stats-panel.js"></script>
    <script>if (typeof StatsPanel !== 'undefined') StatsPanel.init('SWOT');</script>

                        type: 'chips',
                        options: ['خدمة ما بعد البيع', 'التخصيص والتفصيل', 'خدمات الاشتراك', 'محتوى تعليمي', 'تطبيق جوال', 'بيانات وتحليلات'],
                        allowCustom: true
                    },
                    {

                        hint: 'فكّر في من يمكنك التعاون معه أو أين تتوسع',
                        type: 'text',
                        placeholder: 'اكتب الفرص المتاحة... (فصل بفاصلة)'
                    }
                ]
            },
            {
                id: 'threats', nameAr: 'التهديدات', emoji: '🔥', color: '#f97316', cssClass: 'thr',
                desc: 'المخاطر الخارجية التي قد تؤثر سلباً',
                questions: [
                    {
                        text: 'من أقوى منافسيك وكيف يهددونك؟',
                        hint: 'المنافسة الشديدة قد تقلص حصتك السوقية',
                        type: 'chips',
                        options: ['منافسون محليون أقوياء', 'دخول شركات عالمية', 'منافسة بالسعر', 'منتجات بديلة', 'منافسون رقميون', 'استحواذات'],
                        allowCustom: true
                    },
                    {
                        text: 'هل توجد تغييرات تنظيمية أو قانونية تؤثر عليك؟',
                        hint: 'التغييرات الحكومية والتنظيمية قد تكون فرصة أو تهديد',
                        type: 'chips',
                        options: ['لوائح جديدة', 'ضرائب إضافية', 'متطلبات ترخيص', 'قوانين عمالة', 'حماية المستهلك', 'أمن المعلومات'],
                        allowCustom: true
                    },
                    {
                        text: 'ما المخاطر الاقتصادية أو السوقية المحتملة؟',
                        hint: 'التضخم، الركود، تقلبات العملة، نقص الإمداد',
                        type: 'chips',
                        options: ['تضخم وارتفاع تكاليف', 'ركود اقتصادي', 'نقص في سلاسل الإمداد', 'تغيّر سلوك المستهلك', 'ارتفاع تكلفة العمالة', 'تقلبات أسعار الطاقة'],
                        allowCustom: true
                    },
                    {
                        text: 'ما التهديدات التقنية لنموذج عملك؟',
                        hint: 'التقنية قد تجعل منتجك أو خدمتك قديمة',
                        type: 'text',
                        placeholder: 'اكتب التهديدات التقنية... (فصل بفاصلة)'
                    }
                ]
            }
        ];

        // ============================================================
        //  STATE
        // ============================================================
        const state = {
            currentSection: 0,
            currentQuestion: 0,
            answers: {},  // { 'strengths_0': ['...'], 'strengths_1': ['...'], ... }
            prefilled: {}, // Items from pain/ambition
            versionId: localStorage.getItem('selectedVersionId') || null,
            entityId: null,
            analysisId: null,
            entityInfo: null // { legalName, displayName, sector, type, etc }
        };

        const token = localStorage.getItem('token');
        const totalQuestions = SWOT_SECTIONS.length * 4; // 16

        // ============================================================
        //  API HELPER
        // ============================================================
        async function api(url) {
            const res = await fetch(url, {
                headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' }
            });
            if (res.status === 401) { location.href = '/login.html'; return null; }
            if (!res.ok) return null;
            return res.json();
        }

        // ============================================================
        //  INIT
        // ============================================================
        async function init() {
            if (!token) { location.href = '/login.html'; return; }

            // Load sidebar
            if (typeof loadSidebar === 'function') loadSidebar();

            // Set user initial
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            if (user?.name) document.getElementById('userInitial').textContent = user.name.charAt(0);

            // 1. Load entity/company info from version
            await loadEntityInfo();

            // 2. Pull pain/ambition data from API
            await loadPainAmbitionData();

            // 3. Show pre-fill banner if we have data
            showPrefillBanner();

            // 4. Build wizard steps
            renderWizSteps();

            // 5. Show first question
            renderQuestion();
            updateProgress();

            // 6. Check existing SWOT analysis
            if (state.versionId) {
                try {
                    const existing = await api(`/api/company-analysis/version/${state.versionId}/SWOT`);
                    if (existing?.id) {
                        state.analysisId = existing.id;
                    }
                } catch (e) { console.warn('No existing SWOT:', e); }
            }
        }

        // ============================================================
        //  LOAD ENTITY/COMPANY INFO
        // ============================================================
        async function loadEntityInfo() {
            if (!state.versionId) return;

            try {
                // Get versions list which includes entity info
                const data = await api('/api/versions');
                if (!data?.versions?.length) return;

                // Find our version
                const version = data.versions.find(v => v.id === state.versionId) || data.versions[0];
                if (!version?.entity) return;

                const entity = version.entity;
                state.entityId = entity.id;
                state.entityInfo = entity;

                // Show company badge
                const badge = document.getElementById('companyBadge');
                badge.style.display = 'flex';

                const name = entity.legalName || entity.displayName || 'غير محدد';
                const initial = name.charAt(0);
                document.getElementById('companyInitial').textContent = initial;
                document.getElementById('companyName').textContent = name;

                // Meta tags
                let metaHtml = '';
                if (entity.displayName && entity.displayName !== entity.legalName) {
                    metaHtml += `<span class="cb-tag">📛 ${entity.displayName}</span>`;
                }
                if (entity.company?.nameAr) {
                    metaHtml += `<span class="cb-tag">🏢 ${entity.company.nameAr}</span>`;
                }
                if (version.name) {
                    metaHtml += `<span class="cb-tag">📋 ${version.name}</span>`;
                }
                metaHtml += `<span class="cb-tag" style="background:rgba(34,197,94,0.1);color:#22c55e">🔍 SWOT تحليل</span>`;
                document.getElementById('companyMeta').innerHTML = metaHtml;

                // Update hero with entity name
                document.getElementById('heroDesc').innerHTML = `
                    حلّل نقاط القوة والضعف الداخلية + الفرص والتهديدات الخارجية لـ <strong>${name}</strong> — ٤ أقسام × ٤ أسئلة موجّهة. الأجوبة تتحوّل تلقائياً لمصفوفة SWOT.
                `;

            } catch (e) {
                console.warn('Could not load entity info:', e);
            }
        }

        // ============================================================
        //  PAIN/AMBITION DATA LOADING (from API + localStorage fallback)
        // ============================================================
        async function loadPainAmbitionData() {
            let pa = null;

            // Try API first (entity metadata)
            if (state.entityId) {
                try {
                    const apiData = await api(`/api/user-progress/pain-ambition/${state.entityId}`);
                    if (apiData) pa = apiData;
                } catch (e) { console.warn('API pain-ambition not available:', e); }
            }

            // Fallback to localStorage
            if (!pa) {
                const raw = localStorage.getItem('painAmbition');
                if (raw) { try { pa = JSON.parse(raw); } catch (e) { } }
            }

            if (!pa) return;
            console.log('📦 Pain/Ambition data loaded:', pa);

            // Map pains to weaknesses/threats pre-fill
            const PAIN_MAP = {
                no_strategy: { section: 'weaknesses', text: 'لا توجد خطة استراتيجية مكتوبة' },
                no_measurement: { section: 'weaknesses', text: 'غياب مؤشرات قياس الأداء (KPIs)' },
                plan_vs_execution: { section: 'weaknesses', text: 'فجوة بين التخطيط والتنفيذ' },
                team_alignment: { section: 'weaknesses', text: 'عدم توافق الفريق على الأولويات' },
                market_pressure: { section: 'threats', text: 'ضغط تنافسي متزايد من السوق' },
                growth_stuck: { section: 'weaknesses', text: 'توقف النمو أو تراجع الإيرادات' }
            };

            // Map ambitions to opportunities pre-fill
            const AMB_MAP = {
                clear_strategy: { text: 'فرصة بناء خطة استراتيجية متكاملة' },
                data_decisions: { text: 'التحول لقرارات مبنية على البيانات' },
                team_ownership: { text: 'بناء فريق متحمس يعرف وجهته' },
                market_lead: { text: 'التفوق على المنافسين في السوق' },
                sustainable_growth: { text: 'تحقيق نمو مستدام ومخطط' },
                execution_machine: { text: 'بناء نظام تنفيذ منتظم' }
            };

            state.prefilled = { strengths: [], weaknesses: [], opportunities: [], threats: [] };

            // Map pains
            if (pa.pains) {
                pa.pains.forEach(p => {
                    const mapped = PAIN_MAP[p];
                    if (mapped) state.prefilled[mapped.section].push(mapped.text);
                });
            }

            // Map ambitions
            if (pa.ambitions) {
                pa.ambitions.forEach(a => {
                    const mapped = AMB_MAP[a];
                    if (mapped) state.prefilled.opportunities.push(mapped.text);
                });
            }

            // Custom text
            if (pa.painCustom?.trim()) state.prefilled.weaknesses.push(pa.painCustom.trim());
            if (pa.ambitionCustom?.trim()) state.prefilled.opportunities.push(pa.ambitionCustom.trim());

            // Also load swotSeeds from localStorage (saved by pain-ambition page)
            try {
                const seedsRaw = localStorage.getItem('swotSeeds');
                if (seedsRaw) {
                    const seeds = JSON.parse(seedsRaw);
                    if (seeds.weaknesses) {
                        seeds.weaknesses.forEach(w => {
                            if (!state.prefilled.weaknesses.includes(w)) state.prefilled.weaknesses.push(w);
                        });
                    }
                    if (seeds.threats) {
                        seeds.threats.forEach(t => {
                            if (!state.prefilled.threats.includes(t)) state.prefilled.threats.push(t);
                        });
                    }
                    console.log('📌 swotSeeds merged:', seeds);
                }
            } catch (e) { console.warn('swotSeeds parse error:', e); }

            // Context strengths from depth
            if (pa.depth) {
                if (pa.depth.age === '7 - 15 سنة' || pa.depth.age === 'أكثر من 15 سنة') {
                    state.prefilled.strengths.push('خبرة طويلة في السوق (' + pa.depth.age + ')');
                }
                if (pa.depth.teamSize === '51 - 200' || pa.depth.teamSize === 'أكثر من 200') {
                    state.prefilled.strengths.push('فريق عمل كبير ومتنوع (' + pa.depth.teamSize + ' شخص)');
                }
            }
        }

        function showPrefillBanner() {
            const pf = state.prefilled;
            if (!pf) return;

            const total = (pf.strengths?.length || 0) + (pf.weaknesses?.length || 0) + (pf.opportunities?.length || 0) + (pf.threats?.length || 0);
            if (total === 0) return;

            const banner = document.getElementById('prefillBanner');
            banner.style.display = 'flex';
            banner.className = 'prefill-banner';
            banner.innerHTML = `
                <div class="pf-icon">✅</div>
                <div class="pf-text">
                    <strong>تم دمج ${total} عنصر تلقائياً من بيانات الألم والطموح</strong> — هذه العناصر ستُضاف لنتائج SWOT عند الانتهاء.
                    <div style="margin-top:6px;display:flex;gap:6px;flex-wrap:wrap">
                        ${pf.strengths?.length ? `<span class="prefill-tag" style="background:rgba(34,197,94,0.1);color:#22c55e">💪 ${pf.strengths.length} قوة</span>` : ''}
                        ${pf.weaknesses?.length ? `<span class="prefill-tag" style="background:rgba(239,68,68,0.1);color:#ef4444">⚠️ ${pf.weaknesses.length} ضعف</span>` : ''}
                        ${pf.opportunities?.length ? `<span class="prefill-tag" style="background:rgba(59,130,246,0.1);color:#3b82f6">🌟 ${pf.opportunities.length} فرص</span>` : ''}
                        ${pf.threats?.length ? `<span class="prefill-tag" style="background:rgba(249,115,22,0.1);color:#f97316">🔥 ${pf.threats.length} تهديد</span>` : ''}
                    </div>
                </div>
            `;

            // Update hero
            document.getElementById('heroDesc').innerHTML = `
                لديك بيانات سابقة من <strong>الألم والطموح</strong>. أجب الأسئلة التالية لإكمال تحليل SWOT — وسنعرض لك كل شي مجمّع في المصفوفة النهائية.
            `;
        }

        // ============================================================
        //  WIZARD STEPS
        // ============================================================
        function renderWizSteps() {
            const el = document.getElementById('wizSteps');
            let html = '';
            SWOT_SECTIONS.forEach((sec, i) => {
                const isCurrent = i === state.currentSection;
                const isDone = i < state.currentSection;
                const cls = isDone ? 'done' : (isCurrent ? 'active' : '');
                html += `
                    <div class="wiz-step ${cls}" id="wizSec${i}">
                        <div class="wiz-step-num">${isDone ? '✓' : sec.emoji}</div>
                        ${sec.nameAr}
                    </div>
                `;
                if (i < SWOT_SECTIONS.length - 1) html += `<div class="wiz-arrow">←</div>`;
            });
            // Results step
            html += `<div class="wiz-arrow">←</div>`;
            html += `
                <div class="wiz-step ${state.currentSection >= SWOT_SECTIONS.length ? 'active' : ''}" id="wizResults">
                    <div class="wiz-step-num">📊</div>
                    النتائج
                </div>
            `;
            el.innerHTML = html;
        }

        // ============================================================
        //  PROGRESS
        // ============================================================
        function updateProgress() {
            const answered = Object.keys(state.answers).length;
            const pct = Math.round((answered / totalQuestions) * 100);
            document.getElementById('progressFill').style.width = pct + '%';
            document.getElementById('progressText').textContent = `${answered} / ${totalQuestions} سؤال  —  ${pct}%`;
        }

        // ============================================================
        //  RENDER QUESTION
        // ============================================================
        function renderQuestion() {
            const sec = SWOT_SECTIONS[state.currentSection];
            const qi = state.currentQuestion;
            const q = sec.questions[qi];
            const key = `${sec.id}_${qi}`;
            const existing = state.answers[key] || [];

            let html = `
                <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
                    <div style="width:42px;height:42px;border-radius:12px;background:${sec.color}20;display:flex;align-items:center;justify-content:center;font-size:20px">${sec.emoji}</div>
                    <div>
                        <div style="font-size:16px;font-weight:800;color:${sec.color}">${sec.nameAr}</div>
                        <div style="font-size:11px;color:var(--text-muted)">${sec.desc}</div>
                    </div>
                    <div style="margin-right:auto;font-size:11px;color:var(--text-muted)">سؤال ${qi + 1} من ${sec.questions.length}</div>
                </div>

                <div class="q-card">
                    <div class="q-num">القسم ${state.currentSection + 1}/${SWOT_SECTIONS.length} · سؤال ${qi + 1}</div>
                    <div class="q-text">${q.text}</div>
                    <div class="q-hint">💡 ${q.hint}</div>
            `;

            if (q.type === 'chips') {
                html += `<div class="answer-options">`;
                q.options.forEach(opt => {
                    const selected = existing.includes(opt) ? 'selected' : '';
                    html += `<div class="answer-chip ${selected}" onclick="toggleChip(this, '${key}')" data-value="${opt}">${opt}</div>`;
                });
                html += `</div>`;
                if (q.allowCustom) {
                    const customVal = existing.find(v => !q.options.includes(v)) || '';
                    html += `<input type="text" class="q-input" id="customInput_${key}" placeholder="أو اكتب إجابتك الخاصة..." value="${customVal}" onchange="addCustomAnswer('${key}', this.value)">`;
                }
            } else {
                const textVal = existing.join('، ') || '';
                html += `<textarea class="q-input" id="textInput_${key}" placeholder="${q.placeholder}" rows="3" onchange="setTextAnswer('${key}', this.value)">${textVal}</textarea>`;
            }

            html += `</div>`; // close q-card

            // Navigation
            const globalIdx = state.currentSection * 4 + state.currentQuestion;
            const isFirst = globalIdx === 0;
            const isLast = state.currentSection === SWOT_SECTIONS.length - 1 && qi === 3;

            html += `
                <div class="q-nav">
                    <button class="btn-q back" onclick="prevQuestion()" ${isFirst ? 'style="visibility:hidden"' : ''}>
                        <i class="bi bi-arrow-right"></i> السابق
                    </button>
                    <button class="btn-q next" onclick="${isLast ? 'showResults()' : 'nextQuestion()'}">
                        ${isLast ? 'عرض النتائج 📊' : 'التالي'} <i class="bi bi-arrow-left"></i>
                    </button>
                </div>
            `;

            document.getElementById('questionArea').innerHTML = html;
        }

        // ============================================================
        //  ANSWER HANDLING
        // ============================================================
        function toggleChip(el, key) {
            el.classList.toggle('selected');
            // Collect all selected chips
            const container = el.parentElement;
            const selected = [...container.querySelectorAll('.answer-chip.selected')].map(c => c.dataset.value);
            state.answers[key] = selected;

            // Add custom if exists
            const customInput = document.getElementById(`customInput_${key}`);
            if (customInput?.value.trim()) {
                state.answers[key].push(customInput.value.trim());
            }
            updateProgress();
        }

        function addCustomAnswer(key, value) {
            if (!state.answers[key]) state.answers[key] = [];
            // Remove previous custom, keep chips
            const sec = SWOT_SECTIONS[state.currentSection];
            const q = sec.questions[state.currentQuestion];
            state.answers[key] = state.answers[key].filter(v => q.options.includes(v));
            if (value.trim()) state.answers[key].push(value.trim());
            updateProgress();
        }

        function setTextAnswer(key, value) {
            if (value.trim()) {
                state.answers[key] = value.split(/[,،\n]/).map(s => s.trim()).filter(Boolean);
            } else {
                state.answers[key] = [];
            }
            updateProgress();
        }

        // ============================================================
        //  NAVIGATION
        // ============================================================
        function nextQuestion() {
            if (state.currentQuestion < 3) {
                state.currentQuestion++;
            } else if (state.currentSection < SWOT_SECTIONS.length - 1) {
                state.currentSection++;
                state.currentQuestion = 0;
            }
            renderWizSteps();
            renderQuestion();
            updateProgress();
        }

        function prevQuestion() {
            if (state.currentQuestion > 0) {
                state.currentQuestion--;
            } else if (state.currentSection > 0) {
                state.currentSection--;
                state.currentQuestion = 3;
            }
            renderWizSteps();
            renderQuestion();
            updateProgress();
        }

        // ============================================================
        //  RESULTS
        // ============================================================
        function showResults() {
            state.currentSection = SWOT_SECTIONS.length;
            renderWizSteps();

            document.getElementById('screen1').classList.remove('active');
            document.getElementById('screen2').classList.add('active');

            // Collect all items per section
            const swotData = {};
            SWOT_SECTIONS.forEach((sec, si) => {
                swotData[sec.id] = [];
                // Add answers from questions
                for (let qi = 0; qi < 4; qi++) {
                    const key = `${sec.id}_${qi}`;
                    const answers = state.answers[key] || [];
                    answers.forEach(a => {
                        swotData[sec.id].push({ text: a, source: 'question' });
                    });
                }
                // Add pre-filled items from pain/ambition
                if (state.prefilled[sec.id]) {
                    state.prefilled[sec.id].forEach(item => {
                        // Don't add duplicates
                        if (!swotData[sec.id].some(x => x.text === item)) {
                            swotData[sec.id].push({ text: item, source: 'pain_ambition' });
                        }
                    });
                }
            });

            // Calculate balance score
            const sCount = swotData.strengths.length;
            const wCount = swotData.weaknesses.length;
            const oCount = swotData.opportunities.length;
            const tCount = swotData.threats.length;
            const total = sCount + wCount + oCount + tCount;
            const positives = sCount + oCount;
            const negatives = wCount + tCount;

            let score, verdict, verdictColor, verdictEmoji;
            if (total === 0) {
                score = 0; verdict = 'لم يتم تحليل'; verdictColor = '#94a3b8'; verdictEmoji = '⏸️';
            } else {
                score = Math.round((positives / total) * 100);
                if (score >= 70) {
                    verdict = 'وضع قوي — استغل الفرص'; verdictColor = '#22c55e'; verdictEmoji = '🟢';
                } else if (score >= 50) {
                    verdict = 'وضع متوازن — حسّن نقاط الضعف'; verdictColor = '#f59e0b'; verdictEmoji = '🟡';
                } else {
                    verdict = 'وضع يحتاج تدخل — ركّز على المعالجة'; verdictColor = '#ef4444'; verdictEmoji = '🔴';
                }
            }

            // Render results
            let html = `
                <div class="score-section">
                    <div class="score-circle" style="border-color:${verdictColor};color:${verdictColor}">
                        ${score}%
                    </div>
                    <div class="score-label">${verdictEmoji} ${verdict}</div>
                    <div class="score-desc">القوة + الفرص = ${positives} | الضعف + التهديدات = ${negatives}</div>
                </div>

                <div class="swot-matrix">
            `;

            SWOT_SECTIONS.forEach(sec => {
                const items = swotData[sec.id];
                html += `
                    <div class="swot-quad ${sec.cssClass}">
                        <div class="sq-header">
                            <span class="sq-emoji">${sec.emoji}</span>
                            <span class="sq-title">${sec.nameAr}</span>
                            <span class="sq-count" style="background:${sec.color}15;color:${sec.color}">${items.length}</span>
                        </div>
                `;
                if (items.length === 0) {
                    html += `<div style="text-align:center;padding:20px;color:var(--text-muted);font-size:13px">لا توجد بيانات</div>`;
                } else {
                    items.forEach(item => {
                        const sourceTag = item.source === 'pain_ambition'
                            ? `<span class="si-source" style="background:rgba(102,126,234,0.1);color:var(--primary)">من الألم والطموح</span>`
                            : `<span class="si-source" style="background:rgba(255,255,255,0.05);color:var(--text-muted)">من إجاباتك</span>`;
                        html += `
                            <div class="swot-item" style="border-color:${sec.color}">
                                <div style="flex:1">${item.text}</div>
                                ${sourceTag}
                            </div>
                        `;
                    });
                }
                html += `</div>`;
            });

            html += `</div>`; // close swot-matrix

            // Entity name in results
            const entityName = state.entityInfo?.legalName || state.entityInfo?.displayName || '';
            if (entityName) {
                html = `
                    <div style="text-align:center;margin-bottom:20px">
                        <div style="display:inline-flex;align-items:center;gap:8px;padding:8px 20px;border-radius:12px;background:rgba(102,126,234,0.08);border:1px solid rgba(102,126,234,0.15)">
                            <span style="font-size:16px">🏢</span>
                            <span style="font-size:14px;font-weight:700;color:var(--primary)">${entityName}</span>
                            <span style="font-size:11px;color:var(--text-muted)">— نتائج تحليل SWOT</span>
                        </div>
                    </div>
                ` + html;
            }

            // Recommendations
            html += buildRecommendations(swotData, score);

            // Next Step CTA — PESTEL
            html += `
                <div style="background:linear-gradient(135deg,rgba(59,130,246,0.08),rgba(34,197,94,0.05));border:1px solid rgba(59,130,246,0.2);border-radius:18px;padding:24px;margin-top:24px;text-align:center">
                    <div style="font-size:22px;margin-bottom:8px">🌍</div>
                    <div style="font-size:16px;font-weight:800;margin-bottom:4px">الخطوة التالية: تحليل PESTEL</div>
                    <div style="font-size:12px;color:var(--text-muted);margin-bottom:16px;line-height:1.8">
                        بعد تحليل البيئة الداخلية (SWOT)، حلّل البيئة الخارجية — السياسية، الاقتصادية، الاجتماعية، التقنية، البيئية، والقانونية
                    </div>
                    <a href="/tool-detail.html?code=PESTEL" style="
                        display:inline-flex;align-items:center;gap:10px;
                        padding:14px 36px;border-radius:14px;
                        background:linear-gradient(135deg,#3b82f6,#2563eb);
                        color:white;text-decoration:none;font-size:15px;font-weight:700;
                        box-shadow:0 4px 15px rgba(59,130,246,0.3);
                        transition:transform 0.2s;font-family:inherit
                    " onmouseover="this.style.transform='scale(1.03)'" onmouseout="this.style.transform='scale(1)'">
                        <i class="bi bi-globe2"></i>
                        ابدأ تحليل PESTEL
                        <i class="bi bi-arrow-left"></i>
                    </a>
                </div>
            `;

            // Other actions
            html += `
                <div style="display:flex;gap:12px;justify-content:center;margin-top:20px;flex-wrap:wrap">
                    <button class="btn-q next" onclick="saveAnalysis()">
                        <i class="bi bi-cloud-arrow-up"></i> حفظ التحليل
                    </button>
                    <button class="btn-q back" onclick="restartAnalysis()">
                        <i class="bi bi-arrow-clockwise"></i> إعادة التحليل
                    </button>
                    <a href="/dashboard.html" class="btn-q back" style="text-decoration:none">
                        <i class="bi bi-speedometer2"></i> لوحة التحكم
                    </a>
                </div>
            `;

            document.getElementById('resultsArea').innerHTML = html;
            document.getElementById('progressFill').style.width = '100%';
            document.getElementById('progressText').textContent = 'اكتمل التحليل ✅';

            // Save automatically
            saveAnalysis();
        }

        // ============================================================
        //  RECOMMENDATIONS
        // ============================================================
        function buildRecommendations(swotData, score) {
            let insights = [];

            const sCount = swotData.strengths.length;
            const wCount = swotData.weaknesses.length;
            const oCount = swotData.opportunities.length;
            const tCount = swotData.threats.length;

            if (wCount > sCount) {
                insights.push({
                    icon: '⚠️',
                    text: `عندك ${wCount} نقاط ضعف مقابل ${sCount} قوة — ركّز على معالجة الضعف في خطتك`,
                    action: 'حدد أولويات التحسين'
                });
            }
            if (oCount > 0 && sCount > 0) {
                insights.push({
                    icon: '🚀',
                    text: `عندك ${sCount} نقط قوة + ${oCount} فرص — ابنِ استراتيجيات هجومية (SO)`,
                    action: 'انتقل لتحليل TOWS'
                });
            }
            if (tCount > 0) {
                insights.push({
                    icon: '🛡️',
                    text: `${tCount} تهديدات خارجية — جهّز خطط دفاعية (ST)`,
                    action: 'حلل المنافسين بـ Porter'
                });
            }
            if (wCount > 0 && oCount > 0) {
                insights.push({
                    icon: '🩹',
                    text: `عالج نقاط الضعف لاستغلال الفرص (WO) — أولوية عالية`,
                    action: 'حدد مبادرات تصحيحية'
                });
            }

            if (insights.length === 0) {
                insights.push({ icon: '✅', text: 'أكملت التحليل! الخطوة التالية: تحليل البيئة الخارجية (PESTEL)', action: '' });
            }

            let html = `
                <div class="rec-card">
                    <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
                        <span style="font-size:20px">🧭</span>
                        <div>
                            <div style="font-size:15px;font-weight:800">التوصيات الذكية</div>
                            <div style="font-size:11px;color:var(--text-muted)">بناءً على نتائج SWOT</div>
                        </div>
                    </div>
            `;
            insights.forEach(ins => {
                html += `
                    <div style="display:flex;align-items:flex-start;gap:10px;padding:10px 14px;background:rgba(255,255,255,0.03);border-radius:10px;margin-bottom:6px;border:1px solid var(--border)">
                        <span style="font-size:16px;flex-shrink:0">${ins.icon}</span>
                        <div style="flex:1;font-size:13px;line-height:1.7">${ins.text}</div>
                        ${ins.action ? `<span style="font-size:11px;color:var(--primary);white-space:nowrap;font-weight:700">${ins.action}</span>` : ''}
                    </div>
                `;
            });

            // Smart links
            html += `
                <div style="margin-top:16px;padding-top:14px;border-top:1px solid var(--border)">
                    <div style="font-size:12px;font-weight:700;margin-bottom:8px;color:var(--text-muted)">🔗 خطواتك القادمة:</div>
                    <div style="display:flex;gap:8px;flex-wrap:wrap">
                        <a href="/tows.html" style="padding:8px 16px;border-radius:10px;background:rgba(34,197,94,0.08);border:1px solid rgba(34,197,94,0.2);color:#22c55e;text-decoration:none;font-size:12px;font-weight:700">🔄 تحليل TOWS</a>
                        <a href="/tool-detail.html?code=PESTEL" style="padding:8px 16px;border-radius:10px;background:rgba(59,130,246,0.08);border:1px solid rgba(59,130,246,0.2);color:#3b82f6;text-decoration:none;font-size:12px;font-weight:700">🌍 تحليل PESTEL</a>
                        <a href="/tool-detail.html?code=PORTER" style="padding:8px 16px;border-radius:10px;background:rgba(249,115,22,0.08);border:1px solid rgba(249,115,22,0.2);color:#f97316;text-decoration:none;font-size:12px;font-weight:700">⚔️ Porter</a>
                        <a href="/internal-env.html" style="padding:8px 16px;border-radius:10px;background:rgba(139,92,246,0.08);border:1px solid rgba(139,92,246,0.2);color:#8b5cf6;text-decoration:none;font-size:12px;font-weight:700">🏢 البيئة الداخلية</a>
                    </div>
                </div>
            `;

            html += `</div>`;
            return html;
        }

        // ============================================================
        //  SAVE ANALYSIS
        // ============================================================
        async function saveAnalysis() {
            if (!token || !state.versionId) return;

            // Collect SWOT data in the standard format
            const swotData = {};
            SWOT_SECTIONS.forEach(sec => {
                swotData[sec.id] = [];
                for (let qi = 0; qi < 4; qi++) {
                    const key = `${sec.id}_${qi}`;
                    (state.answers[key] || []).forEach(a => {
                        swotData[sec.id].push({ title: a, impact: 'MEDIUM', source: 'question' });
                    });
                }
                if (state.prefilled[sec.id]) {
                    state.prefilled[sec.id].forEach(item => {
                        if (!swotData[sec.id].some(x => x.title === item)) {
                            swotData[sec.id].push({ title: item, impact: 'HIGH', source: 'pain_ambition' });
                        }
                    });
                }
            });

            const payload = {
                versionId: state.versionId,
                toolCode: 'SWOT',
                data: JSON.stringify(swotData),
                status: 'COMPLETED',
                progress: 100,
                summary: `SWOT: ${swotData.strengths.length} قوة, ${swotData.weaknesses.length} ضعف, ${swotData.opportunities.length} فرص, ${swotData.threats.length} تهديدات`
            };

            try {
                const url = state.analysisId
                    ? `/api/company-analysis/${state.analysisId}`
                    : '/api/company-analysis';
                const method = state.analysisId ? 'PATCH' : 'POST';

                const res = await fetch(url, {
                    method,
                    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (res.ok) {
                    const result = await res.json();
                    if (result?.id) state.analysisId = result.id;
                    console.log('✅ SWOT saved');
                }
            } catch (e) {
                console.warn('Save failed:', e);
            }
        }

        // ============================================================
        //  RESTART
        // ============================================================
        function restartAnalysis() {
            state.currentSection = 0;
            state.currentQuestion = 0;
            state.answers = {};

            document.getElementById('screen2').classList.remove('active');
            document.getElementById('screen1').classList.add('active');

            renderWizSteps();
            renderQuestion();
            updateProgress();
        }

        init();
    </script>
</body>
