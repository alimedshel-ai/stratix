<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ستارتكس - التقويم الاستراتيجي</title>
    <meta name="description" content="عرض تقويمي لكل الأحداث والمواعيد الاستراتيجية">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #0a0b10;
            --bg2: #12141f;
            --card: #171a2a;
            --card-hover: #1e2236;
            --text: #e2e8f0;
            --muted: #7a8599;
            --border: rgba(255, 255, 255, 0.06);
            --primary: #667eea;
            --secondary: #764ba2;
            --green: #22c55e;
            --yellow: #facc15;
            --red: #ef4444;
            --blue: #38bdf8;
            --purple: #a78bfa;
            --orange: #f97316;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        body {
            background: var(--bg);
            font-family: 'Tajawal', sans-serif;
            color: var(--text);
            min-height: 100vh
        }

        .page-wrapper {
            display: flex;
            min-height: 100vh
        }

        .main-content {
            flex: 1;
            min-width: 0;
            padding: 28px 32px
        }

        /* Header */
        .cal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 24px
        }

        .cal-title {
            font-size: 28px;
            font-weight: 900
        }

        .cal-title span {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent
        }

        .cal-nav {
            display: flex;
            align-items: center;
            gap: 12px
        }

        .cal-nav-btn {
            width: 38px;
            height: 38px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--card);
            color: var(--text);
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s
        }

        .cal-nav-btn:hover {
            background: var(--card-hover);
            border-color: rgba(255, 255, 255, 0.12)
        }

        .cal-month-label {
            font-size: 18px;
            font-weight: 800;
            min-width: 160px;
            text-align: center
        }

        .cal-today-btn {
            padding: 6px 16px;
            border-radius: 10px;
            border: 1px solid var(--primary);
            background: rgba(102, 126, 234, 0.08);
            color: var(--primary);
            font-family: inherit;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s
        }

        .cal-today-btn:hover {
            background: rgba(102, 126, 234, 0.15)
        }

        /* View Toggle */
        .cal-views {
            display: flex;
            gap: 4px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 3px
        }

        .cal-view-btn {
            padding: 6px 14px;
            border-radius: 8px;
            border: none;
            background: transparent;
            color: var(--muted);
            font-family: inherit;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s
        }

        .cal-view-btn.active {
            background: var(--primary);
            color: white
        }

        .cal-view-btn:hover:not(.active) {
            color: var(--text)
        }

        /* Legend */
        .cal-legend {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 20px
        }

        .cal-legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--muted)
        }

        .cal-legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 3px
        }

        /* Calendar Grid */
        .cal-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 1px;
            background: var(--border);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--border)
        }

        .cal-day-header {
            background: var(--bg2);
            padding: 12px 8px;
            text-align: center;
            font-size: 13px;
            font-weight: 700;
            color: var(--muted)
        }

        .cal-day {
            background: var(--card);
            padding: 8px;
            min-height: 120px;
            transition: all 0.2s;
            cursor: pointer;
            position: relative
        }

        .cal-day:hover {
            background: var(--card-hover)
        }

        .cal-day.other-month {
            opacity: 0.35
        }

        .cal-day.today {
            background: rgba(102, 126, 234, 0.06)
        }

        .cal-day.today::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--primary)
        }

        .cal-day-num {
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            justify-content: space-between
        }

        .cal-day-num .today-badge {
            background: var(--primary);
            color: white;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px
        }

        .cal-event {
            padding: 3px 6px;
            border-radius: 5px;
            font-size: 10px;
            font-weight: 600;
            margin-bottom: 3px;
            cursor: pointer;
            transition: all 0.2s;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
            display: block
        }

        .cal-event:hover {
            filter: brightness(1.2);
            transform: translateX(-2px)
        }

        .cal-event.review {
            background: rgba(102, 126, 234, 0.15);
            color: var(--primary);
            border-right: 2px solid var(--primary)
        }

        .cal-event.deadline {
            background: rgba(239, 68, 68, 0.12);
            color: var(--red);
            border-right: 2px solid var(--red)
        }

        .cal-event.kpi {
            background: rgba(34, 197, 94, 0.12);
            color: var(--green);
            border-right: 2px solid var(--green)
        }

        .cal-event.meeting {
            background: rgba(250, 204, 21, 0.12);
            color: var(--yellow);
            border-right: 2px solid var(--yellow)
        }

        .cal-event.milestone {
            background: rgba(167, 139, 250, 0.12);
            color: var(--purple);
            border-right: 2px solid var(--purple)
        }

        .cal-event.initiative {
            background: rgba(249, 115, 22, 0.12);
            color: var(--orange);
            border-right: 2px solid var(--orange)
        }

        .cal-more {
            font-size: 10px;
            color: var(--muted);
            cursor: pointer;
            padding: 2px 4px
        }

        .cal-more:hover {
            color: var(--primary)
        }

        /* Timeline View */
        .timeline-view {
            display: none
        }

        .timeline-view.active {
            display: block
        }

        .cal-grid-wrap.active {
            display: grid
        }

        .cal-grid-wrap {
            display: none
        }

        .timeline-month {
            margin-bottom: 28px
        }

        .timeline-month-header {
            font-size: 16px;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px
        }

        .timeline-item {
            display: flex;
            gap: 16px;
            padding: 14px 16px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            margin-bottom: 8px;
            transition: all 0.2s
        }

        .timeline-item:hover {
            background: var(--card-hover);
            transform: translateX(-3px)
        }

        .timeline-date {
            min-width: 60px;
            text-align: center;
            flex-shrink: 0
        }

        .timeline-date-day {
            font-size: 24px;
            font-weight: 900
        }

        .timeline-date-month {
            font-size: 11px;
            color: var(--muted)
        }

        .timeline-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            flex-shrink: 0;
            margin-top: 6px
        }

        .timeline-content {
            flex: 1
        }

        .timeline-title {
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 3px
        }

        .timeline-desc {
            font-size: 12px;
            color: var(--muted)
        }

        .timeline-tags {
            display: flex;
            gap: 6px;
            margin-top: 6px
        }

        .timeline-tag {
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 10px;
            font-weight: 600
        }

        /* Event Detail Modal */
        .event-modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 99998;
            display: none;
            align-items: center;
            justify-content: center
        }

        .event-modal-overlay.open {
            display: flex
        }

        .event-modal {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 28px;
            width: min(450px, 90vw);
            max-height: 80vh;
            overflow-y: auto;
            position: relative
        }

        .event-modal-close {
            position: absolute;
            top: 14px;
            left: 14px;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            border: none;
            background: rgba(255, 255, 255, 0.05);
            color: var(--muted);
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s
        }

        .event-modal-close:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text)
        }

        .event-modal-icon {
            font-size: 36px;
            margin-bottom: 12px
        }

        .event-modal h3 {
            font-size: 20px;
            font-weight: 800;
            margin-bottom: 6px
        }

        .event-modal-meta {
            font-size: 13px;
            color: var(--muted);
            margin-bottom: 16px;
            display: flex;
            gap: 16px;
            flex-wrap: wrap
        }

        .event-modal-desc {
            font-size: 14px;
            line-height: 1.8;
            color: var(--muted);
            margin-bottom: 16px;
            padding: 14px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 10px
        }

        .event-modal-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border-radius: 10px;
            background: rgba(102, 126, 234, 0.1);
            color: var(--primary);
            font-size: 13px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s
        }

        .event-modal-link:hover {
            background: rgba(102, 126, 234, 0.2)
        }

        /* Upcoming sidebar */
        .cal-upcoming {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            margin-top: 20px
        }

        .cal-upcoming h3 {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px
        }

        .upcoming-item {
            display: flex;
            gap: 10px;
            padding: 10px 0;
            border-bottom: 1px solid var(--border)
        }

        .upcoming-item:last-child {
            border-bottom: none
        }

        .upcoming-date {
            font-size: 12px;
            color: var(--primary);
            font-weight: 700;
            min-width: 45px
        }

        .upcoming-title {
            font-size: 13px;
            font-weight: 600;
            flex: 1
        }

        .upcoming-type {
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 6px;
            font-weight: 600
        }

        @media(max-width:768px) {
            .main-content {
                padding: 16px
            }

            .cal-day {
                min-height: 80px
            }

            .cal-event {
                font-size: 9px
            }

            .cal-header {
                flex-direction: column;
                align-items: flex-start
            }

            .timeline-item {
                flex-direction: column;
                gap: 8px
            }
        }
    </style>
</head>

<body>
    <div class="page-wrapper">
        <div id="sidebar-container"></div>
        <div class="main-content">

            <!-- Header -->
            <div class="cal-header">
                <div>
                    <h1 class="cal-title"><i class="bi bi-calendar3"></i> التقويم <span>الاستراتيجي</span></h1>
                </div>
                <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap">
                    <div class="cal-views">
                        <button class="cal-view-btn active" onclick="switchView('calendar')">📅 شهري</button>
                        <button class="cal-view-btn" onclick="switchView('timeline')">📋 Timeline</button>
                    </div>
                    <div class="cal-nav">
                        <button class="cal-nav-btn" onclick="changeMonth(1)"><i
                                class="bi bi-chevron-right"></i></button>
                        <span class="cal-month-label" id="monthLabel"></span>
                        <button class="cal-nav-btn" onclick="changeMonth(-1)"><i
                                class="bi bi-chevron-left"></i></button>
                    </div>
                    <button class="cal-today-btn" onclick="goToday()"><i class="bi bi-geo-alt"></i> اليوم</button>
                </div>
            </div>

            <!-- Legend -->
            <div class="cal-legend">
                <div class="cal-legend-item">
                    <div class="cal-legend-dot" style="background:var(--primary)"></div> مراجعات دورية
                </div>
                <div class="cal-legend-item">
                    <div class="cal-legend-dot" style="background:var(--red)"></div> مواعيد نهائية
                </div>
                <div class="cal-legend-item">
                    <div class="cal-legend-dot" style="background:var(--green)"></div> تحديث مؤشرات
                </div>
                <div class="cal-legend-item">
                    <div class="cal-legend-dot" style="background:var(--yellow)"></div> اجتماعات
                </div>
                <div class="cal-legend-item">
                    <div class="cal-legend-dot" style="background:var(--purple)"></div> معالم رئيسية
                </div>
                <div class="cal-legend-item">
                    <div class="cal-legend-dot" style="background:var(--orange)"></div> مبادرات
                </div>
            </div>

            <!-- Calendar Grid View -->
            <div class="cal-grid-wrap active" id="calendarView">
                <div class="cal-grid" id="calGrid"></div>
            </div>

            <!-- Timeline View -->
            <div class="timeline-view" id="timelineView"></div>

            <!-- Upcoming Events -->
            <div class="cal-upcoming" id="upcomingSection"></div>
        </div>
    </div>

    <!-- Event Modal -->
    <div class="event-modal-overlay" id="eventModal" onclick="if(event.target===this)closeModal()">
        <div class="event-modal">
            <button class="event-modal-close" onclick="closeModal()"><i class="bi bi-x-lg"></i></button>
            <div id="eventModalContent"></div>
        </div>
    </div>

    <script src="/js/api.js?v=4"></script>
    <script src="/js/steps-config.js?v=4"></script>
    <script src="/js/sidebar.js?v=4"></script>
    <script src="/js/ai-advisor.js?v=4"></script>
    <script src="/js/achievements.js?v=4"></script>
    <script src="/js/notifications.js?v=4"></script>
    <script>
        // === State ===
        let currentDate = new Date();
        let currentView = 'calendar';
        const arabicMonths = ['يناير', 'فبراير', 'مارس', 'أبريل', 'مايو', 'يونيو', 'يوليو', 'أغسطس', 'سبتمبر', 'أكتوبر', 'نوفمبر', 'ديسمبر'];
        const arabicDays = ['الأحد', 'الإثنين', 'الثلاثاء', 'الأربعاء', 'الخميس', 'الجمعة', 'السبت'];

        // === Demo Events ===
        function generateEvents() {
            const y = currentDate.getFullYear();
            const m = currentDate.getMonth();
            return [
                // Reviews
                { date: new Date(y, m, 5), title: 'مراجعة الربع - أداء الأهداف', type: 'review', icon: '📋', desc: 'مراجعة دورية لأداء الأهداف الاستراتيجية مع فريق القيادة', link: '/reviews.html' },
                { date: new Date(y, m, 20), title: 'مراجعة KPIs الشهرية', type: 'review', icon: '📊', desc: 'مراجعة أداء مؤشرات القياس الرئيسية وتحديث القيم', link: '/kpi-entries.html' },
                // Deadlines
                { date: new Date(y, m, 12), title: 'موعد تسليم مشروع التحول الرقمي', type: 'deadline', icon: '⏰', desc: 'الموعد النهائي لتسليم المرحلة الأولى من مشروع التحول الرقمي', link: '/projects.html' },
                { date: new Date(y, m, 25), title: 'آخر موعد لتحديث البيانات المالية', type: 'deadline', icon: '💰', desc: 'يجب تحديث البيانات المالية للربع قبل هذا الموعد', link: '/financial.html' },
                // KPI Updates
                { date: new Date(y, m, 1), title: 'تحديث مؤشرات رضا العملاء', type: 'kpi', icon: '📈', desc: 'تحديث شهري لمؤشرات رضا العملاء NPS وCSAT', link: '/kpis.html' },
                { date: new Date(y, m, 15), title: 'تحديث مؤشرات الكفاءة التشغيلية', type: 'kpi', icon: '⚙️', desc: 'تحديث نصف شهري لمؤشرات الكفاءة والأداء التشغيلي', link: '/kpis.html' },
                // Meetings
                { date: new Date(y, m, 8), title: 'اجتماع مجلس الإدارة', type: 'meeting', icon: '👥', desc: 'اجتماع دوري لمجلس الإدارة لمناقشة التوجه الاستراتيجي', link: '/admin-decisions.html' },
                { date: new Date(y, m, 22), title: 'ورشة عمل — تحديث الاستراتيجية', type: 'meeting', icon: '🎯', desc: 'ورشة عمل مع الفريق التنفيذي لتحديث الخطة الاستراتيجية', link: '/choices.html' },
                // Milestones
                { date: new Date(y, m, 18), title: 'إكمال 75% من مبادرة التوسع', type: 'milestone', icon: '🏆', desc: 'الوصول إلى 75% من الإنجاز في مبادرة التوسع الإقليمي', link: '/initiatives.html' },
                { date: new Date(y, m, 28), title: 'إطلاق المنتج الجديد', type: 'milestone', icon: '🚀', desc: 'تاريخ الإطلاق الرسمي للمنتج الجديد في السوق', link: '/projects.html' },
                // Initiatives
                { date: new Date(y, m, 3), title: 'بدء مبادرة تطوير الكوادر', type: 'initiative', icon: '👨‍💼', desc: 'انطلاق برنامج التدريب والتطوير للكوادر القيادية', link: '/initiatives.html' },
                { date: new Date(y, m, 10), title: 'تقييم مبادرة التسويق الرقمي', type: 'initiative', icon: '📱', desc: 'تقييم نتائج المرحلة الأولى من مبادرة التسويق الرقمي', link: '/initiatives.html' },
                // Extra
                { date: new Date(y, m, 14), title: 'تحليل SWOT نصف سنوي', type: 'review', icon: '🔍', desc: 'إعادة تحليل البيئة الداخلية والخارجية', link: '/analysis.html' },
                { date: new Date(y, m, 7), title: 'موعد تقرير الأداء الشهري', type: 'deadline', icon: '📄', desc: 'تسليم تقرير الأداء الشهري للإدارة العليا', link: '/ceo-dashboard.html' },
            ];
        }

        // === Render Calendar ===
        function renderCalendar() {
            document.getElementById('monthLabel').textContent = `${arabicMonths[currentDate.getMonth()]} ${currentDate.getFullYear()}`;
            const events = generateEvents();
            const grid = document.getElementById('calGrid');
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const daysInPrevMonth = new Date(year, month, 0).getDate();
            const today = new Date();

            let html = arabicDays.map(d => `<div class="cal-day-header">${d}</div>`).join('');

            // Previous month days
            for (let i = firstDay - 1; i >= 0; i--) {
                html += `<div class="cal-day other-month"><div class="cal-day-num">${daysInPrevMonth - i}</div></div>`;
            }

            // Current month
            for (let day = 1; day <= daysInMonth; day++) {
                const isToday = day === today.getDate() && month === today.getMonth() && year === today.getFullYear();
                const dayEvents = events.filter(e => e.date.getDate() === day);
                const maxShow = 3;

                html += `<div class="cal-day ${isToday ? 'today' : ''}">`;
                html += `<div class="cal-day-num">${isToday ? `<span class="today-badge">${day}</span>` : day}</div>`;

                dayEvents.slice(0, maxShow).forEach(e => {
                    html += `<div class="cal-event ${e.type}" onclick="showEvent(${JSON.stringify(e).replace(/"/g, '&quot;')})" title="${e.title}">${e.icon} ${e.title}</div>`;
                });
                if (dayEvents.length > maxShow) {
                    html += `<div class="cal-more">+${dayEvents.length - maxShow} المزيد</div>`;
                }
                html += '</div>';
            }

            // Next month days
            const totalCells = firstDay + daysInMonth;
            const remaining = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
            for (let i = 1; i <= remaining; i++) {
                html += `<div class="cal-day other-month"><div class="cal-day-num">${i}</div></div>`;
            }

            grid.innerHTML = html;
        }

        // === Render Timeline ===
        function renderTimeline() {
            const events = generateEvents().sort((a, b) => a.date - b.date);
            const container = document.getElementById('timelineView');
            const typeColors = { review: 'var(--primary)', deadline: 'var(--red)', kpi: 'var(--green)', meeting: 'var(--yellow)', milestone: 'var(--purple)', initiative: 'var(--orange)' };
            const typeLabels = { review: 'مراجعة', deadline: 'موعد نهائي', kpi: 'مؤشرات', meeting: 'اجتماع', milestone: 'معلم', initiative: 'مبادرة' };

            container.innerHTML = events.map(e => `
        <div class="timeline-item" onclick="showEvent(${JSON.stringify(e).replace(/"/g, '&quot;')})">
          <div class="timeline-date">
            <div class="timeline-date-day">${e.date.getDate()}</div>
            <div class="timeline-date-month">${arabicMonths[e.date.getMonth()]}</div>
          </div>
          <div class="timeline-dot" style="background:${typeColors[e.type]}"></div>
          <div class="timeline-content">
            <div class="timeline-title">${e.icon} ${e.title}</div>
            <div class="timeline-desc">${e.desc}</div>
            <div class="timeline-tags">
              <span class="timeline-tag" style="background:${typeColors[e.type]}15;color:${typeColors[e.type]}">${typeLabels[e.type]}</span>
            </div>
          </div>
        </div>
      `).join('');
        }

        // === Render Upcoming ===
        function renderUpcoming() {
            const events = generateEvents().sort((a, b) => a.date - b.date);
            const today = new Date();
            const upcoming = events.filter(e => e.date >= today).slice(0, 5);
            const typeColors = { review: 'var(--primary)', deadline: 'var(--red)', kpi: 'var(--green)', meeting: 'var(--yellow)', milestone: 'var(--purple)', initiative: 'var(--orange)' };
            const typeLabels = { review: 'مراجعة', deadline: 'موعد نهائي', kpi: 'مؤشرات', meeting: 'اجتماع', milestone: 'معلم', initiative: 'مبادرة' };

            document.getElementById('upcomingSection').innerHTML = `
        <h3><i class="bi bi-clock-history" style="color:var(--primary)"></i> الأحداث القادمة</h3>
        ${upcoming.map(e => `
          <div class="upcoming-item" style="cursor:pointer" onclick="showEvent(${JSON.stringify(e).replace(/"/g, '&quot;')})">
            <div class="upcoming-date">${e.date.getDate()} ${arabicMonths[e.date.getMonth()].substring(0, 3)}</div>
            <div class="upcoming-title">${e.icon} ${e.title}</div>
            <span class="upcoming-type" style="background:${typeColors[e.type]}15;color:${typeColors[e.type]}">${typeLabels[e.type]}</span>
          </div>
        `).join('')}
      `;
        }

        // === Navigation ===
        function changeMonth(dir) {
            currentDate.setMonth(currentDate.getMonth() + dir);
            renderAll();
        }
        function goToday() {
            currentDate = new Date();
            renderAll();
        }
        function switchView(view) {
            currentView = view;
            document.querySelectorAll('.cal-view-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('calendarView').classList.toggle('active', view === 'calendar');
            document.getElementById('timelineView').classList.toggle('active', view === 'timeline');
        }

        // === Event Modal ===
        function showEvent(e) {
            const typeColors = { review: 'var(--primary)', deadline: 'var(--red)', kpi: 'var(--green)', meeting: 'var(--yellow)', milestone: 'var(--purple)', initiative: 'var(--orange)' };
            const typeLabels = { review: 'مراجعة دورية', deadline: 'موعد نهائي', kpi: 'تحديث مؤشرات', meeting: 'اجتماع', milestone: 'معلم رئيسي', initiative: 'مبادرة' };
            const date = new Date(e.date);

            document.getElementById('eventModalContent').innerHTML = `
        <div class="event-modal-icon">${e.icon}</div>
        <h3>${e.title}</h3>
        <div class="event-modal-meta">
          <span><i class="bi bi-calendar3"></i> ${date.getDate()} ${arabicMonths[date.getMonth()]} ${date.getFullYear()}</span>
          <span><i class="bi bi-tag"></i> <span style="color:${typeColors[e.type]}">${typeLabels[e.type]}</span></span>
        </div>
        <div class="event-modal-desc">${e.desc}</div>
        ${e.link ? `<a href="${e.link}" class="event-modal-link"><i class="bi bi-box-arrow-up-left"></i> فتح الصفحة</a>` : ''}
      `;
            document.getElementById('eventModal').classList.add('open');
        }
        function closeModal() {
            document.getElementById('eventModal').classList.remove('open');
        }

        // === Init ===
        function renderAll() {
            renderCalendar();
            renderTimeline();
            renderUpcoming();
        }
        renderAll();
    </script>
</body>

</html>
