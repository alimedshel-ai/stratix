<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ستارتكس - الدخول أو التسجيل</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #667eea;
            --secondary: #764ba2;
            --bg: #0f1117;
            --bg-card: #1a1d2e;
            --text: #e2e8f0;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.08);
            --success: #10b981;
        }

        body {
            background: var(--bg);
            font-family: 'Tajawal', sans-serif;
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse at 20% 80%, rgba(102, 126, 234, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(118, 75, 162, 0.08) 0%, transparent 50%);
            z-index: -1;
            animation: bgPulse 8s ease-in-out infinite alternate;
        }

        @keyframes bgPulse {
            0% {
                opacity: 0.6;
            }

            100% {
                opacity: 1;
            }
        }

        .auth-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 36px 32px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 460px;
            animation: slideUp 0.6s ease;
        }

        @keyframes slideUp {
            from {
                transform: translateY(30px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* ═══ التبويبات ═══ */
        .auth-tabs {
            display: flex;
            gap: 4px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 14px;
            padding: 4px;
            margin-bottom: 28px;
        }

        .auth-tab {
            flex: 1;
            text-align: center;
            padding: 12px 16px;
            border-radius: 11px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--text-muted);
            transition: all 0.3s ease;
            border: none;
            background: transparent;
            position: relative;
        }

        .auth-tab:hover {
            color: var(--text);
        }

        .auth-tab.active {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #fff;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.35);
        }

        .auth-tab i {
            margin-left: 6px;
            font-size: 1rem;
        }

        /* ═══ النماذج ═══ */
        .auth-panel {
            display: none;
            animation: fadeIn 0.35s ease;
        }

        .auth-panel.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-label {
            font-weight: 500;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9rem;
        }

        .form-control {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            color: white;
            border-radius: 12px;
            padding: 12px 15px;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(102, 126, 234, 0.4);
            color: white;
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.2);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-weight: bold;
            font-size: 1.05rem;
            transition: all 0.3s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .info-icon {
            cursor: pointer;
            color: var(--primary);
            font-size: 0.85rem;
        }

        .password-rules {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 8px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4px;
        }

        .rule.valid {
            color: var(--success);
        }

        .header-icon {
            width: 56px;
            height: 56px;
            border-radius: 16px;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.15), rgba(118, 75, 162, 0.15));
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 12px;
            font-size: 26px;
            color: var(--primary);
        }

        .brand-name {
            font-weight: 800;
            font-size: 1.6rem;
            background: linear-gradient(135deg, var(--primary), #a78bfa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .brand-sub {
            color: var(--text-muted);
            font-size: 0.88rem;
            margin-top: 2px;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 20px 0;
            color: var(--text-muted);
            font-size: 0.82rem;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .switch-link {
            text-align: center;
            margin-top: 16px;
            font-size: 0.88rem;
        }

        .switch-link a {
            color: var(--primary);
            font-weight: bold;
            text-decoration: none;
            cursor: pointer;
        }

        .switch-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <!-- بوابة: الدخول فقط من صفحة الهبوط -->
    <script>
        (function () {
            // السماح إذا كان لديه token بالفعل (مستخدم مسجل)
            if (localStorage.getItem('token')) return;

            // السماح إذا جاء من أي مصدر معروف في المنصة
            const params = new URLSearchParams(window.location.search);
            const from = params.get('from') || '';
            const allowedSources = ['landing', 'smart-guide', 'diagnostic', 'ceo', 'dept', 'restore', 'beginner', 'founder', 'pain'];
            if (allowedSources.includes(from)) return;

            // السماح إذا كان لديه tab parameter (رابط مباشر)
            if (params.get('tab')) return;

            // السماح إذا كان الـ referrer من نفس الموقع
            const ref = document.referrer;
            if (ref) {
                try {
                    const refUrl = new URL(ref);
                    if (refUrl.origin === window.location.origin) return;
                } catch (e) { }
            }

            // غير ذلك → إعادة توجيه لصفحة الهبوط
            window.location.replace('/');
        })();
    </script>

    <div class="auth-card">
        <!-- الشعار -->
        <div class="text-center mb-3">
            <div class="header-icon"><i class="bi bi-rocket-takeoff"></i></div>
            <div class="brand-name">ستارتكس</div>
            <div class="brand-sub" id="headerSub">ابدأ رحلتك الاستراتيجية</div>
        </div>

        <!-- التبويبات -->
        <div class="auth-tabs">
            <button class="auth-tab" id="tab-signup" onclick="switchTab('signup')">
                <i class="bi bi-person-plus"></i> حساب جديد
            </button>
            <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">
                <i class="bi bi-box-arrow-in-left"></i> تسجيل الدخول
            </button>
        </div>

        <!-- ═══ نموذج تسجيل الدخول ═══ -->
        <div class="auth-panel active" id="panel-login">
            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label">
                        البريد الإلكتروني
                        <i class="bi bi-info-circle info-icon" data-bs-toggle="tooltip"
                            title="أدخل بريد العمل المسجل في النظام"></i>
                    </label>
                    <input type="email" id="login-email" class="form-control" placeholder="name@company.com" required>
                </div>

                <div class="mb-4">
                    <label class="form-label">
                        كلمة المرور
                        <i class="bi bi-info-circle info-icon" data-bs-toggle="tooltip"
                            title="تأكد من إدخال كلمة المرور بشكل صحيح"></i>
                    </label>
                    <input type="password" id="login-password" class="form-control" placeholder="••••••••" required>
                    <div class="text-start mt-2">
                        <a href="#" style="color: var(--text-muted); font-size: 0.82rem; text-decoration: none;">نسيت
                            كلمة المرور؟</a>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary w-100">
                    <i class="bi bi-shield-lock me-1"></i> دخول آمن
                </button>

                <div class="switch-link">
                    <span class="text-muted">ليس لديك حساب؟ </span>
                    <a onclick="switchTab('signup')">أنشئ حساباً مجاناً</a>
                </div>
            </form>
        </div>

        <!-- ═══ نموذج إنشاء حساب ═══ -->
        <div class="auth-panel" id="panel-signup">
            <form id="signupForm">
                <div class="mb-3">
                    <label class="form-label">
                        الاسم الكامل
                        <i class="bi bi-info-circle info-icon" data-bs-toggle="tooltip"
                            title="اكتب اسمك كما تحب أن يظهر في لوحة التحكم"></i>
                    </label>
                    <input type="text" id="signup-name" class="form-control" placeholder="مثال: أحمد محمد (اختياري)">
                </div>

                <div class="mb-3">
                    <label class="form-label">
                        البريد الإلكتروني
                        <i class="bi bi-info-circle info-icon" data-bs-toggle="tooltip"
                            title="سنرسل إشعارات النظام المهمة على هذا البريد"></i>
                    </label>
                    <input type="email" id="signup-email" class="form-control" placeholder="name@company.com" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">
                        رقم الجوال
                        <i class="bi bi-info-circle info-icon" data-bs-toggle="tooltip"
                            title="رقم الجوال يساعدك في استرجاع حسابك والتحقق من هويتك"></i>
                    </label>
                    <input type="tel" id="signup-phone" class="form-control" placeholder="05xxxxxxxx" dir="ltr"
                        style="text-align:left">
                    <div class="form-text" style="color:var(--text-muted);font-size:0.78rem">اختياري — يمكنك إضافته
                        لاحقاً</div>
                </div>

                <div class="mb-4">
                    <label class="form-label">
                        كلمة المرور
                        <i class="bi bi-info-circle info-icon" data-bs-toggle="tooltip"
                            title="كلمة المرور القوية تحمي بيانات شركتك الاستراتيجية"></i>
                    </label>
                    <input type="password" class="form-control" id="signup-password" placeholder="••••••••" required>
                    <div class="password-rules">
                        <div class="rule" id="rule-length"><i class="bi bi-circle"></i> 8 أحرف على الأقل</div>
                        <div class="rule" id="rule-upper"><i class="bi bi-circle"></i> حرف كبير (A-Z)</div>
                        <div class="rule" id="rule-lower"><i class="bi bi-circle"></i> حرف صغير (a-z)</div>
                        <div class="rule" id="rule-number"><i class="bi bi-circle"></i> رقم (0-9)</div>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary w-100">
                    <i class="bi bi-rocket-takeoff me-1"></i> إنشاء الحساب والبدء
                </button>

                <div class="switch-link">
                    <span class="text-muted">لديك حساب بالفعل؟ </span>
                    <a onclick="switchTab('login')">سجل دخولك</a>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // ═══ التبويبات ═══
        function switchTab(tab) {
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.auth-panel').forEach(p => p.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');
            document.getElementById('panel-' + tab).classList.add('active');

            const sub = document.getElementById('headerSub');
            if (tab === 'login') {
                sub.textContent = 'سجل الدخول لمتابعة أداء استراتيجيتك';
            } else {
                sub.textContent = 'أنشئ حسابك المجاني وابدأ رحلتك';
            }
        }

        // تحقق من URL parameter لتحديد التاب الافتراضي
        const urlParams = new URLSearchParams(window.location.search);
        const defaultTab = urlParams.get('tab') || 'signup';
        switchTab(defaultTab);

        // Tooltips
        var tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'));
        tooltipTriggerList.map(el => new bootstrap.Tooltip(el));

        // ═══ التحقق من كلمة المرور (التسجيل) ═══
        const pwdInput = document.getElementById('signup-password');
        const rules = {
            length: { id: 'rule-length', regex: /.{8,}/ },
            upper: { id: 'rule-upper', regex: /[A-Z]/ },
            lower: { id: 'rule-lower', regex: /[a-z]/ },
            number: { id: 'rule-number', regex: /[0-9]/ }
        };

        pwdInput.addEventListener('input', function (e) {
            const val = e.target.value;
            for (const key in rules) {
                const ruleDiv = document.getElementById(rules[key].id);
                const icon = ruleDiv.querySelector('i');
                if (rules[key].regex.test(val)) {
                    ruleDiv.classList.add('valid');
                    icon.classList.replace('bi-circle', 'bi-check-circle-fill');
                } else {
                    ruleDiv.classList.remove('valid');
                    icon.classList.replace('bi-check-circle-fill', 'bi-circle');
                }
            }
        });

        // ═══ تسجيل الدخول ═══
        document.getElementById('loginForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const btn = this.querySelector('button[type="submit"]');
            const originalText = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<i class="bi bi-hourglass-split me-1"></i> جاري الدخول...';

            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();

                if (res.ok && data.token) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));

                    const role = data.user.role || 'VIEWER';
                    const sysRole = data.user.systemRole || 'USER';
                    const uType = data.user.userType || 'EXPLORER';
                    const onboardingDone = data.user.onboardingCompleted || false;

                    if (sysRole !== 'SUPER_ADMIN' && (role === 'VIEWER' || role === 'DATA_ENTRY')) {
                        window.location.href = '/viewer-hub.html';
                    } else if (!onboardingDone && sysRole !== 'SUPER_ADMIN') {
                        // لم يكمل التأسيس → يكمله أولاً
                        window.location.href = '/onboarding.html';
                    } else if (uType === 'CONSULTANT') {
                        window.location.href = '/consultant-dashboard.html';
                    } else if (uType === 'DEPT_MANAGER') {
                        window.location.href = '/dept-dashboard.html';
                    } else {
                        window.location.href = '/dashboard.html';
                    }
                } else {
                    if (data.suspended) {
                        if (data.token) localStorage.setItem('token', data.token);
                        localStorage.setItem('user', JSON.stringify(data.user || {}));
                        localStorage.setItem('suspendReason', data.reason || '');
                        localStorage.setItem('suspendedAt', data.suspendedAt || '');
                        window.location.href = '/account-suspended.html';
                        return;
                    }
                    let errDiv = document.getElementById('loginError');
                    if (!errDiv) {
                        errDiv = document.createElement('div');
                        errDiv.id = 'loginError';
                        errDiv.className = 'alert alert-danger mt-3';
                        errDiv.style.borderRadius = '12px';
                        errDiv.style.fontSize = '0.9rem';
                        this.appendChild(errDiv);
                    }
                    errDiv.textContent = data.message || data.errors?.[0]?.msg || 'فشل تسجيل الدخول';
                }
            } catch (err) {
                console.error('Login error:', err);
                alert('خطأ في الاتصال بالسيرفر');
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        });

        // ═══ إنشاء حساب ═══
        document.getElementById('signupForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const btn = this.querySelector('button[type="submit"]');
            const originalText = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<i class="bi bi-hourglass-split me-1"></i> جاري إنشاء الحساب...';

            const name = document.getElementById('signup-name').value.trim();
            const email = document.getElementById('signup-email').value.trim();
            const phone = document.getElementById('signup-phone').value.trim();
            const password = document.getElementById('signup-password').value;

            // قراءة بيانات التشخيص من localStorage (من الخطوة السابقة)
            const userCategory = localStorage.getItem('stratix_category') || null;
            let diagnosticData = null;
            try {
                const pa = localStorage.getItem('painAmbition');
                if (pa) diagnosticData = JSON.parse(pa);
            } catch (e) { }
            // بيانات Smart Guide
            let smartGuideData = null;
            try {
                const sg = localStorage.getItem('stratix_smart_guide');
                if (sg) smartGuideData = JSON.parse(sg);
            } catch (e) { }

            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, phone: phone || undefined, password, userCategory, diagnosticData, smartGuideData })
                });
                const data = await res.json();

                if (res.ok && data.token) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));

                    // ═══ توجيه ذكي بعد التسجيل ═══
                    // 1. أولاً: هل في وجهة محفوظة من المسار السابق؟
                    const savedRedirect = localStorage.getItem('stratix_redirect_after_login');
                    if (savedRedirect) {
                        localStorage.removeItem('stratix_redirect_after_login');
                        window.location.href = savedRedirect;
                    }
                    // 2. وجهة من السيرفر
                    else if (data.redirectTo) {
                        window.location.href = data.redirectTo;
                    }
                    // 3. الافتراضي: الإعداد
                    else {
                        window.location.href = '/onboarding';
                    }
                } else {
                    let errDiv = document.getElementById('signupError');
                    if (!errDiv) {
                        errDiv = document.createElement('div');
                        errDiv.id = 'signupError';
                        errDiv.className = 'alert alert-danger mt-3';
                        errDiv.style.borderRadius = '12px';
                        errDiv.style.fontSize = '0.9rem';
                        this.appendChild(errDiv);
                    }
                    errDiv.textContent = data.error || data.message || 'فشل إنشاء الحساب';
                }
            } catch (err) {
                alert('خطأ في الاتصال بالسيرفر');
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        });
    </script>
</body>

</html>
