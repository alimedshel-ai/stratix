<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ستارتكس | تقييم صحة الإدارة</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/shared.css">
    <style>
        :root {
            --stx-bg: #0b0d12;
            --stx-card: rgba(22, 27, 34, 0.7);
            --stx-border: rgba(255, 255, 255, 0.08);
            --stx-primary: #6366f1;
            --stx-secondary: #2dd4bf;
            --stx-success: #10b981;
            --stx-danger: #ef4444;
        }

        body {
            background-color: var(--stx-bg);
            color: #f8fafc;
            font-family: 'Tajawal', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        .stx-wrapper {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Full Page Header */
        .stx-header {
            background: rgba(11, 13, 18, 0.85);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--stx-border);
            padding: 20px 40px;
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .stx-nav-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--stx-border);
            color: #fff;
            width: 48px;
            height: 48px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            cursor: pointer;
            text-decoration: none;
        }

        .stx-nav-btn:hover {
            background: var(--stx-primary);
            border-color: var(--stx-primary);
            transform: scale(1.05);
            color: #fff;
        }

        .stx-main-content {
            flex: 1;
            padding: 40px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        .hero-section {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.1) 0%, rgba(11, 13, 18, 0) 100%);
            border: 1px solid var(--stx-border);
            border-radius: 28px;
            padding: 40px;
            margin-bottom: 40px;
            position: relative;
            overflow: hidden;
        }

        .health-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 28px;
        }

        .health-card {
            background: var(--stx-card);
            border: 1px solid var(--stx-border);
            border-radius: 24px;
            padding: 30px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .health-card:hover {
            border-color: var(--stx-primary);
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .form-control {
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid var(--stx-border);
            color: #fff;
            border-radius: 16px;
            padding: 18px;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            background: rgba(15, 23, 42, 0.6);
            border-color: var(--stx-primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
            color: #fff;
        }

        .suggestion-chip {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--stx-border);
            padding: 8px 16px;
            border-radius: 12px;
            font-size: 0.85rem;
            color: #94a3b8;
            cursor: pointer;
            margin: 4px;
            display: inline-block;
            transition: 0.3s;
        }

        .suggestion-chip:hover {
            border-color: var(--stx-primary);
            background: rgba(99, 102, 241, 0.1);
            color: var(--stx-primary);
        }

        .btn-modern {
            padding: 16px 32px;
            border-radius: 16px;
            font-weight: 800;
            letter-spacing: 0.3px;
            transition: all 0.3s ease;
        }

        .btn-primary.btn-modern {
            background: var(--stx-primary);
            border: none;
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.2);
        }

        .btn-primary.btn-modern:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(99, 102, 241, 0.3);
        }
    </style>
</head>

<body>
    <div class="stx-wrapper">
        <!-- Persistent Header without Sidebar -->
        <header class="stx-header">
            <div class="d-flex align-items-center gap-3">
                <a href="javascript:history.back()" class="stx-nav-btn" title="العودة">
                    <i class="bi bi-arrow-right fs-4"></i>
                </a>
                <div>
                    <h5 class="m-0 fw-800 text-white">تشخيص الصحة التشغيلية</h5>
                    <div class="d-flex align-items-center gap-2 text-muted" style="font-size: 0.8rem;">
                        <i class="bi bi-building text-secondary"></i> قسم <span id="dept-name">...</span>
                    </div>
                </div>
            </div>

            <div class="d-flex gap-3 align-items-center">
                <button type="button" id="syncAllBtn" onclick="syncFromAllSources(this); return false;" class="btn btn-outline-info btn-sm rounded-3 px-3">
                    <i class="bi bi-diagram-3 me-1"></i> سحب من كل المراحل السابقة
                </button>
                <button type="button" onclick="pullFromPestel(this); return false;" class="btn btn-outline-secondary btn-sm rounded-3 px-3">
                    <i class="bi bi-download me-1"></i> PESTEL فقط
                </button>
                <button type="button" onclick="fillAll()" class="btn btn-outline-light btn-sm rounded-3 px-3">
                    <i class="bi bi-magic me-1"></i> ملء تلقائي ذكي
                </button>
                <button type="button" id="clearAllBtn" class="btn btn-outline-danger btn-sm rounded-3 px-3">
                    <i class="bi bi-trash me-1"></i> مسح الكل
                </button>
                <div class="vr mx-2 text-white opacity-10" style="height: 30px;"></div>
                <button type="submit" form="healthForm" class="stx-nav-btn" title="التالي" id="saveBtnTop">
                    <i class="bi bi-arrow-left fs-4"></i>
                </button>
            </div>
        </header>

        <main class="stx-main-content">
            <!-- شريط تدفق البيانات — يظهر المصادر المتاحة من المراحل السابقة -->
            <div id="data-flow-bar" style="margin:0 0 16px 0;padding:14px 18px;border:1px solid var(--stx-border);background:rgba(255,255,255,0.02);border-radius:14px;display:none;"></div>

            <div class="hero-section">
                <div class="row align-items-center">
                    <div class="col-lg-8">
                        <h2 class="fw-900 text-white mb-3">تقييم نضج وقدرات إدارة <span id="dept-title">الموارد
                                البشرية</span></h2>
                        <p class="text-muted fs-5 mb-0">قم بتوصيف الوضع الحالي لخمسة أبعاد رئيسية لبناء الأساس لعملية
                            تحليل SWOT.</p>
                    </div>
                    <div class="col-lg-4 text-end d-none d-lg-block">
                        <div class="display-1 opacity-10"><i class="bi bi-shield-shaded"></i></div>
                    </div>
                </div>
            </div>

            <form id="healthForm">
                <div class="health-grid">
                    <!-- Skills -->
                    <div class="health-card">
                        <div class="d-flex align-items-center gap-3">
                            <div class="card-icon"
                                style="background: rgba(99, 102, 241, 0.1); width: 50px; height: 50px; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: var(--stx-primary);">
                                <i class="bi bi-person-badge fs-3"></i>
                            </div>
                            <h5 class="m-0 fw-800">الكفاءات والمهارات</h5>
                        </div>
                        <div id="skills-suggestions" class="px-1"></div>
                        <textarea id="skills" name="skills" class="form-control" rows="5"
                            placeholder="صف مهارات فريقك، الفجوات التدريبية، والخبرات النوعية..."></textarea>
                    </div>

                    <!-- Processes -->
                    <div class="health-card">
                        <div class="d-flex align-items-center gap-3">
                            <div class="card-icon"
                                style="background: rgba(45, 212, 191, 0.1); width: 50px; height: 50px; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: var(--stx-secondary);">
                                <i class="bi bi-diagram-2 fs-3"></i>
                            </div>
                            <h5 class="m-0 fw-800">العمليات والإجراءات</h5>
                        </div>
                        <div id="processes-suggestions" class="px-1"></div>
                        <textarea id="processes" name="processes" class="form-control" rows="5"
                            placeholder="حوكمة العمليات، الأدلة الاسترشادية، وسرعة التنفيذ..."></textarea>
                    </div>

                    <!-- Satisfaction -->
                    <div class="health-card">
                        <div class="d-flex align-items-center gap-3">
                            <div class="card-icon"
                                style="background: rgba(244, 63, 94, 0.1); width: 50px; height: 50px; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: #f43f5e;">
                                <i class="bi bi-heart-pulse fs-3"></i>
                            </div>
                            <h5 class="m-0 fw-800">الارتباط والرضا الوظيفي</h5>
                        </div>
                        <div id="satisfaction-suggestions" class="px-1"></div>
                        <textarea id="satisfaction" name="satisfaction" class="form-control" rows="5"
                            placeholder="بيئة العمل، الولاء الوظيفي، ومستوى الضغوطات..."></textarea>
                    </div>

                    <!-- Tech -->
                    <div class="health-card">
                        <div class="d-flex align-items-center gap-3">
                            <div class="card-icon"
                                style="background: rgba(14, 165, 233, 0.1); width: 50px; height: 50px; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: #0ea5e9;">
                                <i class="bi bi-laptop fs-3"></i>
                            </div>
                            <h5 class="m-0 fw-800">التمكين الرقمي</h5>
                        </div>
                        <div id="tech-suggestions" class="px-1"></div>
                        <textarea id="tech" name="tech" class="form-control" rows="5"
                            placeholder="الأنظمة المستخدمة، أتمتة البيانات، والقدرة التقنية..."></textarea>
                    </div>

                    <!-- Leadership -->
                    <div class="health-card">
                        <div class="d-flex align-items-center gap-3">
                            <div class="card-icon"
                                style="background: rgba(245, 158, 11, 0.1); width: 50px; height: 50px; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: #f59e0b;">
                                <i class="bi bi-star fs-3"></i>
                            </div>
                            <h5 class="m-0 fw-800">القيادة والتواصل</h5>
                        </div>
                        <div id="leadership-suggestions" class="px-1"></div>
                        <textarea id="leadership" name="leadership" class="form-control" rows="5"
                            placeholder="شفافية القرار، وضوح الأهداف، وقوة التواصل الداخلي..."></textarea>
                    </div>
                </div>

                <div class="text-center mt-5 mb-5 pb-5">
                    <button type="submit" class="btn btn-primary btn-modern px-5" id="saveBtn">
                        حفظ ومتابعة لتحليل SWOT <i class="bi bi-arrow-left ms-2"></i>
                    </button>
                </div>
            </form>
        </main>
    </div>

    <!-- Scripts -->

    <script src="/js/utils.js?v=9"></script>

    <script src="/js/page-guard.js?v=9"></script>

            cs: {

                processes: ["اتفاقيات مستوى خدمة (SLA) واضحة", "نظام تصعيد فعّال متعدد المستويات", "ضعف في قاعدة المعرفة الداخلية"],
                satisfaction: ["فريق متعاون ومتحمس", "إرهاق من حجم الطلبات المتزايد", "الحاجة لنظام مكافآت مبني على CSAT"],
                tech: ["نظام تذاكر سحابي متكامل", "روبوت محادثة للاستفسارات الشائعة", "الحاجة لتحليل مشاعر العملاء بالذكاء الاصطناعي"],
                leadership: ["تركيز على رضا العميل أولاً", "مراجعة أسبوعية لمؤشرات الأداء", "دعم للتطوير المهني لفريق الدعم"]
            },
            projects: {
                skills: ["شهادة PMP/PRINCE2 لدى المديرين", "مهارات إدارة المخاطر والميزانيات", "الحاجة لتدريب على منهجيات Agile"],
                processes: ["منهجية إدارة مشاريع موحدة (PMO)", "تقارير حالة أسبوعية للمشاريع", "تأخر في إغلاق المشاريع المنتهية"],
                satisfaction: ["رضا عن تنوع المشاريع", "ضغط الالتزام بالمواعيد النهائية", "الحاجة لتوازن أفضل في توزيع المهام"],
                tech: ["أدوات إدارة مشاريع (Jira/MS Project)", "لوحات Kanban رقمية", "الحاجة لأدوات تنبؤ بالمخاطر"],
                leadership: ["قيادة مبنية على المعالم والنتائج", "شفافية في تحديثات المشاريع", "دعم لمبادرات التحسين المستمر"]
            },
            company: {
                skills: ["فريق قيادي متنوع الخبرات", "قدرات تخطيط استراتيجي عالية", "الحاجة لتطوير الصف الثاني من القيادات"],
                processes: ["هيكل تنظيمي واضح ومعتمد", "عمليات صنع قرار منظمة", "الحاجة لتحسين التواصل بين الأقسام"],
                satisfaction: ["ثقافة مؤسسية إيجابية", "التحديات في إدارة التغيير", "الحاجة لبرامج ولاء مؤسسية"],
                tech: ["بنية تحتية رقمية متكاملة", "أنظمة ERP مركزية", "الحاجة لتكامل أفضل بين الأنظمة"],
                leadership: ["رؤية مؤسسية واضحة ومشتركة", "دعم للابتكار والتحول", "التزام بالشفافية والحوكمة"]
            }
        };

        // متغير عام للقسم — كل الدوال تستخدمه
        let _pageDept = new URLSearchParams(window.location.search).get('dept') || 'company';

        const DEPT_AR = {
            hr: 'الموارد البشرية', finance: 'المالية', sales: 'المبيعات', marketing: 'التسويق',
            operations: 'العمليات', compliance: 'الامتثال', it: 'تقنية المعلومات', quality: 'الجودة',
            governance: 'الحوكمة', support: 'الدعم', cs: 'خدمة العملاء', projects: 'المشاريع', company: 'المنظمة'
        };

        const FIELDS = ['skills', 'processes', 'satisfaction', 'tech', 'leadership'];

        // ─── ربط زر المسح كـ fallback إن فشل inline onclick ───
        document.addEventListener('DOMContentLoaded', () => {
            const btn = document.getElementById('clearAllBtn');
            if (btn && !btn.dataset.bound) {
                btn.dataset.bound = '1';
                btn.addEventListener('click', (e) => {
                    e.preventDefault();
                    if (typeof clearAll === 'function') clearAll(btn);
                });
            }
        });

        (async function () {
            const dept = await window.initDeptPage() || _pageDept;
            _pageDept = (dept || 'company').toLowerCase().trim();

            document.getElementById('dept-name').textContent = DEPT_AR[_pageDept] || _pageDept;
            const titleEl = document.getElementById('dept-title');
            if (titleEl) titleEl.textContent = DEPT_AR[_pageDept] || _pageDept;

            await DeptPage.init(_pageDept);
            if (window.initSidebar) window.initSidebar();

            // عرض الاقتراحات حسب القسم الصحيح
            const pool = HEALTH_SUGGESTIONS[_pageDept] || HEALTH_SUGGESTIONS.company;
            Object.keys(pool).forEach(key => {
                const container = document.getElementById(`${key}-suggestions`);
                if (container) {
                    container.innerHTML = pool[key].map(s => `
                        <div class="suggestion-chip" onclick="applyHealth('${key}', '${s}')">${s}</div>
                    `).join('');
                }
            });

            // تحميل البيانات المحفوظة
            const data = await DeptPage.loadFromAPI('HEALTH_' + _pageDept.toUpperCase()) || {};
            DeptPage.fillForm(data);

            // رسم شريط تدفق البيانات — يظهر حالة المراحل السابقة
            try { await renderDataFlowBar(); } catch (e) { console.warn('[health] flow bar failed', e); }

            // هندلة النموذج
            document.getElementById('healthForm').onsubmit = async (e) => {
                e.preventDefault();
                const btn = document.getElementById('saveBtn');
                btn.disabled = true;
                btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> جاري الحفظ...';

                const healthData = {};
                FIELDS.forEach(id => { healthData[id] = document.getElementById(id).value; });

                const success = await DeptPage.saveToAPI('HEALTH_' + _pageDept.toUpperCase(), healthData);
                if (success) {
                    DeptPage.showMessage('✅ تم حفظ تقييم صحة الإدارة بنجاح.');
                    if (Context.markStepCompleted) await Context.markStepCompleted('dept-health');
                    setTimeout(() => window.location.replace(`/swot.html?dept=${_pageDept}`), 1500);
                } else {
                    btn.disabled = false;
                    btn.innerHTML = 'حفظ ومتابعة للـ SWOT <i class="bi bi-arrow-left ms-2"></i>';
                }
            };
        })();

        function applyHealth(id, text) {
            const area = document.getElementById(id);
            area.value = area.value.trim() ? area.value + '\n- ' + text : '- ' + text;
        }

        // ─── وظيفة المسح الشامل (النسخة المعززة) ───
        async function clearAll(btnEl) {
            console.log('[clearAll] Starting process for dept:', _pageDept);
            const btn = btnEl || document.getElementById('clearAllBtn');
            const origHTML = btn ? btn.innerHTML : '';

            // 1) إنشاء واجهة تأكيد مخصصة (تجنباً لمشاكل confirm المتصفح)
            const overlayId = 'stx-clear-overlay';
            if (document.getElementById(overlayId)) return;

            const overlay = document.createElement('div');
            overlay.id = overlayId;
            overlay.style.cssText = `
                position:fixed; inset:0; z-index:99999;
                background:rgba(11, 13, 18, 0.9); backdrop-filter:blur(8px);
                display:flex; align-items:center; justify-content:center;
                font-family:'Tajawal',sans-serif; direction:rtl;
            `;
            overlay.innerHTML = `
                <div style="background:#1a1d2e; border:1px solid rgba(255,255,255,0.1); border-radius:24px; padding:40px; max-width:400px; text-align:center; box-shadow:0 25px 50px rgba(0,0,0,0.5)">
                    <div style="font-size:3.5rem; margin-bottom:1.5rem">⚠️</div>
                    <h3 style="color:#fff; font-weight:800; margin-bottom:1rem">تأكيد مسح البيانات</h3>
                    <p style="color:#94a3b8; margin-bottom:2rem; font-size:0.95rem; line-height:1.6">هل أنت متأكد من رغبتك في حذف كافة الحقول والبيانات المحفوظة لهذا القسم؟ لا يمكن التراجع عن هذه العملية.</p>
                    <div style="display:flex; gap:12px; justify-content:center">
                        <button id="cancelClear" style="flex:1; padding:14px; border-radius:12px; border:1px solid rgba(255,255,255,0.1); background:rgba(255,255,255,0.05); color:#fff; font-weight:700">تراجع</button>
                        <button id="confirmClear" style="flex:1; padding:14px; border-radius:12px; border:none; background:#ef4444; color:#fff; font-weight:700">نعم، امسح الكل</button>
                    </div>
                </div>
            `;
            document.body.appendChild(overlay);

            // هندلة الأزرار داخل الواجهة
            const close = () => overlay.remove();
            document.getElementById('cancelClear').onclick = close;
            document.getElementById('confirmClear').onclick = async () => {
                close();
                console.log('[clearAll] User confirmed. Executing...');

                try {
                    if (btn) {
                        btn.disabled = true;
                        btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> جاري الحفظ...';
                    }

                    // 1. تصفير الحقول في الواجهة
                    const fields = ['skills', 'processes', 'satisfaction', 'tech', 'leadership'];
                    fields.forEach(f => {
                        const el = document.getElementById(f);
                        if (el) el.value = '';
                    });

                    const deptUpper = (_pageDept || 'company').toUpperCase();
                    const type = 'HEALTH_' + deptUpper;
                    const emptyData = { skills: '', processes: '', satisfaction: '', tech: '', leadership: '' };

                    // 2. تصفير Context & LocalStorage
                    if (window.Context?.setItem) {
                        const cKey = type + '_' + deptUpper;
                        Context.setItem(cKey, emptyData);
                        if (window.Context.removeItem) Context.removeItem(cKey);
                    }

                    const uid = window._cachedUser?.id || window.__currentUser?.id || 'local';
                    localStorage.removeItem(`stratix_${uid}_${_pageDept}_${type}`);
                    localStorage.removeItem(`stratix_${_pageDept}_${type}`);

                    // 3. تصفير API
                    let apiOk = false;
                    if (window.DeptPage?.saveToAPI) {
                        apiOk = await DeptPage.saveToAPI(type, emptyData);
                    } else if (window.api?.post) {
                        const res = await api.post('/api/dept/analysis', { type, dept: _pageDept, data: emptyData });
                        apiOk = !!res?.success;
                    }

                    // 4. رسالة نجاح
                    if (window.DeptPage?.showMessage) {
                        DeptPage.showMessage(apiOk ? '✅ تم تصفير البيانات بنجاح' : '⚠️ تم التصفير محلياً (حدث خطأ في المزامنة)');
                    } else {
                        alert('تم مسح البيانات');
                    }

                } catch (err) {
                    console.error('[clearAll] Logic failure:', err);
                    alert('عذراً، حدث خطأ أثناء محاولة المسح');
                } finally {
                    if (btn) {
                        btn.disabled = false;
                        btn.innerHTML = origHTML;
                    }
                }
            };
        }

        async function pullFromPestel(btnEl) {
            const btn = btnEl || event?.target?.closest('button');
            const origHTML = btn ? btn.innerHTML : '';
            if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> جاري السحب...'; }

            try {
                const p = await DeptPage.loadFromAPI('PESTEL');
                if (!p || typeof p !== 'object') {
                    alert('لا توجد بيانات PESTEL محفوظة لهذا القسم. أكمل تحليل PESTEL أولاً.');
                    return;
                }

                const PESTEL_LABELS = {
                    political: 'سياسي', economic: 'اقتصادي', social: 'اجتماعي',
                    technological: 'تقني', environmental: 'بيئي', legal: 'قانوني'
                };

                const fieldMap = {
                    skills: ['social', 'technological'],
                    processes: ['political', 'legal'],
                    satisfaction: ['social', 'economic'],
                    tech: ['technological', 'environmental'],
                    leadership: ['political', 'economic']
                };

                Object.keys(fieldMap).forEach(field => {
                    const area = document.getElementById(field);
                    if (!area) return;
                    const lines = [];
                    fieldMap[field].forEach(pKey => {
                        if (p[pKey] && String(p[pKey]).trim()) {
                            lines.push(`[PESTEL/${PESTEL_LABELS[pKey]}] ${String(p[pKey]).trim()}`);
                        }
                    });
                    if (lines.length > 0) {
                        area.value = area.value.trim() ? area.value + '\n' + lines.join('\n') : lines.join('\n');
                    }
                });

                if (DeptPage.showMessage) DeptPage.showMessage('✅ تم سحب بيانات PESTEL بنجاح');
            } catch (e) {
                console.error('pullFromPestel error:', e);
                alert('حدث خطأ أثناء سحب بيانات PESTEL');
            } finally {
                if (btn) { btn.disabled = false; btn.innerHTML = origHTML; }
            }
        }

        // ═══════════════════════════════════════════════════════════════
        // 🔗 سحب من كل المراحل السابقة: DEEP + AUDIT + PESTEL
        // ═══════════════════════════════════════════════════════════════
        async function syncFromAllSources(btnEl) {
            const btn = btnEl || document.getElementById('syncAllBtn');
            const origHTML = btn ? btn.innerHTML : '';
            if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> جاري السحب...'; }

            const deptUp = _pageDept.toUpperCase();
            const summary = { deep: 0, audit: 0, pestel: 0 };
            const collected = { skills: [], processes: [], satisfaction: [], tech: [], leadership: [] };

            // فلترة الحوكمة من نتائج الامتثال — بنود تخص الحوكمة الصرفة فقط
            const isComplianceDept = _pageDept === 'compliance';
            const governanceOnlyKeywords = ['مجلس الإدارة', 'صلاحيات المجلس', 'تضارب المصالح', 'لائحة حوكمة', 'أعضاء المجلس', 'لجنة التدقيق'];
            const shouldSkip = (txt) => isComplianceDept && governanceOnlyKeywords.some(k => (txt || '').includes(k));

            // ─── 1) DEEP (التشخيص العميق) ───
            try {
                const deep = await DeptPage.loadFromAPI('DEEP');
                if (deep && typeof deep === 'object') {
                    // استخراج النصوص من كل فئات التشخيص العميق
                    const extractTexts = (obj, depth = 0) => {
                        if (depth > 4 || !obj) return [];
                        if (typeof obj === 'string') return obj.trim() ? [obj.trim()] : [];
                        if (Array.isArray(obj)) return obj.flatMap(x => extractTexts(x, depth + 1));
                        if (typeof obj === 'object') {
                            const pref = ['answer', 'text', 'value', 'note', 'description', 'finding'];
                            for (const k of pref) {
                                if (obj[k] && typeof obj[k] === 'string') return [obj[k].trim()].filter(Boolean);
                            }
                            return Object.values(obj).flatMap(v => extractTexts(v, depth + 1));
                        }
                        return [];
                    };
                    const allTexts = extractTexts(deep).filter(t => t.length > 10 && !shouldSkip(t));
                    // توزيع على الحقول وفق الكلمات المفتاحية
                    allTexts.slice(0, 30).forEach(t => {
                        const low = t.toLowerCase();
                        let target = 'processes';
                        if (/مهار|كفاء|تدريب|خبر|فريق|قدرات/.test(t)) target = 'skills';
                        else if (/نظام|GRC|grc|تقني|أتمتة|منصة|رقمي|software/.test(t)) target = 'tech';
                        else if (/رضا|ثقاف|تواصل|بيئة|ولاء|ضغط/.test(t)) target = 'satisfaction';
                        else if (/قياد|إدار|توجه|رؤي|قرار|دعم الإدارة/.test(t)) target = 'leadership';
                        collected[target].push(`[DEEP] ${t}`);
                        summary.deep++;
                    });
                }
            } catch (e) { console.warn('[syncAll] DEEP failed', e); }

            // ─── 2) AUDIT (التقييم الوصفي) ───
            try {
                const auditKeys = [`AUDIT_${deptUp}`, 'AUDIT'];
                let audit = null;
                for (const k of auditKeys) {
                    audit = await DeptPage.loadFromAPI(k).catch(() => null);
                    if (audit && typeof audit === 'object' && Object.keys(audit).length > 0) break;
                }
                if (audit && typeof audit === 'object') {
                    // AUDIT typically contains scored criteria or notes
                    const pushAudit = (label, val, target) => {
                        if (!val) return;
                        const txt = typeof val === 'string' ? val : (val.note || val.comment || val.description || '');
                        if (txt && !shouldSkip(txt)) {
                            collected[target].push(`[AUDIT/${label}] ${txt.trim()}`);
                            summary.audit++;
                        }
                    };
                    Object.entries(audit).forEach(([key, val]) => {
                        const low = key.toLowerCase();
                        let target = 'processes';
                        if (/skill|مهار|training|تدريب/.test(low)) target = 'skills';
                        else if (/tech|نظام|grc|أتمت/.test(low)) target = 'tech';
                        else if (/satisf|رضا|culture|ثقاف/.test(low)) target = 'satisfaction';
                        else if (/leader|قياد|manage/.test(low)) target = 'leadership';
                        if (typeof val === 'object' && val !== null && !Array.isArray(val)) {
                            Object.entries(val).forEach(([k2, v2]) => pushAudit(key + '/' + k2, v2, target));
                        } else {
                            pushAudit(key, val, target);
                        }
                    });
                }
            } catch (e) { console.warn('[syncAll] AUDIT failed', e); }

            // ─── 3) PESTEL ───
            try {
                const p = await DeptPage.loadFromAPI('PESTEL');
                if (p && typeof p === 'object') {
                    const PL = { political: 'سياسي', economic: 'اقتصادي', social: 'اجتماعي', technological: 'تقني', environmental: 'بيئي', legal: 'قانوني' };
                    const fieldMap = {
                        skills: ['social', 'technological'],
                        processes: ['political', 'legal'],
                        satisfaction: ['social', 'economic'],
                        tech: ['technological', 'environmental'],
                        leadership: ['political', 'economic']
                    };
                    Object.entries(fieldMap).forEach(([field, keys]) => {
                        keys.forEach(k => {
                            const val = p[k];
                            if (val && String(val).trim() && !shouldSkip(String(val))) {
                                collected[field].push(`[PESTEL/${PL[k]}] ${String(val).trim()}`);
                                summary.pestel++;
                            }
                        });
                    });
                }
            } catch (e) { console.warn('[syncAll] PESTEL failed', e); }

            // ─── كتابة البيانات المدمجة في الحقول ───
            let totalInjected = 0;
            FIELDS.forEach(f => {
                const area = document.getElementById(f);
                if (!area || !collected[f].length) return;
                const existing = (area.value || '').trim();
                const newBlock = collected[f].map(s => '- ' + s).join('\n');
                area.value = existing ? existing + '\n' + newBlock : newBlock;
                totalInjected += collected[f].length;
            });

            const total = summary.deep + summary.audit + summary.pestel;
            const msg = total === 0
                ? '⚠️ لا توجد بيانات في المراحل السابقة — أكمل التشخيص العميق / التقييم / PESTEL أولاً'
                : `✅ تم سحب ${total} عنصر — DEEP(${summary.deep}) • AUDIT(${summary.audit}) • PESTEL(${summary.pestel})`;
            if (DeptPage.showMessage) DeptPage.showMessage(msg);

            // تحديث شريط تدفق البيانات
            await renderDataFlowBar(summary);

            if (btn) { btn.disabled = false; btn.innerHTML = origHTML; }
        }

        // شريط تدفق البيانات — يظهر حالة كل مرحلة سابقة (متوفرة / غير مكتملة)
        async function renderDataFlowBar(liveCounts) {
            const box = document.getElementById('data-flow-bar');
            if (!box) return;

            const deptUp = _pageDept.toUpperCase();
            const checks = {
                deep: { label: 'التشخيص العميق', key: 'DEEP', icon: 'bi-search-heart', color: '#6f42c1', tool: 'compliance-deep.html' },
                audit: { label: 'التقييم الوصفي', key: `AUDIT_${deptUp}`, icon: 'bi-clipboard2-pulse-fill', color: '#0dcaf0', tool: `${_pageDept}-audit.html` },
                pestel: { label: 'تحليل PESTEL', key: 'PESTEL', icon: 'bi-globe2', color: '#22c55e', tool: 'pestel.html' }
            };

            const status = {};
            await Promise.all(Object.entries(checks).map(async ([k, c]) => {
                try {
                    const d = await DeptPage.loadFromAPI(c.key).catch(() => null);
                    status[k] = !!(d && typeof d === 'object' && Object.keys(d).length > 0);
                } catch (e) { status[k] = false; }
            }));
            // audit fallback بدون suffix
            if (!status.audit) {
                try {
                    const d = await DeptPage.loadFromAPI('AUDIT').catch(() => null);
                    status.audit = !!(d && typeof d === 'object' && Object.keys(d).length > 0);
                } catch (e) { }
            }

            const chips = Object.entries(checks).map(([k, c]) => {
                const ok = status[k];
                const count = liveCounts?.[k];
                const bg = ok ? `${c.color}15` : 'rgba(239,68,68,0.08)';
                const fg = ok ? c.color : '#ef4444';
                const bd = ok ? `${c.color}55` : 'rgba(239,68,68,0.35)';
                const statusText = ok ? (count != null ? `${count} بند` : 'متوفرة') : 'غير مكتملة';
                const linkAttr = ok ? '' : ` onclick="window.location.href='/${c.tool}?dept=${_pageDept}'" style="cursor:pointer"`;
                return `<span${linkAttr} style="display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:10px;background:${bg};color:${fg};border:1px solid ${bd};font-size:0.78rem;font-weight:800;">
                    <i class="bi ${ok ? c.icon : 'bi-exclamation-triangle'}"></i> ${c.label} · ${statusText}
                </span>`;
            }).join('');

            const deptName = DEPT_AR[_pageDept] || _pageDept;
            box.innerHTML = `
                <div style="font-size:0.78rem;font-weight:800;color:#94a3b8;margin-bottom:8px;">
                    <i class="bi bi-diagram-3 me-1"></i> تسلسل البيانات الواصلة من مراحل مسار ${deptName}
                </div>
                <div style="display:flex;flex-wrap:wrap;gap:6px;">${chips}</div>
            `;
            box.style.display = 'block';
        }

        function fillAll() {
            const pool = HEALTH_SUGGESTIONS[_pageDept] || HEALTH_SUGGESTIONS.company;
            Object.keys(pool).forEach(key => {
                const area = document.getElementById(key);
                if (area && !area.value.trim()) {
                    area.value = pool[key].slice(0, 2).map(s => '- ' + s).join('\n');
                }
            });
        }
    </script>
