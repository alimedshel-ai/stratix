<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ستارتكس | تقييم صحة الإدارة</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/shared.css">
    <style>
        :root {
            --stx-bg: #0b0d12;
            --stx-card: rgba(22, 27, 34, 0.7);
            --stx-border: rgba(255, 255, 255, 0.08);
            --stx-primary: #6366f1;
            --stx-secondary: #2dd4bf;
            --stx-success: #10b981;
            --stx-danger: #ef4444;
        }

        body {
            background-color: var(--stx-bg);
            color: #f8fafc;
            font-family: 'Tajawal', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        .stx-wrapper {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Full Page Header */
        .stx-header {
            background: rgba(11, 13, 18, 0.85);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--stx-border);
            padding: 20px 40px;
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .stx-nav-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--stx-border);
            color: #fff;
            width: 48px;
            height: 48px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            cursor: pointer;
            text-decoration: none;
        }

        .stx-nav-btn:hover {
            background: var(--stx-primary);
            border-color: var(--stx-primary);
            transform: scale(1.05);
            color: #fff;
        }

        .stx-main-content {
            flex: 1;
            padding: 40px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        .hero-section {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.1) 0%, rgba(11, 13, 18, 0) 100%);
            border: 1px solid var(--stx-border);
            border-radius: 28px;
            padding: 40px;
            margin-bottom: 40px;
            position: relative;
            overflow: hidden;
        }

        .health-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 28px;
        }

        .health-card {
            background: var(--stx-card);
            border: 1px solid var(--stx-border);
            border-radius: 24px;
            padding: 30px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .health-card:hover {
            border-color: var(--stx-primary);
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .form-control {
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid var(--stx-border);
            color: #fff;
            border-radius: 16px;
            padding: 18px;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            background: rgba(15, 23, 42, 0.6);
            border-color: var(--stx-primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
            color: #fff;
        }

        .suggestion-chip {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--stx-border);
            padding: 8px 16px;
            border-radius: 12px;
            font-size: 0.85rem;
            color: #94a3b8;
            cursor: pointer;
            margin: 4px;
            display: inline-block;
            transition: 0.3s;
        }

        .suggestion-chip:hover {
            border-color: var(--stx-primary);
            background: rgba(99, 102, 241, 0.1);
            color: var(--stx-primary);
        }

        .btn-modern {
            padding: 16px 32px;
            border-radius: 16px;
            font-weight: 800;
            letter-spacing: 0.3px;
            transition: all 0.3s ease;
        }

        .btn-primary.btn-modern {
            background: var(--stx-primary);
            border: none;
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.2);
        }

        .btn-primary.btn-modern:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(99, 102, 241, 0.3);
        }
    </style>
</head>

<body>
    <div class="stx-wrapper">
        <!-- Persistent Header without Sidebar -->
        <header class="stx-header">
            <div class="d-flex align-items-center gap-3">
                <a href="javascript:history.back()" class="stx-nav-btn" title="العودة">
                    <i class="bi bi-arrow-right fs-4"></i>
                </a>
                <div>
                    <h5 class="m-0 fw-800 text-white">تشخيص الصحة التشغيلية</h5>
                    <div class="d-flex align-items-center gap-2 text-muted" style="font-size: 0.8rem;">
                        <i class="bi bi-building text-secondary"></i> قسم <span id="dept-name">...</span>
                    </div>
                </div>
            </div>

            <div class="d-flex gap-3 align-items-center">
                <button type="button" onclick="fillAll()" class="btn btn-outline-light btn-sm rounded-3 px-3">
                    <i class="bi bi-magic me-1"></i> ملء تلقائي ذكي
                </button>
                <div class="vr mx-2 text-white opacity-10" style="height: 30px;"></div>
                <button type="submit" form="healthForm" class="stx-nav-btn" title="التالي" id="saveBtnTop">
                    <i class="bi bi-arrow-left fs-4"></i>
                </button>
            </div>
        </header>

        <main class="stx-main-content">
            <div class="hero-section">
                <div class="row align-items-center">
                    <div class="col-lg-8">
                        <h2 class="fw-900 text-white mb-3">تقييم نضج وقدرات إدارة <span id="dept-title">الموارد
                                البشرية</span></h2>
                        <p class="text-muted fs-5 mb-0">قم بتوصيف الوضع الحالي لخمسة أبعاد رئيسية لبناء الأساس لعملية
                            تحليل SWOT.</p>
                    </div>
                    <div class="col-lg-4 text-end d-none d-lg-block">
                        <div class="display-1 opacity-10"><i class="bi bi-shield-shaded"></i></div>
                    </div>
                </div>
            </div>

            <form id="healthForm">
                <div class="health-grid">
                    <!-- Skills -->
                    <div class="health-card">
                        <div class="d-flex align-items-center gap-3">
                            <div class="card-icon"
                                style="background: rgba(99, 102, 241, 0.1); width: 50px; height: 50px; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: var(--stx-primary);">
                                <i class="bi bi-person-badge fs-3"></i>
                            </div>
                            <h5 class="m-0 fw-800">الكفاءات والمهارات</h5>
                        </div>
                        <div id="skills-suggestions" class="px-1"></div>
                        <textarea id="skills" name="skills" class="form-control" rows="5"
                            placeholder="صف مهارات فريقك، الفجوات التدريبية، والخبرات النوعية..."></textarea>
                    </div>

                    <!-- Processes -->
                    <div class="health-card">
                        <div class="d-flex align-items-center gap-3">
                            <div class="card-icon"
                                style="background: rgba(45, 212, 191, 0.1); width: 50px; height: 50px; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: var(--stx-secondary);">
                                <i class="bi bi-diagram-2 fs-3"></i>
                            </div>
                            <h5 class="m-0 fw-800">العمليات والإجراءات</h5>
                        </div>
                        <div id="processes-suggestions" class="px-1"></div>
                        <textarea id="processes" name="processes" class="form-control" rows="5"
                            placeholder="حوكمة العمليات، الأدلة الاسترشادية، وسرعة التنفيذ..."></textarea>
                    </div>

                    <!-- Satisfaction -->
                    <div class="health-card">
                        <div class="d-flex align-items-center gap-3">
                            <div class="card-icon"
                                style="background: rgba(244, 63, 94, 0.1); width: 50px; height: 50px; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: #f43f5e;">
                                <i class="bi bi-heart-pulse fs-3"></i>
                            </div>
                            <h5 class="m-0 fw-800">الارتباط والرضا الوظيفي</h5>
                        </div>
                        <div id="satisfaction-suggestions" class="px-1"></div>
                        <textarea id="satisfaction" name="satisfaction" class="form-control" rows="5"
                            placeholder="بيئة العمل، الولاء الوظيفي، ومستوى الضغوطات..."></textarea>
                    </div>

                    <!-- Tech -->
                    <div class="health-card">
                        <div class="d-flex align-items-center gap-3">
                            <div class="card-icon"
                                style="background: rgba(14, 165, 233, 0.1); width: 50px; height: 50px; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: #0ea5e9;">
                                <i class="bi bi-laptop fs-3"></i>
                            </div>
                            <h5 class="m-0 fw-800">التمكين الرقمي</h5>
                        </div>
                        <div id="tech-suggestions" class="px-1"></div>
                        <textarea id="tech" name="tech" class="form-control" rows="5"
                            placeholder="الأنظمة المستخدمة، أتمتة البيانات، والقدرة التقنية..."></textarea>
                    </div>

                    <!-- Leadership -->
                    <div class="health-card">
                        <div class="d-flex align-items-center gap-3">
                            <div class="card-icon"
                                style="background: rgba(245, 158, 11, 0.1); width: 50px; height: 50px; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: #f59e0b;">
                                <i class="bi bi-star fs-3"></i>
                            </div>
                            <h5 class="m-0 fw-800">القيادة والتواصل</h5>
                        </div>
                        <div id="leadership-suggestions" class="px-1"></div>
                        <textarea id="leadership" name="leadership" class="form-control" rows="5"
                            placeholder="شفافية القرار، وضوح الأهداف، وقوة التواصل الداخلي..."></textarea>
                    </div>
                </div>

                <div class="text-center mt-5 mb-5 pb-5">
                    <button type="submit" class="btn btn-primary btn-modern px-5" id="saveBtn">
                        حفظ ومتابعة لتحليل SWOT <i class="bi bi-arrow-left ms-2"></i>
                    </button>
                </div>
            </form>
        </main>
    </div>

    <!-- Scripts -->
    <script src="/js/api.js"></script>
    <script src="/js/utils.js"></script>
    <script src="/js/context-manager.js"></script>
    <script src="/js/steps-config.js"></script>
    <script src="/js/sidebar.js"></script>
    <script src="/js/dept-page.js"></script>

    <script>
        const HEALTH_SUGGESTIONS = {
            hr: {
                skills: ["فجوة في مهارات تحليل البيانات", "خبرات عالية في علاقات الموظفين", "نقص التدريب على الأنظمة الجديدة"],
                processes: ["إجراءات التوظيف مؤتمتة بنسبة 70%", "دليل السياسات محدث ومعتمد", "تداخل في صلاحيات الترقية"],
                satisfaction: ["ارتباط وظيفي عالٍ في القيادات", "تذمر من نظام المكافآت الحالي", "توازن مقبول بين العمل والحياة"],
                tech: ["نظام ERP قيد التطوير", "استخدام مكثف لمنصات العمل التشاركي", "نقص الأجهزة اللوحية للمشرفين"],
                leadership: ["شفافية عالية من مدير القسم", "أهداف ربع سنوية واضحة", "الحاجة لاجتماعات دورية للقسم"]
            },
            finance: {
                skills: ["محاسبون قانونيون (SOCPA/CPA)", "مهارات متقدمة في النمذجة المالية", "الحاجة لتدريب على ضريبة القيمة المضافة"],
                processes: ["إغلاق حسابتنا خلال 3 أيام", "حوكمة صرف صارمة ونظامية", "تراكم معلقات الموردين"],
                satisfaction: ["ولاء وظيفي مرتفع واستقرار", "ضغط عمل في فترات الإغلاق", "الحاجة لبرامج تقدير مالية"],
                tech: ["نظام فوترة إلكتروني متكامل", "ربط آلي مع منصة اعتماد", "ضعف أدوات التقارير الفورية"],
                leadership: ["قيادة تركز على التفاصيل والأرقام", "مناقشات ميزانية شفافة", "تفويض صلاحيات محدود"]
            }
        };

        (async function () {
            // 🛡️ تهيئة الصفحة (تضمن تحميل المستخدم والقسم)
            const dept = await window.initDeptPage();
            if (!dept) return;

            const DEPT_AR = { hr: 'الموارد البشرية', finance: 'المالية', sales: 'المبيعات', marketing: 'التسويق', operations: 'العمليات', compliance: 'الامتثال' };

            document.getElementById('dept-name').textContent = dept.toUpperCase();
            const titleEl = document.getElementById('dept-title');
            if (titleEl) titleEl.textContent = DEPT_AR[dept.toLowerCase()] || dept.toUpperCase();

            // تهيئة DeptPage (مهم جداً للحفظ)
            await DeptPage.init(dept);

            if (window.initSidebar) window.initSidebar();

            const pool = HEALTH_SUGGESTIONS[dept.toLowerCase()] || HEALTH_SUGGESTIONS.hr;
            Object.keys(pool).forEach(key => {
                const container = document.getElementById(`${key}-suggestions`);
                if (container) {
                    container.innerHTML = pool[key].map(s => `
                        <div class="suggestion-chip" onclick="applyHealth('${key}', '${s}')">${s}</div>
                    `).join('');
                }
            });

            const data = await DeptPage.loadFromAPI('HEALTH_' + dept.toUpperCase()) || {};
            DeptPage.fillForm(data);

            // هندلة النموذج
            document.getElementById('healthForm').onsubmit = async (e) => {
                e.preventDefault();
                const btn = document.getElementById('saveBtn');
                btn.disabled = true;
                btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> جاري الحفظ...';

                const healthData = {
                    skills: document.getElementById('skills').value,
                    processes: document.getElementById('processes').value,
                    satisfaction: document.getElementById('satisfaction').value,
                    tech: document.getElementById('tech').value,
                    leadership: document.getElementById('leadership').value
                };

                const success = await DeptPage.saveToAPI('HEALTH_' + dept.toUpperCase(), healthData);
                if (success) {
                    DeptPage.showMessage('✅ تم حفظ تقييم صحة الإدارة بنجاح.');
                    if (Context.markStepCompleted) await Context.markStepCompleted('dept-health');
                    setTimeout(() => window.location.href = `/swot.html?dept=${dept}`, 1500);
                } else {
                    btn.disabled = false;
                    btn.innerHTML = 'حفظ ومتابعة للـ SWOT <i class="bi bi-arrow-left ms-2"></i>';
                }
            };
        })();

        function applyHealth(id, text) {
            const area = document.getElementById(id);
            area.value = area.value.trim() ? area.value + '\n- ' + text : '- ' + text;
        }

        function fillAll() {
            const dept = Context.getDept() || 'hr';
            const pool = HEALTH_SUGGESTIONS[dept.toLowerCase()] || HEALTH_SUGGESTIONS.hr;
            Object.keys(pool).forEach(key => {
                const area = document.getElementById(key);
                if (area && !area.value.trim()) {
                    area.value = pool[key].slice(0, 2).map(s => '- ' + s).join('\n');
                }
            });
        }
    </script>
</body>

</html>
