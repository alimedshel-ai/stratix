<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ستارتكس - قبول الدعوة</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #0a0b10;
            --bg2: #12141f;
            --card: #171a2a;
            --text: #e2e8f0;
            --muted: #7a8599;
            --border: rgba(255, 255, 255, 0.06);
            --primary: #667eea;
            --secondary: #764ba2;
            --green: #22c55e;
            --red: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .join-card {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px;
            width: 480px;
            max-width: 95vw;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .join-card::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            left: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
        }

        .join-logo {
            font-size: 36px;
            font-weight: 900;
            margin-bottom: 8px;
        }

        .join-logo span {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .join-entity {
            font-size: 14px;
            color: var(--muted);
            margin-bottom: 24px;
        }

        .join-role-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            border-radius: 14px;
            background: rgba(102, 126, 234, 0.1);
            border: 1px solid rgba(102, 126, 234, 0.2);
            font-weight: 800;
            font-size: 18px;
            margin-bottom: 20px;
        }

        .join-role-icon {
            font-size: 28px;
        }

        .join-message {
            font-size: 14px;
            color: var(--muted);
            line-height: 1.7;
            padding: 14px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            margin-bottom: 20px;
            font-style: italic;
        }

        .join-form {
            text-align: right;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 6px;
            display: block;
            color: var(--muted);
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-family: inherit;
            font-size: 14px;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .join-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            font-family: inherit;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 8px;
        }

        .join-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(102, 126, 234, 0.4);
        }

        .join-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .join-error {
            padding: 12px;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 10px;
            color: var(--red);
            font-size: 13px;
            margin-top: 12px;
            display: none;
        }

        .join-success {
            padding: 20px;
            background: rgba(34, 197, 94, 0.08);
            border: 1px solid rgba(34, 197, 94, 0.2);
            border-radius: 14px;
            text-align: center;
        }

        .join-success h3 {
            color: var(--green);
            font-size: 20px;
            margin-bottom: 8px;
        }

        .join-loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            padding: 40px;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .expired-card {
            text-align: center;
            padding: 40px;
        }

        .expired-icon {
            font-size: 64px;
            margin-bottom: 16px;
        }
    </style>
</head>

<body>
    <div class="join-card" id="joinCard">
        <div class="join-loading" id="loadingState">
            <div class="spinner"></div>
            <div style="color:var(--muted)">جارٍ تحميل الدعوة...</div>
        </div>
    </div>

    <script src="/js/api.js?v=4"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const inviteToken = urlParams.get('token');

        const ROLE_INFO = {
            CEO: { label: 'المدير التنفيذي', icon: '👤' },
            CFO: { label: 'المدير المالي', icon: '💰' },
            CMO: { label: 'مدير التسويق', icon: '📢' },
            COO: { label: 'مدير العمليات', icon: '⚙️' },
            CTO: { label: 'مدير التقنية', icon: '💻' },
            CHRO: { label: 'مدير الموارد البشرية', icon: '👥' },
            CSO: { label: 'مدير المبيعات', icon: '📦' },
            CCO: { label: 'مدير خدمة العملاء', icon: '🎧' },
            CLO: { label: 'مدير الشؤون القانونية', icon: '📋' },
        };

        async function loadInvitation() {
            if (!inviteToken) {
                showError('رابط الدعوة غير صالح');
                return;
            }

            try {
                const res = await window.apiRequest(`/api/invitations/view/${inviteToken}`);
                const data = await res.json();

                if (!res.ok) {
                    if (res.status === 410) {
                        showExpired(data.status || 'EXPIRED');
                    } else {
                        showError(data.error || 'الدعوة غير موجودة');
                    }
                    return;
                }

                showInvitation(data);
            } catch (e) {
                showError('خطأ في الاتصال بالخادم');
            }
        }

        function showInvitation(data) {
            const role = ROLE_INFO[data.departmentRole] || { label: data.departmentRole, icon: '👤' };
            const entityName = data.entity?.displayName || data.entity?.legalName || 'الشركة';

            document.getElementById('joinCard').innerHTML = `
                <div class="join-logo"><span>STRATIX</span></div>
                <div class="join-entity">تمت دعوتك للانضمام إلى <strong>${entityName}</strong></div>

                <div class="join-role-badge">
                    <span class="join-role-icon">${role.icon}</span>
                    ${role.label}
                </div>

                ${data.message ? `<div class="join-message">"${data.message}"</div>` : ''}

                <div class="join-form">
                    <div style="text-align:center;margin-bottom:16px;padding:10px 14px;background:rgba(102,126,234,0.06);border-radius:10px;font-size:13px;color:var(--muted)">
                        <i class="bi bi-clock" style="color:var(--primary);margin-left:4px"></i>
                        المدة المتوقعة: <strong style="color:var(--text)">10-15 دقيقة</strong> لملء بيانات قسمك
                    </div>
                    <div class="form-group">
                        <label class="form-label">اسمك الكامل</label>
                        <input type="text" class="form-input" id="joinName" value="${data.name || ''}"
                            placeholder="أدخل اسمك">
                    </div>
                    <div class="form-group">
                        <label class="form-label">البريد الإلكتروني</label>
                        <input type="email" class="form-input" value="${data.email}" readonly
                            style="background:rgba(255,255,255,0.02);color:var(--muted)">
                    </div>
                    <div class="form-group" id="passwordGroup">
                        <label class="form-label">كلمة المرور (لحسابك الجديد)</label>
                        <input type="password" class="form-input" id="joinPassword"
                            placeholder="6 أحرف على الأقل" minlength="6">
                    </div>

                    <button class="join-btn" id="acceptBtn" onclick="acceptInvitation()">
                        <i class="bi bi-check2-circle"></i> قبول الدعوة والانضمام
                    </button>

                    <div class="join-error" id="joinError"></div>
                </div>
            `;

            // Check if user already logged in
            const existingToken = localStorage.getItem('token');
            if (existingToken) {
                const pwGroup = document.getElementById('passwordGroup');
                if (pwGroup) pwGroup.style.display = 'none';
            }
        }

        function showError(msg) {
            document.getElementById('joinCard').innerHTML = `
                <div class="expired-card">
                    <div class="expired-icon">❌</div>
                    <h3 style="margin-bottom:8px">${msg}</h3>
                    <a href="/login.html" style="color:var(--primary);font-weight:600;text-decoration:none">
                        العودة لتسجيل الدخول →
                    </a>
                </div>
            `;
        }

        function showExpired(status) {
            const msg = status === 'ACCEPTED' ? 'تم قبول هذه الدعوة مسبقاً' : 'انتهت صلاحية هذه الدعوة';
            const icon = status === 'ACCEPTED' ? '✅' : '⏰';
            document.getElementById('joinCard').innerHTML = `
                <div class="expired-card">
                    <div class="expired-icon">${icon}</div>
                    <h3 style="margin-bottom:8px">${msg}</h3>
                    <p style="color:var(--muted);font-size:14px;margin-bottom:16px">
                        ${status === 'ACCEPTED' ? 'يمكنك تسجيل الدخول مباشرة' : 'تواصل مع المدير لإعادة إرسال الدعوة'}
                    </p>
                    <a href="/login.html" style="color:var(--primary);font-weight:600;text-decoration:none">
                        تسجيل الدخول →
                    </a>
                </div>
            `;
        }

        async function acceptInvitation() {
            const name = document.getElementById('joinName')?.value?.trim();
            const password = document.getElementById('joinPassword')?.value;
            const btn = document.getElementById('acceptBtn');
            const errEl = document.getElementById('joinError');

            btn.disabled = true;
            btn.innerHTML = '<i class="bi bi-hourglass-split"></i> جارٍ الانضمام...';
            errEl.style.display = 'none';

            try {
                const res = await window.apiRequest(`/api/invitations/accept/${inviteToken}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, password }),
                    credentials: 'include' // 🔒 إرسال واستقبال HttpOnly Cookie
                });

                const data = await res.json();

                if (!res.ok) {
                    errEl.textContent = data.error || 'فشل في قبول الدعوة';
                    errEl.style.display = 'block';

                    if (data.requiresRegistration) {
                        const pwGroup = document.getElementById('passwordGroup');
                        if (pwGroup) {
                            pwGroup.style.display = 'block';
                            document.getElementById('joinPassword').focus();
                        }
                    }
                    return;
                }

                // Success!
                if (data.token) {
                    // 🔒 الكوكي HttpOnly أُضبط تلقائياً — نخزن علامة فقط
                    localStorage.setItem('token', 'httponly-managed');
                }
                if (data.user) {
                    localStorage.setItem('userName', data.user.name);
                }

                document.getElementById('joinCard').innerHTML = `
                    <div class="join-success">
                        <div style="font-size:64px;margin-bottom:12px">🎉</div>
                        <h3>${data.message || 'تم الانضمام بنجاح!'}</h3>
                        <p style="color:var(--muted);font-size:14px;margin-top:8px">سيتم توجيهك لملء بيانات قسمك...</p>
                    </div>
                `;

                setTimeout(() => {
                    window.location.href = data.redirectTo || '/dept-questionnaire.html?dept=auto';
                }, 2000);

            } catch (e) {
                errEl.textContent = 'خطأ في الاتصال بالخادم';
                errEl.style.display = 'block';
            } finally {
                if (btn) {
                    btn.disabled = false;
                    btn.innerHTML = '<i class="bi bi-check2-circle"></i> قبول الدعوة والانضمام';
                }
            }
        }

        // Load on page ready
        loadInvitation();
    </script>
</body>

</html>
