<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ستارتكس | التقييم الوصفي الجنائي - الموارد البشرية</title>
    <!-- Frameworks -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap"
        rel="stylesheet">

    <!-- Custom Styles -->
    <link rel="stylesheet" href="/css/shared.css">
    <link rel="stylesheet" href="/css/dept-pages.css">

    <style>
        :root {
            --stx-bg: #0b0d12;
            --stx-card: rgba(22, 27, 34, 0.7);
            --stx-border: rgba(255, 255, 255, 0.08);
            --stx-primary: #6366f1;
            --stx-success: #10b981;
            --stx-warn: #f59e0b;
            --stx-danger: #ef4444;
        }

        body {
            background-color: var(--stx-bg);
            color: #f8fafc;
            font-family: 'Tajawal', sans-serif;
            overflow: hidden;
            /* Main scroll handles it */
        }

        .stx-wrapper {
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .stx-sidebar-container {
            width: 260px;
            flex-shrink: 0;
            border-left: 1px solid var(--stx-border);
        }

        .stx-main-content {
            flex: 1;
            overflow-y: auto;
            height: 100vh;
        }

        /* Standard Header Override for Audit */
        .stx-header {
            background: rgba(11, 13, 18, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--stx-border);
            padding: 15px 30px;
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Info Stats Bar */
        .stats-bar {
            background: linear-gradient(90deg, rgba(99, 102, 241, 0.1) 0%, rgba(11, 13, 18, 0) 100%);
            border: 1px solid var(--stx-border);
            border-radius: 20px;
            padding: 20px 30px;
            margin: 30px;
            display: flex;
            flex-wrap: wrap;
            gap: 40px;
            align-items: center;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .stat-label {
            font-size: 0.75rem;
            color: #94a3b8;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-value {
            font-size: 1.25rem;
            font-weight: 800;
            color: #fff;
        }

        /* Audit Grid */
        .audit-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(450px, 1fr));
            gap: 24px;
            padding: 0 30px 120px;
        }

        .audit-card {
            background: var(--stx-card);
            border: 1px solid var(--stx-border);
            border-radius: 24px;
            padding: 24px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .audit-card:hover {
            border-color: var(--stx-primary);
            transform: translateY(-4px);
            background: rgba(255, 255, 255, 0.03);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .audit-card.unanswered {
            border: 2px solid var(--stx-danger) !important;
            background: rgba(239, 68, 68, 0.02);
        }

        .card-header-stx {
            display: flex;
            align-items: flex-start;
            gap: 15px;
            margin-bottom: 20px;
        }

        .card-icon {
            width: 42px;
            height: 42px;
            background: rgba(99, 102, 241, 0.1);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--stx-primary);
            font-size: 1.25rem;
            flex-shrink: 0;
        }

        .card-title {
            font-size: 1rem;
            font-weight: 700;
            margin: 0;
            line-height: 1.4;
            color: #f1f5f9;
        }

        /* Segmented Control for Options */
        .option-group {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin-bottom: 20px;
        }

        .opt-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 10px 12px;
            font-size: 0.85rem;
            font-weight: 600;
            color: #94a3b8;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .opt-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
        }

        .opt-btn.active.success {
            background: var(--stx-success);
            color: #fff;
            border-color: transparent;
        }

        .opt-btn.active.warning {
            background: var(--stx-warn);
            color: #fff;
            border-color: transparent;
        }

        .opt-btn.active.danger {
            background: var(--stx-danger);
            color: #fff;
            border-color: transparent;
        }

        .audit-textarea {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--stx-border);
            border-radius: 14px;
            padding: 12px 16px;
            color: #e2e8f0;
            font-size: 0.85rem;
            resize: none;
            height: 60px;
            transition: all 0.2s;
        }

        .audit-textarea:focus {
            outline: none;
            border-color: var(--stx-primary);
            background: rgba(0, 0, 0, 0.3);
            height: 100px;
        }

        /* Sticky Footer */
        .action-footer {
            position: fixed;
            bottom: 0;
            right: 260px;
            left: 0;
            background: rgba(11, 13, 18, 0.9);
            backdrop-filter: blur(15px);
            border-top: 1px solid var(--stx-border);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1100;
            box-shadow: 0 -10px 30px rgba(0, 0, 0, 0.5);
        }

        @media (max-width: 768px) {
            .action-footer {
                right: 0;
            }

            .audit-grid {
                grid-template-columns: 1fr;
            }
        }

        .btn-stx-primary {
            background: var(--stx-primary);
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 14px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        .btn-stx-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.5);
            background: #4f46e5;
        }

        .btn-stx-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* Step Progress Hub Icon */
        .step-hub-icon {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: var(--stx-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.1rem;
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.4);
        }
    </style>
</head>

<body>
    <div class="stx-wrapper">
        <aside class="stx-sidebar-container"></aside>

        <main class="stx-main-content">
            <!-- Glass Header -->
            <header class="stx-header">
                <div class="d-flex align-items-center gap-3">
                    <div class="step-hub-icon"><i class="bi bi-shield-check"></i></div>
                    <div>
                        <h1 class="h5 fw-bold m-0" id="main-title">التقييم الوصفي الجنائي (Audit)</h1>
                        <p class="small text-muted m-0" id="dept-context">جاري التحميل...</p>
                    </div>
                </div>
                <div class="d-flex align-items-center gap-4">
                    <div class="text-end d-none d-md-block">
                        <div class="small text-muted">الخطوة التالية</div>
                        <div class="fw-bold" style="color:#3b82f6">تحليل PESTEL <i class="bi bi-arrow-left"></i></div>
                    </div>
                </div>
            </header>

            <!-- Stats Bar -->
            <div class="stats-bar shadow-sm">
                <div class="stat-item">
                    <span class="stat-label">نقاط الأداء</span>
                    <span class="stat-value" id="scoreVal">—</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">نسبة التوطين</span>
                    <span class="stat-value" id="saudizationVal">—</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">معدل الدوران</span>
                    <span class="stat-value" id="turnoverVal">—</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">الامتثال</span>
                    <span class="stat-value" id="complianceVal">—</span>
                </div>
                <div class="ms-auto">
                    <div
                        class="badge bg-primary-subtle text-primary rounded-pill px-3 py-2 border border-primary-subtle">
                        <i class="bi bi-lightning-charge-fill me-1"></i> فحص 51 نقطة استراتيجية
                    </div>
                </div>
            </div>

            <!-- Audit Form -->
            <form id="forensicAudit">
                <div class="audit-grid" id="auditQuestions">
                    <!-- Dynamic Questions Injection -->
                </div>

                <!-- Footer Action Bar -->
                <div class="action-footer">
                    <div class="d-flex align-items-center gap-3">
                        <div id="saveProgress" class="text-muted small fw-bold">
                            <i class="bi bi-info-circle"></i> يرجى تقييم جميع النقاط للمتابعة
                        </div>
                    </div>
                    <button type="submit" class="btn-stx-primary" id="btnSave">
                        حفظ ومتابعة لتحليل PESTEL <i class="bi bi-arrow-left"></i>
                    </button>
                </div>
            </form>
        </main>
    </div>

            { id: 'employer_branding', label: 'هوية جهة العمل كعلامة جارية', icon: 'bi-star', opts: ['سمعة قوية بالسوق', 'سمعة جيدة', 'غير معروفة', 'سمعة سلبية'] },
            { id: 'hr_budget_control', label: 'الرقابة على ميزانية الموارد البشرية', icon: 'bi-cash-coin', opts: ['ضمن المخطط تماماً', 'تجاوزات طفيفة', 'صرف غير مبرر', 'غياب الرقابة'] },
            { id: 'employee_handbook', label: 'دليل الموظف (SOPs)', icon: 'bi-book', opts: ['شامل وسهل الوصول', 'موجود مطبوع', 'ملفات متفرقة', 'لا يوجد دليل'] },
            { id: 'career_pathing', label: 'سُلّم المسار الوظيفي والنمو', icon: 'bi-stairs', opts: ['واضح لكل موظف', 'خارطة طريق عامة', 'ترقيات عشوائية', 'طريق مسدود'] },
            { id: 'mental_health', label: 'صحة ورفاهية الموظفين النفسية', icon: 'bi-emoji-smile', opts: ['برامج دعم مفعّلة', 'مبادرات بسيطة', 'تجاهل للرفاهية', 'بيئة عمل مرهقة'] },
            { id: 'future_skills_gap', label: 'تحليل الفجوة في مهارات المستقبل', icon: 'bi-lightning-charge', opts: ['يتم بشكل سنوي', 'محاولات فردية', 'لا يوجد تحليل', 'اعتماد على القديم'] }
        ];

        let auditState = {};
        const urlParams = new URLSearchParams(window.location.search);
        const dept = urlParams.get('dept') || (typeof Context !== 'undefined' ? Context.getDept() : null) || 'hr';
        const DEPT_NAMES = { hr: 'الموارد البشرية', finance: 'المالية', marketing: 'التسويق', operations: 'العمليات' };

        function initAudit() {
            document.getElementById('dept-context').textContent = `${DEPT_NAMES[dept] || dept} | المرحلة 1: التشخيص والاستكشاف`;
            const container = document.getElementById('auditQuestions');
            container.innerHTML = QUESTIONS.map(q => `
                <div class="audit-card" data-id="${q.id}">
                    <div class="card-header-stx">
                        <div class="card-icon"><i class="bi ${q.icon}"></i></div>
                        <h3 class="card-title">${q.label}</h3>
                    </div>
                    <div class="option-group">
                        ${q.opts.map((opt, idx) => `
                            <div class="opt-btn" data-val="${idx}" onclick="setVal('${q.id}', '${idx}', this)">${opt}</div>
                        `).join('')}
                    </div>
                    <textarea class="audit-textarea" placeholder="أضف ملاحظات أو أسباب اختيارك (اختياري)..." oninput="setNote('${q.id}', this.value)"></textarea>
                </div>
            `).join('');

            loadData();
        }

        function setVal(id, val, btn) {
            if (!auditState[id]) auditState[id] = { val: '', note: '', label: '' };
            auditState[id].val = val;

            const q = QUESTIONS.find(x => x.id === id);
            auditState[id].label = q.opts[parseInt(val)];

            const parent = btn.parentElement;
            parent.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('active', 'success', 'warning', 'danger'));
            btn.classList.add('active');

            const idx = parseInt(val);
            if (idx === 0) btn.classList.add('success');
            else if (idx === q.opts.length - 1) btn.classList.add('danger');
            else btn.classList.add('warning');

            btn.closest('.audit-card').classList.remove('unanswered');
            updateProgress();
        }

        function setNote(id, note) {
            if (!auditState[id]) auditState[id] = { val: '', note: '', label: (auditState[id]?.label || '') };
            auditState[id].note = note;
        }

        function updateProgress() {
            const answeredCount = Object.keys(auditState).filter(k => auditState[k] && auditState[k].val !== '').length;
            const prog = document.getElementById('saveProgress');
            if (answeredCount === QUESTIONS.length) {
                prog.innerHTML = '<i class="bi bi-check-circle-fill text-success"></i> جاهز للحفظ والمتابعة';
                prog.className = 'small fw-bold text-success';
            } else {
                prog.innerHTML = `<i class="bi bi-info-circle"></i> تم تقييم ${answeredCount} من أصل ${QUESTIONS.length} نقطة استراتيجية`;
                prog.className = 'small fw-bold text-muted';
            }
        }

        async function loadData() {
            const apiType = `AUDIT_${dept.toUpperCase()}`;
            const savedFromAPI = await DeptPage.loadFromAPI(apiType).catch(() => null);
            const savedLocal = JSON.parse(localStorage.getItem(`stratix_${dept}_audit_v2`) || '{}');
            const saved = savedFromAPI || savedLocal;

            auditState = saved;

            Object.keys(saved).forEach(id => {
                const card = document.querySelector(`.audit-card[data-id="${id}"]`);
                if (card) {
                    const btn = card.querySelector(`.opt-btn[data-val="${saved[id].val}"]`);
                    if (btn) setVal(id, saved[id].val, btn);
                    const area = card.querySelector('textarea');
                    if (area) area.value = saved[id].note || '';
                }
            });

            // Load extra stats from Dept Deep results
            const deep = JSON.parse(localStorage.getItem(`${dept}DeepResults`) || '{}');
            if (deep.score) document.getElementById('scoreVal').textContent = deep.score;
            if (deep.saudizationRate) document.getElementById('saudizationVal').textContent = Math.round(deep.saudizationRate) + '%';
            if (deep.turnoverRate) document.getElementById('turnoverVal').textContent = Math.round(deep.turnoverRate) + '%';
            if (deep.complianceScore) document.getElementById('complianceVal').textContent = Math.round(deep.complianceScore) + '%';

            updateProgress();
        }

        document.getElementById('forensicAudit').addEventListener('submit', async (e) => {
            e.preventDefault();

            const totalQuestions = QUESTIONS.length;
            const answeredCount = Object.keys(auditState).filter(k => auditState[k] && auditState[k].val !== '').length;

            if (answeredCount < totalQuestions) {
                DeptPage.showMessage(`⚠️ يرجى تقييم جميع النقاط المتبقية (${totalQuestions - answeredCount} نقطة متبقية)`, true);
                document.querySelectorAll('.audit-card').forEach(card => {
                    const id = card.dataset.id;
                    if (!auditState[id] || auditState[id].val === '') {
                        card.classList.add('unanswered');
                        if (card === document.querySelector('.unanswered')) {
                            card.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        }
                    }
                });
                return;
            }

            const btn = document.getElementById('btnSave');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> جاري الحفظ...';

            const strengths = [];
            const weaknesses = [];

            QUESTIONS.forEach(q => {
                const item = auditState[q.id];
                if (item) {
                    const idx = parseInt(item.val);
                    if (idx <= 1) strengths.push(q.label + ': ' + item.label + (item.note ? ' (' + item.note + ')' : ''));
                    if (idx >= 2) weaknesses.push(q.label + ': ' + item.label + (item.note ? ' (' + item.note + ')' : ''));
                }
            });

            Context.setItem(`${dept}_strengths`, strengths);
            Context.setItem(`${dept}_weaknesses`, weaknesses);
            localStorage.setItem(`stratix_${dept}_audit_v2`, JSON.stringify(auditState));

            try {
                await DeptPage.saveToAPI(`AUDIT_${dept.toUpperCase()}`, auditState);
                if (window.Context && Context.markStepCompleted) await Context.markStepCompleted('audit');

                DeptPage.showMessage('✅ تم حفظ التقييم بنجاح! جاري الانتقال...', false);

                setTimeout(() => {
                    window.location.href = `/pestel.html?dept=${dept}&t=` + Date.now();
                }, 1500);
            } catch (err) {
                DeptPage.showMessage('❌ فشل الحفظ على السيرفر، تم الحفظ محلياً.', true);
                btn.disabled = false;
                btn.innerHTML = 'حفظ ومتابعة لتحليل PESTEL <i class="bi bi-arrow-left"></i>';
            }
        });

        document.addEventListener('DOMContentLoaded', initAudit);
    </script>
</body>

</html>
