<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <title>ستارتكس | التقييم الوصفي - الموارد البشرية</title>
    <link rel="stylesheet" href="/css/dept-pages.css">
    <script src="/js/context-manager.js?v=4"></script>
    <script src="/js/page-guard.js?v=4"></script>
    <script src="/js/dept-page.js?v=4"></script>
</head>

<body>
    <script>window.__REQUIRED_DEPT = 'HR';</script>
    <script src="/js/dept-guard.js?v=4"></script>
    <div class="container">
        <h1>📋 التقييم الوصفي – الموارد البشرية</h1>
        <div class="sub">أجب عن الأسئلة التالية لتحديد نقاط القوة والضعف في قسم الموارد البشرية</div>
        <div id="deepSummary" class="deep-summary-box"></div>
        <form id="auditForm">
            <div class="question"><label>نمط الإدارة والقيادة في القسم</label><select name="management_style" required>
                    <option value="">اختر</option>
                    <option value="تحويلي">تحويلي (ابتكار ومشاركة)</option>
                    <option value="ديمقراطي">ديمقراطي</option>
                    <option value="أوتوقراطي">أوتوقراطي</option>
                    <option value="فوضوي">فوضوي</option>
                </select></div>
            <div class="question"><label>مستوى تخطيط الموارد البشرية</label><select name="hr_planning" required>
                    <option value="">اختر</option>
                    <option value="خطة سنوية">خطة سنوية مرتبطة بالنمو</option>
                    <option value="حسب الحاجة">حسب الحاجة</option>
                    <option value="عشوائي">عشوائي</option>
                </select></div>
            <div class="question"><label>جودة عمليات الاستقطاب والتوظيف</label><select name="recruitment_quality" required>
                    <option value="">اختر</option>
                    <option value="ممنهجة">ممنهجة واحترافية</option>
                    <option value="متوسطة">نشطة عند الحاجة</option>
                    <option value="ضعيفة">بدائية أو عشوائية</option>
                </select></div>
            <div class="question"><label>مستوى الالتزام بأنظمة العمل والتأمينات</label><select name="compliance_level" required>
                    <option value="">اختر</option>
                    <option value="كامل">امتثال كامل ومحدث</option>
                    <option value="جزئي">بعض الثغرات</option>
                    <option value="ضعيف">خروقات أو مخالفات</option>
                </select></div>
            <div class="question"><label>أبرز التحديات في الموارد البشرية</label><textarea name="hr_challenges" rows="3"
                    placeholder="مثال: ارتفاع معدل الدوران، ضعف التدريب..."></textarea></div>
            <div class="question"><label>ما هي نقاط القوة في قسم الموارد البشرية؟</label><textarea
                    name="strengths_comment" rows="3" placeholder="افصل بين النقاط بفاصلة أو سطر جديد"></textarea></div>
            <div class="question"><label>ما هي نقاط الضعف التي تحتاج تحسيناً؟</label><textarea name="weaknesses_comment"
                    rows="3" placeholder="افصل بين النقاط بفاصلة أو سطر جديد"></textarea></div>
            <button type="submit">حفظ ومتابعة للميزانية والتحديات <i class="bi bi-arrow-left"></i></button>
        </form>
    </div>
    <script>
        const dept = 'hr';
        function extractStrengthsWeaknesses(a) {
            const s = [], w = [];
            if (a.management_style === 'تحويلي') s.push('نمط قيادة تحويلي يدعم الابتكار');
            else if (a.management_style === 'فوضوي') w.push('نمط إدارة فوضوي يسبب فقدان الاتجاه');
            if (a.hr_planning === 'خطة سنوية') s.push('تخطيط موارد بشرية سنوي مرتبط بالنمو');
            else if (a.hr_planning === 'عشوائي') w.push('غياب تخطيط الموارد البشرية');
            if (a.recruitment_quality === 'ممنهجة') s.push('عمليات استقطاب ممنهجة واحترافية');
            else if (a.recruitment_quality === 'ضعيفة') w.push('ضعف عمليات الاستقطاب والتوظيف');
            if (a.compliance_level === 'كامل') s.push('امتثال كامل لأنظمة العمل والتأمينات');
            else if (a.compliance_level === 'ضعيف') w.push('خروقات في الامتثال لأنظمة العمل');
            if (a.strengths_comment) a.strengths_comment.split(/[،,\n]/).forEach(l => { if (l.trim()) s.push(l.trim()); });
            if (a.weaknesses_comment) a.weaknesses_comment.split(/[،,\n]/).forEach(l => { if (l.trim()) w.push(l.trim()); });
            return { strengths: s, weaknesses: w };
        }
        document.addEventListener('DOMContentLoaded', async () => {
            const ok = await DeptPage.init(dept);
            if (!ok) return;
            await DeptPage.loadDeepSummary('deepSummary');
            let saved = await DeptPage.loadFromAPI('AUDIT') || Context.getTemp('audit_data') || DeptPage.migrateFromLocalStorage(`stratix_${dept}_audit`);
            DeptPage.fillForm(saved);
            document.getElementById('auditForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const answers = Object.fromEntries(new FormData(e.target));
                let missing = false;
                document.querySelectorAll('[required]').forEach(f => {
                    if (!answers[f.name]) { missing = true; f.style.borderColor = '#ef4444'; }
                    else f.style.borderColor = '';
                });
                if (missing) { DeptPage.showMessage('يرجى الإجابة على جميع الأسئلة المطلوبة', true); return; }
                Context.setTemp('audit_data', answers);
                Context.setTemp('audit_completed', true);
                const { strengths, weaknesses } = extractStrengthsWeaknesses(answers);
                Context.setItem(`${dept}_strengths`, strengths);
                Context.setItem(`${dept}_weaknesses`, weaknesses);
                const saved = await DeptPage.saveToAPI('AUDIT', answers);
                try {
                    const auditForHealth = {};
                    Object.keys(answers).forEach(k => { auditForHealth[k] = { val: answers[k], label: answers[k] }; });
                    localStorage.setItem('AUDIT_' + dept.toUpperCase(), JSON.stringify(auditForHealth));
                    DeptPage.safeSetLocal('stratix_' + dept + '_audit_v2', auditForHealth);
                } catch(e) {}
                DeptPage.showMessage(saved ? '✅ تم حفظ التقييم بنجاح! جاري الانتقال للميزانية والتحديات' : 'فشل الحفظ في الخادم، لكن البيانات محفوظة محلياً', !saved);
                setTimeout(() => window.location.href = `/dept-report.html?dept=${dept}`, 1500);
            });
        });
    </script>
</body>

</html>
