    <style>
        :root {
            --stx-bg: #0b0d12;
            --stx-card: rgba(22, 27, 34, 0.7);
            --stx-border: rgba(255, 255, 255, 0.08);
            --stx-primary: #6366f1;
            --stx-success: #10b981;
            --stx-warn: #f59e0b;
            --stx-danger: #ef4444;
        }

        body {
            background-color: var(--stx-bg);
            color: #f8fafc;
            font-family: 'Tajawal', sans-serif;
            overflow: hidden;
            /* Main scroll handles it */
        }

        .stx-wrapper {
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .stx-sidebar-container {
            width: 260px;
            flex-shrink: 0;
            border-left: 1px solid var(--stx-border);
        }

        .stx-main-content {
            flex: 1;
            overflow-y: auto;
            height: 100vh;
        }

        /* Standard Header Override for Audit */
        .stx-header {
            background: rgba(11, 13, 18, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--stx-border);
            padding: 15px 30px;
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Info Stats Bar */
        .stats-bar {
            background: linear-gradient(90deg, rgba(99, 102, 241, 0.1) 0%, rgba(11, 13, 18, 0) 100%);
            border: 1px solid var(--stx-border);
            border-radius: 20px;
            padding: 20px 30px;
            margin: 30px;
            display: flex;
            flex-wrap: wrap;
            gap: 40px;
            align-items: center;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .stat-label {
            font-size: 0.75rem;
            color: #94a3b8;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-value {
            font-size: 1.25rem;
            font-weight: 800;
            color: #fff;
        }

        /* Audit Grid */
        .audit-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(450px, 1fr));
            gap: 24px;
            padding: 0 30px 120px;
        }

        .audit-card {
            background: var(--stx-card);
            border: 1px solid var(--stx-border);
            border-radius: 24px;
            padding: 24px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .audit-card:hover {
            border-color: var(--stx-primary);
            transform: translateY(-4px);
            background: rgba(255, 255, 255, 0.03);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .audit-card.unanswered {
            border: 2px solid var(--stx-danger) !important;
            background: rgba(239, 68, 68, 0.02);
        }

        .card-header-stx {
            display: flex;
            align-items: flex-start;
            gap: 15px;
            margin-bottom: 20px;
        }

        .card-icon {
            width: 42px;
            height: 42px;
            background: rgba(99, 102, 241, 0.1);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--stx-primary);
            font-size: 1.25rem;
            flex-shrink: 0;
        }

        .card-title {
            font-size: 1rem;
            font-weight: 700;
            margin: 0;
            line-height: 1.4;
            color: #f1f5f9;
        }

        /* Segmented Control for Options */
        .option-group {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin-bottom: 20px;
        }

        .opt-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 10px 12px;
            font-size: 0.85rem;
            font-weight: 600;
            color: #94a3b8;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .opt-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
        }

        .opt-btn.active.success {
            background: var(--stx-success);
            color: #fff;
            border-color: transparent;
        }

        .opt-btn.active.warning {
            background: var(--stx-warn);
            color: #fff;
            border-color: transparent;
        }

        .opt-btn.active.danger {
            background: var(--stx-danger);
            color: #fff;
            border-color: transparent;
        }

        .audit-textarea {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--stx-border);
            border-radius: 14px;
            padding: 12px 16px;
            color: #e2e8f0;
            font-size: 0.85rem;
            resize: none;
            height: 60px;
            transition: all 0.2s;
        }

        .audit-textarea:focus {
            outline: none;
            border-color: var(--stx-primary);
            background: rgba(0, 0, 0, 0.3);
            height: 100px;
        }

        /* Sticky Footer */
        .action-footer {
            position: fixed;
            bottom: 0;
            right: 260px;
            left: 0;
            background: rgba(11, 13, 18, 0.9);
            backdrop-filter: blur(15px);
            border-top: 1px solid var(--stx-border);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1100;
            box-shadow: 0 -10px 30px rgba(0, 0, 0, 0.5);
        }

        @media (max-width: 768px) {
            .action-footer {
                right: 0;
            }

            .audit-grid {
                grid-template-columns: 1fr;
            }
        }

        .btn-stx-primary {
            background: var(--stx-primary);
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 14px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        .btn-stx-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.5);
            background: #4f46e5;
        }

        .btn-stx-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* Step Progress Hub Icon */
        .step-hub-icon {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: var(--stx-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.1rem;
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.4);
        }
    </style>
</head>

                    <div>

                    </div>
                </div>
            </div>

                        حفظ ومتابعة للميزانية والتحديات <i class="bi bi-arrow-left"></i>
                    </button>
                </div>
            </form>
        </main>
    </div>

        let auditState = {};
        const urlParams = new URLSearchParams(window.location.search);

        const DEPT_NAMES = { hr: 'الموارد البشرية', finance: 'المالية', marketing: 'التسويق', operations: 'العمليات', sales: 'المبيعات', compliance: 'الامتثال', it: 'تقنية المعلومات', support: 'الخدمات المساندة', governance: 'الحوكمة', quality: 'الجودة', cs: 'خدمة العملاء' };

        function initAudit() {
            document.getElementById('dept-context').textContent = `${DEPT_NAMES[dept] || dept} | المرحلة 1: التشخيص والاستكشاف`;
            const container = document.getElementById('auditQuestions');
            container.innerHTML = QUESTIONS.map(q => `
                <div class="audit-card" data-id="${q.id}">
                    <div class="card-header-stx">
                        <div class="card-icon"><i class="bi ${q.icon}"></i></div>
                        <h3 class="card-title">${q.label}</h3>
                    </div>
                    <div class="option-group">
                        ${q.opts.map((opt, idx) => `
                            <div class="opt-btn" data-val="${idx}" onclick="setVal('${q.id}', '${idx}', this)">${opt}</div>
                        `).join('')}
                    </div>
                    <textarea class="audit-textarea" placeholder="أضف ملاحظات أو أسباب اختيارك (اختياري)..." oninput="setNote('${q.id}', this.value)"></textarea>
                </div>
            `).join('');

            loadData();
        }

        function setVal(id, val, btn) {
            if (!auditState[id]) auditState[id] = { val: '', note: '', label: '' };
            auditState[id].val = val;

            const q = QUESTIONS.find(x => x.id === id);
            auditState[id].label = q.opts[parseInt(val)];

            const parent = btn.parentElement;
            parent.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('active', 'success', 'warning', 'danger'));
            btn.classList.add('active');

            const idx = parseInt(val);
            if (idx === 0) btn.classList.add('success');
            else if (idx === q.opts.length - 1) btn.classList.add('danger');
            else btn.classList.add('warning');

            btn.closest('.audit-card').classList.remove('unanswered');
            updateProgress();
        }

        function setNote(id, note) {
            if (!auditState[id]) auditState[id] = { val: '', note: '', label: (auditState[id]?.label || '') };
            auditState[id].note = note;
        }

        function updateProgress() {
            const answeredCount = Object.keys(auditState).filter(k => auditState[k] && auditState[k].val !== '').length;
            const prog = document.getElementById('saveProgress');
            if (answeredCount === QUESTIONS.length) {
                prog.innerHTML = '<i class="bi bi-check-circle-fill text-success"></i> جاهز للحفظ والمتابعة';
                prog.className = 'small fw-bold text-success';
            } else {
                prog.innerHTML = `<i class="bi bi-info-circle"></i> تم تقييم ${answeredCount} من أصل ${QUESTIONS.length} نقطة استراتيجية`;
                prog.className = 'small fw-bold text-muted';
            }
        }

        async function loadData() {
            const apiType = `AUDIT_${dept.toUpperCase()}`;
            const savedFromAPI = await DeptPage.loadFromAPI(apiType).catch(() => null);
            const savedLocal = DeptPage.safeGetLocal(`stratix_${dept}_audit_v2`, {});
            const saved = savedFromAPI || savedLocal;

            auditState = saved;

            Object.keys(saved).forEach(id => {
                const card = document.querySelector(`.audit-card[data-id="${id}"]`);
                if (card) {
                    const btn = card.querySelector(`.opt-btn[data-val="${saved[id].val}"]`);
                    if (btn) setVal(id, saved[id].val, btn);
                    const area = card.querySelector('textarea');
                    if (area) area.value = saved[id].note || '';
                }
            });

            // Load extra stats from Dept Deep results
            const deep = JSON.parse(localStorage.getItem(`${dept}DeepResults`) || '{}');
            if (deep.score) document.getElementById('scoreVal').textContent = deep.score;
            if (deep.saudizationRate) document.getElementById('saudizationVal').textContent = Math.round(deep.saudizationRate) + '%';
            if (deep.turnoverRate) document.getElementById('turnoverVal').textContent = Math.round(deep.turnoverRate) + '%';
            if (deep.complianceScore) document.getElementById('complianceVal').textContent = Math.round(deep.complianceScore) + '%';

            updateProgress();
        }

        document.getElementById('forensicAudit').addEventListener('submit', async (e) => {
            e.preventDefault();

            const totalQuestions = QUESTIONS.length;
            const answeredCount = Object.keys(auditState).filter(k => auditState[k] && auditState[k].val !== '').length;

            if (answeredCount < totalQuestions) {
                DeptPage.showMessage(`⚠️ يرجى تقييم جميع النقاط المتبقية (${totalQuestions - answeredCount} نقطة متبقية)`, true);
                document.querySelectorAll('.audit-card').forEach(card => {
                    const id = card.dataset.id;
                    if (!auditState[id] || auditState[id].val === '') {
                        card.classList.add('unanswered');
                        if (card === document.querySelector('.unanswered')) {
                            card.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        }
                    }
                });
                return;
            }

            const btn = document.getElementById('btnSave');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> جاري الحفظ...';

            const strengths = [];
            const weaknesses = [];

            QUESTIONS.forEach(q => {
                const item = auditState[q.id];
                if (item) {
                    const idx = parseInt(item.val);
                    if (idx <= 1) strengths.push(q.label + ': ' + item.label + (item.note ? ' (' + item.note + ')' : ''));
                    if (idx >= 2) weaknesses.push(q.label + ': ' + item.label + (item.note ? ' (' + item.note + ')' : ''));
                }
            });

            Context.setItem(`${dept}_strengths`, strengths);
            Context.setItem(`${dept}_weaknesses`, weaknesses);
            DeptPage.safeSetLocal(`stratix_${dept}_audit_v2`, auditState);

            try {
                await DeptPage.saveToAPI(`AUDIT_${dept.toUpperCase()}`, auditState);
                if (window.Context && Context.markStepCompleted) await Context.markStepCompleted('audit');

                DeptPage.showMessage('✅ تم حفظ التقييم بنجاح! جاري الانتقال للميزانية والتحديات', false);

                setTimeout(() => {
                    window.location.href = `/dept-report.html?dept=${dept}&t=` + Date.now();
                }, 1500);
            } catch (err) {
                DeptPage.showMessage('❌ فشل الحفظ على السيرفر، تم الحفظ محلياً.', true);
                btn.disabled = false;
                btn.innerHTML = 'حفظ ومتابعة للميزانية والتحديات <i class="bi bi-arrow-left"></i>';
            }
        });

                    future_skills_gap:    { risk: 'اعتماد على مهارات قديمة = تقادم تنافسي', action: 'تحليل فجوة مهارات المستقبل سنوياً مع خطة تطوير', phase: 2 },
                    employee_handbook:    { risk: 'لا مرجع للموظف = أسئلة متكررة وتفسيرات مختلفة', action: 'إعداد دليل موظف شامل وسهل الوصول (رقمي + مطبوع)', phase: 1 },
                    hr_budget_control:    { risk: 'صرف غير مراقب = تجاوزات مالية وهدر', action: 'وضع ميزانية HR سنوية مع مراجعة شهرية للصرف', phase: 1 },
                    expats_management:    { risk: 'تأخير في التجديد = مخالفات جوازات وترحيل عمالة', action: 'نظام تنبيهات لتجديد الإقامات والتأشيرات قبل 60 يوم', phase: 1 }
                };

                ReportEngine.init({
                    pageId: 'hr-audit',
                    pageTitle: 'التقييم الوصفي — الموارد البشرية',
                    pageIcon: '🛡️',
                    collectData: () => {
                        const sections = [];
                        const groupScores = [];
                        let totalAnswered = 0, totalScore = 0, totalMax = 0;
                        let allStrengths = 0, allWeaknesses = 0;
                        const allActions = [];

                        GROUPS.forEach(g => {
                            let gAnswered = 0, gScore = 0, gMax = 0;
                            let contentHTML = '';
                            g.ids.forEach(id => {
                                const q = QUESTIONS.find(x => x.id === id);
                                const state = auditState[id];
                                if (!q || !state || state.val === '') return;
                                gAnswered++; totalAnswered++;
                                const idx = parseInt(state.val);
                                const pts = 3 - idx;
                                gScore += pts; gMax += 3;
                                totalScore += pts; totalMax += 3;
                                if (idx <= 1) allStrengths++;
                                if (idx >= 2) allWeaknesses++;

                                const c = C[id];
                                if (idx <= 1) {
                                    // ✅ قوة — سطر مختصر أخضر
                                    const icon = idx === 0 ? '🟢' : '🟡';
                                    contentHTML += `<div style="display:flex;align-items:center;gap:8px;padding:5px 0;font-size:0.82rem;border-bottom:1px solid #f1f5f9;">
                                        <span style="font-size:0.85rem;">${icon}</span>
                                        <span style="color:#334155;flex:1;">${q.label}</span>
                                        <span style="color:#16a34a;font-size:0.68rem;font-weight:600;white-space:nowrap;">${state.label}</span>
                                    </div>`;
                                } else {
                                    // 🟠🔴 ضعف — عرض استشاري كامل
                                    const icon = idx === 2 ? '🟠' : '🔴';
                                    const clr = idx === 2 ? '#ca8a04' : '#dc2626';
                                    const bg = idx === 2 ? '#fefce8' : '#fef2f2';
                                    contentHTML += `<div style="background:${bg};border-radius:10px;padding:10px 12px;margin:6px 0;border-right:4px solid ${clr};">
                                        <div style="display:flex;align-items:center;gap:8px;margin-bottom:5px;">
                                            <span style="font-size:0.85rem;">${icon}</span>
                                            <span style="font-size:0.82rem;font-weight:700;color:#0f172a;flex:1;">${q.label}</span>
                                            <span style="font-size:0.65rem;font-weight:700;color:${clr};background:white;padding:2px 8px;border-radius:6px;">${state.label}</span>
                                        </div>
                                        ${c ? `<div style="font-size:0.76rem;color:#64748b;margin-right:24px;">
                                            <div style="margin-bottom:2px;"><span style="color:#dc2626;font-weight:700;">المخاطر:</span> ${c.risk}</div>
                                            <div><span style="color:#16a34a;font-weight:700;">الإجراء:</span> ${c.action}</div>
                                        </div>` : ''}
                                    </div>`;
                                    if (c) allActions.push({ phase: c.phase, action: c.action, cat: g.name, priority: idx === 3 ? 1 : 2 });
                                }
                            });

                            if (gAnswered === 0) return;
                            const gPct = Math.round((gScore / gMax) * 100);
                            const gColor = gPct >= 70 ? '#16a34a' : gPct >= 40 ? '#ca8a04' : '#dc2626';
                            groupScores.push({ name: g.name, score: gPct, color: gColor, answered: gAnswered, total: g.ids.length });

                            sections.push({
                                title: `${g.name} — ${gPct}%`,
                                icon: gPct >= 70 ? '🟢' : gPct >= 40 ? '🟡' : '🔴',
                                color: gColor,
                                content: contentHTML
                            });
                        });

                        // ─── خطة العمل المرحلية ───
                        if (allActions.length > 0) {
                            allActions.sort((a, b) => a.phase - b.phase || a.priority - b.priority);
                            const phases = [
                                { id: 1, name: 'طوارئ — أول 30 يوم', color: '#dc2626', bg: '#fef2f2', icon: '🚨' },
                                { id: 2, name: 'بناء الأساس — 30-90 يوم', color: '#ca8a04', bg: '#fefce8', icon: '🔧' },
                                { id: 3, name: 'التطوير — 90-180 يوم', color: '#0891b2', bg: '#ecfeff', icon: '🚀' }
                            ];
                            let planHTML = '';
                            phases.forEach(ph => {
                                const items = allActions.filter(a => a.phase === ph.id);
                                if (items.length === 0) return;
                                planHTML += `<div style="background:${ph.bg};border-radius:10px;padding:10px 14px;margin-bottom:10px;">
                                    <div style="font-weight:800;color:${ph.color};font-size:0.85rem;margin-bottom:8px;">${ph.icon} ${ph.name}</div>
                                    ${items.slice(0, 8).map((it, i) => `<div style="display:flex;gap:8px;margin-bottom:4px;font-size:0.78rem;">
                                        <span style="color:${ph.color};font-weight:800;min-width:18px;">${i + 1}.</span>
                                        <span style="color:#334155;">${it.action}</span>
                                    </div>`).join('')}
                                    ${items.length > 8 ? `<div style="font-size:0.72rem;color:#94a3b8;margin-top:4px;">+ ${items.length - 8} إجراءات إضافية</div>` : ''}
                                </div>`;
                            });
                            sections.push({ title: `خطة العمل (${allActions.length} إجراء)`, icon: '📋', color: '#6366f1', content: planHTML });
                        }

                        const overallPct = totalMax > 0 ? Math.round((totalScore / totalMax) * 100) : 0;
                        const weakGroups = groupScores.filter(g => g.score < 40).sort((a, b) => a.score - b.score);
                        const strongGroups = groupScores.filter(g => g.score >= 70).sort((a, b) => b.score - a.score);

                        const kpis = [
                            { label: 'النتيجة الإجمالية', value: overallPct + '%', color: overallPct >= 70 ? '#16a34a' : overallPct >= 40 ? '#ca8a04' : '#dc2626', bg: overallPct >= 70 ? '#f0fdf4' : overallPct >= 40 ? '#fefce8' : '#fef2f2' },
                            { label: 'نقاط القوة', value: allStrengths, color: '#16a34a', bg: '#f0fdf4' },
                            { label: 'نقاط الضعف', value: allWeaknesses, color: '#dc2626', bg: '#fef2f2' },
                            { label: 'مُقيّم / إجمالي', value: `${totalAnswered}/${QUESTIONS.length}`, color: '#6366f1', bg: '#f5f3ff' }
                        ];

                        const highlights = [];
                        highlights.push({ icon: '🛡️', text: `تقييم ${totalAnswered} من ${QUESTIONS.length} نقطة — النتيجة الإجمالية ${overallPct}%`, color: '#6366f1' });
                        if (strongGroups.length > 0) highlights.push({ icon: '✅', text: `مجالات قوة: ${strongGroups.slice(0, 3).map(g => g.name).join('، ')}`, color: '#16a34a' });
                        if (weakGroups.length > 0) highlights.push({ icon: '🔴', text: `فجوات حرجة: ${weakGroups.slice(0, 3).map(g => g.name + ' (' + g.score + '%)').join('، ')}`, color: '#dc2626' });
                        if (allActions.length > 0) {
                            const urgent = allActions.filter(a => a.phase === 1).length;
                            if (urgent > 0) highlights.push({ icon: '🚨', text: `${urgent} إجراء عاجل يحتاج تنفيذ خلال 30 يوم`, color: '#dc2626' });
                        }

                        const recommendations = [];
                        if (weakGroups.length > 0) recommendations.push(`أولوية قصوى: "${weakGroups[0].name}" (${weakGroups[0].score}%) — أضعف مجال`);
                        if (allWeaknesses > allStrengths) recommendations.push(`${allWeaknesses} نقطة ضعف مقابل ${allStrengths} قوة — راجع خطة العمل المرحلية`);
                        if (totalAnswered < QUESTIONS.length) recommendations.push(`أكمل ${QUESTIONS.length - totalAnswered} نقطة متبقية لتقييم شامل`);
                        if (recommendations.length === 0) recommendations.push('تقييم ممتاز — شارك النتائج مع الإدارة العليا');
                        recommendations.splice(3);

                        return {
                            sections,
                            meta: {
                                dept, deptName: (DEPT_NAMES[dept] || dept),
                                kpis, highlights, recommendations,
                                qualityScore: overallPct,
                                qualityLabel: overallPct >= 70 ? 'نضج مؤسسي جيد' : overallPct >= 40 ? 'يحتاج تحسين' : 'فجوات جوهرية',
                                qualityAdvice: overallPct >= 70 ? 'مستوى نضج جيد في ممارسات الموارد البشرية' : overallPct >= 40 ? 'هناك فرص تحسين واضحة يمكن تحقيقها' : 'فجوات كبيرة تحتاج خطة تحسين عاجلة'
                            }
                        };
                    }
                });
            }
        });
    </script>
</body>

</html>
