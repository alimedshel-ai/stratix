<!DOCTYPE html>
<html lang="ar" dir="rtl" data-bs-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ستارتكس | تقرير الإدارة الاستراتيجي</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/css/shared.css?v=5">
    <style>
        :root {
            --stx-bg: #0f172a;
            --stx-card: #1e293b;
            --stx-border: rgba(255, 255, 255, 0.1);
            --stx-primary: #818cf8;
            --stx-accent: #c4b5fd;
        }

        body {
            background: var(--stx-bg);
            color: #f8fafc;
            font-family: 'Tajawal', sans-serif;
            margin: 0;
            line-height: 1.6;
        }

        main {
            min-height: 100vh;
            padding: 40px 60px 160px;
            background: radial-gradient(circle at top right, rgba(129, 140, 248, 0.05), transparent);
        }

        .report-section {
            background: var(--stx-card);
            border: 1px solid var(--stx-border);
            border-radius: 28px;
            padding: 35px;
            margin-bottom: 40px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
        }

        .section-title {
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--stx-primary);
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
            border-bottom: 1px solid var(--stx-border);
            padding-bottom: 15px;
        }

        .data-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
        }

        .data-card {
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid var(--stx-border);
            border-radius: 20px;
            padding: 25px;
            height: 100%;
            transition: 0.3s;
        }

        .data-card:hover {
            border-color: var(--stx-primary);
            transform: translateY(-5px);
        }

        .data-label {
            color: #94a3b8;
            font-size: 0.8rem;
            font-weight: 800;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .data-value {
            color: #fff;
            font-size: 1.1rem;
            font-weight: 700;
        }

        .swot-matrix {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }

        .swot-box {
            padding: 25px;
            border-radius: 24px;
            position: relative;
            overflow: hidden;
        }

        .swot-box h4 {
            font-weight: 900;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .swot-list {
            list-style: none;
            padding: 0;
            margin: 0;
            font-size: 0.9rem;
        }

        .swot-list li {
            margin-bottom: 8px;
            padding-right: 20px;
            position: relative;
            opacity: 0.9;
        }

        .swot-list li::before {
            content: "•";
            position: absolute;
            right: 0;
            opacity: 0.5;
        }

        .stx-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 50px;
            border-bottom: 1px solid var(--stx-border);
            padding-bottom: 30px;
        }

        .btn-print {
            background: var(--stx-primary);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 12px;
            font-weight: 800;
            transition: 0.3s;
        }

        .btn-print:hover {
            transform: scale(1.05);
            filter: brightness(1.2);
        }

        /* ═══ Empty State ═══ */
        .empty-section {
            text-align: center;
            padding: 30px;
            color: #64748b;
        }

        .empty-section i {
            font-size: 2rem;
            display: block;
            margin-bottom: 12px;
            opacity: 0.4;
        }

        .empty-section a {
            color: var(--stx-primary);
            text-decoration: none;
            font-weight: 700;
        }

        /* ═══ Summary Pulse Cards ═══ */
        .pulse-card {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--stx-border);
            border-radius: 20px;
            padding: 24px;
            text-align: center;
        }

        .pulse-card .pulse-val {
            font-size: 2.2rem;
            font-weight: 900;
            line-height: 1.2;
        }

        .pulse-card .pulse-lbl {
            color: #94a3b8;
            font-size: 0.8rem;
            font-weight: 700;
            margin-top: 6px;
        }

        /* ═══ Bottom Action Bar ═══ */
        .action-bar {
            position: fixed;
            bottom: 0;
            right: 0;
            left: 0;
            background: rgba(10, 11, 16, 0.95);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            padding: 20px 48px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
        }

        .nav-link-btn {
            color: #94a3b8;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 10px 16px;
            border-radius: 12px;
            transition: all 0.2s;
        }

        .nav-link-btn:hover {
            color: #f8fafc;
            background: rgba(255, 255, 255, 0.06);
        }

        .btn-stx-primary {
            background: linear-gradient(135deg, #818cf8, #6366f1);
            color: white;
            border: none;
            padding: 14px 40px;
            border-radius: 14px;
            font-weight: 800;
            font-size: 1.1rem;
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.3);
            transition: 0.3s;
            text-decoration: none;
        }

        .btn-stx-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(99, 102, 241, 0.5);
            color: white;
        }

        /* ═══ Sidebar — Auto Hover ═══ */
        #sidebar {
            width: 260px;
            background: #1a1d2e;
            border-left: 1px solid var(--stx-border);
            flex-shrink: 0;
            overflow-y: auto;
            overflow-x: hidden;
            position: fixed;
            top: 0;
            right: 0;
            height: 100vh;
            z-index: 1100;
            transform: translateX(220px);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #sidebar:hover,
        #sidebar.sidebar-open {
            transform: translateX(0);
        }

        #sidebar::before {
            content: '\F285';
            font-family: 'bootstrap-icons';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(26, 29, 46, 0.95);
            color: #667eea;
            padding: 12px 6px;
            border-radius: 0 8px 8px 0;
            font-size: 1rem;
            z-index: 1;
            transition: opacity 0.3s;
        }

        #sidebar:hover::before {
            opacity: 0;
        }

        .dept-hamburger {
            display: none;
            background: rgba(22, 27, 34, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #f8fafc;
            width: 40px;
            height: 40px;
            border-radius: 10px;
            font-size: 20px;
            cursor: pointer;
            align-items: center;
            justify-content: center;
            position: fixed;
            top: 16px;
            right: 16px;
            z-index: 1200;
        }

        @media (max-width: 900px) {
            main {
                padding: 20px 20px 160px;
            }

            .stx-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 16px;
                padding-top: 50px;
            }

            .swot-matrix {
                grid-template-columns: 1fr;
            }

            .data-grid {
                grid-template-columns: 1fr;
            }

            #sidebar {
                transform: translateX(260px);
            }

            #sidebar.sidebar-open {
                transform: translateX(0);
            }

            #sidebar:hover {
                transform: translateX(260px);
            }

            #sidebar.sidebar-open:hover {
                transform: translateX(0);
            }

            #sidebar::before {
                display: none;
            }

            .dept-hamburger {
                display: flex;
            }

            .action-bar {
                padding: 16px;
            }
        }

        @media print {

            #sidebar,
            .no-print,
            .action-bar,
            .dept-hamburger {
                display: none !important;
            }

            main {
                padding: 0 !important;
            }

            .report-section {
                break-inside: avoid;
                box-shadow: none;
                border: 1px solid #ddd;
            }
        }
    </style>
</head>

<body class="dir-rtl">
    <nav id="sidebar" class="no-print"></nav>
    <button class="dept-hamburger no-print" id="mobileMenuBtn"><i class="bi bi-list"></i></button>

    <main>
        <header class="stx-header">
            <div>
                <h1 class="page-title fw-900 fs-1"><i class="bi bi-file-earmark-bar-graph text-primary me-2"></i>
                    تقرير التميز الاستراتيجي</h1>
                <p id="report-meta" class="opacity-50 mt-2">جاري استحضار الرؤية الاستراتيجية...</p>
            </div>
            <div class="d-flex gap-3 no-print">
                <button class="btn-print" onclick="window.print()"><i class="bi bi-printer me-2"></i> طباعة</button>
            </div>
        </header>

        <div id="report-content">
            <div class="text-center py-5">
                <div class="spinner-grow text-primary" role="status"></div>
                <p class="mt-4 fw-800">جاري تجميع البيانات...</p>
            </div>
        </div>
    </main>

    <!-- ═══ Bottom Navigation ═══ -->
    <div class="action-bar no-print">
        <a id="prevLink" href="/corrections.html" class="nav-link-btn">
            <i class="bi bi-arrow-right"></i> السابق: التصحيحات
        </a>
        <div class="d-flex align-items-center gap-3">
            <span class="text-muted small fw-700" id="saveStatus"></span>
            <a id="nextLink" href="/risk-map.html" class="btn-stx-primary">
                التالي: خريطة المخاطر <i class="bi bi-arrow-left ms-2"></i>
            </a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/api.js?v=5"></script>
    <script src="/js/utils.js?v=5"></script>
    <script src="/js/context-manager.js?v=5"></script>
    <script src="/js/steps-config.js?v=5"></script>
    <script src="/js/progress-engine.js?v=5"></script>
    <script src="/js/smart-nav.js?v=5"></script>
    <script src="/js/page-guard.js?v=5"></script>
    <script src="/js/dept-page.js?v=5"></script>
    <script src="/js/sidebar.js?v=5"></script>

    <script>
        (async function () {
            const _qs = new URLSearchParams(window.location.search);
            const _urlDept = (_qs.get('dept') || '').toLowerCase();
            const qs = _urlDept ? `?dept=${_urlDept}` : '';

            const container = document.getElementById('report-content');
            const meta = document.getElementById('report-meta');

            try {
                /* ═══ 1. Auth ═══ */
                const user = await window.api.getCurrentUser();
                if (!user) { window.location.href = '/login.html'; return; }

                const dept = _urlDept || Context.getDept() || 'company';
                const deptKey = dept.toUpperCase();
                const DEPT_NAMES = window.STEPS_CONFIG?.deptNames || {
                    hr: 'الموارد البشرية', sales: 'المبيعات', finance: 'المالية',
                    marketing: 'التسويق', operations: 'العمليات', it: 'تقنية المعلومات',
                    cs: 'خدمة العملاء', compliance: 'الامتثال', quality: 'الجودة',
                    projects: 'المشاريع', support: 'الخدمات المساندة'
                };
                const deptName = DEPT_NAMES[dept] || dept.toUpperCase();

                meta.textContent = `إدارة ${deptName} | تقرير ختام الدورة الاستراتيجية | ${new Date().toLocaleDateString('ar-SA')}`;

                /* ═══ 2. Fix navigation links ═══ */
                const deptQs = dept ? `?dept=${dept}` : '';
                document.getElementById('prevLink').href = `/corrections.html${deptQs}`;
                document.getElementById('nextLink').href = `/risk-map.html${deptQs}`;

                /* ═══ 3. Fetch all data in parallel ═══ */
                const entityId = user.activeEntityId || '';

                const apiGet = (url) => window.api.get(url).catch(() => null);

                const [swotData, towsData, objectivesData, okrsData, kpisData, initiativesData, correctionsData, progressData] = await Promise.all([
                    apiGet(`/api/dept/analysis?dept=${dept}&type=SWOT_${deptKey}`),
                    apiGet(`/api/dept/analysis?dept=${dept}&type=TOWS_${deptKey}`),
                    apiGet(`/api/dept/analysis?dept=${dept}&type=OBJECTIVES_${deptKey}`),
                    apiGet(`/api/dept/analysis?dept=${dept}&type=OKRS_${deptKey}`),
                    apiGet(`/api/kpis?entityId=${entityId}`),
                    apiGet(`/api/initiatives/${dept}`),
                    apiGet('/api/corrections?limit=100'),
                    window.StartixProgress ? window.StartixProgress.fetch() : null
                ]);

                const swot = swotData?.data || {};
                const tows = towsData?.data || {};
                const objectives = objectivesData?.data || [];
                const okrs = okrsData?.data || [];
                const kpis = kpisData?.kpis || kpisData?.data || [];
                const initiatives = initiativesData?.initiatives || initiativesData?.data || [];
                const corrections = correctionsData?.corrections || [];

                /* ═══ 4. Build report ═══ */
                container.innerHTML = '';

                // Helper: toLines
                function toLines(val) {
                    if (!val) return [];
                    if (Array.isArray(val)) return val.map(v => String(v).replace(/^[-•*\s]+/, '').trim()).filter(l => l.length > 2);
                    if (typeof val === 'string') return val.split('\n').map(l => l.replace(/^[-•*\s]+/, '').trim()).filter(l => l.length > 2);
                    return [];
                }

                // Helper: add section
                function addSection(icon, title, html) {
                    if (!html) return;
                    const sec = document.createElement('div');
                    sec.className = 'report-section';
                    sec.innerHTML = `<h2 class="section-title"><i class="bi ${icon}"></i> ${title}</h2>${html}`;
                    container.appendChild(sec);
                }

                // Helper: empty state
                function emptyState(icon, text, link, linkText) {
                    return `<div class="empty-section">
                        <i class="bi ${icon}"></i>
                        <div>${text}</div>
                        ${link ? `<a href="${link}${deptQs}">${linkText} <i class="bi bi-arrow-left"></i></a>` : ''}
                    </div>`;
                }

                /* ═══ 4a. Executive Summary — REAL DATA ═══ */
                const readinessPerc = progressData?.overall || 0;
                const totalInitiatives = initiatives.length;
                const atRiskCount = initiatives.filter(i => i.status === 'AT_RISK' || i.status === 'متعثر' || (i.end_date && new Date(i.end_date) < new Date() && i.status !== 'COMPLETED')).length;
                const pendingCorrections = corrections.filter(c => c.status !== 'COMPLETED' && c.status !== 'مكتمل').length;
                const kpiCount = kpis.length;

                let riskLevel = 'منخفض', riskColor = '#10b981';
                if (atRiskCount > totalInitiatives * 0.3) { riskLevel = 'عالي'; riskColor = '#ef4444'; }
                else if (atRiskCount > 0) { riskLevel = 'متوسط'; riskColor = '#f59e0b'; }

                let readinessColor = '#10b981';
                if (readinessPerc < 30) readinessColor = '#ef4444';
                else if (readinessPerc < 60) readinessColor = '#f59e0b';

                const summaryHTML = `
                    <div class="row g-4 mb-4">
                        <div class="col-md-3"><div class="pulse-card" style="border-top:5px solid ${readinessColor}">
                            <div class="pulse-val" style="color:${readinessColor}">${readinessPerc}%</div>
                            <div class="pulse-lbl">الجاهزية الاستراتيجية</div>
                        </div></div>
                        <div class="col-md-3"><div class="pulse-card" style="border-top:5px solid #3b82f6">
                            <div class="pulse-val text-info">${totalInitiatives}</div>
                            <div class="pulse-lbl">مبادرة فعّالة</div>
                        </div></div>
                        <div class="col-md-3"><div class="pulse-card" style="border-top:5px solid ${riskColor}">
                            <div class="pulse-val" style="color:${riskColor}">${riskLevel}</div>
                            <div class="pulse-lbl">مستوى المخاطر</div>
                        </div></div>
                        <div class="col-md-3"><div class="pulse-card" style="border-top:5px solid #a78bfa">
                            <div class="pulse-val text-purple">${kpiCount}</div>
                            <div class="pulse-lbl">مؤشر أداء</div>
                        </div></div>
                    </div>
                    ${buildInsight(deptName, readinessPerc, atRiskCount, pendingCorrections, totalInitiatives)}
                `;
                addSection('bi-lightning-charge-fill', 'الملخص التنفيذي', summaryHTML);

                /* ═══ 4b. SWOT ═══ */
                const hasSwot = toLines(swot.strengths).length > 0 || toLines(swot.weaknesses).length > 0;
                if (hasSwot) {
                    addSection('bi-search', 'تحليل البيئة والواقع (SWOT)', renderSwot(swot));
                } else {
                    addSection('bi-search', 'تحليل البيئة والواقع (SWOT)', emptyState('bi-grid-3x3-gap', 'لم يتم إعداد تحليل SWOT بعد', '/swot.html', 'إعداد SWOT الآن'));
                }

                /* ═══ 4c. TOWS ═══ */
                const hasTows = tows.so || tows.wo || tows.st || tows.wt;
                if (hasTows) {
                    addSection('bi-shuffle', 'الموجهات الاستراتيجية (TOWS)', renderTows(tows));
                } else {
                    addSection('bi-shuffle', 'الموجهات الاستراتيجية (TOWS)', emptyState('bi-arrows-fullscreen', 'لم يتم إعداد مصفوفة TOWS', '/tows.html', 'إعداد TOWS'));
                }

                /* ═══ 4d. Objectives ═══ */
                if (Array.isArray(objectives) && objectives.length > 0) {
                    addSection('bi-bullseye', 'الأهداف الاستراتيجية', renderObjectives(objectives));
                } else {
                    addSection('bi-bullseye', 'الأهداف الاستراتيجية', emptyState('bi-bullseye', 'لم يتم تحديد أهداف استراتيجية', '/objectives.html', 'إضافة الأهداف'));
                }

                /* ═══ 4e. OKRs ═══ */
                if (Array.isArray(okrs) && okrs.length > 0) {
                    addSection('bi-award', 'الأهداف والنتائج الرئيسية (OKRs)', renderOkrs(okrs));
                } else {
                    addSection('bi-award', 'الأهداف والنتائج الرئيسية (OKRs)', emptyState('bi-award', 'لم يتم إعداد OKRs', '/okrs.html', 'إعداد OKRs'));
                }

                /* ═══ 4f. KPIs ═══ */
                if (kpis.length > 0) {
                    addSection('bi-speedometer2', 'مؤشرات قياس الأداء', renderKpis(kpis));
                } else {
                    addSection('bi-speedometer2', 'مؤشرات قياس الأداء', emptyState('bi-speedometer2', 'لم يتم إنشاء مؤشرات أداء', '/kpis.html', 'إنشاء KPIs'));
                }

                /* ═══ 4g. Initiatives ═══ */
                if (initiatives.length > 0) {
                    addSection('bi-rocket-takeoff', 'المبادرات وخارطة الطريق', renderInitiatives(initiatives));
                } else {
                    addSection('bi-rocket-takeoff', 'المبادرات وخارطة الطريق', emptyState('bi-rocket-takeoff', 'لم يتم إنشاء مبادرات', '/initiatives.html', 'إنشاء المبادرات'));
                }

                /* ═══ 4h. Corrections Summary ═══ */
                if (corrections.length > 0) {
                    addSection('bi-tools', 'الإجراءات التصحيحية', renderCorrections(corrections));
                }

                /* ═══ 5. Mark step completed ═══ */
                if (window.Context && Context.markStepCompleted) {
                    Context.markStepCompleted('reports').catch(() => {});
                }

                /* ═══ 6. Init sidebar ═══ */
                if (window.initSidebar) window.initSidebar();

                /* ═══ 7. Mobile hamburger ═══ */
                const menuBtn = document.getElementById('mobileMenuBtn');
                if (menuBtn) {
                    menuBtn.addEventListener('click', function () {
                        const sb = document.getElementById('sidebar');
                        if (sb) sb.classList.toggle('sidebar-open');
                    });
                }

            } catch (err) {
                console.error('[reports] Error:', err);
                container.innerHTML = `<div class="report-section">
                    <div class="text-center py-4">
                        <i class="bi bi-exclamation-triangle text-danger" style="font-size:2rem"></i>
                        <p class="mt-3 text-danger fw-bold">حدث خطأ أثناء تحميل التقرير: ${escapeHtml(err.message)}</p>
                        <button class="btn btn-outline-light mt-2" onclick="location.reload()"><i class="bi bi-arrow-clockwise"></i> إعادة المحاولة</button>
                    </div>
                </div>`;
            }

            /* ═══════════════════════════════════════ */
            /* ═══ RENDER FUNCTIONS ═══ */
            /* ═══════════════════════════════════════ */

            function toLines(val) {
                if (!val) return [];
                if (Array.isArray(val)) return val.map(v => String(v).replace(/^[-•*\s]+/, '').trim()).filter(l => l.length > 2);
                if (typeof val === 'string') return val.split('\n').map(l => l.replace(/^[-•*\s]+/, '').trim()).filter(l => l.length > 2);
                return [];
            }

            function buildInsight(name, readiness, atRisk, pendingCorr, totalInit) {
                const msgs = [];
                if (readiness >= 70 && atRisk === 0) {
                    msgs.push('أداء استراتيجي متميز. الخطة تسير وفق المستهدف بكفاءة عالية.');
                } else if (readiness >= 70) {
                    msgs.push(`الجاهزية جيدة لكن هناك ${atRisk} مبادرة معرضة للخطر. يوصى بمراجعة الجدول الزمني.`);
                } else if (readiness >= 40) {
                    msgs.push('تقدم ملحوظ في التخطيط. ركّز على إكمال الأدوات المتبقية لتعزيز الجاهزية.');
                } else {
                    msgs.push('الجاهزية الاستراتيجية منخفضة. يُنصح بالبدء من مرحلة التشخيص وبناء الأساس أولاً.');
                }

                if (pendingCorr >= 3) {
                    msgs.push(`تنبيه: ${pendingCorr} إجراء تصحيحي معلق — تراكمها يؤثر سلباً على جودة التنفيذ.`);
                }

                if (totalInit === 0 && readiness >= 40) {
                    msgs.push('لا توجد مبادرات تنفيذية بعد. حوّل نتائج التحليل إلى مبادرات قابلة للتنفيذ.');
                }

                return `<div class="p-4 rounded-4 mt-3" style="background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.1)">
                    <h6 class="fw-900 mb-2"><i class="bi bi-lightbulb-fill text-warning me-2"></i> قراءة المستشار الآلي:</h6>
                    ${msgs.map(m => `<p class="small opacity-75 mb-2">• ${m}</p>`).join('')}
                </div>`;
            }

            function renderSwot(data) {
                const quads = [
                    { k: 'strengths', l: 'نقاط القوة', c: '#10b981', i: 'bi-gem', bg: 'rgba(16,185,129,0.05)' },
                    { k: 'weaknesses', l: 'نقاط الضعف', c: '#ef4444', i: 'bi-incognito', bg: 'rgba(239,68,68,0.05)' },
                    { k: 'opportunities', l: 'الفرص المتاحة', c: '#3b82f6', i: 'bi-lightning', bg: 'rgba(59,130,246,0.05)' },
                    { k: 'threats', l: 'التهديدات', c: '#f59e0b', i: 'bi-shield-x', bg: 'rgba(245,158,11,0.05)' }
                ];
                return `<div class="swot-matrix">${quads.map(q => {
                    const items = toLines(data[q.k]);
                    return `<div class="swot-box" style="background:${q.bg}; border-top:5px solid ${q.c}">
                        <h4 style="color:${q.c}"><i class="bi ${q.i}"></i> ${q.l} <span class="badge bg-dark bg-opacity-50 ms-auto">${items.length}</span></h4>
                        <ul class="swot-list">${items.map(it => `<li>${escapeHtml(it)}</li>`).join('') || '<li class="opacity-25">لا يوجد بيانات</li>'}</ul>
                    </div>`;
                }).join('')}</div>`;
            }

            function renderTows(data) {
                const cells = [
                    { k: 'so', l: 'استراتيجيات الهجوم (SO)', c: '#10b981' },
                    { k: 'wo', l: 'استراتيجيات التحسين (WO)', c: '#3b82f6' },
                    { k: 'st', l: 'استراتيجيات الدفاع (ST)', c: '#f59e0b' },
                    { k: 'wt', l: 'استراتيجيات الانكماش (WT)', c: '#ef4444' }
                ];
                return `<div class="data-grid">${cells.map(s => {
                    const items = toLines(data[s.k]);
                    return `<div class="data-card" style="border-right:4px solid ${s.c}">
                        <div class="data-label" style="color:${s.c}">${s.l}</div>
                        <ul class="small opacity-75 list-unstyled mb-0">${items.map(i => `<li class="mb-1">• ${escapeHtml(i)}</li>`).join('') || '<li class="opacity-25">لا يوجد</li>'}</ul>
                    </div>`;
                }).join('')}</div>`;
            }

            function renderObjectives(data) {
                const lib = { financial: 'المالي', customer: 'العملاء', internal: 'العمليات', learning: 'النمو والتعلم' };
                const items = Array.isArray(data) ? data : [];
                return `<div class="data-grid">${items.map(o => `<div class="data-card">
                    <div class="data-label">منظور ${lib[o.perspective] || o.perspective || 'عام'}</div>
                    <div class="data-value">${escapeHtml(o.title || o.text || o.name || '')}</div>
                </div>`).join('')}</div>`;
            }

            function renderOkrs(data) {
                const items = Array.isArray(data) ? data : [];
                return `<div class="data-grid">${items.map(o => `<div class="data-card">
                    <div class="data-label border-0 text-white fw-bold mb-2"><i class="bi bi-star-fill text-warning me-1"></i> ${escapeHtml(o.objective || o.title || '')}</div>
                    <ul class="small opacity-75 list-unstyled">${(o.keyResults || o.krs || []).map(kr => `<li class="mb-1">✓ ${escapeHtml(typeof kr === 'string' ? kr : (kr.text || kr.title || ''))}</li>`).join('') || '<li class="opacity-25">لا توجد نتائج رئيسية</li>'}</ul>
                </div>`).join('')}</div>`;
            }

            function renderKpis(data) {
                return `<div class="table-responsive rounded-4 overflow-hidden border border-white border-opacity-10">
                    <table class="table table-dark table-hover mb-0">
                        <thead class="bg-white bg-opacity-5"><tr>
                            <th class="p-3">المؤشر</th>
                            <th class="p-3 text-center">المستهدف</th>
                            <th class="p-3 text-center">الفعلي</th>
                            <th class="p-3 text-center">الأداء</th>
                        </tr></thead>
                        <tbody>${data.map(k => {
                    const target = parseFloat(k.target) || 0;
                    const actual = parseFloat(k.actual) || 0;
                    const perf = target > 0 ? Math.round((actual / target) * 100) : 0;
                    const perfColor = perf >= 80 ? '#10b981' : perf >= 50 ? '#f59e0b' : '#ef4444';
                    return `<tr>
                                <td class="p-3 fw-bold">${escapeHtml(k.name || k.nameAr || '')}</td>
                                <td class="p-3 text-center text-success fw-900">${k.target || '—'}</td>
                                <td class="p-3 text-center">${k.actual || '—'}</td>
                                <td class="p-3 text-center"><span style="color:${perfColor}; font-weight:800">${target > 0 ? perf + '%' : '—'}</span></td>
                            </tr>`;
                }).join('')}</tbody>
                    </table>
                </div>`;
            }

            function renderInitiatives(data) {
                const colors = { HIGH: '#ef4444', عالية: '#ef4444', MEDIUM: '#f59e0b', متوسطة: '#f59e0b', LOW: '#10b981', منخفضة: '#10b981' };
                const statusLabels = { COMPLETED: 'مكتمل', IN_PROGRESS: 'قيد التنفيذ', AT_RISK: 'متعثر', PLANNED: 'مخطط', NOT_STARTED: 'لم يبدأ' };
                return `<div class="data-grid">${data.map(i => {
                    const c = colors[i.priority] || '#3b82f6';
                    const statusText = statusLabels[i.status] || i.status || '';
                    return `<div class="data-card" style="border-right:5px solid ${c}">
                        <div class="d-flex justify-content-between mb-2">
                            <span class="data-value">${escapeHtml(i.title || i.name || '')}</span>
                            <span class="badge" style="background:${c}22; color:${c}; border:1px solid ${c}44">${i.priority || ''}</span>
                        </div>
                        <div class="small opacity-50 mb-1"><i class="bi bi-cash me-1"></i> الميزانية: ${i.budget || 'قيد الدراسة'}</div>
                        ${statusText ? `<div class="small opacity-50"><i class="bi bi-flag me-1"></i> الحالة: ${statusText}</div>` : ''}
                    </div>`;
                }).join('')}</div>`;
            }

            function renderCorrections(data) {
                const pending = data.filter(c => c.status !== 'COMPLETED' && c.status !== 'مكتمل');
                const completed = data.filter(c => c.status === 'COMPLETED' || c.status === 'مكتمل');
                return `
                    <div class="row g-3 mb-3">
                        <div class="col-md-6"><div class="pulse-card" style="border-top:3px solid #f59e0b">
                            <div class="pulse-val text-warning" style="font-size:1.8rem">${pending.length}</div>
                            <div class="pulse-lbl">معلقة</div>
                        </div></div>
                        <div class="col-md-6"><div class="pulse-card" style="border-top:3px solid #10b981">
                            <div class="pulse-val text-success" style="font-size:1.8rem">${completed.length}</div>
                            <div class="pulse-lbl">مكتملة</div>
                        </div></div>
                    </div>
                    ${pending.length > 0 ? `<div class="data-grid">${pending.slice(0, 6).map(c => `<div class="data-card" style="border-right:3px solid #f59e0b">
                        <div class="data-value" style="font-size:0.95rem">${escapeHtml(c.title || '')}</div>
                        <div class="small opacity-50 mt-1">${escapeHtml((c.description || '').substring(0, 80))}</div>
                    </div>`).join('')}</div>` : ''}
                `;
            }
        })();
    </script>
</body>

</html>
