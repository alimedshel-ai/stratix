<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ستارتكس - مركز API</title>
    <meta name="description" content="توثيق وإدارة واجهات برمجة التطبيقات">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #0a0b10;
            --bg2: #12141f;
            --card: #171a2a;
            --text: #e2e8f0;
            --muted: #7a8599;
            --border: rgba(255, 255, 255, 0.06);
            --primary: #667eea;
            --secondary: #764ba2;
            --green: #22c55e;
            --yellow: #facc15;
            --red: #ef4444;
            --blue: #38bdf8;
            --purple: #a78bfa;
            --orange: #f97316
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        body {
            background: var(--bg);
            font-family: 'Tajawal', sans-serif;
            color: var(--text);
            min-height: 100vh
        }

        .page-wrapper {
            display: flex;
            min-height: 100vh
        }

        .main-content {
            flex: 1;
            min-width: 0;
            padding: 28px 32px
        }

        .api-header {
            margin-bottom: 24px
        }

        .api-title {
            font-size: 28px;
            font-weight: 900
        }

        .api-title span {
            background: linear-gradient(135deg, var(--green), var(--teal, #14b8a6));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent
        }

        .api-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            margin-bottom: 24px
        }

        .api-stat {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 16px;
            text-align: center
        }

        .api-stat-num {
            font-size: 26px;
            font-weight: 900
        }

        .api-stat-label {
            font-size: 11px;
            color: var(--muted);
            margin-top: 2px
        }

        .api-search {
            display: flex;
            gap: 10px;
            margin-bottom: 20px
        }

        .api-search input {
            flex: 1;
            padding: 10px 16px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--card);
            color: var(--text);
            font-family: inherit;
            font-size: 13px
        }

        .api-search input:focus {
            outline: none;
            border-color: var(--primary)
        }

        .api-filter {
            padding: 8px 14px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text);
            font-family: inherit;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s
        }

        .api-filter.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary)
        }

        .api-filter:hover {
            background: rgba(255, 255, 255, 0.04)
        }

        .api-group {
            margin-bottom: 20px
        }

        .api-group-title {
            font-size: 15px;
            font-weight: 800;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer
        }

        .api-group-count {
            font-size: 11px;
            color: var(--muted);
            font-weight: 600;
            margin-right: auto
        }

        .api-endpoint {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            margin-bottom: 8px;
            overflow: hidden;
            transition: all 0.2s
        }

        .api-endpoint:hover {
            border-color: rgba(255, 255, 255, 0.1)
        }

        .api-ep-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            cursor: pointer
        }

        .api-method {
            padding: 3px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 800;
            font-family: monospace;
            letter-spacing: 0.5px;
            flex-shrink: 0
        }

        .method-GET {
            background: rgba(34, 197, 94, 0.1);
            color: var(--green)
        }

        .method-POST {
            background: rgba(56, 189, 248, 0.1);
            color: var(--blue)
        }

        .method-PUT {
            background: rgba(250, 204, 21, 0.1);
            color: var(--yellow)
        }

        .method-PATCH {
            background: rgba(249, 115, 22, 0.1);
            color: var(--orange)
        }

        .method-DELETE {
            background: rgba(239, 68, 68, 0.1);
            color: var(--red)
        }

        .api-path {
            font-family: monospace;
            font-size: 13px;
            font-weight: 600;
            flex: 1;
            direction: ltr;
            text-align: left
        }

        .api-desc {
            font-size: 11px;
            color: var(--muted);
            margin-right: auto
        }

        .api-auth {
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 4px;
            background: rgba(250, 204, 21, 0.08);
            color: var(--yellow);
            flex-shrink: 0
        }

        .api-expand {
            color: var(--muted);
            font-size: 14px;
            transition: transform 0.2s;
            flex-shrink: 0
        }

        .api-ep-body {
            display: none;
            padding: 16px;
            border-top: 1px solid var(--border);
            background: rgba(0, 0, 0, 0.15)
        }

        .api-ep-body.open {
            display: block;
            animation: fadeIn 0.3s
        }

        @keyframes fadeIn {
            from {
                opacity: 0
            }

            to {
                opacity: 1
            }
        }

        .api-section {
            margin-bottom: 14px
        }

        .api-section-title {
            font-size: 12px;
            font-weight: 700;
            color: var(--muted);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px
        }

        .api-code {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            font-family: monospace;
            font-size: 12px;
            direction: ltr;
            text-align: left;
            overflow-x: auto;
            line-height: 1.8;
            color: #a5f3fc
        }

        .api-code .key {
            color: var(--purple)
        }

        .api-code .str {
            color: var(--green)
        }

        .api-code .num {
            color: var(--orange)
        }

        .api-code .comment {
            color: var(--muted);
            font-style: italic
        }

        .api-param {
            display: grid;
            grid-template-columns: 120px 80px 1fr;
            gap: 8px;
            padding: 6px 0;
            border-bottom: 1px solid var(--border);
            font-size: 12px;
            align-items: center
        }

        .api-param:last-child {
            border-bottom: none
        }

        .api-param-name {
            font-family: monospace;
            font-weight: 700;
            color: var(--blue)
        }

        .api-param-type {
            font-family: monospace;
            color: var(--purple);
            font-size: 11px
        }

        .api-param-desc {
            color: var(--muted)
        }

        .api-param-req {
            color: var(--red);
            font-size: 10px;
            font-weight: 700
        }

        .api-try-btn {
            padding: 6px 16px;
            border-radius: 8px;
            border: 1px solid var(--primary);
            background: transparent;
            color: var(--primary);
            font-family: inherit;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s
        }

        .api-try-btn:hover {
            background: var(--primary);
            color: white
        }

        @media(max-width:768px) {
            .main-content {
                padding: 16px
            }

            .api-ep-header {
                flex-wrap: wrap
            }

            .api-param {
                grid-template-columns: 1fr
            }
        }
    </style>
</head>

<body>
    <div class="page-wrapper">
        <div id="sidebar-container"></div>
        <div class="main-content">
            <div class="api-header">
                <h1 class="api-title"><i class="bi bi-braces"></i> مركز <span>API</span></h1>
                <div style="font-size:13px;color:var(--muted);margin-top:4px">توثيق شامل لجميع واجهات برمجة التطبيقات —
                    v2.0</div>
            </div>

            <div class="api-stats" id="apiStats"></div>
            <div class="api-search">
                <input type="text" placeholder="🔍 ابحث عن endpoint..." id="apiSearch" oninput="filterEndpoints()">
                <button class="api-filter active" data-method="ALL" onclick="toggleFilter(this)">الكل</button>
                <button class="api-filter" data-method="GET" onclick="toggleFilter(this)">GET</button>
                <button class="api-filter" data-method="POST" onclick="toggleFilter(this)">POST</button>
                <button class="api-filter" data-method="PUT" onclick="toggleFilter(this)">PUT</button>
                <button class="api-filter" data-method="DELETE" onclick="toggleFilter(this)">DELETE</button>
            </div>
            <div id="apiGroups"></div>
        </div>
    </div>

    <script src="/js/api.js?v=4"></script>
    <script src="/js/steps-config.js?v=4"></script>
    <script src="/js/sidebar.js?v=4"></script>
    <script src="/js/ai-advisor.js?v=4"></script>
    <script src="/js/achievements.js?v=4"></script>
    <script src="/js/notifications.js?v=4"></script>
    <script>
        const apiGroups = [
            {
                name: '🔐 المصادقة', tag: 'auth', endpoints: [
                    { method: 'POST', path: '/api/auth/register', desc: 'تسجيل مستخدم جديد', auth: false, params: [{ name: 'email', type: 'string', req: true, desc: 'البريد الإلكتروني' }, { name: 'password', type: 'string', req: true, desc: 'كلمة المرور (8+ أحرف)' }, { name: 'name', type: 'string', req: true, desc: 'الاسم الكامل' }], response: '{ token, user: { id, name, email, role } }' },
                    { method: 'POST', path: '/api/auth/login', desc: 'تسجيل الدخول', auth: false, params: [{ name: 'email', type: 'string', req: true, desc: 'البريد' }, { name: 'password', type: 'string', req: true, desc: 'كلمة المرور' }], response: '{ token, user }' },
                    { method: 'GET', path: '/api/auth/me', desc: 'بيانات المستخدم الحالي', auth: true, params: [], response: '{ user: { id, name, email, role, level, xp } }' },
                ]
            },
            {
                name: '🎯 الأهداف', tag: 'objectives', endpoints: [
                    { method: 'GET', path: '/api/objectives', desc: 'جلب جميع الأهداف', auth: true, params: [{ name: 'entityId', type: 'string', req: false, desc: 'فلتر حسب الجهة' }, { name: 'perspective', type: 'string', req: false, desc: 'المنظور (FINANCIAL, CUSTOMER, etc)' }], response: '[{ id, title, perspective, progress, status }]' },
                    { method: 'POST', path: '/api/objectives', desc: 'إنشاء هدف جديد', auth: true, params: [{ name: 'title', type: 'string', req: true, desc: 'عنوان الهدف' }, { name: 'perspective', type: 'string', req: true, desc: 'المنظور' }, { name: 'weight', type: 'number', req: false, desc: 'الوزن النسبي' }], response: '{ id, title, ... }' },
                    { method: 'GET', path: '/api/objectives/:id', desc: 'تفاصيل هدف محدد', auth: true, params: [{ name: 'id', type: 'string', req: true, desc: 'معرف الهدف' }], response: '{ id, title, kpis, initiatives, ... }' },
                    { method: 'PUT', path: '/api/objectives/:id', desc: 'تحديث هدف', auth: true, params: [{ name: 'title', type: 'string', req: false, desc: 'العنوان الجديد' }, { name: 'progress', type: 'number', req: false, desc: 'نسبة الإنجاز' }], response: '{ id, ... }' },
                    { method: 'DELETE', path: '/api/objectives/:id', desc: 'حذف هدف', auth: true, params: [], response: '{ message }' },
                ]
            },
            {
                name: '📊 مؤشرات الأداء', tag: 'kpis', endpoints: [
                    { method: 'GET', path: '/api/kpis', desc: 'جلب جميع المؤشرات', auth: true, params: [{ name: 'objectiveId', type: 'string', req: false, desc: 'فلتر حسب الهدف' }], response: '[{ id, name, actual, target, unit }]' },
                    { method: 'POST', path: '/api/kpis', desc: 'إنشاء مؤشر', auth: true, params: [{ name: 'name', type: 'string', req: true, desc: 'اسم المؤشر' }, { name: 'target', type: 'number', req: true, desc: 'القيمة المستهدفة' }], response: '{ id, name, ... }' },
                    { method: 'POST', path: '/api/kpi-entries', desc: 'إدخال قيمة فعلية', auth: true, params: [{ name: 'kpiId', type: 'string', req: true, desc: 'معرف المؤشر' }, { name: 'value', type: 'number', req: true, desc: 'القيمة الفعلية' }, { name: 'period', type: 'string', req: true, desc: 'الفترة (2025-Q4)' }], response: '{ id, value, ... }' },
                ]
            },
            {
                name: '🚀 المبادرات', tag: 'initiatives', endpoints: [
                    { method: 'GET', path: '/api/initiatives', desc: 'جلب المبادرات', auth: true, params: [], response: '[{ id, title, progress, status, budget }]' },
                    { method: 'POST', path: '/api/initiatives', desc: 'إنشاء مبادرة', auth: true, params: [{ name: 'title', type: 'string', req: true, desc: 'عنوان المبادرة' }, { name: 'objectiveId', type: 'string', req: true, desc: 'الهدف المرتبط' }], response: '{ id, ... }' },
                    { method: 'PUT', path: '/api/initiatives/:id', desc: 'تحديث مبادرة', auth: true, params: [{ name: 'progress', type: 'number', req: false, desc: 'نسبة الإنجاز' }], response: '{ id, ... }' },
                ]
            },
            {
                name: '💬 التعليقات', tag: 'comments', endpoints: [
                    { method: 'GET', path: '/api/comments', desc: 'جلب التعليقات', auth: true, params: [{ name: 'targetType', type: 'string', req: true, desc: 'نوع العنصر (OBJECTIVE, KPI, etc)' }, { name: 'targetId', type: 'string', req: true, desc: 'معرف العنصر' }], response: '{ data: [{ id, content, userName, replies }], total }' },
                    { method: 'POST', path: '/api/comments', desc: 'إضافة تعليق', auth: true, params: [{ name: 'content', type: 'string', req: true, desc: 'نص التعليق' }, { name: 'targetType', type: 'string', req: true, desc: 'نوع العنصر' }, { name: 'targetId', type: 'string', req: true, desc: 'معرف العنصر' }], response: '{ id, content, ... }' },
                    { method: 'DELETE', path: '/api/comments/:id', desc: 'حذف تعليق', auth: true, params: [], response: '{ message }' },
                ]
            },
            {
                name: '📋 النشاطات', tag: 'activities', endpoints: [
                    { method: 'GET', path: '/api/activities', desc: 'سجل النشاطات', auth: true, params: [{ name: 'entityId', type: 'string', req: false, desc: 'فلتر حسب الجهة' }, { name: 'limit', type: 'number', req: false, desc: 'عدد النتائج (افتراضي 50)' }], response: '[{ id, action, targetType, userName, createdAt }]' },
                    { method: 'GET', path: '/api/activities/stats', desc: 'إحصائيات النشاط', auth: true, params: [], response: '{ total, thisWeek, topUsers }' },
                ]
            },
            {
                name: '🔔 Webhooks', tag: 'webhooks', endpoints: [
                    { method: 'GET', path: '/api/webhooks', desc: 'جلب الـ webhooks المسجلة', auth: true, params: [], response: '[{ id, url, events, active }]' },
                    { method: 'POST', path: '/api/webhooks', desc: 'تسجيل webhook جديد', auth: true, params: [{ name: 'url', type: 'string', req: true, desc: 'رابط الاستقبال' }, { name: 'events', type: 'string[]', req: true, desc: 'الأحداث (objective.created, kpi.updated)' }], response: '{ id, secret, ... }' },
                ]
            },
        ];

        let activeFilter = 'ALL';
        let searchQuery = '';

        function renderStats() {
            const total = apiGroups.reduce((s, g) => s + g.endpoints.length, 0);
            const gets = apiGroups.reduce((s, g) => s + g.endpoints.filter(e => e.method === 'GET').length, 0);
            const posts = apiGroups.reduce((s, g) => s + g.endpoints.filter(e => e.method === 'POST').length, 0);
            document.getElementById('apiStats').innerHTML = `
        <div class="api-stat"><div class="api-stat-num" style="color:var(--text)">${total}</div><div class="api-stat-label">إجمالي Endpoints</div></div>
        <div class="api-stat"><div class="api-stat-num" style="color:var(--green)">${gets}</div><div class="api-stat-label">GET</div></div>
        <div class="api-stat"><div class="api-stat-num" style="color:var(--blue)">${posts}</div><div class="api-stat-label">POST</div></div>
        <div class="api-stat"><div class="api-stat-num" style="color:var(--primary)">${apiGroups.length}</div><div class="api-stat-label">مجموعات</div></div>
      `;
        }

        function renderGroups() {
            const container = document.getElementById('apiGroups');
            container.innerHTML = apiGroups.map(g => {
                const filtered = g.endpoints.filter(e => {
                    if (activeFilter !== 'ALL' && e.method !== activeFilter) return false;
                    if (searchQuery && !e.path.includes(searchQuery) && !e.desc.includes(searchQuery)) return false;
                    return true;
                });
                if (!filtered.length) return '';
                return `
          <div class="api-group">
            <div class="api-group-title">${g.name} <span class="api-group-count">${filtered.length} endpoints</span></div>
            ${filtered.map((e, i) => `
              <div class="api-endpoint" id="ep-${g.tag}-${i}">
                <div class="api-ep-header" onclick="toggleEndpoint('${g.tag}-${i}')">
                  <span class="api-method method-${e.method}">${e.method}</span>
                  <span class="api-path">${e.path}</span>
                  <span class="api-desc">${e.desc}</span>
                  ${e.auth ? '<span class="api-auth">🔒 Auth</span>' : ''}
                  <i class="bi bi-chevron-down api-expand" id="arrow-${g.tag}-${i}"></i>
                </div>
                <div class="api-ep-body" id="body-${g.tag}-${i}">
                  ${e.params.length ? `
                    <div class="api-section">
                      <div class="api-section-title">المعاملات</div>
                      ${e.params.map(p => `
                        <div class="api-param">
                          <div class="api-param-name">${p.name} ${p.req ? '<span class="api-param-req">*</span>' : ''}</div>
                          <div class="api-param-type">${p.type}</div>
                          <div class="api-param-desc">${p.desc}</div>
                        </div>
                      `).join('')}
                    </div>
                  ` : ''}
                  <div class="api-section">
                    <div class="api-section-title">الاستجابة</div>
                    <div class="api-code">${e.response}</div>
                  </div>
                  <div style="margin-top:10px"><button class="api-try-btn" onclick="alert('سيتم فتح وحدة تجريب API — قيد التطوير')"><i class="bi bi-play-circle"></i> جرّب</button></div>
                </div>
              </div>
            `).join('')}
          </div>
        `;
            }).join('');
        }

        function toggleEndpoint(id) {
            const body = document.getElementById('body-' + id);
            const arrow = document.getElementById('arrow-' + id);
            body.classList.toggle('open');
            arrow.style.transform = body.classList.contains('open') ? 'rotate(180deg)' : '';
        }

        function toggleFilter(btn) {
            document.querySelectorAll('.api-filter').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            activeFilter = btn.dataset.method;
            renderGroups();
        }

        function filterEndpoints() {
            searchQuery = document.getElementById('apiSearch').value.trim();
            renderGroups();
        }

        renderStats();
        renderGroups();
    </script>
</body>

</html>
