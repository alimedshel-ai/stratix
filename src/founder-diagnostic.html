<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ستارتكس — تقييم جاهزية المؤسس</title>
    <meta name="description" content="15 سؤال لتحديد مرحلتك كمؤسس والمسار المناسب لانطلاقتك">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #667eea;
            --secondary: #764ba2;
            --bg: #0f1117;
            --bg-card: #1a1d2e;
            --text: #e2e8f0;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.08);
            --success: #22c55e;
            --warning: #f59e0b;
            --danger: #ef4444
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        body {
            background: var(--bg);
            font-family: 'Tajawal', sans-serif;
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden
        }

        .bg-glow {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none
        }

        .bg-glow::before {
            content: '';
            position: absolute;
            top: -20%;
            left: -10%;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(102, 126, 234, 0.06), transparent 70%);
            animation: g1 12s ease-in-out infinite
        }

        .bg-glow::after {
            content: '';
            position: absolute;
            bottom: -20%;
            right: -10%;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(118, 75, 162, 0.05), transparent 70%);
            animation: g2 15s ease-in-out infinite
        }

        @keyframes g1 {

            0%,
            100% {
                transform: translate(0, 0)
            }

            50% {
                transform: translate(40px, 30px)
            }
        }

        @keyframes g2 {

            0%,
            100% {
                transform: translate(0, 0)
            }

            50% {
                transform: translate(-30px, -20px)
            }
        }

        .top-bar {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            padding: 14px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100
        }

        .top-bar a {
            color: #fff;
            text-decoration: none;
            font-weight: 700;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 8px
        }

        .top-bar .step-ind {
            color: rgba(255, 255, 255, 0.7);
            font-size: 13px;
            font-weight: 600
        }

        .main {
            max-width: 680px;
            margin: 0 auto;
            padding: 30px 20px 80px;
            position: relative;
            z-index: 1
        }

        .prog-wrap {
            margin-bottom: 24px
        }

        .prog-bar-bg {
            height: 6px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 10px
        }

        .prog-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            border-radius: 10px;
            transition: width .5s
        }

        .prog-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px
        }

        .prog-label {
            font-size: 13px;
            font-weight: 700;
            color: var(--text)
        }

        .prog-pct {
            font-size: 12px;
            color: var(--primary);
            font-weight: 700;
            background: rgba(102, 126, 234, 0.1);
            padding: 3px 10px;
            border-radius: 20px
        }

        .qbox {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 28px 24px;
            margin-bottom: 16px
        }

        .qnum {
            font-size: 12px;
            color: var(--primary);
            font-weight: 700;
            margin-bottom: 6px
        }

        .qaxis {
            display: inline-block;
            font-size: 10px;
            padding: 3px 10px;
            border-radius: 8px;
            margin-bottom: 12px;
            font-weight: 700
        }

        .qtxt {
            font-size: 18px;
            font-weight: 800;
            margin-bottom: 18px;
            line-height: 1.6
        }

        .opts {
            display: flex;
            flex-direction: column;
            gap: 10px
        }

        .opt {
            background: rgba(255, 255, 255, 0.03);
            border: 2px solid var(--border);
            border-radius: 14px;
            padding: 14px 18px;
            cursor: pointer;
            transition: all .25s;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
            font-weight: 600
        }

        .opt:hover {
            border-color: rgba(255, 255, 255, 0.15);
            transform: translateX(-3px)
        }

        .opt.sel {
            border-color: var(--primary);
            background: rgba(102, 126, 234, 0.08)
        }

        .opt .chk {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 2px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #fff;
            transition: all .25s;
            flex-shrink: 0
        }

        .opt.sel .chk {
            background: var(--primary);
            border-color: var(--primary)
        }

        .nav-bar {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 20px
        }

        .bn {
            border: none;
            padding: 14px 32px;
            border-radius: 14px;
            font-family: inherit;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all .3s
        }

        .bn.next {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #fff
        }

        .bn.next:hover {
            transform: scale(1.03);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.3)
        }

        .bn.next:disabled {
            opacity: .4;
            cursor: not-allowed;
            transform: none
        }

        .bn.back {
            background: rgba(255, 255, 255, 0.06);
            color: var(--text-muted)
        }

        .rbox {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 20px;
            margin-bottom: 14px
        }

        .axis-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 10px;
            margin: 16px 0
        }

        .axis-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px;
            text-align: center
        }

        .axis-score {
            font-size: 22px;
            font-weight: 900
        }

        .axis-name {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 4px
        }

        .gap-item {
            display: flex;
            align-items: start;
            gap: 8px;
            padding: 10px 14px;
            background: rgba(239, 68, 68, 0.06);
            border: 1px solid rgba(239, 68, 68, 0.15);
            border-radius: 10px;
            margin-bottom: 8px;
            font-size: 13px;
            color: #fca5a5
        }

        .path-step {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 16px;
            border-radius: 14px;
            margin-bottom: 8px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.02)
        }

        .ps-num {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 800;
            flex-shrink: 0
        }

        @media(max-width:600px) {
            .qtxt {
                font-size: 16px
            }

            .main {
                padding: 20px 16px 60px
            }

            .axis-grid {
                grid-template-columns: 1fr 1fr
            }
        }
    </style>
</head>

<body>
    <div class="bg-glow"></div>
    <nav class="top-bar">
        <a href="/"><i class="bi bi-diamond-fill"></i> ستارتكس</a>
        <span class="step-ind" id="stepInd">السؤال 1 من 15</span>
    </nav>
    <div class="main">
        <div class="prog-wrap">
            <div class="prog-info">
                <div class="prog-label" id="progLabel">🚀 نضج الفكرة</div>
                <div class="prog-pct" id="progPct">0%</div>
            </div>
            <div class="prog-bar-bg">
                <div class="prog-bar-fill" id="progFill" style="width:0%"></div>
            </div>
        </div>
        <div id="questionArea"></div>
        <div class="nav-bar">
            <button class="bn back" id="prevBtn" onclick="prev()" style="display:none"><i class="bi bi-arrow-right"></i>
                السابق</button>
            <button class="bn next" id="nextBtn" onclick="next()" disabled>التالي <i
                    class="bi bi-arrow-left"></i></button>
        </div>
        <div id="resultArea" style="display:none"></div>
    </div>

    <script>
        const QS = [
            // ═══ محور 1: نضج الفكرة (3 أسئلة) ═══
            {
                id: 'idea_stage', axis: 'idea', axisName: 'نضج الفكرة', axisColor: '#a78bfa', icon: '💡', q: 'وين أنت بالضبط مع فكرتك؟', opts: [
                    { v: 1, t: 'عندي فكرة بس — مجرد خاطر' }, { v: 2, t: 'كتبت الفكرة (وصف بسيط)' }, { v: 3, t: 'عملت بحث أولي في السوق' }, { v: 4, t: 'كلمت عملاء محتملين' }, { v: 5, t: 'عندي MVP أو نموذج أولي' }]
            },
            {
                id: 'problem_clarity', axis: 'idea', axisName: 'نضج الفكرة', axisColor: '#a78bfa', icon: '🎯', q: 'هل حددت المشكلة اللي تحلها بوضوح؟', opts: [
                    { v: 1, t: 'لا، لسه مو واضحة' }, { v: 2, t: 'تقريباً، بس مو متأكد' }, { v: 3, t: 'نعم، واضحة جداً' }, { v: 4, t: 'نعم + اختبرتها على عملاء' }]
            },
            {
                id: 'revenue_model', axis: 'idea', axisName: 'نضج الفكرة', axisColor: '#a78bfa', icon: '💰', q: 'نموذج الربح — كيف بتكسب؟', opts: [
                    { v: 1, t: 'ما فكرت فيه بعد' }, { v: 2, t: 'عندي فكرة غير واضحة' }, { v: 3, t: 'حددته لكن ما اختبرته' }, { v: 4, t: 'حددته واختبرته' }]
            },

            // ═══ محور 2: جاهزية المؤسس (3 أسئلة) ═══
            {
                id: 'experience', axis: 'founder', axisName: 'جاهزية المؤسس', axisColor: '#3b82f6', icon: '🧑‍💼', q: 'خبرتك في هذا المجال تحديداً:', opts: [
                    { v: 1, t: 'صفر — مجال جديد عليّ' }, { v: 2, t: 'قليلة (أقل من سنة)' }, { v: 3, t: 'متوسطة (1-3 سنوات)' }, { v: 4, t: 'قوية (3-7 سنوات)' }, { v: 5, t: 'خبير (أكثر من 7)' }]
            },
            {
                id: 'prev_ventures', axis: 'founder', axisName: 'جاهزية المؤسس', axisColor: '#3b82f6', icon: '🔄', q: 'هل سبق لك تأسيس مشروع؟', opts: [
                    { v: 1, t: 'لا، هذي أول تجربة' }, { v: 2, t: 'نعم وفشل' }, { v: 3, t: 'نعم ونجح جزئياً' }, { v: 4, t: 'نعم ونجح ولازال يعمل' }]
            },
            {
                id: 'skills', axis: 'founder', axisName: 'جاهزية المؤسس', axisColor: '#3b82f6', icon: '🛠️', q: 'إيش أقوى مهاراتك؟', opts: [
                    { v: 1, t: 'تسويق ومبيعات' }, { v: 2, t: 'تقنية وبرمجة' }, { v: 3, t: 'إدارة مالية' }, { v: 4, t: 'إدارة فرق وقيادة' }, { v: 5, t: 'تطوير منتجات' }]
            },

            // ═══ محور 3: فهم السوق (3 أسئلة) ═══
            {
                id: 'target_customers', axis: 'market', axisName: 'فهم السوق', axisColor: '#f59e0b', icon: '👥', q: 'هل تعرف عملاءك المستهدفين؟', opts: [
                    { v: 1, t: 'لا، لسه ما حددتهم' }, { v: 2, t: 'فكرة عامة بس' }, { v: 3, t: 'نعم، محددين بوضوح' }, { v: 4, t: 'نعم + كلمت بعضهم فعلاً' }]
            },
            {
                id: 'competitors', axis: 'market', axisName: 'فهم السوق', axisColor: '#f59e0b', icon: '⚔️', q: 'المنافسين — وينك منهم؟', opts: [
                    { v: 1, t: 'ما بحثت عنهم' }, { v: 2, t: 'أعرفهم بشكل عام' }, { v: 3, t: 'درست 3-5 منافسين' }, { v: 4, t: 'تحليل تنافسي كامل' }]
            },
            {
                id: 'market_size', axis: 'market', axisName: 'فهم السوق', axisColor: '#f59e0b', icon: '📊', q: 'حجم السوق المستهدف:', opts: [
                    { v: 1, t: 'ما أعرف بالضبط' }, { v: 2, t: 'صغير (أقل من 10 مليون)' }, { v: 3, t: 'متوسط (10-100 مليون)' }, { v: 4, t: 'كبير (أكثر من 100 مليون)' }]
            },

            // ═══ محور 4: الموارد (3 أسئلة) ═══
            {
                id: 'capital', axis: 'resources', axisName: 'الموارد', axisColor: '#22c55e', icon: '🏦', q: 'رأس المال المتاح حالياً:', opts: [
                    { v: 1, t: '0 ريال — ما عندي' }, { v: 2, t: 'أقل من 50 ألف' }, { v: 3, t: '50 - 200 ألف' }, { v: 4, t: 'أكثر من 200 ألف' }, { v: 5, t: 'عندي مستثمر جاهز' }]
            },
            {
                id: 'time_available', axis: 'resources', axisName: 'الموارد', axisColor: '#22c55e', icon: '⏰', q: 'الوقت المتاح للمشروع:', opts: [
                    { v: 1, t: 'ساعات قليلة بعد الدوام' }, { v: 2, t: 'نص الوقت (Part-time)' }, { v: 3, t: 'كامل الوقت (Full-time)' }, { v: 4, t: 'أنا + فريق متفرغين' }]
            },
            {
                id: 'team', axis: 'resources', axisName: 'الموارد', axisColor: '#22c55e', icon: '👥', q: 'الفريق والشركاء:', opts: [
                    { v: 1, t: 'لوحدي تماماً' }, { v: 2, t: 'شريك واحد' }, { v: 3, t: '2-3 شركاء' }, { v: 4, t: 'فريق صغير (3-5)' }]
            },

            // ═══ محور 5: الالتزام والرؤية (3 أسئلة) ═══
            {
                id: 'timeline', axis: 'commitment', axisName: 'الالتزام', axisColor: '#ec4899', icon: '📅', q: 'متى تبي تبدأ فعلياً؟', opts: [
                    { v: 4, t: 'خلال شهر — مستعد!' }, { v: 3, t: 'خلال 3 أشهر' }, { v: 2, t: 'خلال 6 أشهر' }, { v: 1, t: 'لسه ما قررت' }]
            },
            {
                id: 'goal', axis: 'commitment', axisName: 'الالتزام', axisColor: '#ec4899', icon: '🎯', q: 'هدفك الحقيقي من المشروع:', opts: [
                    { v: 1, t: 'دخل إضافي بس' }, { v: 2, t: 'استقلال مالي' }, { v: 3, t: 'بناء مشروع كبير' }, { v: 4, t: 'تغيير العالم / حل مشكلة حقيقية' }]
            },
            {
                id: 'risk_tolerance', axis: 'commitment', axisName: 'الالتزام', axisColor: '#ec4899', icon: '🎲', q: 'استعدادك للمخاطرة:', opts: [
                    { v: 1, t: 'محافظ جداً — ما أقدر أخسر' }, { v: 2, t: 'حذر — مخاطرة محسوبة' }, { v: 3, t: 'متوازن — مستعد لبعض المخاطر' }, { v: 4, t: 'جريء — مستعد أراهن' }]
            }
        ];

        const answers = {};
        let cur = 0;

        function render() {
            const q = QS[cur];
            const pct = Math.round(((cur) / QS.length) * 100);
            document.getElementById('progFill').style.width = pct + '%';
            document.getElementById('progPct').textContent = pct + '%';
            document.getElementById('stepInd').textContent = `السؤال ${cur + 1} من ${QS.length}`;
            document.getElementById('progLabel').textContent = `${q.icon} ${q.axisName}`;
            document.getElementById('prevBtn').style.display = cur === 0 ? 'none' : 'flex';
            document.getElementById('nextBtn').textContent = cur === QS.length - 1 ? 'عرض النتيجة 🚀' : 'التالي';
            document.getElementById('nextBtn').disabled = !answers[q.id];

            let html = `<div class="qbox">
        <div class="qnum">السؤال ${cur + 1} من ${QS.length}</div>
        <span class="qaxis" style="background:${q.axisColor}20;color:${q.axisColor}">${q.icon} ${q.axisName}</span>
        <div class="qtxt">${q.q}</div>
        <div class="opts">`;
            q.opts.forEach(o => {
                const sel = answers[q.id] === o.v ? 'sel' : '';
                html += `<div class="opt ${sel}" onclick="pick('${q.id}',${o.v},this)">
            <div class="chk"><i class="bi bi-check"></i></div>
            <span>${o.t}</span></div>`;
            });
            html += '</div></div>';
            document.getElementById('questionArea').innerHTML = html;
        }

        function pick(id, val, el) {
            answers[id] = val;
            el.parentElement.querySelectorAll('.opt').forEach(o => o.classList.remove('sel'));
            el.classList.add('sel');
            document.getElementById('nextBtn').disabled = false;
        }

        function next() {
            if (cur < QS.length - 1) { cur++; render(); window.scrollTo({ top: 0, behavior: 'smooth' }); }
            else showResult();
        }
        function prev() {
            if (cur > 0) { cur--; render(); window.scrollTo({ top: 0, behavior: 'smooth' }); }
        }

        // ═══ حساب النتيجة ═══
        function calcScores() {
            const axes = {
                idea: ['idea_stage', 'problem_clarity', 'revenue_model'],
                founder: ['experience', 'prev_ventures', 'skills'],
                market: ['target_customers', 'competitors', 'market_size'],
                resources: ['capital', 'time_available', 'team'],
                commitment: ['timeline', 'goal', 'risk_tolerance']
            };
            const scores = {};
            let tot = 0, cnt = 0;
            for (const [ax, qs] of Object.entries(axes)) {
                let s = 0, n = 0;
                qs.forEach(q => { if (answers[q]) { s += (answers[q] / 5) * 100; n++; } });
                scores[ax] = n > 0 ? Math.round(s / n) : 0;
                tot += scores[ax]; cnt++;
            }
            scores.overall = Math.round(tot / cnt);
            return scores;
        }

        function getStage(score) {
            if (score < 25) return { name: 'الحالم 💭', emoji: '💭', color: '#94a3b8', desc: 'عندك حلم كبير — تحتاج تحوله لخطة واقعية' };
            if (score < 40) return { name: 'المستكشف 🔍', emoji: '🔍', color: '#60a5fa', desc: 'بدأت تستكشف — ركّز على فهم السوق والعميل' };
            if (score < 55) return { name: 'المخطط 📐', emoji: '📐', color: '#fbbf24', desc: 'عندك أساس — الخطوة التالية هي التنفيذ' };
            if (score < 70) return { name: 'المنفذ ⚡', emoji: '⚡', color: '#a78bfa', desc: 'مستعد تنفذ — نظّم وابدأ!' };
            if (score < 85) return { name: 'المؤسس الجديد 🌱', emoji: '🌱', color: '#34d399', desc: 'جاهز تقريباً للانطلاق — ركّز على التشغيل' };
            return { name: 'المؤسس المتمرس 🏆', emoji: '🏆', color: '#10b981', desc: 'عندك كل المقومات — انطلق بثقة!' };
        }

        function getGaps(scores) {
            const g = [];
            if (scores.idea < 50) g.push({ icon: '💡', t: 'نموذج العمل غير واضح', fix: 'اقضِ أسبوع في تحديد مشكلتك وحلّك ونموذج ربحك' });
            if (scores.market < 50) g.push({ icon: '📊', t: 'فهم السوق سطحي', fix: 'كلّم 10-20 عميل محتمل + ادرس 5 منافسين' });
            if (scores.resources < 40) g.push({ icon: '💸', t: 'موارد محدودة', fix: 'فكّر في شريك أو مسرّعة أعمال أو تمويل حكومي' });
            if (scores.founder < 40) g.push({ icon: '🧑‍💼', t: 'خبرة محدودة في المجال', fix: 'ابحث عن مرشد (Mentor) — منصات مثل MentorCloud' });
            if (scores.commitment < 50) g.push({ icon: '🔥', t: 'الالتزام يحتاج تعزيز', fix: 'حدد تاريخ بدء واقعي + خصص وقت ثابت أسبوعياً' });
            return g;
        }

        function getPathway(scores) {
            if (scores.overall < 35) return { name: 'مسار التحقق والتعلم', icon: '📚', steps: ['حدد المشكلة الحقيقية', 'تكلم مع 20 عميل محتمل', 'ادرس 5 منافسين بالتفصيل', 'اكتب نموذج العمل (Business Model Canvas)', 'صمم MVP بسيط', 'اختبر وتعلم'] };
            if (scores.overall < 55) return { name: 'مسار التأسيس المنهجي', icon: '📋', steps: ['أكمل دراسة الجدوى', 'ابنِ النموذج الأولي (MVP)', 'اختبره مع 10 عملاء', 'عدّل بناءً على Feedback', 'حدد مؤشرات النجاح', 'ابدأ التشغيل التجريبي'] };
            if (scores.overall < 75) return { name: 'مسار التشغيل والنمو', icon: '🚀', steps: ['نظّم عملياتك وأنظمتك', 'حدد KPIs واضحة', 'ابنِ فريقك الأولي', 'أطلق الحملة التسويقية', 'تتبع الأداء أسبوعياً', 'وسّع قاعدة العملاء'] };
            return { name: 'مسار الانطلاق السريع', icon: '⚡', steps: ['أطلق مباشرة', 'ركّز على اكتساب العملاء', 'بنِ فريق قوي', 'حدد استراتيجية النمو', 'اعمل على التوسع', 'فكّر في استثمار إضافي'] };
        }

        const PLAN_MAP = {
            low: { plan: 'FREE', icon: '🆓', name: 'مجاني FREE', price: 0, reason: 'ابدأ بدون أي تكلفة — تعلم واكتشف', features: ['1 كيان', 'SWOT بسيط', '1 هدف + 2 مؤشرات', 'موارد تعليمية'] },
            mid: { plan: 'STARTER', icon: '💎', name: 'مبتدئ STARTER', price: 49, reason: 'الأدوات المثالية لبناء خطتك الأولى', features: ['2 كيانات', 'SWOT كامل', '3 أهداف + 5 مؤشرات', 'دعم عبر البريد'] },
            high: { plan: 'PRO', icon: '🚀', name: 'احترافي PRO', price: 149, reason: 'أدوات متقدمة للمؤسس الجاد', features: ['5 كيانات', 'كل أدوات التحليل', '10 أهداف + 20 مؤشر', 'المبادرات والمتابعة', 'تقارير احترافية'] }
        };

        function showResult() {
            const scores = calcScores();
            const stage = getStage(scores.overall);
            const gaps = getGaps(scores);
            const pathway = getPathway(scores);
            const planKey = scores.overall < 35 ? 'low' : scores.overall < 60 ? 'mid' : 'high';
            const plan = PLAN_MAP[planKey];

            document.getElementById('questionArea').style.display = 'none';
            document.querySelector('.nav-bar').style.display = 'none';
            document.getElementById('stepInd').textContent = 'النتيجة';
            document.getElementById('progFill').style.width = '100%';
            document.getElementById('progPct').textContent = '100%';
            document.getElementById('progLabel').textContent = '🎉 تشخيصك جاهز';

            const axisNames = { idea: 'نضج الفكرة', founder: 'جاهزية المؤسس', market: 'فهم السوق', resources: 'الموارد', commitment: 'الالتزام' };
            const axisColors = { idea: '#a78bfa', founder: '#3b82f6', market: '#f59e0b', resources: '#22c55e', commitment: '#ec4899' };

            let html = `
    <div class="rbox" style="text-align:center">
        <div style="font-size:36px;margin-bottom:8px">${stage.emoji}</div>
        <div style="display:inline-block;padding:8px 24px;border-radius:20px;background:${stage.color}18;border:1px solid ${stage.color}35;color:${stage.color};font-weight:800;font-size:18px;margin-bottom:12px">${stage.name}</div>
        <div style="font-size:42px;font-weight:900;color:${stage.color};margin:12px 0">${scores.overall}<span style="font-size:18px;color:var(--text-muted)">/100</span></div>
        <p style="font-size:14px;color:var(--text-muted)">${stage.desc}</p>
    </div>
    <div class="rbox">
        <div style="font-weight:800;font-size:14px;margin-bottom:12px">📊 التحليل بالمحاور</div>
        <div class="axis-grid">
            ${Object.entries(scores).filter(([k]) => k !== 'overall').map(([k, v]) => `
                <div class="axis-item" style="border-right:3px solid ${axisColors[k]}">
                    <div class="axis-score" style="color:${axisColors[k]}">${v}</div>
                    <div class="axis-name">${axisNames[k]}</div>
                </div>`).join('')}
        </div>
    </div>`;

            if (gaps.length > 0) {
                html += `<div class="rbox"><div style="font-weight:800;font-size:14px;margin-bottom:12px;color:#fca5a5">🔴 الفجوات الحرجة</div>
        ${gaps.map(g => `<div class="gap-item"><span style="font-size:16px">${g.icon}</span><div><strong>${g.t}</strong><div style="font-size:12px;color:var(--text-muted);margin-top:2px">💡 ${g.fix}</div></div></div>`).join('')}</div>`;
            }

            html += `<div class="rbox"><div style="font-weight:800;font-size:14px;margin-bottom:12px">🗺️ ${pathway.name} ${pathway.icon}</div>
    ${pathway.steps.map((s, i) => `<div class="path-step" style="${i === 0 ? 'background:rgba(102,126,234,0.06);border-color:rgba(102,126,234,0.2)' : ''}">
        <div class="ps-num" style="background:${i === 0 ? 'var(--primary)' : 'rgba(255,255,255,0.06)'};color:${i === 0 ? '#fff' : 'var(--text-muted)'}">${i + 1}</div>
        <div style="flex:1;font-weight:700;font-size:13px;color:${i === 0 ? 'var(--primary)' : 'var(--text-muted)'}">${s}</div>
        ${i === 0 ? '<span style="font-size:11px;color:var(--success);font-weight:700">👈 ابدأ هنا</span>' : ''}
    </div>`).join('')}</div>`;

            // التسعير
            html += `<div style="text-align:center;margin:16px 0 8px;font-size:15px;font-weight:800;color:var(--text-muted)">💰 الباقة المناسبة لك</div>
    <div style="background:linear-gradient(135deg,rgba(102,126,234,0.08),rgba(118,75,162,0.06));border:2px solid rgba(102,126,234,0.25);border-radius:20px;padding:28px 24px;text-align:center;position:relative;overflow:hidden">
        <div style="position:absolute;top:12px;left:12px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;font-size:10px;font-weight:800;padding:4px 12px;border-radius:8px">⭐ الأنسب لك</div>
        <div style="font-size:36px;margin-bottom:8px">${plan.icon}</div>
        <div style="font-size:20px;font-weight:800;color:#fff;margin-bottom:4px">${plan.name}</div>
        <div style="font-size:12px;color:var(--text-muted);margin-bottom:16px">${plan.reason}</div>
        ${plan.price > 0 ? `<div style="font-size:14px;color:var(--text-muted);text-decoration:line-through">${plan.price} ريال/شهر</div>` : ''}
        <div style="font-size:28px;font-weight:900;background:linear-gradient(135deg,#22c55e,#10b981);-webkit-background-clip:text;background-clip:text;color:transparent">مجاناً</div>
        <div style="font-size:12px;color:#22c55e;font-weight:700;margin-bottom:16px">🎁 نسخة تجريبية — 3 أشهر مجاناً</div>
        <div style="text-align:right;display:flex;flex-direction:column;gap:8px;margin-bottom:20px">
            ${plan.features.map(f => `<div style="display:flex;align-items:center;gap:8px;font-size:13px"><i class="bi bi-check-circle-fill" style="color:#22c55e;flex-shrink:0"></i><span>${f}</span></div>`).join('')}
        </div>
        <button class="bn next" onclick="startNow()" style="width:100%;padding:16px;font-size:16px;border-radius:14px;justify-content:center">
            <i class="bi bi-rocket-takeoff"></i> ابدأ الآن — مجاناً
        </button>
        <div style="font-size:11px;color:var(--text-muted);margin-top:8px"><i class="bi bi-shield-check"></i> بدون بطاقة ائتمان · إلغاء في أي وقت</div>
    </div>
    <div style="text-align:center;margin-top:16px"><button class="bn back" onclick="location.reload()"><i class="bi bi-arrow-right"></i> عدّل إجاباتك</button></div>`;

            document.getElementById('resultArea').innerHTML = html;
            document.getElementById('resultArea').style.display = 'block';

            // حفظ البيانات
            localStorage.setItem('founderDiagnostic', JSON.stringify({ answers, scores, stage: stage.name, pathway: pathway.name, plan: plan.plan, timestamp: new Date().toISOString() }));
            localStorage.setItem('stratix_selected_plan', plan.plan);
        }

        function startNow() {
            const token = localStorage.getItem('token');
            if (token) {
                const user = JSON.parse(localStorage.getItem('user') || '{}');
                window.location.href = user.onboardingCompleted ? '/dashboard.html' : '/onboarding.html';
            } else {
                window.location.href = '/login?tab=signup&from=diagnostic';
            }
        }

        render();
    </script>
</body>

</html>
