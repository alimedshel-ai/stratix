<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خطة الإصلاح الاستراتيجي - Stratix 2.0</title>
    <link rel="stylesheet" href="assets/css/variables.css">
    <link rel="stylesheet" href="assets/css/common.css">
    <link rel="stylesheet" href="assets/css/compliance-shared.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root {
            --audit-bg: #0f172a;
            --card-bg: #1e293b;
            --border-color: #334155;
            --accent-blue: #3b82f6;
            --accent-purple: #8b5cf6;
            --accent-red: #ef4444;
            --accent-green: #22c55e;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
        }

        body {
            background-color: var(--audit-bg);
            color: var(--text-primary);
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .reform-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .reform-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 20px;
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border-radius: 16px;
            border: 1px solid var(--border-color);
        }

        .header-title h1 {
            margin: 0;
            font-size: 24px;
            background: linear-gradient(to left, #fff, var(--accent-blue));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-title p {
            margin: 5px 0 0 0;
            color: var(--text-secondary);
            font-size: 14px;
        }

        .summary-stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            text-align: center;
        }

        .stat-val {
            font-size: 32px;
            font-weight: 800;
            display: block;
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .roadmap-timeline {
            position: relative;
            padding-left: 20px;
        }

        .week-group {
            margin-bottom: 40px;
        }

        .week-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .week-badge {
            background: var(--accent-blue);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
        }

        .week-line {
            flex-grow: 1;
            height: 1px;
            background: var(--border-color);
        }

        .task-list {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }

        .task-card {
            background: var(--card-bg);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            padding: 20px;
            display: grid;
            grid-template-columns: auto 1fr auto;
            gap: 20px;
            align-items: center;
            transition: transform 0.2s, border-color 0.2s;
        }

        .task-card:hover {
            transform: translateX(-5px);
            border-color: var(--accent-blue);
        }

        .priority-indicator {
            width: 4px;
            height: 40px;
            border-radius: 2px;
        }

        .priority-KO {
            background-color: var(--accent-red);
        }

        .priority-High {
            background-color: #f59e0b;
        }

        .priority-Medium {
            background-color: var(--accent-blue);
        }

        .task-info h3 {
            margin: 0 0 5px 0;
            font-size: 16px;
        }

        .task-info p {
            margin: 0;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .task-meta {
            display: flex;
            gap: 20px;
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 10px;
        }

        .meta-item i {
            margin-left: 5px;
            color: var(--accent-blue);
        }

        .task-action {
            text-align: left;
        }

        .action-button {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .action-button:hover {
            background: var(--border-color);
        }

        .empty-state {
            text-align: center;
            padding: 100px 20px;
            color: var(--text-secondary);
        }

        .empty-state i {
            font-size: 64px;
            display: block;
            margin-bottom: 20px;
            color: var(--accent-green);
        }

        /* KB Details */
        .kb-details {
            margin-top: 12px;
            padding: 12px;
            background: rgba(59, 130, 246, 0.08);
            border-radius: 8px;
            border: 1px solid rgba(59, 130, 246, 0.15);
            font-size: 12px;
        }

        .kb-row {
            display: flex;
            gap: 8px;
            margin-bottom: 6px;
            color: var(--text-secondary);
        }

        .kb-row:last-child {
            margin-bottom: 0;
        }

        .kb-row i {
            color: var(--accent-blue);
            min-width: 16px;
        }

        .kb-row strong {
            color: var(--text-primary);
        }

        /* Incentive Chip */
        .incentive-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 8px;
            padding: 6px 12px;
            background: rgba(34, 197, 94, 0.12);
            border: 1px solid rgba(34, 197, 94, 0.3);
            border-radius: 20px;
            font-size: 11px;
            color: var(--accent-green);
        }

        .incentive-chip i {
            font-size: 14px;
        }

        /* KO Badge */
        .ko-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            margin-top: 6px;
        }

        /* Summary incentive card */
        .stat-card.incentive-stat {
            border-color: rgba(34, 197, 94, 0.3);
            background: linear-gradient(135deg, #1e293b, rgba(34, 197, 94, 0.08));
        }

        @media (max-width: 768px) {
            .summary-stats {
                grid-template-columns: repeat(2, 1fr);
            }

            .task-card {
                grid-template-columns: 1fr;
            }

            .priority-indicator {
                width: 100%;
                height: 4px;
            }
        }
    </style>
</head>

<body>

    <div class="reform-container">
        <div class="reform-header">
            <div class="header-title">
                <h1>خطة الإصلاح الاستراتيجي (Reform Roadmap)</h1>
                <p id="companyNameDisplay">تحميل بيانات المنشأة...</p>
            </div>
            <div class="header-actions" style="display:flex;gap:10px">
                <button class="action-button" onclick="window.print()">
                    <i class="bi bi-printer"></i> طباعة الخطة
                </button>
                <button class="action-button" style="border-color:var(--accent-green);color:var(--accent-green)" onclick="window.location.href='/compliance-kpis.html'">
                    <i class="bi bi-speedometer2"></i> التالي: مؤشرات الأداء
                </button>
            </div>
        </div>

        <div id="statsContainer" class="summary-stats">
            <!-- Stats populated by JS -->
        </div>

        <div id="roadmapContainer" class="roadmap-timeline">
            <!-- Roadmap populated by JS -->
        </div>
    </div>

    <script src="js/compliance-audit-config.js?v=12"></script>
    <script src="js/compliance-audit-engine.js?v=12"></script>
    <script src="js/compliance-remediation-kb.js?v=12"></script>
    <script src="assets/js/compliance-handlers.js?v=12"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            try {
                const raw = localStorage.getItem('startix_compliance_audit_pro');
                if (!raw) {
                    renderNoData();
                    return;
                }

                const auditState = JSON.parse(raw);
                if (auditState.meta && auditState.meta.companyName) {
                    document.getElementById('companyNameDisplay').textContent =
                        `نظام الامتثال الرقمي لشركة: ${auditState.meta.companyName}`;
                }

                if (typeof window.generateStrategicReformPlan !== 'function') {
                    renderError('لم يتم تحميل محرك خطة الإصلاح');
                    return;
                }

                const plan = window.generateStrategicReformPlan(auditState);
                if (!plan || plan.timeline.length === 0) {
                    renderEmpty();
                    return;
                }

                renderStats(plan);
                renderRoadmap(plan);
            } catch (e) {
                console.error('[Reform] Error:', e);
                renderError('حدث خطأ: ' + e.message);
            }
        });

        function renderStats(plan) {
            const container = document.getElementById('statsContainer');
            const incentiveCount = plan.timeline.filter(t => t.incentive).length;
            const expiredCount = plan.timeline.filter(t => t.koLevel && t.koLevel.score === 0).length;
            container.innerHTML = `
                <div class="stat-card">
                    <span class="stat-val" style="color:var(--accent-red)">${plan.summary.critical}</span>
                    <span class="stat-label">فجوات KO</span>
                </div>
                <div class="stat-card">
                    <span class="stat-val" style="color:#f59e0b">${plan.summary.high}</span>
                    <span class="stat-label">أولوية عالية</span>
                </div>
                <div class="stat-card">
                    <span class="stat-val" style="color:var(--accent-blue)">${plan.summary.medium}</span>
                    <span class="stat-label">أولوية متوسطة</span>
                </div>
                <div class="stat-card">
                    <span class="stat-val">${plan.summary.total}</span>
                    <span class="stat-label">إجمالي المهام</span>
                </div>
                ${expiredCount > 0 ? `<div class="stat-card">
                    <span class="stat-val" style="color:#dc2626">${expiredCount}</span>
                    <span class="stat-label">تراخيص منتهية</span>
                </div>` : ''}
                ${incentiveCount > 0 ? `<div class="stat-card incentive-stat">
                    <span class="stat-val" style="color:var(--accent-green)">${incentiveCount}</span>
                    <span class="stat-label">حوافز متاحة</span>
                </div>` : ''}
            `;
        }

        function renderRoadmap(plan) {
            const container = document.getElementById('roadmapContainer');
            const grouped = plan.timeline.reduce((acc, task) => {
                if (!acc[task.week]) acc[task.week] = [];
                acc[task.week].push(task);
                return acc;
            }, {});

            let html = '';
            for (let week = 1; week <= 12; week++) {
                if (!grouped[week]) continue;

                html += `
                    <div class="week-group">
                        <div class="week-header">
                            <div class="week-badge">الأسبوع ${week}</div>
                            <div class="week-line"></div>
                        </div>
                        <div class="task-list">
                            ${grouped[week].map(task => `
                                <div class="task-card">
                                    <div class="priority-indicator priority-${task.priority === 'KO' ? 'KO' : (task.priority === 'عالية' ? 'High' : 'Medium')}"></div>
                                    <div class="task-info">
                                        <h3>${task.task}</h3>
                                        <p>${task.desc}</p>
                                        ${task.koLevel ? `<div class="ko-badge" style="background:${task.koLevel.color}22;color:${task.koLevel.color};border:1px solid ${task.koLevel.color}44">
                                            <i class="bi bi-calendar-x"></i> ${task.koLevel.label}${task.expiryDate ? ' — ' + task.expiryDate : ''}
                                        </div>` : ''}
                                        <div class="task-meta">
                                            <div class="meta-item"><i class="bi bi-tag"></i> المحور: ${task.axis}</div>
                                            <div class="meta-item"><i class="bi bi-person"></i> المسؤول: ${task.owner}</div>
                                            ${task.duration ? `<div class="meta-item"><i class="bi bi-clock"></i> المدة: ${task.duration}</div>` : ''}
                                            ${task.costRange ? `<div class="meta-item"><i class="bi bi-cash"></i> التكلفة: ${task.costRange}</div>` : ''}
                                        </div>
                                        ${task.platform || task.docs ? `<div class="kb-details">
                                            ${task.platform ? `<div class="kb-row"><i class="bi bi-globe"></i> <strong>المنصة:</strong> ${task.platform}</div>` : ''}
                                            ${task.docs ? `<div class="kb-row"><i class="bi bi-file-earmark-text"></i> <strong>المستندات:</strong> ${task.docs}</div>` : ''}
                                            <div class="kb-row"><i class="bi bi-lightning"></i> <strong>الإجراء:</strong> ${task.action}</div>
                                        </div>` : `<div class="task-meta" style="margin-top:6px"><div class="meta-item"><i class="bi bi-lightning"></i> الإجراء: ${task.action}</div></div>`}
                                        ${task.incentive ? `<div class="incentive-chip">
                                            <i class="bi bi-gift"></i>
                                            ${task.incentive.desc || task.incentive}${task.incentive.amount ? ' — ' + task.incentive.amount : ''}
                                        </div>` : ''}
                                    </div>
                                    <div class="task-action">
                                        <div style="font-size:11px;color:var(--text-secondary);margin-bottom:5px">الأثر المالي المتوقع</div>
                                        <div style="font-weight:bold;color:var(--accent-red)">${task.impact}</div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }
            container.innerHTML = html;
        }

        function renderNoData() {
            document.getElementById('roadmapContainer').innerHTML = `
                <div class="empty-state">
                    <i class="bi bi-clipboard-x"></i>
                    <h2>لا توجد بيانات فحص</h2>
                    <p>يجب إكمال فحص الامتثال الاحترافي أولاً لتوليد خطة الإصلاح.</p>
                    <button class="action-button" style="margin-top:20px" onclick="window.location.href='compliance-audit-pro.html'">
                        <i class="bi bi-shield-lock"></i> ابدأ فحص الامتثال
                    </button>
                </div>
            `;
        }

        function renderEmpty() {
            document.getElementById('roadmapContainer').innerHTML = `
                <div class="empty-state">
                    <i class="bi bi-shield-check"></i>
                    <h2>تهانينا! لا توجد فجوات امتثال</h2>
                    <p>لقد اجتازت المنشأة كافة متطلبات الفحص الرقمي بنجاح.</p>
                    <button class="action-button" style="margin-top:20px" onclick="window.location.href='compliance-audit-pro.html'">
                        العودة لصفحة الفحص
                    </button>
                </div>
            `;
        }

        function renderError(msg) {
            document.getElementById('roadmapContainer').innerHTML = `
                <div class="empty-state">
                    <i class="bi bi-exclamation-triangle" style="color:var(--accent-red)"></i>
                    <h2>خطأ في التحميل</h2>
                    <p>${msg}</p>
                    <button class="action-button" style="margin-top:20px" onclick="location.reload()">
                        <i class="bi bi-arrow-clockwise"></i> إعادة المحاولة
                    </button>
                </div>
            `;
        }
    </script>

</body>

</html>
