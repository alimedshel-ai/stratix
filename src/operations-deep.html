<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <title>ستارتكس | التحليل الرقمي - العمليات</title>
    <link rel="stylesheet" href="/css/dept-pages.css">
    <script src="/js/context-manager.js?v=4"></script>
    <script src="/js/dept-page.js?v=4"></script>
</head>

<body>
    <div class="container">
        <h1>📊 التحليل الرقمي – العمليات</h1>
        <div class="sub">أدخل الأرقام والمؤشرات الرئيسية لقسم العمليات</div>
        <form id="deepForm">
            <div class="question"><label>كفاءة العمليات (%)</label><input type="number" name="process_efficiency"
                    placeholder="مثال: 85" required></div>
            <div class="question"><label>نسبة الهدر والعيوب (%)</label><input type="number" name="defect_rate"
                    placeholder="مثال: 2.5" step="0.1" required></div>
            <div class="question"><label>زمن الدورة التشغيلية (أيام)</label><input type="number" name="cycle_time"
                    placeholder="مثال: 5" required></div>
            <div class="question"><label>استغلال الموارد (%)</label><input type="number" name="resource_utilization"
                    placeholder="مثال: 78" required></div>
            <div class="question"><label>نسبة التسليم في الوقت المحدد (%)</label><input type="number"
                    name="on_time_delivery" placeholder="مثال: 92" required></div>
            <button type="submit">حفظ ومتابعة للتقييم الوصفي</button>
        </form>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const ok = await DeptPage.init('operations');
            if (!ok) return;
            let saved = await DeptPage.loadFromAPI('DEEP') || Context.getTemp('deep_results') || DeptPage.migrateFromLocalStorage('stratix_operations_deep_results');
            DeptPage.fillForm(saved);
            document.getElementById('deepForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const results = Object.fromEntries(new FormData(e.target));
                Context.setTemp('deep_results', results);
                const ok = await DeptPage.saveToAPI('DEEP', results);
                DeptPage.showMessage(ok ? 'تم حفظ التحليل الرقمي بنجاح' : 'تم حفظ التحليل محلياً', !ok);
                setTimeout(() => window.location.href = `/operations-audit.html?dept=operations`, 1500);
            });
        });
    </script>
</body>

</html>
