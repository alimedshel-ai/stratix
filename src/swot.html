<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحليل SWOT - ستارتكس</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/shared.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --stx-strength: #28a745;
            --stx-weakness: #dc3545;
            --stx-opportunity: #0d9488;
            --stx-threat: #f97316;
            --stx-bg: #0f172a;
            --stx-card: #1e293b;
            --stx-border: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: var(--stx-bg);
            color: #e2e8f0;
            font-family: 'Tajawal', sans-serif;
            margin: 0;
            padding: 0;
        }

        /* Modern Shell Layout */
        .stx-wrapper {
            display: flex;
            min-height: 100vh;
        }

        .stx-sidebar-container {
            width: 260px;
            flex-shrink: 0;
            background: #1a1d2e;
            border-left: 1px solid var(--stx-border);
            z-index: 1000;
        }

        .stx-main-content {
            flex-grow: 1;
            padding: 40px;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* SWOT Cards */
        .card-swot {
            background: var(--stx-card);
            border: 1px solid var(--stx-border);
            border-radius: 16px;
            margin-bottom: 24px;
            height: 100%;
            transition: transform 0.2s;
        }

        .card-swot:hover {
            transform: translateY(-5px);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .card-header-swot {
            padding: 16px 20px;
            font-weight: 800;
            border-bottom: 1px solid var(--stx-border);
            border-radius: 16px 16px 0 0;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .card-header-strength {
            color: var(--stx-strength);
            border-bottom: 3px solid var(--stx-strength);
        }

        .card-header-weakness {
            color: var(--stx-weakness);
            border-bottom: 3px solid var(--stx-weakness);
        }

        .card-header-opportunity {
            color: var(--stx-opportunity);
            border-bottom: 3px solid var(--stx-opportunity);
        }

        .card-header-threat {
            color: var(--stx-threat);
            border-bottom: 3px solid var(--stx-threat);
        }

        .suggestion-panel {
            background: rgba(15, 23, 42, 0.4);
            border: 1px dashed var(--stx-border);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            max-height: 150px;
            overflow-y: auto;
        }

        .suggestion-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 4px 10px;
            font-size: 0.8rem;
            color: #cbd5e1;
            cursor: pointer;
            margin: 3px;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .suggestion-btn:hover {
            border-color: #6366f1;
            background: rgba(99, 102, 241, 0.1);
        }

        .form-control {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--stx-border);
            color: white;
            border-radius: 12px;
            padding: 12px;
        }

        .form-control:focus {
            background: rgba(15, 23, 42, 0.8);
            border-color: #6366f1;
            color: white;
            box-shadow: none;
        }

        .btn-modern {
            padding: 10px 24px;
            border-radius: 10px;
            font-weight: 700;
        }

        .sync-badge {
            background: rgba(34, 197, 94, 0.1);
            color: #22c55e;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            border: 1px solid rgba(34, 197, 94, 0.2);
        }
    </style>
</head>

<body>
    <div class="stx-wrapper">
        <!-- Sidebar Container (Golden Thread v2 Compatibility) -->
        <aside class="stx-sidebar-container" id="sidebar"></aside>

        <main class="stx-main-content">
            <div class="mb-5 d-flex justify-content-between align-items-start">
                <div>
                    <div class="d-flex align-items-center gap-3 mb-2">
                        <h1 class="fw-900 m-0"><i class="bi bi-diagram-3-fill text-primary me-2"></i> تحليل SWOT</h1>
                        <span class="sync-badge"><i class="bi bi-cpu"></i> مزامنة ذكية نشطة</span>
                    </div>
                    <p class="text-muted fs-5" id="dept-header">جاري تحميل تحليل الإدارة وتنسيق البيانات...</p>
                </div>
                <div class="d-flex gap-2">
                    <button id="btnSync" class="btn btn-outline-success btn-modern">
                        <i class="bi bi-magic"></i> مزامنة تشخيص الإدارة
                    </button>
                    <button id="btnClear" class="btn btn-outline-danger btn-modern">
                        <i class="bi bi-trash3"></i> مسح الحقول
                    </button>
                </div>
            </div>

            <form id="swot-form">
                <div class="row g-4">
                    <!-- Strengths -->
                    <div class="col-lg-6">
                        <div class="card card-swot">
                            <div class="card-header-swot card-header-strength">
                                <i class="bi bi-shield-check"></i> نقاط القوة (Internal)
                            </div>
                            <div class="card-body">
                                <div class="suggestion-panel" id="strengths-options"></div>
                                <textarea id="strengths" class="form-control" rows="5"
                                    placeholder="قوة في المهارات، التقنية، أو العمليات..."></textarea>
                            </div>
                        </div>
                    </div>

                    <!-- Weaknesses -->
                    <div class="col-lg-6">
                        <div class="card card-swot">
                            <div class="card-header-swot card-header-weakness">
                                <i class="bi bi-bug"></i> نقاط الضعف (Internal)
                            </div>
                            <div class="card-body">
                                <div class="suggestion-panel" id="weaknesses-options"></div>
                                <textarea id="weaknesses" class="form-control" rows="5"
                                    placeholder="فجوات مهارية، بطء إجراءات، أو تحديات تقنية..."></textarea>
                            </div>
                        </div>
                    </div>

                    <!-- Opportunities -->
                    <div class="col-lg-6">
                        <div class="card card-swot">
                            <div class="card-header-swot card-header-opportunity">
                                <i class="bi bi-graph-up-arrow"></i> الفرص (External)
                            </div>
                            <div class="card-body">
                                <div class="suggestion-panel" id="opportunities-options"></div>
                                <textarea id="opportunities" class="form-control" rows="5"
                                    placeholder="فرص تطويرية، اتجاهات سوقية، أو مبادرات كبرى..."></textarea>
                            </div>
                        </div>
                    </div>

                    <!-- Threats -->
                    <div class="col-lg-6">
                        <div class="card card-swot">
                            <div class="card-header-swot card-header-threat">
                                <i class="bi bi-exclamation-triangle"></i> التهديدات (External)
                            </div>
                            <div class="card-body">
                                <div class="suggestion-panel" id="threats-options"></div>
                                <textarea id="threats" class="form-control" rows="5"
                                    placeholder="مخاطر سوقية، تغيرات قانونية، أو منافسة..."></textarea>
                            </div>
                        </div>
                    </div>
                </div>

                <div
                    class="action-bar d-flex justify-content-between p-4 bg-dark bg-opacity-25 rounded-4 mt-4 border border-white border-opacity-10">
                    <button type="button" onclick="history.back()"
                        class="btn btn-link text-muted text-decoration-none fw-800">
                        <i class="bi bi-arrow-right me-2"></i> العودة
                    </button>
                    <button type="submit" id="btnSave" class="btn btn-primary px-5 btn-modern">
                        حفظ ومتابعة لمصفوفة TOWS <i class="bi bi-arrow-left ms-2"></i>
                    </button>
                </div>
            </form>
        </main>
    </div>

    <!-- Scripts -->
    <script src="/js/api.js"></script>
    <script src="/js/utils.js"></script>
    <script src="/js/context-manager.js"></script>
    <script src="/js/steps-config.js"></script>
    <script src="/js/sidebar.js"></script>
    <script src="/js/dept-page.js"></script>
    <script src="/assets/js/hr-handlers.js"></script>
    <script src="/assets/js/finance-handlers.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        (async function () {
            // 🛡️ تهيئة الصفحة (تضمن تحميل المستخدم والقسم)
            const dept = await window.initDeptPage();
            if (!dept) return;

            const DEPT_AR = {
                hr: 'الموارد البشرية', finance: 'المالية', sales: 'المبيعات',
                marketing: 'التسويق', operations: 'العمليات', compliance: 'الامتثال',
                it: 'تقنية المعلومات', cs: 'خدمة العملاء', quality: 'الجودة',
                projects: 'المشاريع', support: 'الخدمات المساندة', governance: 'الحوكمة'
            };

            document.getElementById('dept-header').textContent = `إدارة ${DEPT_AR[dept.toLowerCase()] || dept.toUpperCase()} | تحليل نقاط القوة والضعف والفرص والتهديدات`;

            // تهيئة DeptPage (مهم جداً للحفظ)
            await DeptPage.init(dept);

            if (window.initSidebar) window.initSidebar();

            await loadPreviousData(dept);
            const data = await refreshSuggestions(dept);

            // سحب تلقائي إذا كانت الحقول فارغة
            const fields = ['strengths', 'weaknesses', 'opportunities', 'threats'];
            const allEmpty = fields.every(f => !document.getElementById(f).value.trim());
            if (allEmpty && (data.strengths.length || data.weaknesses.length)) {
                await smartSync(dept, true);
            }

            document.getElementById('btnSync').onclick = () => smartSync(dept);
            document.getElementById('btnClear').onclick = clearFields;

            // هندلة النموذج
            document.getElementById('swot-form').onsubmit = async (e) => {
                e.preventDefault();
                const btn = document.getElementById('btnSave');
                btn.disabled = true;
                btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> جاري الحفظ...';

                const payload = {
                    strengths: document.getElementById('strengths').value,
                    weaknesses: document.getElementById('weaknesses').value,
                    opportunities: document.getElementById('opportunities').value,
                    threats: document.getElementById('threats').value
                };

                const success = await DeptPage.saveToAPI('SWOT_' + dept.toUpperCase(), payload);
                if (success) {
                    if (window.Context && Context.markStepCompleted) await Context.markStepCompleted('swot');
                    DeptPage.showMessage('تم حفظ تحليل SWOT بنجاح');
                    setTimeout(() => {
                        window.location.href = `/tows.html?dept=${dept}`;
                    }, 1500);
                } else {
                    btn.disabled = false;
                    btn.innerHTML = 'حفظ ومتابعة لمصفوفة TOWS <i class="bi bi-arrow-left ms-2"></i>';
                }
            };
        })();

        async function fetchAllSourceData(dept) {
            let s = [], w = [], o = [], t = [];
            try {
                const user = await window.api.getCurrentUser();
                if (!user) return { strengths: [], weaknesses: [], opportunities: [], threats: [] };

                const entityId = user.activeEntityId || user.entityId;
                const dKey = dept.toLowerCase();
                const dKeyUpper = dept.toUpperCase();

                // المزامنة من مصادر متعددة (قاعدة البيانات + fallbacks)
                const [healthRes, deepRes, auditRes, pestelRes, deepStandardRes, healthStandardRes] = await Promise.all([
                    window.callApiWithTimeout(`/api/dept-health/${dept}`).catch(() => null),
                    window.callApiWithTimeout(`/api/dept-deep/${entityId}/${dKey}`).catch(() => null),
                    window.callApiWithTimeout(`/api/dept/analysis?dept=${dept}&type=AUDIT_${dKeyUpper}`).catch(() => null),
                    window.callApiWithTimeout(`/api/pestel/${dKeyUpper}`).catch(() => null),
                    window.callApiWithTimeout(`/api/dept/analysis?dept=${dept}&type=DEEP`).catch(() => null),
                    window.callApiWithTimeout(`/api/dept/analysis?dept=${dept}&type=HEALTH`).catch(() => null)
                ]);

                // 1. مخرجات الفحص الوصفي (Audit)
                if (auditRes?.data) {
                    const audit = auditRes.data;
                    Object.entries(audit).forEach(([qId, item]) => {
                        const val = parseInt(item.val);
                        if (val >= 2) w.push(`[مراجعة] ${item.label}`);
                        else if (val <= 1) s.push(`[مراجعة] ${item.label}`);
                    });
                }

                // 2. مخرجات التقييم الصحي (Health)
                const hData = healthStandardRes?.data || healthRes;
                if (hData) {
                    ['skills', 'processes', 'satisfaction', 'tech', 'leadership', 'culture', 'resources', 'productivity'].forEach(key => {
                        if (hData[key] && typeof hData[key] === 'string') {
                            const lines = hData[key].split('\n').filter(l => l.trim().length > 5);
                            lines.forEach(line => {
                                const clean = line.replace(/^[\s\-\*\d\.]+/g, '').trim();
                                const weaknessesKeywords = ['نقص', 'ضعف', 'حاجة', 'فجوة', 'تذمر', 'مشكلة', 'تحدي', 'تأخير', 'غياب', 'عدم', 'منخفض', 'متدني', 'سلبي', 'صعوبة', 'تعثر', 'خطر', 'قصور'];
                                if (weaknessesKeywords.some(k => clean.includes(k))) w.push(`[صحة] ${clean}`);
                                else s.push(`[صحة] ${clean}`);
                            });
                        }
                    });
                }

                // 3. مخرجات الفحص العميق (Deep)
                const deepData = deepStandardRes?.data || deepRes?.data;
                if (deepData) {
                    // هندلة ذكية للإدارات التخصصية
                    if (dKey === 'hr' && typeof extractHRInsights === 'function') {
                        const insights = extractHRInsights(deepData);
                        if (insights.strengths) s.push(...insights.strengths.map(txt => `[فحص] ${txt}`));
                        if (insights.weaknesses) w.push(...insights.weaknesses.map(txt => `[فحص] ${txt}`));
                    } else if (dKey === 'finance' && typeof extractFinanceInsights === 'function') {
                        const insights = extractFinanceInsights(deepData);
                        if (insights.strengths) s.push(...insights.strengths.map(txt => `[فحص] ${txt}`));
                        if (insights.weaknesses) w.push(...insights.weaknesses.map(txt => `[فحص] ${txt}`));
                    }

                    // هندلة عامة (Generic Format)
                    if (Array.isArray(deepData.challenges)) w.push(...deepData.challenges);
                    if (Array.isArray(deepData.goals)) o.push(...deepData.goals);
                    if (Array.isArray(deepData.extraStrengths)) s.push(...deepData.extraStrengths);
                    if (Array.isArray(deepData.extraWeaknesses)) w.push(...deepData.extraWeaknesses);
                }

                // 4. تحليل PESTEL
                if (pestelRes) {
                    Object.entries(pestelRes).forEach(([key, val]) => {
                        if (typeof val === 'string' && val.length > 5) {
                            if (val.includes('فرصة') || val.includes('نمو') || val.includes('توسع')) o.push(`[بستل] ${val}`);
                            else if (val.includes('خطر') || val.includes('منافسة') || val.includes('تراجع')) t.push(`[بستل] ${val}`);
                            else o.push(`[بستل] ${val}`); // افتراضي فرصة إذا لم يكن خطراً واضحاً
                        }
                    });
                }

                return {
                    strengths: [...new Set(s)],
                    weaknesses: [...new Set(w)],
                    opportunities: [...new Set(o)],
                    threats: [...new Set(t)]
                };
            } catch (err) {
                console.warn('⚠️ [SWOT Sync] Error fetching data:', err);
                return { strengths: [], weaknesses: [], opportunities: [], threats: [] };
            }
        }

        async function loadPreviousData(dept) {
            try {
                const data = await DeptPage.loadFromAPI('SWOT_' + dept.toUpperCase());
                if (data) {
                    document.getElementById('strengths').value = data.strengths || '';
                    document.getElementById('weaknesses').value = data.weaknesses || '';
                    document.getElementById('opportunities').value = data.opportunities || '';
                    document.getElementById('threats').value = data.threats || '';
                }
            } catch (e) { }
        }

        async function refreshSuggestions(dept) {
            const data = await fetchAllSourceData(dept);
            renderSuggestions('strengths', data.strengths);
            renderSuggestions('weaknesses', data.weaknesses);
            renderSuggestions('opportunities', data.opportunities);
            renderSuggestions('threats', data.threats);
            return data;
        }

        function renderSuggestions(id, items) {
            const container = document.getElementById(`${id}-options`);
            container.innerHTML = '';
            if (!items.length) {
                container.innerHTML = '<span class="text-muted small">لا توجد مخرجات تشخيصية حالياً...</span>';
                return;
            }
            items.forEach(txt => {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.className = 'suggestion-btn';
                btn.innerHTML = `<i class="bi bi-plus"></i> ${txt.slice(0, 45)}${txt.length > 45 ? '...' : ''}`;
                btn.onclick = () => {
                    const area = document.getElementById(id);
                    if (!area.value.includes(txt)) area.value = (area.value.trim() ? area.value + '\n' : '') + txt;
                };
                container.appendChild(btn);
            });
        }

        async function smartSync(dept, isAuto = false) {
            const data = await refreshSuggestions(dept);
            const mapping = { strengths: 'strengths', weaknesses: 'weaknesses', opportunities: 'opportunities', threats: 'threats' };
            Object.entries(mapping).forEach(([dataKey, fieldId]) => {
                const area = document.getElementById(fieldId);
                const newItems = data[dataKey].filter(i => !area.value.includes(i));
                if (newItems.length > 0) {
                    area.value = (area.value.trim() ? area.value + '\n' : '') + newItems.join('\n');
                }
            });
            if (!isAuto) DeptPage.showMessage('تمت المزامنة الذكية بنجاح');
        }

        function clearFields() {
            if (confirm('هل أنت متأكد من مسح جميع الحقول؟')) {
                ['strengths', 'weaknesses', 'opportunities', 'threats'].forEach(id => document.getElementById(id).value = '');
            }
        }
    </script>
</body>

</html>
