<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحليل SWOT</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/shared.css">
    <style>
        .toast-container {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1100;
        }

        .toast-success {
            background-color: #28a745;
            color: white;
        }

        .toast-error {
            background-color: #dc3545;
            color: white;
        }

        .btn-loading {
            opacity: 0.7;
            cursor: not-allowed;
            pointer-events: none;
        }

        .suggestion-chip {
            display: inline-block;
            background-color: #f0f0f0;
            border-radius: 20px;
            padding: 4px 12px;
            margin: 4px 6px 4px 0;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .suggestion-chip:hover {
            transform: scale(1.02);
            background-color: #e0e0e0;
        }

        .chip-selected {
            background-color: #d4edda;
        }

        .chip-strength {
            border-right: 3px solid #28a745;
        }

        .chip-weakness {
            border-right: 3px solid #dc3545;
        }

        .chip-opportunity {
            border-right: 3px solid #0d9488;
        }

        .chip-threat {
            border-right: 3px solid #f97316;
        }

        .card-swot {
            border: none;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            transition: all 0.2s;
        }

        .card-swot:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .card-header-swot {
            font-weight: 700;
            font-size: 1.2rem;
            border-bottom: 2px solid;
        }

        .card-header-strength {
            color: #28a745;
            border-bottom-color: #28a745;
        }

        .card-header-weakness {
            color: #dc3545;
            border-bottom-color: #dc3545;
        }

        .card-header-opportunity {
            color: #0d9488;
            border-bottom-color: #0d9488;
        }

        .card-header-threat {
            color: #f97316;
            border-bottom-color: #f97316;
        }
    </style>
    <style>
        /* ── تنسيقات Dark Mode للصفحة ── */
        body {
            background: #0f1117;
            color: #e2e8f0;
            font-family: 'Tajawal', sans-serif;
            margin: 0;
        }

        .page-wrapper {
            display: flex;
            min-height: 100vh;
        }

        .stx-sidebar-container {
            width: 240px;
            flex-shrink: 0;
        }

        .main-content {
            flex: 1;
            min-width: 0;
            padding: 28px 32px;
        }

        .swot-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 24px;
        }

        @media (max-width: 768px) {
            .swot-grid {
                grid-template-columns: 1fr;
            }

            .main-content {
                padding: 16px;
            }

            .stx-sidebar-container {
                display: none;
            }
        }

        .swot-card {
            background: #1a1d2e;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .swot-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .swot-card-header {
            padding: 16px 20px;
            font-size: 16px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 2px solid;
        }

        .swot-strengths .swot-card-header {
            color: #22c55e;
            border-color: #22c55e;
            background: rgba(34, 197, 94, 0.06);
        }

        .swot-weaknesses .swot-card-header {
            color: #ef4444;
            border-color: #ef4444;
            background: rgba(239, 68, 68, 0.06);
        }

        .swot-opportunities .swot-card-header {
            color: #0d9488;
            border-color: #0d9488;
            background: rgba(13, 148, 136, 0.06);
        }

        .swot-threats .swot-card-header {
            color: #f97316;
            border-color: #f97316;
            background: rgba(249, 115, 22, 0.06);
        }

        .swot-card-body {
            padding: 16px 20px;
        }

        .suggestion-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 12px;
        }

        .swot-textarea {
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            color: #e2e8f0;
            padding: 12px;
            font-family: 'Tajawal', sans-serif;
            font-size: 14px;
            resize: vertical;
            min-height: 110px;
            transition: border-color 0.2s;
        }

        .swot-textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.15);
        }

        .page-title {
            font-size: 24px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 6px;
        }

        .page-subtitle {
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 0;
        }

        .action-bar {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 28px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
        }

        .btn-save {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 12px 32px;
            border-radius: 12px;
            font-family: 'Tajawal', sans-serif;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-save:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .toast-msg {
            position: fixed;
            bottom: 24px;
            left: 24px;
            padding: 14px 22px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            color: white;
            z-index: 9999;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: slideUp 0.3s ease;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
        }

        .toast-msg.success {
            background: rgba(34, 197, 94, 0.95);
        }

        .toast-msg.error {
            background: rgba(239, 68, 68, 0.95);
        }

        @keyframes slideUp {
            from {
                transform: translateY(20px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
    </style>
</head>

<body>
    <div class="page-wrapper">
        <aside class="stx-sidebar-container"></aside>
        <main class="main-content">
            <div class="page-title">
                <i class="bi bi-grid-3x3" style="color:#667eea"></i>
                تحليل SWOT
            </div>
            <p class="page-subtitle">تحديد نقاط القوة والضعف الداخلية، والفرص والتهديدات الخارجية للإدارة.</p>

            <form id="swot-form">
                <div class="swot-grid">
                    <!-- Strengths -->
                    <div class="swot-card swot-strengths">
                        <div class="swot-card-header">
                            <i class="bi bi-star-fill"></i> نقاط القوة (Strengths)
                        </div>
                        <div class="swot-card-body">
                            <div id="strengths-suggestions" class="suggestion-chips"></div>
                            <textarea class="swot-textarea" id="strengths"
                                placeholder="مثال: خبرة فريق عالية، سمعة قوية في السوق..."></textarea>
                        </div>
                    </div>
                    <!-- Weaknesses -->
                    <div class="swot-card swot-weaknesses">
                        <div class="swot-card-header">
                            <i class="bi bi-exclamation-triangle-fill"></i> نقاط الضعف (Weaknesses)
                        </div>
                        <div class="swot-card-body">
                            <div id="weaknesses-suggestions" class="suggestion-chips"></div>
                            <textarea class="swot-textarea" id="weaknesses"
                                placeholder="مثال: نقص في المهارات الرقمية، بطء الإجراءات..."></textarea>
                        </div>
                    </div>
                    <!-- Opportunities -->
                    <div class="swot-card swot-opportunities">
                        <div class="swot-card-header">
                            <i class="bi bi-graph-up"></i> الفرص (Opportunities)
                        </div>
                        <div class="swot-card-body">
                            <div id="opportunities-suggestions" class="suggestion-chips"></div>
                            <textarea class="swot-textarea" id="opportunities"
                                placeholder="مثال: نمو السوق، الدعم الحكومي، تقنيات جديدة..."></textarea>
                        </div>
                    </div>
                    <!-- Threats -->
                    <div class="swot-card swot-threats">
                        <div class="swot-card-header">
                            <i class="bi bi-shield-exclamation"></i> التهديدات (Threats)
                        </div>
                        <div class="swot-card-body">
                            <div id="threats-suggestions" class="suggestion-chips"></div>
                            <textarea class="swot-textarea" id="threats"
                                placeholder="مثال: منافسة شديدة، تغيرات تشريعية..."></textarea>
                        </div>
                    </div>
                </div>

                <div class="action-bar">
                    <button type="submit" class="btn-save" id="btnSave">
                        <i class="bi bi-check-circle-fill"></i> حفظ ومتابعة
                    </button>
                </div>
            </form>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/utils.js"></script>
    <script src="/js/context-manager.js"></script>
    <script src="/js/steps-config.js"></script>
    <script src="/js/sidebar.js"></script>

    <script>
        // مقترحات ذكية لكل ربع
        const suggestions = {
            strengths: [
                'خبرة فريق عمل عالية',
                'سمعة قوية في السوق',
                'ولاء عملاء مرتفع',
                'بنية تحتية تقنية متطورة',
                'ميزانية تدريب كافية',
                'هيكل تنظيمي مرن',
                'قيادة ملهمة',
                'منتجات/خدمات متميزة'
            ],
            weaknesses: [
                'نقص في المهارات الرقمية',
                'إجراءات إدارية بطيئة',
                'ضعف التخطيط الاستراتيجي',
                'معدل دوران مرتفع للموظفين',
                'ميزانية محدودة',
                'غياب التوثيق الرسمي',
                'ضعف ثقافة الابتكار',
                'اعتماد مفرط على موردين محددين'
            ],
            opportunities: [
                'نمو السوق المستهدف',
                'دعم حكومي للتحول الرقمي',
                'اتجاهات جديدة في الصناعة',
                'شراكات استراتيجية محتملة',
                'توسع جغرافي',
                'تطورات تكنولوجية واعدة',
                'حوافز ضريبية جديدة',
                'زيادة الطلب على الخدمات المبتكرة'
            ],
            threats: [
                'منافسة شرسة',
                'تغيرات تشريعية غير مواتية',
                'تقلبات اقتصادية',
                'ارتفاع تكاليف المواد الخام',
                'هجمات إلكترونية',
                'نقص في الكوادر المؤهلة',
                'تغير سريع في تفضيلات العملاء',
                'عدم استقرار سياسي'
            ]
        };

        const CHIP_STYLES = {
            strengths: { bg: 'rgba(34,197,94,0.12)', border: 'rgba(34,197,94,0.35)', color: '#4ade80' },
            weaknesses: { bg: 'rgba(239,68,68,0.12)', border: 'rgba(239,68,68,0.35)', color: '#f87171' },
            opportunities: { bg: 'rgba(13,148,136,0.12)', border: 'rgba(13,148,136,0.35)', color: '#2dd4bf' },
            threats: { bg: 'rgba(249,115,22,0.12)', border: 'rgba(249,115,22,0.35)', color: '#fb923c' },
        };

        function addChip(containerId, text, category) {
            const container = document.getElementById(containerId);
            if (!container) return;
            const s = CHIP_STYLES[category] || { bg: 'rgba(102,126,234,0.12)', border: 'rgba(102,126,234,0.35)', color: '#818cf8' };
            const chip = document.createElement('span');
            chip.textContent = text;
            chip.style.cssText = `
                display:inline-block;
                background:${s.bg};
                border:1px solid ${s.border};
                color:${s.color};
                padding:4px 12px;
                border-radius:20px;
                font-size:12px;
                font-weight:600;
                cursor:pointer;
                transition:all 0.2s;
                font-family:'Tajawal',sans-serif;
                user-select:none;
            `;
            chip.addEventListener('mouseenter', () => {
                chip.style.background = s.border;
                chip.style.color = '#fff';
            });
            chip.addEventListener('mouseleave', () => {
                chip.style.background = s.bg;
                chip.style.color = s.color;
            });
            chip.addEventListener('click', () => {
                const textarea = document.getElementById(category);
                const current = textarea.value.trim();
                textarea.value = current ? current + '، ' + text : text;
                chip.style.background = s.border;
                chip.style.opacity = '0.6';
                setTimeout(() => { chip.style.background = s.bg; chip.style.opacity = '1'; }, 400);
            });
            container.appendChild(chip);
        }


        // callApiWithTimeout متوفرة عبر /js/utils.js (window.callApiWithTimeout)

        function showToast(msg, type = 'success') {
            const old = document.querySelector('.swot-toast-msg');
            if (old) old.remove();
            const el = document.createElement('div');
            el.className = `toast-msg ${type}`;
            const icons = { success: 'check-circle-fill', error: 'x-circle-fill', warn: 'exclamation-triangle-fill' };
            el.innerHTML = `<i class="bi bi-${icons[type] || icons.success}"></i> ${msg}`;
            el.classList.add('swot-toast-msg');
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 3500);
        }

        (async function () {
            const params = new URLSearchParams(window.location.search);
            let dept = params.get('dept');
            if (!dept && typeof Context !== 'undefined') dept = Context.getDept();
            if (!dept) {
                window.location.href = '/dept-dashboard.html';
                return;
            }

            // إنشاء الكبسولات لكل ربع
            for (const [category, items] of Object.entries(suggestions)) {
                const containerId = `${category}-suggestions`;
                items.forEach(item => addChip(containerId, item, category));
            }

            // تحميل البيانات المحفوظة
            try {
                const data = await window.callApiWithTimeout(`/api/swot/${dept}`, { method: 'GET' });
                if (data) {
                    document.getElementById('strengths').value = data.strengths || '';
                    document.getElementById('weaknesses').value = data.weaknesses || '';
                    document.getElementById('opportunities').value = data.opportunities || '';
                    document.getElementById('threats').value = data.threats || '';
                }
            } catch (e) {
                if (e.status !== 404) {
                    console.error('خطأ في تحميل البيانات:', e);
                    showToast('حدث خطأ في تحميل البيانات السابقة.', 'error');
                }
            }

            const form = document.getElementById('swot-form');
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                const btn = document.getElementById('btnSave');
                const originalHtml = btn.innerHTML;
                btn.disabled = true;
                btn.innerHTML = '<span class="shared-spinner"></span> جاري الحفظ...';

                const payload = {
                    strengths: document.getElementById('strengths').value,
                    weaknesses: document.getElementById('weaknesses').value,
                    opportunities: document.getElementById('opportunities').value,
                    threats: document.getElementById('threats').value
                };

                const hasContent = Object.values(payload).some(v => v && v.trim());
                if (!hasContent) {
                    showToast('يرجى ملء حقل واحد على الأقل قبل الحفظ.', 'error');
                    btn.disabled = false;
                    btn.innerHTML = originalHtml;
                    return;
                }

                try {
                    await window.callApiWithTimeout(`/api/swot/${dept}`, { method: 'POST', body: payload });
                    const completed = typeof Context !== 'undefined' ? await Context.markStepCompleted('swot') : true;
                    showToast(completed ? '✅ تم حفظ تحليل SWOT بنجاح!' : '⚠️ تم الحفظ ولكن فشل تحديث التقدم.', completed ? 'success' : 'warn');
                    setTimeout(() => {
                        window.location.href = `/dept-dashboard.html?dept=${dept}`;
                    }, 2000);
                } catch (err) {
                    console.error('خطأ في الحفظ:', err);
                    showToast('حدث خطأ أثناء الحفظ، حاول مرة أخرى', 'error');
                } finally {
                    btn.disabled = false;
                    btn.innerHTML = originalHtml;
                }
            });
        })();
    </script>

</body>

</html>
