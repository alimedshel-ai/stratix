<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <title>ستارتكس | التحليل الرقمي - الحوكمة</title>
    <link rel="stylesheet" href="/css/dept-pages.css">
    <script src="/js/context-manager.js?v=4"></script>
    <script src="/js/dept-page.js?v=4"></script>
</head>

<body>
    <div class="container">
        <h1>📊 التحليل الرقمي – الحوكمة</h1>
        <div class="sub">أدخل الأرقام والمؤشرات الرئيسية لقسم الحوكمة</div>
        <form id="deepForm">
            <div class="question"><label>عدد اجتماعات مجلس الإدارة سنوياً</label><input type="number"
                    name="board_meetings" placeholder="مثال: 4" required></div>
            <div class="question"><label>عدد السياسات المراجعة والمحدثة</label><input type="number"
                    name="policy_updates" placeholder="مثال: 5" required></div>
            <div class="question"><label>عدد تقييمات المخاطر المؤسسية المنفذة</label><input type="number"
                    name="risk_assessments" placeholder="مثال: 2" required></div>
            <div class="question"><label>عدد ملاحظات التدقيق المعلقة</label><input type="number" name="audit_findings"
                    placeholder="مثال: 8" required></div>
            <div class="question"><label>ساعات التدريب على الحوكمة للفريق</label><input type="number"
                    name="training_hours" placeholder="مثال: 40" required></div>
            <button type="submit">حفظ ومتابعة للتقييم الوصفي</button>
        </form>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const ok = await DeptPage.init('governance');
            if (!ok) return;
            let saved = await DeptPage.loadFromAPI('DEEP') || Context.getTemp('deep_results') || DeptPage.migrateFromLocalStorage('stratix_governance_deep_results');
            DeptPage.fillForm(saved);
            document.getElementById('deepForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const results = Object.fromEntries(new FormData(e.target));
                Context.setTemp('deep_results', results);
                const ok = await DeptPage.saveToAPI('DEEP', results);
                DeptPage.showMessage(ok ? 'تم حفظ التحليل الرقمي بنجاح' : 'تم حفظ التحليل محلياً', !ok);
                setTimeout(() => window.location.href = `/governance-audit.html?dept=governance`, 1500);
            });
        });
    </script>
</body>

</html>
