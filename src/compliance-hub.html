<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ستارتكس | مسار الامتثال</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/css/dept-pages.css">

    <style>
        :root {
            --hub-primary: #ef4444;
            --hub-primary-soft: rgba(239, 68, 68, 0.12);
            --hub-bg: #0b0d12;
            --hub-card: rgba(22, 27, 34, 0.7);
            --hub-border: rgba(255, 255, 255, 0.08);
            --hub-sidebar-width: 260px;
        }

        body {
            background: var(--hub-bg);
            color: #f8fafc;
            font-family: 'Tajawal', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        /* ── Sidebar Auto-hide ── */
        .stx-sidebar-container {
            width: var(--hub-sidebar-width);
            flex-shrink: 0;
            border-left: 1px solid var(--hub-border);
            background: rgba(11, 13, 18, 0.97);
            overflow: hidden;
            height: 100vh;
            position: fixed;
            right: 0;
            top: 0;
            z-index: 1200;
            transform: translateX(100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.3s ease;
            backdrop-filter: blur(16px);
        }

        .stx-sidebar-container.sidebar-visible {
            transform: translateX(0);
            box-shadow: -8px 0 30px rgba(0, 0, 0, 0.5);
        }

        .sidebar-trigger {
            position: fixed;
            right: 0;
            top: 0;
            width: 18px;
            height: 100vh;
            z-index: 1190;
        }

        .sidebar-trigger::after {
            content: '';
            position: absolute;
            right: 4px;
            top: 50%;
            transform: translateY(-50%);
            width: 4px;
            height: 48px;
            border-radius: 4px;
            background: rgba(239, 68, 68, 0.25);
            transition: background 0.3s, height 0.3s;
        }

        .sidebar-trigger:hover::after {
            background: rgba(239, 68, 68, 0.6);
            height: 64px;
        }

        /* ── Hero Header ── */
        .hub-hero {
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.08) 0%, rgba(11, 13, 18, 0) 60%);
            border-bottom: 1px solid var(--hub-border);
            padding: 40px 48px 32px;
        }

        .hub-hero-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .hub-icon {
            width: 56px;
            height: 56px;
            border-radius: 18px;
            background: var(--hub-primary-soft);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            color: var(--hub-primary);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .hub-title {
            font-size: 1.8rem;
            font-weight: 900;
            margin: 0;
        }

        .hub-subtitle {
            color: #94a3b8;
            font-size: 0.95rem;
            margin-top: 4px;
        }

        .hub-back {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #94a3b8;
            text-decoration: none;
            font-size: 13px;
            font-weight: 700;
            padding: 6px 14px;
            border-radius: 10px;
            border: 1px solid var(--hub-border);
            transition: all 0.2s;
        }

        .hub-back:hover {
            border-color: var(--hub-primary);
            color: #fff;
        }

        /* ── Stats ── */
        .hub-stats {
            display: flex;
            gap: 32px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .hub-stat {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .hub-stat-value {
            font-size: 1.4rem;
            font-weight: 800;
        }

        .hub-stat-label {
            font-size: 0.75rem;
            color: #64748b;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* ── Phase Sections ── */
        .hub-content {
            padding: 32px 48px 80px;
        }

        .phase-section {
            margin-bottom: 40px;
        }

        .phase-label {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1rem;
            font-weight: 800;
            margin-bottom: 16px;
            color: #e2e8f0;
        }

        .phase-badge {
            font-size: 0.7rem;
            padding: 3px 10px;
            border-radius: 20px;
            font-weight: 700;
            color: #fff;
        }

        /* ── Step Cards ── */
        .steps-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }

        .step-card {
            background: var(--hub-card);
            border: 1px solid var(--hub-border);
            border-radius: 20px;
            padding: 22px;
            text-decoration: none;
            color: inherit;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            gap: 12px;
            position: relative;
            overflow: hidden;
        }

        .step-card:hover {
            border-color: var(--hub-primary);
            transform: translateY(-4px);
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.3);
            color: inherit;
        }

        .step-card.locked {
            opacity: 0.4;
            pointer-events: none;
        }

        .step-card.done {
            border-color: #10b981;
        }

        .step-card.done::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            left: 0;
            height: 3px;
            background: linear-gradient(90deg, #10b981, #34d399);
        }

        .step-top {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .step-icon {
            width: 42px;
            height: 42px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.15rem;
            flex-shrink: 0;
        }

        .step-name {
            font-size: 0.95rem;
            font-weight: 700;
        }

        .step-desc {
            font-size: 0.8rem;
            color: #64748b;
            line-height: 1.5;
        }

        .step-status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.75rem;
            font-weight: 700;
            margin-top: auto;
        }

        .step-status.done {
            color: #10b981;
        }

        .step-status.pending {
            color: #64748b;
        }

        .step-status.active {
            color: var(--hub-primary);
        }

        /* ── Progress Ring ── */
        .hub-progress {
            position: relative;
            width: 64px;
            height: 64px;
        }

        .hub-progress svg {
            transform: rotate(-90deg);
        }

        .hub-progress-text {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            font-weight: 800;
        }

        @media (max-width: 768px) {
            .hub-hero {
                padding: 24px 20px;
            }

            .hub-content {
                padding: 20px 20px 80px;
            }

            .sidebar-trigger,
            .stx-sidebar-container {
                display: none;
            }

            .steps-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="sidebar-trigger" id="sidebarTrigger"></div>
    <div class="stx-wrapper">
        <aside class="stx-sidebar-container" id="sidebarContainer"></aside>

        <main class="stx-main-content" style="flex:1;overflow-y:auto;min-height:100vh">

            <!-- HERO -->
            <div class="hub-hero">
                <div class="hub-hero-top">
                    <div style="display:flex;align-items:center;gap:16px">
                        <div class="hub-icon"><i class="bi bi-shield-check"></i></div>
                        <div>
                            <h1 class="hub-title">مسار الامتثال</h1>
                            <p class="hub-subtitle">فحص شامل للامتثال التنظيمي — مستقل عن الحوكمة</p>
                        </div>
                    </div>
                    <div style="display:flex;align-items:center;gap:12px">
                        <div class="hub-progress" id="hubProgress">
                            <svg width="64" height="64" viewBox="0 0 64 64">
                                <circle cx="32" cy="32" r="28" fill="none" stroke="rgba(255,255,255,0.06)"
                                    stroke-width="4" />
                                <circle cx="32" cy="32" r="28" fill="none" stroke="#ef4444" stroke-width="4"
                                    stroke-dasharray="175.93" stroke-dashoffset="175.93" stroke-linecap="round"
                                    id="progressRing" />
                            </svg>
                            <div class="hub-progress-text" id="progressText">0%</div>
                        </div>
                        <a href="#" class="hub-back" id="backBtn" onclick="goSmartHome(); return false;">
                            <i class="bi bi-arrow-right"></i>
                            <span id="backLabel">الرئيسية</span>
                        </a>
                    </div>
                </div>
                <div class="hub-stats" id="hubStats">
                    <div class="hub-stat">
                        <span class="hub-stat-value" id="statCompleted" style="color:#10b981">0</span>
                        <span class="hub-stat-label">مكتملة</span>
                    </div>
                    <div class="hub-stat">
                        <span class="hub-stat-value" id="statRemaining" style="color:#f59e0b">0</span>
                        <span class="hub-stat-label">متبقية</span>
                    </div>
                    <div class="hub-stat">
                        <span class="hub-stat-value" id="statTotal" style="color:#94a3b8">0</span>
                        <span class="hub-stat-label">إجمالي الخطوات</span>
                    </div>
                </div>
            </div>

            <!-- CONTENT -->
            <div class="hub-content" id="hubContent">
                <!-- يُبنى بالجافاسكربت -->
            </div>

        </main>
    </div>

    <!-- Scripts -->
    <script src="/js/api.js?v=4"></script>
    <script src="/js/context-manager.js?v=4"></script>
    <script src="/js/page-guard.js?v=5"></script>
    <script src="/js/smart-nav.js?v=4"></script>
    <script src="/js/steps-config.js?v=4"></script>
    <script src="/js/sidebar.js?v=4"></script>

    <script>
        const DEPT = 'compliance';
        const HUB_COLOR = '#ef4444';

        // ── خطوات مسار الامتثال ──
        const COMPLIANCE_STEPS = [
            {
                phase: 'diagnostic', phaseLabel: '🔍 التشخيص والتقييم', phaseColor: '#8b5cf6',
                steps: [
                    { id: 'compliance-audit-pro', name: 'فحص الامتثال الاحترافي', desc: '8 محاور أساسية + محاور سياقية حسب نوع النشاط والقطاع', icon: 'bi-shield-lock-fill', color: '#ef4444', href: '/compliance-audit-pro.html' },
                    { id: 'compliance-deep', name: 'التحليل العميق', desc: '32 سؤال + مؤشرات رقمية لقياس مستوى الامتثال', icon: 'bi-search-heart', color: '#8b5cf6', href: '/compliance-deep.html?dept=compliance' },
                    { id: 'compliance-analyzer', name: 'محلل فجوة الامتثال', desc: '38 جهة رقابية سعودية — الغرامات والمخاطر حسب نشاطك', icon: 'bi-binoculars-fill', color: '#f59e0b', href: '/compliance-analyzer.html' },
                    { id: 'pestel', name: 'تحليل PESTEL', desc: 'تحليل البيئة الخارجية: سياسي واقتصادي واجتماعي وتقني', icon: 'bi-globe2', color: '#06b6d4', href: '/pestel.html?dept=compliance' },
                    { id: 'swot', name: 'تحليل SWOT', desc: 'نقاط القوة والضعف والفرص والتهديدات في الامتثال', icon: 'bi-grid-3x3-gap-fill', color: '#10b981', href: '/swot.html?dept=compliance' },
                    { id: 'tows', name: 'مصفوفة TOWS', desc: 'استراتيجيات مبنية على تقاطع SWOT', icon: 'bi-grid-1x2-fill', color: '#0ea5e9', href: '/tows.html?dept=compliance' }
                ]
            },
            {
                phase: 'planning', phaseLabel: '🧭 التخطيط الاستراتيجي', phaseColor: '#06b6d4',
                steps: [
                    { id: 'scenarios', name: 'السيناريوهات', desc: 'سيناريوهات متفائلة وواقعية ومتشائمة للامتثال', icon: 'bi-layers', color: '#8b5cf6', href: '/scenarios.html?dept=compliance' },
                    { id: 'directions', name: 'التوجهات الاستراتيجية', desc: 'تحديد الاتجاه الاستراتيجي لمنظومة الامتثال', icon: 'bi-compass-fill', color: '#06b6d4', href: '/directions.html?dept=compliance' },
                    { id: 'strategic-objectives', name: 'الأهداف الاستراتيجية', desc: 'أهداف BSC مرتبطة بمحاور الامتثال', icon: 'bi-bullseye', color: '#ef4444', href: '/objectives.html?dept=compliance' }
                ]
            },
            {
                phase: 'execution', phaseLabel: '🚀 التنفيذ والمتابعة', phaseColor: '#10b981',
                steps: [
                    { id: 'okrs', name: 'نظام OKRs', desc: 'أهداف ونتائج رئيسية لتحسين الامتثال', icon: 'bi-award', color: '#f59e0b', href: '/okrs.html?dept=compliance' },
                    { id: 'compliance-kpis', name: 'مؤشرات الامتثال', desc: '6 مؤشرات حية: مخالفات، تدريب، سياسات، تكلفة', icon: 'bi-speedometer2', color: '#10b981', href: '/compliance-kpis.html' },
                    { id: 'initiatives', name: 'المبادرات', desc: 'مبادرات تحسين الامتثال والحد من المخالفات', icon: 'bi-rocket-takeoff', color: '#ec4899', href: '/initiatives.html?dept=compliance' }
                ]
            },
            {
                phase: 'monitoring', phaseLabel: '📊 التقارير والمراجعة', phaseColor: '#f59e0b',
                steps: [
                    { id: 'reviews', name: 'مراجعات الأداء', desc: 'مراجعة دورية لمستوى الامتثال', icon: 'bi-card-checklist', color: '#8b5cf6', href: '/reviews.html?dept=compliance' },
                    { id: 'risk-map', name: 'خريطة المخاطر', desc: 'تصنيف المخاطر التنظيمية حسب الاحتمالية والأثر', icon: 'bi-exclamation-triangle', color: '#ef4444', href: '/risk-map.html?dept=compliance' },
                    { id: 'reports', name: 'التقرير النهائي', desc: 'ملخص شامل + توصيات + خطة عمل', icon: 'bi-file-earmark-bar-graph', color: '#06b6d4', href: '/reports.html?dept=compliance' }
                ]
            }
        ];

        // ── كشف إتمام الخطوات من localStorage ──
        function isStepDone(stepId) {
            const key = 'stratix_step_done_compliance_' + stepId;
            if (localStorage.getItem(key)) return true;
            // fallback: check common patterns
            const upper = DEPT.toUpperCase();
            const checks = [
                `AUDIT_${upper}`, `DEEP_${upper}`, `SWOT_${upper}`, `TOWS_${upper}`,
                `OKRS_${upper}`, `REPORTS_${upper}`, 'startix_compliance_audit_pro',
                `stratix_${DEPT}_deep_results`
            ];
            const idMap = {
                'compliance-audit-pro': 'startix_compliance_audit_pro',
                'compliance-deep': `DEEP_${upper}`,
                'swot': `SWOT_${upper}`,
                'tows': `TOWS_${upper}`,
                'okrs': `OKRS_${upper}`,
                'reports': `REPORTS_${upper}`
            };
            const lsKey = idMap[stepId];
            if (lsKey && localStorage.getItem(lsKey)) return true;
            return false;
        }

        // ── بناء الخطوات ──
        function renderHub() {
            const container = document.getElementById('hubContent');
            let totalSteps = 0, doneSteps = 0;
            let html = '';

            COMPLIANCE_STEPS.forEach(phase => {
                html += `<div class="phase-section">
                    <div class="phase-label">
                        <span>${phase.phaseLabel}</span>
                        <span class="phase-badge" style="background:${phase.phaseColor}">${phase.steps.length} خطوات</span>
                    </div>
                    <div class="steps-grid">`;

                phase.steps.forEach(step => {
                    totalSteps++;
                    const done = isStepDone(step.id);
                    if (done) doneSteps++;
                    const statusClass = done ? 'done' : '';
                    const statusHtml = done
                        ? '<div class="step-status done"><i class="bi bi-check-circle-fill"></i> مكتمل</div>'
                        : '<div class="step-status pending"><i class="bi bi-circle"></i> لم يبدأ</div>';

                    html += `
                        <a href="${step.href}" class="step-card ${statusClass}">
                            <div class="step-top">
                                <div class="step-icon" style="background:${step.color}15;color:${step.color}">
                                    <i class="bi ${done ? 'bi-check-circle-fill' : step.icon}"></i>
                                </div>
                                <div class="step-name">${step.name}</div>
                            </div>
                            <div class="step-desc">${step.desc}</div>
                            ${statusHtml}
                        </a>`;
                });

                html += '</div></div>';
            });

            container.innerHTML = html;

            // Update stats
            const pct = totalSteps > 0 ? Math.round((doneSteps / totalSteps) * 100) : 0;
            document.getElementById('statCompleted').textContent = doneSteps;
            document.getElementById('statRemaining').textContent = totalSteps - doneSteps;
            document.getElementById('statTotal').textContent = totalSteps;
            document.getElementById('progressText').textContent = pct + '%';

            // Animate ring
            const ring = document.getElementById('progressRing');
            const circumference = 2 * Math.PI * 28;
            ring.style.strokeDashoffset = circumference - (circumference * pct / 100);
        }

        // ── Smart Home Navigation ──
        async function goSmartHome() {
            let homeUrl = '/pro-dashboard.html';
            try {
                let user = null;
                if (window.api && window.api.getCurrentUser) user = await window.api.getCurrentUser();
                if (!user) user = JSON.parse(localStorage.getItem('user') || '{}');
                const uType = user.userType || '';
                const role = user.role || '';
                if (['OWNER', 'ADMIN'].includes(role) && uType !== 'DEPT_MANAGER') homeUrl = '/ceo-dashboard.html';
                else if (uType === 'DEPT_MANAGER' && !['OWNER', 'ADMIN'].includes(role)) {
                    const dept = user.department?.key || localStorage.getItem('stratix_v10_dept') || '';
                    homeUrl = `/dept-dashboard.html${dept ? '?dept=' + dept : ''}`;
                }
            } catch (e) { }
            window.location.href = homeUrl;
        }

        // ── Auto-hide Sidebar ──
        (function () {
            const trigger = document.getElementById('sidebarTrigger');
            const sidebar = document.getElementById('sidebarContainer');
            if (!trigger || !sidebar) return;
            let closeTimer = null;
            function openSidebar() { clearTimeout(closeTimer); sidebar.classList.add('sidebar-visible'); }
            function schedulClose() { clearTimeout(closeTimer); closeTimer = setTimeout(() => sidebar.classList.remove('sidebar-visible'), 350); }
            trigger.addEventListener('mouseenter', openSidebar);
            sidebar.addEventListener('mouseenter', openSidebar);
            trigger.addEventListener('mouseleave', schedulClose);
            sidebar.addEventListener('mouseleave', schedulClose);
        })();

        document.addEventListener('DOMContentLoaded', renderHub);
    </script>
</body>

</html>
