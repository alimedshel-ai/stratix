<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <title>ستارتكس | مؤشرات الأداء المالية (KPIs)</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="/js/utils.js"></script>
    <script src="/js/context-manager.js"></script>
    <script src="/js/page-guard.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/steps-config.js"></script>
    <script src="/js/dept-page.js"></script>
    <script src="/js/sidebar.js"></script>

    <link rel="stylesheet" href="/css/shared.css">
    <link rel="stylesheet" href="/css/dept-pages.css">
    <style>
        :root {
            --stx-bg: #0b0d12;
            --stx-card: rgba(22, 27, 34, 0.7);
            --stx-border: rgba(255, 255, 255, 0.08);
            --stx-primary: #6366f1;
            --stx-success: #10b981;
            --stx-warn: #f59e0b;
            --stx-danger: #ef4444;
            --stx-sidebar-top: 0px;
                    --bs-body-color: #e2e8f0;
            --bs-body-color-rgb: 226, 232, 240;
            --bs-card-color: #e2e8f0;
}

        body {
            background: var(--stx-bg);
            color: #eef2ff;
        }

        .kpi-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 24px;
            transition: all 0.2s;
        }

        .kpi-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .kpi-value {
            font-size: 2rem;
            font-weight: 800;
        }

        .progress-target {
            height: 6px;
            background: #2d2f36;
            border-radius: 10px;
            margin-top: 12px;
        }

        .progress-target-fill {
            height: 100%;
            background: linear-gradient(90deg, #10b981, #34d399);
            border-radius: 10px;
            width: 0%;
        }

        .btn-stx {
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 600;
            color: white;
        }

        .btn-stx:hover {
            transform: translateY(-2px);
            color: white;
        }

        .btn-outline {
            border: 1px solid #6366f1;
            background: transparent;
            color: #6366f1;
            border-radius: 40px;
            padding: 8px 20px;
            text-decoration: none;
            display: inline-block;
        }

        .btn-outline:hover {
            background: #6366f1;
            color: white;
        }

        .historical-table {
            font-size: 0.85rem;
        }

        .historical-table th,
        .historical-table td {
            padding: 6px 8px;
        }

        .add-month-btn {
            background: #1f2937;
            border: none;
            color: #eef2ff;
            border-radius: 40px;
            padding: 4px 12px;
            font-size: 0.8rem;
        }

        .add-month-btn:hover {
            background: #374151;
        }

        .modal-content {
            background: #111827;
            color: #eef2ff;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
        }

        .modal-header {
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .modal-footer {
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        @media print {
            .no-print {
                display: none;
            }
        }
    </style>
</head>

<body class="bg-stx">
    <div class="stx-wrapper" style="display: flex; height: 100vh; overflow: hidden;">
        <aside class="stx-sidebar-container" id="stx-sidebar"
            style="width: 260px; flex-shrink: 0; border-left: 1px solid rgba(255,255,255,0.08);"></aside>

        <main class="stx-main-content" style="flex: 1; overflow-y: auto; background: var(--stx-bg); min-width: 0;">
            <div class="container py-4">
                <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap">
                    <div>
                        <h1 class="display-6 fw-bold"><i class="bi bi-speedometer2 text-primary"></i> مؤشرات الأداء
                            المالية
                            (KPIs)</h1>
                        <p class="text-muted">تابع المؤشرات الرئيسية شهرياً واعرف مدى تقدمك نحو الأهداف</p>
                    </div>
                    <div class="no-print">
                        <a href="/finance-audit.html?dept=finance" class="btn btn-outline me-2"><i
                                class="bi bi-arrow-right"></i> العودة للتقرير</a>
                        <button class="btn btn-stx" id="saveKpisBtn"><i class="bi bi-save"></i> حفظ التحديثات</button>
                    </div>
                </div>

                <div id="kpisContainer"></div>

                <!-- قسم البيانات التاريخية -->
                <div class="kpi-card mt-4 no-print">
                    <div class="d-flex justify-content-between align-items-center flex-wrap mb-3">
                        <h5 class="mb-0"><i class="bi bi-calendar3"></i> البيانات التاريخية</h5>
                        <button class="add-month-btn" id="addMonthBtn"><i class="bi bi-plus-lg"></i> إضافة شهر
                            جديد</button>
                    </div>
                    <div id="historicalContainer">
                        <p class="text-muted text-center py-3">لا توجد بيانات تاريخية بعد. أضف شهراً جديداً لبدء التتبع.
                        </p>
                    </div>
                    <div class="mt-3">
                        <canvas id="trendChart" height="150"></canvas>
                    </div>
                </div>
            </div>

            <!-- Modal إضافة شهر جديد -->
            <div class="modal fade" id="addMonthModal" tabindex="-1">
                <div class="modal-dialog modal-dialog-centered">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h5 class="modal-title">إضافة بيانات شهر جديد</h5>
                            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                        </div>
                        <div class="modal-body">
                            <form id="addMonthForm">
                                <div class="mb-3">
                                    <label class="form-label small">الشهر</label>
                                    <input type="month" name="month_date" id="modal_date"
                                        class="form-control bg-dark text-white border-secondary" required>
                                </div>
                                <div class="row g-3" id="modalInputsContainer">
                                    <!-- الحقول سيتم حقنها برمجياً -->
                                </div>
                            </form>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary rounded-pill"
                                data-bs-dismiss="modal">إلغاء</button>
                            <button type="button" class="btn btn-stx" id="confirmAddBtn">تأكيد الإضافة</button>
                        </div>
                    </div>
                </div>
            </div>

            <script>
                // تعريف المؤشرات
                const kpis = [
                    { id: "profit_margin", name: "هامش الربح", unit: "%", target: 20, default: 0, isPercentage: true, lowerIsBetter: false },
                    { id: "current_ratio", name: "نسبة السيولة", unit: "", target: 1.5, default: 0, isPercentage: false, lowerIsBetter: false },
                    { id: "debt_to_equity", name: "الدين / حقوق الملكية", unit: "", target: 1.0, default: 0, isPercentage: false, lowerIsBetter: true },
                    { id: "dso", name: "أيام تحصيل المبيعات (DSO)", unit: "يوم", target: 45, default: 60, isPercentage: false, lowerIsBetter: true },
                    { id: "inventory_turnover", name: "معدل دوران المخزون", unit: "مرة/سنة", target: 6, default: 3, isPercentage: false, lowerIsBetter: false },
                    { id: "burn_rate", name: "معدل الحرق النقدي", unit: "ريال/شهر", target: 0, default: 0, isPercentage: false, lowerIsBetter: true }
                ];

                let currentKpisValues = {};  // تخزين القيم الحالية
                let historicalData = [];      // [{ date, profit_margin, current_ratio, debt_to_equity, dso, inventory_turnover, burn_rate }]
                let chartInstance = null;
                let addMonthModal = null;

                // دالة لجلب البيانات المحفوظة من التشخيص (للقيم الابتدائية)
                async function loadDiagnosticData() {
                    let saved = null;
                    if (typeof DeptPage !== 'undefined' && DeptPage.loadFromAPI) {
                        saved = await DeptPage.loadFromAPI('DEEP');
                    }
                    if (!saved && typeof Context !== 'undefined') {
                        saved = Context.getTemp('deep_results');
                    }
                    if (!saved) {
                        const local = localStorage.getItem('stratix_finance_deep_results');
                        if (local) saved = JSON.parse(local);
                    }
                    return saved;
                }

                // تحميل بيانات KPIs المحفوظة
                function loadKpisData() {
                    const stored = localStorage.getItem('stratix_finance_kpis_values');
                    if (stored) {
                        try {
                            return JSON.parse(stored);
                        } catch (e) { }
                    }
                    return {};
                }

                // حفظ بيانات KPIS (القيم الحالية فقط)
                async function saveKpisValues() {
                    localStorage.setItem('stratix_finance_kpis_values', JSON.stringify(currentKpisValues));
                    if (typeof DeptPage !== 'undefined' && DeptPage.saveToAPI) {
                        await DeptPage.saveToAPI('KPIS_VALUES', currentKpisValues).catch(console.warn);
                    }
                }

                // تحميل البيانات التاريخية
                function loadHistoricalData() {
                    const stored = localStorage.getItem('stratix_finance_kpis_history');
                    if (stored) {
                        try {
                            historicalData = JSON.parse(stored);
                            return true;
                        } catch (e) { }
                    }
                    historicalData = [];
                    return false;
                }

                // حفظ البيانات التاريخية
                async function saveHistoricalData() {
                    localStorage.setItem('stratix_finance_kpis_history', JSON.stringify(historicalData));
                    if (typeof DeptPage !== 'undefined' && DeptPage.saveToAPI) {
                        await DeptPage.saveToAPI('KPIS_HISTORY', historicalData).catch(console.warn);
                    }
                }

                // حساب نسبة التقدم نحو الهدف
                function calculateProgress(value, target, lowerIsBetter) {
                    if (target === 0) return 0;
                    if (lowerIsBetter) {
                        if (value <= target) return 100;
                        const maxDiff = target * 2;
                        const diff = value - target;
                        return Math.max(0, Math.min(100, 100 - (diff / maxDiff) * 100));
                    } else {
                        if (value >= target) return 100;
                        return Math.min(100, (value / target) * 100);
                    }
                }

                // تحديث كارد واحد فقط (بدون إعادة رسم الصفحة)
                function updateKpiCard(kpiId, newValue) {
                    const card = document.querySelector(`.kpi-card[data-kpi-id="${kpiId}"]`);
                    if (!card) return;

                    const kpi = kpis.find(k => k.id === kpiId);
                    if (!kpi) return;

                    const progress = calculateProgress(newValue, kpi.target, kpi.lowerIsBetter);
                    const valueDisplay = kpi.isPercentage ? `${newValue}%` : newValue;

                    // تحديث القيمة المعروضة
                    const valEl = card.querySelector('.kpi-value');
                    if (valEl) valEl.innerText = valueDisplay;

                    // تحديث شريط التقدم
                    const fillEl = card.querySelector('.progress-target-fill');
                    if (fillEl) fillEl.style.width = `${progress}%`;

                    // تحديث نسبة التقدم النصية
                    const pctEl = card.querySelector('.progress-percent');
                    if (pctEl) pctEl.innerText = `${Math.round(progress)}% من الهدف`;

                    // تحديث حقل الإدخال
                    const input = card.querySelector(`input[data-kpi="${kpiId}"]`);
                    if (input && input.value != newValue) input.value = newValue;
                }

                // عرض جميع المؤشرات (تُستدعى مرة واحدة عند التحميل)
                async function renderKpis() {
                    const diagnostic = await loadDiagnosticData();
                    const savedValues = loadKpisData();

                    for (const kpi of kpis) {
                        let value = savedValues[kpi.id] !== undefined ? savedValues[kpi.id] : (diagnostic ? diagnostic[kpi.id] : null);
                        if (value === null || value === undefined) value = kpi.default;
                        currentKpisValues[kpi.id] = parseFloat(value) || 0;
                    }

                    const container = document.getElementById('kpisContainer');
                    container.innerHTML = '';

                    for (const kpi of kpis) {
                        const value = currentKpisValues[kpi.id];
                        const progress = calculateProgress(value, kpi.target, kpi.lowerIsBetter);
                        const valueDisplay = kpi.isPercentage ? `${value}%` : value;
                        const targetDisplay = kpi.isPercentage ? `${kpi.target}%` : kpi.target;

                        const card = document.createElement('div');
                        card.className = 'kpi-card';
                        card.setAttribute('data-kpi-id', kpi.id);
                        card.innerHTML = `
                <div class="d-flex justify-content-between align-items-start flex-wrap">
                    <div>
                        <div class="kpi-title">${kpi.name}</div>
                        <div class="kpi-value">${valueDisplay}</div>
                        <div class="text-muted small">الهدف: ${targetDisplay}</div>
                    </div>
                    <div class="text-start" style="min-width: 140px;">
                        <label class="form-label small">تحديث القيمة</label>
                        <input type="number" step="${kpi.isPercentage ? 0.1 : 1}" class="form-control form-control-sm bg-dark text-white border-secondary" data-kpi="${kpi.id}" value="${value}">
                    </div>
                </div>
                <div class="progress-target">
                    <div class="progress-target-fill" style="width: ${progress}%;"></div>
                </div>
                <div class="d-flex justify-content-between mt-1 small text-muted">
                    <span>0</span>
                    <span class="progress-percent">${Math.round(progress)}% من الهدف</span>
                    <span>${targetDisplay}</span>
                </div>
            `;
                        container.appendChild(card);
                    }

                    document.querySelectorAll('input[data-kpi]').forEach(input => {
                        input.addEventListener('change', async (e) => {
                            const kpiId = input.getAttribute('data-kpi');
                            const newValue = parseFloat(input.value);
                            if (!isNaN(newValue)) {
                                currentKpisValues[kpiId] = newValue;
                                await saveKpisValues();
                                updateKpiCard(kpiId, newValue);
                            }
                        });
                    });
                }

                // عرض البيانات التاريخية (جدول + رسم بياني)
                function renderHistorical() {
                    const container = document.getElementById('historicalContainer');
                    if (!historicalData.length) {
                        container.innerHTML = '<p class="text-muted text-center py-3">لا توجد بيانات تاريخية بعد. أضف شهراً جديداً لبدء التتبع.</p>';
                        if (chartInstance) chartInstance.destroy();
                        chartInstance = null;
                        return;
                    }

                    let tableHtml = `<div class="table-responsive"><table class="table table-dark table-sm historical-table"><thead><tr><th>الشهر</th><th>هامش الربح</th><th>نسبة السيولة</th><th>الدين/حقوق الملكية</th><th>DSO</th><th>دوران المخزون</th><th>معدل الحرق</th><th></th></tr></thead><tbody>`;
                    for (let i = historicalData.length - 1; i >= 0; i--) {
                        const d = historicalData[i];
                        tableHtml += `
                <tr>
                    <td>${d.date}</td>
                    <td>${d.profit_margin !== undefined ? d.profit_margin + '%' : '-'}</td>
                    <td>${d.current_ratio !== undefined ? d.current_ratio : '-'}</td>
                    <td>${d.debt_to_equity !== undefined ? d.debt_to_equity : '-'}</td>
                    <td>${d.dso !== undefined ? d.dso : '-'}</td>
                    <td>${d.inventory_turnover !== undefined ? d.inventory_turnover : '-'}</td>
                    <td>${d.burn_rate !== undefined ? Number(d.burn_rate).toLocaleString() : '-'}</td>
                    <td><button class="btn btn-sm btn-outline-danger delete-month" data-index="${i}"><i class="bi bi-trash"></i></button></td>
                </tr>
            `;
                    }
                    tableHtml += `</tbody></table></div>`;
                    container.innerHTML = tableHtml;

                    document.querySelectorAll('.delete-month').forEach(btn => {
                        btn.addEventListener('click', async (e) => {
                            const idx = parseInt(btn.getAttribute('data-index'));
                            if (!isNaN(idx)) {
                                if (confirm('هل أنت متأكد من حذف هذا السجل التاريخي؟')) {
                                    historicalData.splice(idx, 1);
                                    await saveHistoricalData();
                                    renderHistorical();
                                    updateChart();
                                }
                            }
                        });
                    });

                    updateChart();
                }

                // تحديث الرسم البياني
                function updateChart() {
                    const canvas = document.getElementById('trendChart');
                    if (!canvas) return;
                    const ctx = canvas.getContext('2d');
                    if (chartInstance) chartInstance.destroy();
                    if (!historicalData.length) return;

                    const labels = historicalData.map(d => d.date);
                    const profitData = historicalData.map(d => d.profit_margin);
                    const liquidityData = historicalData.map(d => d.current_ratio);
                    const debtData = historicalData.map(d => d.debt_to_equity);

                    chartInstance = new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: labels,
                            datasets: [
                                { label: 'هامش الربح (%)', data: profitData, borderColor: '#10b981', tension: 0.3, fill: false },
                                { label: 'نسبة السيولة', data: liquidityData, borderColor: '#3b82f6', tension: 0.3, fill: false },
                                { label: 'الدين/حقوق الملكية', data: debtData, borderColor: '#f59e0b', tension: 0.3, fill: false }
                            ]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: true,
                            plugins: { legend: { labels: { color: '#eef2ff' } } },
                            scales: {
                                y: { grid: { color: 'rgba(255,255,255,0.1)' }, ticks: { color: '#eef2ff' } },
                                x: { ticks: { color: '#eef2ff' } }
                            }
                        }
                    });
                }

                // فتح الـ Modal لإضافة شهر جديد
                function openAddMonthModal() {
                    const today = new Date();
                    document.getElementById('modal_date').value = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}`;

                    const modalContainer = document.getElementById('modalInputsContainer');
                    modalContainer.innerHTML = kpis.map(k => `
            <div class="col-6">
                <label class="form-label small">${k.name}</label>
                <input type="number" name="${k.id}" class="form-control bg-dark text-white border-secondary" value="${currentKpisValues[k.id] || 0}">
            </div>
        `).join('');

                    if (!addMonthModal) addMonthModal = new bootstrap.Modal(document.getElementById('addMonthModal'));
                    addMonthModal.show();
                }

                // تأكيد إضافة شهر جديد من الـ Modal
                async function confirmAddMonth() {
                    const form = document.getElementById('addMonthForm');
                    const formData = new FormData(form);
                    const date = formData.get('month_date');

                    if (!date) {
                        alert('يرجى اختيار التاريخ');
                        return;
                    }

                    const exists = historicalData.some(d => d.date === date);
                    if (exists) {
                        if (typeof DeptPage !== 'undefined' && DeptPage.showMessage) {
                            DeptPage.showMessage('⚠️ هذا الشهر موجود بالفعل في البيانات التاريخية', true);
                        } else {
                            alert('هذا الشهر موجود بالفعل');
                        }
                        return;
                    }

                    const newEntry = { date };
                    kpis.forEach(k => {
                        newEntry[k.id] = parseFloat(formData.get(k.id)) || 0;
                    });

                    historicalData.push(newEntry);
                    historicalData.sort((a, b) => new Date(a.date) - new Date(b.date)); // ترتيب زمني

                    await saveHistoricalData();
                    renderHistorical();
                    addMonthModal.hide();

                    if (typeof DeptPage !== 'undefined' && DeptPage.showMessage) {
                        DeptPage.showMessage('✅ تمت إضافة بيانات الشهر بنجاح');
                    }
                }

                // حفظ جميع التغييرات
                async function saveAll() {
                    const btn = document.getElementById('saveKpisBtn');
                    btn.disabled = true;
                    btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> جاري الحفظ...';

                    await saveKpisValues();
                    await saveHistoricalData();

                    btn.disabled = false;
                    btn.innerHTML = '<i class="bi bi-save"></i> حفظ التحديثات';

                    if (typeof DeptPage !== 'undefined' && DeptPage.showMessage) {
                        DeptPage.showMessage('✅ تم حفظ جميع مؤشرات الأداء والبيانات التاريخية بنجاح', false);
                    } else {
                        alert('تم حفظ المؤشرات');
                    }
                }

                // التهيئة
                document.addEventListener('DOMContentLoaded', async () => {
                    loadHistoricalData();
                    await renderKpis();
                    renderHistorical();

                    document.getElementById('saveKpisBtn').addEventListener('click', saveAll);
                    document.getElementById('addMonthBtn').addEventListener('click', openAddMonthModal);
                    document.getElementById('confirmAddBtn').addEventListener('click', confirmAddMonth);
                });
            </script>
    </div>
    </main>
    </div>
</body>

</html>
