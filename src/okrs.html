<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ستارتكس | الأهداف والنتائج الرئيسية (OKRs)</title>
    <!-- Frameworks -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap"
        rel="stylesheet">

    <!-- Custom Styles -->
    <link rel="stylesheet" href="/css/shared.css">
    <link rel="stylesheet" href="/css/dept-pages.css">

    <style>
        :root {
            --stx-bg: #0b0d12;
            --stx-card: rgba(22, 27, 34, 0.7);
            --stx-border: rgba(255, 255, 255, 0.08);
            --stx-primary: #818cf8;
            --stx-success: #10b981;
            --stx-warning: #f59e0b;
        }

        body {
            background-color: var(--stx-bg);
            color: #f8fafc;
            font-family: 'Tajawal', sans-serif;
            overflow: hidden;
        }

        .stx-wrapper {
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .stx-sidebar-container {
            width: 260px;
            flex-shrink: 0;
            border-left: 1px solid var(--stx-border);
        }

        .stx-main-content {
            flex: 1;
            overflow-y: auto;
            height: 100vh;
        }

        /* Header */
        .stx-header {
            background: rgba(11, 13, 18, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--stx-border);
            padding: 16px 32px;
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* OKR Grid */
        .okr-container {
            max-width: 1200px;
            margin: 32px auto 150px;
            padding: 0 32px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .okr-card {
            background: var(--stx-card);
            border: 1px solid var(--stx-border);
            border-radius: 28px;
            overflow: hidden;
            transition: all 0.4s;
            position: relative;
        }

        .okr-card:hover {
            border-color: var(--stx-primary);
            background: rgba(255, 255, 255, 0.03);
            transform: translateY(-3px);
        }

        .okr-card-header {
            background: rgba(255, 255, 255, 0.03);
            border-bottom: 1px solid var(--stx-border);
            padding: 24px 32px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .okr-idx {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: var(--stx-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            color: white;
        }

        .okr-title-input {
            flex: 1;
            background: transparent;
            border: none;
            color: #f1f5f9;
            font-size: 1.15rem;
            font-weight: 800;
            outline: none;
        }

        /* Key Results */
        .kr-section {
            padding: 24px 32px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .kr-row {
            display: flex;
            align-items: center;
            gap: 16px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 16px;
            padding: 16px 20px;
            border: 1px solid var(--stx-border);
            transition: 0.3s;
        }

        .kr-row:hover {
            border-color: rgba(255, 255, 255, 0.15);
        }

        .kr-input {
            flex: 1;
            background: transparent;
            border: none;
            color: #f8fafc;
            font-size: 0.95rem;
            outline: none;
        }

        .kr-target {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--stx-border);
            border-radius: 10px;
            padding: 8px 16px;
            color: var(--stx-primary);
            width: 140px;
            text-align: center;
            font-weight: 700;
            font-size: 0.9rem;
        }

        .btn-add-kr {
            background: transparent;
            border: 1px dashed var(--stx-primary);
            color: var(--stx-primary);
            border-radius: 16px;
            padding: 12px;
            font-weight: 700;
            transition: 0.3s;
            font-size: 0.88rem;
            width: 100%;
        }

        .btn-add-kr:hover {
            background: rgba(129, 140, 248, 0.08);
            border-style: solid;
        }

        /* Suggestions */
        .brainstorm-box {
            margin-bottom: 24px;
            padding: 0 32px;
            max-width: 1200px;
            margin: 32px auto 0;
        }

        .chips-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 12px;
        }

        .chip {
            background: rgba(129, 140, 248, 0.1);
            border: 1px solid rgba(129, 140, 248, 0.2);
            color: var(--stx-primary);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        .chip:hover {
            border-color: var(--stx-primary);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(129, 140, 248, 0.2);
        }

        /* Action Bar */
        .action-bar {
            position: fixed;
            bottom: 0;
            right: 260px;
            left: 0;
            background: rgba(11, 13, 18, 0.9);
            backdrop-filter: blur(15px);
            border-top: 1px solid var(--stx-border);
            padding: 20px 48px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1100;
        }

        .btn-stx-primary {
            background: var(--stx-primary);
            color: white;
            border: none;
            padding: 14px 40px;
            border-radius: 16px;
            font-weight: 800;
            box-shadow: 0 8px 24px rgba(129, 140, 248, 0.3);
            transition: 0.3s;
        }

        .btn-stx-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(129, 140, 248, 0.45);
        }

        @media (max-width: 992px) {
            .action-bar {
                right: 0;
            }
        }
    </style>
</head>

<body>
    <div class="stx-wrapper">
        <aside class="stx-sidebar-container"></aside>

        <main class="stx-main-content">
            <!-- Header -->
            <header class="stx-header">
                <div class="d-flex align-items-center gap-3">
                    <div class="step-hub-icon"
                        style="width:38px; height:38px; border-radius:50%; background:var(--stx-primary); display:flex; align-items:center; justify-content:center; color:white; font-size:1.1rem;">
                        <i class="bi bi-check2-square"></i></div>
                    <div>
                        <h1 class="h5 fw-bold m-0">الأهداف والنتائج الرئيسية (OKRs)</h1>
                        <p class="small text-muted m-0" id="dept-context">جاري التحميل...</p>
                    </div>
                </div>
                <button class="btn-stx-primary" onclick="addObjective()">
                    <i class="bi bi-plus-lg me-1"></i> إضافة هدف جديد
                </button>
            </header>

            <!-- Brainstorming Suggestions -->
            <div class="brainstorm-box">
                <div class="d-flex align-items-center gap-2 text-warning small fw-bold">
                    <i class="bi bi-lightning-charge-fill"></i> مقترحات ذكية لقسمك (اضغط للإضافة السريعة)
                </div>
                <div class="chips-container" id="suggestions"></div>
            </div>

            <!-- OKR Grid -->
            <div class="okr-container" id="okrContainer">
                <!-- Cards will be injected here -->
            </div>

            <!-- Footer -->
            <div class="action-bar">
                <button type="button" onclick="history.back()"
                    class="btn btn-link text-muted text-decoration-none fw-bold">
                    <i class="bi bi-arrow-right me-2"></i> العودة للأهداف الاستراتيجية
                </button>
                <div class="d-flex align-items-center gap-4">
                    <div class="text-end d-none d-lg-block">
                        <div class="small text-muted">المرحلة النهائية للتشخيص</div>
                        <div class="fw-bold text-success">تثبيت الخطوات العملية <i class="bi bi-arrow-left"></i></div>
                    </div>
                    <button type="button" onclick="saveOKRs()" id="btnSave" class="btn-stx-primary px-5">
                        حفظ ومتابعة الرحلة <i class="bi bi-arrow-left"></i>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/context-manager.js"></script>
    <script src="/js/dept-page.js"></script>
    <script src="/js/steps-config.js"></script>
    <script src="/js/sidebar.js"></script>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const dept = urlParams.get('dept') || 'hr';
        let objCount = 0;

        const DEPT_SUGGESTIONS = {
            hr: [
                { obj: 'رفع جودة استقطاب المواهب التقنية', krs: ['تقليل وقت التوظيف بنسبة 20%', 'اجتياز 90% من الجدد لفترة التجربة بنجاح'] },
                { obj: 'تطوير بيئة عمل ملهبة للابتكار', krs: ['رفع مؤشر رضا الموظفين إلى 4.5/5', 'تنفيذ 12 فعالية ترابط ربع سنوية'] }
            ],
            finance: [
                { obj: 'أتمتة العمليات المالية التشغيلية', krs: ['إغلاق الحسابات الشهرية خلال 3 أيام عمل', 'رقمنة 100% من الفواتير الورقية'] }
            ]
        };

        async function initOKRs() {
            const DEPT_LABELS = { hr: 'الموارد البشرية', finance: 'المالية', marketing: 'التسويق', operations: 'العمليات' };
            document.getElementById('dept-context').textContent = `${DEPT_LABELS[dept] || dept} | صياغة الأهداف الطموحة`;

            // Render Suggestions
            const container = document.getElementById('suggestions');
            (DEPT_SUGGESTIONS[dept] || DEPT_SUGGESTIONS.hr).forEach(s => {
                const chip = document.createElement('div');
                chip.className = 'chip';
                chip.textContent = s.obj;
                chip.onclick = () => addObjective(s.obj, s.krs);
                container.appendChild(chip);
            });

            // Load saved
            const apiType = `OKRS_${dept.toUpperCase()}`;
            const saved = await DeptPage.loadFromAPI(apiType).catch(() => null) || [];
            if (saved && saved.length > 0) {
                saved.forEach(o => addObjective(o.objective, o.krs.map(k => typeof k === 'string' ? k : k.text)));
            } else {
                addObjective();
            }
        }

        function addObjective(title = '', krs = ['']) {
            objCount++;
            const container = document.getElementById('okrContainer');
            const card = document.createElement('div');
            card.className = 'okr-card';
            card.innerHTML = `
                <div class="okr-card-header">
                    <div class="okr-idx">${objCount}</div>
                    <input type="text" class="okr-title-input" placeholder="الهدف (Objective): اكتب هدفاً ملهماً وطموحاً..." value="${title}">
                    <button class="btn btn-link text-danger text-decoration-none" onclick="this.closest('.okr-card').remove(); updateIndices();"><i class="bi bi-trash"></i></button>
                </div>
                <div class="kr-section">
                    <div class="kr-list d-flex flex-column gap-3"></div>
                    <button class="btn-add-kr mt-2" onclick="addKR(this)"><i class="bi bi-plus-circle me-1"></i> إضافة نتيجة رئيسية (Key Result)</button>
                </div>
            `;
            container.appendChild(card);
            const list = card.querySelector('.kr-list');
            krs.forEach(text => addKR(card.querySelector('.btn-add-kr'), text));
        }

        function addKR(btn, text = '') {
            const list = btn.previousElementSibling;
            const row = document.createElement('div');
            row.className = 'kr-row';
            row.innerHTML = `
                <i class="bi bi-bullseye text-primary"></i>
                <input type="text" class="kr-input" placeholder="النتيجة الرئيسية: كيف سنقيس النجاح؟" value="${text}">
                <input type="text" class="kr-target" placeholder="المستهدف (40%)">
                <button class="btn btn-link text-muted" onclick="this.closest('.kr-row').remove();"><i class="bi bi-x-lg"></i></button>
            `;
            list.appendChild(row);
        }

        function updateIndices() {
            objCount = 0;
            document.querySelectorAll('.okr-idx').forEach(el => {
                objCount++;
                el.textContent = objCount;
            });
        }

        async function saveOKRs() {
            const btn = document.getElementById('btnSave');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> جاري الحفظ...';

            const payload = [];
            document.querySelectorAll('.okr-card').forEach(card => {
                const objective = card.querySelector('.okr-title-input').value.trim();
                const krs = [];
                card.querySelectorAll('.kr-row').forEach(row => {
                    const text = row.querySelector('.kr-input').value.trim();
                    const target = row.querySelector('.kr-target').value.trim();
                    if (text) krs.push({ text, target });
                });
                if (objective) payload.push({ objective, krs });
            });

            const apiType = `OKRS_${dept.toUpperCase()}`;
            const success = await DeptPage.saveToAPI(apiType, payload);

            if (success) {
                if (window.Context) await Context.markStepCompleted('okrs');
                DeptPage.showMessage('✅ تم حفظ الأهداف والنتائج الرئيسية (OKRs).');
                setTimeout(() => window.location.href = `/smart-actions.html?dept=${dept}&t=${Date.now()}`, 1200);
            } else {
                DeptPage.showMessage('❌ فشل حفظ البيانات، يرجى المحاولة لاحقاً.', true);
                btn.disabled = false;
                btn.innerHTML = 'حفظ ومتابعة الرحلة <i class="bi bi-arrow-left"></i>';
            }
        }

        document.addEventListener('DOMContentLoaded', initOKRs);
    </script>
</body>

</html>
