<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ستارتكس - التقارير التلقائية</title>
    <meta name="description" content="توليد تقارير استراتيجية تلقائية جاهزة للطباعة">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #0a0b10;
            --bg2: #12141f;
            --card: #171a2a;
            --card-hover: #1e2236;
            --text: #e2e8f0;
            --muted: #7a8599;
            --border: rgba(255, 255, 255, 0.06);
            --primary: #667eea;
            --secondary: #764ba2;
            --green: #22c55e;
            --yellow: #facc15;
            --red: #ef4444;
            --blue: #38bdf8;
            --purple: #a78bfa;
            --orange: #f97316
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        body {
            background: var(--bg);
            font-family: 'Tajawal', sans-serif;
            color: var(--text);
            min-height: 100vh
        }

        .page-wrapper {
            display: flex;
            min-height: 100vh
        }

        .main-content {
            flex: 1;
            min-width: 0;
            padding: 28px 32px
        }

        .rpt-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 28px
        }

        .rpt-title {
            font-size: 28px;
            font-weight: 900
        }

        .rpt-title span {
            background: linear-gradient(135deg, var(--purple), #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent
        }

        /* Report Templates */
        .rpt-templates {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
            margin-bottom: 28px
        }

        .rpt-tmpl {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 22px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden
        }

        .rpt-tmpl:hover {
            transform: translateY(-3px);
            border-color: rgba(255, 255, 255, 0.12);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3)
        }

        .rpt-tmpl.active {
            border-color: var(--primary);
            box-shadow: 0 0 0 1px var(--primary), 0 8px 30px rgba(102, 126, 234, 0.15)
        }

        .rpt-tmpl::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            border-radius: 16px 16px 0 0
        }

        .rpt-tmpl-icon {
            font-size: 32px;
            margin-bottom: 10px;
            display: block
        }

        .rpt-tmpl h3 {
            font-size: 16px;
            font-weight: 800;
            margin-bottom: 4px
        }

        .rpt-tmpl p {
            font-size: 12px;
            color: var(--muted);
            line-height: 1.6
        }

        .rpt-tmpl-badge {
            position: absolute;
            top: 14px;
            left: 14px;
            padding: 3px 10px;
            border-radius: 8px;
            font-size: 10px;
            font-weight: 700
        }

        .rpt-tmpl-sections {
            margin-top: 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 4px
        }

        .rpt-tmpl-sec {
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 10px;
            background: rgba(255, 255, 255, 0.04);
            color: var(--muted)
        }

        /* Generate button */
        .rpt-generate {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-bottom: 28px
        }

        .rpt-gen-btn {
            padding: 12px 32px;
            border-radius: 14px;
            border: none;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            font-family: inherit;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px
        }

        .rpt-gen-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.4)
        }

        .rpt-gen-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none
        }

        .rpt-gen-btn.generating {
            animation: pulse 1.5s infinite
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: 0.7
            }
        }

        .rpt-period {
            padding: 10px 16px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--card);
            color: var(--text);
            font-family: inherit;
            font-size: 13px;
            cursor: pointer
        }

        /* Report Preview */
        .rpt-preview {
            display: none;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            overflow: hidden
        }

        .rpt-preview.show {
            display: block;
            animation: fadeUp 0.5s ease
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .rpt-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 20px;
            background: rgba(255, 255, 255, 0.02);
            border-bottom: 1px solid var(--border)
        }

        .rpt-toolbar-title {
            font-size: 14px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px
        }

        .rpt-toolbar-actions {
            display: flex;
            gap: 8px
        }

        .rpt-tool-btn {
            padding: 7px 14px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text);
            font-family: inherit;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px
        }

        .rpt-tool-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.12)
        }

        .rpt-tool-btn.primary {
            background: rgba(102, 126, 234, 0.1);
            border-color: var(--primary);
            color: var(--primary)
        }

        /* Report document */
        .rpt-doc {
            padding: 40px;
            max-width: 900px;
            margin: 0 auto
        }

        .rpt-doc-header {
            text-align: center;
            padding-bottom: 24px;
            border-bottom: 2px solid var(--border);
            margin-bottom: 28px
        }

        .rpt-doc-logo {
            font-size: 28px;
            font-weight: 900;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 8px
        }

        .rpt-doc-logo span {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent
        }

        .rpt-doc-subtitle {
            font-size: 14px;
            color: var(--muted)
        }

        .rpt-doc-date {
            font-size: 12px;
            color: var(--muted);
            margin-top: 6px
        }

        .rpt-section {
            margin-bottom: 28px
        }

        .rpt-section-title {
            font-size: 18px;
            font-weight: 800;
            margin-bottom: 14px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 8px
        }

        .rpt-kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
            gap: 12px
        }

        .rpt-kpi {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            text-align: center
        }

        .rpt-kpi-val {
            font-size: 28px;
            font-weight: 900
        }

        .rpt-kpi-label {
            font-size: 12px;
            color: var(--muted);
            margin-top: 4px
        }

        .rpt-kpi-change {
            font-size: 11px;
            margin-top: 4px;
            font-weight: 700
        }

        .rpt-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px
        }

        .rpt-table th {
            text-align: right;
            padding: 10px 12px;
            background: rgba(255, 255, 255, 0.03);
            border-bottom: 1px solid var(--border);
            font-weight: 700;
            color: var(--muted);
            font-size: 12px
        }

        .rpt-table td {
            padding: 10px 12px;
            border-bottom: 1px solid var(--border)
        }

        .rpt-table tr:hover td {
            background: rgba(255, 255, 255, 0.02)
        }

        .rpt-progress {
            width: 80px;
            height: 6px;
            border-radius: 3px;
            background: rgba(255, 255, 255, 0.06);
            overflow: hidden;
            display: inline-block;
            vertical-align: middle;
            margin-right: 6px
        }

        .rpt-progress-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.5s
        }

        .rpt-chart {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px
        }

        .rpt-bar-chart {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            height: 160px;
            padding-top: 10px
        }

        .rpt-bar {
            flex: 1;
            border-radius: 6px 6px 0 0;
            position: relative;
            transition: height 0.5s;
            min-width: 0
        }

        .rpt-bar-label {
            position: absolute;
            bottom: -22px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 9px;
            color: var(--muted);
            white-space: nowrap
        }

        .rpt-bar-val {
            position: absolute;
            top: -18px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 10px;
            font-weight: 700
        }

        .rpt-rec {
            display: flex;
            gap: 10px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 10px;
            margin-bottom: 8px;
            border-right: 3px solid var(--primary)
        }

        .rpt-rec-icon {
            font-size: 18px;
            flex-shrink: 0
        }

        .rpt-rec-text {
            font-size: 13px;
            line-height: 1.7
        }

        .rpt-rec-priority {
            font-size: 10px;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 6px;
            align-self: flex-start;
            flex-shrink: 0
        }

        .rpt-summary-box {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.08), rgba(118, 75, 162, 0.08));
            border: 1px solid rgba(102, 126, 234, 0.15);
            border-radius: 14px;
            padding: 20px;
            font-size: 14px;
            line-height: 2
        }

        @media print {
            body {
                background: white !important;
                color: #222 !important
            }

            .rpt-toolbar,
            .rpt-header,
            .rpt-templates,
            .rpt-generate,
            .page-wrapper>*:not(.main-content) {
                display: none !important
            }

            .main-content {
                margin: 0 !important;
                padding: 0 !important
            }

            .rpt-preview {
                display: block !important;
                border: none !important;
                background: white !important
            }

            .rpt-doc {
                padding: 20px;
                color: #222
            }

            .rpt-kpi,
            .rpt-table th,
            .rpt-chart,
            .rpt-rec {
                border-color: #ddd
            }

            .rpt-kpi-val,
            .rpt-section-title {
                color: #222 !important
            }

            .rpt-summary-box {
                background: #f8f9fa !important;
                border-color: #ddd !important;
                color: #222 !important
            }
        }

        @media(max-width:768px) {
            .main-content {
                padding: 16px
            }

            .rpt-doc {
                padding: 20px
            }
        }
    </style>
</head>

<body>
    <div class="page-wrapper">
        <div id="sidebar-container"></div>
        <div class="main-content">
            <div class="rpt-header">
                <div>
                    <h1 class="rpt-title"><i class="bi bi-file-earmark-bar-graph"></i> التقارير <span>التلقائية</span>
                    </h1>
                    <div style="font-size:13px;color:var(--muted);margin-top:4px">توليد تقارير استراتيجية شاملة بضغطة
                        واحدة</div>
                </div>
            </div>

            <!-- Templates -->
            <div class="rpt-templates" id="templates"></div>

            <!-- Generate -->
            <div class="rpt-generate">
                <select class="rpt-period" id="reportPeriod">
                    <option value="Q1">الربع الأول 2026</option>
                    <option value="Q4" selected>الربع الرابع 2025</option>
                    <option value="H2">النصف الثاني 2025</option>
                    <option value="2025">سنوي 2025</option>
                </select>
                <button class="rpt-gen-btn" id="generateBtn" onclick="generateReport()">
                    <i class="bi bi-magic"></i> توليد التقرير
                </button>
            </div>

            <!-- Preview -->
            <div class="rpt-preview" id="reportPreview">
                <div class="rpt-toolbar">
                    <div class="rpt-toolbar-title"><i class="bi bi-file-earmark-check"></i> <span
                            id="previewTitle">التقرير</span></div>
                    <div class="rpt-toolbar-actions">
                        <button class="rpt-tool-btn" onclick="window.print()"><i class="bi bi-printer"></i>
                            طباعة</button>
                        <button class="rpt-tool-btn primary" id="downloadPdfBtn" onclick="downloadPDF()"><i
                                class="bi bi-download"></i> تحميل PDF</button>
                    </div>
                </div>
                <div class="rpt-doc" id="reportDoc"></div>
            </div>
        </div>
    </div>

    <script src="/assets/js/api.js"></script>
    <script src="/assets/js/sidebar.js"></script>
    <script src="/assets/js/ai-advisor.js"></script>
    <script src="/assets/js/achievements.js"></script>
    <script src="/assets/js/notifications.js"></script>
    <script>
        // === Report Templates ===
        const templates = [
            { id: 'strategic', icon: '🎯', title: 'التقرير الاستراتيجي الشامل', desc: 'نظرة شاملة على أداء الأهداف والمبادرات والمخاطر', color: '#667eea', sections: ['ملخص تنفيذي', 'مؤشرات رئيسية', 'أداء الأهداف', 'المبادرات', 'المخاطر', 'التوصيات'], badge: 'الأكثر طلباً', badgeColor: '#22c55e' },
            { id: 'kpi', icon: '📊', title: 'تقرير مؤشرات الأداء', desc: 'تحليل مفصل لأداء مؤشرات القياس الرئيسية مع التوجهات', color: '#22c55e', sections: ['ملخص الأداء', 'مؤشرات متقدمة', 'مؤشرات متأخرة', 'رسوم بيانية', 'تحليل الفجوات'] },
            { id: 'initiative', icon: '🚀', title: 'تقرير المبادرات والمشاريع', desc: 'حالة المبادرات الجارية مع نسب الإنجاز والتأخيرات', color: '#f97316', sections: ['نظرة عامة', 'جدول المبادرات', 'المراحل', 'الميزانية', 'المخاطر'] },
            { id: 'risk', icon: '⚠️', title: 'تقرير المخاطر', desc: 'تحليل المخاطر الاستراتيجية واحتمالات التأثير', color: '#ef4444', sections: ['خريطة الحرارة', 'أعلى المخاطر', 'خطط المعالجة', 'مؤشرات إنذار'] },
            { id: 'team', icon: '👥', title: 'تقرير أداء الفريق', desc: 'تحليل إنتاجية الفريق والمهام والمشاركة', color: '#8b5cf6', sections: ['ملخص الفريق', 'إنجاز المهام', 'المشاركة', 'الأكثر نشاطاً'] },
            { id: 'executive', icon: '👔', title: 'الملخص التنفيذي', desc: 'ملخص موجز للإدارة العليا — صفحة واحدة', color: '#facc15', sections: ['الصحة العامة', 'أبرز الإنجازات', 'أبرز التحديات', 'القرارات المطلوبة'], badge: 'صفحة واحدة', badgeColor: '#facc15' },
        ];

        let selectedTemplate = 'strategic';

        // Render templates
        function renderTemplates() {
            document.getElementById('templates').innerHTML = templates.map(t => `
        <div class="rpt-tmpl ${t.id === selectedTemplate ? 'active' : ''}" onclick="selectTemplate('${t.id}')" style="--tmpl-color:${t.color}">
          <div style="position:absolute;top:0;left:0;right:0;height:3px;background:${t.color}"></div>
          ${t.badge ? `<div class="rpt-tmpl-badge" style="background:${t.badgeColor}15;color:${t.badgeColor}">${t.badge}</div>` : ''}
          <span class="rpt-tmpl-icon">${t.icon}</span>
          <h3>${t.title}</h3>
          <p>${t.desc}</p>
          <div class="rpt-tmpl-sections">${t.sections.map(s => `<span class="rpt-tmpl-sec">${s}</span>`).join('')}</div>
        </div>
      `).join('');
        }

        function selectTemplate(id) {
            selectedTemplate = id;
            renderTemplates();
        }

        // === API Data ===
        let reportData = null;
        const token = localStorage.getItem('token');

        // === Generate Report ===
        async function generateReport() {
            const btn = document.getElementById('generateBtn');
            btn.disabled = true;
            btn.classList.add('generating');
            btn.innerHTML = '<i class="bi bi-hourglass-split"></i> جاري التوليد...';

            // Fetch real data from API
            try {
                if (token) {
                    const res = await fetch('/api/dashboard/report-data', {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    if (res.ok) {
                        reportData = await res.json();
                    }
                }
            } catch (e) {
                console.warn('Could not fetch report data, using mock:', e);
            }

            const tmpl = templates.find(t => t.id === selectedTemplate);
            const period = document.getElementById('reportPeriod');
            const periodText = period.options[period.selectedIndex].text;

            document.getElementById('previewTitle').textContent = `${tmpl.title} — ${periodText}`;
            document.getElementById('reportDoc').innerHTML = generateReportHTML(tmpl, periodText);
            document.getElementById('reportPreview').classList.add('show');

            btn.disabled = false;
            btn.classList.remove('generating');
            btn.innerHTML = '<i class="bi bi-magic"></i> توليد التقرير';

            document.getElementById('reportPreview').scrollIntoView({ behavior: 'smooth', block: 'start' });

            // Animate numbers
            setTimeout(() => {
                document.querySelectorAll('.rpt-kpi-val[data-target]').forEach(el => {
                    animateNum(el, parseInt(el.dataset.target));
                });
            }, 300);
        }

        // Helper: is real data available?
        function hasRealData() { return reportData && reportData.hasData; }

        function generateReportHTML(tmpl, period) {
            const today = new Date();
            const dateStr = `${today.getDate()}/${today.getMonth() + 1}/${today.getFullYear()}`;
            const entityName = hasRealData() ? (reportData.entity.displayName || reportData.entity.legalName) : 'ستارتكس';

            const reports = {
                strategic: strategicReport,
                kpi: kpiReport,
                initiative: initiativeReport,
                risk: riskReport,
                team: teamReport,
                executive: executiveReport,
            };

            return `
        <div class="rpt-doc-header">
          <div class="rpt-doc-logo">${tmpl.icon} <span>${entityName}</span></div>
          <h2 style="font-size:22px;font-weight:900;margin-bottom:4px">${tmpl.title}</h2>
          <div class="rpt-doc-subtitle">${period}</div>
          <div class="rpt-doc-date">تاريخ التوليد: ${dateStr} | سري — للاستخدام الداخلي</div>
          ${!hasRealData() ? '<div style="margin-top:8px;padding:6px 14px;border-radius:8px;background:rgba(245,158,11,0.1);color:#f59e0b;font-size:11px;display:inline-block">⚠️ بيانات تجريبية — سجّل دخولك لعرض بياناتك الحقيقية</div>' : ''}
        </div>
        ${(reports[tmpl.id] || strategicReport)()}
      `;
        }

        // === Report Content Generators ===
        function strategicReport() {
            const d = reportData;
            const health = hasRealData() ? d.healthScore : 78;
            const objProg = hasRealData() ? d.overallProgress : 73;
            const iniProg = hasRealData() ? (d.iniSummary.total > 0 ? Math.round((d.iniSummary.completed / d.iniSummary.total) * 100) : 0) : 65;
            const custSat = hasRealData() ? (d.kpiSummary.total > 0 ? Math.round((d.kpiSummary.onTrack / d.kpiSummary.total) * 100) : 0) : 82;

            const healthChange = hasRealData() ? '' : '+5';
            const objChange = hasRealData() ? '' : '+8';
            const iniChange = hasRealData() ? '' : '-3';
            const custChange = hasRealData() ? '' : '+12';

            // Objectives table
            let objRows = '';
            if (hasRealData() && d.objectives.length > 0) {
                objRows = d.objectives.map(o => {
                    const status = o.progress >= 80 ? 'متقدم' : o.progress >= 50 ? 'على المسار' : 'متأخر';
                    return objRow(o.name, o.perspective, o.progress, status);
                }).join('');
            } else {
                objRows = objRow('زيادة الإيرادات 25%', 'مالي', 82, 'متقدم') +
                    objRow('تحسين رضا العملاء', 'عملاء', 78, 'على المسار') +
                    objRow('تحسين الكفاءة التشغيلية', 'عمليات', 65, 'متأخر') +
                    objRow('تطوير الكوادر القيادية', 'تعلم ونمو', 70, 'على المسار');
            }

            // Recommendations
            let recsHtml = '';
            if (hasRealData()) {
                const recs = [];

        // === Helper builders ===
        function kpiCard(label, val, suffix, change, color) {
            const c = color === 'green' ? 'var(--green)' : color === 'red' ? 'var(--red)' : color === 'primary' ? 'var(--primary)' : 'var(--muted)';
            return `<div class="rpt-kpi"><div class="rpt-kpi-val" data-target="${val}" style="color:${c}">0</div><div class="rpt-kpi-label">${label}</div>${change ? `<div class="rpt-kpi-change" style="color:${change.startsWith('-') ? 'var(--red)' : 'var(--green)'}">${change.startsWith('-') ? '↓' : '↑'} ${change}${suffix}</div>` : ''}</div>`;
        }
        function objRow(name, persp, pct, status) {
            const sc = status === 'متقدم' ? 'var(--green)' : status === 'متأخر' ? 'var(--red)' : 'var(--primary)';
            return `<tr><td>${name}</td><td>${persp}</td><td><div class="rpt-progress"><div class="rpt-progress-fill" style="width:${pct}%;background:${sc}"></div></div> ${pct}%</td><td><span style="color:${sc};font-weight:700">${status}</span></td></tr>`;
        }
        function kpiRow(name, actual, target, pct) {
            const c = pct >= 100 ? 'var(--green)' : pct >= 80 ? 'var(--yellow)' : 'var(--red)';
            return `<tr><td>${name}</td><td style="font-weight:700">${actual}</td><td>${target}</td><td><div class="rpt-progress"><div class="rpt-progress-fill" style="width:${Math.min(pct, 100)}%;background:${c}"></div></div> ${pct}%</td></tr>`;
        }
        function initRow(name, owner, pct, budget, status) {
            const sc = status === 'مكتمل' ? 'var(--green)' : status === 'متأخر' ? 'var(--red)' : 'var(--primary)';
            return `<tr><td>${name}</td><td>${owner}</td><td><div class="rpt-progress"><div class="rpt-progress-fill" style="width:${pct}%;background:${sc}"></div></div> ${pct}%</td><td>${budget}</td><td><span style="color:${sc};font-weight:700">${status}</span></td></tr>`;
        }
        function barItem(label, val, color) {
            return `<div class="rpt-bar" style="height:${val}%;background:${color}"><div class="rpt-bar-val">${val}%</div><div class="rpt-bar-label">${label}</div></div>`;
        }
        function recItem(icon, text, priority, color) {
            return `<div class="rpt-rec" style="border-right-color:${color}"><div class="rpt-rec-icon">${icon}</div><div class="rpt-rec-text">${text}</div><div class="rpt-rec-priority" style="background:${color}15;color:${color}">${priority}</div></div>`;
        }
        function animateNum(el, target) {
            let cur = 0; const step = Math.max(1, Math.ceil(target / 25));
            const iv = setInterval(() => { cur += step; if (cur >= target) { cur = target; clearInterval(iv); } el.textContent = cur + (el.closest('.rpt-kpi')?.querySelector('.rpt-kpi-label')?.textContent.includes('%') ? '' : ''); }, 30);
        }

        // === PDF Download ===
        async function downloadPDF() {
            const reportDoc = document.getElementById('reportDoc');
            if (!reportDoc || !reportDoc.innerHTML.trim()) {
                alert('يرجى توليد التقرير أولاً');
                return;
            }

            const btn = document.getElementById('downloadPdfBtn');
            const originalHTML = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<i class="bi bi-hourglass-split"></i> جاري التحميل...';

            try {
                // Clone the report for PDF generation
                const clone = reportDoc.cloneNode(true);

                // Apply print-friendly styles
                clone.style.cssText = 'direction:rtl;font-family:Tajawal,sans-serif;color:#222;background:#fff;padding:30px;max-width:800px;margin:0 auto';

                // Fix colors for PDF readability
                clone.querySelectorAll('[style]').forEach(el => {
                    const s = el.style;
                    if (s.color && s.color.includes('var(--')) {
                        s.color = '#333';
                    }
                });

                // Make KPI values visible
                clone.querySelectorAll('.rpt-kpi-val').forEach(el => {
                    if (el.dataset.target) el.textContent = el.dataset.target;
                });

                const tmpl = templates.find(t => t.id === selectedTemplate);
                const period = document.getElementById('reportPeriod');
                const periodText = period.options[period.selectedIndex].text;
                const fileName = `ستارتكس_${tmpl.title}_${periodText}`.replace(/\s+/g, '_');

                const opt = {
                    margin: [15, 15, 20, 15],
                    filename: `${fileName}.pdf`,
                    image: { type: 'jpeg', quality: 0.95 },
                    html2canvas: { scale: 2, useCORS: true, letterRendering: true, scrollY: 0 },
                    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
                    pagebreak: { mode: ['avoid-all', 'css', 'legacy'] }
                };

                await html2pdf().set(opt).from(clone).save();

            } catch (err) {
                console.error('PDF generation error:', err);
                alert('حدث خطأ أثناء توليد PDF — جرّب زر الطباعة كبديل');
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalHTML;
            }
        }

        renderTemplates();
    </script>

    <script>

    let selectedDRPType = 'executive';

    window.selectDRPType = function(type) {

    };

    window.generateDiagReport = async function() {
        const diag  = JSON.parse(localStorage.getItem('stratix_diagnostic_payload') || 'null');
        const dept  = JSON.parse(localStorage.getItem('stratix_dept_deep_payload') || 'null');
        const ident = JSON.parse(localStorage.getItem('stratix_identity_payload') || 'null');
        const swot  = JSON.parse(localStorage.getItem('stratix_swot_data') || localStorage.getItem('stratix_swot_payload') || 'null');

        if (!diag) { alert('لا توجد بيانات تشخيص. يرجى إكمال التشخيص أولاً.'); return; }

        const html = buildReportHTML(selectedDRPType, diag, dept, ident, swot);
        const wrap = document.getElementById('drpDocWrap');
        wrap.innerHTML = html;
        wrap.style.display = 'block';

        const typeLabels = { executive: 'تنفيذي', strategic: 'استراتيجي', operational: 'تشغيلي' };

            margin: [10, 10, 15, 10],

            await html2pdf().set(opt).from(wrap.querySelector('.dr-doc')).save();

    function buildReportHTML(type, diag, dept, ident, swot) {

                    </div>
                    <div class="dr-kpi-card">
                        <div class="dr-kpi-val" style="color:#dc2626">${riskAmt ? riskAmt.toLocaleString() + ' ﷼' : '—'}</div>

                ${ident?.vision ? `
                <div class="dr-section-title">🏛️ الهوية المؤسسية</div>

                    <tr><td>الميزة التنافسية</td><td>${ident.competitiveAdvantage?.description||'—'}</td></tr>
                </table>
                ` : ''}

                <div class="dr-section-title">✅ التوصيات لمجلس الإدارة</div>
                ${maturity < 45 ? `<div class="dr-warning">⚠️ مستوى النضج المؤسسي منخفض (${maturity}%) — يتطلب تدخلاً استراتيجياً فورياً</div>` : ''}
                ${compScore < 60 ? `<div class="dr-warning">⚠️ درجة الامتثال دون المعيار المقبول — خطر قانوني حقيقي</div>` : ''}
                ${riskAmt > 50000 ? `<div class="dr-warning">⚠️ مخاطر مالية بقيمة ${riskAmt.toLocaleString()} ﷼ تحتاج إجراءات وقائية</div>` : ''}
                ${maturity >= 70 ? `<div class="dr-recommendation">✅ أداء مؤسسي قوي — التركيز على الإبداع والتوسع الاستراتيجي</div>` : ''}
                <div class="dr-recommendation">💡 تشكيل لجنة متابعة تنفيذية لمراجعة نتائج التشخيص والمبادرات العلاجية</div>

                <div class="dr-footer">تقرير ستارتكس برو — سري — للاستخدام الداخلي فقط | ${now}</div>

                    </div>
                    <div class="dr-kpi-card" style="text-align:right">
                        <div style="font-weight:700;color:#2563eb;margin-bottom:8px">🚀 الفرص (${opportunities.length})</div>
                        ${opportunities.slice(0,4).map(s => `<div class="dr-chip" style="background:#eff6ff;color:#1d4ed8">${s}</div>`).join('')}
                    </div>
                    <div class="dr-kpi-card" style="text-align:right">
                        <div style="font-weight:700;color:#ca8a04;margin-bottom:8px">🔴 التهديدات (${threats.length})</div>
                        ${threats.slice(0,4).map(s => `<div class="dr-chip dr-chip-yellow">${s}</div>`).join('')}
                    </div>
                </div>

                ${dept?.completedDepts?.length ? `
                <div class="dr-section-title">🏢 ملخص الإدارات</div>
                <table class="dr-table">
                    <tr><th>الإدارة</th><th>القوى</th><th>الضعف</th><th>الأولوية</th></tr>
                    ${dept.completedDepts.map(key => {
                        const d = dept[key] || {};
                        return `<tr>
                            <td>${key}</td>
                            <td>${(d.strengths||[]).length} نقطة</td>
                            <td>${(d.weaknesses||[]).length} نقطة</td>
                            <td><span class="dr-chip ${d.priority==='عاجل جداً'?'dr-chip-red':'dr-chip-green'}">${d.priority||'عادي'}</span></td>
                        </tr>`;
                    }).join('')}
                </table>
                ` : ''}

                <div class="dr-footer">تقرير ستارتكس برو — سري | ${now}</div>
            </div>`;
        }

        // operational
        return `<div class="dr-doc">
            <div class="dr-cover">
                <div class="dr-cover-brand">STARTIX PRO — التقرير التشغيلي</div>
                <div class="dr-cover-title">خطة العمل التشغيلية</div>
                <div class="dr-cover-sub">${company.name || 'المنشأة'} | ${now}</div>
            </div>

            <div class="dr-section-title">🎯 الأولويات التشغيلية الفورية</div>

            `).join('') : '<div class="dr-recommendation">✅ لا توجد بنود حرجة — الأداء سليم</div>'}

            ${dept?.completedDepts?.length ? `
            <div class="dr-section-title">📋 أهداف الإدارات المحددة</div>

                        <tr>

            <div class="dr-section-title">✅ خطوات العمل القادمة</div>

    window.exportExcel = function() {
        const diag  = JSON.parse(localStorage.getItem('stratix_diagnostic_payload') || 'null');
        const dept  = JSON.parse(localStorage.getItem('stratix_dept_deep_payload') || 'null');
        const ident = JSON.parse(localStorage.getItem('stratix_identity_payload') || 'null');
        if (!diag) { alert('لا توجد بيانات للتصدير'); return; }

        const wb = XLSX.utils.book_new();

        // Sheet 1: Summary
        const maturity = diag.results?.maturity || 0;
        const compScore = diag.results?.compliance?.score || 0;
        const riskAmt = diag.results?.totalRisk || 0;
        const summaryData = [
            ['البيان', 'القيمة'],
            ['النضج المؤسسي', maturity + '%'],
            ['درجة الامتثال', compScore + '%'],
            ['المخاطر المكشوفة (﷼)', riskAmt],
            ['تاريخ التشخيص', diag.completedAt || '—'],
            ['الرؤية', ident?.vision || '—'],
            ['الميزة التنافسية', ident?.competitiveAdvantage?.description || '—'],
        ];
        const ws1 = XLSX.utils.aoa_to_sheet(summaryData);
        XLSX.utils.book_append_sheet(wb, ws1, 'الملخص');

        // Sheet 2: Axes
        const axisRows = [['المحور', 'الدرجة']];
        Object.entries(diag.radar?.axisScores || {}).forEach(([k,v]) => axisRows.push([k, v + '%']));
        XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(axisRows), 'المحاور');

        // Sheet 3: Departments
        if (dept?.completedDepts?.length) {
            const deptRows = [['الإدارة', 'نقاط القوة', 'نقاط الضعف', 'الأهداف', 'الأولوية', 'نموذج التشغيل']];
            dept.completedDepts.forEach(key => {
                const d = dept[key] || {};
                deptRows.push([
                    key,
                    (d.strengths||[]).join(' | '),
                    (d.weaknesses||[]).join(' | '),
                    (d.goals||[]).join(' | '),
                    d.priority || '—',
                    d.operatingModel || '—',
                ]);
            });
            XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(deptRows), 'الإدارات');
        }

        // Sheet 4: Critical Items
        const critItems = diag.results?.compliance?.critical || [];
        if (critItems.length) {
            const critRows = [['البند الحرج', 'الحالة']];
            critItems.forEach(c => critRows.push([c, 'يتطلب معالجة فورية']));
            XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(critRows), 'البنود الحرجة');
        }

        const fileName = `ستارتكس_تشخيص_${new Date().toISOString().slice(0,10)}.xlsx`;
        XLSX.writeFile(wb, fileName);
    };

    window.exportJSON = function() {
        const payload = {
            diagnostic: JSON.parse(localStorage.getItem('stratix_diagnostic_payload') || 'null'),
            deptDeep:   JSON.parse(localStorage.getItem('stratix_dept_deep_payload') || 'null'),
            identity:   JSON.parse(localStorage.getItem('stratix_identity_payload') || 'null'),
            swot:       JSON.parse(localStorage.getItem('stratix_swot_data') || localStorage.getItem('stratix_swot_payload') || 'null'),
            exportedAt: new Date().toISOString(),
            version: 'stratix-pro-v3.2'
        };
        const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `ستارتكس_بيانات_${new Date().toISOString().slice(0,10)}.json`;
        a.click();
        URL.revokeObjectURL(url);
    };
    </script>
</body>

</html>
