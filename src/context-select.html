<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ستارتكس — اختيار السياق</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: #0f1117;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .ctx-wrapper {
            width: 100%;
            max-width: 680px;
        }

        .ctx-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .ctx-header .logo {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .ctx-header h2 {
            font-size: 20px;
            font-weight: 700;
            color: #e2e8f0;
        }

        .ctx-header p {
            color: #94a3b8;
            font-size: 14px;
            margin-top: 6px;
        }

        .ctx-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .ctx-card {
            background: #1a1d2e;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            padding: 18px 20px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .ctx-card:hover {
            background: #232640;
            border-color: rgba(102, 126, 234, 0.4);
            transform: translateX(-4px);
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.15);
        }

        .ctx-card.current {
            border-color: rgba(249, 115, 22, 0.4);
            background: rgba(249, 115, 22, 0.05);
        }

        .ctx-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.2), rgba(118, 75, 162, 0.2));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            flex-shrink: 0;
            color: #667eea;
        }

        .ctx-card.current .ctx-icon {
            color: #f97316;
            background: rgba(249, 115, 22, 0.1);
        }

        .ctx-info {
            flex: 1;
        }

        .ctx-name {
            font-size: 16px;
            font-weight: 700;
            color: #e2e8f0;
            margin-bottom: 4px;
        }

        .ctx-meta {
            font-size: 12px;
            color: #94a3b8;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .ctx-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 8px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.07);
            font-size: 11px;
        }

        .ctx-current-tag {
            font-size: 11px;
            color: #f97316;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .ctx-arrow {
            color: #667eea;
            flex-shrink: 0;
            font-size: 18px;
        }

        .ctx-card.current .ctx-arrow {
            color: #f97316;
        }

        .ctx-loading {
            text-align: center;
            padding: 40px;
            color: #94a3b8;
            font-size: 14px;
        }

        .ctx-error {
            text-align: center;
            padding: 30px;
            background: rgba(239, 68, 68, 0.08);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 12px;
            color: #fca5a5;
        }

        .ctx-switching {
            position: fixed;
            inset: 0;
            background: rgba(15, 17, 23, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            gap: 12px;
            font-size: 16px;
            color: #e2e8f0;
        }

        .ctx-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(102, 126, 234, 0.3);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="ctx-wrapper">
        <div class="ctx-header">
            <div class="logo">⚡ Stratix</div>
            <h2>اختر الكيان النشط</h2>
            <p>لديك صلاحية الوصول لأكثر من كيان — اختر الكيان الذي تريد العمل عليه الآن</p>
        </div>
        <div id="ctxList" class="ctx-list">
            <div class="ctx-loading">
                <i class="bi bi-hourglass-split"></i> جاري تحميل الكيانات...
            </div>
        </div>
    </div>

    <script>
        // ── ترجمات الأدوار ──────────────────────────────────────
        const ROLE_LABELS = {
            OWNER: 'مالك',
            ADMIN: 'مسؤول',
            EDITOR: 'محرر',
            VIEWER: 'مشاهد',
            DATA_ENTRY: 'مُدخل بيانات',
        };
        const USERTYPE_LABELS = {
            COMPANY_MANAGER: 'مدير شركة',
            DEPT_MANAGER: 'مدير إدارة',
            CONSULTANT: 'استشاري',
            EXPLORER: 'مستكشف',
        };
        const SIZE_LABELS = {
            MICRO: 'ناشئة', SMALL: 'صغيرة', MEDIUM: 'متوسطة',
            LARGE: 'كبيرة', ENTERPRISE: 'مؤسسية',
        };

        function getRoleLabel(role, userType) {
            return USERTYPE_LABELS[userType] || ROLE_LABELS[role] || role || 'عضو';
        }

        // ── جلب الكيانات ────────────────────────────────────────
        async function fetchEntities() {
            try {
                const res = await fetch('/api/auth/my-entities', { credentials: 'include' });
                if (!res.ok) throw new Error('فشل جلب الكيانات — ' + res.status);
                const data = await res.json();

                if (!data.entities || data.entities.length === 0) {
                    window.location.replace('/onboarding.html');
                    return;
                }
                if (data.entities.length === 1) {
                    // كيان واحد — التبديل المباشر بدون عرض
                    await switchEntity(data.entities[0].entityId);
                    return;
                }
                renderEntities(data.entities);
            } catch (err) {
                renderError(err.message);
            }
        }

        // ── رسم البطاقات بـ createElement (XSS-safe) ──────────
        function renderEntities(entities) {
            const list = document.getElementById('ctxList');
            list.innerHTML = '';

            entities.forEach(entity => {
                const card = document.createElement('div');
                card.className = 'ctx-card' + (entity.isCurrent ? ' current' : '');

                // Icon
                const icon = document.createElement('div');
                icon.className = 'ctx-icon';
                const iconEl = document.createElement('i');
                iconEl.className = 'bi bi-building';
                icon.appendChild(iconEl);

                // Info
                const info = document.createElement('div');
                info.className = 'ctx-info';

                const name = document.createElement('div');
                name.className = 'ctx-name';
                name.textContent = entity.entityName || entity.entityId; // textContent آمن

                const meta = document.createElement('div');
                meta.className = 'ctx-meta';

                const roleBadge = document.createElement('span');
                roleBadge.className = 'ctx-badge';
                roleBadge.textContent = getRoleLabel(entity.role, entity.userType);

                if (entity.size) {
                    const sizeBadge = document.createElement('span');
                    sizeBadge.className = 'ctx-badge';
                    sizeBadge.textContent = SIZE_LABELS[entity.size] || entity.size;
                    meta.appendChild(sizeBadge);
                }
                if (entity.companyName) {
                    const compBadge = document.createElement('span');
                    compBadge.className = 'ctx-badge';
                    compBadge.textContent = entity.companyName;
                    meta.appendChild(compBadge);
                }
                meta.prepend(roleBadge);

                info.appendChild(name);
                info.appendChild(meta);

                // Current tag
                if (entity.isCurrent) {
                    const tag = document.createElement('div');
                    tag.className = 'ctx-current-tag';
                    const chk = document.createElement('i');
                    chk.className = 'bi bi-check-circle-fill';
                    tag.appendChild(chk);
                    const txt = document.createTextNode(' نشط حالياً');
                    tag.appendChild(txt);
                    info.appendChild(tag);
                }

                // Arrow
                const arrow = document.createElement('i');
                arrow.className = 'bi bi-arrow-left ctx-arrow';

                card.appendChild(icon);
                card.appendChild(info);
                card.appendChild(arrow);

                // Event listener — XSS-safe (لا onclick inline)
                card.addEventListener('click', () => switchEntity(entity.entityId));
                list.appendChild(card);
            });
        }

        // ── تبديل السياق ────────────────────────────────────────
        async function switchEntity(entityId) {
            // شاشة تحميل
            const overlay = document.createElement('div');
            overlay.className = 'ctx-switching';
            const spinner = document.createElement('div');
            spinner.className = 'ctx-spinner';
            const label = document.createElement('span');
            label.textContent = 'جاري التبديل...';
            overlay.appendChild(spinner);
            overlay.appendChild(label);
            document.body.appendChild(overlay);

            try {
                const res = await fetch('/api/auth/switch-entity', {
                    method: 'POST',
                    credentials: 'include',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ entityId })
                });

                if (!res.ok) {
                    const err = await res.json().catch(() => ({}));
                    throw new Error(err.error || 'فشل التبديل');
                }

                // ✅ Cookie تم تحديثها من السيرفر — لا localStorage
                window.location.replace('/dashboard.html');

            } catch (err) {
                overlay.remove();
                renderError(err.message);
            }
        }

        function renderError(msg) {
            const list = document.getElementById('ctxList');
            const div = document.createElement('div');
            div.className = 'ctx-error';
            const icon = document.createElement('i');
            icon.className = 'bi bi-exclamation-triangle';
            const text = document.createTextNode(' ' + (msg || 'خطأ في التحميل — حاول مرة أخرى'));
            div.appendChild(icon);
            div.appendChild(text);
            list.innerHTML = '';
            list.appendChild(div);
        }

        // ── تشغيل ───────────────────────────────────────────────
        fetchEntities();
    </script>
</body>

</html>
