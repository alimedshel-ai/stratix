<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ستارتكس - مخطط جانت</title>
    <meta name="description" content="مخطط جانت — الجدول الزمني البصري للمبادرات والمهام الاستراتيجية">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #667eea;
            --secondary: #764ba2;
            --bg: #0f1117;
            --bg-card: #1a1d2e;
            --text: #e2e8f0;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.08);
            --success: #22c55e;
            --warning: #facc15;
            --danger: #ef4444;
            --info: #38bdf8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            font-family: 'Tajawal', sans-serif;
            color: var(--text);
            min-height: 100vh;
        }

        .top-nav {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            padding: 14px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .top-nav .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            color: white;
            text-decoration: none;
            font-size: 20px;
            font-weight: 700;
        }

        .layout {
            display: flex;
            min-height: calc(100vh - 60px);
        }

        .main-content {
            flex: 1;
            padding: 30px;
            max-width: calc(100% - 220px);
            overflow-x: hidden;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 28px;
        }

        .page-header h1 {
            font-size: 26px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .page-header h1 i {
            color: var(--primary);
        }

        .page-subtitle {
            color: var(--text-muted);
            font-size: 14px;
            margin-top: 4px;
        }

        /* Stats */
        .mini-stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
            margin-bottom: 24px;
        }

        .mini-stat {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 18px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .mini-stat::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
        }

        .mini-stat:nth-child(1)::before {
            background: var(--primary);
        }

        .mini-stat:nth-child(2)::before {
            background: var(--success);
        }

        .mini-stat:nth-child(3)::before {
            background: var(--warning);
        }

        .mini-stat:nth-child(4)::before {
            background: var(--info);
        }

        .ms-value {
            font-size: 28px;
            font-weight: 800;
        }

        .ms-label {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        /* Toolbar */
        .toolbar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            align-items: center;
            flex-wrap: wrap;
        }

        .toolbar select,
        .toolbar input {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 8px 14px;
            color: var(--text);
            font-family: inherit;
            font-size: 13px;
        }

        .toolbar select:focus,
        .toolbar input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .toolbar select option {
            background: var(--bg-card);
        }

        .zoom-btns {
            display: flex;
            gap: 4px;
            margin-right: auto;
        }

        .zoom-btn {
            padding: 6px 14px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-muted);
            font-family: inherit;
            font-size: 12px;
            cursor: pointer;
            transition: all .2s;
        }

        .zoom-btn:hover,
        .zoom-btn.active {
            background: rgba(102, 126, 234, 0.15);
            border-color: var(--primary);
            color: var(--primary);
        }

        /* Gantt */
        .gantt-wrap {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
        }

        .gantt-container {
            display: flex;
            overflow-x: auto;
        }

        .gantt-sidebar {
            min-width: 240px;
            border-left: 1px solid var(--border);
            flex-shrink: 0;
        }

        .gantt-sidebar-header {
            padding: 12px 16px;
            background: rgba(102, 126, 234, 0.1);
            font-size: 13px;
            font-weight: 700;
            border-bottom: 2px solid var(--border);
            height: 52px;
            display: flex;
            align-items: center;
        }

        .gantt-task-row {
            padding: 10px 16px;
            border-bottom: 1px solid var(--border);
            height: 48px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .gantt-task-row:hover {
            background: rgba(102, 126, 234, 0.04);
        }

        .gantt-task-name {
            font-size: 12px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
        }

        .gantt-task-status {
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 6px;
            font-weight: 700;
            white-space: nowrap;
        }

        .status-PLANNED {
            background: rgba(148, 163, 184, 0.12);
            color: var(--text-muted);
        }

        .status-IN_PROGRESS {
            background: rgba(56, 189, 248, 0.12);
            color: var(--info);
        }

        .status-REVIEW {
            background: rgba(250, 204, 21, 0.12);
            color: var(--warning);
        }

        .status-COMPLETED {
            background: rgba(34, 197, 94, 0.12);
            color: var(--success);
        }

        .gantt-timeline {
            flex: 1;
            overflow-x: auto;
        }

        .gantt-months {
            display: flex;
            background: rgba(102, 126, 234, 0.1);
            border-bottom: 2px solid var(--border);
            height: 52px;
        }

        .gantt-month {
            min-width: var(--month-w);
            text-align: center;
            padding: 8px 0;
            font-size: 11px;
            font-weight: 700;
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .gantt-month-label {
            font-size: 12px;
        }

        .gantt-month-year {
            font-size: 9px;
            color: var(--text-muted);
        }

        .gantt-row {
            height: 48px;
            position: relative;
            border-bottom: 1px solid var(--border);
            display: flex;
        }

        .gantt-cell {
            min-width: var(--month-w);
            border-left: 1px solid rgba(255, 255, 255, 0.03);
        }

        .gantt-bar {
            position: absolute;
            top: 12px;
            height: 24px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: 700;
            color: white;
            cursor: pointer;
            transition: all .3s;
            z-index: 2;
            min-width: 20px;
        }

        .gantt-bar:hover {
            transform: scaleY(1.2);
            z-index: 3;
        }

        .gantt-bar.priority-HIGH {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            box-shadow: 0 2px 8px rgba(239, 68, 68, 0.3);
        }

        .gantt-bar.priority-MEDIUM {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            box-shadow: 0 2px 8px rgba(245, 158, 11, 0.3);
        }

        .gantt-bar.priority-LOW {
            background: linear-gradient(135deg, #22c55e, #16a34a);
            box-shadow: 0 2px 8px rgba(34, 197, 94, 0.3);
        }

        .gantt-bar.completed {
            background: linear-gradient(135deg, #6b7280, #4b5563);
            opacity: 0.7;
        }

        .gantt-progress {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.2);
        }

        .gantt-today {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 2px;
            background: var(--danger);
            z-index: 5;
        }

        .gantt-today::after {
            content: 'اليوم';
            position: absolute;
            top: -20px;
            right: -16px;
            font-size: 9px;
            color: var(--danger);
            font-weight: 700;
            white-space: nowrap;
        }

        /* Toast */
        .toast-container {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 9999;
        }

        .toast-msg {
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            animation: slideUp .3s ease;
            margin-top: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(34, 197, 94, 0.9);
            color: white;
        }

        @keyframes slideUp {
            from {
                transform: translateY(20px);
                opacity: 0
            }

            to {
                transform: translateY(0);
                opacity: 1
            }
        }

        .btn-add {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 12px;
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all .3s;
            white-space: nowrap;
        }

        .btn-add:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(102, 126, 234, 0.4);
        }

        @media (max-width:768px) {
            .main-content {
                max-width: 100%;
                padding: 16px;
            }

            .mini-stats {
                grid-template-columns: repeat(2, 1fr);
            }

            .gantt-sidebar {
                min-width: 160px;
            }
        }
    </style>
</head>

<body>
    <nav class="top-nav">
        <a href="/dashboard.html" class="brand"><i class="bi bi-gem"></i> ستارتكس</a>
    </nav>

    <div class="layout">
        <aside class="sidebar"></aside>
        <div class="main-content">
            <div class="page-header">
                <div>
                    <h1><i class="bi bi-calendar-range"></i> مخطط جانت</h1>
                    <p class="page-subtitle">الجدول الزمني البصري — تتبع المبادرات والمهام عبر الزمن</p>
                </div>
            </div>

            <!-- Stats -->
            <div class="mini-stats">
                <div class="mini-stat">
                    <div class="ms-value" id="sTotal">0</div>
                    <div class="ms-label">إجمالي المبادرات</div>
                </div>
                <div class="mini-stat">
                    <div class="ms-value" id="sDone">0</div>
                    <div class="ms-label">مكتملة</div>
                </div>
                <div class="mini-stat">
                    <div class="ms-value" id="sDelayed">0</div>
                    <div class="ms-label">متأخرة</div>
                </div>
                <div class="mini-stat">
                    <div class="ms-value" id="sAvgP">0%</div>
                    <div class="ms-label">متوسط الإنجاز</div>
                </div>
            </div>

            <!-- Toolbar -->
            <div class="toolbar">
                <select id="filterStatus" onchange="render()">
                    <option value="">كل الحالات</option>
                    <option value="PLANNED">مخطط لها</option>
                    <option value="IN_PROGRESS">قيد التنفيذ</option>
                    <option value="REVIEW">مراجعة</option>
                    <option value="COMPLETED">مكتملة</option>
                </select>
                <select id="filterPriority" onchange="render()">
                    <option value="">كل الأولويات</option>
                    <option value="HIGH">عالية</option>
                    <option value="MEDIUM">متوسطة</option>
                    <option value="LOW">منخفضة</option>
                </select>
                <div class="zoom-btns">
                    <button class="zoom-btn active" onclick="setZoom(80,this)">شهر</button>
                    <button class="zoom-btn" onclick="setZoom(160,this)">أسبوع</button>
                    <button class="zoom-btn" onclick="setZoom(40,this)">ربع</button>
                </div>
            </div>

            <!-- Gantt -->
            <div class="gantt-wrap">
                <div class="gantt-container" id="ganttContainer"></div>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/steps-config.js"></script>
    <script src="/js/sidebar.js"></script>

    <script>
        // ══════════════════════════════════════
        // Data
        // ══════════════════════════════════════
        let items = [
            { id: '1', name: 'إطلاق التطبيق الرقمي', status: 'IN_PROGRESS', priority: 'HIGH', progress: 65, start: '2026-01-01', end: '2026-06-30' },
            { id: '2', name: 'التحول الرقمي الداخلي', status: 'IN_PROGRESS', priority: 'HIGH', progress: 78, start: '2025-10-01', end: '2026-04-30' },
            { id: '3', name: 'توسيع الفريق التقني', status: 'IN_PROGRESS', priority: 'MEDIUM', progress: 50, start: '2026-01-15', end: '2026-08-31' },
            { id: '4', name: 'برنامج ولاء العملاء', status: 'IN_PROGRESS', priority: 'MEDIUM', progress: 35, start: '2026-02-01', end: '2026-07-31' },
            { id: '5', name: 'شهادة ISO 9001', status: 'REVIEW', priority: 'HIGH', progress: 88, start: '2025-06-01', end: '2026-03-31' },
            { id: '6', name: 'دخول السوق الخليجي', status: 'REVIEW', priority: 'MEDIUM', progress: 70, start: '2025-11-01', end: '2026-02-28' },
            { id: '7', name: 'منصة التقارير الذكية', status: 'PLANNED', priority: 'HIGH', progress: 0, start: '2026-04-01', end: '2026-10-31' },
            { id: '8', name: 'تدريب القيادات', status: 'PLANNED', priority: 'MEDIUM', progress: 0, start: '2026-05-01', end: '2026-12-31' },
            { id: '9', name: 'تحسين سلسلة التوريد', status: 'COMPLETED', priority: 'HIGH', progress: 100, start: '2025-06-01', end: '2025-12-31' },
            { id: '10', name: 'إعادة تصميم الهوية', status: 'COMPLETED', priority: 'LOW', progress: 100, start: '2025-08-01', end: '2025-11-30' },
        ];

        let monthWidth = 80;
        const today = new Date();
        const MONTHS_AR = ['يناير', 'فبراير', 'مارس', 'أبريل', 'مايو', 'يونيو', 'يوليو', 'أغسطس', 'سبتمبر', 'أكتوبر', 'نوفمبر', 'ديسمبر'];
        const STATUS_LABELS = { PLANNED: 'مخطط', IN_PROGRESS: 'جاري', REVIEW: 'مراجعة', COMPLETED: 'مكتمل' };

        function setZoom(w, btn) {
            monthWidth = w;
            document.querySelectorAll('.zoom-btn').forEach(b => b.classList.remove('active'));
            if (btn) btn.classList.add('active');
            render();
        }

        // ══════════════════════════════════════
        // Render
        // ══════════════════════════════════════
        function render() {
            const statusFilter = document.getElementById('filterStatus').value;
            const prioFilter = document.getElementById('filterPriority').value;
            let filtered = items.filter(i => {
                if (statusFilter && i.status !== statusFilter) return false;
                if (prioFilter && i.priority !== prioFilter) return false;
                return true;
            });

            // Stats
            document.getElementById('sTotal').textContent = items.length;
            document.getElementById('sDone').textContent = items.filter(i => i.status === 'COMPLETED').length;
            const delayed = items.filter(i => i.status !== 'COMPLETED' && new Date(i.end) < today).length;
            document.getElementById('sDelayed').textContent = delayed;
            const avgP = items.length ? Math.round(items.reduce((s, i) => s + i.progress, 0) / items.length) : 0;
            document.getElementById('sAvgP').textContent = avgP + '%';

            // Timeline range
            const allDates = filtered.flatMap(i => [new Date(i.start), new Date(i.end)]);
            if (!allDates.length) { document.getElementById('ganttContainer').innerHTML = '<div style="padding:40px;text-align:center;color:var(--text-muted)">لا توجد مبادرات</div>'; return; }
            let minDate = new Date(Math.min(...allDates));
            let maxDate = new Date(Math.max(...allDates));
            minDate = new Date(minDate.getFullYear(), minDate.getMonth(), 1);
            maxDate = new Date(maxDate.getFullYear(), maxDate.getMonth() + 2, 0);

            const months = [];
            let d = new Date(minDate);
            while (d <= maxDate) {
                months.push({ year: d.getFullYear(), month: d.getMonth() });
                d.setMonth(d.getMonth() + 1);
            }
            const totalWidth = months.length * monthWidth;

            // Sidebar
            let sidebar = `<div class="gantt-sidebar">
                <div class="gantt-sidebar-header">المبادرة</div>
                ${filtered.map(i => `<div class="gantt-task-row">
                    <span class="gantt-task-name" title="${i.name}">${i.name}</span>
                    <span class="gantt-task-status status-${i.status}">${STATUS_LABELS[i.status]}</span>
                </div>`).join('')}
            </div>`;

            // Timeline headers
            let timeline = `<div class="gantt-timeline" style="--month-w:${monthWidth}px">
                <div class="gantt-months" style="width:${totalWidth}px">
                    ${months.map(m => `<div class="gantt-month">
                        <span class="gantt-month-label">${MONTHS_AR[m.month]}</span>
                        <span class="gantt-month-year">${m.year}</span>
                    </div>`).join('')}
                </div>`;

            // Bars
            const timelineStart = minDate.getTime();
            const timelineMs = maxDate.getTime() - timelineStart;
            const pxPerMs = totalWidth / timelineMs;

            // Today line
            const todayX = (today.getTime() - timelineStart) * pxPerMs;
            const showToday = todayX > 0 && todayX < totalWidth;

            filtered.forEach(item => {
                const s = new Date(item.start).getTime();
                const e = new Date(item.end).getTime();
                const left = Math.max(0, (s - timelineStart) * pxPerMs);
                const width = Math.max(20, (e - s) * pxPerMs);
                const barClass = item.status === 'COMPLETED' ? 'completed' : `priority-${item.priority}`;
                const isLate = item.status !== 'COMPLETED' && new Date(item.end) < today;

                timeline += `<div class="gantt-row" style="width:${totalWidth}px">
                    ${months.map(() => `<div class="gantt-cell" style="min-width:${monthWidth}px"></div>`).join('')}
                    <div class="gantt-bar ${barClass}" style="right:${left}px;width:${width}px" title="${item.name} — ${item.progress}%${isLate ? ' ⚠️ متأخر' : ''}">
                        <div class="gantt-progress" style="width:${item.progress}%"></div>
                        <span style="position:relative;z-index:1">${item.progress}%${isLate ? ' ⚠️' : ''}</span>
                    </div>
                    ${showToday ? `<div class="gantt-today" style="right:${todayX}px"></div>` : ''}
                </div>`;
            });

            timeline += '</div>';
            document.getElementById('ganttContainer').innerHTML = sidebar + timeline;
        }

        render();
    </script>
</body>

</html>
