<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ستارتكس — التقرير التشخيصي التفاعلي</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap"
        rel="stylesheet">
    <link href="/assets/css/diagnostic.css" rel="stylesheet">
    <style>
        .interactive-report {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 32px;
            margin-bottom: 24px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
            animation: slideUp 0.6s cubic-bezier(0.4, 0, 0.2, 1) both;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .maturity-box {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
        }

        .maturity-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.1rem;
            margin-bottom: 16px;
            color: var(--text);
        }

        .maturity-header .score-value {
            font-size: 1.5rem;
            font-weight: 900;
        }

        .diag-stx-progress-bg {
            height: 12px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 12px;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        .diag-stx-progress-fill {
            height: 100%;
            width: 0%;
            border-radius: 10px;
            transition: width 1.5s cubic-bezier(0.4, 0, 0.2, 1), background 0.5s ease;
        }

        .maturity-label {
            font-size: 0.9rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .ai-insight-box {
            background: rgba(102, 126, 234, 0.05);
            border-left: 4px solid #667eea;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 32px;
            position: relative;
        }

        .ai-icon {
            font-weight: 800;
            color: #667eea;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1.05rem;
        }

        .ai-text {
            color: rgba(255, 255, 255, 0.85);
            font-size: 0.95rem;
            line-height: 1.7;
            margin: 0;
        }

        .hooks-section {
            position: relative;
            background: rgba(255, 255, 255, 0.01);
            border-radius: 16px;
            padding: 24px;
            border: 1px dashed rgba(255, 255, 255, 0.1);
            overflow: hidden;
        }

        .hooks-title {
            font-size: 1.1rem;
            font-weight: 800;
            margin-bottom: 16px;
            color: #fca5a5;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tools-showcase {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            filter: blur(4px) opacity(0.5);
            pointer-events: none;
            user-select: none;
            transition: filter 0.3s;
        }

        .mock-tool-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .mock-tool-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        .mock-tool-name {
            font-weight: 700;
            font-size: 0.95rem;
            color: white;
        }

        .register-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(to top, var(--bg) 10%, transparent);
            z-index: 2;
            text-align: center;
            padding: 20px;
        }

        .register-overlay i.bi-lock-fill {
            font-size: 2rem;
            color: #fca5a5;
            margin-bottom: 12px;
            text-shadow: 0 4px 15px rgba(248, 113, 113, 0.5);
        }

        .register-overlay p {
            font-size: 1rem;
            font-weight: 700;
            color: white;
            margin-bottom: 16px;
        }
    </style>
</head>

<body class="diagnostic-page">
    <div class="diag-header">
        <a href="/" class="diag-logo"><i class="bi bi-activity"></i> Startix</a>
        <div class="diag-subtitle">التقرير التشخيصي</div>
    </div>
    <div class="diag-container">
        <!-- التقرير التفاعلي الذكي -->
        <div class="interactive-report" id="interactiveReport">
            <div style="text-align:center; margin-bottom: 24px;">
                <div class="diag-result-emoji" id="resultEmoji">✨</div>
                <div class="diag-result-name" id="resultName" style="font-size: 1.5rem;">جاري تحليل البيانات...</div>
                <div class="diag-result-subtitle" id="resultSubtitle" style="color:var(--text-muted); margin-top:8px;">
                </div>
            </div>

            <!-- 1. مؤشر النضج -->
            <div class="maturity-box" id="maturitySection" style="display: none;">
                <div class="maturity-header">
                    <span>مؤشر الاستقرار والجاهزية</span>
                    <span id="maturityPercent" class="score-value">0%</span>
                </div>
                <div class="diag-stx-progress-bg">
                    <div id="maturityBar" class="diag-stx-progress-fill"></div>
                </div>
                <div class="maturity-label" id="maturityLabelContainer">
                    <i id="maturityIcon" class="bi"></i>
                    <span id="maturityText" style="margin-right: 6px;">جاري الحساب...</span>
                </div>
            </div>

            <!-- 2. تقرير الخبير -->
            <div class="ai-insight-box" id="aiSection" style="display: none;">
                <div class="ai-icon"><i class="bi bi-magic"></i> المشخّص الاستراتيجي:</div>
                <p class="ai-text" id="aiInsightText"></p>
            </div>

            <!-- 3. المنهجيات المقترحة (The Hook) -->
            <div class="hooks-section" id="hookSection" style="display: none;">
                <h4 class="hooks-title"><i class="bi bi-prescription2"></i> روشتة العلاج المعلقة:</h4>
                <div class="tools-showcase" id="recommendedToolsGrid"></div>

                <div class="register-overlay">
                    <i class="bi bi-lock-fill"></i>
                    <p>هذا التقرير هو البداية فقط. احفظ تقريرك وافتح أدوات العلاج لشركتك الآن.</p>
                    <button class="diag-btn diag-btn-primary action-btn" data-action="accept-path"
                        style="width: auto; padding: 12px 32px; box-shadow: 0 8px 25px rgba(102,126,234,0.4);">
                        <i class="bi bi-rocket-takeoff"></i> أنشئ حسابك مجاناً
                    </button>
                </div>
            </div>
        </div>

        <div style="display:flex; gap:12px; margin-top:20px; flex-wrap:wrap; justify-content:center;">
            <button class="diag-btn diag-btn-secondary action-btn" data-action="change-path"><i
                    class="bi bi-arrow-repeat"></i> غيّر المسار يدوياً</button>
            <button class="diag-btn diag-btn-secondary action-btn" data-action="select-comprehensive"><i
                    class="bi bi-compass"></i> المسار الشامل</button>
            <button class="diag-btn diag-btn-ghost action-btn" data-action="go-back"><i class="bi bi-arrow-right"></i>
                إعادة التشخيص</button>
        </div>

        <!-- قسم تغيير المسار (مخفي) -->
        <div id="changePathSection" style="display:none; margin-top:32px;">
            <h3 style="color:#fff; font-size:1.2rem; font-weight:700; margin-bottom:20px; text-align:center;">اختر
                المسار الذي تريده:</h3>
            <div class="diag-cards" id="allPathsGrid"
                style="grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));"></div>
        </div>
    </div>

    <script src="/assets/js/path-engine.js"></script>
    <script src="/assets/js/diagnostic-engine.js"></script>
    <script>
        let currentResult = null;

        document.addEventListener('DOMContentLoaded', function () {
            currentResult = DiagnosticEngine.getFromSession();
            if (!currentResult) {
                window.location.href = '/select-type';
                return;
            }
            renderInteractiveReport(currentResult);
            setupActionListeners();
        });

        // 🛡️ ترياق الـ XSS
        function escapeHtml(unsafe) {
            if (!unsafe) return '';
            return String(unsafe)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        const SECTORS = { tech: 'تقنية وبرمجيات', consulting: 'استشارات', admin: 'إداري', ecommerce: 'تجارة إلكترونية', retail: 'تجزئة', food: 'مطاعم', realestate: 'عقارات', manufacturing: 'صناعة', construction: 'مقاولات', logistics: 'لوجستيات', gov_services: 'خدمات حكومية', npo_charity: 'جمعيات خيرية' };
        const SIZES = { '1-5': 'صغير جداً (1-5)', '6-30': 'صغير (6-30)', '31-200': 'متوسط (31-200)', '200+': 'كبير (200+)' };
        const CHALLENGES = { organizational: 'الفوضى التنظيمية', financial: 'الضغوط المالية', competitive: 'المنافسة الشرسة', operational: 'هدر العمليات', crisis: 'الأزمات الطارئة' };

        function setupActionListeners() {
            document.querySelectorAll('.action-btn').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.preventDefault();
                    const action = this.getAttribute('data-action');
                    switch(action) {
                        case 'accept-path': acceptPath(); break;
                        case 'change-path': changePath(); break;
                        case 'select-comprehensive': selectComprehensive(); break;
                        case 'go-back': goBackToDiag(); break;
                    }
                });
            });
            
            document.getElementById('allPathsGrid').addEventListener('click', function(e) {
                const card = e.target.closest('.diag-card');
                if(card) {
                    const pathKey = card.getAttribute('data-path');
                    if(pathKey) selectPath(pathKey);
                }
            });
        }

        function renderInteractiveReport(result) {
            const ans = result.answers || {};
            
            // تحديث العناوين الأساسية
            if (result.category === 'owner') {
                const pathDef = (typeof PathEngine !== 'undefined' && PathEngine.PATH_DEFINITIONS) ? PathEngine.PATH_DEFINITIONS[result.patternKey] : null;
                document.getElementById('resultEmoji').textContent = pathDef ? pathDef.emoji : '✨';
                document.getElementById('resultName').textContent = pathDef ? pathDef.name : result.patternKey;
                const variant = result.variant || DiagnosticEngine.getSizeVariant(result.patternKey, result.sizeCategory);
                document.getElementById('resultSubtitle').textContent = variant.subtitle || result.reason;
            } else {
                document.getElementById('resultEmoji').textContent = result.emoji || '🎯';
                document.getElementById('resultName').textContent = result.name || 'مسار مهني';
                document.getElementById('resultSubtitle').textContent = result.reason || '';
            }

            document.getElementById('maturitySection').style.display = 'block';
            document.getElementById('aiSection').style.display = 'block';
            document.getElementById('hookSection').style.display = 'block';

            // حوسبة المؤشر
            let score = 50;
            if(ans.maturity === 'nascent') score -= 15;
            if(ans.maturity === 'mature') score += 20;
            if(ans.organization === 'none') score -= 25;
            if(ans.organization === 'advanced') score += 25;
            
            const challengesArr = Array.isArray(ans.challenge) ? ans.challenge : [ans.challenge];
            if(challengesArr.includes('financial')) score -= 20;
            if(challengesArr.includes('crisis')) score -= 30;

            score = Math.max(15, Math.min(score, 98));

            setTimeout(() => {
                const bar = document.getElementById('maturityBar');
                const mText = document.getElementById('maturityText');
                const mIcon = document.getElementById('maturityIcon');
                document.getElementById('maturityPercent').textContent = score + '%';
                
                bar.style.width = score + '%';

                if(score < 40) {
                    bar.style.background = 'linear-gradient(90deg, #ef4444, #fca5a5)';
                    mIcon.className = 'bi bi-exclamation-triangle-fill';
                    mText.textContent = ' منطقة خطر — الشركة بحاجة لتدخل إنقاذي عاجل للحد من التدهور.';
                    mText.style.color = '#fca5a5'; mIcon.style.color = '#fca5a5';
                    bar.style.boxShadow = '0 0 15px rgba(239,68,68,0.5)';
                } else if(score < 75) {
                    bar.style.background = 'linear-gradient(90deg, #f59e0b, #fcd34d)';
                    mIcon.className = 'bi bi-info-circle-fill';
                    mText.textContent = ' وضع مستقر نسبياً — ولكن ينقصه التنظيم المؤسسي الصلب لمنع التخبط.';
                    mText.style.color = '#fcd34d'; mIcon.style.color = '#fcd34d';
                    bar.style.boxShadow = '0 0 15px rgba(245,158,11,0.5)';
                } else {
                    bar.style.background = 'linear-gradient(90deg, #10b981, #6ee7b7)';
                    mIcon.className = 'bi bi-check-circle-fill';
                    mText.textContent = ' نضج مؤسسي عالي — حان وقت التوسع واقتناص الفرص البديلة والابتكار.';
                    mText.style.color = '#6ee7b7'; mIcon.style.color = '#6ee7b7';
                    bar.style.boxShadow = '0 0 15px rgba(16,185,129,0.5)';
                }
            }, 300);

            // 🛡️ توليد الجملة بالاعتماد حصراً على TextNode و CreateElement 
            const primaryChallengeRaw = challengesArr[0] || 'organizational';
            const sectorStr = escapeHtml(SECTORS[ans.activity] || 'القطاع الخاص');
            const sizeStr = escapeHtml(SIZES[ans.size] || 'المكون من ' + (ans.size || ''));
            const chalStr = escapeHtml(CHALLENGES[primaryChallengeRaw] || 'التحدي الإداري');

            let customAdvice = "تحتاج لخطط استراتيجية مستقبلية.";
            let tools = [];
            
            if(primaryChallengeRaw === 'financial' || primaryChallengeRaw === 'crisis') {
                customAdvice = " سترتكس ترى أن الاستمرار بهذا النزيف سيؤدي لخسائر كارثية قريباً. ننصحك بإجراء اختبار ضغط فوري وإعادة هندسة سلسلة القيمة لديك لإيقاف الهدر المالي كخطوة أولى.";
                tools = [ { icon: '⚡', name: 'اختبار الضغط الاستراتيجي', color: '#ef4444' }, { icon: '🔗', name: 'تحليل سلسلة القيمة', color: '#0891b2' } ];
            } else if (primaryChallengeRaw === 'organizational' || primaryChallengeRaw === 'operational') {
                customAdvice = " غياب التنظيم يخنق إنتاجية فريقك. لا تقم بالتوظيف العشوائي الآن، بل استخدم المصفوفات الإدارية لتوضيح الأهداف وقياس أداء كل قسم بدقة من خلال لوحة أهداف شفافة.";
                tools = [ { icon: '🎯', name: 'مصفوفة بناء الأهداف OKRs', color: '#ec4899' }, { icon: '🟩', name: 'تحليل الفجوات SWOT', color: '#22c55e' } ];
            } else {
                customAdvice = " لديك فرصة عظيمة للسيطرة على السوق لو قمت بإعادة توجيه استراتيجيتك ومراقبة تحركات المنافسين ومخاطرهم بعمق، قبل ضخ ميزانيات إضافية.";
                tools = [ { icon: '⚔️', name: 'قوى بورتر للمنافسة', color: '#f59e0b' }, { icon: '🗺️', name: 'الخريطة الاستراتيجية', color: '#8b5cf6' } ];
            }

            const pInsight = document.getElementById('aiInsightText');
            pInsight.innerHTML = ''; 

            pInsight.appendChild(document.createTextNode("بصفتك تدير مشروعاً في نشاط "));
            const s1 = document.createElement('strong'); s1.textContent = sectorStr; pInsight.appendChild(s1);
            
            pInsight.appendChild(document.createTextNode(" بفريق "));
            const s2 = document.createElement('strong'); s2.textContent = sizeStr; pInsight.appendChild(s2);

            pInsight.appendChild(document.createTextNode("، فإن ما تواجهه من "));
            const s3 = document.createElement('strong'); s3.textContent = chalStr; pInsight.appendChild(s3);

            pInsight.appendChild(document.createTextNode(" هو أمر مقلق لكنه قابل للحل." + customAdvice));

            // 🛡️ إنشاء الـ Tools Grid بطريقة آمنة تماماً ولا تستخدم إلا DOM API
            const toolsGrid = document.getElementById('recommendedToolsGrid');
            toolsGrid.innerHTML = '';
            tools.forEach(t => {
                const card = document.createElement('div');
                card.className = 'mock-tool-card';
                card.style.borderLeft = `3px solid ${escapeHtml(t.color)}`;
                
                const iconSpan = document.createElement('span');
                iconSpan.className = 'mock-tool-icon';
                iconSpan.style.color = escapeHtml(t.color);
                iconSpan.style.background = `${escapeHtml(t.color)}15`;
                iconSpan.textContent = escapeHtml(t.icon);
                
                const nameSpan = document.createElement('span');
                nameSpan.className = 'mock-tool-name';
                nameSpan.textContent = escapeHtml(t.name);
                
                card.appendChild(iconSpan);
                card.appendChild(nameSpan);
                toolsGrid.appendChild(card);
            });
        }

        function acceptPath() {
            if (currentResult) DiagnosticEngine.saveToSession(currentResult);
            window.location.href = '/login?tab=signup&from=diagnostic';
        }

        function changePath() {
            const section = document.getElementById('changePathSection');
            if (section.style.display === 'none') {
                section.style.display = 'block';
                renderAllPaths();
                section.scrollIntoView({ behavior: 'smooth' });
            } else {
                section.style.display = 'none';
            }
        }

        // 100/100: DocumentFragment + createElement بالكامل
        function renderAllPaths() {
            const grid = document.getElementById('allPathsGrid');
            grid.innerHTML = ''; 
            if (typeof PathEngine === 'undefined' || !PathEngine.PATH_DEFINITIONS) return;

            const defs = PathEngine.PATH_DEFINITIONS;
            const fragment = document.createDocumentFragment();

            Object.entries(defs).forEach(([key, def]) => {
                const isActive = currentResult && currentResult.patternKey === key;
                
                const card = document.createElement('div');
                card.className = `diag-card ${isActive ? 'selected' : ''}`;
                card.setAttribute('data-path', key);
                card.style.padding = '24px 16px';
                card.style.cursor = 'pointer';

                const emoji = document.createElement('span');
                emoji.className = 'diag-card-emoji';
                emoji.style.fontSize = '2rem';
                emoji.textContent = def.emoji || '';

                const title = document.createElement('div');
                title.className = 'diag-card-title';
                title.style.fontSize = '1rem';
                title.textContent = def.name || '';

                const desc = document.createElement('div');
                desc.className = 'diag-card-desc';
                desc.style.fontSize = '0.8rem';
                desc.textContent = def.description || '';

                const badgeContainer = document.createElement('div');
                badgeContainer.style.marginTop = '8px';
                
                const badge = document.createElement('span');
                badge.className = 'diag-step-badge';
                badge.style.fontSize = '0.75rem';
                
                const clockIcon = document.createElement('i');
                clockIcon.className = 'bi bi-clock';
                badge.appendChild(clockIcon);
                badge.appendChild(document.createTextNode(' ' + (def.estimatedTime || '')));

                badgeContainer.appendChild(badge);
                
                card.appendChild(emoji);
                card.appendChild(title);
                card.appendChild(desc);
                card.appendChild(badgeContainer);
                
                fragment.appendChild(card);
            });
            
            grid.appendChild(fragment);
        }

        function selectPath(patternKey) {
            const pathDef = PathEngine.PATH_DEFINITIONS[patternKey];
            if (!pathDef) return;

            currentResult = {
                ...currentResult,
                patternKey,
                reason: 'اخترت مساراً مخصصاً ليتوافق بدقة مع تطلعاتك الشخصية.',
                variant: DiagnosticEngine.getSizeVariant(patternKey, currentResult?.sizeCategory || 'medium'),
            };

            DiagnosticEngine.saveToSession(currentResult);
            document.getElementById('changePathSection').style.display = 'none';
            renderInteractiveReport(currentResult);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function selectComprehensive() {
            selectPath('default_strategic');
        }

        function goBackToDiag() {
            const cat = currentResult?.category || sessionStorage.getItem('diagnosticCategory') || 'owner';
            switch (cat) {
                case 'owner': window.location.href = '/diagnostic-owner'; break;
                case 'manager': window.location.href = '/diagnostic-manager'; break;
                case 'investor': window.location.href = '/diagnostic-investor'; break;
                default: window.location.href = '/select-type';
            }
        }
    </script>
</body>

</html>
