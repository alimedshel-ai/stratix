<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الاستكشاف العميق | Stratix</title>

    <script>
        // Redirect logic for departments with specialized pages
        const params = new URLSearchParams(window.location.search);
        const dept = params.get('dept');
        const customPages = ['hr']; // Finance and Sales are now integrated or will be modernized
        if (dept && customPages.includes(dept)) {
            window.location.replace(`/${dept}-deep.html${window.location.search}`);
        }
    </script>

    <!-- UI Core -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap"
        rel="stylesheet">

    <!-- Stratix Design System -->
    <link rel="stylesheet" href="/css/shared.css">
    <link rel="stylesheet" href="/css/dept-pages.css">

    <style>
        :root {
            --stx-bg: #0b0d12;
            --stx-card: rgba(22, 27, 34, 0.7);
            --stx-border: rgba(255, 255, 255, 0.08);
            --stx-primary: #818cf8;
            --stx-secondary: #2dd4bf;
            --stx-accent: #f472b6;
        }

        body {
            background-color: var(--stx-bg);
            color: #f8fafc;
            font-family: 'Tajawal', sans-serif;
            overflow: hidden;
            margin: 0;
        }

        .stx-wrapper {
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .stx-sidebar-container {
            width: 260px;
            flex-shrink: 0;
            border-left: 1px solid var(--stx-border);
            background: #11141d;
        }

        .stx-main-content {
            flex: 1;
            overflow-y: auto;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Premium Header */
        .stx-header {
            background: rgba(11, 13, 18, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--stx-border);
            padding: 16px 32px;
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .stx-header h1 {
            font-size: 1.25rem;
            font-weight: 800;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .stx-header h1 span#deptBadge {
            font-size: 0.9rem;
            background: rgba(129, 140, 248, 0.1);
            color: var(--stx-primary);
            padding: 4px 12px;
            border-radius: 12px;
            border: 1px solid rgba(129, 140, 248, 0.2);
        }

        /* Journey Progress Banner */
        .stx-journey-banner {
            background: linear-gradient(90deg, rgba(129, 140, 248, 0.08) 0%, rgba(45, 212, 191, 0.08) 100%);
            border-bottom: 1px solid var(--stx-border);
            padding: 10px 32px;
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 0.85rem;
        }

        .phase-badge {
            background: rgba(129, 140, 248, 0.15);
            color: var(--stx-primary);
            padding: 2px 10px;
            border-radius: 20px;
            font-weight: 700;
            border: 1px solid rgba(129, 140, 248, 0.2);
        }

        /* Tabs & Stepper */
        .stx-nav-container {
            padding: 24px 32px 0;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .dept-tabs {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 8px;
        }

        .dept-tab {
            background: var(--stx-card);
            border: 1px solid var(--stx-border);
            color: #94a3b8;
            padding: 10px 20px;
            border-radius: 14px;
            cursor: pointer;
            white-space: nowrap;
            font-weight: 600;
            font-size: 0.85rem;
            transition: all 0.3s;
        }

        .dept-tab.active {
            background: var(--stx-primary);
            color: white;
            border-color: transparent;
            box-shadow: 0 4px 12px rgba(129, 140, 248, 0.2);
        }

        .dept-tab.done {
            border-color: rgba(34, 197, 94, 0.3);
            color: #22c55e;
        }

        .stepper {
            display: flex;
            gap: 12px;
            padding: 0 32px 20px;
            border-bottom: 1px solid var(--stx-border);
            overflow-x: auto;
        }

        .step {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #64748b;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.8rem;
            transition: all 0.2s;
            white-space: nowrap;
            opacity: 0.6;
        }

        .step.active {
            opacity: 1;
            color: var(--stx-primary);
        }

        .step.done {
            opacity: 1;
            color: #22c55e;
        }

        .step-num {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
        }

        .step.active .step-num {
            background: var(--stx-primary);
            color: white;
        }

        /* Main Content Grid */
        #mainContent {
            padding: 32px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        .acc-group {
            background: var(--stx-card);
            border: 1px solid var(--stx-border);
            border-radius: 20px;
            margin-bottom: 16px;
            overflow: hidden;
            backdrop-filter: blur(12px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .acc-header {
            padding: 20px 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            cursor: pointer;
        }

        .acc-icon {
            font-size: 1.5rem;
            width: 44px;
            height: 44px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .acc-info h4 {
            font-size: 1rem;
            font-weight: 800;
            margin-bottom: 4px;
        }

        .acc-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.75rem;
            color: #94a3b8;
        }

        .acc-priority {
            padding: 2px 8px;
            border-radius: 6px;
            font-weight: 800;
            text-transform: uppercase;
        }

        .acc-body {
            display: none;
            padding: 24px;
            border-top: 1px solid var(--stx-border);
            background: rgba(0, 0, 0, 0.1);
        }

        .acc-group.acc-open .acc-body {
            display: block;
        }

        /* Question Styles */
        .question-block {
            margin-bottom: 32px;
        }

        .question-label {
            font-size: 0.95rem;
            font-weight: 700;
            margin-bottom: 16px;
            color: #f1f5f9;
        }

        .radio-option,
        .check-option {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--stx-border);
            padding: 14px 18px;
            border-radius: 14px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .radio-option:hover,
        .check-option:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(129, 140, 248, 0.3);
        }

        .radio-option.selected,
        .check-option.selected {
            background: rgba(129, 140, 248, 0.1);
            border-color: var(--stx-primary);
            color: var(--stx-primary);
        }

        /* Legacy Compatibility & Extensions */
        .card {
            background: var(--stx-card);
            border: 1px solid var(--stx-border);
            border-radius: 20px;
            padding: 32px;
            margin-bottom: 24px;
            backdrop-filter: blur(12px);
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: 800;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .card-sub {
            font-size: 0.9rem;
            color: #94a3b8;
            margin-bottom: 24px;
        }

        .status-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--stx-border);
            padding: 20px;
            border-radius: 16px;
            text-align: center;
        }

        .s-label {
            font-size: 0.75rem;
            color: #94a3b8;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .s-value {
            font-size: 1.75rem;
            font-weight: 900;
            margin-bottom: 4px;
        }

        .s-sub {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .progress-bar {
            height: 6px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            border-radius: 10px;
            transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .info-box {
            display: flex;
            gap: 12px;
            padding: 16px 20px;
            border-radius: 12px;
            font-size: 0.85rem;
            line-height: 1.6;
            margin-bottom: 16px;
        }

        .info-box.info {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.2);
            color: #60a5fa;
        }

        .info-box.warning {
            background: rgba(245, 158, 11, 0.1);
            border: 1px solid rgba(245, 158, 11, 0.2);
            color: #fbbf24;
        }

        .sw-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .sw-col-title {
            font-size: 0.85rem;
            font-weight: 800;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sw-col-title.strength {
            color: #22c55e;
        }

        .sw-col-title.weakness {
            color: #ef4444;
        }

        .sw-tag {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--stx-border);
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.8rem;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Accordion Extensions */
        .acc-chevron {
            margin-right: auto;
            transition: transform 0.3s;
        }

        .acc-open .acc-chevron {
            transform: rotate(180deg);
        }

        .acc-importance {
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 24px;
        }

        .acc-importance.prio-critical {
            background: rgba(239, 68, 68, 0.08);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .acc-importance.prio-critical .acc-importance-title {
            color: #ef4444;
        }

        .acc-importance-title {
            font-weight: 800;
            font-size: 0.9rem;
            margin-bottom: 8px;
        }

        .acc-importance-text {
            font-size: 0.8rem;
            color: #cbd5e1;
        }

        .acc-impact-tags {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        .acc-impact-tag {
            background: rgba(255, 255, 255, 0.05);
            color: #94a3b8;
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: 700;
        }

        .diag-progress {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
            background: rgba(255, 255, 255, 0.02);
            padding: 12px 20px;
            border-radius: 12px;
            border: 1px solid var(--stx-border);
        }

        .diag-progress-label {
            font-size: 0.8rem;
            font-weight: 800;
            color: #94a3b8;
        }

        .diag-progress-bar {
            flex: 1;
            height: 8px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            overflow: hidden;
        }

        .diag-progress-fill {
            height: 100%;
            background: var(--stx-primary);
            border-radius: 10px;
        }

        .diag-progress-num {
            font-size: 0.8rem;
            font-weight: 800;
            color: #f8fafc;
        }

        /* Navigation Bar */
        .stx-nav-bar {
            background: rgba(11, 13, 18, 0.9);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--stx-border);
            padding: 20px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            bottom: 0;
            z-index: 1000;
        }

        /* Utilities */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--stx-border);
            border-radius: 10px;
        }
    </style>
</head>

<body>

    <div class="stx-wrapper">
        <aside class="stx-sidebar-container"></aside>

        <main class="stx-main-content">
            <!-- Header -->
            <header class="stx-header">
                <h1>
                    <i class="bi bi-compass text-primary"></i>
                    الاستكشاف العميق للإدارة
                    <span id="deptBadge">🏢 الإدارة العامة</span>
                </h1>
                <div class="d-flex gap-3">
                    <div id="companyLabel" class="text-muted small fw-bold">...</div>
                    <button onclick="save()" class="btn btn-primary btn-sm px-4 rounded-pill">
                        <i class="bi bi-cloud-check me-1"></i> حفظ التقدم
                    </button>
                </div>
            </header>

            <!-- Journey Banner -->
            <div class="stx-journey-banner">
                <span class="phase-badge">المرحلة 2: التشخيص الرقمي</span>
                <i class="bi bi-chevron-left opacity-30"></i>
                <div class="d-flex align-items-center gap-2">
                    <span class="text-white fw-bold">المساحة التشخيصية المتكاملة</span>
                </div>
            </div>

            <!-- Smart Guide Hook -->
            <div id="smartGuideCard" class="px-4 mt-3" style="display: none;"></div>

            <!-- Tabs Container -->
            <div class="stx-nav-container">
                <div class="dept-tabs" id="deptTabs"></div>
            </div>

            <!-- Phase Stepper -->
            <div class="stepper" id="stepperEl"></div>

            <!-- Content Area -->
            <div id="mainContent">
                <div class="text-center py-5">
                    <div class="spinner-border text-primary" role="status"></div>
                    <p class="mt-3 text-muted">جاري تحميل مساحة العمل الرقمية...</p>
                </div>
            </div>

            <!-- Bottom Navigation -->
            <div class="stx-nav-bar" id="navBar"></div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="/js/api.js"></script>
    <script src="/js/context-manager.js"></script>
    <script src="/js/dept-page.js"></script>
    <script src="/js/steps-config.js"></script>
    <script src="/js/sidebar.js"></script>
    <script src="/js/smart-guide.js"></script>
    <script src="/js/dept-deep.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Sidebar Init
            if (window.Sidebar && Sidebar.init) Sidebar.init();

            // Smart Guide Init
            if (typeof SmartGuide !== 'undefined') {
                const user = JSON.parse(localStorage.getItem('user') || '{}');
                const isDeptManager = user.userType === 'DEPT_MANAGER' || (user.userCategory && user.userCategory.startsWith('DEPT_'));
                SmartGuide.render('smartGuideCard', isDeptManager ? 'dept' : 'owner');
            }
        });

        // Bridge to dept-deep.js logic if needed (it already handles most things)
    </script>

</body>

</html>
