<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ستارتكس — استكشاف الإدارات العميق</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #0a0d14;
            --bg-card: #141825;
            --bg-card-hover: #1a2035;
            --text: #e2e8f0;
            --text-muted: #8b8ba7;
            --border: rgba(255, 255, 255, 0.07);
            --green: #22c55e;
            --green-glow: rgba(34, 197, 94, 0.12);
            --yellow: #f59e0b;
            --yellow-glow: rgba(245, 158, 11, 0.12);
            --red: #ef4444;
            --red-glow: rgba(239, 68, 68, 0.12);
            --blue: #3b82f6;
            --blue-glow: rgba(59, 130, 246, 0.12);
            --purple: #a78bfa;
            --purple-glow: rgba(167, 139, 250, 0.12);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px 20px 80px;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse at 20% 10%, rgba(124, 58, 237, 0.07) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 90%, rgba(59, 130, 246, 0.05) 0%, transparent 50%);
            z-index: 0;
            pointer-events: none;
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 760px;
        }

        /* ── Header ── */
        .page-header {
            text-align: center;
            margin-bottom: 28px;
            animation: fadeIn .4s ease;
        }

        .logo-text {
            font-size: 20px;
            font-weight: 900;
            background: linear-gradient(135deg, #a78bfa, #38bdf8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 6px;
        }

        .page-title {
            font-size: 22px;
            font-weight: 800;
            margin-bottom: 4px;
        }

        .dept-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 5px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 700;
            border: 1px solid transparent;
            margin-top: 8px;
        }

        /* ── Dept Tabs ── */
        .dept-tabs {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 24px;
            animation: fadeIn .4s ease;
        }

        .dept-tab {
            padding: 7px 14px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text-muted);
            font-family: 'Tajawal', sans-serif;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all .2s;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .dept-tab:hover {
            border-color: rgba(255, 255, 255, .15);
            color: var(--text);
        }

        .dept-tab.active {
            color: #fff;
        }

        .dept-tab.done::after {
            content: '✓';
            margin-right: 4px;
            opacity: .8;
        }

        /* ── Section Stepper ── */
        .stepper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0;
            margin-bottom: 28px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 12px 16px;
            animation: fadeIn .4s ease;
        }

        .step {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            flex: 1;
            position: relative;
            cursor: pointer;
        }

        .step:not(:last-child)::after {
            content: '';
            position: absolute;
            top: 16px;
            left: -50%;
            width: 100%;
            height: 2px;
            background: var(--border);
            z-index: 0;
        }

        .step.done:not(:last-child)::after {
            background: rgba(34, 197, 94, .4);
        }

        .step-num {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 800;
            position: relative;
            z-index: 1;
            background: var(--bg);
            color: var(--text-muted);
            transition: all .3s;
        }

        .step.active .step-num {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-glow);
        }

        .step.done .step-num {
            background: var(--green);
            border-color: var(--green);
            color: #000;
        }

        .step-label {
            font-size: 10px;
            color: var(--text-muted);
            font-weight: 600;
            text-align: center;
            white-space: nowrap;
        }

        .step.active .step-label {
            color: var(--accent);
        }

        .step.done .step-label {
            color: var(--green);
        }

        /* ── Card ── */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 28px;
            margin-bottom: 20px;
            animation: slideUp .3s ease;
        }

        .card-title {
            font-size: 17px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
        }

        .card-sub {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 20px;
        }

        /* ── Section 1: Status ── */
        .status-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin-bottom: 20px;
        }

        .stat-box {
            background: rgba(255, 255, 255, .03);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
        }

        .stat-box .s-label {
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 600;
            margin-bottom: 6px;
        }

        .stat-box .s-value {
            font-size: 22px;
            font-weight: 900;
        }

        .stat-box .s-sub {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 3px;
        }

        .progress-bar {
            height: 8px;
            background: rgba(255, 255, 255, .06);
            border-radius: 10px;
            overflow: hidden;
            margin: 8px 0;
        }

        .progress-fill {
            height: 100%;
            border-radius: 10px;
            transition: width .6s ease;
        }

        .items-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 7px;
        }

        .items-list li {
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 7px;
        }

        /* ── Section 2: Questions ── */
        .question-block {
            margin-bottom: 24px;
        }

        .section-header {
            margin: 32px 0 16px;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            border-right: 4px solid rgba(96, 165, 250, 0.5);
        }

        .section-header:first-child {
            margin-top: 8px;
        }

        .section-header-top {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .section-icon {
            font-size: 20px;
        }

        .section-title {
            font-size: 15px;
            font-weight: 800;
            color: var(--text);
            flex: 1;
        }

        .section-priority {
            font-size: 10px;
            font-weight: 700;
            padding: 3px 10px;
            border-radius: 20px;
            border: 1px solid;
            letter-spacing: 1px;
        }

        .section-desc {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 6px;
            line-height: 1.6;
        }

        .benchmark-hint {
            font-size: 12px;
            padding: 10px 14px;
            border-radius: 8px;
            margin-top: 10px;
            line-height: 1.7;
        }

        .benchmark-hint.info {
            background: rgba(96, 165, 250, 0.06);
            border: 1px solid rgba(96, 165, 250, 0.15);
            color: var(--text);
        }

        .insight-header {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 4px;
        }

        .insight-icon {
            font-size: 14px;
        }

        .insight-type {
            font-size: 10px;
            font-weight: 700;
            color: #60a5fa;
            background: rgba(96, 165, 250, 0.12);
            padding: 2px 8px;
            border-radius: 4px;
            letter-spacing: 0.5px;
        }

        .insight-fact {
            color: var(--text);
            font-size: 12px;
            line-height: 1.8;
        }

        .insight-tip {
            margin-top: 4px;
            font-size: 11px;
            color: var(--yellow);
            padding-top: 4px;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
        }

        .q-label {
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 10px;
            display: flex;
            align-items: flex-start;
            gap: 7px;
        }

        .q-label .q-num {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: var(--accent-glow);
            border: 1px solid var(--accent);
            color: var(--accent);
            font-size: 11px;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            margin-top: 1px;
        }

        .radio-options,
        .check-options {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .radio-option,
        .check-option {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, .02);
            cursor: pointer;
            transition: all .2s;
            font-size: 13px;
            font-weight: 600;
        }

        .radio-option:hover,
        .check-option:hover {
            border-color: rgba(255, 255, 255, .15);
            background: rgba(255, 255, 255, .04);
        }

        .radio-option.selected,
        .check-option.selected {
            border-color: var(--accent);
            background: var(--accent-glow);
            color: var(--text);
        }

        .radio-option input,
        .check-option input {
            display: none;
        }

        .radio-dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 2px solid var(--text-muted);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all .2s;
        }

        .radio-option.selected .radio-dot {
            border-color: var(--accent);
            background: var(--accent);
        }

        .check-box {
            width: 16px;
            height: 16px;
            border-radius: 4px;
            border: 2px solid var(--text-muted);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            transition: all .2s;
        }

        .check-option.selected .check-box {
            border-color: var(--accent);
            background: var(--accent);
            color: #000;
        }

        textarea.q-textarea {
            width: 100%;
            min-height: 80px;
            background: rgba(255, 255, 255, .03);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-family: 'Tajawal', sans-serif;
            font-size: 13px;
            padding: 12px;
            resize: vertical;
            transition: border-color .2s;
        }

        textarea.q-textarea:focus {
            outline: none;
            border-color: var(--accent);
        }

        textarea.q-textarea::placeholder {
            color: var(--text-muted);
        }

        /* ── Section 3: S/W ── */
        .sw-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .sw-column {
            min-width: 0;
        }

        .sw-col-title {
            font-size: 13px;
            font-weight: 800;
            margin-bottom: 12px;
            padding: 8px 12px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .sw-col-title.strength {
            background: var(--green-glow);
            color: var(--green);
            border: 1px solid rgba(34, 197, 94, .2);
        }

        .sw-col-title.weakness {
            background: var(--red-glow);
            color: var(--red);
            border: 1px solid rgba(239, 68, 68, .2);
        }

        .sw-tag {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 10px;
            border-radius: 8px;
            margin-bottom: 7px;
            font-size: 12px;
            font-weight: 600;
        }

        .sw-tag.auto {
            background: rgba(255, 255, 255, .04);
            border: 1px solid var(--border);
        }

        .sw-tag.auto i {
            font-size: 10px;
            color: var(--text-muted);
        }

        .add-sw-input {
            width: 100%;
            padding: 8px 10px;
            border-radius: 8px;
            border: 1px dashed var(--border);
            background: transparent;
            color: var(--text);
            font-family: 'Tajawal', sans-serif;
            font-size: 12px;
            margin-top: 8px;
        }

        .add-sw-input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .add-sw-input::placeholder {
            color: var(--text-muted);
        }

        /* ── Section 4: Outputs ── */
        .output-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
            font-size: 13px;
            font-weight: 600;
        }

        .output-item:last-child {
            border-bottom: none;
        }

        .output-item i {
            color: var(--green);
            margin-top: 2px;
            flex-shrink: 0;
        }

        /* ── Section 5: Challenges ── */
        .challenge-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 16px;
        }

        .challenge-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 12px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, .02);
            cursor: pointer;
            transition: all .2s;
            font-size: 12px;
            font-weight: 600;
        }

        .challenge-item:hover {
            border-color: rgba(239, 68, 68, .3);
        }

        .challenge-item.selected {
            border-color: var(--red);
            background: var(--red-glow);
        }

        .challenge-dot {
            width: 14px;
            height: 14px;
            border-radius: 3px;
            border: 2px solid var(--text-muted);
            flex-shrink: 0;
            transition: all .2s;
        }

        .challenge-item.selected .challenge-dot {
            background: var(--red);
            border-color: var(--red);
        }

        /* ── Section 6: Goals ── */
        .goals-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 20px;
        }

        .goal-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 12px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, .02);
            cursor: pointer;
            transition: all .2s;
            font-size: 12px;
            font-weight: 600;
        }

        .goal-item:hover {
            border-color: rgba(34, 197, 94, .3);
        }

        .goal-item.selected {
            border-color: var(--green);
            background: var(--green-glow);
        }

        .goal-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 2px solid var(--text-muted);
            flex-shrink: 0;
            transition: all .2s;
        }

        .goal-item.selected .goal-dot {
            background: var(--green);
            border-color: var(--green);
        }

        .priority-select {
            width: 100%;
            padding: 10px 14px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text);
            font-family: 'Tajawal', sans-serif;
            font-size: 13px;
            margin-bottom: 16px;
        }

        .priority-select:focus {
            outline: none;
            border-color: var(--accent);
        }

        .model-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 16px;
        }

        .model-option {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 12px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, .02);
            cursor: pointer;
            transition: all .2s;
            font-size: 12px;
            font-weight: 600;
        }

        .model-option:hover {
            border-color: rgba(255, 255, 255, .15);
        }

        .model-option.selected {
            border-color: var(--blue);
            background: var(--blue-glow);
        }

        .model-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 2px solid var(--text-muted);
            flex-shrink: 0;
            transition: all .2s;
        }

        .model-option.selected .model-dot {
            background: var(--blue);
            border-color: var(--blue);
        }

        /* Manager question conditional */
        .manager-conditional {
            background: rgba(255, 255, 255, .03);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px;
            margin-top: 10px;
            display: none;
        }

        .manager-conditional.show {
            display: block;
        }

        .manager-conditional input {
            width: 100%;
            padding: 8px 10px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text);
            font-family: 'Tajawal', sans-serif;
            font-size: 13px;
            margin-top: 6px;
        }

        .manager-conditional input:focus {
            outline: none;
            border-color: var(--accent);
        }

        /* ── Divider label ── */
        .section-label {
            font-size: 11px;
            font-weight: 800;
            letter-spacing: .5px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 12px;
            margin-top: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-label::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* ── Navigation ── */
        .nav-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-top: 8px;
        }

        .btn {
            padding: 11px 22px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text);
            font-family: 'Tajawal', sans-serif;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: all .2s;
            display: flex;
            align-items: center;
            gap: 7px;
        }

        .btn:hover {
            background: var(--bg-card-hover);
            border-color: rgba(255, 255, 255, .15);
        }

        .btn-primary {
            background: var(--accent);
            border-color: var(--accent);
            color: #000;
        }

        .btn-primary:hover {
            filter: brightness(1.1);
        }

        .btn-ghost {
            background: transparent;
        }

        .btn:disabled {
            opacity: .4;
            cursor: not-allowed;
        }

        /* ── Completion Banner ── */
        .completion-banner {
            text-align: center;
            padding: 40px 28px;
            animation: fadeIn .4s ease;
        }

        .completion-icon {
            font-size: 56px;
            margin-bottom: 16px;
        }

        .completion-title {
            font-size: 24px;
            font-weight: 900;
            margin-bottom: 8px;
        }

        .completion-sub {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 28px;
        }

        .dept-done-list {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            margin-bottom: 28px;
        }

        .dept-done-tag {
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            background: var(--green-glow);
            border: 1px solid rgba(34, 197, 94, .3);
            color: var(--green);
        }

        /* ── Alert / Info box ── */
        .info-box {
            padding: 12px 14px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 600;
            display: flex;
            align-items: flex-start;
            gap: 8px;
            margin-bottom: 16px;
        }

        .info-box.warning {
            background: var(--yellow-glow);
            border: 1px solid rgba(245, 158, 11, .2);
            color: var(--yellow);
        }

        .info-box.info {
            background: var(--blue-glow);
            border: 1px solid rgba(59, 130, 246, .2);
            color: var(--blue);
        }

        @keyframes fadeIn {
            from {
                opacity: 0
            }

            to {
                opacity: 1
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(10px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        /* ── VRIO Framework ── */
        .vrio-trigger {
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 6px;
            cursor: pointer;
            border: 1px solid rgba(139, 92, 246, .3);
            background: rgba(139, 92, 246, .08);
            color: #a78bfa;
            font-weight: 700;
            transition: all .2s;
        }

        .vrio-trigger:hover {

        /* ═══════════════════════════════════
           NAV
        ═══════════════════════════════════ */
        function switchDept(key) {
            saveCurrentSection(); // حفظ قبل التبديل
            STATE.currentDept = key;
            STATE.currentSection = 0;
            history.replaceState(null, '', `?dept=${key}`);
            render();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        function goSection(idx) {
            saveCurrentSection();
            STATE.currentSection = idx;
            render();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        function prevSection() { if (STATE.currentSection > 0) goSection(STATE.currentSection - 1); }
        function nextSection() {
            if (STATE.currentSection < SECTIONS.length - 1) {
                goSection(STATE.currentSection + 1);
            } else {
                completeCurrentDept();
            }
        }
        function completeCurrentDept() {
            saveCurrentSection();
            STATE.data[STATE.currentDept].completed = true;
            save();

            // ═══ وضع إدارة واحدة: رجوع لمسار المدير ═══
            if (STATE._singleMode) {
                renderSingleCompletion();
                return;
            }

            const idx = DEPTS.findIndex(d => d.key === STATE.currentDept);
            const nextDept = DEPTS[idx + 1];
            if (nextDept) {
                switchDept(nextDept.key);
            } else {
                renderCompletion();
            }
        }

        /* ── حفظ حالة القسم الحالي ── */
        function saveCurrentSection() {
            const sec = SECTIONS[STATE.currentSection].id;
            const d = STATE.data[STATE.currentDept];
            if (sec === 'diagnosis') collectAnswers();
            if (sec === 'sw') collectSW();
            if (sec === 'challenges') collectChallenges();
            if (sec === 'goals') collectGoals();
            save();
        }

        /* ═══════════════════════════════════
           COLLECT ANSWERS
        ═══════════════════════════════════ */
        function collectAnswers() {
            const d = STATE.data[STATE.currentDept];
            QUESTIONS[STATE.currentDept].forEach(q => {
                if (q.type === 'radio') {
                    const sel = document.querySelector(`.q-block-${q.id} .radio-option.selected`);
                    if (sel) d.answers[q.id] = sel.dataset.val;
                } else if (q.type === 'checkbox') {
                    const sels = [...document.querySelectorAll(`.q-block-${q.id} .check-option.selected`)];
                    d.answers[q.id] = sels.map(s => s.dataset.val);
                } else if (q.type === 'textarea') {
                    const ta = document.querySelector(`.q-block-${q.id} textarea`);
                    if (ta) d.answers[q.id] = ta.value;
                }
            });
        }
        function collectSW() {
            const d = STATE.data[STATE.currentDept];
            const sIn = document.getElementById('extraStrengthInput');
            const wIn = document.getElementById('extraWeaknessInput');
            if (sIn?.value.trim()) {
                if (!d.extraStrengths.includes(sIn.value.trim()))
                    d.extraStrengths.push(sIn.value.trim());
                sIn.value = '';
            }
            if (wIn?.value.trim()) {
                if (!d.extraWeaknesses.includes(wIn.value.trim()))
                    d.extraWeaknesses.push(wIn.value.trim());
                wIn.value = '';
            }
        }
        function collectChallenges() {
            const d = STATE.data[STATE.currentDept];
            d.challenges = [...document.querySelectorAll('.challenge-item.selected')].map(el => el.dataset.val);
            const ta = document.getElementById('challengeExtra');
            if (ta) d.challengeExtra = ta.value;
        }
        function collectGoals() {
            const d = STATE.data[STATE.currentDept];
            d.goals = [...document.querySelectorAll('.goal-item.selected')].map(el => el.dataset.val);
            const pSel = document.getElementById('prioritySelect');
            if (pSel) d.priority = pSel.value;
            const modSel = document.querySelector('.model-option.selected');
            if (modSel) d.model = modSel.dataset.val;
            const manSel = document.querySelector('.manager-option.selected');
            if (manSel) d.manager = manSel.dataset.val;
            const mName = document.getElementById('managerName');
            if (mName) d.managerName = mName.value;
            const mSat = document.querySelector('.satisfaction-opt.selected');
            if (mSat) d.managerSatisfied = mSat.dataset.val;
            const notes = document.getElementById('deptNotes');
            if (notes) d.notes = notes.value;
            // OKR links
            document.querySelectorAll('.okr-select').forEach(sel => {
                const goalKey = sel.dataset.goal;
                if (sel.value) {
                    if (!d.goalOkrLinks) d.goalOkrLinks = {};
                    d.goalOkrLinks[goalKey] = sel.value;
                }
            });
        }

        /* ═══════════════════════════════════
           AUTO S/W GENERATOR
        ═══════════════════════════════════ */
        function generateSW(deptKey) {
            const answers = STATE.data[deptKey].answers;
            const strengths = [], weaknesses = [];
            for (const [id, val] of Object.entries(answers)) {
                const rule = STRENGTH_RULES[id];
                if (!rule) continue;
                const v = Array.isArray(val) ? val : [val];
                if (v.some(x => rule.strength.includes(x))) strengths.push(rule.sLabel);
                else if (v.some(x => rule.weakness.includes(x))) weaknesses.push(rule.wLabel);
            }
            return { strengths, weaknesses };
        }

            const el = document.getElementById('deptTabs');

        function renderStepper(dept) {
            const el = document.getElementById('stepperEl');
            el.innerHTML = SECTIONS.map((s, i) => {
                const active = i === STATE.currentSection;
                const done = i < STATE.currentSection || STATE.data[dept.key]?.completed;
                return `<div class="step ${active ? 'active' : ''} ${done ? 'done' : ''}" onclick="goSection(${i})">

            <div class="step-label">${s.label}</div>

        function renderSection(dept) {
            const secId = SECTIONS[STATE.currentSection].id;
            const el = document.getElementById('mainContent');
            const d = STATE.data[dept.key];

            if (secId === 'status') el.innerHTML = renderStatus(dept, d);

            if (secId === 'challenges') el.innerHTML = renderChallenges(dept, d);
            if (secId === 'goals') el.innerHTML = renderGoals(dept, d);

            const AXIS_MAP = {

            const allW = [...new Set([...auto.weaknesses, ...d.extraWeaknesses])];

            // Evidence v2 — confidence + source chain + conflict
            let evidenceIdx = 0;

                const eid = `ev_${dept.key}_${type}_${evidenceIdx++}`;
                let conf = 50, cls = 'manual', icon = '✍️', src = 'يدوي';

                let tooltipLine2 = '';
                let questionText = '';
                let answerText = '';

                if (isAuto) {
                    const fromDiag = STATE.bridgePayload?.strengths?.some(s => (s.label || s) === label) ||
                        STATE.bridgePayload?.weaknesses?.some(w => (w.label || w) === label);
                    if (fromDiag) {
                        conf = 90; cls = 'diag'; icon = '🔬'; src = 'التشخيص';
                        tooltipLine1 = 'مصدر: التشخيص الشامل (5 محاور)';
                        tooltipLine2 = 'ثقة عالية — بيانات مباشرة من الفحص';
                    } else {
                        const ruleId = Object.keys(STRENGTH_RULES).find(rId => {
                            const r = STRENGTH_RULES[rId];
                            return (type === 's' && r.sLabel === label) || (type === 'w' && r.wLabel === label);
                        });
                        if (ruleId) {
                            const answer = d.answers[ruleId];
                            answerText = Array.isArray(answer) ? answer.join('، ') : (answer || '—');
                            questionText = QUESTION_LABELS[ruleId] || ruleId;
                            conf = 80; cls = 'dept'; icon = '🏢'; src = 'dept-deep';

                ? allS.map((s, i) => renderStrength(s, i, auto.strengths.includes(s))).join('')
                : '<div style="font-size:12px;color:var(--text-muted);padding:8px 0">لا توجد نقاط قوة مكتشفة بعد</div>';

            const wHTML = allW.length
                ? allW.map((w, i) => {
                    const isAuto = auto.weaknesses.includes(w);
                    return `<div class="sw-tag auto">
                <i class="bi bi-x-circle" style="color:var(--red)"></i>
                ${getEvidenceHTML(w, isAuto, 'w')}${w}
            </div>`;
                }).join('')
                : '<div style="font-size:12px;color:var(--text-muted);padding:8px 0">لا توجد نقاط ضعف مكتشفة</div>';

            // VRIO v2 summary + map
            const vrioKeys = Object.keys(d.vrioScores || {});
            let vrioSummary = '';
            if (vrioKeys.length > 0) {
                const classified = vrioKeys.map(k => ({ key: k, ...getBarneyClass(d.vrioScores[k]) }));
                const sustained = classified.filter(c => c.barneyClass === 'sustained_advantage').length;
                const unexploited = classified.filter(c => c.barneyClass === 'unexploited_advantage').length;
                const temporary = classified.filter(c => c.barneyClass === 'temporary_advantage').length;
                const parity = classified.filter(c => c.barneyClass === 'competitive_parity').length;
                const disadvantage = classified.filter(c => c.barneyClass === 'competitive_disadvantage').length;

                // Stats bar
                vrioSummary = `
        <div class="info-box info" style="margin-top:16px;flex-direction:column;gap:8px;">
            <div style="display:flex;align-items:center;gap:6px;width:100%;">
                <i class="bi bi-shield-check"></i>
                <span style="flex:1;">تصنيف VRIO (Barney Framework) — ${vrioKeys.length} نقطة مُقيَّمة</span>
            </div>
            <div style="display:flex;flex-wrap:wrap;gap:6px;">
                ${sustained ? `<span style="padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700;background:rgba(34,197,94,.1);color:var(--green);">🟢 مستدامة: ${sustained}</span>` : ''}
                ${unexploited ? `<span style="padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700;background:rgba(59,130,246,.1);color:#60a5fa;">💎 غير مستغلة: ${unexploited}</span>` : ''}
                ${temporary ? `<span style="padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700;background:rgba(245,158,11,.1);color:var(--yellow);">⚠️ مؤقتة: ${temporary}</span>` : ''}
                ${parity ? `<span style="padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700;background:rgba(245,158,11,.06);color:#d4a843;">🟡 تكافؤ: ${parity}</span>` : ''}
                ${disadvantage ? `<span style="padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700;background:rgba(239,68,68,.1);color:var(--red);">🔴 عيب: ${disadvantage}</span>` : ''}
            </div>
        </div>`;

                // VRIO Map
                vrioSummary += renderVrioMap(classified, allS);
            }

            // ── Conflict Panel v2 ──
            let conflictHTML = '';
            if (conflicts.length > 0) {
                const unresolvedCount = conflicts.filter(c => !c.resolved).length;
                conflictHTML = `
        <div class="conflict-panel">
            <div class="conflict-panel-title">
                <i class="bi bi-lightning-charge-fill"></i>
                ⚡ ${conflicts.length} تناقض مكتشف ${unresolvedCount > 0 ? `— ${unresolvedCount} يحتاج حسم` : '— تم حسم الجميع ✅'}
            </div>
            ${conflicts.map((c, ci) => {
                    const cid = `conflict_${dept.key}_${ci}`;
                    const escapedS = c.strengthLabel.replace(/'/g, "\\'");
                    const escapedW = c.weaknessLabel.replace(/'/g, "\\'");
                    if (c.resolved) {
                        const resLabel = c.resolved === 'strength' ? '✅ قوة' : c.resolved === 'weakness' ? '⚠️ ضعف' : '↔️ كلاهما';
                        return `<div class="conflict-item">
                    <div class="conflict-item-header"><i class="bi bi-check-circle-fill" style="color:var(--green)"></i> ${c.sharedKeywords.join(' · ')}</div>
                    <div class="conflict-resolved"><i class="bi bi-check-lg"></i> تم الحسم: ${resLabel}</div>
                </div>`;
                    }
                    return `<div class="conflict-item" id="${cid}">
                <div class="conflict-item-header"><i class="bi bi-exclamation-triangle-fill"></i> تناقض: ${c.sharedKeywords.join(' · ')}</div>
                <div class="conflict-sources">
                    <div class="conflict-source-line"><span style="color:var(--green)">💪 قوة:</span> ${c.strengthLabel}</div>
                    <div class="conflict-source-line"><span style="color:var(--red)">⚠️ ضعف:</span> ${c.weaknessLabel}</div>
                </div>
                <div class="conflict-actions">
                    <button class="conflict-btn strength" onclick="resolveConflict('${escapedS}', '${escapedW}', 'strength')">
                        <i class="bi bi-check-circle"></i> أبقِها كقوة
                    </button>
                    <button class="conflict-btn weakness" onclick="resolveConflict('${escapedS}', '${escapedW}', 'weakness')">
                        <i class="bi bi-x-circle"></i> أبقِها كضعف
                    </button>
                    <button class="conflict-btn both" onclick="resolveConflict('${escapedS}', '${escapedW}', 'both')">
                        <i class="bi bi-arrows-expand"></i> أبقِ كلاهما
                    </button>
                </div>
            </div>`;
                }).join('')}
        </div>`;
            }

            return `<div class="card">
        <div class="card-title"><i class="bi bi-clipboard-data"></i> نقاط القوة والضعف</div>
        <div class="card-sub">مُولَدة تلقائياً من إجاباتك — اضغط VRIO لاختبار الميزة التنافسية (تصنيف Barney) · اضغط badge المصدر لعرض سلسلة الإثبات</div>
        <div class="sw-grid">
            <div class="sw-column">
                <div class="sw-col-title strength"><i class="bi bi-check-circle-fill"></i> نقاط القوة (${allS.length})</div>
                <div id="strengthsList">${sHTML}</div>

            <div class="sw-column">

                <div id="weaknessesList">${wHTML}</div>
                <input id="extraWeaknessInput" class="add-sw-input" placeholder="+ أضف نقطة ضعف..." />
            </div>
        </div>
        ${vrioSummary}
        ${conflictHTML}
        ${allS.length === 0 && allW.length === 0 ? `
        <div class="info-box info" style="margin-top:16px">
            <i class="bi bi-lightbulb"></i>
            <span>أكمل التشخيص في القسم 2 لتوليد نقاط القوة والضعف تلقائياً.</span>
        </div>` : ''}
    </div>`;
        }

        /* ── القسم 4: المخرجات ── */
        function renderOutputs(dept) {

        <div class="card-title"><i class="bi bi-boxes"></i> ما تقدمه إدارة ${dept.label}</div>

        /* ── القسم 5: التحديات ── */
        function renderChallenges(dept, d) {
            const items = CHALLENGES[dept.key] || [];
            const challengesHTML = items.map(c => {
                const sel = d.challenges.includes(c);

        /* ── القسم 6: الأهداف + نموذج التشغيل + OKR Link v2 ── */
        function renderGoals(dept, d) {
            const goalItems = GOALS[dept.key] || [];
            const selectedGoals = d.goals || [];
            const linkedCount = selectedGoals.filter(g => {
                const k = g.replace(/\s/g, '_').substring(0, 25);
                return d.goalOkrLinks?.[k];
            }).length;
            const coveragePct = selectedGoals.length > 0 ? Math.round((linkedCount / selectedGoals.length) * 100) : 0;

            const goalsHTML = goalItems.map(g => {
                const sel = selectedGoals.includes(g);
                const goalKey = g.replace(/\s/g, '_').substring(0, 25);
                const linkedOkr = d.goalOkrLinks?.[goalKey] || '';
                return `<div class="goal-item ${sel ? 'selected' : ''}" data-val="${g}" onclick="toggleGoal(this)">
            <div class="goal-dot"></div>${g}
            ${sel ? `<button class="okr-link-btn ${linkedOkr ? 'linked' : ''}" onclick="event.stopPropagation();showOkrLink('${goalKey}')">
                <i class="bi bi-${linkedOkr ? 'link-45deg' : 'box-arrow-up-right'}"></i>
                ${linkedOkr ? 'مرتبط ✓' : 'ربط OKR'}
            </button>` : ''}
        </div>`;
            }).join('');

            // OKR link panel with auto-suggest
            const existingOkrs = JSON.parse(localStorage.getItem('stratix_okrs') || '[]');
            const okrOptions = existingOkrs.map(o => `<option value="${o.id || o.title}">${o.title || o.objective}</option>`).join('');

            // Coverage bar with auto-generate-all button
            const unlinkedCount = selectedGoals.length - linkedCount;
            const coverageHTML = selectedGoals.length > 0 ? `
            <div class="okr-coverage-bar">
                <div style="display:flex;justify-content:space-between;align-items:center;">
                    <span style="font-size:11px;font-weight:700;color:var(--text);">🎯 تغطية الأهداف بـ OKRs</span>
                    <span style="font-size:12px;font-weight:800;color:${coveragePct >= 80 ? 'var(--green)' : coveragePct >= 50 ? 'var(--yellow)' : 'var(--red)'};">${coveragePct}%</span>
                </div>
                <div class="okr-coverage-track">
                    <div class="okr-coverage-fill" style="width:${coveragePct}%"></div>
                </div>
                <div style="display:flex;justify-content:space-between;align-items:center;margin-top:6px;">
                    <span style="font-size:10px;color:var(--text-muted);">${linkedCount} من ${selectedGoals.length} هدف مربوط ${coveragePct >= 100 ? '✅ مكتمل!' : ''}</span>
                    ${unlinkedCount > 0 ? `<button onclick="autoGenerateAllOKRs()" style="font-size:10px;font-weight:700;padding:4px 10px;border-radius:6px;border:1px solid rgba(102,126,234,.3);background:rgba(102,126,234,.06);color:#818cf8;cursor:pointer;font-family:'Tajawal',sans-serif;transition:all .2s;">
                        ⚡ ولّد OKRs للـ ${unlinkedCount} المتبقية
                    </button>` : ''}
                </div>
            </div>` : '';

            const priorityHTML = PRIORITY_OPTIONS.map(p =>
                `<option value="${p.value}" ${d.priority === p.value ? 'selected' : ''}>${p.label}</option>`
            ).join('');

            const modelsHTML = OPERATING_MODELS.map(m => {
                const sel = d.model === m;
                return `<div class="model-option ${sel ? 'selected' : ''}" data-val="${m}" onclick="selectModel(this)">
            <div class="model-dot"></div><span style="font-size:12px">${m}</span>
        </div>`;
            }).join('');

            const managerHTML = MANAGEMENT_OPTIONS.map(m => {
                const sel = d.manager === m;
                return `<div class="model-option manager-option ${sel ? 'selected' : ''}" data-val="${m}"
            onclick="selectManager(this)" style="margin-bottom:8px">
            <div class="model-dot"></div><span style="font-size:12px">${m}</span>
        </div>`;
            }).join('');

            const showConditional = d.manager === 'مكتب خارجي / مستشار';

            return `<div class="card">
        <div class="card-title"><i class="bi bi-trophy"></i> الأهداف والأولويات</div>
        <div class="card-sub">ما الذي تريد تحقيقه في إدارة ${dept.label}؟</div>

        <div class="section-label">الأهداف المستهدفة</div>
        <div class="goals-grid">${goalsHTML}</div>

        ${coverageHTML}

        <!-- OKR Link Panel v2 -->
        <div id="okrLinkPanel" style="display:none;margin:12px 0;padding:12px;border-radius:10px;background:rgba(102,126,234,.04);border:1px solid rgba(102,126,234,.15);">
            <div style="font-size:12px;font-weight:700;color:var(--text);margin-bottom:8px;"><i class="bi bi-link-45deg"></i> ربط الهدف بـ OKR</div>
            <div id="okrLinkGoalName" style="font-size:11px;color:var(--text-muted);margin-bottom:8px;"></div>
            ${existingOkrs.length > 0
                    ? `<select class="okr-select priority-select" id="okrLinkSelect" data-goal="">
                    <option value="">اختر OKR...</option>
                    ${okrOptions}
                </select>
                <div style="display:flex;gap:6px;margin-top:8px;">
                    <button class="btn" style="font-size:11px;" onclick="confirmOkrLink()">✓ ربط</button>
                    <button class="btn btn-ghost" style="font-size:11px;" onclick="suggestOkr()">💡 اقترح OKR</button>
                </div>`
                    : `<div style="display:flex;gap:6px;">
                    <button class="btn" style="font-size:11px;" onclick="suggestOkr()">💡 ولّد OKR تلقائي</button>
                    <a href="/okrs" class="btn btn-ghost" style="font-size:11px;">أو أنشئ يدوياً</a>
                </div>`
                }
            <div id="okrSuggestResult"></div>
        </div>

        <div class="section-label">الأولوية</div>
        <select id="prioritySelect" class="priority-select">${priorityHTML}</select>

        <div class="section-label">نموذج التشغيل</div>
        <div class="model-options">${modelsHTML}</div>

        <div class="section-label">من يدير هذه الإدارة؟</div>
        <div style="display:flex;flex-direction:column;gap:0">${managerHTML}</div>

        <div id="managerConditional" class="manager-conditional ${showConditional ? 'show' : ''}">
            <div style="font-size:12px;color:var(--text-muted);font-weight:700">اسم المكتب / المستشار</div>
            <input id="managerName" type="text" value="${d.managerName || ''}" placeholder="مثال: مكتب X للمحاسبة..." />
            <div style="font-size:12px;color:var(--text-muted);font-weight:700;margin-top:10px">مستوى الرضا؟</div>
            <div style="display:flex;gap:8px;margin-top:6px">
                ${['راضٍ', 'جزئياً', 'لا'].map(v => `
                <button class="btn satisfaction-opt ${d.managerSatisfied === v ? 'btn-primary' : ''}"
                    data-val="${v}" onclick="selectSatisfaction(this)">${v}</button>`).join('')}
            </div>
        </div>

        <div class="section-label">ملاحظات</div>
        <textarea id="deptNotes" class="q-textarea" placeholder="أي معلومة إضافية عن هذه الإدارة...">${d.notes || ''}</textarea>
    </div>`;
        }

        /* ═══════════════════════════════════
           RENDER NAV
        ═══════════════════════════════════ */
        function renderNav(dept) {
            const el = document.getElementById('navBar');
            const isFirst = STATE.currentSection === 0;
            const isLast = STATE.currentSection === SECTIONS.length - 1;
            const deptIdx = DEPTS.findIndex(d => d.key === dept.key);
            const isLastDept = deptIdx === DEPTS.length - 1;

            const nextLabel = isLast
                ? (isLastDept ? '✅ إنهاء وحفظ' : `التالي: ${DEPTS[deptIdx + 1]?.label} →`)
                : `التالي: ${SECTIONS[STATE.currentSection + 1]?.label} →`;

            el.innerHTML = `
        <button class="btn btn-ghost" onclick="prevSection()" ${isFirst ? 'disabled' : ''}>
            <i class="bi bi-arrow-right"></i> السابق
        </button>
        <button class="btn" onclick="saveCurrentSection();showToast()">
            <i class="bi bi-save"></i> حفظ
        </button>
        <button class="btn btn-primary" onclick="nextSection()">
            ${nextLabel} ${!isLast ? '' : ''}
        </button>`;
        }

        /* ═══════════════════════════════════
           COMPLETION
        ═══════════════════════════════════ */
        function renderCompletion() {
            const completed = DEPTS.filter(d => STATE.data[d.key]?.completed);
            document.getElementById('mainContent').innerHTML = `
        <div class="card completion-banner">

                    <i class="bi bi-grid-1x2"></i> توليد SWOT التلقائي
                </button>
                <button class="btn" onclick="location.href='/gap-analysis'">

                    <i class="bi bi-speedometer2"></i> لوحة التحكم
                </button>

        /* ═══════════════════════════════════
           EVENT HANDLERS
        ═══════════════════════════════════ */
        function selectRadio(el, qId) {
            document.querySelectorAll(`.q-block-${qId}`).forEach(x => x.classList.remove('selected'));
            el.classList.add('selected');
            // Live benchmark hint
            const val = el.dataset.val || el.textContent.trim();
            injectBenchmarkHint(qId, val);
        }
        function toggleCheck(el, qId) {
            el.classList.toggle('selected');
            const box = el.querySelector('.check-box');
            box.textContent = el.classList.contains('selected') ? '✓' : '';
            // Live benchmark hint for checkbox (collect all selected)
            const vals = [...document.querySelectorAll(`.q-block-${qId}.selected`)].map(e => e.dataset.val);
            injectBenchmarkHint(qId, vals.join(', '));
        }

        /* ── Live Benchmark Hint Injection ── */
        function injectBenchmarkHint(qId, userAnswer) {
            if (!STATE.currentDept || !userAnswer) return;
            const hintHTML = getBenchmarkHint(STATE.currentDept, qId, userAnswer);
            // Find the question block containing this qId
            const blocks = document.querySelectorAll(`.q-block-${qId}`);
            if (blocks.length === 0) return;
            const questionBlock = blocks[0].closest('.question-block');
            if (!questionBlock) return;
            // Remove old hint if any
            const oldHint = questionBlock.querySelector('.benchmark-hint');
            if (oldHint) oldHint.remove();
            // Inject new hint
            if (hintHTML) {
                questionBlock.insertAdjacentHTML('beforeend', hintHTML);
            }
        }
        function toggleChallenge(el) { el.classList.toggle('selected'); }
        function toggleGoal(el) { el.classList.toggle('selected'); }
        function selectModel(el) {
            document.querySelectorAll('.model-option').forEach(x => x.classList.remove('selected'));
            el.classList.add('selected');
        }
        function selectManager(el) {
            document.querySelectorAll('.manager-option').forEach(x => x.classList.remove('selected'));
            el.classList.add('selected');
            const cond = document.getElementById('managerConditional');
            if (cond) cond.classList.toggle('show', el.dataset.val === 'مكتب خارجي / مستشار');
        }
        function selectSatisfaction(el) {
            document.querySelectorAll('.satisfaction-opt').forEach(x => {
                x.classList.remove('btn-primary');
            });
            el.classList.add('btn-primary');
        }
        function attachSectionListeners(secId) {
            // add-on-enter for SW inputs
            if (secId === 'sw') {
                const sIn = document.getElementById('extraStrengthInput');
                const wIn = document.getElementById('extraWeaknessInput');
                sIn?.addEventListener('keypress', e => {
                    if (e.key === 'Enter' && sIn.value.trim()) {
                        const v = sIn.value.trim();
                        STATE.data[STATE.currentDept].extraStrengths.push(v);
                        save();
                        renderSection(DEPTS.find(d => d.key === STATE.currentDept));
                    }
                });
                wIn?.addEventListener('keypress', e => {
                    if (e.key === 'Enter' && wIn.value.trim()) {
                        const v = wIn.value.trim();
                        STATE.data[STATE.currentDept].extraWeaknesses.push(v);
                        save();
                        renderSection(DEPTS.find(d => d.key === STATE.currentDept));
                    }
                });
            }
        }

        /* ── Toast ── */
        function showToast() {
            let t = document.getElementById('toast');
            if (!t) {
                t = document.createElement('div');
                t.id = 'toast';
                t.style.cssText = `
            position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
            background:#1a2035; border:1px solid rgba(34,197,94,.3); color:var(--green);
            padding:10px 20px; border-radius:10px; font-size:13px; font-weight:700;
            z-index:9999; animation:fadeIn .3s ease;`;
                document.body.appendChild(t);
            }
            t.textContent = '✓ تم الحفظ';
            clearTimeout(window._toastTimer);
            window._toastTimer = setTimeout(() => t.remove(), 2000);
        }

        /* ═══════════════════════════════════
           VRIO FRAMEWORK v2 — Barney Classification
        ═══════════════════════════════════ */
        const VRIO_QUESTIONS = [
            { key: 'V', letter: 'V', label: 'Value', q: 'هل تضيف قيمة حقيقية للعميل أو تقلل تكلفة؟', color: '#22c55e' },

        function getVrioRecommendation(barneyClass, deptKey) {
            const reco = VRIO_RECOMMENDATIONS[barneyClass];
            if (!reco) return '';
            const deptReco = reco.dept?.[deptKey] || reco.generic;
            return `<div class="vrio-reco ${reco.cssClass || barneyClass.split('_')[0]}">
                <i class="bi ${reco.icon}"></i>
                <span>${deptReco}</span>
            </div>`;
        }

        /* ── Decision Tree Visual ── */
        function renderDecisionTree(scores) {
            const letters = ['V', 'R', 'I', 'O'];
            let html = '<div class="vrio-tree">';
            let stopped = false;
            letters.forEach((l, i) => {
                const val = scores[l];
                const status = stopped ? 'pending' : (val === true ? 'pass' : val === false ? 'fail' : 'pending');
                if (val === false && !stopped) stopped = true;
                if (i > 0) html += `<span class="vrio-tree-arrow">→</span>`;
                html += `<div class="vrio-tree-node ${status}">
                    <div class="vrio-tree-letter">${l}</div>
                    <span>${val === true ? '✓' : val === false ? '✗' : '?'}</span>
                </div>`;
            });
            html += '</div>';
            return html;
        }

        /* ── VRIO Map (2×2 Matrix) ── */
        function renderVrioMap(classified, allStrengths) {
            if (!classified || classified.length === 0) return '';
            const buckets = {
                sustained: classified.filter(c => c.barneyClass === 'sustained_advantage'),
                unexploited: classified.filter(c => c.barneyClass === 'unexploited_advantage'),
                temporary: classified.filter(c => c.barneyClass === 'temporary_advantage'),
                weak: classified.filter(c => c.barneyClass === 'competitive_parity' || c.barneyClass === 'competitive_disadvantage'),
            };

            const renderDots = (items) => items.length === 0
                ? '<div style="font-size:10px;color:var(--text-muted);opacity:.5;padding:4px 0;">— فارغ</div>'
                : items.map(i => {
                    const label = i.key.replace(/_/g, ' ').substring(0, 20);
                    return `<div class="vrio-map-dot">${label}</div>`;
                }).join('');

            return `
            <div class="vrio-map-container">
                <div class="vrio-map-title"><i class="bi bi-grid-3x3-gap-fill"></i> خريطة VRIO — تصنيف Barney</div>
                <div class="vrio-map">
                    <div class="vrio-map-cell sustained">
                        <div class="vrio-map-cell-title">🟢 مستدامة (V+R+I+O)</div>
                        ${renderDots(buckets.sustained)}
                    </div>
                    <div class="vrio-map-cell unexploited">
                        <div class="vrio-map-cell-title">💎 غير مستغلة (V+R+I)</div>
                        ${renderDots(buckets.unexploited)}
                    </div>
                    <div class="vrio-map-cell temporary">
                        <div class="vrio-map-cell-title">⚠️ مؤقتة (V+R)</div>
                        ${renderDots(buckets.temporary)}
                    </div>
                    <div class="vrio-map-cell weak">
                        <div class="vrio-map-cell-title">🔴 تكافؤ / عيب (V فقط أو أقل)</div>
                        ${renderDots(buckets.weak)}
                    </div>
                </div>

                    <span>← حماية ضعيفة</span>
                    <span>حماية قوية →</span>
                </div>
            </div>`;
        }

            const d = STATE.data[STATE.currentDept];

            const d = STATE.data[STATE.currentDept];

            panel.style.display = 'block';

        function setVrioAnswer(strengthKey, vrioKey, value, idx) {
            const d = STATE.data[STATE.currentDept];
            if (!d.vrioScores) d.vrioScores = {};
            if (!d.vrioScores[strengthKey]) d.vrioScores[strengthKey] = {};
            d.vrioScores[strengthKey][vrioKey] = value;

            // Save Barney classification
            const barney = getBarneyClass(d.vrioScores[strengthKey]);
            d.vrioScores[strengthKey].barneyClass = barney.barneyClass;
            save();

            // Re-render the panel buttons
            const panel = document.getElementById('vrioPanel_' + idx);
            VRIO_QUESTIONS.forEach(vq => {
                const buttons = panel.querySelectorAll(`.vrio-q:nth-child(${VRIO_QUESTIONS.indexOf(vq) + 2}) .vrio-btn`);
                const val = d.vrioScores[strengthKey][vq.key];
                if (buttons.length >= 2) {
                    buttons[0].className = `vrio-btn ${val === true ? 'yes' : ''}`;
                    buttons[1].className = `vrio-btn ${val === false ? 'no' : ''}`;
                }
            });

            updateVrioResult(strengthKey, idx);
        }

        function updateVrioResult(strengthKey, idx) {
            const d = STATE.data[STATE.currentDept];
            const scores = d.vrioScores?.[strengthKey] || {};
            const answered = ['V', 'R', 'I', 'O'].filter(k => scores[k] === true || scores[k] === false).length;

            // Always show decision tree
            const treeEl = document.getElementById('vrioTree_' + idx);
            if (treeEl) treeEl.innerHTML = renderDecisionTree(scores);

            if (answered < 4) {
                const resultEl = document.getElementById('vrioResult_' + idx);
                if (resultEl) resultEl.innerHTML = `<div class="vrio-result" style="background:rgba(255,255,255,.03);border:1px solid var(--border);color:var(--text-muted);">⏳ أجب على ${4 - answered} سؤال متبقي</div>`;
                return;
            }

            const barney = getBarneyClass(scores);
            const resultEl = document.getElementById('vrioResult_' + idx);
            resultEl.innerHTML = `<div class="vrio-result" style="background:${barney.bg};border:1px solid ${barney.border};color:${barney.color};">
                ${barney.fullLabel}
            </div>`;

            // Show recommendation
            const recoEl = document.getElementById('vrioReco_' + idx);
            if (recoEl) {
                recoEl.innerHTML = getVrioRecommendation(barney.barneyClass, STATE.currentDept);
            }

            // Update trigger button
            const trigger = document.querySelectorAll('.vrio-trigger')[idx];
            if (trigger) {
                trigger.className = `vrio-trigger scored`;
                trigger.textContent = barney.triggerLabel;
                // Color-code the trigger
                if (barney.barneyClass === 'competitive_disadvantage') {
                    trigger.style.borderColor = 'rgba(239,68,68,.3)';
                    trigger.style.background = 'rgba(239,68,68,.08)';
                    trigger.style.color = 'var(--red)';

                    trigger.style.borderColor = 'rgba(59,130,246,.3)';
                    trigger.style.background = 'rgba(59,130,246,.08)';
                    trigger.style.color = '#60a5fa';
                }
            }

            // Save barneyClass
            d.vrioScores[strengthKey].barneyClass = barney.barneyClass;
            save();
        }

            ],
            hr: [

                },
                {

                        { title: 'رضا الموظفين 80%+', target: 80, metric: '%' },
                    ]
                },
                {
                    goal: 'مواهب', obj: 'استبقاء وتطوير المواهب', krs: [
                        { title: 'تحديد 100% من المواهب الحرجة', target: 100, metric: '%' },
                        { title: 'خطة تعاقب لكل منصب حرج', target: 100, metric: '%' },
                        { title: 'تقليل استقالات المواهب 50%', target: 50, metric: '%' },
                    ]
                },
                {
                    goal: 'أنظمة', obj: 'أتمتة وتحديث منظومة HR', krs: [
                        { title: 'تطبيق نظام HRIS متكامل', target: 1, metric: 'نظام' },
                        { title: 'رقمنة 100% من الملفات', target: 100, metric: '%' },

                {

                        { title: 'صفر نزاعات عمالية', target: 0, metric: 'نزاع' },
                    ]
                },
            ],
            marketing: [
                {
                    goal: 'رقمي', obj: 'بناء حضور رقمي احترافي', krs: [
                        { title: 'إطلاق هوية بصرية موحدة', target: 1, metric: 'هوية' },
                        { title: '4 منشورات أسبوعياً', target: 16, metric: 'منشور/شهر' },
                        { title: 'الوصول لـ 10k متابع', target: 10000, metric: 'متابع' },
                    ]
                },
                {
                    goal: 'علامة', obj: 'تعزيز العلامة التجارية', krs: [
                        { title: 'رفع الوعي بالعلامة 50%', target: 50, metric: '%' },
                        { title: 'تسجيل العلامة التجارية', target: 1, metric: 'تسجيل' },
                        { title: 'إطلاق 3 حملات ناجحة', target: 3, metric: 'حملة' },
                    ]
                },
            ],
            operations: [
                {
                    goal: 'توثيق', obj: 'توثيق العمليات الأساسية', krs: [
                        { title: 'توثيق 80% من العمليات كـ SOPs', target: 80, metric: '%' },
                        { title: 'أتمتة 3 عمليات يدوية', target: 3, metric: 'عملية' },
                        { title: 'تقليل وقت التسليم 20%', target: 20, metric: '%' },
                    ]
                },
            ],
            support: [
                {
                    goal: 'تقني', obj: 'تحديث البنية التقنية', krs: [
                        { title: 'تطبيق ERP/CRM واحد', target: 1, metric: 'نظام' },
                        { title: 'تحديث عقود الموردين', target: 100, metric: '%' },
                        { title: 'سياسة مشتريات مكتوبة', target: 1, metric: 'سياسة' },
                    ]
                },
            ],
        };

        // ── DEPT label map for bidirectional badges ──
        const DEPT_LABEL_MAP = {};
        DEPTS.forEach(d => { DEPT_LABEL_MAP[d.key] = { label: d.label, icon: d.icon, color: d.color }; });

        function showOkrLink(goalKey) {
            const panel = document.getElementById('okrLinkPanel');
            const nameEl = document.getElementById('okrLinkGoalName');
            const selectEl = document.getElementById('okrLinkSelect');
            if (panel.style.display === 'block' && selectEl?.dataset.goal === goalKey) {
                panel.style.display = 'none';
                return;
            }
            panel.style.display = 'block';
            const goalText = goalKey.replace(/_/g, ' ');
            nameEl.textContent = '🎯 الهدف: ' + goalText;
            if (selectEl) {
                selectEl.dataset.goal = goalKey;
                const d = STATE.data[STATE.currentDept];
                selectEl.value = d.goalOkrLinks?.[goalKey] || '';
            }
            // Clear previous suggestion
            const suggestEl = document.getElementById('okrSuggestResult');
            if (suggestEl) suggestEl.innerHTML = '';
            panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        function confirmOkrLink() {
            const selectEl = document.getElementById('okrLinkSelect');
            if (!selectEl) return;
            const goalKey = selectEl.dataset.goal;
            const okrValue = selectEl.value;
            const d = STATE.data[STATE.currentDept];
            if (!d.goalOkrLinks) d.goalOkrLinks = {};
            d.goalOkrLinks[goalKey] = okrValue;
            save();
            // ── Bidirectional: update OKR in localStorage with source info ──
            syncBidirectionalLink(STATE.currentDept, goalKey, okrValue);
            document.getElementById('okrLinkPanel').style.display = 'none';
            showToast();
            renderSection(DEPTS.find(dep => dep.key === STATE.currentDept));
        }

        function suggestOkr() {
            const selectEl = document.getElementById('okrLinkSelect');
            const goalKey = selectEl?.dataset.goal || '';
            const goalText = goalKey.replace(/_/g, ' ').toLowerCase();
            const deptKey = STATE.currentDept;
            const templates = OKR_TEMPLATES[deptKey] || [];

            // Smart keyword match — find best template
            let best = templates[0];
            let bestScore = 0;
            for (const t of templates) {
                // Score by keyword overlap
                const tWords = t.obj.split(/\s+/);
                const gWords = goalText.split(/\s+/);
                const score = tWords.filter(tw => gWords.some(gw => gw.includes(tw) || tw.includes(gw))).length;
                if (score > bestScore || goalText.includes(t.goal)) {
                    bestScore = score;
                    best = t;
                    if (goalText.includes(t.goal)) break;
                }
            }
            if (!best) {
                best = {
                    obj: `تطوير ${goalText}`, krs: [
                        { title: 'إنجاز 80% من الخطة', target: 80, metric: '%' },
                        { title: 'تحسين الكفاءة 20%', target: 20, metric: '%' },
                        { title: 'تقرير شهري منتظم', target: 12, metric: 'تقرير' },
                    ]
                };
            }

            const deptInfo = DEPT_LABEL_MAP[deptKey] || {};
            const resultEl = document.getElementById('okrSuggestResult');
            resultEl.innerHTML = `
            <div class="okr-suggest-card">
                <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px;">
                    <span style="font-size:11px;font-weight:800;color:var(--green);">💡 OKR مقترح</span>
                    <span style="font-size:9px;padding:2px 8px;border-radius:6px;background:${deptInfo.color || 'var(--primary)'}15;color:${deptInfo.color || 'var(--primary)'};font-weight:700;">${deptInfo.icon || '🏢'} ${deptInfo.label || deptKey}</span>
                </div>
                <div style="font-size:13px;font-weight:700;color:var(--text);margin-bottom:10px;">🎯 ${best.obj}</div>
                ${best.krs.map((kr, i) => `
                    <div class="okr-suggest-kr">
                        <div class="kr-num">KR${i + 1}</div>
                        <span style="flex:1;">${kr.title}</span>
                        <span style="font-size:9px;padding:2px 6px;border-radius:4px;background:rgba(255,255,255,.06);color:var(--text-muted);font-weight:600;">🎯 ${kr.target} ${kr.metric}</span>
                    </div>`).join('')}
                <button class="btn" style="margin-top:10px;font-size:11px;width:100%;" onclick="acceptSuggestedOkr('${best.obj.replace(/'/g, "\\'")}')">
                    ✅ اقبل وأنشئ OKR
                </button>
            </div>`;
        }

        function acceptSuggestedOkr(objective) {
            const selectEl = document.getElementById('okrLinkSelect');
            const goalKey = selectEl?.dataset.goal || '';
            const d = STATE.data[STATE.currentDept];
            const deptKey = STATE.currentDept;

            // Find the matching template for full KR details
            const templates = OKR_TEMPLATES[deptKey] || [];
            const tmpl = templates.find(t => t.obj === objective);
            const krIdBase = Date.now();

            // Save to OKRs in localStorage with full details + bidirectional metadata
            const okrs = JSON.parse(localStorage.getItem('stratix_okrs') || '[]');
            const newOkr = {
                id: 'auto_' + krIdBase,
                title: objective,
                objective: objective,
                source: 'dept-deep',
                sourceDept: deptKey,
                sourceDeptLabel: DEPT_LABEL_MAP[deptKey]?.label || deptKey,
                sourceDeptIcon: DEPT_LABEL_MAP[deptKey]?.icon || '🏢',
                sourceDeptColor: DEPT_LABEL_MAP[deptKey]?.color || '#667eea',
                sourceGoal: goalKey.replace(/_/g, ' '),
                createdAt: new Date().toISOString(),
                krs: tmpl ? tmpl.krs.map((kr, i) => ({
                    id: 'gkr_' + krIdBase + '_' + i,
                    name: kr.title,
                    start: 0,
                    target: kr.target,
                    current: 0,
                    score: 0,
                    metric: kr.metric,
                })) : [
                    { id: 'gkr_' + krIdBase + '_0', name: 'إنجاز 80% من الخطة', start: 0, target: 80, current: 0, score: 0 },
                ],
            };
            okrs.push(newOkr);
            localStorage.setItem('stratix_okrs', JSON.stringify(okrs));

            // Link goal to new OKR
            if (!d.goalOkrLinks) d.goalOkrLinks = {};
            d.goalOkrLinks[goalKey] = newOkr.id;
            save();

            document.getElementById('okrLinkPanel').style.display = 'none';
            showToast();
            renderSection(DEPTS.find(dep => dep.key === STATE.currentDept));
        }

        // ── Bidirectional sync: update OKR with source dept info ──
        function syncBidirectionalLink(deptKey, goalKey, okrId) {
            if (!okrId) return;
            const okrs = JSON.parse(localStorage.getItem('stratix_okrs') || '[]');
            const okr = okrs.find(o => (o.id || o.title) === okrId);
            if (okr) {
                okr.sourceDept = deptKey;
                okr.sourceDeptLabel = DEPT_LABEL_MAP[deptKey]?.label || deptKey;
                okr.sourceDeptIcon = DEPT_LABEL_MAP[deptKey]?.icon || '🏢';
                okr.sourceDeptColor = DEPT_LABEL_MAP[deptKey]?.color || '#667eea';
                okr.sourceGoal = goalKey.replace(/_/g, ' ');
                localStorage.setItem('stratix_okrs', JSON.stringify(okrs));
            }
        }

        // ── Auto-Generate All: one-click OKR creation for all unlinked goals ──
        function autoGenerateAllOKRs() {
            const d = STATE.data[STATE.currentDept];
            const deptKey = STATE.currentDept;
            const selectedGoals = d.goals || [];
            const templates = OKR_TEMPLATES[deptKey] || [];
            const okrs = JSON.parse(localStorage.getItem('stratix_okrs') || '[]');
            let count = 0;
            let krIdBase = Date.now();

            selectedGoals.forEach(g => {
                const goalKey = g.replace(/\s/g, '_').substring(0, 25);
                if (d.goalOkrLinks?.[goalKey]) return; // already linked

                // Find best template
                const goalText = goalKey.replace(/_/g, ' ').toLowerCase();
                let best = templates[0];
                for (const t of templates) {
                    if (goalText.includes(t.goal)) { best = t; break; }
                }
                if (!best) best = {
                    obj: `تطوير ${g}`, krs: [
                        { title: 'إنجاز 80% من الخطة', target: 80, metric: '%' },
                    ]
                };

                const newOkr = {
                    id: 'auto_' + (krIdBase++),
                    title: best.obj,
                    objective: best.obj,
                    source: 'dept-deep',
                    sourceDept: deptKey,
                    sourceDeptLabel: DEPT_LABEL_MAP[deptKey]?.label || deptKey,
                    sourceDeptIcon: DEPT_LABEL_MAP[deptKey]?.icon || '🏢',
                    sourceDeptColor: DEPT_LABEL_MAP[deptKey]?.color || '#667eea',
                    sourceGoal: g,
                    createdAt: new Date().toISOString(),
                    krs: best.krs ? best.krs.map((kr, i) => ({
                        id: 'gkr_' + krIdBase + '_' + i,
                        name: kr.title, start: 0, target: kr.target, current: 0, score: 0, metric: kr.metric,
                    })) : [],
                };
                okrs.push(newOkr);
                if (!d.goalOkrLinks) d.goalOkrLinks = {};
                d.goalOkrLinks[goalKey] = newOkr.id;
                count++;
            });

            if (count === 0) { showToast(); return; }
            localStorage.setItem('stratix_okrs', JSON.stringify(okrs));
            save();
            showToast();
            renderSection(DEPTS.find(dep => dep.key === STATE.currentDept));
        }

        /* ═══════════════════════════════════
           BOOTSTRAP
        ═══════════════════════════════════ */
        document.addEventListener('DOMContentLoaded', init);
    </script>
