<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ستارتكس - المستشار الاستراتيجي الذكي</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #0a0b10;
            --bg2: #12141f;
            --card: #171a2a;
            --card-hover: #1e2236;
            --text: #e2e8f0;
            --muted: #7a8599;
            --border: rgba(255, 255, 255, 0.06);
            --primary: #667eea;
            --secondary: #764ba2;
            --green: #22c55e;
            --red: #ef4444;
            --yellow: #f59e0b;
            --blue: #38bdf8;
            --pink: #ec4899;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        .page-wrapper {
            display: flex;
            min-height: 100vh;
        }

        .main-content {
            flex: 1;
            padding: 0;
            overflow-x: hidden;
        }

        /* Hero Header */
        .advisor-header {
            padding: 32px 40px 24px;
            position: relative;
            overflow: hidden;
        }

        .advisor-header::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            left: 0;
            height: 100%;
            background: radial-gradient(ellipse at top right, rgba(102, 126, 234, 0.08) 0%, transparent 60%);
            pointer-events: none;
        }

        .advisor-title {
            font-size: 28px;
            font-weight: 900;
            position: relative;
        }

        .advisor-title span {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .advisor-sub {
            font-size: 14px;
            color: var(--muted);
            margin-top: 6px;
            position: relative;
        }

        /* Top Decision Banner */
        .decision-banner {
            margin: 0 40px 24px;
            padding: 24px 28px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 20px;
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
        }

        .decision-banner::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            left: 0;
            height: 3px;
        }

        .decision-icon {
            font-size: 44px;
            flex-shrink: 0;
        }

        .decision-text h3 {
            font-size: 20px;
            font-weight: 900;
        }

        .decision-text p {
            font-size: 14px;
            color: var(--muted);
            margin-top: 4px;
            line-height: 1.6;
        }

        .decision-badge {
            margin-right: auto;
            padding: 8px 20px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 800;
            white-space: nowrap;
        }

        /* Stats Row */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
            padding: 0 40px 24px;
        }

        .stat-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 18px;
            text-align: center;
        }

        .stat-num {
            font-size: 28px;
            font-weight: 900;
        }

        .stat-label {
            font-size: 12px;
            color: var(--muted);
            margin-top: 2px;
        }

        /* Insights List */
        .insights-section {
            padding: 0 40px 40px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 800;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .insight-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 0;
            margin-bottom: 16px;
            overflow: hidden;
            transition: all 0.3s;
        }

        .insight-card:hover {
            border-color: rgba(102, 126, 234, 0.15);
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
        }

        .insight-header {
            padding: 20px 24px;
            display: flex;
            align-items: flex-start;
            gap: 16px;
            cursor: pointer;
        }

        .insight-icon {
            font-size: 32px;
            flex-shrink: 0;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 14px;
        }

        .insight-main {
            flex: 1;
        }

        .insight-title {
            font-size: 16px;
            font-weight: 800;
            line-height: 1.4;
        }

        .insight-desc {
            font-size: 13px;
            color: var(--muted);
            margin-top: 6px;
            line-height: 1.7;
        }

        .insight-badges {
            display: flex;
            gap: 6px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .insight-badge {
            font-size: 11px;
            padding: 3px 10px;
            border-radius: 8px;
            font-weight: 600;
        }

        .insight-severity {
            font-size: 12px;
            padding: 4px 12px;
            border-radius: 8px;
            font-weight: 700;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .insight-toggle {
            background: none;
            border: none;
            color: var(--muted);
            font-size: 18px;
            cursor: pointer;
            padding: 8px;
            flex-shrink: 0;
            transition: transform 0.3s;
        }

        .insight-toggle.open {
            transform: rotate(180deg);
        }

        /* Insight Body (collapsible) */
        .insight-body {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease;
        }

        .insight-body.open {
            max-height: 900px;
        }

        .insight-body-inner {
            padding: 0 24px 24px;
        }

        /* Evidence */
        .evidence-title {
            font-size: 13px;
            font-weight: 700;
            color: var(--muted);
            margin-bottom: 10px;
        }

        .evidence-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 20px;
        }

        .evidence-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 10px;
        }

        .evidence-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .evidence-dept {
            font-size: 12px;
            color: var(--muted);
            min-width: 90px;
        }

        .evidence-metric {
            font-size: 13px;
            font-weight: 600;
            flex: 1;
        }

        .evidence-value {
            font-size: 13px;
            font-weight: 800;
        }

        /* OKR Section */
        .okr-box {
            background: rgba(102, 126, 234, 0.04);
            border: 1px solid rgba(102, 126, 234, 0.1);
            border-radius: 14px;
            padding: 18px;
        }

        .okr-title {
            font-size: 13px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 8px;
        }

        .okr-objective {
            font-size: 15px;
            font-weight: 800;
            margin-bottom: 12px;
            line-height: 1.5;
        }

        .okr-kr {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            font-size: 13px;
            line-height: 1.6;
            margin-bottom: 6px;
            color: var(--muted);
        }

        .okr-kr i {
            color: var(--primary);
            margin-top: 3px;
            flex-shrink: 0;
        }

        .okr-meta {
            display: flex;
            gap: 16px;
            margin-top: 12px;
            font-size: 12px;
            color: var(--muted);
        }

        .okr-meta span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .okr-actions {
            display: flex;
            gap: 8px;
            margin-top: 14px;
        }

        .okr-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 10px;
            font-family: inherit;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }

        .okr-btn.approve {
            background: linear-gradient(135deg, var(--green), #16a34a);
            color: white;
        }

        .okr-btn.discuss {
            background: rgba(102, 126, 234, 0.1);
            color: var(--primary);
        }

        .okr-btn.ignore {
            background: rgba(255, 255, 255, 0.04);
            color: var(--muted);
        }

        /* Data Quality */
        .quality-bar {
            margin: 0 40px 24px;
            padding: 16px 20px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .quality-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--muted);
            white-space: nowrap;
        }

        .quality-progress {
            flex: 1;
            height: 8px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 8px;
            overflow: hidden;
        }

        .quality-fill {
            height: 100%;
            border-radius: 8px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            transition: width 0.8s ease;
        }

        .quality-pct {
            font-size: 14px;
            font-weight: 800;
        }

        /* Empty / Loading */
        .empty-state {
            text-align: center;
            padding: 60px 40px;
        }

        .empty-icon {
            font-size: 64px;
            margin-bottom: 16px;
        }

        .empty-title {
            font-size: 20px;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .empty-desc {
            font-size: 14px;
            color: var(--muted);
            max-width: 400px;
            margin: 0 auto;
            line-height: 1.7;
        }

        .spinner {
            width: 44px;
            height: 44px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .run-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 28px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            font-family: inherit;
            font-size: 15px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s;
        }

        .run-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(102, 126, 234, 0.4);
        }

        .run-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Toast */
        .toast-box {
            position: fixed;
            bottom: 20px;
            left: 20px;
            padding: 14px 24px;
            border-radius: 12px;
            color: white;
            font-weight: 700;
            font-size: 14px;
            z-index: 99999;
            display: none;
        }

        @media(max-width:768px) {
            .stats-row {
                grid-template-columns: repeat(2, 1fr);
            }

            .advisor-header,
            .stats-row,
            .insights-section,
            .quality-bar,
            .decision-banner {
                padding-right: 16px;
                padding-left: 16px;
                margin-right: 16px;
                margin-left: 16px;
            }
        }
    </style>
</head>

<body>
    <div class="page-wrapper">
        <div id="sidebar-container"></div>
        <div class="main-content">

            <div class="advisor-header">
                <h1 class="advisor-title">🧠 المستشار <span>الاستراتيجي الذكي</span></h1>
                <div class="advisor-sub">يحلل بيانات 8 أقسام ويكتشف الفرص والمخاطر التي لا يراها كل مدير بمفرده</div>
            </div>

            <!-- Main Container -->
            <div id="mainContent">
                <div class="empty-state" id="loadingState">
                    <div class="spinner"></div>
                    <div style="color:var(--muted)">جارٍ التحميل...</div>
                </div>
            </div>

        </div>
    </div>

    <div class="toast-box" id="toastBox"></div>

    <script src="/js/api.js?v=4"></script>
    <script src="/js/steps-config.js?v=4"></script>
    <script src="/js/sidebar.js?v=4"></script>
    <script>
        const token = localStorage.getItem('token');
        let entityId = ''; // يُعبّأ في loadAnalysis من JWT

        const SEVERITY_STYLES = {
            CRITICAL: { bg: 'rgba(239,68,68,0.1)', color: '#ef4444', label: 'حرج' },
            HIGH: { bg: 'rgba(249,115,22,0.1)', color: '#f97316', label: 'مرتفع' },
            MEDIUM: { bg: 'rgba(245,158,11,0.1)', color: '#f59e0b', label: 'متوسط' },
            LOW: { bg: 'rgba(34,197,94,0.1)', color: '#22c55e', label: 'منخفض' },
        };

        const TYPE_STYLES = {
            OPPORTUNITY: { bg: 'rgba(34,197,94,0.08)', color: '#22c55e', label: 'فرصة' },
            RISK: { bg: 'rgba(239,68,68,0.08)', color: '#ef4444', label: 'خطر' },
            CRITICAL: { bg: 'rgba(239,68,68,0.12)', color: '#ef4444', label: 'حرج' },
        };

        const STATUS_COLORS = {
            good: '#22c55e',
            warning: '#f59e0b',
            danger: '#ef4444'
        };

        async function loadAnalysis() {
            // جلب entityId من JWT (آمن بعد switch-entity)
            try { const u = await window.api?.getCurrentUser(); entityId = u?.activeEntityId || ''; } catch(e) {}
            if (!entityId) entityId = localStorage.getItem('entityId') || '';
            if (!token || !entityId) {
                showReadyState();
                return;
            }

            try {
                const res = await window.apiRequest(`/api/rules-engine/analyze/${entityId}`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (!res.ok) throw new Error('API error');
                const data = await res.json();
                renderAnalysis(data);
            } catch (e) {
                console.error(e);
                showReadyState();
            }
        }

        function showReadyState() {
            document.getElementById('mainContent').innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon">🧠</div>
                    <div class="empty-title">المستشار جاهز للتحليل</div>
                    <div class="empty-desc">اضغط الزر لتشغيل محرك القواعد التقاطعية وتحليل بيانات الأقسام</div>
                    <br>
                    <button class="run-btn" onclick="runAnalysis()">
                        <i class="bi bi-lightning-charge-fill"></i> شغّل التحليل
                    </button>
                </div>
            `;
        }

        async function runAnalysis() {
            const btn = document.querySelector('.run-btn');
            if (btn) { btn.disabled = true; btn.innerHTML = '<i class="bi bi-hourglass-split"></i> جارٍ التحليل...'; }

            document.getElementById('mainContent').innerHTML = `
                <div class="empty-state">
                    <div class="spinner"></div>
                    <div style="color:var(--muted);font-size:15px;font-weight:600">🧠 المحرك يحلل بيانات الأقسام...</div>
                    <div style="color:var(--muted);font-size:12px;margin-top:6px">10 قواعد تقاطعية × 8 أقسام</div>
                </div>
            `;

            try {
                const res = await window.apiRequest(`/api/rules-engine/analyze/${entityId}`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();

                // Delay a bit for dramatic effect
                setTimeout(() => {
                    try {
                        renderAnalysis(data);
                    } catch (err) {
                        console.error('Render Error:', err);
                        document.getElementById('mainContent').innerHTML = `
                            <div class="empty-state">
                                <div class="empty-icon">❌</div>
                                <div class="empty-title">خطأ في عرض التحليل</div>
                                <div class="empty-desc">تم جلب البيانات لكن حدث خطأ أثناء عرضها: ${err.message}</div>
                                <br><button class="run-btn" onclick="runAnalysis()"><i class="bi bi-arrow-repeat"></i> أعد المحاولة</button>
                            </div>
                        `;
                    }
                }, 800);
            } catch (e) {
                document.getElementById('mainContent').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">❌</div>
                        <div class="empty-title">فشل التحليل</div>
                        <div class="empty-desc">خطأ في الاتصال بالخادم. تأكد من تسجيل الدخول.</div>
                    </div>
                `;
            }
        }

        function renderAnalysis(data) {
            if (!data) throw new Error('بيانات التحليل غير متوفرة');

            if (data.status === 'NO_DATA' || data.status === 'INSUFFICIENT_DATA') {
                document.getElementById('mainContent').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📊</div>
                        <div class="empty-title">${data.status === 'NO_DATA' ? 'لا توجد أقسام بعد' : 'بيانات غير كافية'}</div>
                        <div class="empty-desc">${data.message}</div>
                        <br>
                        <a href="/team.html" class="run-btn" style="text-decoration:none">
                            <i class="bi bi-people-fill"></i> إدارة الفريق
                        </a>
                    </div>
                `;
                return;
            }

            const rec = data.overallRecommendation || {
                color: '#667eea',
                icon: '🧠',
                label: 'اكتمل التحليل',
                description: 'تم تقييم المعطيات بنجاح.'
            };
            const summary = data.summary || { totalInsights: 0, opportunities: 0, risks: 0, critical: 0 };
            const dataQuality = data.dataQuality || { coverage: 0, completedDepartments: 0, totalDepartments: 0 };
            let html = '';

            // Decision Banner
            html += `
                <div class="decision-banner" style="background:${rec.color}08;border-color:${rec.color}20">
                    <div style="position:absolute;top:0;right:0;left:0;height:3px;background:${rec.color}"></div>
                    <div class="decision-icon">${rec.icon}</div>
                    <div class="decision-text">
                        <h3 style="color:${rec.color}">${rec.label}</h3>
                        <p>${rec.description}</p>
                    </div>
                    <div class="decision-badge" style="background:${rec.color}15;color:${rec.color}">
                        ${summary.totalInsights} نتيجة
                    </div>
                </div>
            `;

            // Data Quality
            const coverage = parseInt(dataQuality.coverage) || 0;
            html += `
                <div class="quality-bar">
                    <span class="quality-label">📊 تغطية البيانات</span>
                    <div class="quality-progress">
                        <div class="quality-fill" style="width:${coverage}%"></div>
                    </div>
                    <span class="quality-pct">${coverage}%</span>
                    <span class="quality-label">(${dataQuality.completedDepartments || 0}/${dataQuality.totalDepartments || 0} أقسام)</span>
                </div>
            `;

            // Stats Row
            html += `
                <div class="stats-row">
                    <div class="stat-card">
                        <div class="stat-num" style="color:var(--primary)">${summary.totalInsights}</div>
                        <div class="stat-label">نتيجة مكتشفة</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-num" style="color:var(--green)">${summary.opportunities}</div>
                        <div class="stat-label">فرصة نمو</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-num" style="color:var(--yellow)">${summary.risks}</div>
                        <div class="stat-label">مخاطر</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-num" style="color:var(--red)">${summary.critical}</div>
                        <div class="stat-label">تحذير حرج</div>
                    </div>
                </div>
            `;

            // Insights
            const insightsList = data.insights || [];
            if (insightsList.length > 0) {
                html += `<div class="insights-section">`;
                html += `<div class="section-title"><i class="bi bi-lightbulb-fill" style="color:var(--yellow)"></i> النتائج والتوصيات</div>`;

                insightsList.forEach((insight, idx) => {
                    const sev = SEVERITY_STYLES[insight.severity] || SEVERITY_STYLES.MEDIUM;
                    const typ = TYPE_STYLES[insight.type] || TYPE_STYLES.RISK;
                    const depts = Array.isArray(insight.departments) ? insight.departments : [];
                    const evidenceList = Array.isArray(insight.evidence) ? insight.evidence : [];

                    html += `
                        <div class="insight-card">
                            <div class="insight-header" onclick="toggleInsight(${idx})">
                                <div class="insight-icon" style="background:${typ.bg}">
                                    <span style="font-size:28px">${insight.icon || '💡'}</span>
                                </div>
                                <div class="insight-main">
                                    <div class="insight-title">${insight.title || 'نتيجة تحليل'}</div>
                                    <div class="insight-desc">${insight.description || ''}</div>
                                    <div class="insight-badges">
                                        <span class="insight-badge" style="background:${typ.bg};color:${typ.color}">${typ.label}</span>
                                        <span class="insight-badge" style="background:${sev.bg};color:${sev.color}">${sev.label}</span>
                                        ${depts.map(d =>
                        `<span class="insight-badge" style="background:rgba(102,126,234,0.08);color:var(--primary)">${d}</span>`
                    ).join('')}
                                    </div>
                                </div>
                                <button class="insight-toggle" id="toggle-${idx}"><i class="bi bi-chevron-down"></i></button>
                            </div>

                            <div class="insight-body" id="body-${idx}">
                                <div class="insight-body-inner">
                                    <!-- Evidence -->
                                    <div class="evidence-title">📌 الأدلة والمؤشرات</div>
                                    <div class="evidence-list">
                                        ${evidenceList.map(ev => `
                                            <div class="evidence-item">
                                                <div class="evidence-dot" style="background:${STATUS_COLORS[ev.status] || '#7a8599'}"></div>
                                                <div class="evidence-dept">${ev.dept || ''}</div>
                                                <div class="evidence-metric">${ev.metric || ''}</div>
                                                <div class="evidence-value" style="color:${STATUS_COLORS[ev.status] || 'var(--text)'}">${ev.value || ''}</div>
                                            </div>
                                        `).join('')}
                                    </div>

                                    ${insight.suggestedOKR ? `
                                        <div class="okr-box">
                                            <div class="okr-title">🎯 OKR مقترح</div>
                                            <div class="okr-objective">${insight.suggestedOKR.objective || ''}</div>
                                            ${(Array.isArray(insight.suggestedOKR.keyResults) ? insight.suggestedOKR.keyResults : []).map(kr => `
                                                <div class="okr-kr">
                                                    <i class="bi bi-check2-circle"></i>
                                                    <span>${kr}</span>
                                                </div>
                                            `).join('')}
                                            <div class="okr-meta">
                                                <span><i class="bi bi-clock"></i> ${insight.suggestedOKR.timeline || 'Q1'}</span>
                                                <span><i class="bi bi-person"></i> ${insight.suggestedOKR.owner || 'مدير الإدارة'}</span>
                                            </div>
                                            <div class="okr-actions">
                                                <button class="okr-btn approve" onclick="approveOKR('${insight.ruleId || ''}')">
                                                    <i class="bi bi-check-lg"></i> اعتماد كمبادرة
                                                </button>
                                                <button class="okr-btn discuss" onclick="window.location.href='/reviews.html?from_advisor=1&title=${encodeURIComponent('مراجعة: ' + (insight.title || ''))}&notes=${encodeURIComponent(insight.description || '')}'">
                                                    <i class="bi bi-journal-plus"></i> إنشاء مراجعة
                                                </button>
                                                <button class="okr-btn ignore" onclick="this.closest('.insight-card').style.opacity='0.4'">
                                                    <i class="bi bi-x-lg"></i> تجاهل
                                                </button>
                                            </div>
                                        </div>
                                    ` : ''}
                                </div>
                            </div>
                        </div>
                    `;
                });

                html += `</div>`;
            } else {
                html += `
                    <div class="empty-state" style="padding:40px">
                        <div class="empty-icon">✅</div>
                        <div class="empty-title">لم يتم اكتشاف مخاطر أو فرص</div>
                        <div class="empty-desc">المحرك حلل ${data.rulesEvaluated || 0} قاعدة ولم يجد تقاطعات تحتاج انتباهك. واصل عملك!</div>
                    </div>
                `;
            }

            // Re-analyze button
            html += `
                <div style="text-align:center;padding:0 40px 40px">
                    <button class="run-btn" onclick="runAnalysis()" style="opacity:0.7;font-size:13px;padding:10px 20px">
                        <i class="bi bi-arrow-repeat"></i> إعادة التحليل
                    </button>
                    <div style="font-size:11px;color:var(--muted);margin-top:8px">
                        آخر تحليل: ${data.analyzedAt ? new Date(data.analyzedAt).toLocaleString('ar-SA') : 'الآن'} | ${data.rulesEvaluated || 0} قاعدة
                    </div>
                </div>
            `;

            document.getElementById('mainContent').innerHTML = html;
        }

        function toggleInsight(idx) {
            const body = document.getElementById(`body-${idx}`);
            const toggle = document.getElementById(`toggle-${idx}`);
            body.classList.toggle('open');
            toggle.classList.toggle('open');
        }

        function approveOKR(ruleId) {
            showToast('✅ تم اعتماد الـ OKR — سيتم إنشاء مبادرة قريباً');
            // TODO: Create actual initiative via API
        }

        function showToast(msg) {
            const t = document.getElementById('toastBox');
            t.textContent = msg;
            t.style.background = 'rgba(34, 197, 94, 0.9)';
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }

        // Auto-load
        loadAnalysis();
    </script>
</body>

</html>
