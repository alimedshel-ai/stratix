<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ستارتكس | فحص الموارد البشرية الاحترافي</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/sales-audit-pro.css?v=1">
</head>

<body>
    <div class="stx-wrapper" style="display:flex;min-height:100vh">
        <aside class="stx-sidebar-container" id="stx-sidebar" style="width:260px;flex-shrink:0;border-left:1px solid rgba(255,255,255,0.08)"></aside>
        <main class="stx-main-content" style="flex:1;overflow-y:auto">

    <!-- TOPBAR -->
    <div class="audit-topbar">
        <a href="/pro-dashboard.html" style="display:flex;align-items:center;gap:6px;color:#94a3b8;text-decoration:none;font-size:13px;font-weight:700;padding:6px 12px;border-radius:8px;border:1px solid rgba(255,255,255,0.08);transition:all 0.2s" onmouseover="this.style.borderColor='#6366f1';this.style.color='#fff'" onmouseout="this.style.borderColor='rgba(255,255,255,0.08)';this.style.color='#94a3b8'">
            <i class="bi bi-arrow-right"></i>
            <span>الرئيسية</span>
        </a>
        <div class="logo">
            <i class="bi bi-people"></i>
            <span>فحص الموارد البشرية الاحترافي</span>
        </div>
        <div class="progress-wrap" id="progressWrap" style="display:none">
            <div class="progress-bar-track">
                <div class="progress-bar-fill" id="progressBar"></div>
            </div>
            <div class="progress-pct" id="progressText">0%</div>
        </div>
        <div class="topbar-score" id="topbarScore" style="display:none">
            <span class="score-num" id="totalScoreNum">0</span>
            <span class="score-max" id="totalScoreMax">/ 51</span>
        </div>
    </div>

    <!-- MAIN LAYOUT -->
    <div class="audit-layout">

        <!-- SIDEBAR (axes navigation) -->
        <aside class="audit-sidebar" id="auditSidebar" style="display:none">
            <div id="axesNav"></div>
        </aside>

        <!-- CONTENT -->
        <main class="audit-main">

            <!-- Step 0: Meta info -->
            <div id="metaSection">
                <a href="/pro-dashboard.html" class="back-link">
                    <i class="bi bi-arrow-right"></i>
                    العودة للوحة العملاء
                </a>
            </div>

            <!-- Audit content -->
            <div id="auditSection" style="display:none">
                <div id="axisContent"></div>
            </div>

        </main>
    </div>

        </main>
    </div>

    <!-- SAVE INDICATOR -->
    <div class="save-indicator" id="saveIndicator">
        <i class="bi bi-check-circle-fill"></i>
        تم الحفظ تلقائياً
    </div>

    <!-- SCRIPTS -->
    <script src="/js/api.js?v=4"></script>
    <script src="/js/context-manager.js?v=4"></script>
    <script src="/js/smart-nav.js?v=4"></script>
    <script src="/js/steps-config.js?v=4"></script>
    <script src="/js/sidebar.js?v=4"></script>
    <script src="/js/hr-audit-config.js?v=1"></script>
    <script src="/js/hr-audit-engine.js?v=1"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            // Patch: show progress bar and sidebar when audit starts
            const observer = new MutationObserver(() => {
                const auditVisible = document.getElementById('auditSection').style.display !== 'none';
                const sidebar = document.getElementById('auditSidebar');
                const progress = document.getElementById('progressWrap');
                const score = document.getElementById('topbarScore');
                if (auditVisible) {
                    if (sidebar) sidebar.style.display = '';
                    if (progress) progress.style.display = '';
                    if (score) score.style.display = '';
                }
            });
            const auditEl = document.getElementById('auditSection');
            if (auditEl) {
                observer.observe(auditEl, { attributes: true, attributeFilter: ['style'] });
            }

            // Init
            HRAuditEngine.init();
        });
    </script>
</body>

</html>
