<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ستارتكس | أداة استراتيجية</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/dept-pages.css">
    <style>
        :root {
            --bg-dark: #0f1117;
            --card-bg: rgba(30, 41, 59, 0.7);
            --border: rgba(255, 255, 255, 0.1);
            --tool-color: #818cf8;
        }

        body {
            background-color: var(--bg-dark);
            color: #e2e8f0;
            font-family: 'Tajawal', sans-serif;
        }

        .stx-wrapper { display: flex; min-height: 100vh; }
        .stx-sidebar-container { width: 260px; flex-shrink: 0; background: #1a1d2e; border-left: 1px solid var(--border); }
        .stx-main-content { flex: 1; padding: 0 !important; }

        .tool-banner {
            background: linear-gradient(90deg, rgba(var(--tool-rgb), 0.1) 0%, rgba(var(--tool-rgb), 0.05) 100%);
            border-bottom: 1px solid rgba(var(--tool-rgb), 0.2);
            padding: 14px 24px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .phase-badge {
            padding: 4px 14px; border-radius: 20px; font-size: 12px; font-weight: 700;
            background: rgba(var(--tool-rgb), 0.15); color: var(--tool-color);
            border: 1px solid rgba(var(--tool-rgb), 0.25);
        }

        .tool-header { padding: 24px 24px 8px; }
        .tool-title { font-size: 22px; font-weight: 900; margin-bottom: 4px; }
        .tool-subtitle { font-size: 13px; color: #94a3b8; }

        .fields-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
            padding: 16px 24px;
        }
        .field-card {
            background: var(--card-bg); border: 1px solid var(--border);
            border-radius: 14px; padding: 18px; transition: border-color 0.2s;
        }
        .field-card:hover { border-color: rgba(var(--tool-rgb), 0.3); }
        .field-card.full-width { grid-column: 1 / span 2; }

        .field-label {
            display: flex; align-items: center; gap: 8px;
            font-size: 14px; font-weight: 700; margin-bottom: 10px; color: var(--tool-color);
        }
        .field-label i { font-size: 16px; }

        .field-textarea {
            width: 100%; min-height: 90px; padding: 12px;
            background: rgba(0,0,0,0.2); border: 1px solid var(--border);
            border-radius: 10px; color: #e2e8f0; font-family: 'Tajawal', sans-serif;
            font-size: 13px; resize: vertical; transition: border-color 0.2s;
        }
        .field-textarea:focus { outline: none; border-color: var(--tool-color); }

        .action-bar {
            padding: 16px 24px; border-top: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
        }
        .btn-back { color: #94a3b8; text-decoration: none; font-size: 13px; display: flex; align-items: center; gap: 6px; }
        .btn-save {
            padding: 10px 32px; border: none; border-radius: 20px;
            background: var(--tool-color); color: white; font-size: 14px;
            font-weight: 700; font-family: 'Tajawal'; cursor: pointer; transition: all 0.2s;
        }
        .btn-save:hover { filter: brightness(1.15); transform: translateY(-1px); }

        .toast-msg {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            padding: 12px 24px; border-radius: 12px; background: rgba(34,197,94,0.9);
            color: white; font-weight: 700; font-size: 13px; z-index: 9999; display: none;
        }

        @media(max-width:768px) {
            .fields-grid { grid-template-columns: 1fr; }
            .field-card.full-width { grid-column: 1; }
            .stx-sidebar-container { display: none; }
        }
    </style>
</head>

<body>
    <div class="stx-wrapper">
        <aside class="stx-sidebar-container" id="stx-sidebar"></aside>

        <main class="stx-main-content">
            <div class="tool-banner">
                <div class="phase-badge" id="phaseBadge">محطة التشخيص</div>
                <div class="d-flex align-items-center gap-2">
                    <i class="bi bi-shield-lock" id="toolIcon"></i>
                    <span class="fw-bold" id="toolBannerTitle">أداة استراتيجية</span>
                </div>
            </div>

            <div class="tool-header" style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px">
                <div>
                    <h1 class="tool-title" id="toolTitle">أداة استراتيجية</h1>
                    <p class="tool-subtitle" id="toolSubtitle">وصف الأداة</p>
                </div>
                <button class="btn-ai-fill" id="aiFillBtn" onclick="autoFill()" style="padding:8px 20px;border-radius:20px;border:1px solid var(--tool-color);background:rgba(var(--tool-rgb),0.08);color:var(--tool-color);font-size:13px;font-weight:700;font-family:'Tajawal';cursor:pointer;display:flex;align-items:center;gap:6px;transition:all 0.2s;white-space:nowrap">
                    <i class="bi bi-magic"></i> توليد إجابات مثالية
                </button>
            </div>

            <div class="fields-grid" id="fieldsGrid">
                <!-- Built by JS -->
            </div>

            <div class="action-bar">
                <a href="javascript:history.back()" class="btn-back">
                    <i class="bi bi-arrow-right"></i> العودة
                </a>
                <button class="btn-save" id="saveBtn" onclick="saveTool()">
                    <i class="bi bi-cloud-check-fill me-2"></i> حفظ
                </button>
            </div>
        </main>
    </div>

    <div class="toast-msg" id="toastMsg"></div>

    <script src="/js/api.js?v=4"></script>
    <script src="/js/context-manager.js?v=4"></script>
    <script src="/js/dept-page.js?v=4"></script>
    <script src="/js/journey-steps.js?v=4"></script>
    <script src="/js/path-engine.js?v=4"></script>
    <script src="/js/sidebar.js?v=4"></script>
    <script src="/js/tool-fields-config.js?v=4"></script>
    <script>
        const code = (new URLSearchParams(window.location.search).get('code') || '').toUpperCase();
        const dept = new URLSearchParams(window.location.search).get('dept') || '';
        const config = window.TOOL_FIELDS[code];

        // Redirect to dedicated pages
        const REDIRECTS = { SWOT: '/swot.html', TOWS: '/tows.html' };
        if (REDIRECTS[code]) {
            window.location.replace(REDIRECTS[code] + (dept ? '?dept=' + dept : ''));
        }

        function hexToRgb(hex) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return `${r},${g},${b}`;
        }

        async function initTool() {
            if (!config) {
                document.querySelector('.stx-main-content').innerHTML = `
                    <div style="text-align:center;padding:60px;color:#94a3b8">
                        <i class="bi bi-exclamation-triangle" style="font-size:48px;display:block;margin-bottom:16px;color:#f59e0b"></i>
                        <h2>أداة غير معروفة: ${code}</h2>
                        <p>تأكد من الرابط أو ارجع <a href="/dashboard.html" style="color:#667eea">للمركز الاستراتيجي</a></p>
                    </div>`;
                return;
            }

            // Set colors
            const rgb = hexToRgb(config.color);
            document.documentElement.style.setProperty('--tool-color', config.color);
            document.documentElement.style.setProperty('--tool-rgb', rgb);

            // Set title & meta
            document.title = 'ستارتكس | ' + config.title;
            document.getElementById('phaseBadge').textContent = config.phaseLabel;
            document.getElementById('toolIcon').className = 'bi ' + config.icon;
            document.getElementById('toolBannerTitle').textContent = config.title;
            document.getElementById('toolTitle').textContent = config.title + (dept ? ' — ' + getDeptName(dept) : '');
            document.getElementById('toolSubtitle').textContent = config.subtitle;
            document.getElementById('saveBtn').innerHTML = '<i class="bi bi-cloud-check-fill me-2"></i> حفظ ' + config.title;

            // Build fields
            const grid = document.getElementById('fieldsGrid');
            config.fields.forEach(f => {
                const card = document.createElement('div');
                card.className = 'field-card' + (f.fullWidth ? ' full-width' : '');
                card.innerHTML = `
                    <div class="field-label">
                        <i class="bi ${f.icon}"></i>
                        ${f.label}
                    </div>
                    <textarea class="field-textarea" id="field_${f.id}" rows="${f.fullWidth ? 4 : 3}" placeholder="${f.placeholder}"></textarea>
                `;
                grid.appendChild(card);
            });

            // Load saved data
            try {
                const saveKey = config.saveKey + (dept ? '_' + dept.toUpperCase() : '');
                if (window.DeptPage) {
                    const ok = await DeptPage.init(dept || 'company');
                    const saved = await DeptPage.loadFromAPI(saveKey);
                    if (saved) {
                        config.fields.forEach(f => {
                            const el = document.getElementById('field_' + f.id);
                            if (el && saved[f.id]) el.value = saved[f.id];
                        });
                    }
                }
            } catch (e) { console.warn('Load error:', e); }
        }

        async function saveTool() {
            const data = {};
            config.fields.forEach(f => {
                data[f.id] = document.getElementById('field_' + f.id)?.value || '';
            });

            try {
                const saveKey = config.saveKey + (dept ? '_' + dept.toUpperCase() : '');
                const ok = await DeptPage.saveToAPI(saveKey, data);
                showToast(ok ? '✅ تم حفظ ' + config.title + ' بنجاح' : '⚠️ تم حفظ محلياً');
                if (config.nextUrl) {
                    setTimeout(() => {
                        window.location.href = config.nextUrl + (dept ? (config.nextUrl.includes('?') ? '&' : '?') + 'dept=' + dept : '');
                    }, 1200);
                }
            } catch (e) {
                showToast('❌ خطأ في الحفظ');
                console.error(e);
            }
        }

        function getDeptName(d) {
            const map = { hr: 'الموارد البشرية', finance: 'المالية', marketing: 'التسويق', operations: 'العمليات', sales: 'المبيعات', it: 'تقنية المعلومات', cs: 'خدمة العملاء', compliance: 'الامتثال', quality: 'الجودة', projects: 'المشاريع', support: 'الخدمات المساندة' };
            return map[d] || d || '';
        }

        function autoFill() {
            if (!config) return;
            showToast('🔄 جاري توليد إجابات مثالية...');

            const SAMPLES = {
                PESTEL: { political: 'استقرار سياسي نسبي مع توجه حكومي قوي لدعم التحول الرقمي ورؤية 2030. تسهيلات ضريبية للمنشآت الصغيرة والمتوسطة.', economic: 'نمو اقتصادي متسارع مع تنويع مصادر الدخل بعيداً عن النفط. ارتفاع القدرة الشرائية للفئة الشابة.', social: 'تحول ثقافي نحو ريادة الأعمال. جيل شاب متعلم ومتصل رقمياً. تغير أنماط الاستهلاك نحو التجارة الإلكترونية.', technological: 'بنية تحتية رقمية متقدمة. انتشار الذكاء الاصطناعي والحوسبة السحابية. فرص كبيرة في التقنية المالية.', environmental: 'توجه حكومي قوي نحو الاستدامة والطاقة المتجددة. مشاريع خضراء ضخمة مثل نيوم والبحر الأحمر.', legal: 'تحديث مستمر للأنظمة التجارية وقوانين الاستثمار الأجنبي. نظام حماية البيانات الشخصية الجديد.' },
                PORTER: { new_entrants: 'تهديد متوسط: حواجز الدخول منخفضة نسبياً مع التحول الرقمي، لكن بناء السمعة والثقة يحتاج وقت.', buyers: 'قوة عالية: العملاء لديهم خيارات متعددة ويقارنون الأسعار بسهولة عبر الإنترنت.', suppliers: 'قوة متوسطة: تعدد الموردين يقلل من قوتهم التفاوضية، لكن بعض المواد المتخصصة محدودة المصادر.', substitutes: 'تهديد متزايد: التقنيات الجديدة والحلول الرقمية تغير قواعد اللعبة باستمرار.', rivalry: 'منافسة شرسة: السوق مشبع بالمنافسين المحليين والدوليين. التميز يتطلب ابتكار مستمر وتجربة عميل استثنائية.' },
                VALUE_CHAIN: { inbound: 'إدارة مخزون جيدة مع فرص لتحسين التوريد المباشر وتقليل المخازن الوسيطة.', operations: 'عمليات إنتاج فعالة مع هامش تحسين في الأتمتة وتقليل الهدر بنسبة 15%.', outbound: 'شبكة توزيع واسعة لكن تكاليف التوصيل مرتفعة — فرصة للشراكة مع منصات لوجستية.', marketing_sales: 'حضور رقمي قوي مع تحويل منخفض — الحاجة لتحسين رحلة العميل الرقمية.', service: 'خدمة عملاء جيدة لكن وقت الاستجابة يحتاج تقليص من 24 ساعة إلى 4 ساعات.', support: 'بنية تحتية تقنية حديثة. فريق HR يحتاج تطوير في إدارة المواهب والتعاقب الوظيفي.' },
                CUSTOMER_JOURNEY: { awareness: 'العميل يعرفنا عبر وسائل التواصل (60%) ومحركات البحث (25%) والتوصيات (15%). الوعي بالعلامة متوسط.', consideration: 'يقارن الأسعار والمراجعات. نقطة ألم: المعلومات غير كافية على الموقع. المنافسون يقدمون تجربة أوضح.', purchase: 'عملية الشراء سلسة لكن 35% يتخلون عن السلة. السبب: تكاليف الشحن غير واضحة مبكراً.', experience: 'رضا 78% بعد الشراء. نقاط القوة: جودة المنتج. نقاط الألم: التأخير في التوصيل أحياناً.', loyalty: 'معدل إعادة الشراء 40% — جيد لكن يحتاج برنامج ولاء. 25% يوصون بنا لآخرين.' },
                EISENHOWER: { urgent_important: 'حل مشكلة العميل الرئيسي — تسليم المشروع المتأخر — إصلاح عطل النظام الحرج', not_urgent_important: 'تطوير استراتيجية النمو — تدريب الفريق — بناء شراكات جديدة — تحسين العمليات', urgent_not_important: 'الرد على الإيميلات الروتينية — حضور اجتماعات إعلامية — تقارير أسبوعية شكلية', not_urgent_not_important: 'متابعة أخبار غير ذات صلة — اجتماعات بدون أجندة — مهام يمكن إلغاؤها' },
                BUSINESS_MODEL: { value_proposition: 'حلول استراتيجية مبسطة تمكّن أصحاب الأعمال من بناء خطط نمو مدروسة بدون استشاريين مكلفين.', customer_segments: 'أصحاب المنشآت الصغيرة والمتوسطة (10-200 موظف) في السعودية والخليج.', channels: 'منصة SaaS + تسويق رقمي + شراكات مع حاضنات الأعمال + ورش عمل.', revenue_streams: 'اشتراكات شهرية/سنوية (3 حزم) + خدمات استشارية مخصصة + تدريب.', key_resources: 'فريق تطوير تقني + خبراء استراتيجية + بيانات معيارية قطاعية + منصة سحابية.', key_activities: 'تطوير المنصة + إنتاج محتوى تعليمي + دعم العملاء + تحديث الأدوات.', key_partners: 'حاضنات أعمال + غرف تجارية + جامعات + مزودي بيانات اقتصادية.', cost_structure: 'تكاليف التطوير (40%) + التسويق (25%) + البنية التحتية (15%) + الفريق (20%).', customer_relationships: 'دعم فني مباشر + مجتمع مستخدمين + ورش عمل دورية + محتوى تعليمي مجاني.' },
                PARETO: { top_20_revenue: '3 خدمات رئيسية من أصل 12 تولّد 78% من الإيرادات. التركيز عليها يضاعف العائد.', top_20_problems: 'مشكلتان تكراريتان (تأخير التسليم + أخطاء الفوترة) تسببان 82% من شكاوى العملاء.', top_20_customers: '15 عميل من أصل 200 يمثلون 73% من المبيعات. فقدان أي منهم = خطر كبير.', action_plan: 'تعزيز الخدمات الثلاث الرئيسية + أتمتة الفوترة + برنامج VIP للعملاء الـ 15 الكبار.' },
                DIGITAL_READINESS: { infrastructure: 'بنية تحتية متوسطة: سيرفرات سحابية + شبكة محلية. تحتاج ترقية نظام ERP.', processes: '40% من العمليات مؤتمتة. المالية والمخزون رقمية. الموارد البشرية والعمليات لسا يدوية.', skills: 'الفريق التقني ممتاز. باقي الأقسام تحتاج تدريب على الأدوات الرقمية الأساسية.', data: 'بيانات متفرقة في أنظمة مختلفة. لا يوجد مستودع بيانات مركزي أو BI dashboard.', security: 'حماية أساسية (firewall + antivirus). تحتاج سياسة أمن سيبراني شاملة وتدريب الموظفين.' },
                STRESS_TEST: { revenue_drop: 'انخفاض 30% يعني عجز بـ 450K ريال ربعياً. نصمد 4 شهور بالسيولة الحالية. نحتاج خطة خفض تكاليف 20%.', key_person_loss: 'فقدان المدير التقني = توقف التطوير 3 شهور. لا يوجد نائب مؤهل. خطر عالي جداً.', market_disruption: 'دخول منافس بتقنية AI سيقلص حصتنا 40% خلال سنة إذا ما تحركنا. نحتاج استثمار في الابتكار.', supply_chain: 'موردنا الأساسي يمثل 70% من المشتريات. توقفه 3 شهور = كارثة. نحتاج موردين بدلاء.', mitigation: 'إنشاء صندوق طوارئ 6 شهور + توثيق المعرفة + تنويع الموردين + استثمار 10% في R&D.' },
            };

            const sample = SAMPLES[code];
            if (!sample) { showToast('⚠️ لا توجد إجابات مثالية لهذه الأداة بعد'); return; }

            config.fields.forEach(f => {
                const el = document.getElementById('field_' + f.id);
                if (el && sample[f.id]) el.value = sample[f.id];
            });

            showToast('✨ تم توليد إجابات مثالية بنجاح — راجعها وعدّلها حسب واقع منشأتك');
        }

        function showToast(msg) {
            const t = document.getElementById('toastMsg');
            t.textContent = msg;
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }

        document.addEventListener('DOMContentLoaded', initTool);
    </script>
</body>

</html>
