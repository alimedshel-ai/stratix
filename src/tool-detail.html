<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ستارتكس | تحليل القوى الخمس (بورتر)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/dept-pages.css">
    <style>
        :root {
            --bg-dark: #0f1117;
            --card-bg: rgba(30, 41, 59, 0.7);
            --border: rgba(255, 255, 255, 0.1);
            --primary: #818cf8;
            --secondary: #2dd4bf;
            --accent-p5f: #f472b6;
        }

        body {
            background-color: var(--bg-dark);
            color: #e2e8f0;
            font-family: 'Tajawal', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        .stx-wrapper {
            display: flex;
            min-height: 100vh;
            width: 100%;
        }

        .stx-sidebar-container {
            width: 260px;
            flex-shrink: 0;
            background: #1a1d2e;
            border-left: 1px solid var(--border);
        }

        .stx-main-content {
            flex: 1;
            padding: 0 !important;
        }

        .stx-journey-banner {
            background: linear-gradient(90deg, rgba(244, 114, 182, 0.1) 0%, rgba(129, 140, 248, 0.1) 100%);
            border-bottom: 1px solid var(--border);
            padding: 8px 24px;
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 1.5rem;
            backdrop-filter: blur(10px);
        }

        /* Porter's Visual Structure */
        .porter-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            padding: 0 24px 24px;
        }

        .force-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px;
            transition: all 0.3s ease;
        }

        .force-card:hover {
            border-color: var(--accent-p5f);
            transform: translateY(-2px);
        }

        .force-label {
            font-weight: 800;
            font-size: 1.1rem;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--accent-p5f);
        }

        textarea {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border);
            color: white;
            border-radius: 12px;
            padding: 12px;
            width: 100%;
            outline: none;
            transition: border-color 0.3s;
            font-size: 0.9rem;
        }

        textarea:focus {
            border-color: var(--accent-p5f);
        }
    </style>
</head>

<body>
    <div class="stx-wrapper">
        <aside class="stx-sidebar-container"></aside>

        <main class="stx-main-content">
            <!-- Journey Banner -->
            <div class="stx-journey-banner">
                <div class="phase-badge"
                    style="background:rgba(244, 114, 182, 0.2); color:#f472b6; border-color:rgba(244, 114, 182, 0.3)">
                    محطة التشخيص: بورتر</div>
                <div class="d-flex align-items-center gap-2">
                    <i class="bi bi-shield-lock text-accent"></i>
                    <span class="fw-bold">تحليل القوى الخمس (Porter's 5 Forces)</span>
                </div>
            </div>

            <div class="p-4 pt-1">
                <div class="mb-4 d-flex justify-content-between align-items-center">
                    <div>
                        <h1 class="fw-bold h4 mb-1">تحليل قوى المنافسة لقسم <span id="dept-name"
                                class="text-accent fw-bold">...</span></h1>
                        <p class="text-muted small mb-0">افهم توازنات القوى في سوق العمل والبيئة التنافسية المحيطة
                            بإدارتك.
                        </p>
                    </div>
                    <button class="btn btn-outline-accent rounded-pill px-4 btn-sm fw-bold"
                        style="border-color:#f472b6; color:#f472b6;" onclick="autoFillPorter()">
                        <i class="bi bi-magic me-1"></i> توليد إجابات مثالية
                    </button>
                </div>

                <div class="porter-container">
                    <!-- New Entrants -->
                    <div class="force-card">
                        <div class="force-label"><i class="bi bi-box-arrow-in-right"></i> تهديد الداخلين الجدد</div>
                        <textarea id="force_new_entrants" rows="3"
                            placeholder="ما هي سهولة دخول منافسين جدد لمجال عمل القسم؟"></textarea>
                    </div>

                    <!-- Buyers -->
                    <div class="force-card">
                        <div class="force-label"><i class="bi bi-people"></i> قوة المشترين (العملاء)</div>
                        <textarea id="force_buyers" rows="3"
                            placeholder="ما مدى تأثير العملاء الداخليين أو الخارجيين على قرارات القسم؟"></textarea>
                    </div>

                    <!-- Suppliers -->
                    <div class="force-card">
                        <div class="force-label"><i class="bi bi-truck"></i> قوة الموردين</div>
                        <textarea id="force_suppliers" rows="3"
                            placeholder="ما مدى سيطرة مزودي الخدمة أو المواد على مدخلات القسم؟"></textarea>
                    </div>

                    <!-- Substitutes -->
                    <div class="force-card">
                        <div class="force-label"><i class="bi bi-arrow-repeat"></i> تهديد البدلاء</div>
                        <textarea id="force_substitutes" rows="3"
                            placeholder="هل هناك تقنيات أو طرق بديلة قد تلغي الحاجة لمهام القسم؟"></textarea>
                    </div>

                    <!-- Rivalry (Full Width) -->
                    <div class="force-card" style="grid-column: 1 / span 2;">
                        <div class="force-label"><i class="bi bi-fire"></i> شدة المنافسة الحالية</div>
                        <textarea id="force_rivalry" rows="4"
                            placeholder="كيف هي المنافسة الحالية على الكفاءات والموارد والنتائج؟"></textarea>
                    </div>
                </div>

                <div
                    class="mt-4 pt-3 border-top border-secondary border-opacity-10 d-flex justify-content-between align-items-center p-3">
                    <button type="button" onclick="history.back()" class="btn btn-link text-muted text-decoration-none">
                        <i class="bi bi-arrow-right me-1"></i> العودة للخلف
                    </button>
                    <button type="button" onclick="savePorter()" class="btn btn-primary rounded-pill px-5 py-2 fw-bold"
                        style="background:#f472b6; border:none;">
                        <i class="bi bi-cloud-check-fill me-2"></i> حفظ نتائج تحليل القوى
                    </button>
                </div>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="/js/api.js?v=4"></script>
    <script src="/js/context-manager.js?v=4"></script>
    <script src="/js/dept-page.js?v=4"></script>
    <script src="/js/steps-config.js?v=4"></script>
    <script src="/js/sidebar.js?v=4"></script>
    <script>
        const code = new URLSearchParams(window.location.search).get('code') || 'PORTER';
        const dept = new URLSearchParams(window.location.search).get('dept') || 'hr';
        const DEPT_LABELS = { hr: 'الموارد البشرية', finance: 'المالية', marketing: 'التسويق', operations: 'العمليات' };

        async function initPorter() {
            // 🚀 تحويل ذكي لـ SWOT إذا تم طلبه
            if (code.toUpperCase() === 'SWOT') {
                window.location.replace(`/swot.html?dept=${dept}&v=${new URLSearchParams(window.location.search).get('v') || ''}`);
                return;
            }

            document.getElementById('dept-name').textContent = DEPT_LABELS[dept] || dept.toUpperCase();
            if (window.Sidebar) window.Sidebar.init();

            // Load saved data for Porter
            const saved = await DeptPage.loadFromAPI('PORTER_' + dept.toUpperCase());
            if (saved) {
                document.getElementById('force_new_entrants').value = saved.new_entrants || '';
                document.getElementById('force_buyers').value = saved.buyers || '';
                document.getElementById('force_suppliers').value = saved.suppliers || '';
                document.getElementById('force_substitutes').value = saved.substitutes || '';
                document.getElementById('force_rivalry').value = saved.rivalry || '';
            }
        }

        async function autoFillPorter() {
            DeptPage.showMessage('🔄 جاري توليد إجابات تنافسية مثالية لقسمك...');

            const IDEAL_PORTER = {
                hr: {
                    new_entrants: "تهديد متوسط: دخول شركات تقنية ناشئة تعتمد ثقافة العمل المرن بالكامل وتجذب المواهب بنظام العمل عن بُعد العابر للحدود.",
                    buyers: "قوة عالية للموظفين: الكفاءات النادرة تملك قوة تفاوضية مرتفعة حالياً نظراً لزيادة الطلب على المهارات الرقمية المتخصصة.",
                    suppliers: "قوة متوسطة للموردين: شركات التوظيف ومنصات (LinkedIn) تملك بيانات ضخمة لكنها تعاني من شح في الكفاءات النوعية.",
                    substitutes: "تهديد متزايد: تقنيات الأتمتة والذكاء الاصطناعي بدأت تحل محل بعض المهام الإدارية والتشغيلية في الموارد البشرية.",
                    rivalry: "منافسة شرسة: الصراع على استقطاب الـ (Top 1% Talent) يتزايد بين القطاعات المختلفة وليس فقط المنافسين المباشرين."
                }
            };

            const data = IDEAL_PORTER[dept] || IDEAL_PORTER.hr;

            document.getElementById('force_new_entrants').value = data.new_entrants;
            document.getElementById('force_buyers').value = data.buyers;
            document.getElementById('force_suppliers').value = data.suppliers;
            document.getElementById('force_substitutes').value = data.substitutes;
            document.getElementById('force_rivalry').value = data.rivalry;

            DeptPage.showMessage('✨ تم توليد "القوى الخمس" المثالية لقسمك بنجاح.');
        }

        async function savePorter() {
            const data = {
                new_entrants: document.getElementById('force_new_entrants').value,
                buyers: document.getElementById('force_buyers').value,
                suppliers: document.getElementById('force_suppliers').value,
                substitutes: document.getElementById('force_substitutes').value,
                rivalry: document.getElementById('force_rivalry').value
            };

            const success = await DeptPage.saveToAPI('PORTER_' + dept.toUpperCase(), data);
            if (success) {
                DeptPage.showMessage('✅ تم حفظ تحليل بورتر بنجاح.');
                setTimeout(() => window.location.href = `/dept-health.html?dept=${dept}&t=${Date.now()}`, 1200);
            }
        }

        document.addEventListener('DOMContentLoaded', initPorter);
    </script>
</body>

</html>
