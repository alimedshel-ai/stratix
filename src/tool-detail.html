<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ستارتكس - أداة التحليل</title>
    <script>
        // Redirect SWOT to dedicated page
        if (new URLSearchParams(location.search).get('code') === 'SWOT') {
            location.replace('/swot.html');
        }
    </script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #667eea;
            --secondary: #764ba2;
            --bg: #0f1117;
            --bg-card: #1a1d2e;
            --bg-card-hover: #232640;
            --text: #e2e8f0;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.08);
            --tool-color: #4F46E5;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            font-family: 'Tajawal', 'Segoe UI', sans-serif;
            color: var(--text);
            min-height: 100vh;
        }

        /* NAVBAR */
        .top-nav {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            padding: 14px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .top-nav .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            color: white;
            text-decoration: none;
            font-size: 20px;
            font-weight: 700;
        }

        .top-nav .nav-links {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .top-nav .nav-links a {
            color: rgba(255, 255, 255, 0.85);
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.2s;
        }

        .top-nav .nav-links a:hover,
        .top-nav .nav-links a.active {
            background: rgba(255, 255, 255, 0.15);
            color: white;
        }

        /* BREADCRUMB */
        .breadcrumb-bar {
            padding: 15px 30px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            color: var(--text-muted);
        }

        .breadcrumb-bar a {
            color: var(--text-muted);
            text-decoration: none;
            transition: color 0.2s;
        }

        .breadcrumb-bar a:hover {
            color: var(--primary);
        }

        .breadcrumb-bar .sep {
            opacity: 0.4;
        }

        .breadcrumb-bar .current {
            color: var(--text);
            font-weight: 600;
        }

        /* TOOL HEADER */
        .tool-header {
            padding: 20px 30px 30px;
            max-width: 1100px;
            margin: 0 auto;
        }

        .tool-header-top {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .tool-icon-lg {
            width: 64px;
            height: 64px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: white;
            flex-shrink: 0;
        }

        .tool-title-area h1 {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 4px;
        }

        .tool-title-area .tool-en {
            font-size: 14px;
            color: var(--text-muted);
        }

        .tool-meta {
            display: flex;
            gap: 12px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .tool-meta .meta-badge {
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        /* PROGRESS CARD */
        .progress-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px 25px;
            margin-bottom: 25px;
            max-width: 1100px;
            margin-left: auto;
            margin-right: auto;
        }

        .progress-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .progress-row .status-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .progress-track {
            height: 8px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 8px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            border-radius: 8px;
            transition: width 0.6s ease;
        }

        .progress-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .btn-tool {
            padding: 10px 24px;
            border-radius: 10px;
            border: none;
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-tool-primary {
            background: var(--tool-color);
            color: white;
        }

        .btn-tool-primary:hover {
            filter: brightness(1.15);
            transform: translateY(-1px);
        }

        .btn-tool-secondary {
            background: rgba(255, 255, 255, 0.06);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-tool-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        /* CONTENT AREA */
        .content-area {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 30px 60px;
        }

        /* SECTIONS GRID */
        .sections-grid {
            display: grid;
            gap: 16px;
        }

        .sections-grid.grid-2 {
            grid-template-columns: repeat(2, 1fr);
        }

        .sections-grid.grid-3 {
            grid-template-columns: repeat(3, 1fr);
        }

        .sections-grid.grid-4 {
            grid-template-columns: repeat(2, 1fr);
        }

        /* Value Chain grouped layout */
        .vc-group {
            margin-bottom: 28px;
        }

        .vc-group-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
            padding: 14px 20px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.01));
            border-radius: 14px;
            border-right: 4px solid var(--primary);
        }

        .vc-group-header.support {
            border-right-color: #7C3AED;
        }

        .vc-group-header .vc-icon {
            font-size: 24px;
            flex-shrink: 0;
        }

        .vc-group-header .vc-title {
            font-size: 16px;
            font-weight: 800;
            color: var(--text);
        }

        .vc-group-header .vc-desc {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .vc-group-grid {
            display: grid;
            gap: 16px;
        }

        .vc-group-grid.primary-grid {
            grid-template-columns: repeat(5, 1fr);
        }

        .vc-group-grid.support-grid {
            grid-template-columns: repeat(4, 1fr);
        }

        /* Value Chain flow arrow between primary cards */
        .vc-group-grid.primary-grid .section-card {
            position: relative;
        }

        .vc-flow-arrow {
            position: absolute;
            left: -14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 14px;
            color: var(--text-muted);
            opacity: 0.5;
        }

        /* Value Chain Visualization Helper */
        .vc-viz-helper {
            background: linear-gradient(135deg, rgba(8, 145, 178, 0.08), rgba(6, 182, 212, 0.04));
            border: 1px solid rgba(8, 145, 178, 0.2);
            border-radius: 18px;
            padding: 24px 28px;
            margin-bottom: 24px;
        }

        .vc-viz-helper-title {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .vc-viz-helper-title .viz-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: rgba(8, 145, 178, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            flex-shrink: 0;
        }

        .vc-viz-helper-title h4 {
            font-size: 16px;
            font-weight: 800;
            color: var(--text);
            margin: 0;
        }

        .vc-viz-helper-title p {
            font-size: 12px;
            color: var(--text-muted);
            margin: 2px 0 0;
        }

        .vc-flow-diagram {
            display: flex;
            align-items: stretch;
            gap: 0;
            margin-bottom: 16px;
            position: relative;
        }

        .vc-flow-step {
            flex: 1;
            text-align: center;
            padding: 14px 8px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            transition: all 0.3s;
        }

        .vc-flow-step:first-child {
            border-radius: 0 14px 14px 0;
        }

        .vc-flow-step:last-child {
            border-radius: 14px 0 0 14px;
        }

        .vc-flow-step:hover {
            background: rgba(8, 145, 178, 0.08);
            border-color: rgba(8, 145, 178, 0.25);
        }

        .vc-flow-step .step-emoji {
            font-size: 24px;
        }

        .vc-flow-step .step-name {
            font-size: 11px;
            font-weight: 700;
            color: var(--text);
            line-height: 1.3;
        }

        .vc-flow-arrow-between {
            display: flex;
            align-items: center;
            color: #06B6D4;
            font-size: 18px;
            flex-shrink: 0;
            padding: 0 2px;
        }

        .vc-support-bar {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .vc-support-chip {
            padding: 6px 14px;
            border-radius: 20px;
            background: rgba(124, 58, 237, 0.08);
            border: 1px solid rgba(124, 58, 237, 0.15);
            font-size: 11px;
            font-weight: 600;
            color: #a78bfa;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .vc-margin-label {
            background: linear-gradient(90deg, rgba(34, 197, 94, 0.1), rgba(16, 185, 129, 0.05));
            border: 1px solid rgba(34, 197, 94, 0.2);
            border-radius: 12px;
            padding: 10px 18px;
            margin-top: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            font-weight: 700;
            color: #22c55e;
        }

        @media (max-width: 768px) {
            .vc-flow-diagram {
                flex-direction: column;
            }

            .vc-flow-arrow-between {
                transform: rotate(90deg);
                padding: 4px 0;
            }

            .vc-flow-step:first-child {
                border-radius: 14px 14px 0 0;
            }

            .vc-flow-step:last-child {
                border-radius: 0 0 14px 14px;
            }
        }

        @media (max-width: 1100px) {
            .vc-group-grid.primary-grid {
                grid-template-columns: repeat(3, 1fr);
            }

            .vc-group-grid.support-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {

            .vc-group-grid.primary-grid,
            .vc-group-grid.support-grid {
                grid-template-columns: 1fr;
            }
        }

        /* ═══ PORTER FIVE FORCES VISUAL ═══ */
        .porter-forces-viz {
            background: linear-gradient(135deg, rgba(249, 115, 22, 0.04), rgba(234, 179, 8, 0.03));
            border: 1px solid rgba(249, 115, 22, 0.15);
            border-radius: 20px;
            padding: 28px;
            margin-bottom: 28px;
            position: relative;
        }

        .porter-viz-title {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }

        .porter-viz-title .viz-icon {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            background: linear-gradient(135deg, rgba(249, 115, 22, 0.2), rgba(234, 179, 8, 0.15));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            flex-shrink: 0;
        }

        .porter-viz-title h4 {
            font-size: 17px;
            font-weight: 800;
            color: var(--text);
            margin: 0;
        }

        .porter-viz-title p {
            font-size: 12px;
            color: var(--text-muted);
            margin: 2px 0 0;
        }

        .porter-diamond {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            grid-template-rows: auto auto auto;
            gap: 12px;
            max-width: 600px;
            margin: 0 auto;
        }

        .porter-force-node {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            padding: 16px 10px;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.03);
            border: 1.5px solid var(--border);
            transition: all 0.3s;
            cursor: pointer;
            text-decoration: none;
        }

        .porter-force-node:hover {
            background: rgba(255, 255, 255, 0.06);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
        }

        .porter-force-node.center-force {
            grid-column: 2;
            grid-row: 2;
            background: rgba(239, 68, 68, 0.06);
            border-color: rgba(239, 68, 68, 0.25);
        }

        .porter-force-node.top-force {
            grid-column: 2;
            grid-row: 1;
        }

        .porter-force-node.left-force {
            grid-column: 1;
            grid-row: 2;
        }

        .porter-force-node.right-force {
            grid-column: 3;
            grid-row: 2;
        }

        .porter-force-node.bottom-force {
            grid-column: 2;
            grid-row: 3;
        }

        .porter-force-node .force-emoji {
            font-size: 28px;
        }

        .porter-force-node .force-name {
            font-size: 11px;
            font-weight: 700;
            color: var(--text);
            text-align: center;
            line-height: 1.4;
        }

        .porter-force-node .force-count {
            font-size: 10px;
            font-weight: 700;
            padding: 2px 10px;
            border-radius: 10px;
        }

        /* Arrows between forces */
        .porter-arrow {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: var(--text-muted);
            opacity: .4;
        }

        .porter-arrow.top-arrow {
            grid-column: 2;
            grid-row: 1;
            align-self: end;
        }

        .porter-arrow.left-arrow {
            grid-column: 1;
            grid-row: 2;
            justify-self: end;
        }

        .porter-arrow.right-arrow {
            grid-column: 3;
            grid-row: 2;
            justify-self: start;
        }

        .porter-arrow.bottom-arrow {
            grid-column: 2;
            grid-row: 3;
            align-self: start;
        }

        .porter-legend {
            display: flex;
            gap: 16px;
            justify-content: center;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .porter-legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            color: var(--text-muted);
        }

        .porter-legend-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        @media (max-width: 768px) {
            .porter-diamond {
                max-width: 100%;
                gap: 8px;
            }

            .porter-force-node {
                padding: 12px 6px;
            }

            .porter-force-node .force-emoji {
                font-size: 22px;
            }

            .porter-force-node .force-name {
                font-size: 10px;
            }
        }

        .section-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.3s;
        }

        .section-card:hover {
            border-color: rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
        }

        .section-header {
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
        }

        .section-header h3 {
            font-size: 16px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-header .count-badge {
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .section-body {
            padding: 16px 20px;
            min-height: 120px;
        }

        /* ITEMS LIST */
        .item-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .item-list li {
            padding: 10px 14px;
            border-radius: 10px;
            margin-bottom: 8px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.04);
            transition: all 0.2s;
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }

        .item-list li:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: var(--border);
        }

        .item-list .item-icon {
            flex-shrink: 0;
            margin-top: 2px;
            font-size: 14px;
        }

        .item-list .item-content {
            flex: 1;
        }

        .item-list .item-title {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 2px;
        }

        .item-list .item-desc {
            font-size: 12px;
            color: var(--text-muted);
        }

        .item-list .item-impact {
            flex-shrink: 0;
            padding: 2px 10px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 600;
        }

        .impact-HIGH {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
        }

        .impact-MEDIUM {
            background: rgba(250, 204, 21, 0.15);
            color: #facc15;
        }

        .impact-LOW {
            background: rgba(34, 197, 94, 0.15);
            color: #22c55e;
        }

        /* ADD ITEM FORM */
        .add-item-row {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }

        .add-item-row input {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 14px;
            color: var(--text);
            font-family: inherit;
            font-size: 13px;
        }

        .add-item-row input:focus {
            outline: none;
            border-color: var(--tool-color);
        }

        .add-item-row input::placeholder {
            color: var(--text-muted);
            opacity: 0.6;
        }

        /* ENHANCED PESTEL STYLES */
        .pestel-section-desc {
            font-size: 12px;
            color: var(--text-muted);
            margin: -4px 0 12px;
            line-height: 1.6;
        }

        .pestel-questions {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 14px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }

        .pestel-questions .q-toggle {
            font-size: 12px;
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 600;
            user-select: none;
        }

        .pestel-questions .q-toggle:hover {
            color: var(--text);
        }

        .pestel-questions .q-list {
            display: none;
            flex-direction: column;
            gap: 4px;
            margin-top: 6px;
        }

        .pestel-questions.open .q-list {
            display: flex;
        }

        .pestel-questions .q-item {
            font-size: 11px;
            color: var(--text-muted);
            padding: 6px 10px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 6px;
            cursor: pointer;
            transition: all .2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .pestel-questions .q-item:hover {
            background: rgba(255, 255, 255, 0.06);
            color: var(--text);
        }

        .pestel-examples {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 10px;
        }

        .pestel-examples .ex-chip {
            font-size: 10px;
            padding: 3px 10px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: var(--text-muted);
            cursor: pointer;
            transition: all .2s;
        }

        .pestel-examples .ex-chip:hover {
            background: rgba(255, 255, 255, 0.08);
            color: var(--text);
            border-color: var(--tool-color);
        }

        .pestel-impact-row {
            display: flex;
            gap: 6px;
            align-items: center;
            margin-top: 6px;
        }

        .pestel-impact-row select {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 6px 10px;
            color: var(--text);
            font-family: inherit;
            font-size: 11px;
            cursor: pointer;
        }

        .pestel-impact-row select:focus {
            outline: none;
            border-color: var(--tool-color);
        }

        .impact-type-opportunity {
            background: rgba(34, 197, 94, 0.12) !important;
            color: #22c55e !important;
        }

        .impact-type-threat {
            background: rgba(239, 68, 68, 0.12) !important;
            color: #ef4444 !important;
        }

        .pestel-header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }

        .pestel-header-row .factor-en {
            font-size: 11px;
            color: var(--text-muted);
            opacity: 0.6;
            font-weight: 400;
        }

        .add-item-row button {
            padding: 8px 14px;
            border-radius: 8px;

            font-size: 13px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .add-item-row button:hover {
            filter: brightness(1.15);
        }

        /* SUMMARY CARD */
        .summary-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            margin-top: 20px;
        }

        .summary-card h3 {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .summary-text {
            font-size: 14px;
            color: var(--text-muted);
            line-height: 1.8;
            background: rgba(255, 255, 255, 0.03);
            padding: 15px;
            border-radius: 10px;
        }

        /* EMPTY STATE */
        .empty-section {
            text-align: center;
            padding: 30px 10px;
            color: var(--text-muted);
        }

        .empty-section i {
            font-size: 36px;
            opacity: 0.3;
            margin-bottom: 10px;
            display: block;
        }

        .empty-section p {
            font-size: 13px;
            opacity: 0.6;
        }

        /* LOADING */
        .loading-overlay {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 20px;
            gap: 15px;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* TOAST */
        .toast-container {
            position: fixed;
            bottom: 30px;
            left: 30px;
            z-index: 200;
        }

        .toast-msg {
            background: var(--bg-card);
            color: var(--text);
            border: 1px solid var(--border);
            padding: 12px 20px;
            border-radius: 12px;
            font-size: 14px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
            animation: slideUp 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 8px;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .tool-header {
                padding: 15px;
            }

            .content-area {
                padding: 0 15px 40px;
            }

            .sections-grid.grid-2,
            .sections-grid.grid-3,

                grid-template-columns: 1fr;

        // نستخدمها فقط عند إدراج نص ديناميكي داخل innerHTML
        // النصوص الثابتة (labels, icons) لا تحتاج escaping
        function escapeHtml(str) {
            if (typeof str !== 'string') return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // ═══ SECURITY: showToast with textContent (no innerHTML for user text) ═══
        function showToast(message) {
            const container = document.getElementById('toastContainer');
            if (!container) return;
            const toast = document.createElement('div');
            toast.style.cssText = 'padding:12px 20px;background:var(--bg-card);border:1px solid var(--border);border-radius:12px;color:var(--text);font-size:13px;font-weight:600;margin-bottom:8px;animation:fadeIn .3s ease;box-shadow:0 4px 20px rgba(0,0,0,.3)';
            toast.textContent = message; // textContent — no XSS
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3500);
        }

        // ═══ SECURITY: Central event delegation for dynamic content ═══
        // بدل onclick inline — نستخدم data-action attributes
        function attachEventHandlers() {
            // Event delegation — single listener for all dynamic actions
            document.body.addEventListener('click', function (e) {
                const target = e.target.closest('[data-action]');
                if (!target) return;

                const action = target.dataset.action;
                const key = target.dataset.key || '';
                const color = target.dataset.color || '';
                const idx = target.dataset.idx;

                switch (action) {
                    case 'go-tools':
                        window.location.href = '/tools.html';
                        break;
                    case 'sync-tool':
                        syncTool();
                        break;
                    case 'add-item':
                        addPestelItem(key, color);
                        break;
                    case 'remove-item':
                        if (idx !== undefined) removeItem(key, parseInt(idx));
                        break;
                    case 'toggle-questions':
                        target.closest('.pestel-questions')?.classList.toggle('open');
                        break;
                    case 'fill-input': {
                        const input = document.getElementById('input-' + key) || document.getElementById('vcInput_' + key);
                        if (input) { input.value = target.textContent.trim(); input.focus(); }
                        break;
                    }
                    case 'fill-example': {
                        const input = document.getElementById('input-' + key);
                        if (input) { input.value = target.dataset.value || target.textContent.trim(); input.focus(); }
                        break;
                    }
                    case 'toggle-vc':
                        if (typeof toggleVcActivity === 'function') toggleVcActivity(key);
                        break;
                    case 'toggle-cj':
                        if (typeof toggleCjStage === 'function') toggleCjStage(key);
                        break;
                    case 'remove-vc-item':
                        if (typeof removeVcItem === 'function' && idx !== undefined) removeVcItem(key, parseInt(idx), color);
                        break;
                    case 'add-vc-item': {
                        const vcInput = document.getElementById('vcInput_' + key);
                        if (vcInput && typeof addVcItem === 'function') addVcItem(key, vcInput.value, color);
                        break;
                    }
                    case 'scroll-to': {
                        const el = document.getElementById('section-' + key);
                        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        break;
                    }
                }
            });

            document.body.addEventListener('keypress', function (e) {
                if (e.key === 'Enter') {
                    const target = e.target;

        // ===== API =====
        async function api(url, opts = {}) {
            const res = await window.apiRequest(url, {
                ...opts,
                credentials: 'same-origin',
                headers: { 'Content-Type': 'application/json', ...opts.headers }
            });
            if (res.status === 401) { window.location.href = '/select-type.html?error=401&url=' + encodeURIComponent(url); return; }
            if (res.status === 403) { window.location.href = '/select-type.html?error=403&url=' + encodeURIComponent(url); return; }
            if (!res.ok) throw new Error(`API ${res.status}: ${url}`);
            return res.json();
        }

                    apiFailed = true;

                // Fallback to fetch directly from static file if API is blocked/404 or missing tool
                if (apiFailed || !toolData) {
                    try {
                        const res = await fetch('/tools-data.json');
                        if (res.ok) {
                            const allData = await res.json();
                            toolData = allData.tools[state.toolCode];
                            if (toolData) toolData.code = state.toolCode;
                        }
                    } catch (staticErr) {
                        console.warn('Static JSON fetch failed');
                    }
                }

                // Ultimate fallback: Use hardcoded definitions
                if (!toolData && LOCAL_TOOLS_FALLBACK[state.toolCode]) {
                    console.info('Using hardcoded fallback for tool:', state.toolCode);
                    toolData = LOCAL_TOOLS_FALLBACK[state.toolCode];
                    toolData.code = state.toolCode;
                }

                if (!toolData) {
                    throw new Error(`Tool ${state.toolCode} not found in API, JSON, or Fallbacks.`);
                }

                state.tool = toolData?.tool || toolData;

                if (!state.tool || !state.tool.code) {
                    window.location.href = '/tools';
                    return;
                }

                // Set page title
                document.title = `ستارتكس - ${state.tool.nameAr}`;

                // If no versionId, try to get first version
                if (!state.versionId) {
                    try {
                        const vData = await api('/api/versions');
                        const versions = vData.versions || vData || [];
                        if (Array.isArray(versions) && versions.length > 0) {
                            state.versionId = versions[0].id;
                            localStorage.setItem('selectedVersionId', state.versionId);
                        }
                    } catch (vErr) {
                        console.warn('Could not load versions:', vErr.message);
                    }
                }

                // Render header
                renderHeader();

                // Load analysis data
                if (state.versionId) {
                    await loadAnalysis();
                }

                // Render the tool content
                renderContent();

                // Render diagnosis journey bar (if diagnosis tool)
                if (DIAG_TOOL_CODES.has(state.toolCode)) {
                    await renderDiagnosisJourney();
                }

            } catch (e) {
                console.error('Init error:', e);
                document.getElementById('contentArea').innerHTML = `
          <div style="text-align:center;padding:60px;color:var(--text-muted);">
            <i class="bi bi-exclamation-triangle" style="font-size:48px;opacity:0.3;"></i>
            <h3 style="margin-top:15px;">خطأ في التحميل</h3>
            <p>${e.message}</p>
            <a href="/tools" style="color:var(--primary);">العودة للمسار</a>
          </div>`;
            }
        }

        // ===== LOAD ANALYSIS =====
        async function loadAnalysis() {
            try {
                const data = await api(`/api/company-analysis/version/${state.versionId}/${state.toolCode}`);
                if (data && !data.error) {
                    state.analysis = data;
                }
            } catch (e) {
                console.log('No analysis found yet');
            }
        }

        // ===== RENDER HEADER =====
        // ===== DIAGNOSIS JOURNEY BAR =====
        async function renderDiagnosisJourney() {
            const diagTools = DIAG_TOOLS;

            // Load progress for each tool (parallel for speed)
            const toolProgress = {};
            if (state.versionId) {
                const results = await Promise.allSettled(
                    diagTools.map(dt => api(`/api/company-analysis/version/${state.versionId}/${dt.code}`).catch(() => null))
                );
                diagTools.forEach((dt, idx) => {
                    const res = results[idx].status === 'fulfilled' ? results[idx].value : null;
                    let prog = res?.progress || 0;
                    // Fallback: check localStorage for tools that save locally
                    if (prog === 0) {
                        prog = getLocalProgress(dt.code);
                    }
                    toolProgress[dt.code] = prog;
                });
            }

            // Helper: estimate progress from localStorage data
            function getLocalProgress(code) {
                try {
                    switch (code) {
                        case 'INTERNAL_ENV': {
                            // company-health.html saves to 'stratix_company_health'
                            const healthData = localStorage.getItem('stratix_company_health');
                            if (healthData) {
                                const d = JSON.parse(healthData);
                                if (!d) return 0;
                                // Check how many tabs/sections have data
                                const sections = ['overview', 'departments', 'financial', 'operations', 'culture', 'risks'];
                                const filled = sections.filter(s => d[s] && (Array.isArray(d[s]) ? d[s].length > 0 : Object.keys(d[s]).length > 0)).length;
                                return filled > 0 ? Math.min(Math.round((filled / sections.length) * 100), 100) : 20;
                            }
                            // Fallback: check if diagnostic payload exists (user went through diagnostic)
                            const diagPayload = localStorage.getItem('stratix_diagnostic_payload');
                            if (diagPayload) return 30;
                            // Fallback: check if entity settings exist
                            const entityStr = localStorage.getItem('selectedEntityId') || localStorage.getItem('stratix_company_name');
                            if (entityStr) return 15;
                            return 0;
                        }
                        case 'VALUE_CHAIN': {
                            // company-health.html checks 'stratix_tool_VALUE_CHAIN'
                            const vc = localStorage.getItem('stratix_tool_VALUE_CHAIN');
                            if (vc) {
                                const d = JSON.parse(vc);
                                if (d && d.activities) {
                                    const filled = Object.values(d.activities).filter(v => Array.isArray(v) ? v.length > 0 : !!v).length;
                                    return filled > 0 ? Math.min(Math.round((filled / 9) * 100), 100) : 10;
                                }
                                if (d && typeof d === 'object' && Object.keys(d).length > 0) return 10;
                            }
                            return 0;
                        }
                        case 'CORE_COMPETENCY': {
                            const cc = localStorage.getItem('stratix_tool_CORE_COMPETENCY');
                            if (cc) {
                                const d = JSON.parse(cc);
                                if (Array.isArray(d?.competencies) && d.competencies.length > 0) return 100;
                                if (Array.isArray(d?.resources) && d.resources.length > 0) return 80;
                                if (d && typeof d === 'object' && Object.keys(d).length > 0) return 10;
                            }
                            return 0;
                        }
                        case 'CUSTOMER_JOURNEY': {
                            const cj = localStorage.getItem('stratix_tool_CUSTOMER_JOURNEY');
                            if (cj) {
                                const d = JSON.parse(cj);
                                const stages = ['awareness', 'consideration', 'purchase', 'retention', 'advocacy'];
                                const filled = stages.filter(s => d?.[s] && ((Array.isArray(d[s]) && d[s].length > 0) || (typeof d[s] === 'object' && Object.keys(d[s]).length > 0))).length;
                                return filled > 0 ? Math.round((filled / 5) * 100) : 0;
                            }
                            return 0;
                        }
                        case 'PESTEL': {
                            // Check if painAmbition has external factors
                            const pa = localStorage.getItem('painAmbition');
                            if (pa) {
                                const d = JSON.parse(pa);
                                if (d?.externalFactors && Object.keys(d.externalFactors).length > 0) return 20;
                            }
                            return 0;
                        }
                        default: return 0;
                    }
                } catch { return 0; }
            }

            // Build journey steps
            const stepsEl = document.getElementById('journeySteps');
            let html = '';
            let completedCount = 0;

            diagTools.forEach((dt, i) => {
                const prog = toolProgress[dt.code] || 0;
                const currentCode = state.tool?.code || new URLSearchParams(location.search).get('code');
                const isCurrent = dt.code === currentCode;
                const isDone = prog >= 80;
                if (isDone) completedCount++;

                // Phase separator label
                const prevPhase = i > 0 ? diagTools[i - 1].phase : null;
                if (dt.phase !== prevPhase) {
                    const phaseLabels = {
                        'internal': '🏢 الداخل',
                        'external': '🌍 الخارج',
                        'synthesis': '⚔️ التجميع'
                    };
                    if (i > 0) {
                        html += `<div style="display:flex;flex-direction:column;align-items:center;gap:2px;flex-shrink:0;padding:0 4px">
                            <div style="width:2px;height:12px;background:var(--border);border-radius:1px"></div>
                            <div style="font-size:9px;color:var(--text-muted);font-weight:700;white-space:nowrap">${phaseLabels[dt.phase]}</div>
                            <div style="width:2px;height:12px;background:var(--border);border-radius:1px"></div>
                        </div>`;
                    }
                }

                let bg, border, textColor, statusText;
                if (isDone) {
                    bg = `${dt.color}15`;
                    border = `${dt.color}40`;
                    textColor = dt.color;
                    statusText = `<span style="font-size:10px;color:${dt.color};font-weight:700">✅ مكتمل</span>`;
                } else if (isCurrent) {
                    bg = 'rgba(102,126,234,0.1)';
                    border = 'rgba(102,126,234,0.4)';
                    textColor = '#667eea';
                    statusText = `<span style="font-size:10px;color:#667eea;font-weight:700">👈 أنت هنا${prog > 0 ? ` (${prog}%)` : ''}</span>`;
                } else {
                    bg = 'rgba(255,255,255,0.02)';
                    border = 'var(--border)';
                    textColor = 'var(--text-muted)';
                    statusText = prog > 0
                        ? `<span style="font-size:10px;color:var(--text-muted)">${prog}%</span>`
                        : `<span style="font-size:10px;color:var(--text-muted)">لم يبدأ</span>`;
                }

                const href = isCurrent ? '#' : (dt.href || `/tool-detail.html?code=${dt.code}`);

                html += `
                    <a href="${href}" style="display:flex;align-items:center;gap:8px;padding:10px 16px;border-radius:12px;background:${bg};border:1.5px solid ${border};text-decoration:none;transition:all .3s;flex:1;min-width:120px;${isCurrent ? 'box-shadow:0 0 12px rgba(102,126,234,0.15);' : ''}">
                        <span style="font-size:18px">${dt.icon}</span>
                        <div style="flex:1">
                            <div style="font-size:12px;font-weight:700;color:${textColor}">${dt.name}</div>
                            ${statusText}
                        </div>
                    </a>
                `;

                // Arrow separator (within same phase)
                if (i < diagTools.length - 1 && diagTools[i + 1].phase === dt.phase) {
                    html += `<div style="font-size:14px;color:var(--text-muted);flex-shrink:0">←</div>`;
                }
            });

            // Planning phase indicator
            html += `<div style="font-size:14px;color:var(--text-muted);flex-shrink:0">←</div>`;
            if (completedCount >= 1) {
                html += `
                    <a href="/directions.html" style="display:flex;align-items:center;gap:8px;padding:10px 16px;border-radius:12px;background:rgba(124,58,237,0.1);border:2px solid rgba(124,58,237,0.3);text-decoration:none;transition:all .3s;flex:1;min-width:140px;animation:pulse-plan 2s ease-in-out infinite">
                        <span style="font-size:18px">🎯</span>
                        <div style="flex:1">
                            <div style="font-size:12px;font-weight:700;color:#7c3aed">التخطيط</div>
                            <span style="font-size:10px;color:#7c3aed;font-weight:700">جاهز! ابدأ الآن</span>
                        </div>
                        <i class="bi bi-arrow-left" style="color:#7c3aed;font-size:14px"></i>
                    </a>`;
            } else {
                html += `
                    <div style="display:flex;align-items:center;gap:8px;padding:10px 16px;border-radius:12px;background:rgba(255,255,255,0.02);border:1px solid var(--border);flex:1;min-width:140px;opacity:0.4">
                        <span style="font-size:18px">🔒</span>
                        <div style="flex:1">
                            <div style="font-size:12px;font-weight:600;color:var(--text-muted)">التخطيط</div>
                            <span style="font-size:10px;color:var(--text-muted)">أكمل تشخيص أولاً</span>
                        </div>
                    </div>`;
            }

            stepsEl.innerHTML = html;
            document.getElementById('diagnosisJourney').style.display = 'block';

            // Show planning CTA if ready
            if (completedCount >= 1) {
                document.getElementById('planningCTA').style.display = 'block';
            }
        }

        function renderHeader() {
            const tool = state.tool;
            const color = tool.color || '#667eea';
            const phase = PHASES[tool.category] || { nameAr: tool.category, color: '#667eea' };

            document.documentElement.style.setProperty('--tool-color', color);

            // Breadcrumb
            document.getElementById('breadcrumbPhase').textContent = phase.nameAr;
            document.getElementById('breadcrumbTool').textContent = tool.nameAr;

            const iconEl = document.getElementById('toolIcon');
            iconEl.style.background = color;
            iconEl.innerHTML = `<i class="bi ${tool.icon || 'bi-tools'}"></i>`;

            // Title
            document.getElementById('toolName').textContent = tool.nameAr;
            document.getElementById('toolNameEn').textContent = tool.nameEn;

            // Meta badges
            const metaEl = document.getElementById('toolMeta');
            metaEl.innerHTML = `
        <span class="meta-badge" style="background:${phase.color}20;color:${phase.color};">${phase.nameAr}</span>
        ${tool.isPrimary ? '<span class="meta-badge" style="background:rgba(250,204,21,0.12);color:#facc15;">⭐ أساسية</span>' : '<span class="meta-badge" style="background:rgba(148,163,184,0.12);color:#94a3b8;">متقدمة</span>'}
      `;

            // Progress
            const analysis = state.analysis;

            document.getElementById('statusDot').style.background = statusInfo.color;
            document.getElementById('statusText').textContent = statusInfo.label;
            document.getElementById('progressPercent').textContent = progress + '%';

            document.getElementById('progressBar').style.background = color;

            document.getElementById('progressCard').style.display = 'block';
        }

        // ===== RENDER CONTENT =====
        function renderContent() {
            const tool = state.tool;
            const config = TOOL_SECTIONS[tool.code];
            const analysis = state.analysis;

            // Parse data
            let data = {};
            if (analysis?.parsedData) {
                data = analysis.parsedData;
            } else if (analysis?.data) {
                try { data = typeof analysis.data === 'string' ? JSON.parse(analysis.data) : analysis.data; } catch (e) { }
            }

            const container = document.getElementById('contentArea');

            if (!config) {
                container.innerHTML = `
          <div class="summary-card">
            <h3><i class="bi bi-info-circle"></i> معلومات الأداة</h3>
            <div class="summary-text">${tool.descriptionAr || tool.descriptionEn || 'لا يوجد وصف'}</div>
          </div>`;
                return;
            }

            let html = '';

            // ===== SWOT PRE-POPULATION from Pain & Ambition =====
            if (tool.code === 'SWOT') {
                const paRaw = localStorage.getItem('painAmbition');
                console.log('🔍 SWOT check — painAmbition in localStorage:', paRaw ? 'YES (' + paRaw.length + ' chars)' : 'NO');
                console.log('🔍 SWOT check — data empty?', isDataEmpty(data, config));

                const suggestions = buildSWOTFromPainAmbition();

                if (suggestions && isDataEmpty(data, config)) {
                    // Case 1: SWOT is empty → auto-fill from pain/ambition

                    html += `
                    <div id="painAmbitionBanner" style="background:linear-gradient(135deg,rgba(102,126,234,0.08),rgba(118,75,162,0.05));border:1px solid rgba(102,126,234,0.2);border-radius:16px;padding:20px 24px;margin-bottom:20px;display:flex;align-items:center;gap:16px">
                        <div style="width:44px;height:44px;border-radius:12px;background:rgba(102,126,234,0.15);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0">💡</div>
                        <div style="flex:1">
                            <div style="font-size:15px;font-weight:800;color:var(--text);margin-bottom:4px">بيانات مقترحة من الألم والطموح</div>
                            <div style="font-size:12px;color:var(--text-muted)">سحبنا بيانات من إجاباتك السابقة (الألم والطموح). عدّل أو أضف حسب ما تشوف مناسب — أو احفظ مباشرة.</div>
                        </div>
                        <button data-action="clear-suggestions" style="padding:8px 16px;border-radius:10px;border:1px solid rgba(239,68,68,0.2);background:rgba(239,68,68,0.06);color:#ef4444;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap">✕ ابدأ فاضي</button>
                    </div>
                    `;
                    autoSaveSuggestions(data);
                    console.log('✅ SWOT auto-filled from pain/ambition:', data);

                } else if (suggestions && !isDataEmpty(data, config)) {
                    // Case 2: SWOT has data → check if pain/ambition items are already included
                    const alreadyImported = extractItems(data, 'weaknesses').some(i => i.source === 'pain_ambition') ||
                        extractItems(data, 'opportunities').some(i => i.source === 'pain_ambition');

                    if (!alreadyImported) {

                        <div id="painAmbitionBanner" style="background:linear-gradient(135deg,rgba(34,197,94,0.06),rgba(16,185,129,0.04));border:1px solid rgba(34,197,94,0.2);border-radius:16px;padding:16px 20px;margin-bottom:16px;display:flex;align-items:center;gap:14px">

            }

            // === Helper: render a single section card ===
            function renderSectionCard(section, data, isEnhanced) {
                const items = extractItems(data, section.key);
                const count = items.length;
                let oppCount = 0, threatCount = 0;
                if (isEnhanced) {
                    items.forEach(it => {
                        if (it.impactType === 'opportunity') oppCount++;
                        else if (it.impactType === 'threat') threatCount++;
                    });
                }
                return `
          <div class="section-card">
            <div class="section-header">
              <h3>
                <span style="color:${section.color};">${section.emoji}</span>
                ${isEnhanced ? `<span>${section.nameAr}</span>` : section.nameAr}
              </h3>
              <div style="display:flex;align-items:center;gap:6px">
                ${isEnhanced && oppCount > 0 ? `<span style="font-size:10px;padding:2px 8px;border-radius:10px;background:rgba(34,197,94,0.12);color:#22c55e;font-weight:600">🌟 ${oppCount}</span>` : ''}
                ${isEnhanced && threatCount > 0 ? `<span style="font-size:10px;padding:2px 8px;border-radius:10px;background:rgba(239,68,68,0.12);color:#ef4444;font-weight:600">⚠️ ${threatCount}</span>` : ''}
                <span class="count-badge" style="background:${section.color}20;color:${section.color};">${count}</span>
              </div>
            </div>
            <div class="section-body">
              ${isEnhanced && section.desc ? `<div class="pestel-section-desc">${section.desc}</div>` : ''}
              ${isEnhanced && section.questions ? `
                <div class="pestel-questions" id="q-${section.key}">
                  <div class="q-toggle" data-action="toggle-questions">
                    <i class="bi bi-lightbulb" style="color:${section.color}"></i>
                    أسئلة موجّهة تساعدك
                    <i class="bi bi-chevron-down" style="font-size:10px;transition:transform .2s"></i>
                  </div>
                  <div class="q-list">
                    ${section.questions.map(q => `
                      <div class="q-item" data-action="fill-input" data-key="${section.key}">
                        <i class="bi bi-chat-left-text" style="color:${section.color};font-size:10px;flex-shrink:0"></i>
                        ${escapeHtml(q)}
                      </div>
                    `).join('')}
                  </div>

              ` : ''}
              ${isEnhanced && section.examples ? `
                <div class="pestel-examples">
                  ${section.examples.map(ex => `
                    <span class="ex-chip" data-action="fill-example" data-key="${section.key}" data-value="${escapeHtml(ex)}">${escapeHtml(ex)}</span>

                </div>
              ` : ''}
              ${count > 0 ? renderItems(items, section.color, isEnhanced) : `
                <div class="empty-section">
                  <i class="bi ${section.icon}"></i>
                  <p>${isEnhanced ? 'اضغط على سؤال أو مثال للبدء' : 'لا توجد بيانات بعد'}</p>
                </div>
              `}
              <div class="add-item-row">
                <input type="text" placeholder="${isEnhanced ? 'اكتب العامل المؤثر...' : 'أضف عنصراً جديداً...'}"

                       data-action="add-pestel-item" data-key="${section.key}" data-color="${section.color}">
                <button data-action="add-item" data-key="${section.key}" data-color="${section.color}">

                  <option value="threat">⚠️ تهديد</option>
                  <option value="neutral">◻️ محايد</option>
                </select>
                <select id="level-${section.key}">
                  <option value="HIGH">🔴 عالي</option>
                  <option value="MEDIUM" selected>🟡 متوسط</option>
                  <option value="LOW">🟢 منخفض</option>
                </select>
              </div>
              ` : ''}
            </div>
          </div>
        `;
            }

            // === Grouped rendering (Value Chain) vs flat rendering ===
            if (config.grouped && config.groups) {

                // ═══ Value Chain — Simplified Interactive Layout ═══
                if (tool.code === 'VALUE_CHAIN') {

                    // Examples/suggestions per activity — with priority and guidance
                    // priority: 'essential' (⭐ must-have), 'recommended' (👍 should-have), 'optional' (○ nice-to-have)
                    const VC_EXAMPLES = {
                        inboundLogistics: [
                            { text: 'استلام المواد الخام', priority: 'essential', tip: 'أساس كل عملية إنتاج — بدونها ما تبدأ' },
                            { text: 'فحص الجودة الواردة', priority: 'essential', tip: 'يمنع دخول مواد معيبة تكلّفك لاحقاً' },

                            { text: 'خط الإنتاج', priority: 'essential', tip: 'العملية الجوهرية — هنا تتحول المواد لمنتج' },

        // ===== NEXT/PREVIOUS TOOL NAVIGATION =====
        function renderToolNavigation() {
            const diagTools = [
                { code: 'INTERNAL_ENV', name: 'البيئة الداخلية', icon: '🏢', color: '#0D9488', href: '/company-health.html' },
                { code: 'VALUE_CHAIN', name: 'سلسلة القيمة', icon: '🔗', color: '#0891B2' },
                { code: 'CORE_COMPETENCY', name: 'القدرات الجوهرية', icon: '🏆', color: '#D97706' },
                { code: 'CUSTOMER_JOURNEY', name: 'رحلة العميل', icon: '🚶', color: '#DB2777' },
                { code: 'PESTEL', name: 'تحليل PESTEL', icon: '🌍', color: '#0891b2' },
                { code: 'PORTER', name: 'قوى Porter', icon: '⚔️', color: '#f59e0b' },
                { code: 'SWOT', name: 'تحليل SWOT', icon: '📊', color: '#22c55e' },
            ];

            const currentIdx = diagTools.findIndex(t => t.code === state.toolCode);
            if (currentIdx === -1) return ''; // Not a diagnosis tool

            const prev = currentIdx > 0 ? diagTools[currentIdx - 1] : null;
            const next = currentIdx < diagTools.length - 1 ? diagTools[currentIdx + 1] : null;
            const vParam = state.versionId ? `&v=${state.versionId}` : '';

            function getToolHref(t) {
                if (t.href) return `${t.href}?v=${state.versionId || ''}`;
                return `/tool-detail.html?code=${t.code}${vParam}`;
            }

            let navHtml = `
            <div style="margin-top:40px;padding:28px 0;border-top:2px solid var(--border);display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap">`;

            // Previous button
            if (prev) {
                navHtml += `
                <a href="${getToolHref(prev)}" style="display:flex;align-items:center;gap:12px;padding:14px 22px;border-radius:14px;background:rgba(255,255,255,0.03);border:1.5px solid var(--border);text-decoration:none;transition:all .3s;min-width:200px;flex:1" 
                   onmouseenter="this.style.background='rgba(255,255,255,0.06)';this.style.borderColor='${prev.color}40';this.style.transform='translateX(4px)'"
                   onmouseleave="this.style.background='rgba(255,255,255,0.03)';this.style.borderColor='var(--border)';this.style.transform='none'">
                    <i class="bi bi-arrow-right" style="font-size:18px;color:var(--text-muted)"></i>
                    <div style="flex:1;text-align:right">
                        <div style="font-size:11px;color:var(--text-muted);margin-bottom:2px">الأداة السابقة</div>
                        <div style="font-size:14px;font-weight:700;color:${prev.color}">${prev.icon} ${prev.name}</div>
                    </div>
                </a>`;
            } else {
                navHtml += `<div style="flex:1"></div>`;
            }

            // Center: return to path
            navHtml += `
            <a href="/tools" style="display:flex;flex-direction:column;align-items:center;gap:4px;padding:12px 20px;border-radius:12px;background:rgba(102,126,234,0.06);border:1px solid rgba(102,126,234,0.15);text-decoration:none;transition:all .3s;flex-shrink:0" 
               onmouseenter="this.style.background='rgba(102,126,234,0.12)'"
               onmouseleave="this.style.background='rgba(102,126,234,0.06)'">
                <i class="bi bi-grid-3x3-gap" style="font-size:16px;color:#667eea"></i>
                <span style="font-size:11px;font-weight:600;color:#667eea">العودة للمسار</span>
            </a>`;

            // Next button
            if (next) {
                navHtml += `
                <a href="${getToolHref(next)}" id="nextToolBtn" style="display:flex;align-items:center;gap:12px;padding:14px 22px;border-radius:14px;background:linear-gradient(135deg,${next.color}12,${next.color}08);border:1.5px solid ${next.color}30;text-decoration:none;transition:all .3s;min-width:200px;flex:1;justify-content:flex-end" 
                   onmouseenter="this.style.background='linear-gradient(135deg,${next.color}20,${next.color}12)';this.style.borderColor='${next.color}60';this.style.transform='translateX(-4px)'"
                   onmouseleave="this.style.background='linear-gradient(135deg,${next.color}12,${next.color}08)';this.style.borderColor='${next.color}30';this.style.transform='none'">
                    <div style="flex:1;text-align:left">
                        <div style="font-size:11px;color:var(--text-muted);margin-bottom:2px">الأداة التالية</div>
                        <div style="font-size:14px;font-weight:700;color:${next.color}">${next.icon} ${next.name}</div>
                    </div>
                    <i class="bi bi-arrow-left" style="font-size:18px;color:${next.color}"></i>
                </a>`;
            } else {
                // Last tool — show planning CTA
                navHtml += `
                <a href="/directions.html" style="display:flex;align-items:center;gap:12px;padding:14px 22px;border-radius:14px;background:linear-gradient(135deg,rgba(124,58,237,0.15),rgba(124,58,237,0.08));border:1.5px solid rgba(124,58,237,0.3);text-decoration:none;transition:all .3s;min-width:200px;flex:1;justify-content:flex-end;animation:pulse-plan 2s ease-in-out infinite" 
                   onmouseenter="this.style.transform='translateX(-4px)'"
                   onmouseleave="this.style.transform='none'">
                    <div style="flex:1;text-align:left">
                        <div style="font-size:11px;color:rgba(124,58,237,0.6);margin-bottom:2px">الخطوة التالية</div>
                        <div style="font-size:14px;font-weight:700;color:#7c3aed">🎯 التخطيط الاستراتيجي</div>
                    </div>
                    <i class="bi bi-arrow-left" style="font-size:18px;color:#7c3aed"></i>

        // ===== توليد التوصيات الذكية =====
        function generateSmartGuidance(toolCode, data, config) {
            const insights = [];
            let nextLink = '/dashboard.html';
            let nextLabel = 'الخطوة التالية';
            let otherTools = [];

            if (toolCode === 'SWOT') {
                const strengths = extractItems(data, 'strengths');
                const weaknesses = extractItems(data, 'weaknesses');
                const opportunities = extractItems(data, 'opportunities');
                const threats = extractItems(data, 'threats');

                // مؤشر خطوات المنهجية
                insights.push({
                    icon: '🧭', title: 'المسار: PESTEL ✅ → Porter ✅ → SWOT',
                    desc: 'أنت في الخطوة 3 من 3 — التحليل الشامل. بعدها تنطلق للتخطيط!',
                });

                // تحليل ذكي للنتائج
                if (weaknesses.length > strengths.length) {
                    insights.push({
                        icon: '⚠️', title: `عندك ${weaknesses.length} نقاط ضعف مقابل ${strengths.length} قوة`,
                        desc: 'ركّز على معالجة نقاط الضعف الأكثر تأثيراً في خطتك الاستراتيجية',
                        action: '/directions.html', actionLabel: 'حدد توجهات'
                    });
                } else if (strengths.length > 0) {
                    insights.push({
                        icon: '💪', title: `عندك ${strengths.length} نقاط قوة — استغلها!`,
                        desc: 'ابنِ استراتيجيتك على نقاط قوتك الأساسية',
                        action: '/objectives.html', actionLabel: 'حدد أهداف'
                    });
                }

                if (opportunities.length > 0 && threats.length > 0) {
                    insights.push({
                        icon: '⚡', title: 'اكتشف التوترات بين قدراتك والتهديدات',
                        desc: `${strengths.length} قوة × ${threats.length} تهديد — هل قدراتك تواكب التغييرات؟`,
                        action: '/strategic-tensions.html', actionLabel: '⚡ التوترات'
                    });
                }

                // أدوات تشخيص إضافية
                otherTools = [
                    { icon: '⚡', name: 'التوترات الاستراتيجية', href: '/strategic-tensions.html' },
                    { icon: '🌍', name: 'عمّق: PESTEL', href: '/tool-detail.html?code=PESTEL' },
                    { icon: '⚔️', name: 'عمّق: Porter', href: '/tool-detail.html?code=PORTER' },
                ];

                nextLink = '/directions.html';
                nextLabel = '🎯 ابدأ مرحلة التخطيط';

            } else if (toolCode === 'PESTEL') {
                const totalFactors = config.sections.reduce((sum, s) => sum + extractItems(data, s.key).length, 0);

                // مؤشر خطوات المنهجية
                insights.push({
                    icon: '🧭', title: 'المسار: PESTEL → Porter → SWOT',
                    desc: `أنت في الخطوة 1 من 3 — حللت ${totalFactors} عامل خارجي. الخطوة التالية: تحليل القوى التنافسية (Porter)`,
                });

                if (totalFactors >= 3) {
                    insights.push({
                        icon: '⚡', title: 'اكتشف التوترات الاستراتيجية',
                        desc: 'قارن العوامل الخارجية بقدراتك الداخلية — أين نقاط الصراع؟',
                        action: '/strategic-tensions.html', actionLabel: '⚡ التوترات'
                    });
                }

                otherTools = [
                    { icon: '⚔️', name: 'الخطوة التالية: Porter', href: '/tool-detail.html?code=PORTER' },

            } else if (toolCode === 'PORTER') {
                const totalFactors = config.sections.reduce((sum, s) => sum + extractItems(data, s.key).length, 0);

                insights.push({

        function extractItems(data, key) {
            if (!data) return [];
            const val = data[key];
            if (Array.isArray(val)) return val;
            if (val && typeof val === 'object' && val.factors) return val.factors;
            return [];
        }

        // ===== CHECK IF SWOT DATA IS EMPTY =====
        function isDataEmpty(data, config) {
            if (!data || !config) return true;
            return config.sections.every(s => {
                const items = extractItems(data, s.key);
                return items.length === 0;
            });
        }

        // ===== BUILD SWOT FROM PAIN & AMBITION =====
        function buildSWOTFromPainAmbition() {
            const raw = localStorage.getItem('painAmbition');
            if (!raw) return null;

            let pa;
            try { pa = JSON.parse(raw); } catch (e) { return null; }
            if (!pa || (!pa.pains?.length && !pa.ambitions?.length)) return null;

            const data = { strengths: [], weaknesses: [], opportunities: [], threats: [] };

            // Pain → Weaknesses / Threats mapping
            const PAIN_MAP = {
                no_strategy: {
                    section: 'weaknesses', title: 'لا توجد خطة استراتيجية مكتوبة', desc: 'الشركة تعمل بدون رؤية أو أهداف محددة'
                },
                no_measurement: { section: 'weaknesses', title: 'غياب مؤشرات قياس الأداء', desc: 'لا توجد KPIs — لا نعرف هل نتحسن أو نتراجع' },
                plan_vs_execution: { section: 'weaknesses', title: 'فجوة بين التخطيط والتنفيذ', desc: 'نخطط كثيرًا لكن التنفيذ يتأخر أو لا يتم' },
                team_alignment: { section: 'weaknesses', title: 'عدم توافق الفريق على الأولويات', desc: 'كل قسم يعمل بمعزل — لا توجد محاذاة استراتيجية' },
                market_pressure: { section: 'threats', title: 'ضغط تنافسي متزايد من السوق', desc: 'المنافسون يتقدمون بينما موقعنا غير واضح' },
                growth_stuck: { section: 'weaknesses', title: 'توقف النمو أو تراجع الإيرادات', desc: 'الإيرادات ثابتة أو منخفضة — نحتاج تشخيص السبب الجذري' }
            };

            // Ambition → Opportunities mapping
            const AMB_MAP = {
                clear_strategy: {
                    title: 'فرصة بناء خطة استراتيجية متكاملة', desc: 'تحويل الرؤية لأهداف قابلة للقياس مع خارطة طريق'
                },
                data_decisions: { title: 'التحول لقرارات مبنية على البيانات', desc: 'Dashboard حي + KPIs مراقبة + تنبيهات ذكية' },
                team_ownership: { title: 'بناء فريق متحمس يعرف وجهته', desc: 'كل عضو يعرف دوره ومسؤوليته في تحقيق الاستراتيجية' },
                market_lead: { title: 'فرصة التفوق على المنافسين', desc: 'فهم السوق بعمق واستغلال الفرص قبل الآخرين' },
                sustainable_growth: { title: 'تحقيق نمو مستدام ومخطط', desc: 'توسع مدروس مبني على بيانات حقيقية' },
                execution_machine: { title: 'بناء نظام تنفيذ منتظم', desc: 'مبادرات ومشاريع ومهام متابعة ومقاسة بشكل مستمر' }
            };

            // Map pains
            if (pa.pains) {
                pa.pains.forEach(p => {
                    const mapped = PAIN_MAP[p];
                    if (mapped) {
                        data[mapped.section].push({
                            title: mapped.title, description: mapped.desc, impact: 'HIGH', source: 'pain_ambition'
                        });
                    }
                });
            }

            // Map ambitions
            if (pa.ambitions) {
                pa.ambitions.forEach(a => {
                    const mapped = AMB_MAP[a];
                    if (mapped) {
                        data.opportunities.push({
                            title: mapped.title, description: mapped.desc, impact: 'MEDIUM', source: 'pain_ambition'
                        });
                    }
                });
            }

            // Custom text → weaknesses/opportunities
            if (pa.painCustom && pa.painCustom.trim()) {
                data.weaknesses.push({
                    title: pa.painCustom.trim(), description: 'من وصف الألم المخصص', impact: 'HIGH', source:
                        'pain_ambition'
                });
            }
            if (pa.ambitionCustom && pa.ambitionCustom.trim()) {
                data.opportunities.push({
                    title: pa.ambitionCustom.trim(), description: 'من وصف الطموح المخصص', impact: 'MEDIUM',
                    source: 'pain_ambition'
                });
            }

            // Context-based strengths (from depth data)
            if (pa.depth) {
                if (pa.depth.age === '7 - 15 سنة' || pa.depth.age === 'أكثر من 15 سنة') {
                    data.strengths.push({
                        title: 'خبرة طويلة في السوق', description: `الشركة تعمل منذ ${pa.depth.age} `, impact: 'HIGH',
                        source: 'pain_ambition'
                    });
                }
                if (pa.depth.teamSize === '51 - 200' || pa.depth.teamSize === 'أكثر من 200') {
                    data.strengths.push({
                        title: 'فريق عمل كبير ومتنوع', description: `حجم الفريق: ${pa.depth.teamSize} شخص`, impact:
                            'MEDIUM', source: 'pain_ambition'
                    });
                }
                if (pa.depth.toolExp === 'Balanced Scorecard' || pa.depth.toolExp === 'برنامج إدارة مشاريع') {
                    data.strengths.push({
                        title: 'خبرة سابقة في أدوات الإدارة الاستراتيجية', description: `استخدام:
    ${pa.depth.toolExp} `, impact: 'MEDIUM', source: 'pain_ambition'
                    });
                }
            }

            return { data };
        }

        // ===== AUTO-SAVE SUGGESTIONS =====
        async function autoSaveSuggestions(data) {
            if (!state.versionId) return;
            try {
                const payload = {
                    versionId: state.versionId,
                    toolCode: 'SWOT',
                    data: JSON.stringify(data),
                    status: 'IN_PROGRESS',
                    progress: 30,
                    summary: 'بيانات أولية من الألم والطموح — تحتاج مراجعة'
                };

                if (state.analysis?.id) {
                    await api(`/api/company-analysis/${state.analysis.id}`, {
                        method: 'PATCH',
                        body: JSON.stringify(payload)
                    });
                } else {
                    const result = await api('/api/company-analysis', {
                        method: 'POST',
                        body: JSON.stringify(payload)
                    });
                    if (result?.id) {
                        state.analysis = result;
                    }
                }
                console.log('✅ SWOT suggestions auto-saved');
            } catch (e) {
                console.warn('Could not auto-save suggestions:', e);
            }
        }

        // ===== CLEAR SUGGESTIONS =====
        async function clearSuggestions() {
            // Remove banner
            const banner = document.getElementById('painAmbitionBanner');
            if (banner) banner.remove();

            // Clear data and re-render
            if (state.analysis) {
                state.analysis.data = JSON.stringify({});
                state.analysis.parsedData = {};
            }
            renderContent();
        }

        // ===== MERGE PAIN/AMBITION INTO EXISTING SWOT =====
        async function mergePainAmbition() {
            const suggestions = buildSWOTFromPainAmbition();
            if (!suggestions) return;

            // Get current data
            let data = {};
            if (state.analysis?.parsedData) {
                data = { ...state.analysis.parsedData };
            } else if (state.analysis?.data) {
                try {
                    data = typeof state.analysis.data === 'string' ? JSON.parse(state.analysis.data) : { ...state.analysis.data };
                } catch (e) { }
            }

            // Merge each section
            ['strengths', 'weaknesses', 'opportunities', 'threats'].forEach(key => {
                if (!data[key]) data[key] = [];
                const newItems = suggestions.data[key] || [];
                newItems.forEach(item => {
                    // Don't add duplicates
                    const exists = data[key].some(existing => existing.title === item.title);
                    if (!exists) {
                        data[key].push(item);
                    }
                });
            });

            // Update state
            if (state.analysis) {
                state.analysis.data = JSON.stringify(data);
                state.analysis.parsedData = data;
            }

            // Save and re-render
            await autoSaveSuggestions(data);
            renderContent();
            showToast('✅ تم دمج بيانات الألم والطموح في SWOT');
        }

                    }
                }

                    </div>`;

            html += '<button data-action="toggle-vc" data-key="' + key + '" style="background:none;border:1px solid var(--border);color:var(--text-muted);width:28px;height:28px;border-radius:8px;cursor:pointer;font-size:14px">✕</button></div>';

            if (!value || !value.trim()) return;
            const input = document.getElementById('vcInput_' + key);
            if (input) input.value = '';
            addPestelItem_direct(key, value.trim(), 'neutral', 'MEDIUM');
            // Re-render the panel + flow
            renderContent();
            _activeVcKey = null; // يمنع إغلاق النافذة بعد التحديث
            setTimeout(() => toggleVcActivity(key), 50);
        }

        function removeVcItem(key, idx, color) {
            if (!state.analysis) return;
            let data = {};
            if (state.analysis.parsedData) data = state.analysis.parsedData;
            else if (state.analysis.data) {
                try { data = typeof state.analysis.data === 'string' ? JSON.parse(state.analysis.data) : state.analysis.data; }
                catch (e) { }
            }
            const items = extractItems(data, key);
            if (items[idx]) {
                items.splice(idx, 1);
                if (!data[key]) data[key] = [];
                data[key] = items;
                state.analysis.parsedData = data;
                state.analysis.data = JSON.stringify(data);

                // Save
                savePestelData(data);
                renderContent();
                _activeVcKey = null; // يمنع إغلاق النافذة بعد التحديث

        // Direct add item (reuses the pestel save logic)
        function addPestelItem_direct(sectionKey, text, impactType, impact) {
            if (!state.analysis) {
                state.analysis = { data: '{}', parsedData: {}, status: 'IN_PROGRESS', progress: 0 };
            }

            // FIX: قراءة البيانات الموجودة مسبقاً لتجنب مسح الأقسام الأخرى
            let data = {};
            if (state.analysis.parsedData) {
                data = state.analysis.parsedData;
            } else if (state.analysis.data) {
                try { data = typeof state.analysis.data === 'string' ? JSON.parse(state.analysis.data) : state.analysis.data; } catch (e) { }
            }

            if (!data[sectionKey]) data[sectionKey] = [];
            // Avoid duplicates
            const existing = data[sectionKey].map(i => typeof i === 'string' ? i : (i.title || i.text));
            if (existing.includes(text)) return;

            data[sectionKey].push({
                text, impactType, impact,
                addedAt: new Date().toISOString()
            });
            state.analysis.parsedData = data;
            state.analysis.data = JSON.stringify(data);
            savePestelData(data);
        }

        // ===== SAVE DATA TO API (shared by PESTEL and Value Chain) =====
        async function savePestelData(data) {
            if (!state.versionId) return;
            try {
                if (state.analysis?.id) {
                    const result = await api(`/api/company-analysis/${state.analysis.id}`, {
                        method: 'PATCH',
                        body: JSON.stringify({ data, status: 'IN_PROGRESS' })
                    });
                    state.analysis = { ...state.analysis, ...result, parsedData: data };
                } else {
