<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ستارتكس - المشاريع</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <script src="/js/dept-theme.js"></script>
    <style>
        :root {
            --primary: #667eea;
            --secondary: #764ba2;
            --bg: #0f1117;
            --bg-card: #1a1d2e;
            --bg-card-hover: #232640;
            --text: #e2e8f0;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.08);
            --success: #22c55e;
            --warning: #facc15;
            --danger: #ef4444;
            --info: #38bdf8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            font-family: 'Tajawal', sans-serif;
            color: var(--text);
            min-height: 100vh;
        }

        .top-nav {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            padding: 14px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .top-nav .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            color: white;
            text-decoration: none;
            font-size: 20px;
            font-weight: 700;
        }

        .user-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: white;
        }

        .btn-logout {
            background: rgba(255, 255, 255, 0.15);
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 8px;
            font-family: inherit;
            font-size: 12px;
            cursor: pointer;
        }

        .layout {
            display: flex;
            min-height: calc(100vh - 60px);
        }

        .main-content {
            flex: 1;
            padding: 30px;
            max-width: calc(100% - 220px);
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 24px;
        }

        .page-header h1 {
            font-size: 26px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .page-header h1 i {
            color: var(--primary);
        }

        .page-subtitle {
            color: var(--text-muted);
            font-size: 14px;
            margin-top: 4px;
        }

        .btn-add {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .btn-add:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(102, 126, 234, 0.4);
        }

        /* Cascading Flow */
        .cascade-flow {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 24px;
            padding: 14px 20px;
            background: rgba(102, 126, 234, 0.06);
            border: 1px solid rgba(102, 126, 234, 0.15);
            border-radius: 12px;
            flex-wrap: wrap;
        }

        .cascade-step {
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            color: var(--text-muted);
        }

        .cascade-step:hover {
            background: rgba(255, 255, 255, 0.06);
            color: var(--text);
        }

        .cascade-step.active {
            background: var(--primary);
            color: white;
        }

        .cascade-arrow {
            color: var(--text-muted);
            font-size: 16px;
        }

        /* Stats */
        .mini-stats {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 14px;
            margin-bottom: 24px;
        }

        .mini-stat {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 16px;
            text-align: center;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .mini-stat::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
        }

        .mini-stat:nth-child(1)::before {
            background: var(--primary);
        }

        .mini-stat:nth-child(2)::before {
            background: var(--success);
        }

        .mini-stat:nth-child(3)::before {
            background: var(--info);
        }

        .mini-stat:nth-child(4)::before {
            background: var(--warning);
        }

        .mini-stat:nth-child(5)::before {
            background: var(--danger);
        }

        .ms-value {
            font-size: 24px;
            font-weight: 800;
        }

        .ms-label {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 3px;
        }

        /* Filter */
        .filter-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }

        .ftab {
            padding: 8px 16px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text-muted);
            transition: all 0.3s;
        }

        .ftab:hover {
            border-color: rgba(255, 255, 255, 0.15);
        }

        .ftab.active {
            border-color: var(--primary);
            color: var(--primary);
            background: rgba(102, 126, 234, 0.08);
        }

        /* Project Cards */
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 16px;
        }

        .proj-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.3s;
        }

        .proj-card:hover {
            border-color: rgba(255, 255, 255, 0.15);
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .proj-bar {
            height: 4px;
        }

        .proj-bar.planning {
            background: linear-gradient(90deg, var(--text-muted), #cbd5e1);
        }

        .proj-bar.active {
            background: linear-gradient(90deg, var(--info), #7dd3fc);
        }

        .proj-bar.completed {
            background: linear-gradient(90deg, var(--success), #4ade80);
        }

        .proj-bar.on_hold {
            background: linear-gradient(90deg, var(--warning), #fde047);
        }

        .proj-bar.cancelled {
            background: linear-gradient(90deg, var(--danger), #f87171);
        }

        .proj-body {
            padding: 20px;
        }

        .proj-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
        }

        .proj-title {
            font-size: 16px;
            font-weight: 700;
            flex: 1;
        }

        .proj-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }

        .proj-badge.planning {
            background: rgba(148, 163, 184, 0.12);
            color: var(--text-muted);
        }

        .proj-badge.active {
            background: rgba(56, 189, 248, 0.12);
            color: var(--info);
        }

        .proj-badge.completed {
            background: rgba(34, 197, 94, 0.12);
            color: var(--success);
        }

        .proj-badge.on_hold {
            background: rgba(250, 204, 21, 0.12);
            color: var(--warning);
        }

        .proj-desc {
            font-size: 12px;
            color: var(--text-muted);
            line-height: 1.5;
            margin-bottom: 12px;
        }

        .proj-chain {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            margin-bottom: 12px;
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 8px;
            flex-wrap: wrap;
        }

        .chain-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .chain-item.obj {
            color: var(--primary);
        }

        .chain-item.init {
            color: var(--warning);
        }

        .chain-sep {
            color: var(--text-muted);
        }

        .proj-progress {
            margin-bottom: 12px;
        }

        .proj-progress-header {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            margin-bottom: 4px;
        }

        .proj-progress-bar {
            height: 6px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 6px;
            overflow: hidden;
        }

        .proj-progress-fill {
            height: 100%;
            border-radius: 6px;
            transition: width 0.5s;
        }

        .proj-meta {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 14px;
            font-size: 11px;
        }

        .proj-meta-item {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 10px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 8px;
        }

        .proj-meta-item i {
            color: var(--text-muted);
        }

        .proj-team {
            display: flex;
            align-items: center;
            gap: -4px;
            margin-bottom: 14px;
        }

        .proj-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: 700;
            border: 2px solid var(--bg-card);
            margin-right: -6px;
        }

        .proj-team-count {
            font-size: 11px;
            color: var(--text-muted);
            margin-right: 8px;
        }

        .proj-tasks-summary {
            display: flex;
            gap: 10px;
            margin-bottom: 14px;
            font-size: 11px;
        }

        .pts-item {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.02);
        }

        .proj-actions {
            display: flex;
            gap: 6px;
            border-top: 1px solid var(--border);
            padding-top: 14px;
        }

        .proj-btn {
            flex: 1;
            padding: 8px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-muted);
            font-family: inherit;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }

        .proj-btn:hover {
            background: rgba(255, 255, 255, 0.06);
        }

        .proj-btn.tasks {
            color: var(--info);
            border-color: rgba(56, 189, 248, 0.3);
        }

        .proj-btn.tasks:hover {
            background: rgba(56, 189, 248, 0.08);
        }

        .proj-btn.edit:hover {
            border-color: var(--warning);
            color: var(--warning);
        }

        .proj-btn.del:hover {
            border-color: var(--danger);
            color: var(--danger);
        }

        /* Sync badge */
        .sync-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 10px;
            padding: 3px 8px;
            border-radius: 6px;
            background: rgba(102, 126, 234, 0.1);
            color: var(--primary);
            margin-right: 6px;
        }

        /* Modal */
        .modal-content {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            color: var(--text);
        }

        .modal-header {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border-radius: 16px 16px 0 0;
            padding: 18px 24px;
            border-bottom: none;
        }

        .modal-body {
            padding: 24px;
        }

        .modal-footer {
            padding: 16px 24px;
            border-top: 1px solid var(--border);
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--text-muted);
        }

        .form-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 14px;
            color: var(--text);
            font-family: inherit;
            font-size: 14px;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .form-input option {
            background: var(--bg-card);
            color: var(--text);
        }

        textarea.form-input {
            resize: vertical;
            min-height: 70px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .btn-modal-save {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 10px;
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-modal-cancel {
            background: rgba(255, 255, 255, 0.06);
            color: var(--text);
            border: 1px solid var(--border);
            padding: 10px 24px;
            border-radius: 10px;
            font-family: inherit;
            cursor: pointer;
        }

        .toast-container {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 9999;
        }

        .toast-msg {
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            animation: slideUp 0.3s ease;
            margin-top: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(34, 197, 94, 0.9);
            color: white;
        }

        @keyframes slideUp {
            from {
                transform: translateY(20px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @media (max-width: 768px) {
            .mini-stats {
                grid-template-columns: repeat(2, 1fr);
            }

            .projects-grid {
                grid-template-columns: 1fr;
            }

            .main-content {
                max-width: 100%;
                padding: 16px;
            }
        }
    </style>
</head>

<body>
    <nav class="top-nav">
        <a href="/dashboard.html" class="brand"><i class="bi bi-gem"></i> ستارتكس</a>
        <div class="user-area">
            <div class="user-avatar">م</div>
            <button class="btn-logout" onclick="localStorage.clear(); location.href='/login.html'"><i
                    class="bi bi-box-arrow-right"></i> خروج</button>
        </div>
    </nav>

    <div class="layout">
        <aside class="sidebar"></aside>
        <div class="main-content">
            <div class="page-header">
                <div>
                    <h1><i class="bi bi-folder2-open"></i> المشاريع</h1>
                    <p class="page-subtitle">المشاريع التفصيلية المتفرعة من المبادرات — كل مشروع مربوط بسلسلة: هدف ←
                        مبادرة ← مشروع ← مهام</p>
                    <span id="deptBadge"
                        style="display:none;padding:3px 12px;border-radius:20px;font-size:12px;font-weight:700;margin-top:6px;display:inline-block"></span>
                </div>
                <button class="btn-add" onclick="openCreateModal()"><i class="bi bi-plus-lg"></i> مشروع جديد</button>
            </div>

            <!-- Cascading Flow -->
            <div class="cascade-flow">
                <a href="/objectives.html" class="cascade-step"><i class="bi bi-bullseye"></i> الأهداف</a>
                <i class="bi bi-chevron-left cascade-arrow"></i>
                <a href="/initiatives.html" class="cascade-step"><i class="bi bi-rocket-takeoff"></i> المبادرات</a>
                <i class="bi bi-chevron-left cascade-arrow"></i>
                <span class="cascade-step active"><i class="bi bi-folder2-open"></i> المشاريع</span>
                <i class="bi bi-chevron-left cascade-arrow"></i>
                <a href="/reviews.html" class="cascade-step"><i class="bi bi-journal-check"></i> المراجعات</a>
                <span style="margin-right: auto"></span>
                <span class="sync-badge"><i class="bi bi-arrow-repeat"></i> متزامن مع dePower / Asana</span>
            </div>

            <!-- Stats -->
            <div class="mini-stats">
                <div class="mini-stat">
                    <div class="ms-value" id="sTotal">8</div>
                    <div class="ms-label">إجمالي المشاريع</div>
                </div>
                <div class="mini-stat">
                    <div class="ms-value" id="sActive">4</div>
                    <div class="ms-label">نشطة</div>
                </div>
                <div class="mini-stat">
                    <div class="ms-value" id="sCompleted">2</div>
                    <div class="ms-label">مكتملة</div>
                </div>
                <div class="mini-stat">
                    <div class="ms-value" id="sPlanning">1</div>
                    <div class="ms-label">تخطيط</div>
                </div>
                <div class="mini-stat">
                    <div class="ms-value" id="sHold">1</div>
                    <div class="ms-label">متوقفة</div>
                </div>
            </div>

            <!-- Filter -->
            <div class="filter-bar">
                <div class="ftab active" onclick="filterProjects('all',this)">الكل</div>
                <div class="ftab" onclick="filterProjects('active',this)">🔵 نشطة</div>
                <div class="ftab" onclick="filterProjects('completed',this)">🟢 مكتملة</div>
                <div class="ftab" onclick="filterProjects('planning',this)">⚪ تخطيط</div>
                <div class="ftab" onclick="filterProjects('on_hold',this)">🟡 متوقفة</div>
            </div>

            <!-- Projects Grid -->
            <div class="projects-grid" id="projectsGrid"></div>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal fade" id="projModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle"><i class="bi bi-plus-circle"></i> مشروع جديد</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="editId">
                    <div class="form-group"><label>اسم المشروع</label><input type="text" class="form-input"
                            id="formName" placeholder="مثال: تطوير واجهة التطبيق"></div>
                    <div class="form-group"><label>الوصف</label><textarea class="form-input" id="formDesc"
                            placeholder="تفاصيل المشروع..."></textarea></div>
                    <div class="form-row">
                        <div class="form-group"><label>المبادرة الأم</label>
                            <select class="form-input" id="formInit">
                                <option value="إطلاق التطبيق الرقمي">إطلاق التطبيق الرقمي</option>
                                <option value="التحول الرقمي الداخلي">التحول الرقمي الداخلي</option>
                                <option value="توسيع الفريق التقني">توسيع الفريق التقني</option>
                                <option value="برنامج ولاء العملاء">برنامج ولاء العملاء</option>
                                <option value="شهادة ISO 9001">شهادة ISO 9001</option>
                            </select>
                        </div>
                        <div class="form-group"><label>الهدف الاستراتيجي</label>
                            <select class="form-input" id="formObj">
                                <option value="رفع رضا العملاء">رفع رضا العملاء</option>
                                <option value="أتمتة العمليات">أتمتة العمليات</option>
                                <option value="تطوير الكوادر">تطوير الكوادر</option>
                                <option value="تطبيق ISO 9001">تطبيق ISO 9001</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group"><label>الحالة</label>
                            <select class="form-input" id="formStatus">
                                <option value="planning">📋 تخطيط</option>
                                <option value="active">🔵 نشط</option>
                                <option value="completed">✅ مكتمل</option>
                                <option value="on_hold">⏸️ متوقف</option>
                            </select>
                        </div>
                        <div class="form-group"><label>نسبة الإنجاز %</label><input type="number" class="form-input"
                                id="formProgress" min="0" max="100" value="0"></div>
                    </div>
                    <div class="form-row">
                        <div class="form-group"><label>تاريخ البدء</label><input type="date" class="form-input"
                                id="formStart"></div>
                        <div class="form-group"><label>تاريخ الانتهاء</label><input type="date" class="form-input"
                                id="formEnd"></div>
                    </div>
                    <div class="form-group"><label>مدير المشروع</label><input type="text" class="form-input"
                            id="formManager" placeholder="اسم المسؤول"></div>
                </div>
                <div class="modal-footer">
                    <button class="btn-modal-cancel" data-bs-dismiss="modal">إلغاء</button>
                    <button class="btn-modal-save" onclick="saveProject()"><i class="bi bi-check-lg"></i> حفظ</button>
                </div>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/steps-config.js"></script>
    <script src="/js/sidebar.js"></script>
    <script src="/js/ai-advisor.js"></script>
    <script>
        if (window.StartixAPI?.showEntityBanner) {
            StartixAPI.showEntityBanner({ toolName: 'المشاريع' });
        }
    </script>
    <script>
        function escapeHtml(str) {
            if (str == null) return '';
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        let currentFilter = 'all';
        const colors = ['#667eea', '#22c55e', '#38bdf8', '#facc15', '#ef4444', '#a78bfa', '#f97316', '#06b6d4'];

        let projects = [];

        async function init() {
            await loadDropdowns();
            await loadProjects();
        }

        async function loadDropdowns() {
            try {
                // Fetch initiatives
                const initRes = await window.api.request('/api/strategic/initiatives');
                const initiatives = await initRes.json();
                const initSelect = document.getElementById('formInit');
                initSelect.innerHTML = '<option value="">-- اختر المبادرة الأم --</option>' + (Array.isArray(initiatives) ? initiatives.map(i => `<option value="${escapeHtml(i.title)}">${escapeHtml(i.title)}</option>`).join('') : '');

                // Fetch objectives
                const objRes = await window.api.request('/api/strategic/objectives');
                const objectives = await objRes.json();
                const objSelect = document.getElementById('formObj');
                objSelect.innerHTML = '<option value="">-- اختر الهدف الاستراتيجي --</option>' + (Array.isArray(objectives) ? objectives.map(o => `<option value="${escapeHtml(o.title)}">${escapeHtml(o.title)}</option>`).join('') : '');
            } catch (e) {
                console.error("Error loading dropdowns:", e);
            }
        }

        async function loadProjects() {
            try {
                const res = await window.api.request('/api/projects');
                projects = await res.json();

                // Ensure task fields exist for the UI since they are simple integers in DB now
                projects = projects.map(p => ({
                    ...p,
                    tasks: {
                        total: p.tasksTotal || 0,
                        done: p.tasksCompleted || 0,
                        inProgress: p.tasksInProgress || 0,
                        todo: (p.tasksTotal || 0) - (p.tasksCompleted || 0) - (p.tasksInProgress || 0)
                    },
                    team: p.manager ? [p.manager.charAt(0)] : []
                }));

                renderAll();
            } catch (err) {
                console.error(err);
                showToast('خطأ في جلب المشاريع');
            }
        }

        function getProgressColor(p) { return p >= 70 ? 'var(--success)' : p >= 40 ? 'var(--warning)' : 'var(--danger)'; }
        const statusLabels = { planning: 'تخطيط', active: 'نشط', completed: 'مكتمل', on_hold: 'متوقف' };

        function getFiltered() {
            if (currentFilter === 'all') return projects;
            return projects.filter(p => p.status === currentFilter);
        }

        function filterProjects(f, el) {
            currentFilter = f;
            document.querySelectorAll('.ftab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            renderAll();
        }

        function renderStats() {
            document.getElementById('sTotal').textContent = projects.length;
            document.getElementById('sActive').textContent = projects.filter(p => p.status === 'active').length;
            document.getElementById('sCompleted').textContent = projects.filter(p => p.status === 'completed').length;
            document.getElementById('sPlanning').textContent = projects.filter(p => p.status === 'planning').length;
            document.getElementById('sHold').textContent = projects.filter(p => p.status === 'on_hold').length;
        }

        function renderGrid() {
            const data = getFiltered();
            document.getElementById('projectsGrid').innerHTML = data.map(p => `
        <div class="proj-card">
          <div class="proj-bar ${p.status}"></div>
          <div class="proj-body">
            <div class="proj-header">
              <div class="proj-title">${escapeHtml(p.name)}</div>
              <span class="proj-badge ${p.status}">${statusLabels[p.status]}</span>
            </div>
            <div class="proj-desc">${escapeHtml(p.description) || 'لا يوجد وصف'}</div>
            <div class="proj-chain">
              <span class="chain-item obj"><i class="bi bi-bullseye"></i> ${escapeHtml(p.objective) || 'غير محدد'}</span>
              <span class="chain-sep">←</span>
              <span class="chain-item init"><i class="bi bi-rocket-takeoff"></i> ${escapeHtml(p.initiative) || 'غير محدد'}</span>
            </div>
            <div class="proj-progress">
              <div class="proj-progress-header">
                <span style="color:var(--text-muted)">الإنجاز</span>
                <span style="font-weight:700;color:${getProgressColor(p.progress)}">${p.progress}%</span>
              </div>
              <div class="proj-progress-bar"><div class="proj-progress-fill" style="width:${p.progress}%;background:${getProgressColor(p.progress)}"></div></div>
            </div>
            <div class="proj-meta">
              <div class="proj-meta-item"><i class="bi bi-person"></i> ${escapeHtml(p.manager) || 'لم يحدد'}</div>
              <div class="proj-meta-item"><i class="bi bi-calendar3"></i> ${p.endDate ? new Date(p.endDate).toLocaleDateString('ar-EG') : 'بدون تاريخ'}</div>
            </div>
            ${p.team && p.team.length > 0 ? `
            <div class="proj-team">
              ${p.team.map((m, i) => `<div class="proj-avatar" style="background:${colors[i % colors.length]};color:white;z-index:${10 - i}">${escapeHtml(m)}</div>`).join('')}
              <span class="proj-team-count">${p.team.length} أعضاء</span>
            </div>` : ''}
            <div class="proj-actions">
            <button class="proj-btn tasks" onclick="location.href='/reviews.html'"><i class="bi bi-journal-check"></i> المراجعات</button>
              <button class="proj-btn edit" onclick="openEditModal('${p.id}')"><i class="bi bi-pencil"></i> تعديل</button>
              <button class="proj-btn del" onclick="deleteProject('${p.id}')"><i class="bi bi-trash3"></i> حذف</button>
            </div>
          </div>
        </div>
      `).join('');
        }

        function renderAll() { renderStats(); renderGrid(); }

        function openCreateModal() {
            document.getElementById('modalTitle').innerHTML = '<i class="bi bi-plus-circle"></i> مشروع جديد';
            document.getElementById('editId').value = '';
            ['formName', 'formDesc', 'formManager', 'formStart', 'formEnd'].forEach(id => document.getElementById(id).value = '');
            document.getElementById('formInit').value = '';
            document.getElementById('formObj').value = '';
            document.getElementById('formStatus').value = 'planning';
            document.getElementById('formProgress').value = 0;
            new bootstrap.Modal(document.getElementById('projModal')).show();
        }

        function openEditModal(id) {
            const p = projects.find(x => x.id === id);
            if (!p) return;
            document.getElementById('modalTitle').innerHTML = '<i class="bi bi-pencil-square"></i> تعديل المشروع';
            document.getElementById('editId').value = p.id;
            document.getElementById('formName').value = p.name;
            document.getElementById('formDesc').value = p.description || '';
            document.getElementById('formInit').value = p.initiative || '';
            document.getElementById('formObj').value = p.objective || '';
            document.getElementById('formStatus').value = p.status;
            document.getElementById('formProgress').value = p.progress;
            document.getElementById('formStart').value = p.startDate ? p.startDate.split('T')[0] : '';
            document.getElementById('formEnd').value = p.endDate ? p.endDate.split('T')[0] : '';
            document.getElementById('formManager').value = p.manager || '';
            new bootstrap.Modal(document.getElementById('projModal')).show();
        }

        async function saveProject() {
            const id = document.getElementById('editId').value;
            const data = {
                name: document.getElementById('formName').value.trim(),
                description: document.getElementById('formDesc').value.trim(),
                initiative: document.getElementById('formInit').value,
                objective: document.getElementById('formObj').value,
                status: document.getElementById('formStatus').value,
                progress: parseInt(document.getElementById('formProgress').value) || 0,
                startDate: document.getElementById('formStart').value || null,
                endDate: document.getElementById('formEnd').value || null,
                manager: document.getElementById('formManager').value.trim(),
            };
            if (!data.name) return;

            try {
                const method = id ? 'PATCH' : 'POST';
                const endpoint = id ? `/api/projects/${id}` : '/api/projects';

                const res = await window.api.request(endpoint, {
                    method,
                    body: JSON.stringify(data)
                });

                if (!res.ok) throw new Error("Failed to save project");

                showToast(`تم ${id ? 'تحديث' : 'إنشاء'} المشروع بنجاح ✓`);
                bootstrap.Modal.getInstance(document.getElementById('projModal')).hide();
                await loadProjects();
            } catch (err) {
                console.error(err);
                alert("حدث خطأ أثناء حفظ المشروع.");
            }
        }

        async function deleteProject(id) {
            if (!confirm('هل تأكد من حذف المشروع؟')) return;
            try {
                await window.api.request(`/api/projects/${id}`, { method: 'DELETE' });
                showToast('تم الحذف ✓');
                await loadProjects();
            } catch (err) {
                console.error(err);
                alert("حدث خطأ أثناء حذف المشروع.");
            }
        }

        function showToast(msg) {
            const t = document.createElement('div');
            t.className = 'toast-msg';
            t.innerHTML = `<i class="bi bi-check-circle"></i> <span>${escapeHtml(msg)}</span>`;
            document.getElementById('toastContainer').appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }

        init();
    </script>
</body>

</html>
