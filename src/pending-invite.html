<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ستارتكس - بانتظار الدعوة</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #0a0b10;
            --bg-card: #171a2a;
            --border: rgba(255, 255, 255, 0.08);
            --text: #e2e8f0;
            --muted: #7a8599;
            --primary: #667eea;
            --secondary: #764ba2;
            --bs-body-color: #e2e8f0;
            --bs-body-color-rgb: 226, 232, 240;
            --bs-card-color: #e2e8f0;
        }

        body {
            background: var(--bg);
            font-family: 'Tajawal', sans-serif;
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at center, rgba(102, 126, 234, 0.05) 0%, transparent 60%);
            z-index: -1;
        }

        .invite-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 48px 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.6s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .icon-circle {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.15), rgba(118, 75, 162, 0.15));
            border: 2px solid rgba(102, 126, 234, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            color: var(--primary);
            margin: 0 auto 24px;
            animation: pulseIcon 2s infinite;
        }

        @keyframes pulseIcon {
            0% {
                box-shadow: 0 0 0 0 rgba(102, 126, 234, 0.4);
            }

            70% {
                box-shadow: 0 0 0 15px rgba(102, 126, 234, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(102, 126, 234, 0);
            }
        }

        .title {
            font-size: 1.6rem;
            font-weight: 800;
            margin-bottom: 12px;
            color: #fff;
        }

        .desc {
            font-size: 1.05rem;
            color: var(--muted);
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .highlight-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 24px;
            text-align: right;
            font-size: 0.95rem;
        }

        .highlight-box i {
            color: var(--primary);
            margin-left: 8px;
        }

        .btn-action {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #fff;
            border: none;
            border-radius: 12px;
            padding: 14px 32px;
            font-size: 1.05rem;
            font-weight: 700;
            text-decoration: none;
            transition: all 0.3s ease;
            width: 100%;
        }

        .btn-action:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
            color: #fff;
        }

        .logout-link {
            display: inline-block;
            margin-top: 20px;
            color: var(--muted);
            font-size: 0.9rem;
            text-decoration: none;
            transition: color 0.3s;
        }

        .logout-link:hover {
            color: #ef4444;
        }
    </style>
</head>

<body>
    <div class="invite-card">
        <div class="icon-circle">
            <i class="bi bi-envelope-paper"></i>
        </div>
        <h1 class="title">حسابك جاهز، بانتظار التفعيل!</h1>
        <p class="desc">بصفتك مدير إدارة مسجل، لا بد أن يتم إضافتك إلى الهيكل التنظيمي للمنشأة من قِبل المدير العام أو
            مسؤول النظام للبدء في رحلتك الاستراتيجية.</p>

        <div class="highlight-box">
            <div style="font-weight:700; color:#fff; margin-bottom:8px;">الخطوات التالية:</div>
            <div><i class="bi bi-1-circle"></i> تواصل مع المالك لإرسال دعوة لك.</div>
            <div style="margin-top:8px"><i class="bi bi-2-circle"></i> بمجرد إضافتك، ستفتح اللوحة الخاصة بقسمك هنا.
            </div>
        </div>

        <button onclick="window.location.reload()" class="btn-action">
            <i class="bi bi-arrow-clockwise"></i> تحديث الحالة
        </button>

        <a href="#" onclick="logoutUser(event)" class="logout-link">
            <i class="bi bi-box-arrow-right"></i> تسجيل الخروج
        </a>
    </div>

    <script src="/js/api.js"></script>
    <script>
        async function logoutUser(e) {
            e.preventDefault();
            window.globalLogout();
        }
    </script>
</body>

</html>
