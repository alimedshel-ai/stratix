<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ستارتكس - تحليل البيئة الداخلية</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #667eea;
            --secondary: #764ba2;
            --bg: #0f1117;
            --bg-card: #1a1d2e;
            --bg-card-hover: #232640;
            --text: #e2e8f0;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.08);
            --teal: #0D9488;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            font-family: 'Tajawal', sans-serif;
            color: var(--text);
            min-height: 100vh;
        }

        .top-nav {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            padding: 14px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .top-nav .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            color: white;
            text-decoration: none;
            font-size: 20px;
            font-weight: 700;
        }

        .user-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 14px;
        }

        .btn-logout {
            background: rgba(255, 255, 255, 0.15);
            border: none;
            color: white;
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            font-family: inherit;
        }

        .layout {
            display: flex;
            min-height: calc(100vh - 64px);
        }

        .sidebar {
            width: 280px;
            flex-shrink: 0;
        }

        .main-content {
            flex: 1;
            max-width: 900px;
            margin: 0 auto;
            padding: 30px;
        }

        /* WIZARD CONTAINER */
        .wizard-container {
            position: relative;
        }

        .wizard-screen {
            display: none;
            animation: fadeIn 0.4s ease;
        }

        .wizard-screen.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* HERO */
        .hero {
            background: linear-gradient(135deg, rgba(13, 148, 136, 0.12), rgba(13, 148, 136, 0.04));
            border: 1px solid rgba(13, 148, 136, 0.2);
            border-radius: 20px;
            padding: 32px;
            margin-bottom: 28px;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            left: 0;
            height: 3px;
            background: linear-gradient(90deg, #0D9488, #14B8A6, #2DD4BF);
        }

        .hero h1 {
            font-size: 26px;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .hero p {
            font-size: 14px;
            color: var(--text-muted);
            line-height: 1.8;
        }

        /* PROGRESS STEPS */
        .wizard-steps {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 28px;
        }

        .wiz-step {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 700;
            background: var(--bg-card);
            border: 1px solid var(--border);
            transition: all 0.3s;
            color: var(--text-muted);
        }

        .wiz-step.active {
            background: rgba(13, 148, 136, 0.1);
            border-color: rgba(13, 148, 136, 0.3);
            color: var(--teal);
        }

        .wiz-step.done {
            background: rgba(34, 197, 94, 0.08);
            border-color: rgba(34, 197, 94, 0.2);
            color: #22c55e;
        }

        .wiz-step-num {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 800;
            background: var(--border);
        }

        .wiz-step.active .wiz-step-num {
            background: rgba(13, 148, 136, 0.2);
            color: var(--teal);
        }

        .wiz-step.done .wiz-step-num {
            background: rgba(34, 197, 94, 0.15);
            color: #22c55e;
        }

        .wiz-arrow {
            color: var(--text-muted);
            font-size: 14px;
        }

        /* DEPARTMENT CARDS */
        .dept-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 14px;
            margin-bottom: 24px;
        }

        .dept-card {
            background: var(--bg-card);
            border: 2px solid var(--border);
            border-radius: 16px;
            padding: 22px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }

        .dept-card:hover {
            border-color: rgba(13, 148, 136, 0.3);
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        }

        .dept-card.selected {
            border-color: var(--teal);
            background: rgba(13, 148, 136, 0.08);
            box-shadow: 0 0 0 1px var(--teal), 0 8px 25px rgba(13, 148, 136, 0.15);
        }

        .dept-card.selected::after {
            content: '✅';
            position: absolute;
            top: 10px;
            left: 10px;
            font-size: 16px;
        }

        .dept-card.disabled {
            opacity: 0.35;
            pointer-events: none;
        }

        .dept-card .dept-emoji {
            font-size: 36px;
            margin-bottom: 10px;
            display: block;
        }

        .dept-card .dept-name {
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .dept-card .dept-desc {
            font-size: 11px;
            color: var(--text-muted);
        }

        .dept-counter {
            text-align: center;
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 18px;
            color: var(--teal);
        }

        /* QUESTION SCREEN */
        .q-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 36px;
            margin-bottom: 20px;
        }

        .q-dept-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 16px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 18px;
        }

        .q-number {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .q-text {
            font-size: 20px;
            font-weight: 800;
            line-height: 1.6;
            margin-bottom: 24px;
        }

        .q-options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .q-option {
            background: rgba(255, 255, 255, 0.02);
            border: 2px solid var(--border);
            border-radius: 14px;
            padding: 16px 20px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 14px;
            font-size: 14px;
            font-weight: 600;
        }

        .q-option:hover {
            border-color: rgba(13, 148, 136, 0.3);
            background: rgba(13, 148, 136, 0.04);
        }

        .q-option.selected {
            border-color: var(--teal);
            background: rgba(13, 148, 136, 0.08);
        }

        .q-option .radio {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 2px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.3s;
        }

        .q-option.selected .radio {
            border-color: var(--teal);
            background: var(--teal);
        }

        .q-option.selected .radio::after {
            content: '✓';
            color: white;
            font-size: 12px;
            font-weight: 800;
        }

        .q-progress {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 24px;
        }

        .q-progress-track {
            flex: 1;
            height: 6px;
            border-radius: 3px;
            background: rgba(255, 255, 255, 0.06);
            overflow: hidden;
        }

        .q-progress-fill {
            height: 100%;
            border-radius: 3px;
            background: linear-gradient(90deg, #0D9488, #14B8A6);
            transition: width 0.5s ease;
        }

        .q-progress-text {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 600;
            white-space: nowrap;
        }

        .q-nav {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }

        .btn-q {
            padding: 12px 28px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-q.prev {
            background: var(--bg-card);
            color: var(--text-muted);
            border: 1px solid var(--border);
        }

        .btn-q.next {
            background: linear-gradient(135deg, #0D9488, #14B8A6);
            color: white;
        }

        .btn-q:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* RESULT SCREEN */
        .result-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 22px;
            margin-bottom: 14px;
            transition: all 0.3s;
        }

        .result-card:hover {
            border-color: rgba(255, 255, 255, 0.12);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .result-header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 14px;
        }

        .result-emoji {
            font-size: 32px;
        }

        .result-name {
            font-size: 16px;
            font-weight: 800;
        }

        .result-score-label {
            font-size: 12px;
            color: var(--text-muted);
        }

        .result-bar-track {
            height: 14px;
            border-radius: 7px;
            background: rgba(255, 255, 255, 0.06);
            overflow: hidden;
            margin-bottom: 10px;
        }

        .result-bar-fill {
            height: 100%;
            border-radius: 7px;
            transition: width 1.5s ease;
        }

        .result-verdict {
            font-size: 13px;
            padding: 10px 14px;
            border-radius: 10px;
            font-weight: 600;
            line-height: 1.6;
        }

        .result-answers {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 10px;
        }

        .result-answer-chip {
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 8px;
            font-weight: 600;
        }

        .smart-rec {
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.08), rgba(102, 126, 234, 0.05));
            border: 1px solid rgba(139, 92, 246, 0.2);
            border-radius: 18px;
            padding: 24px;
            margin-top: 20px;
            position: relative;
        }

        .smart-rec::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            left: 0;
            height: 3px;
            background: linear-gradient(90deg, #8b5cf6, #667eea);
        }

        .btn-main {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 28px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            font-family: inherit;
            color: white;
            text-decoration: none;
            transition: all 0.3s;
        }

        /* REMINDER BANNER */
        .reminder-banner {
            border-radius: 16px;
            padding: 20px 24px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            animation: fadeIn 0.5s ease;
        }

        .reminder-banner .rb-icon {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            flex-shrink: 0;
        }

        .reminder-banner .rb-content {
            flex: 1;
        }

        .reminder-banner .rb-title {
            font-size: 15px;
            font-weight: 800;
            margin-bottom: 4px;
        }

        .reminder-banner .rb-desc {
            font-size: 12px;
            color: var(--text-muted);
        }

        .reminder-banner .rb-btn {
            padding: 8px 20px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            font-family: inherit;
            color: white;
            white-space: nowrap;
        }

        /* HISTORY COMPARISON */
        .history-comparison {
            background: linear-gradient(135deg, rgba(56, 189, 248, 0.06), rgba(14, 165, 233, 0.03));
            border: 1px solid rgba(56, 189, 248, 0.15);
            border-radius: 16px;
            padding: 22px;
            margin-bottom: 20px;
        }

        .history-comparison h3 {
            font-size: 16px;
            font-weight: 800;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .history-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 14px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 10px;
            margin-bottom: 8px;
        }

        .history-row .hr-emoji {
            font-size: 22px;
        }

        .history-row .hr-name {
            font-size: 13px;
            font-weight: 700;
            flex: 1;
        }

        .history-row .hr-old {
            font-size: 13px;
            color: var(--text-muted);
        }

        .history-row .hr-arrow {
            font-size: 16px;
        }

        .history-row .hr-new {
            font-size: 15px;
            font-weight: 800;
        }

        .history-row .hr-diff {
            font-size: 11px;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 6px;
        }

        /* SMART LINKING */
        .smart-link-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 14px;
            text-decoration: none;
            color: var(--text);
            transition: all 0.3s;
            margin-top: 10px;
        }

        .smart-link-card:hover {
            border-color: rgba(13, 148, 136, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.25);
        }

        .smart-link-card .sl-icon {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }

        .smart-link-card .sl-content {
            flex: 1;
        }

        .smart-link-card .sl-title {
            font-size: 14px;
            font-weight: 700;
        }

        .smart-link-card .sl-desc {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .smart-link-card .sl-arrow {
            font-size: 16px;
            color: var(--text-muted);
        }

        @media (max-width: 768px) {
            .main-content {
                padding: 16px;
            }

            .dept-grid {
                grid-template-columns: 1fr 1fr;
            }

            .wizard-steps {
                flex-wrap: wrap;
            }

            .reminder-banner {
                flex-direction: column;
                text-align: center;
            }
        }
    </style>
</head>

<body>
    <nav class="top-nav">
        <a href="/dashboard.html" class="brand"><i class="bi bi-gem"></i> ستارتكس</a>
        <div class="user-area">
            <div class="user-avatar">م</div>
            <button class="btn-logout" onclick="localStorage.clear(); location.href='/login.html'">
                <i class="bi bi-box-arrow-right"></i> خروج
            </button>
        </div>
    </nav>

    <div class="layout">
        <aside class="sidebar"></aside>
        <div class="main-content">
            <!-- Reminder Banner (dynamically shown) -->
            <div id="reminderBanner" style="display:none"></div>

            <!-- Hero -->
            <div class="hero">
                <h1>🏢 تحليل البيئة الداخلية</h1>
                <p id="heroDesc">ابدأ بالفحص العام لصحة المنظمة — ثم تعمّق في كل إدارة بأسئلة تخصصية.
                </p>
            </div>

            <!-- Wizard Steps -->
            <div class="wizard-steps">
                <div class="wiz-step active" id="wizStep0">
                    <div class="wiz-step-num">٠</div>
                    الفحص العام
                </div>
                <div class="wiz-arrow">←</div>
                <div class="wiz-step" id="wizStep1">
                    <div class="wiz-step-num">١</div>
                    اختر الإدارة
                </div>
                <div class="wiz-arrow">←</div>
                <div class="wiz-step" id="wizStep2">
                    <div class="wiz-step-num">٢</div>
                    أسئلة الإدارة
                </div>
                <div class="wiz-arrow">←</div>
                <div class="wiz-step" id="wizStep3">
                    <div class="wiz-step-num">٣</div>
                    النتائج
                </div>
            </div>

            <div class="wizard-container">
                <!-- SCREEN 0: General Assessment -->
                <div class="wizard-screen active" id="screen0">
                    <div id="generalAssessmentArea"></div>
                </div>

                <!-- SCREEN 1: Select Departments -->
                <div class="wizard-screen" id="screen1">
                    <div class="dept-counter" id="deptCounter">اختر إدارتك — <span id="selectedCount">٠</span> مختارة
                    </div>
                    <div class="dept-grid" id="deptGrid"></div>

                    <!-- Custom Department -->
                    <div style="margin:16px 0;display:flex;align-items:center;gap:10px">
                        <input type="text" id="customDeptName" placeholder="أضف إدارة مخصصة..." maxlength="30"
                            style="flex:1;padding:12px 16px;border-radius:12px;border:1.5px solid var(--border);background:var(--bg-card);color:var(--text);font-family:inherit;font-size:14px;outline:none;transition:border-color .3s"
                            onfocus="this.style.borderColor='rgba(13,148,136,0.4)'"
                            onblur="this.style.borderColor='var(--border)'">
                        <button onclick="addCustomDept()"
                            style="padding:12px 20px;border-radius:12px;border:none;background:linear-gradient(135deg,#0D9488,#14B8A6);color:white;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap">
                            <i class="bi bi-plus-lg"></i> أضف
                        </button>
                    </div>

                    <div style="text-align:center">
                        <button class="btn-q next" id="btnStartQuestions" disabled onclick="startQuestions()">
                            <span id="btnStartText">اختر إدارتك أولاً</span> <i class="bi bi-arrow-left"></i>
                        </button>
                    </div>
                </div>

                <!-- SCREEN 2: Questions -->
                <div class="wizard-screen" id="screen2">
                    <div id="questionArea"></div>
                </div>

                <!-- SCREEN 3: Results -->
                <div class="wizard-screen" id="screen3">
                    <div id="resultsArea"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/data-layer.js"></script>
    <script src="/assets/js/api.js"></script>
    <script src="/assets/js/sidebar.js"></script>
    <script src="/assets/js/ai-advisor.js"></script>
    <!-- Toast Area -->
    <div id="toastArea"
        style="position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none">
    </div>
    <style>
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(10px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }
    </style>
    <script>
        const token = localStorage.getItem('token') || '';

        // === Toast System ===
        function showToast(msg, type = 'info', duration = 4000) {
            const area = document.getElementById('toastArea');
            if (!area) return;
            const colors = { success: '#22c55e', error: '#ef4444', warning: '#f59e0b', info: '#667eea' };
            const icons = { success: 'check-circle', error: 'x-circle', warning: 'exclamation-triangle', info: 'info-circle' };
            const t = document.createElement('div');
            t.style.cssText = `pointer-events:auto;display:flex;align-items:center;gap:10px;padding:12px 20px;border-radius:14px;background:#1e293b;border:1px solid ${colors[type]}40;color:#e2e8f0;font-size:13px;font-weight:600;box-shadow:0 8px 30px rgba(0,0,0,0.3);animation:fadeUp 0.3s ease;font-family:inherit;max-width:480px`;
            t.innerHTML = `<i class="bi bi-${icons[type]}" style="color:${colors[type]};font-size:16px"></i> <span>${msg}</span>`;
            area.appendChild(t);
            setTimeout(() => { t.style.opacity = '0'; t.style.transition = 'opacity 0.3s'; setTimeout(() => t.remove(), 300); }, duration);
        }

        // === XSS Prevention ===
        function esc(str) {
            if (str == null) return '';
            const d = document.createElement('div');
            d.textContent = String(str);
            return d.innerHTML;
        }

                btnText.textContent = 'اختر إدارتك أولاً';

                if (!el) return;
                el.classList.remove('selected', 'disabled');

                    el.classList.add('selected');
                }

        // ============================================================
        //  SCREEN 0: General Assessment
        // ============================================================
        function renderGeneralAssessment() {
            const tool = GENERAL_TOOLS[state.generalCurrentTool];
            const qIdx = state.generalCurrentQ;
            const q = tool.questions[qIdx];
            const totalTools = GENERAL_TOOLS.length;
            const totalQsInTool = tool.questions.length;
            const globalQ = GENERAL_TOOLS.slice(0, state.generalCurrentTool).reduce((s, t) => s + t.questions.length, 0) + qIdx;
            const totalAllQs = GENERAL_TOOLS.reduce((s, t) => s + t.questions.length, 0);
            const ansKey = `${tool.id}_${qIdx}`;
            const currentAnswer = state.generalAnswers[ansKey];

            // Tool progress dots
            const toolDots = GENERAL_TOOLS.map((t, i) => {
                const done = i < state.generalCurrentTool;
                const active = i === state.generalCurrentTool;
                const bg = done ? 'rgba(34,197,94,0.15)' : active ? `${t.color}15` : 'rgba(255,255,255,0.03)';
                const border = done ? 'rgba(34,197,94,0.3)' : active ? `${t.color}40` : 'var(--border)';
                const textColor = done ? '#22c55e' : active ? t.color : 'var(--text-muted)';
                return `<div style="display:flex;align-items:center;gap:8px;padding:8px 14px;border-radius:10px;background:${bg};border:1.5px solid ${border};flex:1;min-width:0">
                    <span style="font-size:16px">${done ? '✅' : t.emoji}</span>
                    <div style="flex:1;min-width:0">
                        <div style="font-size:11px;font-weight:700;color:${textColor};white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${t.nameAr}</div>
                        <div style="font-size:9px;color:var(--text-muted)">${t.source}</div>
                    </div>
                </div>`;
            }).join('');

            const area = document.getElementById('generalAssessmentArea');
            area.innerHTML = `
                <!-- Tool Navigation -->
                <div style="display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap">${toolDots}</div>

                <!-- Question Card -->
                <div class="q-card">
                    <div class="q-dept-badge" style="background:${tool.color}15;color:${tool.color};border:1px solid ${tool.color}30">
                        ${tool.emoji} ${tool.nameAr} — السؤال ${qIdx + 1}/${totalQsInTool}
                    </div>
                    <div style="font-size:12px;color:var(--text-muted);margin-bottom:8px">${tool.desc}</div>
                    <div class="q-text">"${q.q}"</div>

                    <div class="q-options">
                        ${q.opts.map(opt => `
                            <div class="q-option ${currentAnswer === opt.v ? 'selected' : ''}"
                                 onclick="selectGeneralAnswer('${tool.id}', ${qIdx}, ${opt.v})">
                                <div class="radio"></div>
                                <span>${opt.icon} ${opt.t}</span>
                            </div>
                        `).join('')}
                    </div>

                    <div class="q-progress">
                        <div class="q-progress-track">
                            <div class="q-progress-fill" style="width:${Math.round(((globalQ + 1) / totalAllQs) * 100)}%;background:${tool.color}"></div>
                        </div>
                        <div class="q-progress-text">${globalQ + 1} / ${totalAllQs}</div>
                    </div>

                    <div class="q-nav">
                        <button class="btn-q prev" onclick="prevGeneralQ()" ${globalQ === 0 ? 'disabled' : ''}>
                            <i class="bi bi-arrow-right"></i> السابق
                        </button>
                        ${globalQ < totalAllQs - 1 ? `
                            <button class="btn-q next" id="btnGenNext" onclick="nextGeneralQ()" ${!currentAnswer ? 'disabled' : ''}>
                                التالي <i class="bi bi-arrow-left"></i>
                            </button>
                        ` : `
                            <button class="btn-q next" id="btnGenNext" onclick="finishGeneralAssessment()" ${!currentAnswer ? 'disabled' : ''}
                                    style="background:linear-gradient(135deg,#22c55e,#16a34a)">
                                🎯 شوف النتائج والانتقال للتخصص <i class="bi bi-arrow-left"></i>
                            </button>
                        `}
                    </div>
                </div>
            `;
        }

        function selectGeneralAnswer(toolId, qIdx, value) {
            state.generalAnswers[`${toolId}_${qIdx}`] = value;
            renderGeneralAssessment();
        }

        function nextGeneralQ() {
            const tool = GENERAL_TOOLS[state.generalCurrentTool];
            if (state.generalCurrentQ < tool.questions.length - 1) {
                state.generalCurrentQ++;
            } else if (state.generalCurrentTool < GENERAL_TOOLS.length - 1) {
                state.generalCurrentTool++;
                state.generalCurrentQ = 0;
            }
            renderGeneralAssessment();
        }

        function prevGeneralQ() {
            if (state.generalCurrentQ > 0) {
                state.generalCurrentQ--;
            } else if (state.generalCurrentTool > 0) {
                state.generalCurrentTool--;
                state.generalCurrentQ = GENERAL_TOOLS[state.generalCurrentTool].questions.length - 1;
            }
            renderGeneralAssessment();
        }

        function finishGeneralAssessment() {
            // Calculate results for each tool
            const results = {};
            let totalScore = 0;
            let totalMax = 0;

            GENERAL_TOOLS.forEach(tool => {
                let toolScore = 0;
                const toolMax = tool.questions.length * 4;
                tool.questions.forEach((q, i) => {
                    const v = state.generalAnswers[`${tool.id}_${i}`] || 1;
                    toolScore += v;
                });
                const pct = Math.round((toolScore / toolMax) * 100);
                results[tool.id] = {
                    score: toolScore,
                    max: toolMax,
                    pct,
                    level: pct >= 75 ? 'strong' : pct >= 50 ? 'medium' : 'weak',
                    label: pct >= 75 ? '🟢 قوي' : pct >= 50 ? '🟡 متوسط' : '🔴 ضعيف'
                };
                totalScore += toolScore;
                totalMax += toolMax;
            });

            results._overall = {
                pct: Math.round((totalScore / totalMax) * 100),
                score: totalScore,
                max: totalMax
            };

            state.generalResults = results;
            state.generalCompleted = true;

            // Save to localStorage for use in other pages
            localStorage.setItem('generalAssessment', JSON.stringify({
                answers: state.generalAnswers,
                results,
                completedAt: new Date().toISOString()
            }));

            // Show results banner then move to dept selection
            showGeneralResultsBanner();
        }

        function goToDeptSelection() {
            switchScreen(1);
        }

        // ============================================================
        //  SCREEN 2: Questions
        // ============================================================
        function startQuestions() {
            state.currentQuestion = 0;
            state.answers = {};
            switchScreen(2);
            renderQuestion();
        }

        function getQuestionsList() {
            const list = [];
            state.selectedDepts.forEach(deptId => {
                const dept = DEPARTMENTS.find(d => d.id === deptId);
                dept.questions.forEach((q, i) => {
                    list.push({ dept, questionIndex: i, ...q });
                });
            });
            return list;
        }

        function renderQuestion() {
            const questions = getQuestionsList();
            const total = questions.length;
            const idx = state.currentQuestion;
            const q = questions[idx];
            const ansKey = `${q.dept.id}_q${q.questionIndex}`;
            const currentAnswer = state.answers[ansKey];
            const totalQsInDept = q.dept.questions.length;
            const deptQNum = q.questionIndex + 1;
            const globalNum = idx + 1;

            document.getElementById('questionArea').innerHTML = `
                <div class="q-card">
                    <div class="q-dept-badge" style="background:${q.dept.color}15;color:${q.dept.color};border:1px solid ${q.dept.color}30">
                        ${esc(q.dept.emoji)} ${esc(q.dept.nameAr)} — السؤال ${deptQNum}/${totalQsInDept}
                    </div>
                    <div class="q-text">"${esc(q.q)}"</div>
                    <div class="q-options">
                        ${q.opts.map(opt => `
                            <div class="q-option ${currentAnswer === opt.v ? 'selected' : ''}"
                                 onclick="selectAnswer('${esc(q.dept.id)}', ${q.questionIndex}, ${opt.v})">
                                <div class="radio"></div>
                                <span>${esc(opt.icon)} ${esc(opt.t)}</span>
                            </div>
                        `).join('')}
                    </div>
                    <div class="q-progress">
                        <div class="q-progress-track">
                            <div class="q-progress-fill" style="width:${Math.round((globalNum / total) * 100)}%"></div>
                        </div>
                        <div class="q-progress-text">${globalNum} / ${total}</div>
                    </div>
                    <div class="q-nav">
                        <button class="btn-q prev" onclick="prevQuestion()" ${idx === 0 ? 'disabled' : ''}>
                            <i class="bi bi-arrow-right"></i> السابق
                        </button>
                        ${idx < total - 1 ? `
                            <button class="btn-q next" id="btnNext" onclick="nextQuestion()" ${!currentAnswer ? 'disabled' : ''}>
                                التالي <i class="bi bi-arrow-left"></i>
                            </button>
                        ` : `
                            <button class="btn-q next" id="btnNext" onclick="showResults()" ${!currentAnswer ? 'disabled' : ''}
                                    style="background:linear-gradient(135deg,#22c55e,#16a34a)">
                                🎯 شوف النتائج <i class="bi bi-arrow-left"></i>
                            </button>
                        `}
                    </div>
                </div>
            `;
        }

        function selectAnswer(deptId, qIdx, value) {
            state.answers[`${deptId}_q${qIdx}`] = value;
            renderQuestion();
        }

        function nextQuestion() {
            if (_navLocked) return;
            lockNav();
            const questions = getQuestionsList();
            if (state.currentQuestion < questions.length - 1) {
                state.currentQuestion++;
                renderQuestion();
            }
        }

        function prevQuestion() {
            if (_navLocked) return;
            lockNav();
            if (state.currentQuestion > 0) {
                state.currentQuestion--;
                renderQuestion();
            }
        }

        // ============================================================
        //  SCREEN 3: Results
        // ============================================================
        function calculateScores() {
            const scores = {};
            state.selectedDepts.forEach(deptId => {
                const dept = DEPARTMENTS.find(d => d.id === deptId);
                const qCount = dept.questions.length;
                let total = 0;
                for (let i = 0; i < qCount; i++) {
                    const val = state.answers[`${deptId}_q${i}`];
                    total += (typeof val === 'number') ? val : 0;
                }
                // Convert to percentage (max = qCount * 4)
                scores[deptId] = Math.round((total / (qCount * 4)) * 100);
            });
            return scores;
        }

        function getVerdict(score) {
            if (score >= 80) return { label: '🟢 ناضج — أداء ممتاز', color: '#22c55e', bg: 'rgba(34,197,94,0.06)', border: 'rgba(34,197,94,0.15)' };
            if (score >= 60) return { label: '🔵 جيد — يحتاج تعزيز', color: '#3b82f6', bg: 'rgba(59,130,246,0.06)', border: 'rgba(59,130,246,0.15)' };
            if (score >= 40) return { label: '🟡 نامٍ — يحتاج تطوير', color: '#f59e0b', bg: 'rgba(245,158,11,0.06)', border: 'rgba(245,158,11,0.15)' };
            return { label: '🔴 مبتدئ — يحتاج بناء أساسي', color: '#ef4444', bg: 'rgba(239,68,68,0.06)', border: 'rgba(239,68,68,0.15)' };
        }

        function showResults() {
            switchScreen(3);
            const scores = calculateScores();
            // Mark completion for dashboard tracking
            localStorage.setItem('internal_env_completed', 'true');
            const sorted = state.selectedDepts
                .map(id => ({ dept: DEPARTMENTS.find(d => d.id === id), score: scores[id] }))
                .sort((a, b) => a.score - b.score);

            const weakest = sorted[0];
            const strongest = sorted[sorted.length - 1];
            const avgScore = Math.round(sorted.reduce((s, d) => s + d.score, 0) / sorted.length);
            const prevScores = state.previousScores;

            let html = '';

            // Overall score
            const overallVerdict = getVerdict(avgScore);
            let overallTrend = '';
            if (prevScores) {
                const prevAvg = Math.round(
                    Object.values(prevScores).reduce((s, v) => s + v, 0) / Object.values(prevScores).length
                );
                const diff = avgScore - prevAvg;
                if (diff > 0) overallTrend = `<div style="font-size:13px;color:#22c55e;margin-top:6px">📈 تحسّن +${diff}% مقارنة بآخر تحليل</div>`;
                else if (diff < 0) overallTrend = `<div style="font-size:13px;color:#ef4444;margin-top:6px">📉 تراجع ${diff}% مقارنة بآخر تحليل</div>`;
                else overallTrend = `<div style="font-size:13px;color:#f59e0b;margin-top:6px">⏸️ نفس المستوى كآخر تحليل</div>`;
            }

            html += `
                <div style="text-align:center;margin-bottom:24px;padding:24px;background:${overallVerdict.bg};border:1px solid ${overallVerdict.border};border-radius:16px">
                    <div style="font-size:42px;font-weight:900;color:${overallVerdict.color}">${avgScore}%</div>
                    <div style="font-size:14px;font-weight:700;color:${overallVerdict.color};margin-top:4px">${overallVerdict.label}</div>
                    <div style="font-size:12px;color:var(--text-muted);margin-top:6px">المتوسط العام لصحة إداراتك</div>
                    ${overallTrend}
                </div>
            `;

            // ===== HISTORY COMPARISON (if previous data exists) =====
            if (prevScores) {
                html += `<div class="history-comparison"><h3>📊 مقارنة مع التحليل السابق</h3>`;
                state.selectedDepts.forEach(id => {
                    const dept = DEPARTMENTS.find(d => d.id === id);
                    const newScore = scores[id];
                    const oldScore = prevScores[id];

                    if (oldScore !== undefined) {
                        const diff = newScore - oldScore;
                        let diffHtml, arrowEmoji;
                        if (diff > 0) {
                            arrowEmoji = '📈';
                            diffHtml = `<span class="hr-diff" style="background:rgba(34,197,94,0.1);color:#22c55e">+${diff}%</span>`;
                        } else if (diff < 0) {
                            arrowEmoji = '📉';
                            diffHtml = `<span class="hr-diff" style="background:rgba(239,68,68,0.1);color:#ef4444">${diff}%</span>`;
                        } else {
                            arrowEmoji = '⏸️';
                            diffHtml = `<span class="hr-diff" style="background:rgba(245,158,11,0.1);color:#f59e0b">±0</span>`;
                        }
                        html += `
                            <div class="history-row">
                                <span class="hr-emoji">${dept.emoji}</span>
                                <span class="hr-name">${dept.nameAr}</span>
                                <span class="hr-old">${oldScore}%</span>
                                <span class="hr-arrow">${arrowEmoji}</span>
                                <span class="hr-new" style="color:${getVerdict(newScore).color}">${newScore}%</span>
                                ${diffHtml}
                            </div>
                        `;
                    } else {
                        html += `
                            <div class="history-row">
                                <span class="hr-emoji">${dept.emoji}</span>
                                <span class="hr-name">${dept.nameAr}</span>
                                <span class="hr-old">—</span>
                                <span class="hr-arrow">🆕</span>
                                <span class="hr-new" style="color:${getVerdict(scores[id]).color}">${scores[id]}%</span>
                                <span class="hr-diff" style="background:rgba(56,189,248,0.1);color:#38bdf8">جديد</span>
                            </div>
                        `;
                    }
                });
                html += `</div>`;
            }

            // Department results
            sorted.forEach(({ dept, score }) => {
                const v = getVerdict(score);
                const barColor = v.color;

                // Build answer chips
                let chipsHtml = '';
                const qCount = dept.questions.length;
                for (let i = 0; i < qCount; i++) {
                    const val = state.answers[`${dept.id}_q${i}`];
                    if (typeof val === 'number') {
                        const qData = dept.questions[i];
                        const opt = qData.opts.find(o => o.v === val);
                        const chipColors = { 1: '#ef4444', 2: '#f59e0b', 3: '#22c55e', 4: '#a78bfa' };
                        const cc = chipColors[val] || '#94a3b8';
                        const shortQ = qData.q.substring(0, 30) + '...';
                        chipsHtml += `<span class="result-answer-chip" style="background:${cc}12;color:${cc};border:1px solid ${cc}25">${opt ? opt.icon : ''} ${shortQ}</span>`;
                    }
                }

                // Previous score for this dept
                let deptTrendHtml = '';
                if (prevScores && prevScores[dept.id] !== undefined) {
                    const diff = score - prevScores[dept.id];
                    if (diff > 0) deptTrendHtml = `<span style="font-size:12px;color:#22c55e;font-weight:700">📈 +${diff}% من آخر مرة</span>`;
                    else if (diff < 0) deptTrendHtml = `<span style="font-size:12px;color:#ef4444;font-weight:700">📉 ${diff}% من آخر مرة</span>`;
                }

                html += `
                    <div class="result-card">
                        <div class="result-header">
                            <div class="result-emoji">${dept.emoji}</div>
                            <div style="flex:1">
                                <div class="result-name">${dept.nameAr}</div>
                                <div class="result-score-label">${dept.desc}</div>
                                ${deptTrendHtml}
                            </div>
                            <div style="font-size:24px;font-weight:900;color:${barColor}">${score}%</div>
                        </div>
                        <div class="result-bar-track">
                            <div class="result-bar-fill" style="width:${score}%;background:${barColor}"></div>
                        </div>
                        <div class="result-verdict" style="background:${v.bg};border:1px solid ${v.border};color:${v.color}">
                            ${v.label}
                        </div>
                        <div class="result-answers">${chipsHtml}</div>
                    </div>
                `;
            });

            // ===== SMART RECOMMENDATIONS =====
            const isMgr = window._isDeptManager;
            const singleDept = isMgr && sorted.length === 1;

            if (singleDept) {
                // ═══ مدير إدارة: توصيات مخصصة لإدارة واحدة ═══
                const dept = sorted[0].dept;
                const score = sorted[0].score;
                // Categorize answers by maturity level
                const criticalQs = []; // level 1 (🔴)
                const developingQs = []; // level 2 (🟡)
                const goodQs = []; // level 3 (🟢)
                const excellentQs = []; // level 4 (⭐)
                dept.questions.forEach((qData, i) => {
                    const val = state.answers[`${dept.id}_q${i}`];
                    const opt = qData.opts.find(o => o.v === val);
                    const item = { q: qData.q, answer: opt ? opt.t : '', level: val };
                    if (val === 1) criticalQs.push(item);
                    else if (val === 2) developingQs.push(item);
                    else if (val === 3) goodQs.push(item);
                    else if (val === 4) excellentQs.push(item);
                });

                html += `
                    <div class="smart-rec">
                        <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
                            <div style="width:42px;height:42px;border-radius:12px;background:rgba(139,92,246,0.15);display:flex;align-items:center;justify-content:center;font-size:20px">🤖</div>
                            <div>
                                <div style="font-size:16px;font-weight:800;color:var(--text)">التوصية الذكية — ${dept.nameAr}</div>
                                <div style="font-size:12px;color:var(--text-muted)">بناءً على نتائج تحليل إدارتك</div>
                            </div>
                        </div>

                        <!-- Maturity Breakdown -->
                        <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">
                            <div style="flex:1;min-width:60px;text-align:center;padding:10px 8px;border-radius:10px;background:rgba(239,68,68,0.06);border:1px solid rgba(239,68,68,0.15)">
                                <div style="font-size:20px;font-weight:900;color:#ef4444">${criticalQs.length}</div>
                                <div style="font-size:10px;color:#ef4444;font-weight:700">🔴 حرج</div>
                            </div>
                            <div style="flex:1;min-width:60px;text-align:center;padding:10px 8px;border-radius:10px;background:rgba(245,158,11,0.06);border:1px solid rgba(245,158,11,0.15)">
                                <div style="font-size:20px;font-weight:900;color:#f59e0b">${developingQs.length}</div>
                                <div style="font-size:10px;color:#f59e0b;font-weight:700">🟡 نامٍ</div>
                            </div>
                            <div style="flex:1;min-width:60px;text-align:center;padding:10px 8px;border-radius:10px;background:rgba(34,197,94,0.06);border:1px solid rgba(34,197,94,0.15)">
                                <div style="font-size:20px;font-weight:900;color:#22c55e">${goodQs.length}</div>
                                <div style="font-size:10px;color:#22c55e;font-weight:700">🟢 جيد</div>
                            </div>
                            <div style="flex:1;min-width:60px;text-align:center;padding:10px 8px;border-radius:10px;background:rgba(167,139,250,0.06);border:1px solid rgba(167,139,250,0.15)">
                                <div style="font-size:20px;font-weight:900;color:#a78bfa">${excellentQs.length}</div>
                                <div style="font-size:10px;color:#a78bfa;font-weight:700">⭐ ناضج</div>
                            </div>
                        </div>

                        <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:18px">
                `;

                if (criticalQs.length > 0) {
                    html += `
                        <div style="display:flex;align-items:flex-start;gap:10px;padding:12px 16px;background:rgba(239,68,68,0.04);border-radius:10px;border:1px solid rgba(239,68,68,0.12)">
                            <span style="font-size:18px">⚡</span>
                            <div>
                                <div style="font-size:13px;font-weight:700;color:#ef4444">🔴 ${criticalQs.length} نقطة حرجة — تحتاج تطوير عاجل</div>
                                <div style="font-size:12px;color:var(--text-muted);margin-top:4px">
                                    ${criticalQs.map(item => `• ${item.q.replace('؟', '')}`).join('<br>')}
                                </div>
                            </div>
                        </div>
                    `;
                }

                if (developingQs.length > 0) {
                    html += `
                        <div style="display:flex;align-items:flex-start;gap:10px;padding:12px 16px;background:rgba(245,158,11,0.04);border-radius:10px;border:1px solid rgba(245,158,11,0.12)">
                            <span style="font-size:18px">🟡</span>
                            <div>
                                <div style="font-size:13px;font-weight:700;color:#f59e0b">${developingQs.length} نقطة نامية — تحتاج تحسين</div>
                                <div style="font-size:12px;color:var(--text-muted);margin-top:4px">
                                    ${developingQs.map(item => `• ${item.q.replace('؟', '')}`).join('<br>')}
                                </div>
                            </div>
                        </div>
                    `;
                }

                if (score >= 80) {
                    html += `
                        <div style="display:flex;align-items:flex-start;gap:10px;padding:12px 16px;background:rgba(34,197,94,0.04);border-radius:10px;border:1px solid rgba(34,197,94,0.12)">
                            <span style="font-size:18px">🏆</span>
                            <div>
                                <div style="font-size:13px;font-weight:700;color:#22c55e">إدارتك بمستوى ناضج (${score}%)</div>
                                <div style="font-size:12px;color:var(--text-muted);margin-top:4px">أداء ممتاز! حافظ على هذا المستوى وركّز على التحسين المستمر.</div>
                            </div>
                        </div>
                    `;
                }

                html += `</div>`;

                // ═══ الخطوات القادمة — مسار المدير فقط ═══

        // ============================================================
        //  SAVE TO BACKEND (with History)
        // ============================================================
        async function saveAnalysis(scores) {
            if (!state.versionId) {
                try {
                    const resp = await fetch('/api/versions', {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    if (!resp.ok) throw new Error('HTTP ' + resp.status);
                    const vData = await resp.json();
                    const versions = Array.isArray(vData) ? vData : (vData.versions || []);
                    if (versions.length > 0 && versions[0]?.id) {
                        state.versionId = versions[0].id;
                        localStorage.setItem('selectedVersionId', state.versionId);
                    }
                } catch (e) { showToast('تعذّر تحميل الإصدارات — النتائج محفوظة محلياً فقط', 'warning'); return; }
            }

            if (!state.versionId) return;

            // Build history: keep old snapshots + add previous result
            let history = [];
            if (state.existingAnalysis) {
                history = state.existingAnalysis.history || [];
                // Push the previous result as a snapshot
                if (state.existingAnalysis.scores && state.existingAnalysis.completedAt) {
                    history.push({
                        date: state.existingAnalysis.completedAt,
                        departments: state.existingAnalysis.departments || [],
                        scores: state.existingAnalysis.scores
                    });
                }
                // Keep max 10 snapshots
                if (history.length > 10) history = history.slice(-10);
            }

            const analysisData = {
                departments: state.selectedDepts,
                scores,
                answers: state.answers,
                completedAt: new Date().toISOString(),
                history
            };

            const avgScore = Math.round(
                state.selectedDepts.reduce((s, id) => s + scores[id], 0) / state.selectedDepts.length
            );

            try {
                if (state.analysisId) {
                    // Update existing
                    await fetch(`/api/company-analysis/${state.analysisId}`, {
                        method: 'PATCH',
                        headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            data: JSON.stringify(analysisData),
                            status: 'COMPLETED',
                            progress: 100,
                            score: avgScore,
                            summary: `تحليل ${DEPARTMENTS.find(d => d.id === state.selectedDepts[0])?.nameAr || 'إدارة'} — النتيجة: ${avgScore}%`
                        })
                    });
                } else {
                    // Check if analysis exists (fallback)
                    const existing = await fetch(`/api/company-analysis/version/${state.versionId}/INTERNAL_ENV`, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    }).then(r => r.ok ? r.json() : null);

                    if (existing && existing.id) {
                        await fetch(`/api/company-analysis/${existing.id}`, {
                            method: 'PATCH',
                            headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                data: JSON.stringify(analysisData),
                                status: 'COMPLETED',
                                progress: 100,
                                score: avgScore,
                                summary: `تحليل ${DEPARTMENTS.find(d => d.id === state.selectedDepts[0])?.nameAr || 'إدارة'} — النتيجة: ${avgScore}%`
                            })
                        });
                    } else {
                        await fetch('/api/company-analysis', {
                            method: 'POST',
                            headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                versionId: state.versionId,
                                toolCode: 'INTERNAL_ENV',
                                data: JSON.stringify(analysisData),
                                status: 'COMPLETED',
                                progress: 100,
                                score: avgScore,
                                summary: `تحليل ${DEPARTMENTS.find(d => d.id === state.selectedDepts[0])?.nameAr || 'إدارة'} — النتيجة: ${avgScore}%`
                            })
                        });
                    }
                }
                console.log('✅ Analysis saved with history');
                showToast('تم حفظ التحليل بنجاح ✅', 'success');
            } catch (e) {
                console.error('Failed to save analysis:', e);
                showToast('تعذّر الحفظ في الخادم — النتائج محفوظة محلياً', 'warning');
            }
        }

        // ============================================================
        //  NAVIGATION
        // ============================================================
        function switchScreen(num) {
            document.querySelectorAll('.wizard-screen').forEach(s => s.classList.remove('active'));
            document.getElementById(`screen${num}`).classList.add('active');

            // Update steps (0-3)
            for (let i = 0; i <= 3; i++) {
                const el = document.getElementById(`wizStep${i}`);
                if (!el) continue;
                el.classList.remove('active', 'done');
                if (i < num) el.classList.add('done');
                if (i === num) el.classList.add('active');
            }
        }

        function resetWizard() {
            state.selectedDepts = [];
            state.currentQuestion = 0;
            state.answers = {};
            updateDeptUI();
            // If general assessment was completed, go to dept selection; else go to general
            if (state.generalCompleted) {
                switchScreen(1);
            } else {
                switchScreen(0);
            }
        }

                    document.querySelector('.hero h1').textContent = `🏢 تحليل ${deptName}`;
                    document.getElementById('heroDesc').innerHTML = `
                        حلل أداء <strong>${deptName}</strong> بعمق — أجب على الأسئلة وشوف النتائج والتوصيات الذكية.
                    `;

                    // إخفاء خطوة "اختر الإدارة" من الـ wizard
                    document.getElementById('wizStep1').style.display = 'none';
                    // إخفاء شاشة اختيار الإدارات
                    document.getElementById('screen1').style.display = 'none';

                    // تحديد الإدارة تلقائياً
                    state.selectedDepts = [urlDept];
                    window._isDeptManager = true;

                    // تخطي أسئلة الفحص العام → أسئلة الإدارة مباشرة
                    if (!state.generalCompleted) {
                        // تخطي الفحص العام تلقائياً
                        state.generalCompleted = true;
                        document.getElementById('screen0').classList.remove('active');
                        document.getElementById('wizStep0').classList.remove('active');
                        document.getElementById('wizStep0').classList.add('done');
                        document.getElementById('wizStep2').classList.add('active');
                    }

                    setTimeout(() => { startQuestions(); }, 300);
                }
            }

            // ═══ إذا ما جاء من URL → كشف مدير الإدارة بالطريقة العادية ═══
            if (!urlDept) {

                // ═══ ١) كشف الإدارة من كل المصادر المتاحة ═══
                const savedDept = localStorage.getItem('stratix_dept') || '';
                const diagDept = diagPayload.department || diagComplete.department || '';
                const userCat = user.userCategory || '';
                const diagRole = diagPayload.role || '';

                // ═══ ٢) هل المستخدم مدير إدارة؟ ═══
                const isDeptManager = user.userType === 'DEPT_MANAGER'
                    || userCat === 'DEPT_MANAGER';
                window._isDeptManager = isDeptManager;

                if (isDeptManager) {
                    // ربط DEPT_FINANCE → finance (من userCategory أو stratix_dept)
                    const DEPT_MAP = {
                        'DEPT_HR': 'hr', 'DEPT_FINANCE': 'finance', 'DEPT_MARKETING': 'marketing',
                        'DEPT_OPS': 'operations', 'DEPT_SERVICE': 'cs', 'DEPT_SALES': 'sales',
                        'DEPT_IT': 'it', 'DEPT_LEGAL': 'quality', 'DEPT_RND': 'projects',
                        'DEPT_PROCUREMENT': 'operations', 'DEPT_QUALITY': 'quality', 'DEPT_PMO': 'projects'
                    };

                    // ربط أسماء الإدارات من V10 → department IDs
                    const V10_DEPT_MAP = {
                        'finance': 'finance', 'hr': 'hr', 'marketing': 'marketing',
                        'sales': 'sales', 'it': 'it', 'operations': 'operations',
                        'cs': 'cs', 'quality': 'quality', 'projects': 'projects',
                        'legal': 'quality', 'procurement': 'operations', 'rnd': 'projects',
                        'المالية': 'finance', 'الموارد البشرية': 'hr', 'التسويق': 'marketing',
                        'المبيعات': 'sales', 'تقنية المعلومات': 'it', 'العمليات': 'operations',
                        'خدمة العملاء': 'cs', 'الجودة': 'quality', 'المشاريع': 'projects'
                    };

                    // ═══ ٣) محاولة الكشف بالترتيب: stratix_dept → diagnostic → userCategory ═══
                    let mappedDept = null;
                    if (savedDept && DEPT_MAP[savedDept]) {
                        mappedDept = DEPT_MAP[savedDept];
                    } else if (diagDept && V10_DEPT_MAP[diagDept.toLowerCase()]) {
                        mappedDept = V10_DEPT_MAP[diagDept.toLowerCase()];
                        // حفظ للمرة القادمة
                        const reverseMap = {
                            'finance': 'DEPT_FINANCE', 'hr': 'DEPT_HR', 'marketing': 'DEPT_MARKETING',
                            'sales': 'DEPT_SALES', 'it': 'DEPT_IT', 'operations': 'DEPT_OPS',
                            'cs': 'DEPT_SERVICE', 'quality': 'DEPT_QUALITY', 'projects': 'DEPT_PMO'
                        };
                        if (reverseMap[mappedDept]) localStorage.setItem('stratix_dept', reverseMap[mappedDept]);
                    } else if (userCat && DEPT_MAP[userCat]) {
                        mappedDept = DEPT_MAP[userCat];
                    }

                    const deptObj = mappedDept ? DEPARTMENTS.find(d => d.id === mappedDept) : null;
                    const deptName = deptObj ? deptObj.nameAr : 'إدارتك';

                    console.log('[Internal-Env] 🎯 Manager dept detection:', { savedDept, diagDept, userCat, mappedDept, deptName });

                    // تحديث العنوان والوصف ليناسب مدير إدارة واحدة
                    document.querySelector('.hero h1').textContent = `🏢 تحليل ${deptName}`;
                    document.getElementById('heroDesc').innerHTML = `
                    حلل أداء <strong>${deptName}</strong> بعمق — أجب على ٤ أسئلة وشوف النتائج والتوصيات الذكية.
                `;

                    if (mappedDept) {
                        // اختيار الإدارة تلقائياً
                        state.selectedDepts = [mappedDept];

                        // إخفاء شاشة الاختيار وتشغيل الأسئلة مباشرة
                        document.getElementById('screen1').style.display = 'none';
                        // تأخير بسيط عشان الـ rendering يخلص
                        setTimeout(() => {
                            startQuestions();
                        }, 300);
                    }
                }
            } // end if (!urlDept)

            // Try to load existing analysis
            if (!state.versionId) {
                try {
                    const vData = await fetch('/api/versions', {
                        headers: { 'Authorization': `Bearer ${token}` }
                    }).then(r => r.json());
                    const versions = vData.versions || vData || [];
                    if (versions.length > 0) {
                        state.versionId = versions[0].id;
                        localStorage.setItem('selectedVersionId', state.versionId);
                    }
                } catch (e) { console.warn('No versions'); }
            }

            if (state.versionId) {
                try {
                    const existing = await fetch(`/api/company-analysis/version/${state.versionId}/INTERNAL_ENV`, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    }).then(r => r.ok ? r.json() : null);

                    if (existing && existing.id) {
                        state.analysisId = existing.id;

                        // Parse data
                        let data = existing.data;
                        if (typeof data === 'string') {
                            try { data = JSON.parse(data); } catch (e) { data = null; }
                        }

                        if (data && data.completedAt) {
                            state.existingAnalysis = data;
                            state.previousScores = data.scores || null;

                            // Show reminder banner
                            showReminderBanner(data);

                            // Update hero description
                            if (!isDeptManager) {
                                document.getElementById('heroDesc').innerHTML = `
                                    لديك تحليل سابق. يمكنك <strong>إعادة التحليل</strong> لنفس الإدارات أو إدارات مختلفة — وسنعرض لك <span style="color:var(--teal)">المقارنة مع آخر تحليل تلقائياً</span>.
                                `;
                            }
                        }
                    }
                } catch (e) {
                    console.warn('Could not check existing analysis:', e);
                }
            }
        }

        init();
    </script>
    <script src="/assets/js/path-tracker.js"></script>

    <!-- ═══ رابط لوحة التحليلات التنبؤية ═══ -->

        <a href="/analytics-dashboard.html" style="display:inline-flex;align-items:center;gap:10px;padding:14px 32px;
                  border-radius:14px;border:1px solid rgba(99,102,241,0.3);
                  background:linear-gradient(135deg,rgba(99,102,241,0.15),rgba(99,102,241,0.05));
                  color:#818cf8;text-decoration:none;font-family:Tajawal,sans-serif;
                  font-size:1rem;font-weight:700;transition:all 0.3s">
            <i class="bi bi-graph-up-arrow"></i>
            🧠 الانتقال إلى لوحة التحليلات التنبؤية
        </a>
    </div>
</body>
