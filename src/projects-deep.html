<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <title>ستارتكس | التحليل الرقمي - المشاريع</title>
    <link rel="stylesheet" href="/css/dept-pages.css">
    <script src="/js/context-manager.js"></script>
    <script src="/js/dept-page.js"></script>
</head>

<body>
    <div class="container">
        <h1>📊 التحليل الرقمي – المشاريع</h1>
        <div class="sub">أدخل الأرقام والمؤشرات الرئيسية لقسم إدارة المشاريع</div>
        <form id="deepForm">
            <div class="question"><label>عدد المشاريع النشطة حالياً</label><input type="number" name="active_projects"
                    placeholder="مثال: 12" required></div>
            <div class="question"><label>نسبة التسليم في الوقت المحدد (%)</label><input type="number"
                    name="on_time_rate" placeholder="مثال: 85" required></div>
            <div class="question"><label>نسبة الالتزام بميزانية المشاريع (%)</label><input type="number"
                    name="on_budget_rate" placeholder="مثال: 90" required></div>
            <div class="question"><label>رضا أصحاب المصلحة عن المشاريع (%)</label><input type="number"
                    name="stakeholder_satisfaction" placeholder="مثال: 80" required></div>
            <div class="question"><label>استغلال موارد الفريق (%)</label><input type="number"
                    name="resource_utilization" placeholder="مثال: 78" required></div>
            <button type="submit">حفظ ومتابعة للتقييم الوصفي</button>
        </form>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const ok = await DeptPage.init('projects');
            if (!ok) return;
            let saved = await DeptPage.loadFromAPI('DEEP') || Context.getTemp('deep_results') || DeptPage.migrateFromLocalStorage('stratix_projects_deep_results');
            DeptPage.fillForm(saved);
            document.getElementById('deepForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const results = Object.fromEntries(new FormData(e.target));
                Context.setTemp('deep_results', results);
                const ok = await DeptPage.saveToAPI('DEEP', results);
                DeptPage.showMessage(ok ? 'تم حفظ التحليل الرقمي بنجاح' : 'تم حفظ التحليل محلياً', !ok);
                setTimeout(() => window.location.href = `/projects-audit.html?dept=projects`, 1500);
            });
        });
    </script>
</body>

</html>
