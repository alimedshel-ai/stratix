<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ستارتكس - DNA المنظمة</title>
    <meta name="description" content="الحمض النووي التنظيمي — ملف شخصي شامل للمنظمة">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #0a0b10;
            --bg2: #12141f;
            --card: #171a2a;
            --card-hover: #1e2236;
            --text: #e2e8f0;
            --muted: #7a8599;
            --border: rgba(255, 255, 255, 0.06);
            --primary: #667eea;
            --secondary: #764ba2;
            --green: #22c55e;
            --yellow: #facc15;
            --red: #ef4444;
            --blue: #38bdf8;
            --purple: #a78bfa;
            --orange: #f97316;
            --pink: #ec4899;
            --teal: #14b8a6
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        body {
            background: var(--bg);
            font-family: 'Tajawal', sans-serif;
            color: var(--text);
            min-height: 100vh
        }

        .page-wrapper {
            display: flex;
            min-height: 100vh
        }

        .main-content {
            flex: 1;
            min-width: 0;
            padding: 28px 32px
        }

        .dna-header {
            text-align: center;
            padding: 20px 0 30px;
            margin-bottom: 24px;
            position: relative
        }

        .dna-header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 10%;
            right: 10%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--border), transparent)
        }

        .dna-title {
            font-size: 32px;
            font-weight: 900
        }

        .dna-title span {
            background: linear-gradient(135deg, var(--teal), var(--blue), var(--purple));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent
        }

        .dna-subtitle {
            font-size: 14px;
            color: var(--muted);
            margin-top: 6px
        }

        .dna-helix {
            font-size: 48px;
            display: block;
            margin-bottom: 8px;
            animation: spin 8s linear infinite
        }

        @keyframes spin {
            0% {
                transform: rotateY(0)
            }

            100% {
                transform: rotateY(360deg)
            }
        }

        /* Radar Chart */
        .dna-radar-wrap {
            display: flex;
            justify-content: center;
            margin-bottom: 32px
        }

        .radar-container {
            width: 100%;
            max-width: 500px;
            aspect-ratio: 1;
            position: relative
        }

        .radar-svg {
            width: 100%;
            height: 100%
        }

        .radar-ring {
            fill: none;
            stroke: var(--border);
            stroke-width: 1
        }

        .radar-axis {
            stroke: var(--border);
            stroke-width: 0.5
        }

        .radar-polygon {
            fill: rgba(102, 126, 234, 0.15);
            stroke: var(--primary);
            stroke-width: 2;
            transition: all 0.5s
        }

        .radar-polygon:hover {
            fill: rgba(102, 126, 234, 0.25)
        }

        .radar-dot {
            fill: var(--primary);
            stroke: white;
            stroke-width: 2;
            r: 5;
            transition: all 0.3s;
            cursor: pointer
        }

        .radar-dot:hover {
            r: 8;
            fill: var(--secondary)
        }

        .radar-label {
            fill: var(--muted);
            font-size: 12px;
            font-weight: 700;
            text-anchor: middle;
            dominant-baseline: middle
        }

        /* Dimension Cards */
        .dna-dims {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 14px;
            margin-bottom: 28px
        }

        .dna-dim {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 18px;
            transition: all 0.3s;
            cursor: pointer;
            position: relative;
            overflow: hidden
        }

        .dna-dim:hover {
            transform: translateY(-3px);
            border-color: rgba(255, 255, 255, 0.1);
            box-shadow: 0 6px 24px rgba(0, 0, 0, 0.3)
        }

        .dna-dim::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px
        }

        .dna-dim-icon {
            font-size: 24px;
            margin-bottom: 8px
        }

        .dna-dim-name {
            font-size: 14px;
            font-weight: 800;
            margin-bottom: 4px
        }

        .dna-dim-score {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px
        }

        .dna-dim-num {
            font-size: 22px;
            font-weight: 900
        }

        .dna-dim-bar {
            flex: 1;
            height: 6px;
            border-radius: 3px;
            background: rgba(255, 255, 255, 0.06);
            overflow: hidden
        }

        .dna-dim-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 1s ease
        }

        .dna-dim-desc {
            font-size: 11px;
            color: var(--muted);
            line-height: 1.6
        }

        .dna-dim-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-top: 8px
        }

        .dna-dim-tag {
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 9px;
            font-weight: 600
        }

        /* Profile Summary */
        .dna-profile {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 28px
        }

        .dna-profile-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 22px
        }

        .dna-profile-title {
            font-size: 15px;
            font-weight: 800;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px
        }

        .dna-trait {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 0;
            border-bottom: 1px solid var(--border)
        }

        .dna-trait:last-child {
            border-bottom: none
        }

        .dna-trait-icon {
            font-size: 18px;
            width: 24px;
            text-align: center
        }

        .dna-trait-name {
            flex: 1;
            font-size: 13px;
            font-weight: 600
        }

        .dna-trait-val {
            font-size: 13px;
            font-weight: 700;
            color: var(--primary)
        }

        .dna-archetype {
            text-align: center;
            padding: 20px
        }

        .dna-arch-icon {
            font-size: 64px;
            margin-bottom: 12px;
            display: block
        }

        .dna-arch-name {
            font-size: 20px;
            font-weight: 900;
            margin-bottom: 4px
        }

        .dna-arch-name span {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent
        }

        .dna-arch-desc {
            font-size: 13px;
            color: var(--muted);
            line-height: 1.8
        }

        /* Insights */
        .dna-insights {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 22px
        }

        .dna-insights-title {
            font-size: 16px;
            font-weight: 800;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px
        }

        .dna-insight {
            display: flex;
            gap: 12px;
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.02)
        }

        .dna-insight-icon {
            font-size: 20px;
            flex-shrink: 0
        }

        .dna-insight h4 {
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 2px
        }

        .dna-insight p {
            font-size: 12px;
            color: var(--muted);
            line-height: 1.6
        }

        @media(max-width:768px) {
            .main-content {
                padding: 16px
            }

            .dna-profile {
                grid-template-columns: 1fr
            }

            .radar-container {
                max-width: 320px
            }
        }
    </style>
</head>

<body>
    <div class="page-wrapper">
        <div id="sidebar-container"></div>
        <div class="main-content">
            <div class="dna-header">
                <span class="dna-helix">🧬</span>
                <h1 class="dna-title">DNA <span>المنظمة</span></h1>
                <div class="dna-subtitle">الحمض النووي التنظيمي — ملف شخصي شامل يعكس هوية المنظمة وقدراتها</div>
            </div>

            <!-- Radar Chart -->
            <div class="dna-radar-wrap">
                <div class="radar-container">
                    <svg class="radar-svg" id="radarChart" viewBox="0 0 500 500"></svg>
                </div>
            </div>

            <!-- Dimension Cards -->
            <div class="dna-dims" id="dnaDims"></div>

            <!-- Profile -->
            <div class="dna-profile">
                <div class="dna-profile-card">
                    <div class="dna-profile-title"><i class="bi bi-fingerprint" style="color:var(--teal)"></i> السمات
                        الأساسية</div>
                    <div id="dnaTraits"></div>
                </div>
                <div class="dna-profile-card">
                    <div class="dna-profile-title"><i class="bi bi-stars" style="color:var(--yellow)"></i> النمط
                        التنظيمي</div>
                    <div class="dna-archetype" id="dnaArchetype"></div>
                </div>
            </div>

            <!-- Insights -->
            <div class="dna-insights">
                <div class="dna-insights-title"><i class="bi bi-lightbulb" style="color:var(--yellow)"></i> رؤى وتوصيات
                </div>
                <div id="dnaInsights"></div>
            </div>
        </div>
    </div>

    <script src="/js/api.js?v=4"></script>
    <script src="/js/steps-config.js?v=4"></script>
    <script src="/js/sidebar.js?v=4"></script>
    <script src="/js/ai-advisor.js?v=4"></script>
    <script src="/js/achievements.js?v=4"></script>
    <script src="/js/notifications.js?v=4"></script>
    <script>
        // === DNA Dimensions ===
        const dimensions = [
            { name: 'الابتكار', icon: '💡', score: 72, prevScore: 65, color: '#667eea', desc: 'القدرة على توليد أفكار جديدة وتبني التكنولوجيا', tags: ['تفكير إبداعي', 'R&D', 'تبني التقنية'], strengths: ['ثقافة تجريب نشطة', 'ميزانية بحث مخصصة'], gaps: ['بطء في التنفيذ'] },
            { name: 'المرونة', icon: '🔄', score: 68, prevScore: 62, color: '#22c55e', desc: 'سرعة التكيف مع المتغيرات والاستجابة للتحولات', tags: ['agile', 'استجابة سريعة', 'تكيف'], strengths: ['فرق صغيرة مرنة'], gaps: ['بيروقراطية في القرارات الكبيرة'] },
            { name: 'التميز التشغيلي', icon: '⚙️', score: 78, prevScore: 75, color: '#f97316', desc: 'كفاءة العمليات والإنتاجية وجودة الخدمات', tags: ['عمليات', 'جودة', 'كفاءة'], strengths: ['أتمتة 60% من العمليات', 'معايير جودة عالية'], gaps: ['تحديث البنية التحتية'] },
            { name: 'التركيز على العميل', icon: '❤️', score: 82, prevScore: 70, color: '#ec4899', desc: 'فهم العملاء والاستجابة لاحتياجاتهم', tags: ['NPS', 'رضا', 'تجربة'], strengths: ['NPS = 82', 'برنامج صوت العميل'], gaps: ['تخصيص التجربة حسب القطاع'] },
            { name: 'رأس المال البشري', icon: '👨‍💼', score: 65, prevScore: 68, color: '#8b5cf6', desc: 'جودة الفريق والتطوير والاحتفاظ بالمواهب', tags: ['تدريب', 'احتفاظ', 'ثقافة'], strengths: ['برامج تدريب متنوعة'], gaps: ['معدل دوران 18%', 'نقص كوادر متخصصة'] },
            { name: 'الرؤية الاستراتيجية', icon: '🔭', score: 85, prevScore: 80, color: '#14b8a6', desc: 'وضوح الرؤية والتوجه الاستراتيجي طويل المدى', tags: ['رؤية', 'تخطيط', 'أهداف'], strengths: ['رؤية واضحة لـ 5 سنوات', 'alignment عالي'], gaps: ['ترجمة الرؤية لمبادرات تنفيذية'] },
            { name: 'القيادة', icon: '👑', score: 76, prevScore: 74, color: '#facc15', desc: 'قوة القيادة وصنع القرار والتواصل', tags: ['قرارات', 'تفويض', 'تواصل'], strengths: ['قيادة ملهمة', 'شفافية عالية'], gaps: ['بطء في القرارات الاستراتيجية'] },
            { name: 'الثقافة المؤسسية', icon: '🏛️', score: 71, prevScore: 69, color: '#38bdf8', desc: 'قوة القيم المشتركة والثقافة الداخلية', tags: ['قيم', 'انتماء', 'تنوع'], strengths: ['قيم واضحة ومعلنة', 'بيئة عمل إيجابية'], gaps: ['توحيد الثقافة عبر الفروع'] },
        ];

        // === Radar Chart (SVG) ===
        function renderRadar() {
            const svg = document.getElementById('radarChart');
            const cx = 250, cy = 250, maxR = 180;
            const n = dimensions.length;
            let html = '';

            // Rings
            for (let r = 1; r <= 5; r++) {
                const radius = (r / 5) * maxR;
                let points = '';
                for (let i = 0; i < n; i++) {
                    const angle = (Math.PI * 2 * i / n) - Math.PI / 2;
                    points += `${cx + radius * Math.cos(angle)},${cy + radius * Math.sin(angle)} `;
                }
                html += `<polygon points="${points}" class="radar-ring"/>`;
            }

            // Axes
            for (let i = 0; i < n; i++) {
                const angle = (Math.PI * 2 * i / n) - Math.PI / 2;
                const x2 = cx + maxR * Math.cos(angle);
                const y2 = cy + maxR * Math.sin(angle);
                html += `<line x1="${cx}" y1="${cy}" x2="${x2}" y2="${y2}" class="radar-axis"/>`;
            }

            // Data polygon
            let dataPoints = '';
            const dots = [];
            for (let i = 0; i < n; i++) {
                const angle = (Math.PI * 2 * i / n) - Math.PI / 2;
                const r = (dimensions[i].score / 100) * maxR;
                const x = cx + r * Math.cos(angle);
                const y = cy + r * Math.sin(angle);
                dataPoints += `${x},${y} `;
                dots.push({ x, y, dim: dimensions[i] });
            }
            html += `<polygon points="${dataPoints}" class="radar-polygon"/>`;

            // Dots
            dots.forEach(d => {
                html += `<circle cx="${d.x}" cy="${d.y}" class="radar-dot"><title>${d.dim.name}: ${d.dim.score}%</title></circle>`;
            });

            // Labels
            for (let i = 0; i < n; i++) {
                const angle = (Math.PI * 2 * i / n) - Math.PI / 2;
                const lR = maxR + 28;
                const x = cx + lR * Math.cos(angle);
                const y = cy + lR * Math.sin(angle);
                html += `<text x="${x}" y="${y}" class="radar-label">${dimensions[i].icon} ${dimensions[i].name}</text>`;
            }

            svg.innerHTML = html;
        }

        // === Dimension Cards ===
        function renderDimensions() {
            document.getElementById('dnaDims').innerHTML = dimensions.map(d => {
                const change = d.score - d.prevScore;
                const changeColor = change > 0 ? 'var(--green)' : change < 0 ? 'var(--red)' : 'var(--muted)';
                const changeIcon = change > 0 ? '↑' : change < 0 ? '↓' : '→';
                return `
        <div class="dna-dim">
          <div style="position:absolute;top:0;left:0;right:0;height:3px;background:${d.color}"></div>
          <div class="dna-dim-icon">${d.icon}</div>
          <div class="dna-dim-name">${d.name}</div>
          <div class="dna-dim-score">
            <div class="dna-dim-num" style="color:${d.color}">${d.score}%</div>
            <div style="font-size:11px;font-weight:700;color:${changeColor}">${changeIcon} ${Math.abs(change)}</div>
            <div class="dna-dim-bar"><div class="dna-dim-fill" style="width:${d.score}%;background:${d.color}"></div></div>
          </div>
          <div class="dna-dim-desc">${d.desc}</div>
          <div style="margin-top:6px;font-size:10px">
            <div style="color:var(--green);margin-bottom:2px">✅ ${d.strengths.join('، ')}</div>
            ${d.gaps.length ? `<div style="color:var(--red)">⚠️ ${d.gaps.join('، ')}</div>` : ''}
          </div>
          <div class="dna-dim-tags">${d.tags.map(t => `<span class="dna-dim-tag" style="background:${d.color}15;color:${d.color}">${t}</span>`).join('')}</div>
        </div>
      `;
            }).join('');
        }

        // === Traits ===
        function renderTraits() {
            const traits = [
                { icon: '🏢', name: 'الحجم', val: 'متوسطة (250 موظف)' },
                { icon: '🏭', name: 'القطاع', val: 'خدمات تقنية' },
                { icon: '📅', name: 'العمر', val: '12 سنة' },
                { icon: '🌍', name: 'النطاق', val: 'إقليمي (3 دول)' },
                { icon: '📈', name: 'مرحلة النمو', val: 'توسع' },
                { icon: '🎓', name: 'المدرسة الاستراتيجية', val: 'BSC + OKR' },
                { icon: '🌡️', name: 'الصحة العامة', val: '74/100' },
            ];
            document.getElementById('dnaTraits').innerHTML = traits.map(t => `
        <div class="dna-trait"><div class="dna-trait-icon">${t.icon}</div><div class="dna-trait-name">${t.name}</div><div class="dna-trait-val">${t.val}</div></div>
      `).join('');
        }

        // === Archetype ===
        function renderArchetype() {
            const avgScore = Math.round(dimensions.reduce((s, d) => s + d.score, 0) / dimensions.length);
            const top = [...dimensions].sort((a, b) => b.score - a.score).slice(0, 3);
            let archetype, desc, icon;

            if (top[0].name === 'الرؤية الاستراتيجية') { archetype = 'القائد الحالم'; icon = '🔭'; desc = 'منظمة تقودها رؤية طموحة واضحة. قوتها في التخطيط الاستراتيجي والتوجه طويل المدى.'; }
            else if (top[0].name === 'التركيز على العميل') { archetype = 'بطل العميل'; icon = '❤️'; desc = 'منظمة تتمحور حول العميل. كل قرار يُقاس بأثره على تجربة العميل ورضاه.'; }
            else if (top[0].name === 'الابتكار') { archetype = 'المبتكر الرائد'; icon = '💡'; desc = 'منظمة تقود السوق بالابتكار. تستثمر بكثافة في البحث والتجريب.'; }
            else { archetype = 'المتوازن المتميز'; icon = '⚖️'; desc = 'منظمة متوازنة في قدراتها مع تميز في عدة محاور.'; }

            document.getElementById('dnaArchetype').innerHTML = `
        <span class="dna-arch-icon">${icon}</span>
        <div class="dna-arch-name"><span>${archetype}</span></div>
        <div style="font-size:13px;color:var(--primary);font-weight:700;margin-bottom:8px">متوسط DNA: ${avgScore}%</div>
        <div class="dna-arch-desc">${desc}</div>
        <div style="margin-top:12px;font-size:12px;color:var(--muted)">
          <strong>أبرز 3 قدرات:</strong> ${top.map(d => `${d.icon} ${d.name}`).join(' • ')}
        </div>
      `;
        }

        // === Insights ===
        function renderInsights() {
            const sorted = [...dimensions].sort((a, b) => a.score - b.score);
            const weakest = sorted[0];
            const strongest = sorted[sorted.length - 1];

            const insights = [
                { icon: '💪', title: `قوة بارزة: ${strongest.name} (${strongest.score}%)`, desc: `${strongest.strengths.join('، ')}. استثمر هذه القوة كميزة تنافسية.` },
                { icon: '⚠️', title: `فجوة تحتاج تدخل: ${weakest.name} (${weakest.score}%)`, desc: `${weakest.gaps.join('، ')}. أولوية عالية في الخطة القادمة.` },
                { icon: '🔗', title: 'فرصة ربط: الابتكار × التركيز على العميل', desc: 'الجمع بين الابتكار العالي ورؤى العملاء يمكن أن يولّد منتجات رائدة.' },
                { icon: '📊', title: 'مقارنة بالقطاع', desc: `متوسط DNA (${Math.round(dimensions.reduce((s, d) => s + d.score, 0) / dimensions.length)}%) أعلى من المتوسط القطاعي (65%) بـ ${Math.round(dimensions.reduce((s, d) => s + d.score, 0) / dimensions.length) - 65} نقطة.` },
            ];

            document.getElementById('dnaInsights').innerHTML = insights.map(i => `
        <div class="dna-insight">
          <div class="dna-insight-icon">${i.icon}</div>
          <div><h4>${i.title}</h4><p>${i.desc}</p></div>
        </div>
      `).join('');
        }

        // Init
        renderRadar();
        renderDimensions();
        renderTraits();
        renderArchetype();
        renderInsights();
    </script>
</body>

</html>
