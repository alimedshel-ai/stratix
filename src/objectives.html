<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ستارتكس | الأهداف الاستراتيجية (BSC)</title>
    <!-- Frameworks -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap"
        rel="stylesheet">

    <!-- Custom Styles -->
    <link rel="stylesheet" href="/css/shared.css">
    <link rel="stylesheet" href="/css/dept-pages.css">

    <style>
        :root {
            --stx-bg: #0b0d12;
            --stx-card: rgba(22, 27, 34, 0.7);
            --stx-border: rgba(255, 255, 255, 0.08);
            --stx-primary: #818cf8;
            --stx-fin: #22c55e;
            --stx-cust: #3b82f6;
            --stx-int: #f59e0b;
            --stx-learn: #8b5cf6;
        }

        body {
            background-color: var(--stx-bg);
            color: #f8fafc;
            font-family: 'Tajawal', sans-serif;
            overflow: hidden;
        }

        .stx-wrapper {
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .stx-sidebar-container {
            width: 260px;
            flex-shrink: 0;
            border-left: 1px solid var(--stx-border);
        }

        .stx-main-content {
            flex: 1;
            overflow-y: auto;
            height: 100vh;
        }

        /* Header */
        .stx-header {
            background: rgba(11, 13, 18, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--stx-border);
            padding: 16px 32px;
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Perspective Tabs */
        .perspective-tabs {
            display: flex;
            gap: 12px;
            padding: 24px 32px 0;
            max-width: 1400px;
            margin: 0 auto;
        }

        .p-tab {
            background: var(--stx-card);
            border: 1px solid var(--stx-border);
            border-radius: 16px;
            padding: 12px 24px;
            color: #94a3b8;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
            flex-wrap: nowrap;
        }

        .p-tab.active {
            background: var(--stx-primary);
            color: white;
            border-color: transparent;
            box-shadow: 0 8px 16px rgba(129, 140, 248, 0.3);
        }

        .stat-badge {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 2px 10px;
            font-size: 0.75rem;
        }

        /* Objective Grid */
        .obj-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 24px;
            padding: 24px 32px 120px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .obj-card {
            background: var(--stx-card);
            border: 1px solid var(--stx-border);
            border-radius: 24px;
            padding: 24px;
            position: relative;
            overflow: hidden;
            transition: all 0.4s;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .obj-card:hover {
            transform: translateY(-5px);
            border-color: var(--stx-primary);
        }

        .obj-tag {
            font-size: 0.75rem;
            font-weight: 800;
            padding: 4px 12px;
            border-radius: 20px;
            width: fit-content;
        }

        .tag-fin {
            background: rgba(34, 197, 94, 0.1);
            color: var(--stx-fin);
        }

        .tag-cust {
            background: rgba(59, 130, 246, 0.1);
            color: var(--stx-cust);
        }

        .tag-int {
            background: rgba(245, 158, 11, 0.1);
            color: var(--stx-int);
        }

        .tag-learn {
            background: rgba(139, 92, 246, 0.1);
            color: var(--stx-learn);
        }

        .obj-title {
            font-size: 1.1rem;
            font-weight: 800;
            margin: 0;
            line-height: 1.4;
            color: #f1f5f9;
        }

        .obj-desc {
            font-size: 0.88rem;
            color: #94a3b8;
            line-height: 1.5;
            margin: 0;
        }

        .obj-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 16px;
            border-top: 1px solid var(--stx-border);
        }

        .weight-pill {
            background: rgba(129, 140, 248, 0.1);
            color: var(--stx-primary);
            font-size: 0.8rem;
            font-weight: 700;
            padding: 4px 12px;
            border-radius: 20px;
        }

        /* Add Button */
        .btn-stx-outline {
            background: transparent;
            border: 1px solid var(--stx-border);
            color: #94a3b8;
            padding: 10px 24px;
            border-radius: 14px;
            font-weight: 700;
            transition: 0.3s;
        }

        .btn-stx-outline:hover {
            background: rgba(255, 255, 255, 0.05);
            color: white;
            border-color: white;
        }

        .btn-stx-primary {
            background: var(--stx-primary);
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 14px;
            font-weight: 800;
            box-shadow: 0 4px 12px rgba(129, 140, 248, 0.2);
            transition: 0.3s;
        }

        .btn-stx-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(129, 140, 248, 0.4);
        }

        /* Action Bar */
        .action-bar {
            position: fixed;
            bottom: 0;
            right: 260px;
            left: 0;
            background: rgba(11, 13, 18, 0.9);
            backdrop-filter: blur(15px);
            border-top: 1px solid var(--stx-border);
            padding: 20px 48px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1100;
        }

        @media (max-width: 992px) {
            .perspective-tabs {
                flex-wrap: wrap;
            }

            .obj-grid {
                grid-template-columns: 1fr;
            }

            .action-bar {
                right: 0;
            }
        }
    </style>
</head>

<body>
    <div class="stx-wrapper">
        <aside class="stx-sidebar-container"></aside>

        <main class="stx-main-content">
            <!-- Header -->
            <header class="stx-header">
                <div class="d-flex align-items-center gap-3">
                    <div class="step-hub-icon"
                        style="width:38px; height:38px; border-radius:50%; background:var(--stx-primary); display:flex; align-items:center; justify-content:center; color:white; font-size:1.1rem;">
                        <i class="bi bi-bullseye"></i></div>
                    <div>
                        <h1 class="h5 fw-bold m-0">الأهداف الاستراتيجية (Balanced Scorecard)</h1>
                        <p class="small text-muted m-0" id="dept-context">جاري التحميل...</p>
                    </div>
                </div>
                <div>
                    <button class="btn-stx-primary" onclick="prepareCreateModal()">
                        <i class="bi bi-plus-lg me-1"></i> إضافة هدف جديد
                    </button>
                </div>
            </header>

            <!-- Perspective Tabs -->
            <div class="perspective-tabs">
                <div class="p-tab active" data-type="all" onclick="filterPerspective('all', this)">
                    <i class="bi bi-grid"></i> الكل <span class="stat-badge" id="countAll">0</span>
                </div>
                <div class="p-tab" data-type="financial" onclick="filterPerspective('financial', this)">
                    <i class="bi bi-cash-stack"></i> المالي <span class="stat-badge" id="countFinancial">0</span>
                </div>
                <div class="p-tab" data-type="customer" onclick="filterPerspective('customer', this)">
                    <i class="bi bi-people"></i> العملاء <span class="stat-badge" id="countCustomer">0</span>
                </div>
                <div class="p-tab" data-type="internal" onclick="filterPerspective('internal', this)">
                    <i class="bi bi-gear"></i> العمليات <span class="stat-badge" id="countInternal">0</span>
                </div>
                <div class="p-tab" data-type="learning" onclick="filterPerspective('learning', this)">
                    <i class="bi bi-lightbulb"></i> التعلم والنمو <span class="stat-badge" id="countLearning">0</span>
                </div>
            </div>

            <!-- Grid -->
            <div class="obj-grid" id="objContainer">
                <div class="text-center w-100 p-5 opacity-50" id="emptyState">
                    <i class="bi bi-inbox h1 d-block mb-3"></i>
                    <p>لا توجد أهداف مضافة حالياً. ابدأ بإضافة هدف جديد لبناء بطاقة الأداء المتوازن.</p>
                </div>
            </div>

            <!-- Footer -->
            <div class="action-bar">
                <button type="button" onclick="history.back()"
                    class="btn btn-link text-muted text-decoration-none fw-bold">
                    <i class="bi bi-arrow-right me-2"></i> العودة لصياغة الهوية
                </button>
                <div class="d-flex align-items-center gap-4">
                    <div class="text-end d-none d-lg-block">
                        <div class="small text-muted">المرحلة الثالثة: التنفيذ</div>
                        <div class="fw-bold text-info">صياغة الـ OKRs والخطوات العملية <i class="bi bi-arrow-left"></i>
                        </div>
                    </div>
                    <button type="button" onclick="saveJourney()" id="btnCont" class="btn-stx-primary px-5">
                        حفظ ومتابعة الرحلة <i class="bi bi-arrow-left"></i>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal Placeholder (Legacy compatibility) -->
    <div class="modal fade" id="objModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0"
                style="background: #1e293b; border-radius: 28px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);">
                <div class="modal-header border-bottom border-white border-opacity-10 p-4">
                    <h5 class="modal-title fw-bold text-white">إضافة هدف استراتيجي جديد</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"
                        aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <div class="mb-3">
                        <label class="form-label text-muted small fw-bold">المنظور الاستراتيجي</label>
                        <select id="objPerspective"
                            class="form-select bg-dark border-0 text-white rounded-4 p-3 shadow-none">
                            <option value="financial">المالي (Financial)</option>
                            <option value="customer">العملاء (Customer)</option>
                            <option value="internal">العمليات الداخلية (Internal Processes)</option>
                            <option value="learning">التعلم والنمو (Learning & Growth)</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted small fw-bold">العنوان</label>
                        <input type="text" id="objTitle"
                            class="form-control bg-dark border-0 text-white rounded-4 p-3 shadow-none"
                            placeholder="مثال: تحسين كفاءة الإنتاجية الإدارية">
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted small fw-bold">الوصف</label>
                        <textarea id="objDesc"
                            class="form-control bg-dark border-0 text-white rounded-4 p-3 shadow-none" rows="3"
                            placeholder="اشرح كيف يحقق هذا الهدف رؤيتكم..."></textarea>
                    </div>
                    <div class="row">
                        <div class="col-6">
                            <label class="form-label text-muted small fw-bold">الوزن النسبي (%)</label>
                            <input type="number" id="objWeight"
                                class="form-control bg-dark border-0 text-white rounded-4 p-3 shadow-none" value="25"
                                min="1" max="100">
                        </div>
                    </div>
                </div>
                <div class="modal-footer border-top border-white border-opacity-10 p-4">
                    <button type="button" class="btn btn-link text-muted text-decoration-none"
                        data-bs-dismiss="modal">إلغاء</button>
                    <button type="button" class="btn-stx-primary px-4" onclick="saveObjective()">تأكيد الحفظ</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/context-manager.js"></script>
    <script src="/js/dept-page.js"></script>
    <script src="/js/steps-config.js"></script>
    <script src="/js/sidebar.js"></script>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const dept = urlParams.get('dept') || 'hr';
        let allObjectives = [];
        let editingIndex = -1;

        const PERSPECTIVE_LABELS = { financial: 'المالي', customer: 'العملاء', internal: 'العمليات', learning: 'التعلم' };

        async function initObjectives() {
            const DEPT_LABELS = { hr: 'الموارد البشرية', finance: 'المالية', marketing: 'التسويق', operations: 'العمليات' };
            document.getElementById('dept-context').textContent = `${DEPT_LABELS[dept] || dept} | بطاقة الأداء المتوازن (BSC)`;

            // Load saved
            await loadAll();
        }

        async function loadAll() {
            const apiType = `OBJECTIVES_${dept.toUpperCase()}`;
            const saved = await DeptPage.loadFromAPI(apiType).catch(() => null) || [];
            allObjectives = Array.isArray(saved) ? saved : [];
            renderGrid();
        }

        function renderGrid(filter = 'all') {
            const container = document.getElementById('objContainer');
            const empty = document.getElementById('emptyState');

            const filtered = filter === 'all' ? allObjectives : allObjectives.filter(o => o.perspective === filter);

            container.innerHTML = '';
            if (filtered.length === 0) {
                container.appendChild(empty);
                empty.classList.remove('d-none');
            } else {
                empty.classList.add('d-none');
                filtered.forEach((obj, idx) => {
                    const card = document.createElement('div');
                    card.className = 'obj_card obj-card';
                    card.innerHTML = `
                        <div class="obj-tag tag-${obj.perspective}">${PERSPECTIVE_LABELS[obj.perspective]}</div>
                        <h4 class="obj-title">${obj.title}</h4>
                        <p class="obj-desc">${obj.description || ''}</p>
                        <div class="obj-footer">
                            <span class="weight-pill">${obj.weight}% الوزن</span>
                            <div class="d-flex gap-2">
                                <button class="btn btn-sm btn-outline-info rounded-circle" onclick="editObj(${allObjectives.indexOf(obj)})"><i class="bi bi-pencil"></i></button>
                                <button class="btn btn-sm btn-outline-danger rounded-circle" onclick="deleteObj(${allObjectives.indexOf(obj)})"><i class="bi bi-trash"></i></button>
                            </div>
                        </div>
                    `;
                    container.appendChild(card);
                });
            }

            // Update badges
            document.getElementById('countAll').textContent = allObjectives.length;
            document.getElementById('countFinancial').textContent = allObjectives.filter(o => o.perspective === 'financial').length;
            document.getElementById('countCustomer').textContent = allObjectives.filter(o => o.perspective === 'customer').length;
            document.getElementById('countInternal').textContent = allObjectives.filter(o => o.perspective === 'internal').length;
            document.getElementById('countLearning').textContent = allObjectives.filter(o => o.perspective === 'learning').length;
        }

        function filterPerspective(type, el) {
            document.querySelectorAll('.p-tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            renderGrid(type);
        }

        function prepareCreateModal() {
            editingIndex = -1;
            document.getElementById('objTitle').value = '';
            document.getElementById('objDesc').value = '';
            document.getElementById('objWeight').value = '25';
            const modal = new bootstrap.Modal(document.getElementById('objModal'));
            modal.show();
        }

        function editObj(idx) {
            editingIndex = idx;
            const obj = allObjectives[idx];
            document.getElementById('objPerspective').value = obj.perspective;
            document.getElementById('objTitle').value = obj.title;
            document.getElementById('objDesc').value = obj.description;
            document.getElementById('objWeight').value = obj.weight;
            const modal = new bootstrap.Modal(document.getElementById('objModal'));
            modal.show();
        }

        async function deleteObj(idx) {
            if (!confirm('هل أنت متأكد من حذف هذا الهدف؟')) return;
            allObjectives.splice(idx, 1);
            await saveToDB();
            renderGrid();
        }

        async function saveObjective() {
            const obj = {
                perspective: document.getElementById('objPerspective').value,
                title: document.getElementById('objTitle').value,
                description: document.getElementById('objDesc').value,
                weight: parseInt(document.getElementById('objWeight').value)
            };

            if (!obj.title) return alert('يرجى إدخال عنوان الهدف');

            if (editingIndex >= 0) allObjectives[editingIndex] = obj;
            else allObjectives.push(obj);

            await saveToDB();
            bootstrap.Modal.getInstance(document.getElementById('objModal')).hide();
            renderGrid();
            DeptPage.showMessage('✅ تم حفظ الهدف الاستراتيجي.');
        }

        async function saveToDB() {
            const apiType = `OBJECTIVES_${dept.toUpperCase()}`;
            await DeptPage.saveToAPI(apiType, allObjectives);
        }

        async function saveJourney() {
            const btn = document.getElementById('btnCont');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> جاري الحفظ...';

            await saveToDB();
            if (window.Context) await Context.markStepCompleted('objectives');
            setTimeout(() => window.location.href = `/okrs.html?dept=${dept}&t=${Date.now()}`, 1200);
        }

        document.addEventListener('DOMContentLoaded', initObjectives);
    </script>
</body>

</html>
