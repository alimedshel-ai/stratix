<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <title>ستارتكس | التحليل الرقمي - الجودة</title>
    <link rel="stylesheet" href="/css/dept-pages.css">
    <script src="/js/context-manager.js?v=4"></script>
    <script src="/js/dept-page.js?v=4"></script>
</head>

<body>
    <div class="container">
        <h1>📊 التحليل الرقمي – الجودة</h1>
        <div class="sub">أدخل الأرقام والمؤشرات الرئيسية لقسم الجودة</div>
        <form id="deepForm">
            <div class="question"><label>نتيجة آخر تدقيق داخلي (%)</label><input type="number" name="audit_score"
                    placeholder="مثال: 85" required></div>
            <div class="question"><label>عدد حالات عدم المطابقة</label><input type="number" name="nonconformities"
                    placeholder="مثال: 12" required></div>
            <div class="question"><label>عدد الإجراءات التصحيحية المفتوحة</label><input type="number"
                    name="corrective_actions" placeholder="مثال: 8" required></div>
            <div class="question"><label>عدد شكاوى العملاء المتعلقة بالجودة شهرياً</label><input type="number"
                    name="quality_complaints" placeholder="مثال: 5" required></div>
            <div class="question"><label>تكلفة الجودة السنوية (ريال)</label><input type="number" name="quality_costs"
                    placeholder="مثال: 50000" required></div>
            <button type="submit">حفظ ومتابعة للتقييم الوصفي</button>
        </form>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const ok = await DeptPage.init('quality');
            if (!ok) return;
            let saved = await DeptPage.loadFromAPI('DEEP') || Context.getTemp('deep_results') || DeptPage.migrateFromLocalStorage('stratix_quality_deep_results');
            DeptPage.fillForm(saved);
            document.getElementById('deepForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const results = Object.fromEntries(new FormData(e.target));
                Context.setTemp('deep_results', results);
                const ok = await DeptPage.saveToAPI('DEEP', results);
                DeptPage.showMessage(ok ? 'تم حفظ التحليل الرقمي بنجاح' : 'تم حفظ التحليل محلياً', !ok);
                setTimeout(() => window.location.href = `/quality-audit.html?dept=quality`, 1500);
            });
        });
    </script>
</body>

</html>
