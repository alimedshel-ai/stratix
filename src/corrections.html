<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ستارتكس | الإجراءات التصحيحية</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/shared.css">
    <style>
        :root {
            --stx-bg: #0f172a;
            --stx-card: #1e293b;
            --stx-border: rgba(255, 255, 255, 0.08);
            --stx-success: #10b981;
            --stx-accent: #34d399;
            --stx-danger: #ef4444;
            --stx-warn: #f59e0b;
            --stx-info: #3b82f6;
        }

        body { background-color: var(--stx-bg); color: #f8fafc; font-family: 'Tajawal', sans-serif; margin: 0; }
        .container-fluid { height: 100vh; display: flex; flex-direction: column; }
        .flex-wrapper { display: flex; flex: 1; overflow: hidden; }
        #sidebar {
            width: 260px; background: #1a1d2e; border-left: 1px solid var(--stx-border);
            flex-shrink: 0; overflow-y: auto; overflow-x: hidden;
            position: fixed; top: 0; right: 0; height: 100vh; z-index: 1100;
            transform: translateX(220px);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #sidebar:hover, #sidebar.sidebar-open {
            transform: translateX(0);
        }
        #sidebar::before {
            content: '\F285';
            font-family: 'bootstrap-icons';
            position: absolute; left: 0; top: 50%;
            transform: translateY(-50%);
            background: rgba(26, 29, 46, 0.95); color: #667eea;
            padding: 12px 6px; border-radius: 0 8px 8px 0;
            font-size: 1rem; z-index: 1;
            transition: opacity 0.3s;
        }
        #sidebar:hover::before { opacity: 0; }
        main { flex: 1; overflow-y: auto; padding: 32px 48px 140px; }

        .page-title { font-size: 1.75rem; font-weight: 900; color: white; display: flex; align-items: center; gap: 12px; }
        .page-subtitle { color: #94a3b8; font-size: 0.95rem; margin-top: 4px; }

        .content-area { max-width: 1100px; margin: 0 auto; }

        /* Summary Cards */
        .summary-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 32px; }
        .summary-card { background: var(--stx-card); border: 1px solid var(--stx-border); border-radius: 20px; padding: 24px; text-align: center; }
        .summary-card .num { font-size: 2.5rem; font-weight: 900; line-height: 1; }
        .summary-card .lbl { font-size: 0.85rem; color: #94a3b8; margin-top: 8px; font-weight: 700; }

        /* Alerts Section */
        .alert-section { background: var(--stx-card); border: 1px solid var(--stx-border); border-radius: 24px; padding: 28px; margin-bottom: 24px; }
        .alert-section h3 { font-size: 1.1rem; font-weight: 900; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .alert-item { background: rgba(239, 68, 68, 0.06); border: 1px solid rgba(239, 68, 68, 0.15); border-radius: 16px; padding: 16px 20px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; gap: 16px; }
        .alert-item.warn { background: rgba(245, 158, 11, 0.06); border-color: rgba(245, 158, 11, 0.15); }
        .alert-item .alert-name { font-weight: 800; font-size: 0.95rem; flex: 1; }
        .alert-item .alert-meta { font-size: 0.8rem; color: #94a3b8; display: flex; gap: 16px; }
        .alert-item .alert-badge { padding: 4px 14px; border-radius: 20px; font-size: 0.75rem; font-weight: 900; }
        .badge-danger { background: rgba(239,68,68,0.15); color: #ef4444; }
        .badge-warn { background: rgba(245,158,11,0.15); color: #f59e0b; }
        .empty-state { text-align: center; padding: 32px; opacity: 0.4; }

        /* Actions Table */
        .actions-section { background: var(--stx-card); border: 1px solid var(--stx-border); border-radius: 24px; padding: 28px; margin-bottom: 24px; }
        .actions-section h3 { font-size: 1.1rem; font-weight: 900; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .action-row { background: rgba(15, 23, 42, 0.4); border: 1px solid var(--stx-border); border-radius: 16px; padding: 20px; margin-bottom: 12px; display: grid; grid-template-columns: 1fr 140px 140px 120px 100px; gap: 12px; align-items: center; }
        .action-row .stx-input { background: rgba(15, 23, 42, 0.5); border: 1px solid var(--stx-border); color: white; border-radius: 10px; padding: 8px 12px; font-size: 0.9rem; width: 100%; outline: none; }
        .action-row .stx-input:focus { border-color: var(--stx-accent); }
        .action-row select.stx-input { cursor: pointer; }
        .action-row .remove-btn { background: none; border: none; color: #64748b; cursor: pointer; font-size: 1.1rem; padding: 4px; }
        .action-row .remove-btn:hover { color: var(--stx-danger); }
        .action-header { display: grid; grid-template-columns: 1fr 140px 140px 120px 100px; gap: 12px; padding: 0 20px 12px; font-size: 0.8rem; color: #64748b; font-weight: 800; }
        .linked-badge { font-size: 0.7rem; background: rgba(59,130,246,0.1); color: var(--stx-info); padding: 2px 8px; border-radius: 8px; margin-top: 4px; display: inline-block; }

        /* Action Steps Panel */
        .action-steps-toggle { background: none; border: none; color: #64748b; cursor: pointer; font-size: 0.8rem; font-weight: 700; padding: 4px 8px; border-radius: 8px; transition: 0.2s; display: flex; align-items: center; gap: 4px; }
        .action-steps-toggle:hover { color: var(--stx-accent); background: rgba(16,185,129,0.08); }
        .action-steps-toggle.has-steps { color: var(--stx-accent); }
        .action-steps-panel { background: rgba(15, 23, 42, 0.6); border: 1px solid var(--stx-border); border-radius: 14px; padding: 16px 20px; margin-top: 12px; grid-column: 1 / -1; }
        .action-steps-panel h6 { font-size: 0.85rem; font-weight: 800; color: #94a3b8; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
        .step-item { display: flex; align-items: center; gap: 10px; padding: 8px 12px; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); border-radius: 10px; margin-bottom: 8px; transition: 0.2s; }
        .step-item:hover { background: rgba(255,255,255,0.04); }
        .step-checkbox { width: 18px; height: 18px; border: 2px solid #475569; border-radius: 5px; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .step-checkbox.checked { background: var(--stx-success); border-color: var(--stx-success); }
        .step-checkbox.checked::after { content: '✓'; color: white; font-size: 0.7rem; font-weight: 900; }
        .step-item input { background: transparent; border: none; color: #e2e8f0; font-size: 0.85rem; flex: 1; outline: none; padding: 2px 0; }
        .step-item input::placeholder { color: #475569; }
        .step-item .step-delete { background: none; border: none; color: #475569; cursor: pointer; font-size: 0.85rem; padding: 2px; opacity: 0; transition: 0.2s; }
        .step-item:hover .step-delete { opacity: 1; }
        .step-item .step-delete:hover { color: var(--stx-danger); }
        .step-add-btn { background: none; border: 1px dashed rgba(16,185,129,0.3); color: var(--stx-accent); border-radius: 8px; padding: 6px 14px; font-size: 0.8rem; font-weight: 700; cursor: pointer; transition: 0.2s; width: 100%; }
        .step-add-btn:hover { background: rgba(16,185,129,0.08); }
        .step-progress { display: flex; align-items: center; gap: 8px; margin-top: 10px; }
        .step-progress-bar { flex: 1; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; }
        .step-progress-fill { height: 100%; background: var(--stx-success); border-radius: 2px; transition: width 0.3s; }
        .step-progress-text { font-size: 0.7rem; color: #64748b; font-weight: 700; min-width: 35px; }

        .btn-add { background: rgba(16, 185, 129, 0.08); border: 1px dashed rgba(16, 185, 129, 0.3); color: var(--stx-accent); border-radius: 14px; padding: 14px; width: 100%; font-weight: 800; cursor: pointer; transition: 0.2s; }
        .btn-add:hover { background: rgba(16, 185, 129, 0.15); }

        /* Bottom Bar */
        .action-bar { position: fixed; bottom: 0; right: 0; left: 0; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(10px); border-top: 1px solid var(--stx-border); padding: 20px 48px; display: flex; justify-content: space-between; align-items: center; z-index: 1000; }
        .btn-stx-success { background: linear-gradient(135deg, #10b981, #059669); color: white; border: none; padding: 14px 40px; border-radius: 14px; font-weight: 800; font-size: 1.1rem; box-shadow: 0 8px 25px rgba(16, 185, 129, 0.3); transition: 0.3s; }
        .btn-stx-success:hover { transform: translateY(-3px); box-shadow: 0 12px 35px rgba(16, 185, 129, 0.5); }
        .nav-link-btn { color: #94a3b8; text-decoration: none; font-weight: 800; display: flex; align-items: center; gap: 8px; transition: 0.2s; }
        .nav-link-btn:hover { color: #fff; }

        @media (max-width: 1100px) {
            .action-bar { padding: 16px; }
            #sidebar { transform: translateX(260px); }
            #sidebar:hover { transform: translateX(0); }
            .action-row { grid-template-columns: 1fr; }
            .action-header { display: none; }
            .summary-row { grid-template-columns: 1fr; }
        }
    </style>
</head>

<body class="dir-rtl">
    <div class="container-fluid p-0">
        <div class="flex-wrapper">
            <nav id="sidebar"></nav>
            <main>
                <header style="margin-bottom:32px; display:flex; justify-content:space-between; align-items:center">
                    <div>
                        <h1 class="page-title"><i class="bi bi-tools text-success"></i> الإجراءات التصحيحية</h1>
                        <p class="page-subtitle" id="dept-context">تحويل فجوات الأداء إلى خطة عمل تصحيحية قابلة للتنفيذ</p>
                    </div>
                    <div class="d-flex gap-2">
                        <button class="btn btn-outline-info rounded-pill px-4 fw-800" onclick="autoGenerate()">
                            <i class="bi bi-stars me-1"></i> توليد ذكي
                        </button>
                    </div>
                </header>

                <div class="content-area">
                    <!-- ملخص الأداء -->
                    <div class="summary-row">
                        <div class="summary-card">
                            <div class="num text-danger" id="countCritical">0</div>
                            <div class="lbl"><i class="bi bi-exclamation-triangle-fill text-danger me-1"></i> مؤشرات حرجة</div>
                        </div>
                        <div class="summary-card">
                            <div class="num" style="color:var(--stx-warn)" id="countBehind">0</div>
                            <div class="lbl"><i class="bi bi-clock-fill me-1" style="color:var(--stx-warn)"></i> مبادرات متأخرة</div>
                        </div>
                        <div class="summary-card">
                            <div class="num text-success" id="countActions">0</div>
                            <div class="lbl"><i class="bi bi-check-circle-fill text-success me-1"></i> إجراءات مخططة</div>
                        </div>
                    </div>

                    <!-- التنبيهات: المؤشرات المتعثرة -->
                    <div class="alert-section">
                        <h3><i class="bi bi-exclamation-triangle-fill text-danger"></i> فجوات الأداء المكتشفة</h3>
                        <div id="alertsList">
                            <div class="empty-state"><i class="bi bi-check-circle" style="font-size:2rem"></i><p class="mt-2 fw-700">جاري تحليل المؤشرات والمبادرات...</p></div>
                        </div>
                    </div>

                    <!-- جدول الإجراءات التصحيحية -->
                    <div class="actions-section">
                        <h3><i class="bi bi-clipboard2-check-fill text-success"></i> خطة الإجراءات التصحيحية</h3>
                        <div class="action-header">
                            <span>الإجراء التصحيحي</span>
                            <span>المسؤول</span>
                            <span>الموعد النهائي</span>
                            <span>الأولوية</span>
                            <span></span>
                        </div>
                        <div id="actionsList"></div>
                        <button class="btn-add mt-3" onclick="addAction()">
                            <i class="bi bi-plus-lg me-2"></i> إضافة إجراء تصحيحي
                        </button>
                    </div>
                </div>

                <!-- Bottom Navigation -->
                <div class="action-bar">
                    <a id="prevLink" href="/reviews.html" class="nav-link-btn">
                        <i class="bi bi-arrow-right"></i> السابق: المراجعات
                    </a>
                    <div class="d-flex align-items-center gap-3">
                        <span class="text-muted small fw-700" id="saveStatus"></span>
                        <button type="button" id="btnSave" class="btn-stx-success" onclick="saveAndNext()">
                            حفظ والانتقال للتقارير <i class="bi bi-arrow-left ms-2"></i>
                        </button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="/js/smart-nav.js?v=5"></script>
    <script src="/js/api.js?v=5"></script>
    <script src="/js/utils.js?v=5"></script>
    <script src="/js/context-manager.js?v=5"></script>
    <script src="/js/page-guard.js?v=5"></script>
    <script src="/js/steps-config.js?v=5"></script>
    <script src="/js/dept-page.js?v=5"></script>
    <script src="/js/sidebar.js?v=5"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // ════════════════════════════════════════════════════════════
        // Corrections Engine — الإجراءات التصحيحية المتصلة بالأداء
        // ════════════════════════════════════════════════════════════
        const _urlDept = new URLSearchParams(location.search).get('dept') || 'company';
        const _deptKey = _urlDept.toUpperCase();
        const _qs = _urlDept !== 'company' ? '?dept=' + _urlDept : '';
        const _DEPT_LABELS = {
            hr:'الموارد البشرية', finance:'المالية', sales:'المبيعات', marketing:'التسويق',
            operations:'العمليات', it:'تقنية المعلومات', quality:'الجودة', cs:'خدمة العملاء',
            projects:'المشاريع', compliance:'الامتثال', governance:'الحوكمة', support:'الخدمات المساندة'
        };

        let allActions = [];
        let detectedGaps = [];

        // ── التهيئة ──────────────────────────────────────────
        (async function init() {
            // تهيئة DeptPage
            await window.initDeptPage();
            if (window.DeptPage) DeptPage.dept = _urlDept;
            await DeptPage.init(_urlDept);

            // عنوان السياق
            const deptLabel = _DEPT_LABELS[_urlDept] || _urlDept;
            document.getElementById('dept-context').textContent = _urlDept === 'company'
                ? 'معالجة فجوات الأداء على مستوى المنظمة'
                : `${deptLabel} | معالجة فجوات الأداء وبناء خطة تصحيحية`;

            // تحديث روابط التنقل
            document.getElementById('prevLink').href = '/reviews.html' + _qs;

            // السايدبار
            if (typeof window.initSidebar === 'function') window.initSidebar();

            // جلب البيانات
            await Promise.all([pullGaps(), loadSaved()]);
            updateSummary();
        })();

        // ── جلب الفجوات من KPIs والمبادرات ──────────────────
        async function pullGaps() {
            detectedGaps = [];

            // 1. KPIs — جلب من API الحقيقي + DeptPage مع إزالة التكرار
            // entityId من JWT (آمن بعد switch-entity) — بدون fallback لـ localStorage
            let _entityId = '';
            try { const u = await window.api.getCurrentUser(); _entityId = u?.activeEntityId || ''; } catch(e) {}
            let allKpis = [];
            try {
                // API الحقيقي أولاً
                if (_entityId && window.api) {
                    const apiRes = await window.api.get(`/api/kpis?entityId=${_entityId}`);
                    if (Array.isArray(apiRes)) allKpis = apiRes;
                    else if (apiRes?.kpis) allKpis = apiRes.kpis;
                }
            } catch(e) { console.warn('[Corrections] API KPIs fallback:', e); }

            // DeptPage كـ fallback إذا API فارغ
            if (allKpis.length === 0) {
                let rawKpis = await DeptPage.loadFromAPI('KPIS_' + _deptKey) || [];
                if (!Array.isArray(rawKpis)) rawKpis = rawKpis.kpis || [];
                allKpis = rawKpis;
            }

            // إزالة التكرار حسب العنوان
            const seenKpis = new Set();
            allKpis.forEach(k => {
                const kTitle = (k.title || k.name || '').trim();
                if (!kTitle || seenKpis.has(kTitle)) return;
                seenKpis.add(kTitle);

                const target = parseFloat(k.target) || 0;
                const actual = parseFloat(k.actual) || 0;
                if (target > 0 && actual < target * 0.7) {
                    detectedGaps.push({
                        type: 'kpi',
                        severity: actual < target * 0.5 ? 'critical' : 'warning',
                        title: kTitle,
                        detail: `المستهدف: ${target}${k.unit || '%'} — الفعلي: ${actual}${k.unit || '%'}`,
                        gap: Math.round(((target - actual) / target) * 100)
                    });
                }
            });

            // 2. المبادرات المتأخرة
            let allInits = [];
            try {
                if (_entityId && window.api) {
                    const apiRes = await window.api.get(`/api/initiatives?entityId=${_entityId}`);
                    if (Array.isArray(apiRes)) allInits = apiRes;
                    else if (apiRes?.initiatives) allInits = apiRes.initiatives;
                }
            } catch(e) { console.warn('[Corrections] API Initiatives fallback:', e); }

            if (allInits.length === 0) {
                let rawInits = await DeptPage.loadFromAPI('INITIATIVES_' + _deptKey) || [];
                if (!Array.isArray(rawInits)) rawInits = rawInits.initiatives || [];
                allInits = rawInits;
            }

            const seenInits = new Set();
            allInits.forEach(i => {
                const iTitle = (i.title || i.name || '').trim();
                if (!iTitle || seenInits.has(iTitle)) return;
                seenInits.add(iTitle);

                const status = (i.status || '').toLowerCase();
                if (status === 'متعثر' || status === 'متأخر' || status === 'delayed' || status === 'at_risk') {
                    detectedGaps.push({
                        type: 'initiative',
                        severity: 'warning',
                        title: iTitle,
                        detail: `الحالة: ${i.status}`,
                        gap: 0
                    });
                }
            });

            // 3. مراجعة الفجوات المكتشفة
            const review = await DeptPage.loadFromAPI('REVIEWS_' + _deptKey) || {};
            if (review.gaps) {
                const seenReview = new Set();
                const lines = review.gaps.split('\n').filter(l => l.trim().length > 5);
                lines.forEach(line => {
                    const clean = line.replace(/^[-•*\s]+/, '').trim();
                    if (clean && !seenReview.has(clean.substring(0, 80))) {
                        seenReview.add(clean.substring(0, 80));
                        detectedGaps.push({
                            type: 'review',
                            severity: 'warning',
                            title: clean.substring(0, 80),
                            detail: 'من مراجعة الأداء',
                            gap: 0
                        });
                    }
                });
            }

            // إزالة تكرار نهائي عبر كل المصادر
            const finalSeen = new Set();
            detectedGaps = detectedGaps.filter(g => {
                const key = g.title.trim();
                if (finalSeen.has(key)) return false;
                finalSeen.add(key);
                return true;
            });

            renderAlerts();
        }

        function renderAlerts() {
            const el = document.getElementById('alertsList');
            if (detectedGaps.length === 0) {
                el.innerHTML = '<div class="empty-state"><i class="bi bi-patch-check-fill text-success" style="font-size:2.5rem"></i><p class="mt-2 fw-700">لا توجد فجوات مكتشفة — أداء ممتاز!</p></div>';
                return;
            }

            el.innerHTML = detectedGaps.map((g, idx) => `
                <div class="alert-item ${g.severity === 'critical' ? '' : 'warn'}">
                    <div>
                        <div class="alert-name">
                            <i class="bi ${g.type === 'kpi' ? 'bi-speedometer2' : g.type === 'initiative' ? 'bi-rocket-takeoff' : 'bi-chat-square-text'} me-2"></i>
                            ${g.title}
                        </div>
                        <div class="alert-meta mt-1">${g.detail}${g.gap ? ` — فجوة ${g.gap}%` : ''}</div>
                    </div>
                    <div class="d-flex align-items-center gap-2">
                        <span class="alert-badge ${g.severity === 'critical' ? 'badge-danger' : 'badge-warn'}">
                            ${g.severity === 'critical' ? 'حرج' : 'تحذير'}
                        </span>
                        <button class="btn btn-sm btn-outline-success rounded-pill px-3 fw-800" onclick="createFromGap(${idx})">
                            <i class="bi bi-plus-lg"></i> إجراء
                        </button>
                    </div>
                </div>
            `).join('');
        }

        // ── إنشاء إجراء من فجوة ───────────────────────────
        function createFromGap(gapIdx) {
            const gap = detectedGaps[gapIdx];
            if (!gap) return;

            const suggestion = gap.type === 'kpi'
                ? `معالجة فجوة مؤشر "${gap.title}" — تقليص الانحراف عن المستهدف`
                : gap.type === 'initiative'
                ? `تسريع تنفيذ "${gap.title}" — معالجة أسباب التأخير`
                : `معالجة: ${gap.title}`;

            const newAction = {
                title: suggestion,
                assignee: '',
                dueDate: getDefaultDueDate(),
                priority: gap.severity === 'critical' ? 'high' : 'medium',
                status: 'pending',
                linkedTo: gap.title,
                linkedType: gap.type,
                steps: [],
                _stepsOpen: false
            };
            allActions.push(newAction);
            // Auto-generate steps for this action
            autoGenerateSteps(allActions.length - 1);
            renderActions();
            updateSummary();
        }

        // ── إدارة الإجراءات ──────────────────────────────────
        function addAction(title = '') {
            allActions.push({
                title: title,
                assignee: '',
                dueDate: getDefaultDueDate(),
                priority: 'medium',
                status: 'pending',
                linkedTo: '',
                linkedType: '',
                steps: [],
                _stepsOpen: false
            });
            renderActions();
            updateSummary();
        }

        function removeAction(idx) {
            allActions.splice(idx, 1);
            renderActions();
            updateSummary();
        }

        function updateAction(idx, field, value) {
            if (allActions[idx]) allActions[idx][field] = value;
            updateSummary();
        }

        function renderActions() {
            const el = document.getElementById('actionsList');
            if (allActions.length === 0) {
                el.innerHTML = '<div class="empty-state py-4"><p class="fw-700">لا توجد إجراءات بعد — اضغط على "إجراء" بجانب الفجوة أو أضف إجراء يدوياً</p></div>';
                return;
            }

            el.innerHTML = allActions.map((a, idx) => {
                const steps = a.steps || [];
                const doneSteps = steps.filter(s => s.done).length;
                const totalSteps = steps.length;
                const stepPct = totalSteps > 0 ? Math.round((doneSteps / totalSteps) * 100) : 0;
                const hasSteps = totalSteps > 0;

                return `
                <div class="action-row" id="action-${idx}">
                    <div>
                        <input type="text" class="stx-input" value="${escapeHtml(a.title)}" placeholder="وصف الإجراء التصحيحي..."
                            oninput="updateAction(${idx}, 'title', this.value)">
                        <div class="d-flex align-items-center gap-2 mt-1">
                            ${a.linkedTo ? `<span class="linked-badge"><i class="bi bi-link-45deg me-1"></i>${a.linkedType === 'kpi' ? 'مؤشر' : 'مبادرة'}: ${escapeHtml(a.linkedTo).substring(0,40)}</span>` : ''}
                            <button class="action-steps-toggle ${hasSteps ? 'has-steps' : ''}" onclick="toggleSteps(${idx})">
                                <i class="bi bi-list-check"></i>
                                ${hasSteps ? `خطة التنفيذ (${doneSteps}/${totalSteps})` : 'إضافة خطة تنفيذ'}
                            </button>
                        </div>
                    </div>
                    <input type="text" class="stx-input" value="${escapeHtml(a.assignee)}" placeholder="المسؤول..."
                        oninput="updateAction(${idx}, 'assignee', this.value)">
                    <input type="date" class="stx-input" value="${a.dueDate}"
                        oninput="updateAction(${idx}, 'dueDate', this.value)">
                    <select class="stx-input" onchange="updateAction(${idx}, 'priority', this.value)">
                        <option value="high" ${a.priority === 'high' ? 'selected' : ''}>عالية</option>
                        <option value="medium" ${a.priority === 'medium' ? 'selected' : ''}>متوسطة</option>
                        <option value="low" ${a.priority === 'low' ? 'selected' : ''}>منخفضة</option>
                    </select>
                    <div class="text-center">
                        <button class="remove-btn" onclick="removeAction(${idx})" title="حذف"><i class="bi bi-trash3"></i></button>
                    </div>
                    ${a._stepsOpen ? renderStepsPanel(idx, steps, stepPct) : ''}
                </div>
            `;
            }).join('');
        }

        function updateSummary() {
            const criticalKpis = detectedGaps.filter(g => g.type === 'kpi').length;
            const behindInits = detectedGaps.filter(g => g.type === 'initiative' || g.type === 'review').length;
            document.getElementById('countCritical').textContent = criticalKpis;
            document.getElementById('countBehind').textContent = behindInits;
            document.getElementById('countActions').textContent = allActions.length;
        }

        // ── خطة التنفيذ (Steps) ─────────────────────────────
        function renderStepsPanel(idx, steps, pct) {
            return `
                <div class="action-steps-panel">
                    <h6><i class="bi bi-list-check text-success"></i> خطة التنفيذ — خطوات تحقيق الهدف</h6>
                    <div id="steps-list-${idx}">
                        ${steps.map((s, si) => `
                            <div class="step-item">
                                <div class="step-checkbox ${s.done ? 'checked' : ''}" onclick="toggleStep(${idx}, ${si})"></div>
                                <input type="text" value="${escapeHtml(s.text)}" placeholder="وصف الخطوة..."
                                    oninput="updateStep(${idx}, ${si}, this.value)"
                                    style="${s.done ? 'text-decoration:line-through; opacity:0.5' : ''}">
                                <button class="step-delete" onclick="removeStep(${idx}, ${si})"><i class="bi bi-x-lg"></i></button>
                            </div>
                        `).join('')}
                    </div>
                    <div class="d-flex gap-2 mt-2">
                        <button class="step-add-btn" onclick="addStep(${idx})"><i class="bi bi-plus me-1"></i> إضافة خطوة</button>
                        ${steps.length === 0 ? `<button class="step-add-btn" onclick="autoGenerateSteps(${idx})" style="border-color:rgba(99,102,241,0.3); color:#818cf8"><i class="bi bi-stars me-1"></i> توليد خطوات ذكية</button>` : ''}
                    </div>
                    ${steps.length > 0 ? `
                        <div class="step-progress">
                            <div class="step-progress-bar"><div class="step-progress-fill" style="width:${pct}%"></div></div>
                            <span class="step-progress-text">${pct}%</span>
                        </div>
                    ` : ''}
                </div>
            `;
        }

        function toggleSteps(idx) {
            if (!allActions[idx]) return;
            allActions[idx]._stepsOpen = !allActions[idx]._stepsOpen;
            if (!allActions[idx].steps) allActions[idx].steps = [];
            renderActions();
        }

        function addStep(idx, text = '') {
            if (!allActions[idx]) return;
            if (!allActions[idx].steps) allActions[idx].steps = [];
            allActions[idx].steps.push({ text: text, done: false });
            allActions[idx]._stepsOpen = true;
            renderActions();
        }

        function removeStep(idx, stepIdx) {
            if (!allActions[idx]?.steps) return;
            allActions[idx].steps.splice(stepIdx, 1);
            renderActions();
        }

        function updateStep(idx, stepIdx, value) {
            if (!allActions[idx]?.steps?.[stepIdx]) return;
            allActions[idx].steps[stepIdx].text = value;
        }

        function toggleStep(idx, stepIdx) {
            if (!allActions[idx]?.steps?.[stepIdx]) return;
            allActions[idx].steps[stepIdx].done = !allActions[idx].steps[stepIdx].done;
            renderActions();
        }

        /**
         * توليد خطوات تنفيذية ذكية — خطة عمل حقيقية حسب:
         * 1. كلمات المؤشر/المبادرة المفتاحية
         * 2. نوع القسم (sales, hr, finance...)
         */
        function autoGenerateSteps(idx) {
            const action = allActions[idx];
            if (!action) return;

            const title = (action.title + ' ' + (action.linkedTo || '')).toLowerCase();
            const dept = _urlDept.toLowerCase();
            const gap = detectedGaps.find(g => g.title === action.linkedTo);
            const isKpi = action.linkedType === 'kpi' || (gap && gap.type === 'kpi');
            const kw = (keywords) => keywords.some(k => title.includes(k));

            let steps = [];

            // ─── Sales ───
            if (dept === 'sales') {
                if (kw(['مبيعات', 'إيرادات', 'إجمالي', 'ربع سنوي', 'شهري', 'حجم البيع'])) {
                    steps = [
                        'مراجعة pipeline المبيعات وتحديد الصفقات القابلة للإغلاق خلال 30 يوم',
                        'زيادة عدد الزيارات الميدانية للعملاء المحتملين بنسبة 25%',
                        'إطلاق عرض ترويجي مستهدف للعملاء الحاليين (upsell/cross-sell)',
                        'تفعيل قناة بيع رقمية جديدة أو تحسين القناة الحالية',
                        'متابعة العروض المعلقة وتسريع إغلاق الصفقات المتأخرة',
                        'اجتماع أسبوعي لمتابعة تقدم كل مندوب مبيعات',
                        'تحديد أعلى 10 عملاء محتملين وتخصيص خطة تواصل مكثفة لهم'
                    ];
                } else if (kw(['عملاء', 'استحواذ', 'جدد', 'عميل جديد', 'قاعدة'])) {
                    steps = [
                        'تحديد 3 شرائح سوقية جديدة مستهدفة',
                        'إعداد قائمة بـ 50 عميل محتمل مؤهل من كل شريحة',
                        'تصميم عرض قيمة مخصص لكل شريحة',
                        'إطلاق حملة تسويقية لجذب العملاء المحتملين',
                        'تنظيم فعاليتين networking شهرياً',
                        'فريق متابعة للردود والاستفسارات خلال 24 ساعة',
                        'تقييم معدل التحويل أسبوعياً وتعديل الاستراتيجية'
                    ];
                } else if (kw(['رضا', 'ولاء', 'احتفاظ', 'تجديد', 'شكاوى'])) {
                    steps = [
                        'إرسال استبيان رضا لجميع العملاء النشطين',
                        'تحليل الشكاوى الأخيرة وتصنيفها حسب النوع',
                        'تصميم برنامج ولاء أو مكافآت للعملاء المتكررين',
                        'تخصيص مدير حساب لأعلى 20% من العملاء',
                        'تقليص زمن الاستجابة للشكاوى إلى أقل من 4 ساعات',
                        'خصم تجديد مبكر للعملاء المعرضين للمغادرة'
                    ];
                } else if (kw(['هامش', 'ربحية', 'ربح', 'تكلفة', 'خصم'])) {
                    steps = [
                        'مراجعة هيكل التسعير مقارنة بالمنافسين',
                        'تحديد المنتجات ذات الهامش المنخفض وتقييمها',
                        'التفاوض مع الموردين لتخفيض التكاليف 10%',
                        'تركيز جهود البيع على المنتجات عالية الهامش',
                        'وضع سياسة خصومات واضحة وتقليل الخصومات غير المبررة',
                        'تتبع الهامش الفعلي لكل صفقة أسبوعياً'
                    ];
                } else {
                    steps = [
                        'وضع أهداف يومية/أسبوعية واضحة لكل مندوب مبيعات',
                        'تنفيذ جلسة تدريب على مهارات الإغلاق والتفاوض',
                        'تحسين أدوات البيع (عروض تقديمية، CRM)',
                        'زيادة نقاط التواصل مع العملاء الحاليين والمحتملين',
                        'تقييم الأداء أسبوعياً وتعديل الخطة حسب النتائج',
                        'تحفيز الفريق بمكافآت مرتبطة بالأداء'
                    ];
                }
            }
            // ─── HR ───
            else if (dept === 'hr') {
                if (kw(['توظيف', 'استقطاب', 'شاغر', 'وظيفة'])) {
                    steps = [
                        'ترتيب الوظائف الشاغرة حسب الأولوية والأثر',
                        'تحديث الأوصاف الوظيفية وتوحيد معايير الاختيار',
                        'تفعيل 3 قنوات توظيف (LinkedIn، منصات محلية، إحالات)',
                        'تقليص دورة التوظيف إلى 21 يوم كحد أقصى',
                        'بناء بنك مرشحين مؤهلين لأكثر الوظائف تكراراً',
                        'تقييم جودة التوظيف بعد 90 يوم من التعيين'
                    ];
                } else if (kw(['دوران', 'استقالة', 'تسرب', 'turnover'])) {
                    steps = [
                        'إجراء مقابلات خروج لآخر 10 مستقيلين وتحليل الأنماط',
                        'تصميم برنامج احتفاظ (مسار وظيفي + حوافز)',
                        'تحسين بيئة العمل حسب نتائج استبيان الرضا',
                        'مراجعة سلم الرواتب مقارنة بالسوق',
                        'تفعيل برنامج تقدير شهري للمتميزين',
                        'متابعة مؤشر الرضا الوظيفي ربع سنوياً'
                    ];
                } else {
                    steps = [
                        'تحديد الفجوة بالأرقام مقارنة بالمستهدف',
                        'إعداد خطة عمل بمعالم أسبوعية',
                        'تخصيص مسؤول متابعة مباشر',
                        'تنفيذ الإجراءات التحسينية المحددة',
                        'قياس الأثر بعد أسبوعين وتعديل الخطة'
                    ];
                }
            }
            // ─── Finance ───
            else if (dept === 'finance') {
                if (kw(['تكاليف', 'مصاريف', 'نفقات', 'ميزانية'])) {
                    steps = [
                        'تصنيف المصاريف (ثابتة/متغيرة/اختيارية)',
                        'تحديد أعلى 5 بنود قابلة للتخفيض',
                        'إعادة التفاوض مع أكبر 3 موردين',
                        'تطبيق سياسة اعتماد مصاريف متدرجة',
                        'وضع سقف شهري لكل بند مع تنبيهات تلقائية',
                        'تقرير أسبوعي لانحراف المصاريف عن الميزانية'
                    ];
                } else if (kw(['تحصيل', 'ذمم', 'مديونية', 'سيولة'])) {
                    steps = [
                        'جرد الذمم المدينة وتصنيفها حسب عمر الدين',
                        'التواصل مع أكبر 10 مدينين خلال أسبوع',
                        'تقديم خصم سداد مبكر 3-5%',
                        'تحويل الديون المتعثرة (+90 يوم) للتحصيل',
                        'تحديث شروط الائتمان وحدود كل عميل',
                        'تقرير تحصيل يومي'
                    ];
                } else {
                    steps = [
                        'تحليل البيانات المالية وتحديد نقاط الانحراف',
                        'خطة تصحيحية بأهداف شهرية',
                        'مراجعة العمليات المالية وفرص التحسين',
                        'تنفيذ إجراءات ضبط فورية',
                        'تقرير متابعة أسبوعي',
                        'تقييم الأثر نهاية الشهر'
                    ];
                }
            }
            // ─── Marketing ───
            else if (dept === 'marketing') {
                if (kw(['حملة', 'إعلان', 'ترويج', 'وعي'])) {
                    steps = [
                        'تحليل أداء الحملات السابقة وتحديد الأنجح',
                        'تصميم حملة مستهدفة بميزانية وجدول واضح',
                        'اختيار القنوات الأنسب حسب الجمهور',
                        'إعداد المحتوى الإبداعي والرسائل التسويقية',
                        'إطلاق الحملة مع تتبع أداء يومي',
                        'تقييم ROI الحملة بعد أسبوعين وتحسين الأداء'
                    ];
                } else {
                    steps = [
                        'تحليل السوق المستهدف وتحديث شرائح العملاء',
                        'خطة محتوى شهرية للقنوات الرقمية',
                        'تحسين معدل التحويل في المنصات الرقمية',
                        'تفعيل شراكات تسويقية مع 3 جهات',
                        'قياس الأداء أسبوعياً وتعديل الاستراتيجية'
                    ];
                }
            }
            // ─── Operations ───
            else if (dept === 'operations') {
                if (kw(['إنتاج', 'إنتاجية', 'كفاءة'])) {
                    steps = [
                        'تحديد الاختناقات في العمليات الحالية',
                        'تطبيق Lean لإزالة الهدر في 3 عمليات رئيسية',
                        'تحسين جدولة الإنتاج وتقليل أوقات التبديل',
                        'تدريب الفريق على أفضل الممارسات',
                        'قياس الإنتاجية يومياً',
                        'أتمتة المهام المتكررة'
                    ];
                } else {
                    steps = [
                        'توثيق العمليات الحالية ونقاط الضعف',
                        'خطة تحسين بمعالم زمنية',
                        'تنفيذ تحسينات سريعة (quick wins)',
                        'تنفيذ تحسينات هيكلية (المرحلة الثانية)',
                        'قياس الأثر وتقييم النتائج'
                    ];
                }
            }
            // ─── IT ───
            else if (dept === 'it') {
                steps = [
                    'تحديد المتطلبات التقنية لسد الفجوة',
                    'تقييم الحلول المتاحة (شراء/تطوير/ترقية)',
                    'إعداد جدول تنفيذ بمراحل واختبارات',
                    'تنفيذ الحل مع اختبار شامل قبل الإطلاق',
                    'تدريب المستخدمين على النظام الجديد',
                    'مراقبة الأداء بعد التطبيق'
                ];
            }

            // ─── Initiative (أي قسم) ───
            if (steps.length === 0 && !isKpi) {
                steps = [
                    'تحديث الجدول الزمني بمعالم واقعية',
                    'تقسيم المبادرة إلى مهام أسبوعية بمسؤوليات واضحة',
                    'تخصيص الموارد المطلوبة (فريق، ميزانية، أدوات)',
                    'اجتماع انطلاقة مع الفريق لتوحيد الرؤية',
                    'تنفيذ المهام حسب الأولوية مع تقارير يومية',
                    'مراجعة أسبوعية للتقدم وحل العقبات فوراً'
                ];
            }

            // ─── Fallback عام ───
            if (steps.length === 0) {
                steps = [
                    'تحديد الفجوة الفعلية بين الأداء الحالي والمستهدف بالأرقام',
                    'وضع 3-5 إجراءات عملية مباشرة لسد الفجوة خلال 30 يوم',
                    'تعيين مسؤول تنفيذ لكل إجراء مع موعد نهائي',
                    'تنفيذ الإجراءات الأسرع أثراً أولاً (quick wins)',
                    'متابعة المؤشر أسبوعياً ومقارنة الأداء بالمستهدف المرحلي',
                    'تعديل الخطة إذا لم تظهر نتائج خلال أسبوعين'
                ];
            }

            action.steps = steps.map(t => ({ text: t, done: false }));
            action._stepsOpen = true;
            renderActions();
            if (window.DeptPage?.showMessage) DeptPage.showMessage(`تم توليد ${steps.length} خطوات تنفيذية`);
        }

        // ── التوليد الذكي ────────────────────────────────────
        async function autoGenerate() {
            if (detectedGaps.length === 0) {
                if (window.DeptPage?.showMessage) DeptPage.showMessage('لا توجد فجوات مكتشفة لتوليد إجراءات منها');
                return;
            }

            // توليد إجراء لكل فجوة ليس لها إجراء مرتبط بعد
            const existingLinks = new Set(allActions.map(a => a.linkedTo));
            let added = 0;

            detectedGaps.forEach(gap => {
                if (existingLinks.has(gap.title)) return;

                const suggestion = gap.type === 'kpi'
                    ? `معالجة انحراف "${gap.title}" — وضع خطة لسد فجوة ${gap.gap}%`
                    : gap.type === 'initiative'
                    ? `تسريع "${gap.title}" — تحديد المعوقات وتخصيص الموارد`
                    : `معالجة: ${gap.title}`;

                allActions.push({
                    title: suggestion,
                    assignee: 'مدير القسم',
                    dueDate: getDefaultDueDate(),
                    priority: gap.severity === 'critical' ? 'high' : 'medium',
                    status: 'pending',
                    linkedTo: gap.title,
                    linkedType: gap.type,
                    steps: [],
                    _stepsOpen: false
                });
                // Auto-generate steps
                autoGenerateSteps(allActions.length - 1);
                added++;
            });

            renderActions();
            updateSummary();
            if (window.DeptPage?.showMessage) DeptPage.showMessage(`تم توليد ${added} إجراء تصحيحي ذكي`);
        }

        // ── الحفظ والتحميل ───────────────────────────────────
        async function loadSaved() {
            const saved = await DeptPage.loadFromAPI('CORRECTIONS_' + _deptKey) || {};
            if (saved.actions && Array.isArray(saved.actions)) {
                allActions = saved.actions;
                renderActions();
            }
        }

        async function persistData() {
            // Strip UI-only fields before saving
            const cleanActions = allActions.map(a => {
                const { _stepsOpen, ...rest } = a;
                return rest;
            });
            const payload = {
                actions: cleanActions,
                gaps: detectedGaps.length,
                timestamp: new Date().toISOString()
            };
            await DeptPage.saveToAPI('CORRECTIONS_' + _deptKey, payload);
        }

        async function saveAndNext() {
            const btn = document.getElementById('btnSave');
            const originalHtml = btn.innerHTML;

            try {
                btn.disabled = true;
                btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> جاري الحفظ...';

                await persistData();
                if (window.Context && Context.markStepCompleted) await Context.markStepCompleted('corrections');

                document.getElementById('saveStatus').textContent = 'تم الحفظ';
                // التالي: التقارير الدورية
                window.location.href = '/reports.html' + _qs;

            } catch (err) {
                console.error('[Corrections] Save error:', err);
                alert('فشل الحفظ: ' + (err.message || ''));
                btn.disabled = false;
                btn.innerHTML = originalHtml;
            }
        }

        // ── أدوات مساعدة ─────────────────────────────────────
        function getDefaultDueDate() {
            const d = new Date();
            d.setDate(d.getDate() + 30);
            return d.toISOString().split('T')[0];
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        // SmartNav — رجوع لـ لوحة الإدارة (مو لوحة العملاء)
        if (window.SmartNav) {
            const homeLink = document.querySelector('[href*="dept-dashboard"]');
            if (homeLink) homeLink.href = SmartNav.getBackUrl(_urlDept);
        }
    </script>
</body>

</html>
