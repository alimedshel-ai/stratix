<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ستارتكس | الإجراءات التصحيحية</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/css/shared.css">
    <style>
        :root {
            --stx-bg: #0f172a;
            --stx-card: #1e293b;
            --stx-border: rgba(255, 255, 255, 0.08);
            --stx-success: #10b981;
            --stx-accent: #34d399;
        }

        body {
            background-color: var(--stx-bg);
            color: #f8fafc;
            font-family: 'Tajawal', sans-serif;
            margin: 0;
            padding: 0;
        }

        .container-fluid {
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .flex-wrapper {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        #sidebar {
            width: 260px;
            background: #1a1d2e;
            border-left: 1px solid var(--stx-border);
            flex-shrink: 0;
            overflow-y: auto;
        }

        main {
            flex: 1;
            overflow-y: auto;
            padding: 32px 48px 120px;
        }

        .stx-header {
            margin-bottom: 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .page-title {
            font-size: 1.75rem;
            font-weight: 800;
            color: white;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .page-subtitle {
            color: #94a3b8;
            font-size: 0.95rem;
            margin-top: 4px;
        }

        .card-container {
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .stx-card {
            background: var(--stx-card);
            border: 1px solid var(--stx-border);
            border-radius: 24px;
            padding: 32px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .section-label {
            font-size: 1.1rem;
            font-weight: 800;
            color: var(--stx-success);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .stx-textarea {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid var(--stx-border);
            color: white;
            border-radius: 20px;
            padding: 24px;
            width: 100%;
            outline: none;
            font-size: 1.1rem;
            line-height: 1.7;
            min-height: 250px;
            transition: 0.3s;
        }

        .stx-textarea:focus {
            border-color: var(--stx-accent);
            background: rgba(15, 23, 42, 0.8);
        }

        .suggestion-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
        }

        .suggestion-chip {
            background: rgba(16, 185, 129, 0.08);
            border: 1px solid rgba(16, 185, 129, 0.2);
            color: #94a3b8;
            padding: 10px 20px;
            border-radius: 24px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .suggestion-chip:hover {
            background: var(--stx-success);
            color: white;
            border-color: transparent;
            transform: translateY(-3px);
        }

        .action-bar {
            position: fixed;
            bottom: 0;
            right: 0;
            left: 260px;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            border-top: 1px solid var(--stx-border);
            padding: 24px 48px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
        }

        .btn-stx-success {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            border: none;
            padding: 14px 48px;
            border-radius: 14px;
            font-weight: 800;
            font-size: 1.2rem;
            box-shadow: 0 8px 25px rgba(16, 185, 129, 0.3);
            transition: 0.3s;
        }

        .btn-stx-success:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(16, 185, 129, 0.5);
        }

        @media (max-width: 1100px) {
            .action-bar {
                left: 0;
                padding: 20px;
            }

            #sidebar {
                display: none;
            }
        }
    </style>
</head>

<body class="dir-rtl">
    <div class="container-fluid p-0">
        <div class="flex-wrapper">
            <nav id="sidebar"></nav>
            <main>
                <header class="stx-header">
                    <div>
                        <h1 class="page-title"><i class="bi bi-tools text-success"></i> الإجراءات التصحيحية</h1>
                        <p class="page-subtitle" id="dept-context">تحويل الملاحظات إلى برنامج عملي للتحسين المستمر</p>
                    </div>
                </header>

                <div class="card-container">
                    <div class="stx-card">
                        <label class="section-label"><i class="bi bi-patch-check-fill fs-4"></i> خطة الإجراءات
                            التصحيحية</label>
                        <div id="actions-suggestions" class="suggestion-chips"></div>
                        <textarea class="stx-textarea" id="correctiveActions"
                            placeholder="اكتب هنا الإجراءات التصحيحية المتفق عليها، المواعيد النهائية، والمسؤولين عن التنفيذ..."></textarea>
                    </div>
                </div>

                <div class="action-bar">
                    <button type="button" onclick="history.back()"
                        class="btn btn-link text-muted text-decoration-none fw-bold">
                        <i class="bi bi-arrow-right me-2"></i> العودة للمراجعات
                    </button>
                    <button type="button" id="btnSave" class="btn-stx-success" onclick="saveData()">
                        إتمام الرحلة وحفظ النتائج <i class="bi bi-trophy-fill ms-2"></i>
                    </button>
                </div>
            </main>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/utils.js"></script>
    <script src="/js/context-manager.js"></script>
    <script src="/js/dept-page.js"></script>
    <script src="/js/sidebar.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        const DEPT_LABELS = { hr: 'الموارد البشرية', finance: 'المالية', marketing: 'التسويق', operations: 'العمليات', digital: 'التحول الرقمي' };
        const SUGGESTIONS = [
            'تحديث السياسات الداخلية لتشمل الضوابط الجديدة',
            'تطوير برنامج تدريبي مكثف للموظفين في القسم',
            'إعادة هيكلة المهام وتوزيع المسؤوليات داخل الفريق',
            'تحسين نظام المتابعة الشهرية للمؤشرات الأساسية',
            'إطلاق مبادرة تحسين الجودة الشاملة',
            'إخضاع المشاريع المتعثرة لمراجعة أسبوعية دقيقة',
            'تفعيل أدوات التواصل الداخلي لزيادة الكفاءة'
        ];

        function getDept() {
            const params = new URLSearchParams(window.location.search);
            let d = params.get('dept');
            if (!d && typeof Context !== 'undefined') d = Context.getDept();
            return d || 'hr';
        }

        function initChips() {
            const container = document.getElementById('actions-suggestions');
            SUGGESTIONS.forEach(text => {
                const chip = document.createElement('div');
                chip.className = 'suggestion-chip';
                chip.textContent = text;
                chip.onclick = () => {
                    const area = document.getElementById('correctiveActions');
                    area.value = area.value ? area.value + '، ' + text : text;
                };
                container.appendChild(chip);
            });
        }

        async function loadData(dept) {
            const apiType = `CORRECTIONS_${dept.toUpperCase()}`;
            try {
                // محاولة التحميل من النمط الجديد أولاً، ثم القديم للتوافق
                const res = await window.callApiWithTimeout(`/api/dept/analysis?dept=${dept}&type=${apiType}`).catch(() => null);
                if (res && res.data) {
                    document.getElementById('correctiveActions').value = typeof res.data === 'string' ? res.data : (res.data.correctiveActions || '');
                } else {
                    const oldRes = await window.callApiWithTimeout(`/api/corrections/${dept}`).catch(() => null);
                    if (oldRes) {
                        document.getElementById('correctiveActions').value = oldRes.correctiveActions || '';
                    }
                }
            } catch (e) { }
        }

        async function saveData() {
            const dept = getDept();
            const btn = document.getElementById('btnSave');
            const originalHtml = btn.innerHTML;

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> جاري الحفظ...';

            const actions = document.getElementById('correctiveActions').value.trim();
            if (!actions) {
                alert('يرجى إدخال إجراءات تصحيحية');
                btn.disabled = false;
                btn.innerHTML = originalHtml;
                return;
            }

            const apiType = `CORRECTIONS_${dept.toUpperCase()}`;

            try {
                await window.callApiWithTimeout('/api/dept/analysis', {
                    method: 'POST',
                    body: { type: apiType, dept: dept, data: { correctiveActions: actions } }
                });

                if (window.Context && Context.markStepCompleted) await Context.markStepCompleted('corrections');

                showGlobalToast ? showGlobalToast('✅ تم حفظ خطة التصحيح بنجاح') : null;
                setTimeout(() => window.location.href = `/dept-dashboard.html?dept=${dept}`, 1500);
            } catch (err) {
                alert('فشل الحفظ على السيرفر');
                btn.disabled = false;
                btn.innerHTML = originalHtml;
            }
        }

        (async function init() {
            const dept = getDept();
            document.getElementById('dept-context').textContent = `${DEPT_LABELS[dept] || dept} | معالجة فجوات الأداء`;
            if (typeof window.initSidebar === 'function') window.initSidebar();
            initChips();
            await loadData(dept);
        })();
    </script>
</body>

</html>
