<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ستارتكس - المهام</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #667eea;
            --secondary: #764ba2;
            --bg: #0f1117;
            --bg-card: #1a1d2e;
            --bg-card-hover: #232640;
            --text: #e2e8f0;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.08);
            --success: #22c55e;
            --warning: #facc15;
            --danger: #ef4444;
            --info: #38bdf8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            font-family: 'Tajawal', sans-serif;
            color: var(--text);
            min-height: 100vh;
        }

        .top-nav {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            padding: 14px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .top-nav .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            color: white;
            text-decoration: none;
            font-size: 20px;
            font-weight: 700;
        }

        .user-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: white;
        }

        .btn-logout {
            background: rgba(255, 255, 255, 0.15);
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 8px;
            font-family: inherit;
            font-size: 12px;
            cursor: pointer;
        }

        .layout {
            display: flex;
            min-height: calc(100vh - 60px);
        }

        .main-content {
            flex: 1;
            padding: 30px;
            max-width: calc(100% - 220px);
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 24px;
        }

        .page-header h1 {
            font-size: 26px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .page-header h1 i {
            color: var(--primary);
        }

        .page-subtitle {
            color: var(--text-muted);
            font-size: 14px;
            margin-top: 4px;
        }

        .btn-add {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .btn-add:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(102, 126, 234, 0.4);
        }

        /* Cascading Flow */
        .cascade-flow {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 24px;
            padding: 14px 20px;
            background: rgba(102, 126, 234, 0.06);
            border: 1px solid rgba(102, 126, 234, 0.15);
            border-radius: 12px;
            flex-wrap: wrap;
        }

        .cascade-step {
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            color: var(--text-muted);
        }

        .cascade-step:hover {
            background: rgba(255, 255, 255, 0.06);
            color: var(--text);
        }

        .cascade-step.active {
            background: var(--primary);
            color: white;
        }

        .cascade-arrow {
            color: var(--text-muted);
            font-size: 16px;
        }

        .sync-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 10px;
            padding: 3px 8px;
            border-radius: 6px;
            background: rgba(102, 126, 234, 0.1);
            color: var(--primary);
            margin-right: 6px;
        }

        /* Stats */
        .mini-stats {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 14px;
            margin-bottom: 24px;
        }

        .mini-stat {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 16px;
            text-align: center;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .mini-stat::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
        }

        .mini-stat:nth-child(1)::before {
            background: var(--primary);
        }

        .mini-stat:nth-child(2)::before {
            background: var(--success);
        }

        .mini-stat:nth-child(3)::before {
            background: var(--info);
        }

        .mini-stat:nth-child(4)::before {
            background: var(--warning);
        }

        .mini-stat:nth-child(5)::before {
            background: var(--danger);
        }

        .ms-value {
            font-size: 24px;
            font-weight: 800;
        }

        .ms-label {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 3px;
        }

        /* Filter + Search */
        .toolbar {
            display: flex;
            gap: 10px;
            margin-bottom: 18px;
            flex-wrap: wrap;
            align-items: center;
        }

        .ftab {
            padding: 8px 16px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text-muted);
            transition: all 0.3s;
        }

        .ftab:hover {
            border-color: rgba(255, 255, 255, 0.15);
        }

        .ftab.active {
            border-color: var(--primary);
            color: var(--primary);
            background: rgba(102, 126, 234, 0.08);
        }

        .search-box {
            margin-right: auto;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 8px 14px;
            color: var(--text);
            font-family: inherit;
            font-size: 13px;
            min-width: 200px;
        }

        .search-box:focus {
            outline: none;
            border-color: var(--primary);
        }

        /* Task List */
        .task-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .task-item {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 14px;
            transition: all 0.3s;
            cursor: pointer;
        }

        .task-item:hover {
            border-color: rgba(255, 255, 255, 0.15);
            background: var(--bg-card-hover);
        }

        .task-item.done {
            opacity: 0.6;
        }

        .task-check {
            width: 22px;
            height: 22px;
            border-radius: 6px;
            border: 2px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .task-check:hover {
            border-color: var(--success);
        }

        .task-check.checked {
            background: var(--success);
            border-color: var(--success);
            color: white;
        }

        .task-info {
            flex: 1;
            min-width: 0;
        }

        .task-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 3px;
        }

        .task-item.done .task-title {
            text-decoration: line-through;
            color: var(--text-muted);
        }

        .task-chain {
            font-size: 11px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }

        .task-chain-tag {
            padding: 2px 8px;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.03);
        }

        .task-assignee {
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 120px;
        }

        .task-av {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 700;
            color: white;
            flex-shrink: 0;
        }

        .task-assignee-name {
            font-size: 12px;
            color: var(--text-muted);
        }

        .task-priority {
            min-width: 70px;
        }

        .task-priority-badge {
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 600;
        }

        .priority-HIGH {
            background: rgba(239, 68, 68, 0.12);
            color: var(--danger);
        }

        .priority-MEDIUM {
            background: rgba(250, 204, 21, 0.12);
            color: var(--warning);
        }

        .priority-LOW {
            background: rgba(34, 197, 94, 0.12);
            color: var(--success);
        }

        .task-due {
            font-size: 12px;
            color: var(--text-muted);
            min-width: 100px;
            text-align: center;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .task-due.overdue {
            color: var(--danger);
            font-weight: 600;
        }

        .task-actions {
            display: flex;
            gap: 4px;
        }

        .task-btn {
            width: 30px;
            height: 30px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
        }

        .task-btn:hover {
            background: rgba(255, 255, 255, 0.06);
        }

        .task-btn.edit:hover {
            border-color: var(--warning);
            color: var(--warning);
        }

        .task-btn.del:hover {
            border-color: var(--danger);
            color: var(--danger);
        }

        /* Group headers */
        .group-header {
            font-size: 14px;
            font-weight: 700;
            padding: 10px 0;
            margin-top: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border);
            margin-bottom: 8px;
        }

        /* Modal */
        .modal-content {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            color: var(--text);
        }

        .modal-header {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border-radius: 16px 16px 0 0;
            padding: 18px 24px;
            border-bottom: none;
        }

        .modal-body {
            padding: 24px;
        }

        .modal-footer {
            padding: 16px 24px;
            border-top: 1px solid var(--border);
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--text-muted);
        }

        .form-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 14px;
            color: var(--text);
            font-family: inherit;
            font-size: 14px;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .form-input option {
            background: var(--bg-card);
            color: var(--text);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .btn-modal-save {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 10px;
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-modal-cancel {
            background: rgba(255, 255, 255, 0.06);
            color: var(--text);
            border: 1px solid var(--border);
            padding: 10px 24px;
            border-radius: 10px;
            font-family: inherit;
            cursor: pointer;
        }

        .toast-container {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 9999;
        }

        .toast-msg {
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            animation: slideUp 0.3s ease;
            margin-top: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(34, 197, 94, 0.9);
            color: white;
        }

        @keyframes slideUp {
            from {
                transform: translateY(20px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @media (max-width: 768px) {
            .mini-stats {
                grid-template-columns: repeat(2, 1fr);
            }

            .main-content {
                max-width: 100%;
                padding: 16px;
            }

            .task-assignee,
            .task-due {
                display: none;
            }
        }
    </style>
</head>

<body>
    <nav class="top-nav">
        <a href="/dashboard.html" class="brand"><i class="bi bi-gem"></i> ستارتكس</a>
        <div class="user-area">
            <div class="user-avatar">م</div>
            <button class="btn-logout" onclick="localStorage.clear(); location.href='/login.html'"><i
                    class="bi bi-box-arrow-right"></i> خروج</button>
        </div>
    </nav>

    <div class="layout">
        <aside class="sidebar"></aside>
        <div class="main-content">
            <div class="page-header">
                <div>
                    <h1><i class="bi bi-check2-square"></i> المهام اليومية</h1>
                    <p class="page-subtitle">المهام المنزّلة من المشاريع — كل مهمة مربوطة بالسلسلة الاستراتيجية من الهدف
                        حتى التنفيذ الفعلي</p>
                </div>
                <button class="btn-add" onclick="openCreateModal()"><i class="bi bi-plus-lg"></i> مهمة جديدة</button>
            </div>

            <!-- Cascading Flow -->
            <div class="cascade-flow">
                <a href="/objectives.html" class="cascade-step"><i class="bi bi-bullseye"></i> الأهداف</a>
                <i class="bi bi-chevron-left cascade-arrow"></i>
                <a href="/initiatives.html" class="cascade-step"><i class="bi bi-rocket-takeoff"></i> المبادرات</a>
                <i class="bi bi-chevron-left cascade-arrow"></i>
                <a href="/projects.html" class="cascade-step"><i class="bi bi-folder2-open"></i> المشاريع</a>
                <i class="bi bi-chevron-left cascade-arrow"></i>
                <span class="cascade-step active"><i class="bi bi-check2-square"></i> المهام</span>
                <span style="margin-right: auto"></span>
                <span class="sync-badge"><i class="bi bi-arrow-repeat"></i> متزامن مع dePower / Asana / Odoo</span>
            </div>

            <!-- Stats -->
            <div class="mini-stats">
                <div class="mini-stat">
                    <div class="ms-value" id="sTotal">20</div>
                    <div class="ms-label">إجمالي المهام</div>
                </div>
                <div class="mini-stat">
                    <div class="ms-value" id="sDone">8</div>
                    <div class="ms-label">مكتملة</div>
                </div>
                <div class="mini-stat">
                    <div class="ms-value" id="sInProgress">7</div>
                    <div class="ms-label">قيد التنفيذ</div>
                </div>
                <div class="mini-stat">
                    <div class="ms-value" id="sTodo">5</div>
                    <div class="ms-label">لم تبدأ</div>
                </div>
                <div class="mini-stat">
                    <div class="ms-value" id="sOverdue">2</div>
                    <div class="ms-label">متأخرة</div>
                </div>
            </div>

            <!-- Filter -->
            <div class="toolbar">
                <div class="ftab active" onclick="filterTasks('all',this)">الكل</div>
                <div class="ftab" onclick="filterTasks('todo',this)">⬜ لم تبدأ</div>
                <div class="ftab" onclick="filterTasks('in_progress',this)">🔵 جارية</div>
                <div class="ftab" onclick="filterTasks('done',this)">✅ مكتملة</div>
                <input type="text" class="search-box" placeholder="🔍 بحث في المهام..."
                    oninput="searchTasks(this.value)">
            </div>

            <!-- Task List -->
            <div class="task-list" id="taskList"></div>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal fade" id="taskModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle"><i class="bi bi-plus-circle"></i> مهمة جديدة</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="editId">
                    <div class="form-group"><label>عنوان المهمة</label><input type="text" class="form-input"
                            id="formTitle" placeholder="مثال: تصميم صفحة تسجيل الدخول"></div>
                    <div class="form-row">
                        <div class="form-group"><label>المشروع</label>
                            <select class="form-input" id="formProject">
                                <option value="تطوير واجهة التطبيق">تطوير واجهة التطبيق (UI/UX)</option>
                                <option value="بناء Backend APIs">بناء الـ Backend APIs</option>
                                <option value="أتمتة عمليات الشراء">أتمتة عمليات الشراء</option>
                                <option value="نظام إدارة الوثائق">نظام إدارة الوثائق الرقمي</option>
                            </select>
                        </div>
                        <div class="form-group"><label>المكلف</label><input type="text" class="form-input"
                                id="formAssignee" placeholder="اسم الموظف"></div>
                    </div>
                    <div class="form-row">
                        <div class="form-group"><label>الأولوية</label>
                            <select class="form-input" id="formPriority">
                                <option value="HIGH">🔴 عالية</option>
                                <option value="MEDIUM">🟡 متوسطة</option>
                                <option value="LOW">🟢 منخفضة</option>
                            </select>
                        </div>
                        <div class="form-group"><label>الحالة</label>
                            <select class="form-input" id="formStatus">
                                <option value="todo">لم تبدأ</option>
                                <option value="in_progress">قيد التنفيذ</option>
                                <option value="done">مكتملة</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group"><label>تاريخ التسليم</label><input type="date" class="form-input"
                            id="formDue"></div>
                </div>
                <div class="modal-footer">
                    <button class="btn-modal-cancel" data-bs-dismiss="modal">إلغاء</button>
                    <button class="btn-modal-save" onclick="saveTask()"><i class="bi bi-check-lg"></i> حفظ</button>
                </div>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/assets/js/api.js"></script>
    <script src="/assets/js/sidebar.js"></script>
    <script src="/assets/js/ai-advisor.js"></script>
    <script>
        if (window.StartixAPI?.showEntityBanner) {
            StartixAPI.showEntityBanner({ toolName: 'المهام' });
        }
    </script>

            { id: '18', title: 'رفع الوثائق المالية (2024-2025)', project: 'نظام إدارة الوثائق', initiative: 'التحول الرقمي الداخلي', objective: 'أتمتة العمليات', assignee: 'منصور', priority: 'LOW', status: 'done', due: '2026-02-15' },
            { id: '19', title: 'مراجعة تقرير التدقيق الداخلي', project: 'أتمتة عمليات الشراء', initiative: 'التحول الرقمي الداخلي', objective: 'أتمتة العمليات', assignee: 'نورة الشهري', priority: 'HIGH', status: 'done', due: '2026-01-20' },
            { id: '20', title: 'إعداد خطة الاختبار الشامل', project: 'تطوير واجهة التطبيق', initiative: 'إطلاق التطبيق الرقمي', objective: 'رفع رضا العملاء', assignee: 'نور', priority: 'MEDIUM', status: 'todo', due: '2026-03-10' },
        ];

        const statusLabels = { todo: 'لم تبدأ', in_progress: 'جارية', done: 'مكتملة' };
        const priorityLabels = { HIGH: 'عالية', MEDIUM: 'متوسطة', LOW: 'منخفضة' };

        function isOverdue(due, status) {
            return status !== 'done' && new Date(due) < new Date();
        }

        function getFiltered() {
            let data = tasks;
            if (currentFilter !== 'all') data = data.filter(t => t.status === currentFilter);
            if (searchQuery) data = data.filter(t => t.title.includes(searchQuery) || t.project.includes(searchQuery) || t.assignee.includes(searchQuery));
            return data;
        }

        function filterTasks(f, el) {
            currentFilter = f;
            document.querySelectorAll('.ftab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            renderAll();
        }
        function searchTasks(q) { searchQuery = q; renderAll(); }

        function renderStats() {
            document.getElementById('sTotal').textContent = tasks.length;
            document.getElementById('sDone').textContent = tasks.filter(t => t.status === 'done').length;
            document.getElementById('sInProgress').textContent = tasks.filter(t => t.status === 'in_progress').length;
            document.getElementById('sTodo').textContent = tasks.filter(t => t.status === 'todo').length;
            document.getElementById('sOverdue').textContent = tasks.filter(t => isOverdue(t.due, t.status)).length;
        }

        function toggleTask(id) {
            const t = tasks.find(x => x.id === id);
            if (t) {
                t.status = t.status === 'done' ? 'todo' : 'done';
                renderAll();
                showToast(t.status === 'done' ? 'تم إكمال المهمة ✓' : 'تم إعادة فتح المهمة');
            }
        }

        function renderList() {
            const data = getFiltered();
            // Group by project
            const groups = {};
            data.forEach(t => {
                if (!groups[t.project]) groups[t.project] = [];
                groups[t.project].push(t);
            });

            let html = '';
            for (const [project, items] of Object.entries(groups)) {
                html += `<div class="group-header"><i class="bi bi-folder2-open"></i> ${project} <span style="font-size:11px;font-weight:400">(${items.length} مهمة)</span></div>`;
                items.forEach(t => {
                    const overdue = isOverdue(t.due, t.status);
                    const avChar = t.assignee.charAt(0);
                    const avColor = avColors[t.assignee.charCodeAt(0) % avColors.length];
                    html += `
          <div class="task-item ${t.status === 'done' ? 'done' : ''}">
            <div class="task-check ${t.status === 'done' ? 'checked' : ''}" onclick="toggleTask('${t.id}')">
              ${t.status === 'done' ? '<i class="bi bi-check" style="font-size:14px"></i>' : ''}
            </div>
            <div class="task-info">
              <div class="task-title">${t.title}</div>
              <div class="task-chain">
                <span class="task-chain-tag" style="color:var(--primary)"><i class="bi bi-bullseye"></i> ${t.objective}</span>
                <span class="task-chain-tag" style="color:var(--warning)"><i class="bi bi-rocket-takeoff"></i> ${t.initiative}</span>
              </div>
            </div>
            <div class="task-assignee">
              <div class="task-av" style="background:${avColor}">${avChar}</div>
              <span class="task-assignee-name">${t.assignee}</span>
            </div>
            <div class="task-priority">
              <span class="task-priority-badge priority-${t.priority}">${priorityLabels[t.priority]}</span>
            </div>
            <div class="task-due ${overdue ? 'overdue' : ''}">
              <i class="bi ${overdue ? 'bi-exclamation-triangle' : 'bi-calendar3'}"></i> ${t.due}
            </div>
            <div class="task-actions">
              <button class="task-btn edit" onclick="openEditModal('${t.id}')"><i class="bi bi-pencil"></i></button>
              <button class="task-btn del" onclick="deleteTask('${t.id}')"><i class="bi bi-trash3"></i></button>
            </div>
          </div>`;
                });
            }
            document.getElementById('taskList').innerHTML = html;
        }

        function renderAll() { renderStats(); renderList(); }

        function openCreateModal() {
            document.getElementById('modalTitle').innerHTML = '<i class="bi bi-plus-circle"></i> مهمة جديدة';
            document.getElementById('editId').value = '';
            ['formTitle', 'formAssignee', 'formDue'].forEach(id => document.getElementById(id).value = '');
            document.getElementById('formPriority').value = 'MEDIUM';
            document.getElementById('formStatus').value = 'todo';
            new bootstrap.Modal(document.getElementById('taskModal')).show();
        }

        function openEditModal(id) {
            const t = tasks.find(x => x.id === id);
            if (!t) return;
            document.getElementById('modalTitle').innerHTML = '<i class="bi bi-pencil-square"></i> تعديل المهمة';
            document.getElementById('editId').value = t.id;
            document.getElementById('formTitle').value = t.title;
            document.getElementById('formProject').value = t.project;
            document.getElementById('formAssignee').value = t.assignee;
            document.getElementById('formPriority').value = t.priority;
            document.getElementById('formStatus').value = t.status;
            document.getElementById('formDue').value = t.due;
            new bootstrap.Modal(document.getElementById('taskModal')).show();
        }

        function saveTask() {
            const id = document.getElementById('editId').value;
            const project = document.getElementById('formProject').value;
            // Find initiative/objective from existing tasks with same project
            const ref = tasks.find(t => t.project === project);
            const data = {
                title: document.getElementById('formTitle').value.trim(),
                project,
                initiative: ref ? ref.initiative : '',
                objective: ref ? ref.objective : '',
                assignee: document.getElementById('formAssignee').value.trim(),
                priority: document.getElementById('formPriority').value,
                status: document.getElementById('formStatus').value,
                due: document.getElementById('formDue').value,
            };
            if (!data.title) return;
            if (id) {
                const t = tasks.find(x => x.id === id);
                if (t) Object.assign(t, data);
                showToast('تم تحديث المهمة ✓');
            } else {
                tasks.unshift({ id: Date.now().toString(), ...data });
                showToast('تم إنشاء المهمة ✓');
            }
            bootstrap.Modal.getInstance(document.getElementById('taskModal')).hide();
            renderAll();
        }

        function deleteTask(id) {
            if (!confirm('حذف المهمة؟')) return;
            tasks = tasks.filter(x => x.id !== id);
            renderAll(); showToast('تم الحذف ✓');
        }

        function showToast(msg) {
            const t = document.createElement('div');
            t.className = 'toast-msg';
            t.innerHTML = `<i class="bi bi-check-circle"></i> ${msg}`;
            document.getElementById('toastContainer').appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }

        renderAll();
    </script>
