<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ستارتكس — التشخيص الاستراتيجي المطور V2</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/css/index.css">
    <style>
        :root {
            --primary: #7c3aed;
            --primary-glow: rgba(124, 58, 237, 0.2);
            --bg-dark: #0b0d14;
            --card-glass: rgba(26, 29, 46, 0.7);
            --border-glass: rgba(255, 255, 255, 0.08);
        }

        body {
            background-color: var(--bg-dark);
            background-image:
                radial-gradient(circle at 10% 10%, rgba(124, 58, 237, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(56, 189, 248, 0.1) 0%, transparent 40%);
            font-family: 'Tajawal', sans-serif;
            color: #e2e8f0;
            min-height: 100vh;
        }

        .diag-wrapper {
            max-width: 750px;
            margin: 60px auto;
            padding: 0 20px;
        }

        .diag-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .diag-logo {
            font-size: 28px;
            font-weight: 900;
            background: linear-gradient(135deg, #a78bfa, #38bdf8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .progress-container {
            margin-bottom: 30px;
        }

        .progress-bar-track {
            height: 8px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #7c3aed, #ec4899);
            width: 0%;
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .diag-card {
            background: var(--card-glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-glass);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            animation: slideUp 0.6s ease;
        }

        .question-text {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 30px;
            line-height: 1.4;
        }

        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-glass);
            border-radius: 16px;
            padding: 18px 24px;
            text-align: right;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .option-btn:hover {
            background: rgba(124, 58, 237, 0.1);
            border-color: var(--primary);
            transform: translateX(-5px);
        }

        .option-btn.selected {
            background: var(--primary-glow);
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(124, 58, 237, 0.2);
        }

        .option-title {
            font-weight: 700;
            font-size: 16px;
            display: block;
        }

        .option-desc {
            font-size: 13px;
            color: #94a3b8;
            margin-top: 4px;
        }

        .nav-btn {
            border-radius: 14px;
            padding: 12px 30px;
            font-weight: 700;
            transition: 0.3s;
        }

        .btn-primary-stx {
            background: linear-gradient(135deg, #7c3aed, #a78bfa);
            border: none;
            color: white;
        }

        .btn-primary-stx:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(124, 58, 237, 0.4);
        }

        /* Result Section Styles */
        .result-section {
            display: none;
        }

        .score-circle {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            margin: 0 auto 30px;
            border: 8px solid var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            font-weight: 900;
            background: var(--primary-glow);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .loader {
            display: none;
            text-align: center;
            padding: 40px;
        }
    </style>
</head>

<body>
    <div class="diag-wrapper">
        <div class="diag-header">
            <div class="diag-logo"><i class="bi bi-activity"></i> Startix</div>
            <div id="diagSubtitle" class="text-muted">جاري تحميل التشخيص...</div>
        </div>

        <div class="progress-container">
            <div class="d-flex justify-content-between mb-2 small text-muted">
                <span id="progressLabel">التقدم: 0%</span>
                <span id="stepLabel">جاري البدء...</span>
            </div>
            <div class="progress-bar-track">
                <div class="progress-bar-fill" id="progressBarFill"></div>
            </div>
        </div>

        <!-- Question View -->
        <div id="questionView" class="diag-card">
            <div id="questionContent">
                <div class="loader" id="mainLoader" style="display: block;">
                    <div class="spinner-border text-primary" role="status"></div>
                    <p class="mt-3">جاري تحضير الأسئلة الاستراتيجية...</p>
                </div>
                <div id="questionBody" style="display: none;">
                    <div class="question-text" id="qText">السؤال هنا؟</div>
                    <div class="options-grid" id="qOptions">
                        <!-- Options generated here -->
                    </div>
                </div>
            </div>
        </div>

        <!-- Result View -->
        <div id="resultView" class="diag-card result-section">
            <div class="text-center">
                <div class="score-circle" id="resultScore">85</div>
                <h3>تشخيصك جاهز!</h3>
                <p class="text-muted mb-4">بناءً على إجاباتك، إليك نظرة سريعة على وضعك:</p>

                <div id="resultDetails" class="row g-3 text-start mb-4">
                    <!-- Results populated here -->
                </div>

                <div class="d-grid">
                    <button class="btn btn-primary-stx nav-btn btn-lg" onclick="goToSave()">حفظ النتائج وتفعيل
                        الحساب</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let tempSessionId = null;
        let currentQuestion = null;
        let answeredCount = 0;
        let totalQuestions = 4; // Screening usually has 4

        async function init() {
            try {
                const res = await fetch('/api/diagnostic/start', { method: 'POST' });
                const data = await res.json();
                if (data.success) {
                    tempSessionId = data.data.tempSessionId;
                    renderQuestion(data.data.nextQuestion);
                    document.getElementById('diagSubtitle').textContent = 'تشخيص ذكي مخصص لدورك';
                }
            } catch (err) {
                console.error('Failed to start session', err);
                alert('خطأ في الاتصال بالخادم. يرجى المحاولة لاحقاً.');
            }
        }

        function renderQuestion(q) {
            if (!q) {
                showResults();
                return;
            }
            currentQuestion = q;

            // UI Switch
            document.getElementById('mainLoader').style.display = 'none';
            document.getElementById('questionBody').style.display = 'block';

            // Set Text
            document.getElementById('qText').textContent = q.questionText;

            // Build Options
            const optionsHtml = q.options.map(opt => `
                <div class="option-btn" onclick="submitAnswer('${q.questionKey}', '${opt.value}', this)">
                    <span class="option-title">${opt.label}</span>
                    ${opt.description ? `<span class="option-desc">${opt.description}</span>` : ''}
                </div>
            `).join('');

            document.getElementById('qOptions').innerHTML = optionsHtml;

            // Update Progress (Estimate)
            answeredCount++;
            const pct = Math.min(Math.round(((answeredCount - 1) / 5) * 100), 100);
            updateProgress(pct, `السؤال ${answeredCount}`);
        }

        async function submitAnswer(key, value, el) {
            // Visual feedback
            const options = document.querySelectorAll('.option-btn');
            options.forEach(o => o.classList.remove('selected'));
            el.classList.add('selected');

            try {
                const res = await fetch('/api/diagnostic/answer', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        tempSessionId,
                        questionKey: key,
                        answerValue: value
                    })
                });
                const data = await res.json();

                if (data.success) {
                    // Delay for animation feel
                    setTimeout(() => {
                        renderQuestion(data.data.nextQuestion);
                    }, 300);
                }
            } catch (err) {
                console.error('Submit failed', err);
            }
        }

        function updateProgress(pct, label) {
            document.getElementById('progressBarFill').style.width = pct + '%';
            document.getElementById('progressLabel').textContent = `التقدم: ${pct}%`;
            document.getElementById('stepLabel').textContent = label;
        }

        async function showResults() {
            document.getElementById('questionView').style.display = 'none';
            document.getElementById('resultView').style.display = 'block';
            updateProgress(100, 'التشخيص مكتمل');

            try {
                const res = await fetch(`/api/diagnostic/result/${tempSessionId}`);
                const data = await res.json();
                if (data.success) {
                    const { healthScores, stressLevel } = data.data;
                    document.getElementById('resultScore').textContent = Math.round((healthScores.admin + healthScores.finance + healthScores.operations) / 3 * 10);

                    document.getElementById('resultDetails').innerHTML = `
                        <div class="col-6">
                            <div class="p-3 border rounded-3 bg-opacity-10 bg-info">
                                <small class="text-muted d-block">مستوى التوتر</small>
                                <strong class="${stressLevel === 'critical' ? 'text-danger' : 'text-success'}">${stressLevel.toUpperCase()}</strong>
                            </div>
                        </div>
                        <div class="col-6">
                            <div class="p-3 border rounded-3 bg-opacity-10 bg-primary">
                                <small class="text-muted d-block">إدارة العمليات</small>
                                <strong>${healthScores.operations}/10</strong>
                            </div>
                        </div>
                    `;
                }
            } catch (err) {
                console.error('Fetch results failed', err);
            }
        }

        function goToSave() {
            // Navigate to the save/registration step
            window.location.href = `/diagnostic-save.html?tempId=${tempSessionId}`;
        }

        init();
    </script>
</body>

</html>
