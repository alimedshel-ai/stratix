<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <title>ستارتكس | التحليل الرقمي - الامتثال</title>
    <link rel="stylesheet" href="/css/dept-pages.css">
    <script src="/js/context-manager.js"></script>
    <script src="/js/dept-page.js"></script>
</head>

<body>
    <div class="container">
        <h1>📊 التحليل الرقمي – الامتثال</h1>
        <div class="sub">أدخل الأرقام والمؤشرات الرئيسية لقسم الامتثال</div>
        <form id="deepForm">
            <div class="question"><label>عدد التراخيص والتصاريح النشطة</label><input type="number" name="licenses"
                    placeholder="مثال: 15" required></div>
            <div class="question"><label>نسبة الالتزام بالسياسات الداخلية (%)</label><input type="number"
                    name="policy_compliance" placeholder="مثال: 85" required></div>
            <div class="question"><label>عدد المخالفات التنظيمية المسجلة</label><input type="number" name="violations"
                    placeholder="مثال: 2" required></div>
            <div class="question"><label>متوسط مدة حل المخالفات (أيام)</label><input type="number"
                    name="resolution_time" placeholder="مثال: 10" required></div>
            <div class="question"><label>تكلفة الامتثال السنوية (ريال)</label><input type="number"
                    name="compliance_cost" placeholder="مثال: 80000" required></div>
            <button type="submit">حفظ ومتابعة للتقييم الوصفي</button>
        </form>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const ok = await DeptPage.init('compliance');
            if (!ok) return;
            let saved = await DeptPage.loadFromAPI('DEEP') || Context.getTemp('deep_results') || DeptPage.migrateFromLocalStorage('stratix_compliance_deep_results');
            DeptPage.fillForm(saved);
            document.getElementById('deepForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const results = Object.fromEntries(new FormData(e.target));
                Context.setTemp('deep_results', results);
                const ok = await DeptPage.saveToAPI('DEEP', results);
                DeptPage.showMessage(ok ? 'تم حفظ التحليل الرقمي بنجاح' : 'تم حفظ التحليل محلياً', !ok);
                setTimeout(() => window.location.href = `/compliance-audit.html?dept=compliance`, 1500);
            });
        });
    </script>
</body>

</html>
