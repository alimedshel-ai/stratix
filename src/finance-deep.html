<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <title>ستارتكس | التحليل الرقمي - المالية</title>
    <link rel="stylesheet" href="/css/dept-pages.css">
    <script src="/js/context-manager.js"></script>
    <script src="/js/dept-page.js"></script>
</head>

<body>
    <div class="container">
        <h1>📊 التحليل الرقمي – المالية</h1>
        <div class="sub">أدخل الأرقام والمؤشرات الرئيسية لقسم المالية</div>
        <form id="deepForm">
            <div class="question">
                <label>الإيرادات السنوية (ريال)</label>
                <input type="number" name="revenue" placeholder="مثال: 5000000" required>
            </div>
            <div class="question">
                <label>صافي الربح (ريال)</label>
                <input type="number" name="net_profit" placeholder="مثال: 750000" required>
            </div>
            <div class="question">
                <label>هامش الربح (%)</label>
                <input type="number" name="profit_margin" placeholder="مثال: 15" step="0.1" required>
            </div>
            <div class="question">
                <label>نسبة السيولة (Current Ratio)</label>
                <input type="number" name="current_ratio" placeholder="مثال: 1.5" step="0.1" required>
            </div>
            <div class="question">
                <label>نسبة الدين إلى حقوق الملكية</label>
                <input type="number" name="debt_to_equity" placeholder="مثال: 0.8" step="0.1" required>
            </div>
            <button type="submit">حفظ ومتابعة للتقييم الوصفي</button>
        </form>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const ok = await DeptPage.init('finance');
            if (!ok) return;
            let saved = await DeptPage.loadFromAPI('DEEP') || Context.getTemp('deep_results') || DeptPage.migrateFromLocalStorage('stratix_finance_deep_results');
            DeptPage.fillForm(saved);
            document.getElementById('deepForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const results = Object.fromEntries(new FormData(e.target));
                Context.setTemp('deep_results', results);
                const ok = await DeptPage.saveToAPI('DEEP', results);
                DeptPage.showMessage(ok ? 'تم حفظ التحليل الرقمي بنجاح' : 'تم حفظ التحليل محلياً', !ok);
                setTimeout(() => window.location.href = `/finance-audit.html?dept=finance`, 1500);
            });
        });
    </script>
</body>

</html>
