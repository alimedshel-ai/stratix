<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ستارتكس - رحلتك الاستراتيجية</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/css/index.css">
    <style>
        :root {
            --primary: #667eea;
            --secondary: #764ba2;
            --bg: #0b0d12;
            --bg-card: #1a1d2e;
            --text: #e2e8f0;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.08);
            --success: #22c55e;
            --warning: #facc15;
            --danger: #ef4444;
            --info: #38bdf8;
        }

        body {
            background: var(--bg);
            font-family: 'Tajawal', sans-serif;
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .gate-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            position: relative;
        }

        .gate-content {
            position: relative;
            z-index: 1;
            text-align: center;
            max-width: 900px;
            animation: fadeIn 0.8s ease;
        }

        .gate-title {
            font-size: 42px;
            font-weight: 900;
            margin-bottom: 12px;
            background: linear-gradient(135deg, var(--primary), var(--secondary), var(--info));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .gate-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            width: 100%;
            margin-top: 40px;
        }

        .gate-option {
            background: var(--bg-card);
            border: 2px solid var(--border);
            border-radius: 24px;
            padding: 40px 30px;
            cursor: pointer;
            transition: all 0.4s;
            text-align: center;
            position: relative;
        }

        .gate-option:hover {
            border-color: var(--primary);
            transform: translateY(-8px);
            background: rgba(255, 255, 255, 0.03);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .journey-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .stx-sidebar-container {
            width: 260px;
            flex-shrink: 0;
            background: #1a1d2e;
            border-left: 1px solid var(--border);
        }

        .stx-wrapper {
            display: flex;
            min-height: 100vh;
        }

        .journey-nav-btn {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 12px;
            font-weight: 800;
            transition: 0.3s;
        }
    </style>
</head>

<body>
    <!-- GATE PAGE (Role/Path Selection) -->
    <div class="gate-page" id="gatePage">
        <div class="gate-content">
            <h1 class="gate-title">مرحباً بك في رحلتك الاستراتيجية</h1>
            <p class="fs-5 text-muted mb-5">اختر المسار الذي ترغب في استكشافه اليوم لتمكين إدارتك من الوصول للريادة.</p>

            <div class="gate-options">
                <div class="gate-option" onclick="startJourney('diagnostic')">
                    <div class="fs-1 mb-3">🔍</div>
                    <h3 class="fw-900 mb-2">التشخيص العميق</h3>
                    <p class="text-muted small">تحليل الوضع الراهن للإدارة، الفجوات، والمخاطر التشغيلية.</p>
                </div>
                <div class="gate-option" onclick="startJourney('planning')">
                    <div class="fs-1 mb-3">🎯</div>
                    <h3 class="fw-900 mb-2">التخطيط الاستراتيجي</h3>
                    <p class="text-muted small">رسم التوجهات، الأهداف (BSC)، ومؤشرات الأداء (OKRs).</p>
                </div>
            </div>

            <div class="mt-5">
                <a href="/dept-dashboard.html" class="text-primary text-decoration-none fw-800">الانتقال للوحة القيادة
                    مباشرة <i class="bi bi-arrow-left ms-1"></i></a>
            </div>
        </div>
    </div>

    <!-- JOURNEY INTERFACE -->
    <div class="journey-page" id="journeyPage" style="display:none">
        <div class="stx-wrapper">
            <aside class="stx-sidebar-container" id="sidebar"></aside>

            <main class="flex-grow-1 p-5">
                <div id="journeyContent">
                    <!-- Dynamic Step Content Here -->
                    <div class="text-center py-5">
                        <div class="spinner-border text-primary"></div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/utils.js"></script>
    <script src="/js/context-manager.js"></script>
    <script src="/js/sidebar.js"></script>
    <script src="/js/dept-page.js"></script>

    <script>
        (async function () {
            // 🛡️ تهيئة الصفحة (تضمن تحميل المستخدم والقسم)
            const dept = await window.initDeptPage();
            if (!dept) return;

            await DeptPage.init(dept);

            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('mode') === 'journey') {
                showJourney();
            }
        })();

        function startJourney(type) {
            const dept = Context.getDept() || 'hr';
            if (type === 'diagnostic') {
                window.location.href = `/dept-health.html?dept=${dept}`;
            } else {
                window.location.href = `/scenarios.html?dept=${dept}`;
            }
        }

        function showJourney() {
            document.getElementById('gatePage').style.display = 'none';
            document.getElementById('journeyPage').style.display = 'block';
            if (window.initSidebar) window.initSidebar();
        }
    </script>
</body>

</html>
