<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ستارتكس - خريطة المخاطر</title>
    <meta name="description" content="خريطة حرارية تفاعلية للمخاطر الاستراتيجية">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #0a0b10;
            --bg2: #12141f;
            --card: #171a2a;
            --card-hover: #1e2236;
            --text: #e2e8f0;
            --muted: #7a8599;
            --border: rgba(255, 255, 255, 0.06);
            --primary: #667eea;
            --secondary: #764ba2;
            --green: #22c55e;
            --yellow: #facc15;
            --red: #ef4444;
            --blue: #38bdf8;
            --purple: #a78bfa;
            --orange: #f97316
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        body {
            background: var(--bg);
            font-family: 'Tajawal', sans-serif;
            color: var(--text);
            min-height: 100vh
        }

        .page-wrapper {
            display: flex;
            min-height: 100vh
        }

        .main-content {
            flex: 1;
            min-width: 0;
            padding: 28px 32px
        }

        .risk-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 24px
        }

        .risk-title {
            font-size: 28px;
            font-weight: 900
        }

        .risk-title span {
            background: linear-gradient(135deg, var(--red), var(--orange));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent
        }

        /* Stats */
        .risk-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 12px;
            margin-bottom: 24px
        }

        .risk-stat {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 16px;
            text-align: center
        }

        .risk-stat-num {
            font-size: 28px;
            font-weight: 900
        }

        .risk-stat-label {
            font-size: 11px;
            color: var(--muted);
            margin-top: 2px
        }

        /* Layout */
        .risk-layout {
            display: grid;
            grid-template-columns: 1fr 340px;
            gap: 20px
        }

        /* Heat Map */
        .heatmap-wrap {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            position: relative
        }

        .heatmap-title {
            font-size: 16px;
            font-weight: 800;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px
        }

        .heatmap-grid {
            display: grid;
            grid-template-columns: 40px repeat(5, 1fr);
            grid-template-rows: repeat(5, 1fr) 30px;
            gap: 2px;
            aspect-ratio: 1.1
        }

        .heatmap-ylabel {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 700;
            color: var(--muted);
            writing-mode: vertical-rl;
            transform: rotate(180deg)
        }

        .heatmap-xlabel {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 700;
            color: var(--muted)
        }

        .heatmap-cell {
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            min-height: 70px;
            flex-wrap: wrap;
            gap: 4px;
            padding: 4px
        }

        .heatmap-cell:hover {
            transform: scale(1.03);
            z-index: 2;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4)
        }

        .heatmap-risk-dot {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: 800;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            position: relative
        }

        .heatmap-risk-dot:hover {
            transform: scale(1.2);
            border-color: white;
            z-index: 3
        }

        .heatmap-risk-dot .tooltip {
            position: absolute;
            bottom: calc(100% + 8px);
            right: 50%;
            transform: translateX(50%);
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 11px;
            white-space: nowrap;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 10;
            color: var(--text);
            font-weight: 500
        }

        .heatmap-risk-dot:hover .tooltip {
            opacity: 1
        }

        /* Axis labels */
        .heatmap-axis-label {
            text-align: center;
            font-size: 12px;
            font-weight: 700;
            color: var(--muted);
            padding: 8px 0
        }

        .heatmap-x-axis {
            grid-column: 2/7;
            text-align: center;
            font-size: 12px;
            font-weight: 700;
            color: var(--muted)
        }

        .heatmap-y-axis {
            position: absolute;
            right: -40px;
            top: 50%;
            transform: rotate(-90deg) translateX(50%);
            font-size: 12px;
            font-weight: 700;
            color: var(--muted);
            white-space: nowrap
        }

        /* Risk color zones */
        .zone-critical {
            background: rgba(239, 68, 68, 0.25)
        }

        .zone-high {
            background: rgba(249, 115, 22, 0.2)
        }

        .zone-medium {
            background: rgba(250, 204, 21, 0.15)
        }

        .zone-low {
            background: rgba(34, 197, 94, 0.1)
        }

        /* Sidebar */
        .risk-sidebar {
            display: flex;
            flex-direction: column;
            gap: 16px
        }

        .risk-panel {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 18px
        }

        .risk-panel-title {
            font-size: 14px;
            font-weight: 800;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px
        }

        .risk-item {
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 6px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent
        }

        .risk-item:hover {
            background: rgba(255, 255, 255, 0.03);
            border-color: rgba(255, 255, 255, 0.06)
        }

        .risk-item-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px
        }

        .risk-severity {
            width: 10px;
            height: 10px;
            border-radius: 3px;
            flex-shrink: 0
        }

        .risk-item-name {
            font-size: 13px;
            font-weight: 700;
            flex: 1
        }

        .risk-item-score {
            font-size: 12px;
            font-weight: 800;
            padding: 2px 8px;
            border-radius: 6px
        }

        .risk-item-desc {
            font-size: 11px;
            color: var(--muted);
            line-height: 1.5
        }

        .risk-item-meta {
            display: flex;
            gap: 8px;
            margin-top: 6px;
            font-size: 10px;
            color: var(--muted)
        }

        .risk-category {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 0;
            border-bottom: 1px solid var(--border)
        }

        .risk-category:last-child {
            border-bottom: none
        }

        .risk-cat-icon {
            font-size: 18px
        }

        .risk-cat-name {
            flex: 1;
            font-size: 12px;
            font-weight: 600
        }

        .risk-cat-count {
            font-size: 12px;
            font-weight: 700;
            color: var(--primary)
        }

        .risk-cat-bar {
            width: 60px;
            height: 5px;
            border-radius: 3px;
            background: rgba(255, 255, 255, 0.06);
            overflow: hidden
        }

        .risk-cat-fill {
            height: 100%;
            border-radius: 3px
        }

        /* Detail Modal */
        .risk-modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 99998;
            display: none;
            align-items: center;
            justify-content: center
        }

        .risk-modal-overlay.open {
            display: flex
        }

        .risk-modal {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 28px;
            width: min(500px, 92vw);
            max-height: 85vh;
            overflow-y: auto
        }

        .risk-modal-close {
            float: left;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            border: none;
            background: rgba(255, 255, 255, 0.05);
            color: var(--muted);
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center
        }

        .risk-detail-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
            margin-top: 8px
        }

        .risk-detail-sev {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px
        }

        .risk-detail-scores {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin: 16px 0
        }

        .risk-detail-score {
            text-align: center;
            padding: 12px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 10px
        }

        .risk-detail-score-num {
            font-size: 24px;
            font-weight: 900
        }

        .risk-detail-score-label {
            font-size: 10px;
            color: var(--muted);
            margin-top: 2px
        }

        .risk-mitigation {
            padding: 12px;
            background: rgba(34, 197, 94, 0.05);
            border: 1px solid rgba(34, 197, 94, 0.1);
            border-radius: 10px;
            margin-top: 12px
        }

        .risk-mitigation h4 {
            font-size: 13px;
            font-weight: 700;
            color: var(--green);
            margin-bottom: 6px
        }

        .risk-mitigation ul {
            list-style: none;
            padding: 0
        }

        .risk-mitigation li {
            font-size: 12px;
            padding: 4px 0;
            color: var(--muted);
            display: flex;
            align-items: center;
            gap: 6px
        }

        .risk-mitigation li::before {
            content: '✅';
            font-size: 10px
        }

        /* Filters */
        .risk-filters {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: center
        }

        .risk-filter-select {
            padding: 8px 14px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--card);
            color: var(--text);
            font-family: inherit;
            font-size: 13px;
            cursor: pointer;
            transition: border-color 0.2s
        }

        .risk-filter-select:focus {
            outline: none;
            border-color: var(--primary)
        }

        .btn-add-risk {
            padding: 8px 20px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, var(--red), var(--orange));
            color: white;
            font-family: inherit;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.3s;
            margin-right: auto
        }

        .btn-add-risk:hover {
            transform: scale(1.03);
            box-shadow: 0 4px 20px rgba(239, 68, 68, 0.3)
        }

        /* Add Risk Modal */
        .add-risk-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.65);
            z-index: 99999;
            display: none;
            align-items: center;
            justify-content: center
        }

        .add-risk-overlay.open {
            display: flex
        }

        .add-risk-form {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 28px;
            width: min(520px, 94vw);
            max-height: 90vh;
            overflow-y: auto
        }

        .add-risk-form h3 {
            font-size: 18px;
            font-weight: 900;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 8px
        }

        .form-group {
            margin-bottom: 14px
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 4px;
            color: var(--muted)
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px 14px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--bg2);
            color: var(--text);
            font-family: inherit;
            font-size: 13px;
            transition: border-color 0.2s
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary)
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px
        }

        .form-actions {
            display: flex;
            gap: 10px;
            margin-top: 18px;
            justify-content: flex-end
        }

        .btn-form {
            padding: 10px 24px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text);
            font-family: inherit;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s
        }

        .btn-form:hover {
            background: rgba(255, 255, 255, 0.05)
        }

        .btn-form.primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            color: white;
            font-weight: 700
        }

        .btn-form.primary:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.3)
        }

        .risk-count-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 10px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 700;
            background: rgba(102, 126, 234, 0.1);
            color: var(--primary)
        }

        @media(max-width:900px) {
            .risk-layout {
                grid-template-columns: 1fr
            }
        }

        @media(max-width:600px) {
            .main-content {
                padding: 16px
            }
        }
    </style>
</head>

<body>
    <div class="page-wrapper">
        <div id="sidebar-container"></div>
        <div class="main-content">
            <div class="risk-header">
                <div>
                    <h1 class="risk-title"><i class="bi bi-shield-exclamation"></i> خريطة <span>المخاطر</span></h1>
                    <div style="font-size:13px;color:var(--muted);margin-top:4px">خريطة حرارية تفاعلية للمخاطر
                        الاستراتيجية — <span class="risk-count-badge" id="riskCountBadge">10 مخاطر</span></div>
                </div>
            </div>

            <!-- Stats -->
            <div class="risk-stats" id="riskStats"></div>

            <!-- Filters -->
            <div class="risk-filters">
                <select class="risk-filter-select" id="filterCategory" onchange="applyFilters()">
                    <option value="">🏷️ كل الفئات</option>
                    <option value="تشغيلي">⚙️ تشغيلي</option>
                    <option value="بشري">👤 بشري</option>
                    <option value="مالي">💰 مالي</option>
                    <option value="سوق">📊 سوق</option>
                    <option value="تقني">💻 تقني</option>
                    <option value="قانوني">⚖️ قانوني</option>
                </select>
                <select class="risk-filter-select" id="filterSeverity" onchange="applyFilters()">
                    <option value="">⚡ كل المستويات</option>
                    <option value="critical">🔴 حرج (16+)</option>
                    <option value="high">🟠 مرتفع (10-15)</option>
                    <option value="medium">🟡 متوسط (5-9)</option>
                    <option value="low">🟢 منخفض (1-4)</option>
                </select>
                <select class="risk-filter-select" id="filterOwner" onchange="applyFilters()">
                    <option value="">👤 كل المسؤولين</option>
                </select>
                <button class="btn-add-risk" onclick="openAddRisk()">
                    <i class="bi bi-plus-circle"></i> إضافة خطر جديد
                </button>
            </div>

            <!-- Main Layout -->
            <div class="risk-layout">
                <!-- Heat Map -->
                <div class="heatmap-wrap">
                    <div class="heatmap-title"><i class="bi bi-grid-3x3-gap" style="color:var(--red)"></i> خريطة الحرارة
                        — الاحتمال × التأثير</div>
                    <div style="text-align:center;font-size:12px;font-weight:700;color:var(--muted);margin-bottom:4px">←
                        التأثير →</div>
                    <div class="heatmap-grid" id="heatmapGrid"></div>
                    <div
                        style="text-align:center;font-size:12px;font-weight:700;color:var(--muted);margin-top:8px;display:flex;justify-content:space-between;padding:0 44px">
                        <span>ضئيل</span><span>منخفض</span><span>متوسط</span><span>مرتفع</span><span>كارثي</span>
                    </div>
                </div>

                <!-- Sidebar -->
                <div class="risk-sidebar">
                    <!-- Top Risks -->
                    <div class="risk-panel">
                        <div class="risk-panel-title"><i class="bi bi-exclamation-triangle"
                                style="color:var(--red)"></i> أعلى المخاطر</div>
                        <div id="topRisks"></div>
                    </div>

                    <!-- By Category -->
                    <div class="risk-panel">
                        <div class="risk-panel-title"><i class="bi bi-pie-chart" style="color:var(--purple)"></i> حسب
                            الفئة</div>
                        <div id="riskCategories"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Detail Modal -->
    <div class="risk-modal-overlay" id="riskModal" onclick="if(event.target===this)closeRiskModal()">
        <div class="risk-modal">
            <button class="risk-modal-close" onclick="closeRiskModal()"><i class="bi bi-x-lg"></i></button>
            <div id="riskModalContent"></div>
        </div>
    </div>

    <!-- Add Risk Modal -->
    <div class="add-risk-overlay" id="addRiskOverlay" onclick="if(event.target===this)closeAddRisk()">
        <div class="add-risk-form">
            <h3><i class="bi bi-plus-circle" style="color:var(--red)"></i> إضافة خطر جديد</h3>
            <div class="form-group">
                <label>اسم الخطر *</label>
                <input type="text" id="newRiskName" placeholder="مثال: تأخر مشروع التحول الرقمي">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>الفئة *</label>
                    <select id="newRiskCategory">
                        <option value="تشغيلي">⚙️ تشغيلي</option>
                        <option value="بشري">👤 بشري</option>
                        <option value="مالي">💰 مالي</option>
                        <option value="سوق">📊 سوق</option>
                        <option value="تقني">💻 تقني</option>
                        <option value="قانوني">⚖️ قانوني</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>المسؤول *</label>
                    <input type="text" id="newRiskOwner" placeholder="اسم المسؤول">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>احتمال الحدوث (1-5) *</label>
                    <select id="newRiskProb">
                        <option value="1">1 — نادر</option>
                        <option value="2">2 — ضعيف</option>
                        <option value="3" selected>3 — ممكن</option>
                        <option value="4">4 — مرجح</option>
                        <option value="5">5 — شبه مؤكد</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>التأثير (1-5) *</label>
                    <select id="newRiskImpact">
                        <option value="1">1 — ضئيل</option>
                        <option value="2">2 — منخفض</option>
                        <option value="3" selected>3 — متوسط</option>
                        <option value="4">4 — مرتفع</option>
                        <option value="5">5 — كارثي</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label>الوصف</label>
                <textarea id="newRiskDesc" rows="3" placeholder="وصف تفصيلي للخطر وتأثيره المحتمل..."></textarea>
            </div>
            <div class="form-group">
                <label>خطة المعالجة (سطر لكل إجراء)</label>
                <textarea id="newRiskMitigation" rows="3" placeholder="إجراء 1
إجراء 2
إجراء 3"></textarea>
            </div>
            <div class="form-actions">
                <button class="btn-form" onclick="closeAddRisk()">إلغاء</button>
                <button class="btn-form primary" onclick="saveNewRisk()"><i class="bi bi-check-lg"></i> حفظ
                    الخطر</button>
            </div>
        </div>
    </div>

    <script src="/assets/js/api.js"></script>
    <script src="/assets/js/sidebar.js"></script>
    <script src="/assets/js/ai-advisor.js"></script>
    <script src="/assets/js/achievements.js"></script>
    <script src="/assets/js/notifications.js"></script>
    <script>
        // ============================================================
        // === خريطة المخاطر — مربوطة بالـ API (/api/risks) ===
        // ============================================================
        if (!StartixAPI.requireAuth()) throw new Error('not logged in');

        let risks = [];
        let filteredRisks = [];
        let currentVersionId = null;

        const catColors = {
            'STRATEGIC': '#ef4444', 'OPERATIONAL': '#f97316', 'FINANCIAL': '#facc15',
            'COMPLIANCE': '#8b5cf6', 'REPUTATIONAL': '#ec4899',
            'تشغيلي': '#f97316', 'بشري': '#8b5cf6', 'مالي': '#ef4444',
            'سوق': '#38bdf8', 'تقني': '#22c55e', 'قانوني': '#facc15'
        };
        const catIcons = {
            'STRATEGIC': '🎯', 'OPERATIONAL': '⚙️', 'FINANCIAL': '💰',
            'COMPLIANCE': '⚖️', 'REPUTATIONAL': '📢',
            'تشغيلي': '⚙️', 'بشري': '👤', 'مالي': '💰',
            'سوق': '📊', 'تقني': '💻', 'قانوني': '⚖️'
        };

        function escapeHtml(str) {
            if (str == null) return '';
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        // === نقل البيانات من API إلى الشكل المحلي ===
        function normalizeRisk(r) {
            return {
                id: r.id,
                name: r.title,
                category: r.category || 'غير مصنف',
                probability: r.probabilityScore || 3,
                impact: r.impactScore || 3,
                score: r.riskScore || (r.probabilityScore || 3) * (r.impactScore || 3),
                owner: r.owner || '—',
                desc: r.description || 'لا يوجد وصف',
                mitigation: r.mitigation ? r.mitigation.split('\n').filter(s => s.trim()) : [],
                contingency: r.contingency || '',
                status: r.status || 'OPEN',
                stakeholders: (r.stakeholders || []).map(s => s.stakeholder || s),
                stakeholderCount: r._count?.stakeholders || 0,
                choiceTitle: r.choice?.title || null,
                versionId: r.versionId,
                updatedAt: r.updatedAt,
                corrections: r.corrections || []
            };
        }

        // === جلب البيانات من API ===
        async function loadRisks() {
            try {
                currentVersionId = await StartixAPI.ensureVersionId();
                const data = await StartixAPI.apiGet('/api/risks?limit=200');
                risks = (data.risks || []).map(normalizeRisk);
                filteredRisks = [...risks];
                document.getElementById('riskCountBadge').textContent = `${risks.length} خطر`;
                populateOwnerFilter();
                renderAll();
            } catch (err) {
                console.error('Error loading risks:', err);
                document.getElementById('riskStats').innerHTML = `
                    <div class="risk-stat" style="grid-column:1/-1;text-align:center;padding:20px">
                        <div style="color:var(--red);font-size:14px"><i class="bi bi-exclamation-triangle"></i> فشل تحميل المخاطر</div>
                        <div style="color:var(--muted);font-size:12px;margin-top:4px">${err.message}</div>
                        <button onclick="loadRisks()" style="margin-top:10px;padding:6px 16px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text);cursor:pointer;font-family:inherit">🔄 إعادة المحاولة</button>
                    </div>`;
            }
        }

        // === المساعدات ===
        function getZoneClass(p, i) {
            const s = p * i;
            if (s >= 16) return 'zone-critical';
            if (s >= 10) return 'zone-high';
            if (s >= 5) return 'zone-medium';
            return 'zone-low';
        }
        function getSeverityColor(score) {
            if (score >= 16) return 'var(--red)';
            if (score >= 10) return 'var(--orange)';
            if (score >= 5) return 'var(--yellow)';
            return 'var(--green)';
        }
        function getSeverityLabel(score) {
            if (score >= 16) return 'حرج';
            if (score >= 10) return 'مرتفع';
            if (score >= 5) return 'متوسط';
            return 'منخفض';
        }

        // === الإحصائيات ===
        function renderStats() {
            const data = filteredRisks;
            const critical = data.filter(r => r.score >= 16).length;
            const high = data.filter(r => r.score >= 10 && r.score < 16).length;
            const medium = data.filter(r => r.score >= 5 && r.score < 10).length;
            const low = data.filter(r => r.score < 5).length;
            document.getElementById('riskStats').innerHTML = `
                <div class="risk-stat"><div class="risk-stat-num" style="color:var(--text)">${data.length}</div><div class="risk-stat-label">إجمالي المخاطر</div></div>
                <div class="risk-stat"><div class="risk-stat-num" style="color:var(--red)">${critical}</div><div class="risk-stat-label">حرجة 🔴</div></div>
                <div class="risk-stat"><div class="risk-stat-num" style="color:var(--orange)">${high}</div><div class="risk-stat-label">مرتفعة 🟠</div></div>
                <div class="risk-stat"><div class="risk-stat-num" style="color:var(--yellow)">${medium}</div><div class="risk-stat-label">متوسطة 🟡</div></div>
                <div class="risk-stat"><div class="risk-stat-num" style="color:var(--green)">${low}</div><div class="risk-stat-label">منخفضة 🟢</div></div>
            `;
        }

        // === الخريطة الحرارية ===
        function renderHeatmap() {
            const grid = document.getElementById('heatmapGrid');
            const probLabels = ['نادر', 'ضعيف', 'ممكن', 'مرجح', 'شبه مؤكد'];
            let html = '';
            for (let p = 5; p >= 1; p--) {
                html += `<div class="heatmap-ylabel">${probLabels[p - 1]}</div>`;
                for (let i = 1; i <= 5; i++) {
                    const cellRisks = filteredRisks.filter(r => r.probability === p && r.impact === i);
                    html += `<div class="heatmap-cell ${getZoneClass(p, i)}">`;
                    cellRisks.forEach(r => {
                        const color = getSeverityColor(r.score);
                        const initial = r.name.charAt(0);
                        const isMitigated = r.status === 'MITIGATED' || r.status === 'CLOSED';
                        const dateStr = isMitigated && r.updatedAt ? `<br><span style="color:#4ade80;font-weight:700;font-size:10px;margin-top:4px;display:inline-block;"><i class="bi bi-check2-circle"></i> أُنجز في: ${new Date(r.updatedAt).toLocaleDateString('ar-SA')}</span>` : '';
                        html += `<div class="heatmap-risk-dot" style="background:${color}" onclick="showRiskDetail('${r.id}')"><span>${escapeHtml(initial)}</span><div class="tooltip">${escapeHtml(r.name)} (${r.score})${dateStr}</div></div>`;
                    });
                    html += '</div>';
                }
            }
            html += '<div></div>';
            for (let i = 1; i <= 5; i++) html += `<div class="heatmap-xlabel">${i}</div>`;
            grid.innerHTML = html;
        }

        // === أعلى المخاطر ===
        function renderTopRisks() {
            const sorted = [...filteredRisks].sort((a, b) => b.score - a.score).slice(0, 5);
            document.getElementById('topRisks').innerHTML = sorted.map(r => {
                const color = getSeverityColor(r.score);
                const shBadge = r.stakeholderCount > 0 ? `<span style="font-size:9px;color:var(--primary)"><i class="bi bi-people"></i> ${r.stakeholderCount}</span>` : '';
                return `
                <div class="risk-item" onclick="showRiskDetail('${r.id}')">
                    <div class="risk-item-header">
                        <div class="risk-severity" style="background:${color}"></div>
                        <div class="risk-item-name">${escapeHtml(r.name)}</div>
                        <div class="risk-item-score" style="background:${color}15;color:${color}">${r.score}</div>
                    </div>
                    <div class="risk-item-meta">
                        <span><i class="bi bi-tag"></i> ${escapeHtml(r.category)}</span>
                        <span><i class="bi bi-person"></i> ${escapeHtml(r.owner)}</span>
                        ${shBadge}
                        <span style="font-size:9px;padding:1px 6px;border-radius:4px;background:rgba(255,255,255,0.05)">${r.status}</span>
                    </div>
                </div>`;
            }).join('') || '<div style="text-align:center;color:var(--muted);padding:20px">لا توجد مخاطر مطابقة</div>';
        }

        // === حسب الفئة ===
        function renderCategories() {
            const cats = {};
            filteredRisks.forEach(r => { cats[r.category] = (cats[r.category] || 0) + 1; });
            const total = filteredRisks.length || 1;
            document.getElementById('riskCategories').innerHTML = Object.entries(cats).map(([cat, count]) => `
                <div class="risk-category">
                    <div class="risk-cat-icon">${catIcons[cat] || '📌'}</div>
                    <div class="risk-cat-name">${escapeHtml(cat)}</div>
                    <div class="risk-cat-bar"><div class="risk-cat-fill" style="width:${(count / total) * 100}%;background:${catColors[cat] || 'var(--primary)'}"></div></div>
                    <div class="risk-cat-count">${count}</div>
                </div>
            `).join('') || '<div style="text-align:center;color:var(--muted);padding:20px">لا توجد فئات</div>';
        }

        // === تفاصيل الخطر ===
        window.showRiskDetail = function (id) {
            const r = risks.find(x => x.id === id);
            if (!r) return;
            const color = getSeverityColor(r.score);
            const icon = r.score >= 16 ? '🔴' : r.score >= 10 ? '🟠' : r.score >= 5 ? '🟡' : '🟢';

            let stakeholderHtml = '';
            if (r.stakeholders && r.stakeholders.length > 0) {
                stakeholderHtml = `
                    <div style="margin-top:12px;padding:12px;background:rgba(102,126,234,0.05);border:1px solid rgba(102,126,234,0.1);border-radius:10px">
                        <h4 style="font-size:13px;font-weight:700;color:var(--primary);margin-bottom:8px"><i class="bi bi-people"></i> أصحاب المصلحة المتأثرون (${r.stakeholders.length})</h4>
                        <div style="display:flex;flex-wrap:wrap;gap:6px">
                            ${r.stakeholders.map(s => `<span style="font-size:11px;padding:4px 10px;border-radius:8px;background:${escapeHtml(s.color || 'var(--primary)')}15;color:${escapeHtml(s.color || 'var(--primary)')};font-weight:600">${escapeHtml(s.name)}</span>`).join('')}
                        </div>
                    </div>`;
            }

            // الإجراءات التصحيحية وتاريخ الإنجاز
            let correctionsHtml = '';
            if (r.corrections && r.corrections.length > 0) {
                const completed = r.corrections.filter(c => c.status === 'COMPLETED');
                if (completed.length > 0) {
                    correctionsHtml = `
                        <div style="margin-top:12px;padding:12px;background:rgba(34,197,94,0.05);border:1px solid rgba(34,197,94,0.1);border-radius:10px">
                            <h4 style="font-size:13px;font-weight:700;color:var(--green);margin-bottom:8px"><i class="bi bi-tools"></i> إجراءات تصحيحية منجزة</h4>
                            ${completed.map(c => `
                                <div style="font-size:12px;color:var(--text);margin-bottom:4px;display:flex;align-items:center;gap:6px;">
                                    <i class="bi bi-check2-circle" style="color:var(--green)"></i>
                                    <span>${escapeHtml(c.title)}</span>
                                    <span style="color:var(--text-muted);font-size:10px;margin-right:auto;">(تاريخ الإنجاز: ${c.updatedAt ? new Date(c.updatedAt).toLocaleDateString('ar-SA') : 'مؤخراً'})</span>
                                </div>
                            `).join('')}
                        </div>`;
                }
            } else if (r.status === 'MITIGATED' || r.status === 'CLOSED') {
                correctionsHtml = `
                    <div style="margin-top:12px;padding:12px;background:rgba(34,197,94,0.05);border:1px solid rgba(34,197,94,0.1);border-radius:10px"><h4 style="font-size:13px;font-weight:700;color:var(--green);margin-bottom:4px"><i class="bi bi-shield-check"></i> تم تخفيف الخطر</h4><div style="font-size:12px;color:var(--text-muted);">تاريخ الإنجاز/التخفيف: <strong style="color:var(--text)">${r.updatedAt ? new Date(r.updatedAt).toLocaleDateString('ar-SA') : 'مؤخراً'}</strong></div></div>`;
            }

            document.getElementById('riskModalContent').innerHTML = `
                <div class="risk-detail-header">
                    <div class="risk-detail-sev" style="background:${color}15;color:${color};font-size:24px">${icon}</div>
                    <div>
                        <h3 style="font-size:18px;font-weight:800;margin-bottom:2px">${escapeHtml(r.name)}</h3>
                        <div style="font-size:12px;color:var(--muted)">${escapeHtml(r.category)} | المسؤول: ${escapeHtml(r.owner)} | الحالة: ${escapeHtml(r.status)}</div>
                    </div>
                </div>
                <div class="risk-detail-scores">
                    <div class="risk-detail-score"><div class="risk-detail-score-num" style="color:${color}">${r.score}</div><div class="risk-detail-score-label">درجة الخطورة</div></div>
                    <div class="risk-detail-score"><div class="risk-detail-score-num">${r.probability}<small>/5</small></div><div class="risk-detail-score-label">الاحتمال</div></div>
                    <div class="risk-detail-score"><div class="risk-detail-score-num">${r.impact}<small>/5</small></div><div class="risk-detail-score-label">التأثير</div></div>
                </div>
                <p style="font-size:13px;line-height:1.8;color:var(--muted);margin-bottom:12px">${escapeHtml(r.desc)}</p>
                ${r.mitigation.length > 0 ? `
                <div class="risk-mitigation">
                    <h4><i class="bi bi-shield-check"></i> خطة المعالجة</h4>
                    <ul>${r.mitigation.map(m => `<li>${escapeHtml(m)}</li>`).join('')}</ul>
                </div>` : ''}
                ${r.contingency ? `
                <div style="margin-top:10px;padding:10px;background:rgba(250,204,21,0.05);border:1px solid rgba(250,204,21,0.1);border-radius:10px">
                    <h4 style="font-size:13px;font-weight:700;color:var(--yellow);margin-bottom:4px"><i class="bi bi-shield-exclamation"></i> خطة الطوارئ</h4>
                    <p style="font-size:12px;color:var(--muted)">${escapeHtml(r.contingency)}</p>
                </div>` : ''}
                ${stakeholderHtml}
                ${correctionsHtml}
            `;
            document.getElementById('riskModal').classList.add('open');
        };

        window.closeRiskModal = function () {
            document.getElementById('riskModal').classList.remove('open');
        };

        // === الفلاتر ===
        function populateOwnerFilter() {
            const owners = [...new Set(risks.map(r => r.owner).filter(o => o && o !== '—'))];
            const sel = document.getElementById('filterOwner');
            sel.innerHTML = '<option value="">👤 كل المسؤولين</option>' +
                owners.map(o => `<option value="${escapeHtml(o)}">${escapeHtml(o)}</option>`).join('');
        }

        function applyFilters() {
            const cat = document.getElementById('filterCategory').value;
            const sev = document.getElementById('filterSeverity').value;
            const owner = document.getElementById('filterOwner').value;

            filteredRisks = risks.filter(r => {
                if (cat && r.category !== cat) return false;
                if (owner && r.owner !== owner) return false;
                if (sev) {
                    if (sev === 'critical' && r.score < 16) return false;
                    if (sev === 'high' && (r.score < 10 || r.score >= 16)) return false;
                    if (sev === 'medium' && (r.score < 5 || r.score >= 10)) return false;
                    if (sev === 'low' && r.score >= 5) return false;
                }
                return true;
            });

            document.getElementById('riskCountBadge').textContent = `${filteredRisks.length} خطر`;
            renderAll();
        }

        // === إضافة خطر (حفظ في الـ API) ===
        window.openAddRisk = function () {
            document.getElementById('addRiskOverlay').classList.add('open');
        };
        window.closeAddRisk = function () {
            document.getElementById('addRiskOverlay').classList.remove('open');
        };

        window.saveNewRisk = async function () {
            const name = document.getElementById('newRiskName').value.trim();
            if (!name) { alert('أدخل اسم الخطر'); return; }

            const versionId = currentVersionId || await StartixAPI.ensureVersionId();
            if (!versionId) { alert('لم يتم العثور على نسخة استراتيجية. أنشئ واحدة أولاً.'); return; }

            const btn = event.target;
            btn.disabled = true;
            btn.innerHTML = '<i class="bi bi-hourglass-split"></i> جاري الحفظ...';

            try {
                const payload = {
                    title: name,
                    category: document.getElementById('newRiskCategory').value,
                    probabilityScore: parseInt(document.getElementById('newRiskProb').value),
                    impactScore: parseInt(document.getElementById('newRiskImpact').value),
                    owner: document.getElementById('newRiskOwner').value.trim() || null,
                    description: document.getElementById('newRiskDesc').value || null,
                    mitigation: document.getElementById('newRiskMitigation').value || null,
                    versionId,
                    status: 'OPEN',
                };

                await StartixAPI.apiPost('/api/risks', payload);
                StartixAPI.showToast('✅ تم حفظ الخطر بنجاح');

                // Reset form
                document.getElementById('newRiskName').value = '';
                document.getElementById('newRiskOwner').value = '';
                document.getElementById('newRiskDesc').value = '';
                document.getElementById('newRiskMitigation').value = '';
                closeAddRisk();

                // Reload from API
                await loadRisks();
            } catch (err) {
                console.error('Error saving risk:', err);
                alert('فشل حفظ الخطر: ' + err.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="bi bi-check-lg"></i> حفظ الخطر';
            }
        };

        function renderAll() {
            renderStats();
            renderHeatmap();
            renderTopRisks();
            renderCategories();
        }

        // === تشغيل ===
        loadRisks();
    </script>
</body>

</html>
