<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ستارتكس - خريطة المخاطر</title>
    <meta name="description" content="خريطة حرارية تفاعلية للمخاطر الاستراتيجية">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/css/shared.css">
    <style>
        :root {
            --bg: #0a0b10;
            --bg2: #12141f;
            --card: #171a2a;
            --card-hover: #1e2236;
            --text: #e2e8f0;
            --muted: #7a8599;
            --border: rgba(255, 255, 255, 0.06);
            --primary: #667eea;
            --secondary: #764ba2;
            --green: #22c55e;
            --yellow: #facc15;
            --red: #ef4444;
            --blue: #38bdf8;
            --purple: #a78bfa;
            --orange: #f97316
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        body {
            background: var(--bg);
            font-family: 'Tajawal', sans-serif;
            color: var(--text);
            min-height: 100vh
        }

        .page-wrapper {
            display: flex;
            min-height: 100vh
        }

        #sidebar {
            width: 260px; background: #1a1d2e; border-left: 1px solid rgba(255,255,255,0.06);
            flex-shrink: 0; overflow-y: auto; overflow-x: hidden;
            position: fixed; top: 0; right: 0; height: 100vh; z-index: 1100;
            transform: translateX(220px);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #sidebar:hover { transform: translateX(0); }
        #sidebar::before {
            content: '\F285'; font-family: 'bootstrap-icons';
            position: absolute; left: 0; top: 50%; transform: translateY(-50%);
            background: rgba(26,29,46,0.95); color: #667eea;
            padding: 12px 6px; border-radius: 0 8px 8px 0; font-size: 1rem; z-index: 1;
            transition: opacity 0.3s;
        }
        #sidebar:hover::before { opacity: 0; }

        .main-content {
            flex: 1;
            min-width: 0;
            padding: 28px 32px 140px 32px
        }

        /* Bottom Navigation */
        .action-bar {
            position: fixed; bottom: 0; right: 0; left: 0;
            background: rgba(10,11,16,0.95); backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255,255,255,0.06);
            padding: 20px 48px; display: flex; justify-content: space-between; align-items: center; z-index: 1000;
        }
        .btn-stx-success {
            background: linear-gradient(135deg, #10b981, #059669); color: white; border: none;
            padding: 14px 40px; border-radius: 14px; font-weight: 800; font-size: 1.1rem;
            box-shadow: 0 8px 25px rgba(16,185,129,0.3); transition: 0.3s; text-decoration: none;
        }
        .btn-stx-success:hover { transform: translateY(-3px); box-shadow: 0 12px 35px rgba(16,185,129,0.5); color: white; }
        .nav-link-btn { color: #94a3b8; text-decoration: none; font-weight: 800; display: flex; align-items: center; gap: 8px; transition: 0.2s; }
        .nav-link-btn:hover { color: #fff; }

        .risk-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 24px
        }

        .risk-title {
            font-size: 28px;
            font-weight: 900
        }

        .risk-title span {
            background: linear-gradient(135deg, var(--red), var(--orange));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent
        }

        /* Stats */
        .risk-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 12px;
            margin-bottom: 24px
        }

        .risk-stat {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 16px;
            text-align: center
        }

        .risk-stat-num {
            font-size: 28px;
            font-weight: 900
        }

        .risk-stat-label {
            font-size: 11px;
            color: var(--muted);
            margin-top: 2px
        }

        /* Layout */
        .risk-layout {
            display: grid;
            grid-template-columns: 1fr 340px;
            gap: 20px
        }

        /* Heat Map */
        .heatmap-wrap {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            position: relative
        }

        .heatmap-title {
            font-size: 16px;
            font-weight: 800;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px
        }

        .heatmap-grid {
            display: grid;
            grid-template-columns: 40px repeat(5, 1fr);
            grid-template-rows: repeat(5, 1fr) 30px;
            gap: 2px;
            aspect-ratio: 1.1
        }

        .heatmap-ylabel {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 700;
            color: var(--muted);
            writing-mode: vertical-rl;
            transform: rotate(180deg)
        }

        .heatmap-xlabel {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 700;
            color: var(--muted)
        }

        .heatmap-cell {
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            min-height: 70px;
            flex-wrap: wrap;
            gap: 4px;
            padding: 4px
        }

        .heatmap-cell:hover {
            transform: scale(1.03);
            z-index: 2;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4)
        }

        .heatmap-risk-dot {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: 800;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            position: relative
        }

        .heatmap-risk-dot:hover {
            transform: scale(1.2);
            border-color: white;
            z-index: 3
        }

        .heatmap-risk-dot .tooltip {
            position: absolute;
            bottom: calc(100% + 8px);
            right: 50%;
            transform: translateX(50%);
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 11px;
            white-space: nowrap;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 10;
            color: var(--text);
            font-weight: 500
        }

        .heatmap-risk-dot:hover .tooltip {
            opacity: 1
        }

        /* Axis labels */
        .heatmap-axis-label {
            text-align: center;
            font-size: 12px;
            font-weight: 700;
            color: var(--muted);
            padding: 8px 0
        }

        .heatmap-x-axis {
            grid-column: 2/7;
            text-align: center;
            font-size: 12px;
            font-weight: 700;
            color: var(--muted)
        }

        .heatmap-y-axis {
            position: absolute;
            right: -40px;
            top: 50%;
            transform: rotate(-90deg) translateX(50%);
            font-size: 12px;
            font-weight: 700;
            color: var(--muted);
            white-space: nowrap
        }

        /* Risk color zones */
        .zone-critical {
            background: rgba(239, 68, 68, 0.25)
        }

        .zone-high {
            background: rgba(249, 115, 22, 0.2)
        }

        .zone-medium {
            background: rgba(250, 204, 21, 0.15)
        }

        .zone-low {
            background: rgba(34, 197, 94, 0.1)
        }

        /* Sidebar */
        .risk-sidebar {
            display: flex;
            flex-direction: column;
            gap: 16px
        }

        .risk-panel {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 18px
        }

        .risk-panel-title {
            font-size: 14px;
            font-weight: 800;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px
        }

        .risk-item {
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 6px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent
        }

        .risk-item:hover {
            background: rgba(255, 255, 255, 0.03);
            border-color: rgba(255, 255, 255, 0.06)
        }

        .risk-item-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px
        }

        .risk-severity {
            width: 10px;
            height: 10px;
            border-radius: 3px;
            flex-shrink: 0
        }

        .risk-item-name {
            font-size: 13px;
            font-weight: 700;
            flex: 1
        }

        .risk-item-score {
            font-size: 12px;
            font-weight: 800;
            padding: 2px 8px;
            border-radius: 6px
        }

        .risk-item-desc {
            font-size: 11px;
            color: var(--muted);
            line-height: 1.5
        }

        .risk-item-meta {
            display: flex;
            gap: 8px;
            margin-top: 6px;
            font-size: 10px;
            color: var(--muted)
        }

        .risk-category {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 0;
            border-bottom: 1px solid var(--border)
        }

        .risk-category:last-child {
            border-bottom: none
        }

        .risk-cat-icon {
            font-size: 18px
        }

        .risk-cat-name {
            flex: 1;
            font-size: 12px;
            font-weight: 600
        }

        .risk-cat-count {
            font-size: 12px;
            font-weight: 700;
            color: var(--primary)
        }

        .risk-cat-bar {
            width: 60px;
            height: 5px;
            border-radius: 3px;
            background: rgba(255, 255, 255, 0.06);
            overflow: hidden
        }

        .risk-cat-fill {
            height: 100%;
            border-radius: 3px
        }

        /* Detail Modal */
        .risk-modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 99998;
            display: none;
            align-items: center;
            justify-content: center
        }

        .risk-modal-overlay.open {
            display: flex
        }

        .risk-modal {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 28px;
            width: min(500px, 92vw);
            max-height: 85vh;
            overflow-y: auto
        }

        .risk-modal-close {
            float: left;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            border: none;
            background: rgba(255, 255, 255, 0.05);
            color: var(--muted);
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center
        }

        .risk-detail-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
            margin-top: 8px
        }

        .risk-detail-sev {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px
        }

        .risk-detail-scores {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin: 16px 0
        }

        .risk-detail-score {
            text-align: center;
            padding: 12px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 10px
        }

        .risk-detail-score-num {
            font-size: 24px;
            font-weight: 900
        }

        .risk-detail-score-label {
            font-size: 10px;
            color: var(--muted);
            margin-top: 2px
        }

        .risk-mitigation {
            padding: 12px;
            background: rgba(34, 197, 94, 0.05);
            border: 1px solid rgba(34, 197, 94, 0.1);
            border-radius: 10px;
            margin-top: 12px
        }

        .risk-mitigation h4 {
            font-size: 13px;
            font-weight: 700;
            color: var(--green);
            margin-bottom: 6px
        }

        .risk-mitigation ul {
            list-style: none;
            padding: 0
        }

        .risk-mitigation li {
            font-size: 12px;
            padding: 4px 0;
            color: var(--muted);
            display: flex;
            align-items: center;
            gap: 6px
        }

        .risk-mitigation li::before {
            content: '✅';
            font-size: 10px
        }

        /* Filters */
        .risk-filters {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: center
        }

        .risk-filter-select {
            padding: 8px 14px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--card);
            color: var(--text);
            font-family: inherit;
            font-size: 13px;
            cursor: pointer;
            transition: border-color 0.2s
        }

        .risk-filter-select:focus {
            outline: none;
            border-color: var(--primary)
        }

        .btn-add-risk {
            padding: 8px 20px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, var(--red), var(--orange));
            color: white;
            font-family: inherit;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.3s;
            margin-right: auto
        }

        .btn-add-risk:hover {
            transform: scale(1.03);
            box-shadow: 0 4px 20px rgba(239, 68, 68, 0.3)
        }

        /* Add Risk Modal */
        .add-risk-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.65);
            z-index: 99999;
            display: none;
            align-items: center;
            justify-content: center
        }

        .add-risk-overlay.open {
            display: flex
        }

        .add-risk-form {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 28px;
            width: min(520px, 94vw);
            max-height: 90vh;
            overflow-y: auto
        }

        .add-risk-form h3 {
            font-size: 18px;
            font-weight: 900;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 8px
        }

        .form-group {
            margin-bottom: 14px
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 4px;
            color: var(--muted)
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px 14px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--bg2);
            color: var(--text);
            font-family: inherit;
            font-size: 13px;
            transition: border-color 0.2s
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary)
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px
        }

        .form-actions {
            display: flex;
            gap: 10px;
            margin-top: 18px;
            justify-content: flex-end
        }

        .btn-form {
            padding: 10px 24px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text);
            font-family: inherit;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s
        }

        .btn-form:hover {
            background: rgba(255, 255, 255, 0.05)
        }

        .btn-form.primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            color: white;
            font-weight: 700
        }

        .btn-form.primary:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.3)
        }

        .risk-count-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 10px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 700;
            background: rgba(102, 126, 234, 0.1);
            color: var(--primary)
        }

        @media(max-width:900px) {
            .risk-layout { grid-template-columns: 1fr }
            #sidebar { transform: translateX(260px); }
            #sidebar:hover { transform: translateX(0); }
            .action-bar { padding: 16px; }
        }

        @media(max-width:600px) {
            .main-content { padding: 16px 16px 140px }
        }
    </style>
</head>

<body class="dir-rtl">
    <div class="page-wrapper">
        <nav id="sidebar"></nav>
        <div class="main-content">
            <div class="risk-header">
                <div>
                    <h1 class="risk-title"><i class="bi bi-shield-exclamation"></i> خريطة <span>المخاطر</span></h1>
                    <div style="font-size:13px;color:var(--muted);margin-top:4px">خريطة حرارية تفاعلية للمخاطر
                        الاستراتيجية — <span class="risk-count-badge" id="riskCountBadge">10 مخاطر</span></div>
                </div>
            </div>

            <!-- Stats -->
            <div class="risk-stats" id="riskStats"></div>

            <!-- Filters -->
            <div class="risk-filters">
                <select class="risk-filter-select" id="filterCategory" onchange="applyFilters()">
                    <option value="">🏷️ كل الفئات</option>
                    <option value="تشغيلي">⚙️ تشغيلي</option>
                    <option value="بشري">👤 بشري</option>
                    <option value="مالي">💰 مالي</option>
                    <option value="سوق">📊 سوق</option>
                    <option value="تقني">💻 تقني</option>
                    <option value="قانوني">⚖️ قانوني</option>
                </select>
                <select class="risk-filter-select" id="filterSeverity" onchange="applyFilters()">
                    <option value="">⚡ كل المستويات</option>
                    <option value="critical">🔴 حرج (16+)</option>
                    <option value="high">🟠 مرتفع (10-15)</option>
                    <option value="medium">🟡 متوسط (5-9)</option>
                    <option value="low">🟢 منخفض (1-4)</option>
                </select>
                <select class="risk-filter-select" id="filterOwner" onchange="applyFilters()">
                    <option value="">👤 كل المسؤولين</option>
                </select>
                <button class="btn-add-risk" style="background:linear-gradient(135deg, var(--primary), var(--secondary))" id="btnAutoGen" onclick="autoGenerateRisks()">
                    <i class="bi bi-stars"></i> تحليل ذكي للمخاطر
                </button>
                <button class="btn-add-risk" id="btnAddRisk" onclick="openAddRisk()">
                    <i class="bi bi-plus-circle"></i> إضافة يدوي
                </button>
                <span id="riskMaxWarning" class="max-warning" style="display:none;color:var(--yellow);font-size:12px;font-weight:700">وصلت للحد الأقصى (20 خطر)</span>
            </div>

            <!-- Auto-generated risks banner -->
            <div id="autoGenBanner" style="display:none; background:linear-gradient(135deg, rgba(102,126,234,0.08), rgba(118,75,162,0.08)); border:1px solid rgba(102,126,234,0.2); border-radius:16px; padding:20px 24px; margin-bottom:20px;">
                <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
                    <h3 style="font-size:15px;font-weight:900;margin:0;display:flex;align-items:center;gap:8px">
                        <i class="bi bi-cpu" style="color:var(--primary)"></i> مخاطر مكتشفة من تحليل الخطة الاستراتيجية
                    </h3>
                    <span id="autoGenCount" style="font-size:12px;color:var(--primary);font-weight:800"></span>
                </div>
                <div id="autoGenList"></div>
                <div style="display:flex;gap:10px;margin-top:14px">
                    <button onclick="acceptAllAutoRisks()" style="padding:8px 20px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--primary),var(--secondary));color:white;font-weight:700;font-size:13px;cursor:pointer;font-family:inherit">
                        <i class="bi bi-check-all"></i> اعتماد الكل
                    </button>
                    <button onclick="document.getElementById('autoGenBanner').style.display='none'" style="padding:8px 20px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--muted);font-weight:600;font-size:13px;cursor:pointer;font-family:inherit">
                        تجاهل
                    </button>
                </div>
            </div>

            <!-- Main Layout -->
            <div class="risk-layout">
                <!-- Heat Map -->
                <div class="heatmap-wrap">
                    <div class="heatmap-title"><i class="bi bi-grid-3x3-gap" style="color:var(--red)"></i> خريطة الحرارة
                        — الاحتمال × التأثير</div>
                    <div style="text-align:center;font-size:12px;font-weight:700;color:var(--muted);margin-bottom:4px">←
                        التأثير →</div>
                    <div class="heatmap-grid" id="heatmapGrid"></div>
                    <div
                        style="text-align:center;font-size:12px;font-weight:700;color:var(--muted);margin-top:8px;display:flex;justify-content:space-between;padding:0 44px">
                        <span>ضئيل</span><span>منخفض</span><span>متوسط</span><span>مرتفع</span><span>كارثي</span>
                    </div>
                </div>

                <!-- Sidebar -->
                <div class="risk-sidebar">
                    <!-- Top Risks -->
                    <div class="risk-panel">
                        <div class="risk-panel-title"><i class="bi bi-exclamation-triangle"
                                style="color:var(--red)"></i> أعلى المخاطر</div>
                        <div id="topRisks"></div>
                    </div>

                    <!-- By Category -->
                    <div class="risk-panel">
                        <div class="risk-panel-title"><i class="bi bi-pie-chart" style="color:var(--purple)"></i> حسب
                            الفئة</div>
                        <div id="riskCategories"></div>
                    </div>
                </div>
            </div>

            <!-- Bottom Navigation -->
            <div class="action-bar">
                <a id="prevLink" href="/reports.html" class="nav-link-btn">
                    <i class="bi bi-arrow-right"></i> السابق: التقارير
                </a>
                <div class="d-flex align-items-center gap-3">
                    <span class="text-muted small fw-700" id="saveStatus"></span>
                    <button type="button" id="btnSave" class="btn-stx-success" onclick="saveAndFinish()">
                        حفظ وإنهاء المتابعة <i class="bi bi-check-circle ms-2"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Detail Modal -->
    <div class="risk-modal-overlay" id="riskModal" onclick="if(event.target===this)closeRiskModal()">
        <div class="risk-modal">
            <button class="risk-modal-close" onclick="closeRiskModal()"><i class="bi bi-x-lg"></i></button>
            <div id="riskModalContent"></div>
        </div>
    </div>

    <!-- Add Risk Modal -->
    <div class="add-risk-overlay" id="addRiskOverlay" onclick="if(event.target===this)closeAddRisk()">
        <div class="add-risk-form">
            <h3><i class="bi bi-plus-circle" style="color:var(--red)"></i> إضافة خطر جديد</h3>
            <div class="form-group">
                <label>اسم الخطر *</label>
                <input type="text" id="newRiskName" placeholder="مثال: تأخر مشروع التحول الرقمي">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>الفئة *</label>
                    <select id="newRiskCategory">
                        <option value="تشغيلي">⚙️ تشغيلي</option>
                        <option value="بشري">👤 بشري</option>
                        <option value="مالي">💰 مالي</option>
                        <option value="سوق">📊 سوق</option>
                        <option value="تقني">💻 تقني</option>
                        <option value="قانوني">⚖️ قانوني</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>المسؤول *</label>
                    <input type="text" id="newRiskOwner" placeholder="اسم المسؤول">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>احتمال الحدوث (1-5) *</label>
                    <select id="newRiskProb">
                        <option value="1">1 — نادر</option>
                        <option value="2">2 — ضعيف</option>
                        <option value="3" selected>3 — ممكن</option>
                        <option value="4">4 — مرجح</option>
                        <option value="5">5 — شبه مؤكد</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>التأثير (1-5) *</label>
                    <select id="newRiskImpact">
                        <option value="1">1 — ضئيل</option>
                        <option value="2">2 — منخفض</option>
                        <option value="3" selected>3 — متوسط</option>
                        <option value="4">4 — مرتفع</option>
                        <option value="5">5 — كارثي</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label>الوصف</label>
                <textarea id="newRiskDesc" rows="3" placeholder="وصف تفصيلي للخطر وتأثيره المحتمل..."></textarea>
            </div>
            <div class="form-group">
                <label>خطة المعالجة (سطر لكل إجراء)</label>
                <textarea id="newRiskMitigation" rows="3" placeholder="إجراء 1
إجراء 2
إجراء 3"></textarea>
            </div>
            <div class="form-actions">
                <button class="btn-form" onclick="closeAddRisk()">إلغاء</button>
                <button class="btn-form primary" onclick="saveNewRisk()"><i class="bi bi-check-lg"></i> حفظ
                    الخطر</button>
            </div>
        </div>
    </div>

    <script src="/js/smart-nav.js?v=5"></script>
    <script src="/js/api.js?v=5"></script>
    <script src="/js/utils.js?v=5"></script>
    <script src="/js/context-manager.js?v=5"></script>
    <script src="/js/page-guard.js?v=5"></script>
    <script src="/js/steps-config.js?v=5"></script>
    <script src="/js/dept-page.js?v=5"></script>
    <script src="/js/sidebar.js?v=5"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // ============================================================
        // === خريطة المخاطر — مربوطة بالـ API + DeptPage fallback ===
        // ============================================================
        const _urlDept = new URLSearchParams(location.search).get('dept') || 'company';
        const _deptKey = _urlDept.toUpperCase();
        const _qs = _urlDept !== 'company' ? '?dept=' + _urlDept : '';
        const _DEPT_LABELS = {
            hr:'الموارد البشرية', finance:'المالية', sales:'المبيعات', marketing:'التسويق',
            operations:'العمليات', it:'تقنية المعلومات', quality:'الجودة', cs:'خدمة العملاء',
            projects:'المشاريع', compliance:'الامتثال', governance:'الحوكمة', support:'الخدمات المساندة'
        };

        let risks = [];
        let filteredRisks = [];
        let currentVersionId = null;

        const catColors = {
            'STRATEGIC': '#ef4444', 'OPERATIONAL': '#f97316', 'FINANCIAL': '#facc15',
            'COMPLIANCE': '#8b5cf6', 'REPUTATIONAL': '#ec4899',
            'تشغيلي': '#f97316', 'بشري': '#8b5cf6', 'مالي': '#ef4444',
            'سوق': '#38bdf8', 'تقني': '#22c55e', 'قانوني': '#facc15'
        };
        const catIcons = {
            'STRATEGIC': '🎯', 'OPERATIONAL': '⚙️', 'FINANCIAL': '💰',
            'COMPLIANCE': '⚖️', 'REPUTATIONAL': '📢',
            'تشغيلي': '⚙️', 'بشري': '👤', 'مالي': '💰',
            'سوق': '📊', 'تقني': '💻', 'قانوني': '⚖️'
        };

        function escapeHtml(str) {
            if (str == null) return '';
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        // === نقل البيانات من API إلى الشكل المحلي ===
        function normalizeRisk(r) {
            return {
                id: r.id,
                name: r.title,
                category: r.category || 'غير مصنف',
                probability: r.probabilityScore || 3,
                impact: r.impactScore || 3,
                score: r.riskScore || (r.probabilityScore || 3) * (r.impactScore || 3),
                owner: r.owner || '—',
                desc: r.description || 'لا يوجد وصف',
                mitigation: r.mitigation ? r.mitigation.split('\n').filter(s => s.trim()) : [],
                contingency: r.contingency || '',
                status: r.status || 'OPEN',
                stakeholders: (r.stakeholders || []).map(s => s.stakeholder || s),
                stakeholderCount: r._count?.stakeholders || 0,
                choiceTitle: r.choice?.title || null,
                versionId: r.versionId,
                updatedAt: r.updatedAt,
                corrections: r.corrections || []
            };
        }

        // === جلب البيانات من API مع fallback إلى DeptPage ===
        async function loadRisks() {
            try {
                // Try API first
                if (window.StartixAPI && StartixAPI.ensureVersionId) {
                    try {
                        currentVersionId = await StartixAPI.ensureVersionId();
                    } catch (e) {
                        console.warn('[RiskMap] No version yet:', e.message);
                    }
                }

                let apiRisks = [];
                try {
                    const data = await window.api.get('/api/risks?limit=200');
                    apiRisks = (data.risks || []).map(normalizeRisk);
                } catch (e) {
                    console.warn('[RiskMap] API risks failed:', e.message);
                }

                // Fallback: load local risks from DeptPage
                let localRisks = [];
                if (window.DeptPage) {
                    try {
                        const saved = await DeptPage.loadFromAPI('RISKS_' + _deptKey);
                        if (saved && Array.isArray(saved.risks)) {
                            localRisks = saved.risks;
                        }
                    } catch (e) { /* ignore */ }
                }

                // Merge: API risks + local-only risks (avoid duplicates by title)
                const apiTitles = new Set(apiRisks.map(r => r.name));
                const merged = [...apiRisks, ...localRisks.filter(r => !apiTitles.has(r.name))];

                risks = merged;
                filteredRisks = [...risks];
                document.getElementById('riskCountBadge').textContent = `${risks.length} خطر`;
                populateOwnerFilter();
                renderAll();

                if (risks.length === 0) {
                    document.getElementById('riskStats').innerHTML = `
                        <div class="risk-stat" style="grid-column:1/-1;text-align:center;padding:30px">
                            <div style="font-size:2.5rem;margin-bottom:8px">🛡️</div>
                            <div style="color:var(--text);font-size:16px;font-weight:800">لا توجد مخاطر مسجلة بعد</div>
                            <div style="color:var(--muted);font-size:13px;margin-top:6px">اضغط على "إضافة خطر جديد" لبدء رسم خريطة المخاطر</div>
                        </div>`;
                }
            } catch (err) {
                console.error('Error loading risks:', err);
                document.getElementById('riskStats').innerHTML = `
                    <div class="risk-stat" style="grid-column:1/-1;text-align:center;padding:20px">
                        <div style="color:var(--red);font-size:14px"><i class="bi bi-exclamation-triangle"></i> فشل تحميل المخاطر</div>
                        <div style="color:var(--muted);font-size:12px;margin-top:4px">${escapeHtml(err.message)}</div>
                        <button onclick="loadRisks()" style="margin-top:10px;padding:6px 16px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text);cursor:pointer;font-family:inherit">إعادة المحاولة</button>
                    </div>`;
            }
        }

        // === المساعدات ===
        function getZoneClass(p, i) {
            const s = p * i;
            if (s >= 16) return 'zone-critical';
            if (s >= 10) return 'zone-high';
            if (s >= 5) return 'zone-medium';
            return 'zone-low';
        }
        function getSeverityColor(score) {
            if (score >= 16) return 'var(--red)';
            if (score >= 10) return 'var(--orange)';
            if (score >= 5) return 'var(--yellow)';
            return 'var(--green)';
        }
        function getSeverityLabel(score) {
            if (score >= 16) return 'حرج';
            if (score >= 10) return 'مرتفع';
            if (score >= 5) return 'متوسط';
            return 'منخفض';
        }

        // === الإحصائيات ===
        function renderStats() {
            const data = filteredRisks;
            const critical = data.filter(r => r.score >= 16).length;
            const high = data.filter(r => r.score >= 10 && r.score < 16).length;
            const medium = data.filter(r => r.score >= 5 && r.score < 10).length;
            const low = data.filter(r => r.score < 5).length;
            document.getElementById('riskStats').innerHTML = `
                <div class="risk-stat"><div class="risk-stat-num" style="color:var(--text)">${data.length}</div><div class="risk-stat-label">إجمالي المخاطر</div></div>
                <div class="risk-stat"><div class="risk-stat-num" style="color:var(--red)">${critical}</div><div class="risk-stat-label">حرجة 🔴</div></div>
                <div class="risk-stat"><div class="risk-stat-num" style="color:var(--orange)">${high}</div><div class="risk-stat-label">مرتفعة 🟠</div></div>
                <div class="risk-stat"><div class="risk-stat-num" style="color:var(--yellow)">${medium}</div><div class="risk-stat-label">متوسطة 🟡</div></div>
                <div class="risk-stat"><div class="risk-stat-num" style="color:var(--green)">${low}</div><div class="risk-stat-label">منخفضة 🟢</div></div>
            `;
        }

        // === الخريطة الحرارية ===
        function renderHeatmap() {
            const grid = document.getElementById('heatmapGrid');
            const probLabels = ['نادر', 'ضعيف', 'ممكن', 'مرجح', 'شبه مؤكد'];
            let html = '';
            for (let p = 5; p >= 1; p--) {
                html += `<div class="heatmap-ylabel">${probLabels[p - 1]}</div>`;
                for (let i = 1; i <= 5; i++) {
                    const cellRisks = filteredRisks.filter(r => r.probability === p && r.impact === i);
                    html += `<div class="heatmap-cell ${getZoneClass(p, i)}">`;
                    cellRisks.forEach(r => {
                        const color = getSeverityColor(r.score);
                        const initial = r.name.charAt(0);
                        const isMitigated = r.status === 'MITIGATED' || r.status === 'CLOSED';
                        const dateStr = isMitigated && r.updatedAt ? `<br><span style="color:#4ade80;font-weight:700;font-size:10px;margin-top:4px;display:inline-block;"><i class="bi bi-check2-circle"></i> أُنجز في: ${new Date(r.updatedAt).toLocaleDateString('ar-SA')}</span>` : '';
                        html += `<div class="heatmap-risk-dot" style="background:${color}" onclick="showRiskDetail('${r.id}')"><span>${escapeHtml(initial)}</span><div class="tooltip">${escapeHtml(r.name)} (${r.score})${dateStr}</div></div>`;
                    });
                    html += '</div>';
                }
            }
            html += '<div></div>';
            for (let i = 1; i <= 5; i++) html += `<div class="heatmap-xlabel">${i}</div>`;
            grid.innerHTML = html;
        }

        // === أعلى المخاطر ===
        function renderTopRisks() {
            const sorted = [...filteredRisks].sort((a, b) => b.score - a.score).slice(0, 5);
            document.getElementById('topRisks').innerHTML = sorted.map(r => {
                const color = getSeverityColor(r.score);
                const shBadge = r.stakeholderCount > 0 ? `<span style="font-size:9px;color:var(--primary)"><i class="bi bi-people"></i> ${r.stakeholderCount}</span>` : '';
                return `
                <div class="risk-item" onclick="showRiskDetail('${r.id}')">
                    <div class="risk-item-header">
                        <div class="risk-severity" style="background:${color}"></div>
                        <div class="risk-item-name">${escapeHtml(r.name)}</div>
                        <div class="risk-item-score" style="background:${color}15;color:${color}">${r.score}</div>
                    </div>
                    <div class="risk-item-meta">
                        <span><i class="bi bi-tag"></i> ${escapeHtml(r.category)}</span>
                        <span><i class="bi bi-person"></i> ${escapeHtml(r.owner)}</span>
                        ${shBadge}
                        <span style="font-size:9px;padding:1px 6px;border-radius:4px;background:rgba(255,255,255,0.05)">${r.status}</span>
                    </div>
                </div>`;
            }).join('') || '<div style="text-align:center;color:var(--muted);padding:20px">لا توجد مخاطر مطابقة</div>';
        }

        // === حسب الفئة ===
        function renderCategories() {
            const cats = {};
            filteredRisks.forEach(r => { cats[r.category] = (cats[r.category] || 0) + 1; });
            const total = filteredRisks.length || 1;
            document.getElementById('riskCategories').innerHTML = Object.entries(cats).map(([cat, count]) => `
                <div class="risk-category">
                    <div class="risk-cat-icon">${catIcons[cat] || '📌'}</div>
                    <div class="risk-cat-name">${escapeHtml(cat)}</div>
                    <div class="risk-cat-bar"><div class="risk-cat-fill" style="width:${(count / total) * 100}%;background:${catColors[cat] || 'var(--primary)'}"></div></div>
                    <div class="risk-cat-count">${count}</div>
                </div>
            `).join('') || '<div style="text-align:center;color:var(--muted);padding:20px">لا توجد فئات</div>';
        }

        // === تفاصيل الخطر ===
        window.showRiskDetail = function (id) {
            const r = risks.find(x => x.id === id);
            if (!r) return;
            const color = getSeverityColor(r.score);
            const icon = r.score >= 16 ? '🔴' : r.score >= 10 ? '🟠' : r.score >= 5 ? '🟡' : '🟢';

            let stakeholderHtml = '';
            if (r.stakeholders && r.stakeholders.length > 0) {
                stakeholderHtml = `
                    <div style="margin-top:12px;padding:12px;background:rgba(102,126,234,0.05);border:1px solid rgba(102,126,234,0.1);border-radius:10px">
                        <h4 style="font-size:13px;font-weight:700;color:var(--primary);margin-bottom:8px"><i class="bi bi-people"></i> أصحاب المصلحة المتأثرون (${r.stakeholders.length})</h4>
                        <div style="display:flex;flex-wrap:wrap;gap:6px">
                            ${r.stakeholders.map(s => `<span style="font-size:11px;padding:4px 10px;border-radius:8px;background:${escapeHtml(s.color || 'var(--primary)')}15;color:${escapeHtml(s.color || 'var(--primary)')};font-weight:600">${escapeHtml(s.name)}</span>`).join('')}
                        </div>
                    </div>`;
            }

            // الإجراءات التصحيحية وتاريخ الإنجاز
            let correctionsHtml = '';
            if (r.corrections && r.corrections.length > 0) {
                const completed = r.corrections.filter(c => c.status === 'COMPLETED');
                if (completed.length > 0) {
                    correctionsHtml = `
                        <div style="margin-top:12px;padding:12px;background:rgba(34,197,94,0.05);border:1px solid rgba(34,197,94,0.1);border-radius:10px">
                            <h4 style="font-size:13px;font-weight:700;color:var(--green);margin-bottom:8px"><i class="bi bi-tools"></i> إجراءات تصحيحية منجزة</h4>
                            ${completed.map(c => `
                                <div style="font-size:12px;color:var(--text);margin-bottom:4px;display:flex;align-items:center;gap:6px;">
                                    <i class="bi bi-check2-circle" style="color:var(--green)"></i>
                                    <span>${escapeHtml(c.title)}</span>
                                    <span style="color:var(--text-muted);font-size:10px;margin-right:auto;">(تاريخ الإنجاز: ${c.updatedAt ? new Date(c.updatedAt).toLocaleDateString('ar-SA') : 'مؤخراً'})</span>
                                </div>
                            `).join('')}
                        </div>`;
                }
            } else if (r.status === 'MITIGATED' || r.status === 'CLOSED') {
                correctionsHtml = `
                    <div style="margin-top:12px;padding:12px;background:rgba(34,197,94,0.05);border:1px solid rgba(34,197,94,0.1);border-radius:10px"><h4 style="font-size:13px;font-weight:700;color:var(--green);margin-bottom:4px"><i class="bi bi-shield-check"></i> تم تخفيف الخطر</h4><div style="font-size:12px;color:var(--text-muted);">تاريخ الإنجاز/التخفيف: <strong style="color:var(--text)">${r.updatedAt ? new Date(r.updatedAt).toLocaleDateString('ar-SA') : 'مؤخراً'}</strong></div></div>`;
            }

            document.getElementById('riskModalContent').innerHTML = `
                <div class="risk-detail-header">
                    <div class="risk-detail-sev" style="background:${color}15;color:${color};font-size:24px">${icon}</div>
                    <div>
                        <h3 style="font-size:18px;font-weight:800;margin-bottom:2px">${escapeHtml(r.name)}</h3>
                        <div style="font-size:12px;color:var(--muted)">${escapeHtml(r.category)} | المسؤول: ${escapeHtml(r.owner)} | الحالة: ${escapeHtml(r.status)}</div>
                    </div>
                </div>
                <div class="risk-detail-scores">
                    <div class="risk-detail-score"><div class="risk-detail-score-num" style="color:${color}">${r.score}</div><div class="risk-detail-score-label">درجة الخطورة</div></div>
                    <div class="risk-detail-score"><div class="risk-detail-score-num">${r.probability}<small>/5</small></div><div class="risk-detail-score-label">الاحتمال</div></div>
                    <div class="risk-detail-score"><div class="risk-detail-score-num">${r.impact}<small>/5</small></div><div class="risk-detail-score-label">التأثير</div></div>
                </div>
                <p style="font-size:13px;line-height:1.8;color:var(--muted);margin-bottom:12px">${escapeHtml(r.desc)}</p>
                ${r.mitigation.length > 0 ? `
                <div class="risk-mitigation">
                    <h4><i class="bi bi-shield-check"></i> خطة المعالجة</h4>
                    <ul>${r.mitigation.map(m => `<li>${escapeHtml(m)}</li>`).join('')}</ul>
                </div>` : ''}
                ${r.contingency ? `
                <div style="margin-top:10px;padding:10px;background:rgba(250,204,21,0.05);border:1px solid rgba(250,204,21,0.1);border-radius:10px">
                    <h4 style="font-size:13px;font-weight:700;color:var(--yellow);margin-bottom:4px"><i class="bi bi-shield-exclamation"></i> خطة الطوارئ</h4>
                    <p style="font-size:12px;color:var(--muted)">${escapeHtml(r.contingency)}</p>
                </div>` : ''}
                ${stakeholderHtml}
                ${correctionsHtml}
            `;
            document.getElementById('riskModal').classList.add('open');
        };

        window.closeRiskModal = function () {
            document.getElementById('riskModal').classList.remove('open');
        };

        // === الفلاتر ===
        function populateOwnerFilter() {
            const owners = [...new Set(risks.map(r => r.owner).filter(o => o && o !== '—'))];
            const sel = document.getElementById('filterOwner');
            sel.innerHTML = '<option value="">👤 كل المسؤولين</option>' +
                owners.map(o => `<option value="${escapeHtml(o)}">${escapeHtml(o)}</option>`).join('');
        }

        function applyFilters() {
            const cat = document.getElementById('filterCategory').value;
            const sev = document.getElementById('filterSeverity').value;
            const owner = document.getElementById('filterOwner').value;

            filteredRisks = risks.filter(r => {
                if (cat && r.category !== cat) return false;
                if (owner && r.owner !== owner) return false;
                if (sev) {
                    if (sev === 'critical' && r.score < 16) return false;
                    if (sev === 'high' && (r.score < 10 || r.score >= 16)) return false;
                    if (sev === 'medium' && (r.score < 5 || r.score >= 10)) return false;
                    if (sev === 'low' && r.score >= 5) return false;
                }
                return true;
            });

            document.getElementById('riskCountBadge').textContent = `${filteredRisks.length} خطر`;
            renderAll();
        }

        // === إضافة خطر (حفظ في الـ API) ===
        const MAX_RISKS = 20;

        window.openAddRisk = function () {
            if (risks.length >= MAX_RISKS) {
                const warn = document.getElementById('riskMaxWarning');
                if (warn) { warn.style.display = 'inline'; }
                if (window.DeptPage?.showMessage) DeptPage.showMessage(`الحد الأقصى هو ${MAX_RISKS} خطراً — يرجى حذف أو أرشفة مخاطر أولاً`);
                return;
            }
            document.getElementById('addRiskOverlay').classList.add('open');
        };
        window.closeAddRisk = function () {
            document.getElementById('addRiskOverlay').classList.remove('open');
        };

        window.saveNewRisk = async function () {
            const name = document.getElementById('newRiskName').value.trim();
            if (!name) { alert('أدخل اسم الخطر'); return; }

            const btn = document.querySelector('#addRiskOverlay .btn-form.primary');
            btn.disabled = true;
            btn.innerHTML = '<i class="bi bi-hourglass-split"></i> جاري الحفظ...';

            const prob = parseInt(document.getElementById('newRiskProb').value);
            const impact = parseInt(document.getElementById('newRiskImpact').value);

            try {
                // Try API save first
                let savedViaAPI = false;
                const versionId = currentVersionId || (window.StartixAPI?.ensureVersionId ? await StartixAPI.ensureVersionId().catch(() => null) : null);

                if (versionId) {
                    try {
                        const payload = {
                            title: name,
                            category: document.getElementById('newRiskCategory').value,
                            probabilityScore: prob,
                            impactScore: impact,
                            owner: document.getElementById('newRiskOwner').value.trim() || null,
                            description: document.getElementById('newRiskDesc').value || null,
                            mitigation: document.getElementById('newRiskMitigation').value || null,
                            versionId,
                            status: 'OPEN',
                        };
                        await window.api.post('/api/risks', payload);
                        savedViaAPI = true;
                    } catch (apiErr) {
                        console.warn('[RiskMap] API save failed, falling back to DeptPage:', apiErr.message);
                    }
                }

                // Fallback: save locally via DeptPage
                if (!savedViaAPI) {
                    const localRisk = {
                        id: 'local_' + Date.now(),
                        name, category: document.getElementById('newRiskCategory').value,
                        probability: prob, impact, score: prob * impact,
                        owner: document.getElementById('newRiskOwner').value.trim() || '—',
                        desc: document.getElementById('newRiskDesc').value || '',
                        mitigation: (document.getElementById('newRiskMitigation').value || '').split('\n').filter(s => s.trim()),
                        contingency: '', status: 'OPEN', stakeholders: [], stakeholderCount: 0, corrections: []
                    };
                    risks.push(localRisk);
                    await persistLocal();
                }

                if (window.DeptPage?.showMessage) DeptPage.showMessage('تم حفظ الخطر بنجاح');

                // Reset form
                document.getElementById('newRiskName').value = '';
                document.getElementById('newRiskOwner').value = '';
                document.getElementById('newRiskDesc').value = '';
                document.getElementById('newRiskMitigation').value = '';
                closeAddRisk();

                await loadRisks();
            } catch (err) {
                console.error('Error saving risk:', err);
                alert('فشل حفظ الخطر: ' + err.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="bi bi-check-lg"></i> حفظ الخطر';
            }
        };

        // === حفظ محلي عبر DeptPage ===
        async function persistLocal() {
            if (!window.DeptPage) return;
            const localOnly = risks.filter(r => String(r.id).startsWith('local_'));
            await DeptPage.saveToAPI('RISKS_' + _deptKey, { risks: localOnly, timestamp: new Date().toISOString() });
        }

        // === حفظ وإنهاء ===
        async function saveAndFinish() {
            const btn = document.getElementById('btnSave');
            const orig = btn.innerHTML;
            try {
                btn.disabled = true;
                btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> جاري الحفظ...';
                await persistLocal();
                if (window.Context && Context.markStepCompleted) await Context.markStepCompleted('risk-map');
                document.getElementById('saveStatus').textContent = 'تم الحفظ';
                if (window.DeptPage?.showMessage) DeptPage.showMessage('تم إنهاء مرحلة المتابعة بنجاح!');
                // risk-map is last in monitoring — go to dashboard
                setTimeout(() => {
                    window.location.href = _urlDept !== 'company' ? '/dept-dashboard.html?dept=' + _urlDept : '/dashboard.html';
                }, 1500);
            } catch (err) {
                console.error('[RiskMap] Save error:', err);
                alert('فشل الحفظ: ' + (err.message || ''));
                btn.disabled = false;
                btn.innerHTML = orig;
            }
        }

        function renderAll() {
            renderStats();
            renderHeatmap();
            renderTopRisks();
            renderCategories();
            // تحديث حالة زر الإضافة
            const warn = document.getElementById('riskMaxWarning');
            if (warn) warn.style.display = risks.length >= MAX_RISKS ? 'inline' : 'none';
        }

        // ══════════════════════════════════════════════════════════════
        // محرك تحليل المخاطر الذكي — يحلل الخطة ويكتشف المخاطر تلقائياً
        // ══════════════════════════════════════════════════════════════
        let autoGeneratedRisks = [];

        async function autoGenerateRisks() {
            const btn = document.getElementById('btnAutoGen');
            const origHtml = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span> جاري التحليل...';

            autoGeneratedRisks = [];
            const existingNames = new Set(risks.map(r => r.name));

            try {
                // ─── 1. تحليل KPIs المتعثرة → مخاطر أداء ───
                let rawKpis = [];
                try {
                    rawKpis = await DeptPage.loadFromAPI('KPIS_' + _deptKey) || [];
                    if (!Array.isArray(rawKpis)) rawKpis = rawKpis.kpis || [];
                } catch(e) {}

                rawKpis.forEach(k => {
                    const target = parseFloat(k.target) || 0;
                    const actual = parseFloat(k.actual) || 0;
                    const name = k.title || k.name || '';
                    if (!name || target <= 0) return;
                    const ratio = actual / target;

                    if (ratio < 0.5) {
                        const riskName = `خطر أداء: تعثر مؤشر "${name}" (${Math.round(ratio*100)}% من المستهدف)`;
                        if (!existingNames.has(riskName)) {
                            autoGeneratedRisks.push({
                                name: riskName, category: 'تشغيلي', probability: 4, impact: 4, score: 16,
                                source: 'KPI', severity: 'critical',
                                desc: `المؤشر "${name}" يحقق ${actual} من أصل ${target} (${Math.round(ratio*100)}%). فجوة حرجة تستوجب تدخلاً عاجلاً.`,
                                mitigation: [`مراجعة خطة تحسين "${name}"`, 'تخصيص موارد إضافية', 'عقد اجتماع طوارئ مع الفريق المسؤول']
                            });
                        }
                    } else if (ratio < 0.7) {
                        const riskName = `خطر أداء: انحراف مؤشر "${name}" (${Math.round(ratio*100)}% من المستهدف)`;
                        if (!existingNames.has(riskName)) {
                            autoGeneratedRisks.push({
                                name: riskName, category: 'تشغيلي', probability: 3, impact: 3, score: 9,
                                source: 'KPI', severity: 'medium',
                                desc: `المؤشر "${name}" يحقق ${actual} من أصل ${target}. انحراف متوسط يحتاج متابعة.`,
                                mitigation: [`تحليل أسباب انحراف "${name}"`, 'وضع خطة تصحيحية شهرية']
                            });
                        }
                    }
                });

                // ─── 2. تحليل المبادرات المتأخرة → مخاطر تنفيذ ───
                let rawInits = [];
                try {
                    rawInits = await DeptPage.loadFromAPI('INITIATIVES_' + _deptKey) || [];
                    if (!Array.isArray(rawInits)) rawInits = rawInits.initiatives || [];
                } catch(e) {}

                rawInits.forEach(init => {
                    const status = (init.status || '').toLowerCase();
                    const name = init.title || init.name || '';
                    if (!name) return;

                    if (status === 'متعثر' || status === 'delayed' || status === 'at_risk') {
                        const riskName = `خطر تنفيذ: تأخر مبادرة "${name}"`;
                        if (!existingNames.has(riskName)) {
                            autoGeneratedRisks.push({
                                name: riskName, category: 'تشغيلي', probability: 4, impact: 3, score: 12,
                                source: 'مبادرة', severity: 'high',
                                desc: `المبادرة "${name}" في حالة تأخر مما قد يؤثر على تحقيق الأهداف الاستراتيجية.`,
                                mitigation: ['مراجعة الجدول الزمني وإعادة تخصيص الموارد', 'تحديد المعوقات الرئيسية ومعالجتها', 'تقسيم المبادرة إلى مراحل أصغر']
                            });
                        }
                    }
                });

                // ─── 3. تحليل SWOT — نقاط الضعف → مخاطر داخلية ───
                let swotData = null;
                try {
                    swotData = await DeptPage.loadFromAPI('SWOT_' + _deptKey);
                } catch(e) {}

                if (swotData) {
                    // تحويل البيانات لمصفوفة — قد تكون string (textarea) أو array
                    function toLines(val) {
                        if (!val) return [];
                        if (Array.isArray(val)) return val;
                        if (typeof val === 'string') return val.split('\n').map(l => l.replace(/^[-•*\s]+/, '').trim()).filter(l => l.length > 3);
                        return [];
                    }

                    // نقاط الضعف (Weaknesses)
                    const weaknesses = toLines(swotData.weaknesses || swotData.W);
                    weaknesses.forEach((w, i) => {
                        const text = typeof w === 'string' ? w : (w.text || w.title || '');
                        if (!text || text.length < 5) return;
                        const riskName = `خطر داخلي: ${text.substring(0, 60)}`;
                        if (!existingNames.has(riskName) && i < 3) {
                            autoGeneratedRisks.push({
                                name: riskName, category: 'بشري', probability: 3, impact: 3, score: 9,
                                source: 'SWOT', severity: 'medium',
                                desc: `نقطة ضعف مكتشفة من تحليل SWOT: "${text}". قد تتحول لخطر حقيقي إذا لم تُعالج.`,
                                mitigation: ['وضع خطة لمعالجة نقطة الضعف', 'تطوير القدرات المرتبطة', 'مراقبة التأثير دورياً']
                            });
                        }
                    });

                    // التهديدات (Threats)
                    const threats = toLines(swotData.threats || swotData.T);
                    threats.forEach((t, i) => {
                        const text = typeof t === 'string' ? t : (t.text || t.title || '');
                        if (!text || text.length < 5) return;
                        const riskName = `تهديد خارجي: ${text.substring(0, 60)}`;
                        if (!existingNames.has(riskName) && i < 3) {
                            autoGeneratedRisks.push({
                                name: riskName, category: 'سوق', probability: 3, impact: 4, score: 12,
                                source: 'SWOT', severity: 'high',
                                desc: `تهديد مكتشف من تحليل SWOT: "${text}". يتطلب خطة استباقية للتعامل معه.`,
                                mitigation: ['رصد التهديد بشكل دوري', 'وضع خطة طوارئ', 'استثمار نقاط القوة لمواجهة التهديد']
                            });
                        }
                    });
                }

                // ─── 4. تحليل الأهداف بدون KPIs → مخاطر قياس ───
                let rawObjs = [];
                try {
                    rawObjs = await DeptPage.loadFromAPI('OBJECTIVES_' + _deptKey) || [];
                    if (!Array.isArray(rawObjs)) rawObjs = rawObjs.objectives || [];
                } catch(e) {}

                if (rawObjs.length > 0 && rawKpis.length === 0) {
                    const riskName = 'خطر قياس: أهداف استراتيجية بدون مؤشرات أداء';
                    if (!existingNames.has(riskName)) {
                        autoGeneratedRisks.push({
                            name: riskName, category: 'تشغيلي', probability: 4, impact: 3, score: 12,
                            source: 'تحليل', severity: 'high',
                            desc: `يوجد ${rawObjs.length} هدف استراتيجي بدون مؤشرات أداء مرتبطة. لا يمكن قياس التقدم أو كشف الانحرافات.`,
                            mitigation: ['ربط كل هدف بمؤشر أداء واحد على الأقل', 'تحديد مستهدفات واقعية لكل مؤشر', 'مراجعة شهرية للتقدم']
                        });
                    }
                }

                // ─── 5. فجوات التخطيط → مخاطر استراتيجية ───
                if (!swotData) {
                    const riskName = 'خطر تخطيط: لم يُجرَ تحليل SWOT للإدارة';
                    if (!existingNames.has(riskName)) {
                        autoGeneratedRisks.push({
                            name: riskName, category: 'تشغيلي', probability: 3, impact: 4, score: 12,
                            source: 'تحليل', severity: 'high',
                            desc: 'لا يوجد تحليل SWOT مُكتمل. بدون تحليل بيئي شامل، قد تُفاجأ الإدارة بتهديدات غير متوقعة.',
                            mitigation: ['إجراء تحليل SWOT فوراً', 'إشراك الفريق في تحديد نقاط القوة والضعف', 'مراجعة البيئة الخارجية']
                        });
                    }
                }

                if (rawObjs.length === 0) {
                    const riskName = 'خطر تخطيط: لا توجد أهداف استراتيجية محددة';
                    if (!existingNames.has(riskName)) {
                        autoGeneratedRisks.push({
                            name: riskName, category: 'تشغيلي', probability: 4, impact: 5, score: 20,
                            source: 'تحليل', severity: 'critical',
                            desc: 'لا توجد أهداف استراتيجية للإدارة. العمل بدون أهداف واضحة يعني عدم وجود اتجاه استراتيجي.',
                            mitigation: ['تحديد 3-5 أهداف استراتيجية رئيسية', 'ربط الأهداف برؤية المنظمة', 'اعتماد الأهداف وبدء التنفيذ']
                        });
                    }
                }

                // ─── 6. تحليل الإجراءات التصحيحية غير المنفذة ───
                let corrections = null;
                try {
                    corrections = await DeptPage.loadFromAPI('CORRECTIONS_' + _deptKey);
                } catch(e) {}

                if (corrections && corrections.actions) {
                    const pending = corrections.actions.filter(a => a.status === 'pending' && a.priority === 'high');
                    if (pending.length >= 2) {
                        const riskName = `خطر تراكم: ${pending.length} إجراءات تصحيحية عاجلة معلقة`;
                        if (!existingNames.has(riskName)) {
                            autoGeneratedRisks.push({
                                name: riskName, category: 'تشغيلي', probability: 4, impact: 3, score: 12,
                                source: 'تصحيحية', severity: 'high',
                                desc: `يوجد ${pending.length} إجراء تصحيحي بأولوية عالية لم يُنفَّذ بعد. التراكم يزيد احتمالية تفاقم المشاكل.`,
                                mitigation: ['مراجعة أولويات الإجراءات التصحيحية', 'تعيين مسؤول ومتابعة أسبوعية', 'تصعيد العاجل منها للإدارة العليا']
                            });
                        }
                    }
                }

                // ── عرض النتائج ──
                displayAutoGeneratedRisks();

            } catch (err) {
                console.error('[RiskMap] Auto-generate error:', err);
                if (window.DeptPage?.showMessage) DeptPage.showMessage('حدث خطأ أثناء التحليل: ' + err.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = origHtml;
            }
        }

        function displayAutoGeneratedRisks() {
            const banner = document.getElementById('autoGenBanner');
            if (autoGeneratedRisks.length === 0) {
                banner.style.display = 'none';
                if (window.DeptPage?.showMessage) DeptPage.showMessage('لم يتم اكتشاف مخاطر جديدة — الخطة في وضع جيد');
                return;
            }

            banner.style.display = 'block';
            document.getElementById('autoGenCount').textContent = `${autoGeneratedRisks.length} مخاطر مكتشفة`;

            const sourceIcons = { KPI: 'bi-speedometer2', 'مبادرة': 'bi-rocket-takeoff', SWOT: 'bi-grid-3x3-gap-fill', 'تحليل': 'bi-cpu', 'تصحيحية': 'bi-tools' };
            const sevColors = { critical: 'var(--red)', high: 'var(--orange)', medium: 'var(--yellow)', low: 'var(--green)' };

            document.getElementById('autoGenList').innerHTML = autoGeneratedRisks.map((r, idx) => `
                <div style="background:rgba(0,0,0,0.2);border:1px solid rgba(255,255,255,0.04);border-radius:12px;padding:14px 18px;margin-bottom:8px;display:flex;align-items:center;gap:14px">
                    <div style="width:40px;height:40px;border-radius:10px;background:${sevColors[r.severity]}15;color:${sevColors[r.severity]};display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">
                        <i class="bi ${sourceIcons[r.source] || 'bi-exclamation-triangle'}"></i>
                    </div>
                    <div style="flex:1;min-width:0">
                        <div style="font-size:13px;font-weight:800;color:var(--text);margin-bottom:2px">${escapeHtml(r.name)}</div>
                        <div style="font-size:11px;color:var(--muted);display:flex;gap:12px;flex-wrap:wrap">
                            <span><i class="bi bi-tag"></i> ${escapeHtml(r.category)}</span>
                            <span>الاحتمال: ${r.probability}/5</span>
                            <span>التأثير: ${r.impact}/5</span>
                            <span style="color:${sevColors[r.severity]};font-weight:800">الدرجة: ${r.score}</span>
                            <span style="opacity:0.6">المصدر: ${r.source}</span>
                        </div>
                    </div>
                    <div style="display:flex;gap:6px;flex-shrink:0">
                        <button onclick="acceptAutoRisk(${idx})" style="padding:5px 14px;border-radius:8px;border:none;background:rgba(34,197,94,0.15);color:var(--green);font-weight:700;font-size:12px;cursor:pointer;font-family:inherit">
                            <i class="bi bi-check-lg"></i> اعتماد
                        </button>
                        <button onclick="dismissAutoRisk(${idx})" style="padding:5px 10px;border-radius:8px;border:none;background:rgba(255,255,255,0.05);color:var(--muted);cursor:pointer;font-family:inherit;font-size:12px">
                            <i class="bi bi-x-lg"></i>
                        </button>
                    </div>
                </div>
            `).join('');

            // Scroll to banner
            banner.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        async function acceptAutoRisk(idx) {
            const r = autoGeneratedRisks[idx];
            if (!r) return;

            const localRisk = {
                id: 'auto_' + Date.now() + '_' + idx,
                name: r.name, category: r.category,
                probability: r.probability, impact: r.impact, score: r.score,
                owner: 'مدير القسم', desc: r.desc,
                mitigation: r.mitigation || [],
                contingency: '', status: 'OPEN',
                stakeholders: [], stakeholderCount: 0, corrections: [],
                _autoGenerated: true, _source: r.source
            };

            // Try API first
            let savedViaAPI = false;
            const versionId = currentVersionId || (window.StartixAPI?.ensureVersionId ? await StartixAPI.ensureVersionId().catch(() => null) : null);
            if (versionId) {
                try {
                    await window.api.post('/api/risks', {
                        title: r.name, category: r.category,
                        probabilityScore: r.probability, impactScore: r.impact,
                        owner: 'مدير القسم', description: r.desc,
                        mitigation: (r.mitigation || []).join('\n'),
                        versionId, status: 'OPEN'
                    });
                    savedViaAPI = true;
                } catch(e) { console.warn('[RiskMap] API save failed:', e.message); }
            }

            if (!savedViaAPI) {
                risks.push(localRisk);
                await persistLocal();
            }

            // Remove from auto list
            autoGeneratedRisks.splice(idx, 1);
            displayAutoGeneratedRisks();
            await loadRisks();
        }

        function dismissAutoRisk(idx) {
            autoGeneratedRisks.splice(idx, 1);
            displayAutoGeneratedRisks();
        }

        async function acceptAllAutoRisks() {
            const btn = document.querySelector('#autoGenBanner button');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span> جاري الاعتماد...';

            // Accept all remaining
            while (autoGeneratedRisks.length > 0) {
                await acceptAutoRisk(0);
            }

            if (window.DeptPage?.showMessage) DeptPage.showMessage('تم اعتماد جميع المخاطر المكتشفة');
        }

        // === التهيئة ===
        (async function init() {
            // تهيئة DeptPage
            if (window.initDeptPage) await window.initDeptPage();
            if (window.DeptPage) { DeptPage.dept = _urlDept; await DeptPage.init(_urlDept); }

            // عنوان السياق
            const deptLabel = _DEPT_LABELS[_urlDept] || _urlDept;
            const subtitle = document.querySelector('.risk-count-badge');
            if (subtitle) subtitle.closest('div').innerHTML =
                `خريطة حرارية تفاعلية للمخاطر — ${_urlDept !== 'company' ? deptLabel : 'المنظمة'} <span class="risk-count-badge" id="riskCountBadge">0 خطر</span>`;

            // تحديث روابط التنقل
            document.getElementById('prevLink').href = '/reports.html' + _qs;

            // السايدبار
            if (typeof window.initSidebar === 'function') window.initSidebar();

            // جلب المخاطر
            await loadRisks();

            // تحليل ذكي تلقائي إذا لم توجد مخاطر
            if (risks.length === 0 && window.DeptPage) {
                await autoGenerateRisks();
            }
        })();
    </script>
</body>

</html>
