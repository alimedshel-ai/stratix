<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ستارتكس — صحة الشركة الشاملة</title>
    <meta name="description" content="لوحة شاملة لصحة الشركة حسب حجمها — للمالك والمدير التنفيذي">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #0a0d14;
            --bg-card: #141825;
            --bg-card-hover: #1a2035;
            --text: #e2e8f0;
            --text-muted: #8b8ba7;
            --border: rgba(255, 255, 255, 0.07);
            --green: #22c55e;
            --yellow: #f59e0b;
            --red: #ef4444;
            --blue: #3b82f6;
            --purple: #a78bfa;
            --primary: #667eea;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 24px 20px 80px;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse at 20% 10%, rgba(124, 58, 237, 0.07) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 90%, rgba(59, 130, 246, 0.05) 0%, transparent 50%);
            z-index: 0;
            pointer-events: none;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 1100px;
            margin: 0 auto;
        }

        /* ── Header ── */
        .page-header {
            text-align: center;
            margin-bottom: 32px;
            animation: fadeIn .4s ease;
        }

        .logo-text {
            font-size: 20px;
            font-weight: 900;
            background: linear-gradient(135deg, #a78bfa, #38bdf8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 6px;
        }

        .page-title {
            font-size: 26px;
            font-weight: 900;
            margin-bottom: 6px;
        }

        .page-sub {
            font-size: 14px;
            color: var(--text-muted);
        }

        /* ── Tabs ── */
        .tabs-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 32px 0 24px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 8px;
        }

        .tab-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-family: 'Tajawal', sans-serif;
            font-weight: 700;
            font-size: 15px;
            padding: 10px 20px;
            border-radius: 40px;
            cursor: pointer;
            transition: all .2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .tab-btn i {
            font-size: 18px;
        }

        .tab-btn:hover {
            background: rgba(255, 255, 255, .05);
            color: var(--text);
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #667eea22, #764ba222);
            color: #a78bfa;
            border: 1px solid rgba(167, 139, 250, .3);
        }

        .tab-btn.disabled {
            opacity: 0.4;
            pointer-events: none;
        }

        .tab-content {
            display: none;
            animation: fadeIn .4s ease;
        }

        .tab-content.active {
            display: block;
        }

        /* ── Overall Score Banner ── */
        .overall-banner {
            background: linear-gradient(135deg, rgba(102, 126, 234, .12), rgba(167, 139, 250, .06));
            border: 1.5px solid rgba(102, 126, 234, .25);
            border-radius: 20px;
            padding: 28px 32px;
            display: flex;
            align-items: center;
            gap: 28px;
            margin-bottom: 28px;
            animation: slideUp .4s ease;
        }

        .overall-score-circle {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            position: relative;
        }

        .overall-score-circle svg {
            position: absolute;
            top: 0;
            left: 0;
            transform: rotate(-90deg);
        }

        .overall-score-num {
            font-size: 28px;
            font-weight: 900;
            position: relative;
            z-index: 1;
        }

        .overall-score-label {
            font-size: 10px;
            color: var(--text-muted);
            position: relative;
            z-index: 1;
        }

        .overall-info {
            flex: 1;
        }

        .overall-info h2 {
            font-size: 18px;
            font-weight: 800;
            margin-bottom: 6px;
        }

        .overall-info p {
            font-size: 13px;
            color: var(--text-muted);
            line-height: 1.7;
        }

        .overall-stats {
            display: flex;
            gap: 12px;
            margin-top: 12px;
        }

        .overall-stat {
            background: rgba(255, 255, 255, .04);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 8px 14px;
            text-align: center;
        }

        .overall-stat .val {
            font-size: 18px;
            font-weight: 900;
        }

        .overall-stat .lbl {
            font-size: 10px;
            color: var(--text-muted);
        }

        /* ── Section Title ── */
        .section-title {
            font-size: 17px;
            font-weight: 800;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            animation: fadeIn .4s ease;
        }

        /* ── Department Grid ── */
        .dept-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 16px;
            margin-bottom: 32px;
            animation: slideUp .4s ease;
        }

        .dept-card {
            background: var(--bg-card);
            border: 1.5px solid var(--border);
            border-radius: 16px;
            padding: 22px;
            transition: all .3s;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .dept-card:hover {
            border-color: rgba(255, 255, 255, .15);
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, .3);
        }

        .dept-card::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 100%;
            height: 3px;
        }

        .dept-card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 14px;
        }

        .dept-icon-box {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }

        .dept-card-name {
            font-size: 16px;
            font-weight: 800;
        }

        .dept-card-status {
            font-size: 11px;
            font-weight: 700;
            padding: 3px 10px;
            border-radius: 20px;
            margin-right: auto;
        }

        .dept-card-status.completed {
            background: rgba(34, 197, 94, .12);
            color: #22c55e;
            border: 1px solid rgba(34, 197, 94, .25);
        }

        .dept-card-status.pending {
            background: rgba(245, 158, 11, .08);
            color: #f59e0b;
            border: 1px solid rgba(245, 158, 11, .2);
        }

        .dept-card-status.empty {
            background: rgba(255, 255, 255, .04);
            color: var(--text-muted);
            border: 1px solid var(--border);
        }

        .dept-mgr {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            background: rgba(255, 255, 255, .03);
            border-radius: 10px;
            margin-bottom: 12px;
        }

        .dept-mgr-avatar {
            width: 34px;
            height: 34px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: #fff;
            font-weight: 800;
            flex-shrink: 0;
        }

        .dept-mgr-info {
            flex: 1;
            min-width: 0;
        }

        .dept-mgr-name {
            font-size: 13px;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .dept-mgr-contact {
            font-size: 11px;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            direction: ltr;
            text-align: right;
        }

        .dept-score-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        .dept-score-bar {
            flex: 1;
            height: 8px;
            background: rgba(255, 255, 255, .06);
            border-radius: 10px;
            overflow: hidden;
        }

        .dept-score-fill {
            height: 100%;
            border-radius: 10px;
            transition: width .6s ease;
        }

        .dept-score-num {
            font-size: 15px;
            font-weight: 900;
            min-width: 42px;
            text-align: left;
        }

        .dept-metrics {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .dept-metric {
            font-size: 10px;
            padding: 3px 8px;
            border-radius: 6px;
            background: rgba(255, 255, 255, .04);
            border: 1px solid var(--border);
            color: var(--text-muted);
            font-weight: 600;
        }

        /* ── Value Chain ── */
        .value-chain-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .value-chain-col {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
        }

        .value-chain-col h3 {
            font-size: 16px;
            font-weight: 800;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .value-chain-item {
            background: rgba(255, 255, 255, .02);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 10px;
            border-right: 3px solid;
        }

        .value-chain-item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        .value-chain-item-name {
            font-weight: 700;
        }

        .value-chain-item-score {
            font-size: 12px;
            font-weight: 800;
            padding: 2px 8px;
            border-radius: 20px;
            background: rgba(255, 255, 255, .04);
        }

        .value-chain-item-desc {
            font-size: 11px;
            color: var(--text-muted);
        }

        /* ── Deep Analysis Section ── */
        .deep-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
            margin-top: 20px;
        }

        .deep-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            text-decoration: none;
            color: inherit;
            transition: all .2s;
        }

        .deep-card:hover {
            border-color: rgba(255, 255, 255, .15);
            transform: translateY(-2px);
        }

        .deep-card-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .deep-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .deep-title {
            font-weight: 800;
            font-size: 15px;
        }

        .deep-desc {
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 12px;
        }

        .deep-meta {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: var(--text-muted);
            border-top: 1px solid var(--border);
            padding-top: 10px;
        }

        /* ── Radar Chart ── */
        .radar-section {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 28px;
            margin-bottom: 28px;
            text-align: center;
            animation: slideUp .5s ease;
        }

        .radar-canvas-wrap {
            display: flex;
            justify-content: center;
            margin-top: 16px;
        }

        /* ── Ranking Table ── */
        .ranking-section {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 28px;
            animation: slideUp .5s ease;
        }

        .rank-table {
            width: 100%;
            border-collapse: collapse;
        }

        .rank-table th {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
            text-align: right;
            padding: 8px 12px;
            border-bottom: 1px solid var(--border);
        }

        .rank-table td {
            padding: 10px 12px;
            font-size: 13px;
            border-bottom: 1px solid rgba(255, 255, 255, .03);
            vertical-align: middle;
        }

        .rank-table tr:hover td {
            background: rgba(255, 255, 255, .02);
        }

        .rank-num {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 800;
        }

        .rank-1 {
            background: rgba(239, 68, 68, .15);
            color: #ef4444;
        }

        .rank-2 {
            background: rgba(245, 158, 11, .15);
            color: #f59e0b;
        }

        .rank-3 {
            background: rgba(245, 158, 11, .1);
            color: #f59e0b;
        }

        .rank-ok {
            background: rgba(34, 197, 94, .1);
            color: #22c55e;
        }

        /* ── Back Button ── */
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border-radius: 10px;
            background: rgba(255, 255, 255, .04);
            border: 1px solid var(--border);
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 600;
            text-decoration: none;
            transition: all .2s;
            margin-bottom: 20px;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, .08);
            color: var(--text);
        }

        /* ── Empty State ── */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            animation: fadeIn .4s ease;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .empty-state-title {
            font-size: 20px;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .empty-state-desc {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 20px;
            line-height: 1.7;
        }

        .empty-state a {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 10px 24px;
            border-radius: 12px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            font-weight: 700;
            font-size: 14px;
            text-decoration: none;
            transition: transform .2s;
        }

        .empty-state a:hover {
            transform: scale(1.03);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(16px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ── Inline Wizard (Departments Tab) ── */
        .wiz-mode-toggle {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .wiz-mode-btn {
            flex: 1;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1.5px solid var(--border);
            background: var(--bg-card);
            color: var(--text-muted);
            font-family: 'Tajawal', sans-serif;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all .2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .wiz-mode-btn.active {
            background: rgba(13, 148, 136, .1);
            border-color: rgba(13, 148, 136, .35);
            color: #14b8a6;
        }

        .wiz-mode-btn:hover:not(.active) {
            background: rgba(255, 255, 255, .05);
            color: var(--text);
        }

        .wiz-dept-select-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }

        .wiz-dept-chip {
            background: var(--bg-card);
            border: 2px solid var(--border);
            border-radius: 14px;
            padding: 16px 12px;
            text-align: center;
            cursor: pointer;
            transition: all .25s;
        }

        .wiz-dept-chip:hover {
            border-color: rgba(13, 148, 136, .3);
            background: rgba(13, 148, 136, .04);
        }

        .wiz-dept-chip.selected {
            border-color: #14b8a6;
            background: rgba(13, 148, 136, .08);
        }

        .wiz-dept-chip.done {
            border-color: rgba(34, 197, 94, .3);
            background: rgba(34, 197, 94, .06);
        }

        .wiz-dept-chip .wiz-chip-emoji {
            font-size: 24px;
            margin-bottom: 6px;
        }

        .wiz-dept-chip .wiz-chip-name {
            font-size: 13px;
            font-weight: 700;
        }

        .wiz-dept-chip .wiz-chip-status {
            font-size: 10px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .wiz-q-card {
            background: var(--bg-card);
            border: 1.5px solid var(--border);
            border-radius: 18px;
            padding: 28px;
            animation: slideUp .3s ease;
        }

        .wiz-q-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 14px;
        }

        .wiz-q-text {
            font-size: 18px;
            font-weight: 800;
            line-height: 1.7;
            margin-bottom: 20px;
        }

        .wiz-q-options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .wiz-q-opt {
            background: rgba(255, 255, 255, .02);
            border: 2px solid var(--border);
            border-radius: 14px;
            padding: 14px 18px;
            cursor: pointer;
            transition: all .25s;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
            font-weight: 600;
        }

        .wiz-q-opt:hover {
            border-color: rgba(13, 148, 136, .3);
            background: rgba(13, 148, 136, .04);
        }

        .wiz-q-opt.selected {
            border-color: #14b8a6;
            background: rgba(13, 148, 136, .08);
        }

        .wiz-q-opt .wiz-radio {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 2px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all .25s;
        }

        .wiz-q-opt.selected .wiz-radio {
            border-color: #14b8a6;
            background: #14b8a6;
        }

        .wiz-q-opt.selected .wiz-radio::after {
            content: '✓';
            color: #fff;
            font-size: 12px;
            font-weight: 800;
        }

        .wiz-progress-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 20px;
        }

        .wiz-progress-track {
            flex: 1;
            height: 6px;
            border-radius: 3px;
            background: rgba(255, 255, 255, .06);
            overflow: hidden;
        }

        .wiz-progress-fill {
            height: 100%;
            border-radius: 3px;
            background: linear-gradient(90deg, #0D9488, #14B8A6);
            transition: width .4s;
        }

        .wiz-progress-text {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 600;
            white-space: nowrap;
        }

        .wiz-nav {
            display: flex;
            justify-content: space-between;
            margin-top: 18px;
        }

        .wiz-btn {
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            font-family: 'Tajawal', sans-serif;
            transition: all .25s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .wiz-btn.prev {
            background: var(--bg-card);
            color: var(--text-muted);
            border: 1px solid var(--border);
        }

        .wiz-btn.next {
            background: linear-gradient(135deg, #0D9488, #14B8A6);
            color: #fff;
        }

        .wiz-btn:disabled {
            opacity: .4;
            cursor: not-allowed;
        }

        .wiz-result-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 14px;
            animation: slideUp .3s ease;
        }

        @media (max-width: 768px) {
            .overall-banner {
                flex-direction: column;
                text-align: center;
                padding: 20px;
            }

            .overall-stats {
                justify-content: center;
            }

            .dept-grid {
                grid-template-columns: 1fr;
            }

            .page-title {
                font-size: 22px;
            }

            .value-chain-grid {
                grid-template-columns: 1fr;
            }

            .wiz-dept-select-grid {
                grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            }
        }
    </style>
</head>

<body>
    <div class="container">

        <a href="/ceo-dashboard.html" class="back-btn">
            <i class="bi bi-arrow-right"></i> العودة للوحة القيادة
        </a>

        <div class="page-header">
            <div class="logo-text">Startix ✦</div>
            <h1 class="page-title">🏥 صحة الشركة الشاملة</h1>
            <p class="page-sub" id="companyName">تحليل متكامل حسب حجم المنشأة</p>
        </div>

        <!-- Tabs (سيتم بناؤها ديناميكياً بواسطة JavaScript) -->
        <div class="tabs-container" id="tabsContainer"></div>

        <!-- Tab Contents -->
        <div id="tabOverview" class="tab-content">
            <!-- محتوى النظرة العامة: banner + radar + ranking -->
            <div id="overallBanner"></div>

            <!-- ✨ مؤشرات حية من الإدارات (API) -->
            <div id="liveHealthSection" style="display:none">
                <div class="section-title"><i class="bi bi-activity"></i> المؤشرات الحية — من الإدارات</div>
                <div id="liveHealthCards" class="dept-grid"></div>
            </div>

            <div class="radar-section" id="radarSection" style="display:none">
                <div class="section-title" style="justify-content:center"><i class="bi bi-diagram-3-fill"></i> مقارنة
                    الإدارات</div>
                <div class="radar-canvas-wrap">
                    <canvas id="radarCanvas" width="400" height="400"></canvas>
                </div>
            </div>
            <div class="ranking-section" id="rankingSection" style="display:none">
                <div class="section-title"><i class="bi bi-trophy-fill"></i> ترتيب الإدارات (من الأضعف)</div>
                <table class="rank-table" id="rankTable">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>الإدارة</th>
                            <th>المدير</th>
                            <th>الدرجة</th>
                            <th>الحالة</th>
                        </tr>
                    </thead>
                    <tbody id="rankBody"></tbody>
                </table>
            </div>
        </div>

        <div id="tabDepartments" class="tab-content">
            <div class="section-title"><i class="bi bi-grid-3x3-gap-fill"></i> الإدارات</div>
            <!-- Mode Toggle: Summary vs Assessment -->
            <div class="wiz-mode-toggle" id="deptModeToggle">
                <button class="wiz-mode-btn active" data-action="dept-mode" data-mode="summary">
                    <i class="bi bi-grid-3x3-gap"></i> ملخص الإدارات
                </button>
                <button class="wiz-mode-btn" data-action="dept-mode" data-mode="assess">
                    <i class="bi bi-clipboard2-pulse"></i> تقييم إدارة
                </button>
            </div>
            <!-- Summary Mode -->
            <div id="deptSummaryMode">
                <div class="dept-grid" id="deptGrid"></div>
            </div>
            <!-- Assessment Wizard Mode -->
            <div id="deptAssessMode" style="display:none">
                <div id="wizDeptSelect"></div>
                <div id="wizQuestionArea"></div>
                <div id="wizResultArea"></div>
            </div>
        </div>

        <div id="tabDeep" class="tab-content">
            <div class="section-title"><i class="bi bi-search-heart"></i> تعمق في الإدارات</div>
            <div id="deepContent"></div>
        </div>

    </div>

    <script>
        (function () {
            'use strict';

            // ═══ Event Delegation (CSP Safe) ═══
            document.body.addEventListener('click', function (e) {
                const target = e.target.closest('[data-action]');
                if (!target) return;

                const action = target.dataset.action;
                switch (action) {
                    case 'wiz-select':
                        selectWizAnswer(parseInt(target.dataset.qi), parseInt(target.dataset.val));
                        break;
                    case 'wiz-next':
                        nextWizQ();
                        break;
                    case 'wiz-prev':
                        prevWizQ();
                        break;
                    case 'wiz-finish':
                        finishWizDept();
                        break;
                    case 'wiz-cancel':
                        cancelWizDept();
                        break;
                    case 'wiz-start':
                        startWizDept(target.dataset.dept);
                        break;
                    case 'dept-navigate':
                        window.location.href = target.dataset.href;
                        break;
                    case 'dept-mode-summary':
                        setDeptMode('summary');
                        break;
                    case 'dept-mode':
                        setDeptMode(target.dataset.mode);
                        break;
                }
            });

            // ==================== الإعدادات العامة ====================
            const DEPTS = [
                { key: 'compliance', label: 'الامتثال', icon: '⚖️', color: '#ef4444' },
                { key: 'finance', label: 'المالية', icon: '💰', color: '#f59e0b' },
                { key: 'sales', label: 'المبيعات', icon: '📈', color: '#10b981' },
                { key: 'hr', label: 'الموارد البشرية', icon: '👥', color: '#3b82f6' },
                { key: 'marketing', label: 'التسويق', icon: '📣', color: '#8b5cf6' },
                { key: 'operations', label: 'العمليات', icon: '⚙️', color: '#6366f1' },
                { key: 'support', label: 'الخدمات المساندة', icon: '🛠️', color: '#64748b' },
            ];

            // مراحل النمو حسب حجم الشركة (للإدارات)
            const SIZE_DEPTS = {
                small: DEPTS.map(d => d.key), // عرض كافة الإدارات السبع دائماً بناءً على رغبة المالك
                medium: DEPTS.map(d => d.key), // 7 إدارات
                large: DEPTS.map(d => d.key)  // 7 إدارات فأكثر
            };

            const AXIS_MAP = {
                compliance: 'تنظيمي', finance: 'مالي', sales: 'قطاعي',
                hr: 'عمالة', marketing: 'قطاعي', operations: 'إداري', support: 'إداري',
            };

            // ==================== قراءة البيانات الموحدة ====================
            function loadUnifiedHealth() {
                // محاولة قراءة الكائن الموحد الجديد
                let health = JSON.parse(localStorage.getItem('stratix_company_health') || 'null');
                if (health) return health;

                // إذا لم يوجد، نقوم بترحيل البيانات القديمة (migration)
                return migrateOldData();
            }

            function migrateOldData() {
                console.log('ترحيل البيانات القديمة إلى الكيان الموحد...');
                const health = {
                    sizeCategory: 'medium', // default
                    overallScore: null,
                    completedTabs: [],
                    departments: {},
                    valueChain: { completed: false, primary: {}, support: {} },
                    deepAnalysis: {},
                    lastUpdated: new Date().toISOString(),
                    version: '2.0'
                };

                // 1. الحجم من painAmbition
                const pa = JSON.parse(localStorage.getItem('painAmbition') || '{}');
                health.sizeCategory = pa.sizeCategory || 'medium';

                // 2. بيانات deptDeep
                const deptDeep = JSON.parse(localStorage.getItem('stratix_dept_deep_payload') || '{}');
                DEPTS.forEach(dept => {
                    const d = deptDeep[dept.key] || {};
                    health.departments[dept.key] = {
                        score: d.score || null,
                        answers: d.answers || {},
                        manager: d.deptManagerInfo || {},
                        challenges: d.challenges || [],
                        goals: d.goals || [],
                        completed: d.completed || false
                    };
                });

                // 3. نتائج التحليل العميق (deep results)
                ['compliance', 'finance', 'sales', 'hr'].forEach(key => {
                    const deep = JSON.parse(localStorage.getItem(key + 'DeepResults') || 'null');
                    if (deep) {
                        if (!health.deepAnalysis[key]) health.deepAnalysis[key] = {};
                        health.deepAnalysis[key] = deep;
                        if (health.departments[key]) {
                            health.departments[key].deepScore = deep.score;
                        }
                    }
                });

                // 4. بيانات سلسلة القيمة (لم تكن موجودة بشكل منفصل، نضعها فارغة)

                // حفظ الكيان الموحد
                localStorage.setItem('stratix_company_health', JSON.stringify(health));
                return health;
            }

            function saveUnifiedHealth(health) {
                localStorage.setItem('stratix_company_health', JSON.stringify(health));
            }

            const healthData = loadUnifiedHealth();
            const sizeCategory = healthData.sizeCategory; // 'small', 'medium', 'large'

            // اسم الشركة من التشخيص القديم (أو من health)
            const diagPayload = JSON.parse(localStorage.getItem('stratix_diagnostic_payload') || 'null');
            const companyName = diagPayload?.company?.name || localStorage.getItem('stratix_company_name') || '';
            if (companyName) {
                document.getElementById('companyName').textContent = `${companyName} — تحليل متكامل حسب حجم المنشأة`;
            }

            // ==================== دعم URL Parameters ====================
            const urlParams = new URLSearchParams(window.location.search);
            const requestedTab = urlParams.get('tab') || 'overview';

            // ==================== بناء التبويبات ====================
            const tabs = [
                { id: 'overview', label: 'نظرة عامة', icon: 'bi-eye-fill', always: true },
                { id: 'departments', label: 'الإدارات', icon: 'bi-grid-3x3-gap-fill', always: true },
                { id: 'deep', label: 'تعمق', icon: 'bi-search-heart', condition: sizeCategory === 'large' }
            ];

            const tabsContainer = document.getElementById('tabsContainer');
            tabsContainer.innerHTML = '';

            // تحديد التبويب الافتراضي (من URL أو overview)
            const availableTabs = tabs.filter(t => t.condition !== false);
            const defaultTab = availableTabs.find(t => t.id === requestedTab) ? requestedTab : 'overview';

            tabs.forEach(tab => {
                if (tab.condition === false) return; // لا يظهر
                const btn = document.createElement('button');
                btn.className = `tab-btn ${tab.id === defaultTab ? 'active' : ''}`;
                btn.setAttribute('data-tab', tab.id);
                btn.innerHTML = `<i class="bi ${tab.icon}"></i> ${tab.label}`;
                btn.addEventListener('click', () => switchTab(tab.id));
                tabsContainer.appendChild(btn);
            });

            // إخفاء كل التبويبات وإظهار المطلوب
            function switchTab(tabId) {
                document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
                const tabEl = document.getElementById(`tab${tabId.charAt(0).toUpperCase() + tabId.slice(1)}`);
                if (tabEl) tabEl.classList.add('active');

                document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
                const activeBtn = document.querySelector(`.tab-btn[data-tab="${tabId}"]`);
                if (activeBtn) activeBtn.classList.add('active');

                // تحديث URL بدون reload
                const url = new URL(window.location);
                url.searchParams.set('tab', tabId);
                history.replaceState(null, '', url);

                if (tabId === 'overview') renderOverview();
                else if (tabId === 'departments') renderDepartments();
                else if (tabId === 'deep') renderDeep();
            }

            // ==================== دالات مساعدة ====================
            function getDeptScore(key) {
                return healthData.departments[key]?.score ?? null;
            }

            function scoreColor(s) {
                if (s == null) return 'var(--text-muted)';
                return s >= 70 ? 'var(--green)' : s >= 45 ? 'var(--yellow)' : 'var(--red)';
            }

            function scoreStatus(s) {
                if (s == null) return { text: 'لم يُقيّم', cls: 'empty' };
                if (s >= 70) return { text: '🟢 جيد', cls: 'completed' };
                if (s >= 45) return { text: '🟡 يحتاج تطوير', cls: 'pending' };
                return { text: '🔴 حرج', cls: 'pending' };
            }

            // 🛡️ دالة ذكية لتوجيه الإدارات ذات الصفحات المخصصة
            function getDeptDeepLink(deptKey) {
                const customPages = ['hr', 'finance', 'marketing']; // أضف أي إدارة مخصصة هنا مستقبلاً
                return customPages.includes(deptKey) ? `/${deptKey}-deep.html` : `/dept-deep.html?dept=${deptKey}`;
            }

            // ==================== عرض النظرة العامة (Overview) ====================
            function renderOverview() {
                const deptsThisSize = SIZE_DEPTS[sizeCategory] || DEPTS.map(d => d.key);
                const relevantDepts = DEPTS.filter(d => deptsThisSize.includes(d.key));

                // حساب المتوسط
                let totalScore = 0, scoredCount = 0, completedCount = 0;
                relevantDepts.forEach(dept => {
                    const d = healthData.departments[dept.key] || {};
                    if (d.completed) completedCount++;
                    const score = getDeptScore(dept.key);
                    if (score != null) { totalScore += score; scoredCount++; }
                });

                const avgScore = scoredCount ? Math.round(totalScore / scoredCount) : null;
                const avgColor = scoreColor(avgScore);
                const avgStatus = avgScore >= 70 ? 'أداء جيد' : avgScore >= 45 ? 'يحتاج تطوير' : avgScore != null ? 'يحتاج اهتمام عاجل' : 'لم يُقيّم';
                const managersAssigned = relevantDepts.filter(d => healthData.departments[d.key]?.manager?.name).length;

                // جلب نتيجة الفحص العام (إن وجدت)
                let genAssessmentScore = null;
                try {
                    const genData = JSON.parse(localStorage.getItem('generalAssessment'));
                    if (genData && genData.results && genData.results._overall) {
                        genAssessmentScore = genData.results._overall.pct;
                    }
                } catch (e) { }

                const circumference = 2 * Math.PI * 42;
                const offset = avgScore != null ? circumference - (avgScore / 100) * circumference : circumference;

                document.getElementById('overallBanner').innerHTML = `
                <!-- 1. CEO General Assessment (Company Level) -->
                <div style="background:var(--bg-card); border:1px solid var(--border); border-radius:18px; padding:24px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:16px; margin-bottom:20px; position:relative; overflow:hidden;">
                    <div style="position:absolute; top:0; right:0; width:4px; height:100%; background:linear-gradient(to bottom, #6366f1, #a855f7);"></div>
                    <div style="display:flex; align-items:center; gap:16px;">
                        <div style="width:54px; height:54px; border-radius:14px; background:rgba(99, 102, 241, 0.1); color:#6366f1; display:flex; align-items:center; justify-content:center; font-size:24px;">
                            <i class="bi bi-building-check"></i>
                        </div>
                        <div>
                            <h2 style="font-size:16px; font-weight:800; margin:0 0 6px 0; color:var(--text); display:flex; align-items:center; gap:8px;">الفحص الداخلي للشركة <span style="font-size:10px; padding:2px 8px; background:rgba(255,255,255,0.05); border-radius:6px; color:var(--text-muted); font-weight:700;">تقييم القيادة العليا</span></h2>
                            <p style="font-size:13px; color:var(--text-muted); margin:0;">مؤشر يعكس مدى النضج المؤسسي، قوة نموذج العمل، والجاهزية الرقمية للشركة ككل.</p>
                        </div>
                    </div>
                    ${genAssessmentScore != null
                        ? `<div style="display:flex; align-items:center; gap:20px; background:rgba(255,255,255,0.02); padding:10px 24px; border-radius:14px; border:1px solid var(--border);">
                             <div style="text-align:center;">
                                 <div style="font-size:11px; color:var(--text-muted); margin-bottom:4px;">النتيجة الشاملة</div>
                                 <div style="font-size:26px; font-weight:900; line-height:1; color:${scoreColor(genAssessmentScore)}">${genAssessmentScore}%</div>
                             </div>
                             <div style="width:1px; height:40px; background:var(--border);"></div>
                             <a href="/internal-env.html" style="padding: 10px 18px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: 13px; font-weight: 700; text-decoration: none; transition: all 0.2s;">إعادة الفحص</a>
                           </div>`
                        : `<a href="/internal-env.html" style="padding: 12px 28px; background: linear-gradient(135deg, var(--primary), var(--secondary)); border: none; border-radius: 12px; color: white; font-size: 14px; font-weight: 800; text-decoration: none; display: inline-flex; align-items: center; gap: 8px; box-shadow: 0 4px 16px rgba(102,126,234,0.3);"><i class="bi bi-search"></i> ابدأ الفحص الشامل لشركتك</a>`
                    }
                </div>

                <!-- 2. Departments Average Health (Operational Level) -->
                <div class="overall-banner" style="position:relative; margin-bottom:0;">
                    <div style="position:absolute; top:24px; left:24px; font-size:11px; font-weight:800; color:var(--text-muted); padding:4px 10px; background:rgba(255,255,255,0.05); border-radius:6px;">مستوى التفعيل والتشغيل للإدارات</div>
                    <div class="overall-score-circle">
                        <svg width="100" height="100" viewBox="0 0 100 100">
                            <circle cx="50" cy="50" r="42" fill="none" stroke="rgba(255,255,255,.06)" stroke-width="6"/>
                            <circle cx="50" cy="50" r="42" fill="none" stroke="${avgColor}" stroke-width="6"
                                stroke-dasharray="${circumference}" stroke-dashoffset="${offset}"
                                stroke-linecap="round" style="transition:stroke-dashoffset 1s ease"/>
                        </svg>
                        <div class="overall-score-num" style="color:${avgColor}">${avgScore ?? '—'}</div>
                        <div class="overall-score-label">${avgScore != null ? 'متوسط' : ''}</div>
                    </div>
                    <div class="overall-info">
                        <h2>صحة الإدارات — ${avgStatus}</h2>
                        <p>هذا المتوسط يقرأ أداء الإدارات في أرض الواقع. يعكس المؤشر إنجاز ${scoredCount} إدارات من أصل ${relevantDepts.length} إدارة مُفعلة${companyName ? ' في ' + companyName : ''}.</p>
                        
                        <div class="overall-stats" style="margin-top:20px; border-top:1px solid rgba(255,255,255,0.04); padding-top:20px;">
                            <div class="overall-stat"><div class="val" style="color:var(--green)">${completedCount}</div><div class="lbl">أقسام مكتملة</div></div>
                            <div class="overall-stat"><div class="val" style="color:var(--blue)">${managersAssigned}</div><div class="lbl">مدراء مُعينين</div></div>
                            <div class="overall-stat"><div class="val" style="color:var(--purple)">${scoredCount}</div><div class="lbl">أقسام مُقيّمة</div></div>
                            <div class="overall-stat"><div class="val" style="color:var(--yellow)">${relevantDepts.length - completedCount}</div><div class="lbl">أقسام متبقية</div></div>
                        </div>
                    </div>
                </div>`;

                // Radar chart
                const scoredDepts = relevantDepts.filter(d => getDeptScore(d.key) != null);
                if (scoredDepts.length >= 3) {
                    document.getElementById('radarSection').style.display = '';
                    drawRadar(scoredDepts);
                } else {
                    document.getElementById('radarSection').style.display = 'none';
                }

                // Ranking table
                if (scoredCount > 0) {
                    document.getElementById('rankingSection').style.display = '';
                    const allScored = relevantDepts.map(d => {
                        const mgr = healthData.departments[d.key]?.manager || {};
                        return { ...d, score: getDeptScore(d.key), mgrName: mgr.name || '—', completed: healthData.departments[d.key]?.completed };
                    }).sort((a, b) => (a.score ?? -1) - (b.score ?? -1));

                    const tbody = document.getElementById('rankBody');
                    tbody.innerHTML = allScored.map((d, i) => {
                        const rankCls = d.score == null ? '' : (i === 0 ? 'rank-1' : i === 1 ? 'rank-2' : i === 2 ? 'rank-3' : 'rank-ok');
                        const statusColor = scoreColor(d.score);
                        return `<tr onclick="location.href='${getDeptDeepLink(d.key)}'" style="cursor:pointer">
                            <td><span class="rank-num ${rankCls}">${i + 1}</span></td>
                            <td style="font-weight:700">${d.icon} ${d.label}</td>
                            <td style="color:${d.mgrName !== '—' ? 'var(--text)' : 'var(--text-muted)'}">${d.mgrName}</td>
                            <td style="font-weight:900;color:${statusColor}">${d.score != null ? d.score + '%' : '—'}</td>
                            <td><span style="font-size:11px;padding:3px 10px;border-radius:20px;background:${statusColor}22;color:${statusColor};font-weight:700">
                                ${d.score != null ? scoreStatus(d.score).text : 'لم يُقيّم'}
                            </span></td>
                        </tr>`;
                    }).join('');
                } else {
                    document.getElementById('rankingSection').style.display = 'none';
                }
            }

            function drawRadar(items) {
                const canvas = document.getElementById('radarCanvas');
                const ctx = canvas.getContext('2d');
                const w = canvas.width, h = canvas.height;
                const cx = w / 2, cy = h / 2;
                const maxR = 160;
                const n = items.length;
                const step = (2 * Math.PI) / n;

                ctx.clearRect(0, 0, w, h);

                // Grid circles
                [20, 40, 60, 80, 100].forEach(pct => {
                    const r = (pct / 100) * maxR;
                    ctx.beginPath();
                    ctx.arc(cx, cy, r, 0, 2 * Math.PI);
                    ctx.strokeStyle = 'rgba(255,255,255,.06)';
                    ctx.lineWidth = 1;
                    ctx.stroke();
                    if (pct % 40 === 0 || pct === 100) {
                        ctx.fillStyle = 'rgba(255,255,255,.2)';
                        ctx.font = '10px Tajawal';
                        ctx.fillText(pct + '%', cx + 4, cy - r + 12);
                    }
                });

                // Grid lines
                items.forEach((_, i) => {
                    const angle = -Math.PI / 2 + i * step;
                    ctx.beginPath();
                    ctx.moveTo(cx, cy);
                    ctx.lineTo(cx + Math.cos(angle) * maxR, cy + Math.sin(angle) * maxR);
                    ctx.strokeStyle = 'rgba(255,255,255,.06)';
                    ctx.stroke();
                });

                // Data polygon
                ctx.beginPath();
                items.forEach((item, i) => {
                    const angle = -Math.PI / 2 + i * step;
                    const r = (getDeptScore(item.key) / 100) * maxR;
                    const x = cx + Math.cos(angle) * r;
                    const y = cy + Math.sin(angle) * r;
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                });
                ctx.closePath();
                ctx.fillStyle = 'rgba(102,126,234,.15)';
                ctx.fill();
                ctx.strokeStyle = '#667eea';
                ctx.lineWidth = 2;
                ctx.stroke();

                // Points & labels
                items.forEach((item, i) => {
                    const angle = -Math.PI / 2 + i * step;
                    const r = (getDeptScore(item.key) / 100) * maxR;
                    const x = cx + Math.cos(angle) * r;
                    const y = cy + Math.sin(angle) * r;

                    ctx.beginPath();
                    ctx.arc(x, y, 4, 0, 2 * Math.PI);
                    ctx.fillStyle = item.color;
                    ctx.fill();
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 1.5;
                    ctx.stroke();

                    const lx = cx + Math.cos(angle) * (maxR + 22);
                    const ly = cy + Math.sin(angle) * (maxR + 22);
                    ctx.fillStyle = 'var(--text)';
                    ctx.font = '700 12px Tajawal';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillStyle = '#e2e8f0';
                    ctx.fillText(`${item.icon} ${item.label}`, lx, ly - 8);
                    ctx.fillStyle = item.color;
                    ctx.font = '900 13px Tajawal';
                    ctx.fillText(getDeptScore(item.key) + '%', lx, ly + 8);
                });
            }

            // ==================== عرض الإدارات (Departments) ====================
            function renderDepartments() {
                const deptsThisSize = SIZE_DEPTS[sizeCategory] || DEPTS.map(d => d.key);
                let filteredDepts = DEPTS.filter(d => deptsThisSize.includes(d.key));

                // === فلتر لمدير الإدارة: إدارته فقط ===

                    },
                    {
                        q: 'كم نسبة الهدر في عملياتكم الأساسية؟', opts: [
                            { v: 1, t: 'لا نقيس الهدر', icon: '🔴' }, { v: 2, t: 'موجود بدون أرقام', icon: '🟡' },
                            { v: 3, t: 'أقل من 10% ومتابع', icon: '🟢' }, { v: 4, t: 'Lean/Six Sigma — أقل من 3%', icon: '⭐' }
                        ]
                    },
                    {
                        q: 'كم مرة تتكرر نفس المشكلة التشغيلية؟', opts: [
                            { v: 1, t: 'دائماً — نفس الحرائق', icon: '🔴' }, { v: 2, t: 'أحياناً — بدون RCA', icon: '🟡' },
                            { v: 3, t: 'نادراً — RCA ثقافة', icon: '🟢' }, { v: 4, t: 'لا تتكرر — نظام وقائي', icon: '⭐' }
                        ]
                    },
                    {
                        q: 'هل تقدرون تزيدون الإنتاج 50% بدون توظيف؟', opts: [
                            { v: 1, t: 'مستحيل — مثقلين', icon: '🔴' }, { v: 2, t: 'نحتاج إعادة هيكلة', icon: '🟡' },
                            { v: 3, t: 'ممكن — طاقة فائضة', icon: '🟢' }, { v: 4, t: 'نعم — scalable + أتمتة', icon: '⭐' }
                        ]
                    },
                    {
                        q: 'هل مؤشرات الأداء التشغيلي حية ومتابعة؟', opts: [
                            { v: 1, t: 'لا نقيس', icon: '🔴' }, { v: 2, t: 'تقارير شهرية يدوية', icon: '🟡' },
                            { v: 3, t: 'Dashboards أسبوعية', icon: '🟢' }, { v: 4, t: 'Real-time + تنبيهات + تحليل', icon: '⭐' }
                        ]
                    }
                ],
                support: [
                    {
                        q: 'لو عميل أرسل شكوى — كم وقت تحتاج لحلها؟', opts: [
                            { v: 1, t: 'أيام — لا نظام واضح', icon: '🔴' }, { v: 2, t: 'يوم — بدون تتبع', icon: '🟡' },
                            { v: 3, t: 'ساعات — نظام تذاكر + SLA', icon: '🟢' }, { v: 4, t: 'دقائق — AI + أتمتة', icon: '⭐' }
                        ]
                    },
                    {
                        q: 'هل تعرف درجة رضا عملائك (NPS) الآن؟', opts: [
                            { v: 1, t: 'لا — "اللي ما شكا = راضي"', icon: '🔴' }, { v: 2, t: 'نقيس أحياناً', icon: '🟡' },
                            { v: 3, t: 'NPS/CSAT ربعي + تحسين', icon: '🟢' }, { v: 4, t: 'Real-time CSAT + closed-loop', icon: '⭐' }
                        ]
                    },
                    {
                        q: 'كم نسبة العملاء المتكررين (Retention)؟', opts: [
                            { v: 1, t: 'لا نتتبع', icon: '🔴' }, { v: 2, t: 'أقل من 30%', icon: '🟡' },
                            { v: 3, t: '30-60% — برامج ولاء', icon: '🟢' }, { v: 4, t: '60%+ — عملاء أوفياء', icon: '⭐' }
                        ]
                    },
                    {
                        q: 'هل فريق الخدمة مدرب ومؤهل؟', opts: [
                            { v: 1, t: 'لا تدريب', icon: '🔴' }, { v: 2, t: 'تدريب أولي فقط', icon: '🟡' },
                            { v: 3, t: 'برنامج + Quality monitoring', icon: '🟢' }, { v: 4, t: 'أكاديمية + مسارات ترقية', icon: '⭐' }
                        ]
                    },
                    {
                        q: 'كم قناة تواصل متاحة لعملائك؟', opts: [
                            { v: 1, t: 'هاتف فقط — وأحياناً لا أحد يرد', icon: '🔴' }, { v: 2, t: 'هاتف + واتساب غير منظم', icon: '🟡' },
                            { v: 3, t: 'متعدد القنوات منظم', icon: '🟢' }, { v: 4, t: 'Omni-channel + chatbot', icon: '⭐' }
                        ]
                    }
                ]
            };

            // ── Wizard State ──
            const wizState = { activeDept: null, currentQ: 0, answers: {} };

            // ── Mode Toggle (exposed globally) ──
            window.setDeptMode = function (mode) {
                document.querySelectorAll('.wiz-mode-btn').forEach(b => {
                    b.classList.toggle('active', b.dataset.mode === mode);
                });
                document.getElementById('deptSummaryMode').style.display = mode === 'summary' ? '' : 'none';
                document.getElementById('deptAssessMode').style.display = mode === 'assess' ? '' : 'none';
                if (mode === 'assess') renderWizDeptSelect();
            };

            function renderWizDeptSelect() {
                const deptsThisSize = SIZE_DEPTS[sizeCategory] || DEPTS.map(d => d.key);
                let relevant = DEPTS.filter(d => deptsThisSize.includes(d.key));

                // === فلتر لمدير الإدارة: إدارته فقط ===
                const _deptParam = urlParams.get('dept');
                if (_deptParam) {
                    relevant = relevant.filter(d => d.key === _deptParam);
                    if (relevant.length === 0) {
                        relevant = DEPTS.filter(d => d.key === _deptParam);
                    }
                }

                document.getElementById('wizQuestionArea').innerHTML = '';
                document.getElementById('wizResultArea').innerHTML = '';

                const html = relevant.map(dept => {
                    const d = healthData.departments[dept.key] || {};
                    const isDone = d.completed === true;
                    const score = getDeptScore(dept.key);
                    return `<div class="wiz-dept-chip ${isDone ? 'done' : ''}" data-action="wiz-start" data-dept="${dept.key}" ${_deptParam ? 'style="max-width:400px;margin:0 auto"' : ''}>
                        <div class="wiz-chip-emoji">${dept.icon}</div>
                        <div class="wiz-chip-name">${dept.label}</div>
                        <div class="wiz-chip-status">${isDone ? '✅ ' + (score != null ? score + '%' : 'مكتمل') : 'ابدأ التقييم'}</div>
                    </div>`;
                }).join('');

                document.getElementById('wizDeptSelect').innerHTML = `
                    <div style="margin-bottom:12px;font-size:14px;color:var(--text-muted)">${_deptParam ? 'قيّم إدارتك — 5 أسئلة (دقيقة واحدة)' : 'اختر الإدارة لتقييمها — 5 أسئلة (دقيقة واحدة)'}</div>
                    <div class="wiz-dept-select-grid">${html}</div>`;
            }

            window.startWizDept = function (deptKey) {
                const dept = DEPTS.find(d => d.key === deptKey);
                if (!dept || !WIZ_QUESTIONS[deptKey]) return;
                wizState.activeDept = deptKey;
                wizState.currentQ = 0;
                // Load existing answers if any
                const existing = healthData.departments[deptKey]?.answers || {};
                wizState.answers = { ...existing };
                document.getElementById('wizDeptSelect').style.display = 'none';
                document.getElementById('wizResultArea').innerHTML = '';
                renderWizQuestion();
            };

            function renderWizQuestion() {
                const deptKey = wizState.activeDept;
                const dept = DEPTS.find(d => d.key === deptKey);
                const qs = WIZ_QUESTIONS[deptKey];
                const qi = wizState.currentQ;
                const q = qs[qi];
                const ansKey = `q${qi}`;
                const currentAns = wizState.answers[ansKey];

                document.getElementById('wizQuestionArea').innerHTML = `
                <div class="wiz-q-card">
                    <div class="wiz-q-badge" style="background:${dept.color}15;color:${dept.color};border:1px solid ${dept.color}30">
                        ${dept.icon} ${dept.label} — السؤال ${qi + 1}/${qs.length}
                    </div>
                    <div class="wiz-q-text">"${q.q}"</div>
                    <div class="wiz-q-options">
                        ${q.opts.map(opt => `
                            <div class="wiz-q-opt ${currentAns === opt.v ? 'selected' : ''}"
                                 data-action="wiz-select"
                                 data-qi="${qi}"
                                 data-val="${opt.v}">
                                <div class="wiz-radio"></div>
                                <span>${opt.icon} ${opt.t}</span>
                            </div>
                        `).join('')}
                    </div>
                    <div class="wiz-progress-row">
                        <div class="wiz-progress-track">
                            <div class="wiz-progress-fill" style="width:${Math.round(((qi + 1) / qs.length) * 100)}%;background:${dept.color}"></div>
                        </div>
                        <div class="wiz-progress-text">${qi + 1} / ${qs.length}</div>
                    </div>
                    <div class="wiz-nav">
                        <button class="wiz-btn prev" data-action="${qi === 0 ? 'wiz-cancel' : 'wiz-prev'}" >
                            <i class="bi bi-arrow-right"></i> ${qi === 0 ? 'رجوع' : 'السابق'}
                        </button>
                        ${qi < qs.length - 1 ? `
                            <button class="wiz-btn next" data-action="wiz-next" ${!currentAns ? 'disabled' : ''}>
                                التالي <i class="bi bi-arrow-left"></i>
                            </button>
                        ` : `
                            <button class="wiz-btn next" data-action="wiz-finish" ${!currentAns ? 'disabled' : ''}
                                    style="background:linear-gradient(135deg,#22c55e,#16a34a)">
                                🎯 شوف النتيجة <i class="bi bi-arrow-left"></i>
                            </button>
                        `}
                    </div>
                </div>`;
            }

            window.selectWizAnswer = function (qi, v) {
                wizState.answers[`q${qi}`] = v;
                renderWizQuestion();
            };
            window.nextWizQ = function () { wizState.currentQ++; renderWizQuestion(); };
            window.prevWizQ = function () { wizState.currentQ--; renderWizQuestion(); };
            window.cancelWizDept = function () {
                wizState.activeDept = null;
                document.getElementById('wizQuestionArea').innerHTML = '';
                document.getElementById('wizDeptSelect').style.display = '';
                renderWizDeptSelect();
            };

            window.finishWizDept = function () {
                const deptKey = wizState.activeDept;
                const dept = DEPTS.find(d => d.key === deptKey);
                const qs = WIZ_QUESTIONS[deptKey];
                let total = 0;
                qs.forEach((_, i) => { total += (wizState.answers[`q${i}`] || 1); });
                const maxScore = qs.length * 4;
                const pct = Math.round((total / maxScore) * 100);

                // Save to healthData
                if (!healthData.departments[deptKey]) healthData.departments[deptKey] = {};
                healthData.departments[deptKey].score = pct;
                healthData.departments[deptKey].answers = { ...wizState.answers };
                healthData.departments[deptKey].completed = true;
                healthData.departments[deptKey].completedAt = new Date().toISOString();
                healthData.lastUpdated = new Date().toISOString();
                saveUnifiedHealth(healthData);

                // Show result
                const statusColor = scoreColor(pct);
                const statusText = pct >= 70 ? '🟢 أداء جيد' : pct >= 45 ? '🟡 يحتاج تطوير' : '🔴 وضع حرج';
                const verdict = pct >= 70
                    ? `إدارة ${dept.label} في وضع قوي. حافظ على هذا المستوى وركّز على التميز.`
                    : pct >= 45
                        ? `إدارة ${dept.label} تحتاج تطوير في بعض المحاور. راجع الأسئلة الحمراء.`
                        : `إدارة ${dept.label} في وضع حرج وتحتاج تدخل فوري. ابدأ بالأولويات.`;

                document.getElementById('wizQuestionArea').innerHTML = '';
                document.getElementById('wizResultArea').innerHTML = `
                <div class="wiz-result-card" style="border-right:4px solid ${dept.color}">
                    <div style="display:flex;align-items:center;gap:14px;margin-bottom:16px">
                        <span style="font-size:32px">${dept.icon}</span>
                        <div style="flex:1">
                            <div style="font-size:16px;font-weight:800">${dept.label}</div>
                            <div style="font-size:12px;color:var(--text-muted)">تم التقييم — ${qs.length} أسئلة</div>
                        </div>
                        <div style="font-size:28px;font-weight:900;color:${statusColor}">${pct}%</div>
                    </div>
                    <div style="height:10px;border-radius:5px;background:rgba(255,255,255,.06);overflow:hidden;margin-bottom:12px">
                        <div style="height:100%;width:${pct}%;background:${statusColor};border-radius:5px;transition:width 1s"></div>
                    </div>
                    <div style="font-size:14px;font-weight:700;margin-bottom:8px;color:${statusColor}">${statusText}</div>
                    <div style="font-size:13px;color:var(--text-muted);line-height:1.7;margin-bottom:16px">${verdict}</div>
                    <div style="display:flex;gap:10px;flex-wrap:wrap">
                        <button class="wiz-btn next" data-action="wiz-cancel" style="background:var(--bg-card);color:var(--text);border:1px solid var(--border)">
                            <i class="bi bi-${urlParams.get('dept') ? 'arrow-repeat' : 'grid-3x3-gap'}"></i> ${urlParams.get('dept') ? 'إعادة التقييم' : 'تقييم إدارة أخرى'}
                        </button>
                        <button class="wiz-btn next" data-action="dept-mode-summary" style="background:linear-gradient(135deg,#667eea,#764ba2)">
                            <i class="bi bi-eye"></i> عرض الملخص
                        </button>
                    </div>
                </div>`;
            };

            // ==================== بدء التشغيل ====================
            switchTab(defaultTab);

            // ==================== 🔴 المؤشرات الحية من API ====================
            // جلب ملخص صحة الشركة من الإدارات (لا يعتمد على localStorage)
            (async function loadLiveHealth() {
                try {
                    // ✅ استخدام الموزع المركزي للـ API
                    const res = await window.apiRequest('/api/company-health/summary');
                    if (!res.ok) return;

                    const data = await res.json();
                    if (!data.dimensions || data.dimensions.every(d => d.status === 'no_data')) return;

                    // أسماء وأيقونات — كائنان منفصلان (لا slice)
                    const dimNames = { financial: 'المالي', operational: 'التشغيلي', cultural: 'الثقافي', marketing: 'التسويقي', hr: 'البشري' };
                    const dimIcons = { financial: '💰', operational: '⚙️', cultural: '🧬', marketing: '📢', hr: '👥' };
                    const dimColors = { financial: '#f59e0b', operational: '#6366f1', cultural: '#8b5cf6', marketing: '#ec4899', hr: '##3b82f6' };

                    const statusLabels = {
                        excellent: { text: 'ممتاز', color: 'var(--green, #22c55e)' },
                        good: { text: 'جيد', color: '#3b82f6' },
                        warning: { text: 'يحتاج تطوير', color: 'var(--yellow, #eab308)' },
                        critical: { text: 'حرج', color: 'var(--red, #ef4444)' },
                        no_data: { text: 'لا بيانات', color: 'var(--text-muted, #94a3b8)' },
                    };

                    const cardsContainer = document.getElementById('liveHealthCards');
                    cardsContainer.innerHTML = '';

                    data.dimensions.forEach(dim => {
                        const card = document.createElement('div');
                        card.className = 'dept-card';
                        card.style.cursor = dim.status === 'no_data' ? 'default' : 'pointer';

                        const name = dimNames[dim.dimension] || dim.dimension;
                        const icon = dimIcons[dim.dimension] || '📌';
                        const color = dimColors[dim.dimension] || '#64748b';
                        const st = statusLabels[dim.status] || statusLabels.no_data;
                        const score = dim.score || 0;
                        const capped = Math.min(score, 100);

                        // بناء البطاقة بـ textContent (لا innerHTML مع user input)
                        const header = document.createElement('div');
                        header.className = 'dept-card-header';
                        header.innerHTML = `
                            <div class="dept-card-icon" style="background:${color}22;color:${color}">${icon}</div>
                            <div>
                                <div class="dept-card-name"></div>
                                <div class="dept-card-status" style="background:${st.color}22;color:${st.color}"></div>
                            </div>
                            <div class="dept-card-score" style="color:${st.color}"></div>
                        `;
                        // textContent للنصوص
                        header.querySelector('.dept-card-name').textContent = name;
                        header.querySelector('.dept-card-status').textContent = st.text;
                        header.querySelector('.dept-card-score').textContent = dim.status !== 'no_data' ? score.toFixed(0) + '%' : '—';

                        card.appendChild(header);

                        // شريط التقدم
                        if (dim.status !== 'no_data') {
                            const bar = document.createElement('div');
                            bar.style.cssText = 'height:6px;border-radius:3px;background:rgba(255,255,255,.06);overflow:hidden;margin:8px 0 4px';
                            const fill = document.createElement('div');
                            fill.style.cssText = `height:100%;width:${capped}%;background:${st.color};border-radius:3px;transition:width 1s`;
                            bar.appendChild(fill);
                            card.appendChild(bar);

                            // عدد المؤشرات + آخر تحديث
                            const meta = document.createElement('div');
                            meta.style.cssText = 'display:flex;justify-content:space-between;font-size:10px;color:var(--text-muted);margin-top:4px';
                            const countEl = document.createElement('span');
                            countEl.textContent = dim.indicatorCount + ' مؤشر';
                            const dateEl = document.createElement('span');
                            if (dim.lastUpdate) {
                                const d = new Date(dim.lastUpdate);
                                dateEl.textContent = '📅 ' + d.toLocaleDateString('ar-EG');
                            }
                            meta.appendChild(countEl);
                            meta.appendChild(dateEl);
                            card.appendChild(meta);
                        } else {
                            const empty = document.createElement('div');
                            empty.style.cssText = 'font-size:11px;color:var(--text-muted);margin-top:8px;text-align:center';
                            empty.textContent = 'لم يتم إدخال بيانات بعد';
                            card.appendChild(empty);
                        }

                        cardsContainer.appendChild(card);
                    });

                    // عرض السكشن
                    document.getElementById('liveHealthSection').style.display = '';

                    // تحديث البانر الكلي إذا فيه بيانات
                    if (data.overallScore > 0) {
                        const existingBanner = document.querySelector('.overall-banner .overall-info h2');
                        if (existingBanner) {
                            const liveNote = document.createElement('div');
                            liveNote.style.cssText = 'margin-top:8px;font-size:12px;color:var(--text-muted);display:flex;align-items:center;gap:6px';
                            liveNote.innerHTML = '<i class="bi bi-activity" style="color:#22c55e"></i>';
                            const noteText = document.createElement('span');
                            noteText.textContent = 'النتيجة الحية من ' + data.activeDimensions + ' أبعاد: ' + data.overallScore + '%';
                            liveNote.appendChild(noteText);
                            existingBanner.parentElement.appendChild(liveNote);
                        }
                    }

                    console.log('[CompanyHealth] ✅ Live health data loaded:', data.activeDimensions, 'dimensions');
                } catch (e) {
                    console.log('[CompanyHealth] ℹ️ No live data available (offline or no token)');
                }
            })();

        })();
    </script>

    <!-- ═══ DEPT DETECTION — تخصيص الصفحة لمدير الإدارة ═══ -->
    <script>
        (function () {
            const _dp = new URLSearchParams(window.location.search).get('dept');
            if (!_dp) return;

            const _deptNames = { hr: 'الموارد البشرية', finance: 'المالية', operations: 'العمليات', marketing: 'التسويق', sales: 'المبيعات', compliance: 'الامتثال', it: 'تقنية المعلومات', cs: 'خدمة العملاء', quality: 'الجودة', support: 'الخدمات المساندة' };
            const _dn = _deptNames[_dp] || _dp;

            // 1. تحديث العنوان
            document.title = 'ستارتكس — صحة إدارة ' + _dn;
            const _pageTitle = document.querySelector('.page-header h1, .logo-text');
            if (_pageTitle) {
                const h1 = document.querySelector('.page-header h1');
                if (h1) h1.textContent = '🏥 صحة إدارة ' + _dn;
            }
            const _subtitle = document.getElementById('companyName');
            if (_subtitle) _subtitle.textContent = 'تحليل شامل لإدارة ' + _dn;

            // 2. إخفاء تبويبات النظرة العامة وسلسلة القيمة (خاصة بـ CEO)
            document.querySelectorAll('.tab-btn').forEach(btn => {
                const tabId = btn.getAttribute('data-tab');
                if (tabId === 'overview' || tabId === 'valuechain') {
                    btn.style.display = 'none';
                }
            });

            // 3. تعديل عنوان قسم الإدارات
            const _deptSectionTitle = document.querySelector('#tabDepartments .section-title');
            if (_deptSectionTitle) _deptSectionTitle.innerHTML = '<i class="bi bi-building"></i> إدارتي — ' + _dn;

            // 4. إخفاء زر "العودة للوحة القيادة" وتغييره للوحة الإدارة
            const _backBtn = document.querySelector('a[href*="ceo-dashboard.html"]');
            if (_backBtn && !_backBtn.href.includes('dept-dashboard')) {
                _backBtn.href = '/dept-dashboard.html?dept=' + _dp;
                _backBtn.innerHTML = '← العودة للوحة إدارتي';
            }

            // 5. تعديل رابط شعار ستارتكس
            const _bl = document.querySelector('a.brand, .navbar-brand');
            if (_bl) _bl.href = '/dept-dashboard.html?dept=' + _dp;

            console.log('[CompanyHealth] ✅ dept mode applied:', _dn);
        })();
    </script>
