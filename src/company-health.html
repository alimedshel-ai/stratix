<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ستارتكس — صحة الشركة الشاملة</title>
    <meta name="description" content="لوحة شاملة لصحة الشركة حسب حجمها — للمالك والمدير التنفيذي">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/css/shared.css">
    <link rel="stylesheet" href="/css/dept-pages.css">
    <style>
        :root {
            --stx-bg: #0b0d12;
            --stx-card: rgba(22, 27, 34, 0.7);
            --stx-border: rgba(255, 255, 255, 0.08);
            --stx-primary: #6366f1;
            --stx-secondary: #a855f7;
            --stx-success: #10b981;
            --stx-warn: #f59e0b;
            --stx-danger: #ef4444;
            --stx-sidebar-width: 260px;
        }

        body {
            background-color: var(--stx-bg);
            color: #f8fafc;
            font-family: 'Tajawal', sans-serif;
            margin: 0;
            min-height: 100vh;
        }

        .stx-wrapper {
            display: flex;
            min-height: 100vh;
        }

        .stx-sidebar-container {
            width: var(--stx-sidebar-width);
            flex-shrink: 0;
            border-left: 1px solid var(--stx-border);
            z-index: 101;
            background: rgba(11, 13, 18, 0.95);
        }

        .stx-main-content {
            flex: 1;
            padding-bottom: 100px;
            background: linear-gradient(135deg, #0b0d12 0%, #161b22 100%);
        }

        .logo-text {
            font-size: 20px;
            font-weight: 900;
            background: linear-gradient(135deg, #a78bfa, #38bdf8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 6px;
        }

        .page-title {
            font-size: 26px;
            font-weight: 900;
            margin-bottom: 6px;
        }

        .page-sub {
            font-size: 14px;
            color: #94a3b8;
        }

        .tabs-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 32px 0 24px;
            border-bottom: 1px solid var(--stx-border);
            padding-bottom: 8px;
        }

        .tab-btn {
            background: transparent;
            border: none;
            color: #94a3b8;
            font-family: 'Tajawal', sans-serif;
            font-weight: 700;
            font-size: 15px;
            padding: 10px 20px;
            border-radius: 40px;
            cursor: pointer;
            transition: all .2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .tab-btn:hover {
            color: #f8fafc;
            background: rgba(255, 255, 255, 0.05);
        }

        .tab-btn.active {
            color: #f8fafc;
            background: var(--stx-primary);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: fadeIn .4s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        /* Overall Score Circle */
        .overall-score-circle {
            position: relative;
            width: 100px;
            height: 100px;
        }

        .overall-score-num {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 28px;
            font-weight: 900;
        }

        .overall-score-label {
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 10px;
            color: #94a3b8;
            white-space: nowrap;
        }

        /* Stats */
        .overall-stat {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--stx-border);
            border-radius: 12px;
            padding: 10px;
        }

        /* Table Ranking */
        .rank-num {
            width: 24px;
            height: 24px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            font-size: 12px;
            font-weight: 700;
        }

        .rank-1 {
            background: #f59e0b;
            color: #000;
        }

        .rank-2 {
            background: #94a3b8;
            color: #000;
        }

        .rank-3 {
            background: #b45309;
            color: #fff;
        }

        .wiz-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 800;
            font-size: 14px;
            transition: all 0.3s;
            border: none;
            cursor: pointer;
        }

        .wiz-btn:hover {
            transform: translateY(-2px);
            opacity: 0.9;
        }

        .section-title {
            font-size: 18px;
            font-weight: 900;
            color: #fff;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Department Cards CSS */
        .dept-card {
            background: rgba(22, 27, 34, 0.7);
            border: 1px solid var(--stx-border);
            border-radius: 20px;
            padding: 24px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        .dept-card:hover {
            transform: translateY(-5px);
            border-color: rgba(255, 255, 255, 0.15);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            background: rgba(30, 35, 45, 0.85);
        }

        .dept-card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .dept-icon-box {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            flex-shrink: 0;
        }

        .dept-card-name {
            font-size: 16px;
            font-weight: 800;
            color: #fff;
        }

        .dept-card-status {
            margin-right: auto;
            font-size: 10px;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 800;
        }

        .dept-card-status.completed {
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
        }

        .dept-card-status.pending {
            background: rgba(245, 158, 11, 0.1);
            color: #f59e0b;
        }

        .dept-card-status.empty {
            background: rgba(255, 255, 255, 0.05);
            color: #94a3b8;
        }

        .dept-mgr {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px dashed rgba(255, 255, 255, 0.08);
        }

        .dept-mgr-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 14px;
            font-weight: 800;
            flex-shrink: 0;
        }

        .dept-mgr-name {
            font-size: 13px;
            font-weight: 800;
            color: #e2e8f0;
        }

        .dept-mgr-contact {
            font-size: 10px;
            color: #94a3b8;
            margin-top: 2px;
        }

        .dept-score-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 4px;
            margin-top: auto;
        }

        .dept-score-bar {
            flex: 1;
            height: 8px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
            overflow: hidden;
        }

        .dept-score-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 1s ease;
        }

        .dept-score-num {
            font-size: 16px;
            font-weight: 900;
            min-width: 40px;
            text-align: left;
        }

        .dept-metrics {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 12px;
        }

        .dept-metric {
            font-size: 10px;
            background: rgba(255, 255, 255, 0.05);
            color: #cbd5e1;
            padding: 4px 10px;
            border-radius: 6px;
            font-weight: 700;
        }
    </style>
</head>

<body>
    <!-- Top Navigation (Standardized) -->
    <nav class="top-nav px-4 py-2 border-bottom d-flex align-items-center justify-content-between"
        style="background: rgba(15,23,42,0.8); backdrop-filter: blur(15px); position: sticky; top: 0; z-index: 1000; height: 70px;">
        <div class="d-flex align-items-center gap-3" style="width: 30%;">
            <a href="javascript:void(0)" onclick="exitToDashboard()"
                class="btn btn-link text-muted p-0 text-decoration-none fw-800">
                <i class="bi bi-arrow-right-circle fs-5"></i>
                <span class="ms-2">لوحة القيادة</span>
            </a>
        </div>

        <div class="d-none d-lg-flex justify-content-center" style="width: 40%;">
            <div class="phase-tracker">
                <div class="phase-step active">لوحة صحة الشركة الشاملة</div>
            </div>
        </div>

        <div class="d-flex align-items-center justify-content-end" style="width: 30%;">
            <h5 id="companyName" class="m-0 fw-800 text-truncate text-muted d-none d-xl-block"
                style="max-width: 250px;">ستارتكس — الصحة الشاملة</h5>
            <button class="btn btn-outline-light rounded-pill px-4 py-2 fw-800 border-opacity-25 ms-3"
                onclick="window.location.reload()">
                تحديث البيانات <i class="bi bi-arrow-clockwise ms-2"></i>
            </button>
        </div>
    </nav>

    <script>
        window.exitToDashboard = function () {
            const user = window._cachedUser || JSON.parse(localStorage.getItem('user') || '{}');
            const isOwner = ['OWNER', 'ADMIN', 'COMPANY_MANAGER', 'exec_manager', 'system_admin', 'CEO'].includes(user?.role || user?.userType);
            if (isOwner) window.location.href = window.SmartNav ? SmartNav.getHomeUrl() : '/ceo-dashboard.html';
            else window.location.href = '/dashboard.html';
        };
    </script>

    <div class="stx-wrapper">
        <aside class="stx-sidebar-container" id="sidebar"></aside>

        <main class="stx-main-content p-4">
            <div class="container-fluid">
                <!-- Tabs -->
                <div class="tabs-container" id="tabsContainer">
                    <!-- Dynamic -->
                </div>

                <!-- 1. Overview Tab -->
                <div id="tabOverview" class="tab-content active">
                    <div id="overallBanner"></div>

                    <div class="row g-4 mt-2">
                        <!-- Radar Chart -->
                        <div class="col-lg-6" id="radarSection">
                            <div class="section-title"><i class="bi bi-radar"></i> التوازن التشغيلي (Radar)</div>
                            <div
                                style="background:var(--stx-card); border:1px solid var(--stx-border); border-radius:24px; padding:32px; display:flex; justify-content:center;">
                                <canvas id="radarCanvas" width="400" height="400"></canvas>
                            </div>
                        </div>

                        <!-- Mini Rankings -->
                        <div class="col-lg-6" id="rankingSection">
                            <div class="section-title"><i class="bi bi-list-ol"></i> ترتيب كفاءة الإدارات</div>
                            <div class="table-responsive"
                                style="background:var(--stx-card); border:1px solid var(--stx-border); border-radius:24px; padding:16px;">
                                <table class="table table-dark table-hover mb-0">
                                    <thead>
                                        <tr style="border-bottom:1px solid rgba(255,255,255,0.05);">
                                            <th>#</th>
                                            <th>الإدارة</th>
                                            <th>المصدر</th>
                                            <th>النتيجة</th>
                                            <th>الحالة</th>
                                            <th>إجراء</th>
                                        </tr>
                                    </thead>
                                    <tbody id="rankBody">
                                        <!-- Dynamic -->
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 2. Departments Tab -->
                <div id="tabDepartments" class="tab-content">
                    <div class="row g-4" id="deptsGrid">
                        <!-- Dynamic -->
                    </div>
                </div>

                <!-- 3. Deep Tab -->
                <div id="tabDeep" class="tab-content">
                    <div id="deepAnalysisContainer"></div>
                </div>
            </div>
        </main>
    </div>

    <script src="/js/auth-handler.js?v=4"></script>
    <script src="/js/api.js?v=4"></script>
    <script src="/js/sidebar.js?v=4"></script>
    <script src="/js/strategic-synthesis.js?v=4"></script>
    <script src="/js/company-health.js?v=4"></script>
</body>

</html>
