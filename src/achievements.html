<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ستارتكس - الإنجازات والمستوى</title>
    <meta name="description" content="تتبع إنجازاتك ومستوى نضجك الاستراتيجي">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #0a0b10;
            --bg2: #12141f;
            --card: #171a2a;
            --card-hover: #1e2236;
            --text: #e2e8f0;
            --muted: #7a8599;
            --border: rgba(255, 255, 255, 0.06);
            --primary: #667eea;
            --secondary: #764ba2;
            --green: #22c55e;
            --yellow: #facc15;
            --red: #ef4444;
            --blue: #38bdf8;
            --purple: #a78bfa;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            font-family: 'Tajawal', sans-serif;
            color: var(--text);
            min-height: 100vh;
        }

        .page-wrapper {
            display: flex;
            min-height: 100vh;
        }

        .main-content {
            flex: 1;
            min-width: 0;
            padding: 28px 32px;
        }

        /* Header */
        .ach-header {
            text-align: center;
            margin-bottom: 36px;
        }

        .ach-title {
            font-size: 32px;
            font-weight: 900;
            margin-bottom: 6px;
        }

        .ach-title span {
            background: linear-gradient(135deg, #facc15, #f59e0b);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .ach-subtitle {
            font-size: 14px;
            color: var(--muted);
        }

        /* Level Card */
        .level-card {
            background: linear-gradient(135deg, #171a2a, #1e2236);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 32px;
            margin-bottom: 28px;
            display: flex;
            gap: 30px;
            align-items: center;
            flex-wrap: wrap;
        }

        .level-visual {
            text-align: center;
            min-width: 140px;
        }

        .level-emoji {
            font-size: 64px;
            display: block;
            margin-bottom: 8px;
            animation: levelFloat 3s ease-in-out infinite;
        }

        @keyframes levelFloat {

            0%,
            100% {
                transform: translateY(0)
            }

            50% {
                transform: translateY(-8px)
            }
        }

        .level-name {
            font-size: 22px;
            font-weight: 900;
        }

        .level-info {
            flex: 1;
            min-width: 200px;
        }

        .level-points {
            font-size: 14px;
            color: var(--muted);
            margin-bottom: 12px;
        }

        .level-points strong {
            font-size: 28px;
            font-weight: 900;
            color: var(--yellow);
        }

        .level-bar {
            height: 10px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 5px;
            margin-bottom: 8px;
            overflow: hidden;
        }

        .level-bar-fill {
            height: 100%;
            border-radius: 5px;
            transition: width 1.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            background: linear-gradient(90deg, var(--primary), var(--secondary), var(--yellow));
        }

        .level-next-text {
            font-size: 12px;
            color: var(--muted);
        }

        .level-stats {
            display: flex;
            gap: 16px;
            margin-top: 16px;
        }

        .level-stat {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
            padding: 12px 18px;
            text-align: center;
            flex: 1;
        }

        .level-stat-num {
            font-size: 24px;
            font-weight: 900;
        }

        .level-stat-label {
            font-size: 11px;
            color: var(--muted);
        }

        /* Level Road */
        .level-road {
            display: flex;
            align-items: center;
            gap: 0;
            margin: 24px 0 36px;
            padding: 0 16px;
            overflow-x: auto;
        }

        .level-node {
            text-align: center;
            min-width: 80px;
            position: relative;
        }

        .level-node-dot {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            margin: 0 auto 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            border: 3px solid var(--border);
            background: var(--card);
            transition: all 0.3s;
        }

        .level-node.active .level-node-dot {
            border-color: var(--yellow);
            box-shadow: 0 0 20px rgba(250, 204, 21, 0.3);
            background: rgba(250, 204, 21, 0.1);
        }

        .level-node.done .level-node-dot {
            border-color: var(--green);
            background: rgba(34, 197, 94, 0.1);
        }

        .level-node-label {
            font-size: 10px;
            color: var(--muted);
        }

        .level-node.active .level-node-label {
            color: var(--yellow);
            font-weight: 700;
        }

        .level-node.done .level-node-label {
            color: var(--green);
        }

        .level-connector {
            flex: 1;
            height: 3px;
            background: var(--border);
            min-width: 20px;
        }

        .level-connector.done {
            background: var(--green);
        }

        /* Filters */
        .ach-filters {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 24px;
        }

        .ach-filter {
            padding: 6px 16px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--muted);
            font-family: inherit;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .ach-filter:hover {
            border-color: rgba(255, 255, 255, 0.15);
            color: var(--text);
        }

        .ach-filter.active {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }

        /* Achievement Grid */
        .ach-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 14px;
        }

        .ach-item {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 18px;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .ach-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        .ach-item.locked {
            opacity: 0.5;
            filter: grayscale(0.5);
        }

        .ach-item.locked .ach-item-emoji {
            filter: grayscale(1);
        }

        .ach-item.unlocked {
            border-color: rgba(250, 204, 21, 0.2);
        }

        .ach-item.unlocked::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #facc15, #f59e0b);
        }

        .ach-item-top {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
        }

        .ach-item-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }

        .ach-item-info {
            flex: 1;
        }

        .ach-item-title {
            font-size: 15px;
            font-weight: 800;
        }

        .ach-item-points {
            font-size: 12px;
            font-weight: 700;
            color: var(--yellow);
        }

        .ach-item-desc {
            font-size: 12px;
            color: var(--muted);
            line-height: 1.5;
        }

        .ach-item-date {
            font-size: 10px;
            color: var(--green);
            margin-top: 6px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .ach-item-lock {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 28px;
            opacity: 0.15;
        }

        .ach-category-tag {
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 10px;
            font-weight: 600;
        }

        @media(max-width:768px) {
            .main-content {
                padding: 16px;
            }

            .level-card {
                flex-direction: column;
                text-align: center;
            }

            .ach-grid {
                grid-template-columns: 1fr;
            }

            .level-stats {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>
    <div class="page-wrapper">
        <div id="sidebar-container"></div>
        <div class="main-content">
            <div class="ach-header">
                <h1 class="ach-title">🏆 <span>إنجازاتك</span></h1>
                <div class="ach-subtitle">تتبع تقدمك ومستوى نضجك الاستراتيجي</div>
            </div>

            <!-- Level Card -->
            <div class="level-card" id="levelCard"></div>

            <!-- Level Road -->
            <div class="level-road" id="levelRoad"></div>

            <!-- Filters -->
            <div class="ach-filters" id="achFilters"></div>

            <!-- Achievement Grid -->
            <div class="ach-grid" id="achGrid"></div>
        </div>
    </div>

    <script src="/js/api.js?v=4"></script>
    <script src="/js/steps-config.js?v=4"></script>
    <script src="/js/sidebar.js?v=4"></script>
    <script src="/js/ai-advisor.js?v=4"></script>
    <script src="/js/achievements.js?v=4"></script>
    <script>
        const SA = window.StartixAchievements;
        if (!SA) { document.body.innerHTML = '<h1 style="padding:40px;text-align:center">خطأ: نظام الإنجازات غير محمّل</h1>'; }

        const unlocked = SA.getUnlocked();
        const points = SA.getTotalPoints();
        const level = SA.getCurrentLevel();
        const nextLevel = SA.getNextLevel();
        const progress = SA.getProgress();

        // === Render Level Card ===
        document.getElementById('levelCard').innerHTML = `
      <div class="level-visual">
        <span class="level-emoji" style="color:${level.color}">${SA.iconHTML(level.icon, '56px')}</span>
        <div class="level-name" style="color:${level.color}">${level.name}</div>
      </div>
      <div class="level-info">
        <div class="level-points"><strong>${points}</strong> نقطة</div>
        <div class="level-bar"><div class="level-bar-fill" id="levelBarFill" style="width:0%"></div></div>
        <div class="level-next-text">${nextLevel ? `${nextLevel.minPoints - points} نقطة للوصول إلى <i class="bi ${nextLevel.icon}" style="color:${nextLevel.color}"></i> ${nextLevel.name}` : '🏆 أعلى مستوى — أنت أسطورة!'}</div>
        <div class="level-stats">
          <div class="level-stat"><div class="level-stat-num" style="color:var(--yellow)">${progress.unlocked}</div><div class="level-stat-label">إنجاز محقق</div></div>
          <div class="level-stat"><div class="level-stat-num" style="color:var(--muted)">${progress.total - progress.unlocked}</div><div class="level-stat-label">إنجاز متبقي</div></div>
          <div class="level-stat"><div class="level-stat-num" style="color:var(--green)">${progress.percent}%</div><div class="level-stat-label">نسبة الإكمال</div></div>
        </div>
      </div>
    `;
        setTimeout(() => {
            const pct = nextLevel ? ((points - level.minPoints) / (nextLevel.minPoints - level.minPoints) * 100) : 100;
            document.getElementById('levelBarFill').style.width = pct + '%';
        }, 300);

        // === Render Level Road ===
        const levelRoad = document.getElementById('levelRoad');
        SA.LEVELS.forEach((l, i) => {
            const isDone = points >= l.minPoints && (i < SA.LEVELS.length - 1 && points >= SA.LEVELS[i + 1]?.minPoints);
            const isActive = l.name === level.name;
            const node = document.createElement('div');
            node.className = `level-node ${isDone ? 'done' : ''} ${isActive ? 'active' : ''}`;
            node.innerHTML = `<div class="level-node-dot" style="color:${l.color}">${SA.iconHTML(l.icon, '18px')}</div><div class="level-node-label">${l.name}<br><span style="font-size:9px;opacity:0.6">${l.minPoints}</span></div>`;
            levelRoad.appendChild(node);
            if (i < SA.LEVELS.length - 1) {
                const conn = document.createElement('div');
                conn.className = `level-connector ${isDone ? 'done' : ''}`;
                levelRoad.appendChild(conn);
            }
        });

        // === Render Filters ===
        const filtersEl = document.getElementById('achFilters');
        filtersEl.innerHTML = `<button class="ach-filter active" data-cat="all">الكل (${SA.ACHIEVEMENTS.length})</button>`;
        Object.entries(SA.CATEGORIES).forEach(([key, cat]) => {
            const count = SA.ACHIEVEMENTS.filter(a => a.category === key).length;
            const unlockedCount = SA.ACHIEVEMENTS.filter(a => a.category === key && unlocked[a.id]).length;
            filtersEl.innerHTML += `<button class="ach-filter" data-cat="${key}" style="border-color:${cat.color}33">${cat.label} (${unlockedCount}/${count})</button>`;
        });
        filtersEl.querySelectorAll('.ach-filter').forEach(btn => {
            btn.onclick = () => {
                filtersEl.querySelectorAll('.ach-filter').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                renderAchievements(btn.dataset.cat);
            };
        });

        // === Toast helper ===
        function showToast(msg) {
            const existing = document.getElementById('achToast');
            if (existing) existing.remove();
            const t = document.createElement('div');
            t.id = 'achToast';
            t.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#1a1d2e,#232640);color:#e2e8f0;padding:12px 24px;border-radius:12px;font-family:Tajawal;font-size:14px;font-weight:600;z-index:9999;border:1px solid rgba(250,204,21,0.2);box-shadow:0 8px 30px rgba(0,0,0,0.5);animation:slideUp .3s ease';
            t.textContent = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }

        // === Render Achievements ===
        function renderAchievements(filter = 'all') {
            const grid = document.getElementById('achGrid');
            let items = SA.ACHIEVEMENTS;
            if (filter !== 'all') items = items.filter(a => a.category === filter);

            // Sort: unlocked first
            items.sort((a, b) => {
                const aU = unlocked[a.id] ? 1 : 0;
                const bU = unlocked[b.id] ? 1 : 0;
                return bU - aU;
            });

            grid.innerHTML = items.map(a => {
                const isUnlocked = unlocked[a.id];
                const cat = SA.CATEGORIES[a.category];
                let dateStr = '';
                if (isUnlocked) {
                    const d = new Date(isUnlocked.unlockedAt);
                    dateStr = `<div class="ach-item-date"><i class="bi bi-check-circle-fill"></i> مُحقق ${d.toLocaleDateString('ar-SA')}</div>`;
                }
                return `
          <div class="ach-item ${isUnlocked ? 'unlocked' : 'locked'}" style="cursor:pointer" onclick="showToast('${isUnlocked ? '✅ ' + a.title + ' — محقق!' : '🔒 ' + a.title + ': ' + a.desc}')">
            ${!isUnlocked ? '<div class="ach-item-lock">🔒</div>' : ''}
            <div class="ach-item-top">
              <span class="ach-item-icon" style="background:${cat.color}15;color:${cat.color}">${SA.iconHTML(a.icon, '22px')}</span>
              <div class="ach-item-info">
                <div class="ach-item-title">${a.title}</div>
                <span class="ach-category-tag" style="background:${cat.color}15;color:${cat.color}">${cat.label}</span>
              </div>
              <span class="ach-item-points">+${a.points}</span>
            </div>
            <div class="ach-item-desc">${a.desc}</div>
            ${dateStr}
          </div>
        `;
            }).join('');
        }

        renderAchievements();
    </script>
</body>

</html>
