<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ستارتكس - المقارنة المعيارية</title>
    <meta name="description" content="مقارنة أداء المنظمة مع معايير القطاع والمنافسين">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #0a0b10;
            --bg2: #12141f;
            --card: #171a2a;
            --card-hover: #1e2236;
            --text: #e2e8f0;
            --muted: #7a8599;
            --border: rgba(255, 255, 255, 0.06);
            --primary: #667eea;
            --secondary: #764ba2;
            --green: #22c55e;
            --yellow: #facc15;
            --red: #ef4444;
            --blue: #38bdf8;
            --purple: #a78bfa;
            --orange: #f97316
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        body {
            background: var(--bg);
            font-family: 'Tajawal', sans-serif;
            color: var(--text);
            min-height: 100vh
        }

        .page-wrapper {
            display: flex;
            min-height: 100vh
        }

        .main-content {
            flex: 1;
            min-width: 0;
            padding: 28px 32px
        }

        .bench-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 28px
        }

        .bench-title {
            font-size: 28px;
            font-weight: 900
        }

        .bench-title span {
            background: linear-gradient(135deg, var(--blue), var(--green));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent
        }

        /* Overall Score */
        .bench-overall {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 20px;
            margin-bottom: 28px
        }

        .bench-score-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 28px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center
        }

        .bench-score-ring {
            width: 160px;
            height: 160px;
            position: relative;
            margin-bottom: 12px
        }

        .bench-score-ring svg {
            width: 100%;
            height: 100%;
            transform: rotate(-90deg)
        }

        .bench-score-ring circle {
            fill: none;
            stroke-width: 10;
            stroke-linecap: round
        }

        .bench-ring-bg {
            stroke: rgba(255, 255, 255, 0.06)
        }

        .bench-ring-fill {
            transition: stroke-dasharray 1.5s ease
        }

        .bench-score-num {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 38px;
            font-weight: 900
        }

        .bench-score-label {
            font-size: 14px;
            color: var(--muted)
        }

        .bench-score-rank {
            font-size: 13px;
            font-weight: 700;
            margin-top: 6px;
            padding: 4px 14px;
            border-radius: 8px
        }

        .bench-positions {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px
        }

        .bench-pos-title {
            font-size: 15px;
            font-weight: 800;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px
        }

        .bench-pos-item {
            margin-bottom: 16px
        }

        .bench-pos-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
            font-size: 13px
        }

        .bench-pos-name {
            font-weight: 700
        }

        .bench-pos-val {
            font-weight: 700
        }

        .bench-pos-bar {
            height: 24px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.04);
            position: relative;
            overflow: hidden
        }

        .bench-pos-fill {
            height: 100%;
            border-radius: 8px;
            position: absolute;
            top: 0;
            right: 0;
            transition: width 1s ease
        }

        .bench-pos-marker {
            position: absolute;
            top: -2px;
            bottom: -2px;
            width: 3px;
            border-radius: 2px;
            background: white;
            z-index: 2;
            transition: right 1s ease
        }

        .bench-pos-legend {
            display: flex;
            gap: 8px;
            font-size: 10px;
            color: var(--muted);
            margin-top: 3px
        }

        .bench-pos-legend span {
            display: flex;
            align-items: center;
            gap: 3px
        }

        .bench-pos-legend-dot {
            width: 8px;
            height: 8px;
            border-radius: 2px
        }

        /* Comparison Table */
        .bench-table-wrap {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 24px
        }

        .bench-table-title {
            font-size: 16px;
            font-weight: 800;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px
        }

        .bench-table {
            width: 100%;
            border-collapse: collapse
        }

        .bench-table th {
            padding: 10px 14px;
            text-align: right;
            font-size: 12px;
            font-weight: 700;
            color: var(--muted);
            border-bottom: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.02)
        }

        .bench-table td {
            padding: 12px 14px;
            border-bottom: 1px solid var(--border);
            font-size: 13px
        }

        .bench-table tr:hover td {
            background: rgba(255, 255, 255, 0.02)
        }

        .bench-table .company-col {
            font-weight: 700;
            color: var(--primary)
        }

        .bench-diff {
            font-size: 11px;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 4px
        }

        .bench-diff.pos {
            color: var(--green);
            background: rgba(34, 197, 94, 0.08)
        }

        .bench-diff.neg {
            color: var(--red);
            background: rgba(239, 68, 68, 0.08)
        }

        /* Radar comparison */
        .bench-radar-wrap {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 24px
        }

        .bench-radar-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px
        }

        .bench-radar-title {
            font-size: 14px;
            font-weight: 800;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px
        }

        /* Strengths & Gaps */
        .bench-sg {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px
        }

        .bench-sg-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 18px
        }

        .bench-sg-title {
            font-size: 14px;
            font-weight: 800;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px
        }

        .bench-sg-item {
            display: flex;
            gap: 10px;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
            font-size: 13px
        }

        .bench-sg-item:last-child {
            border-bottom: none
        }

        .bench-sg-icon {
            font-size: 16px;
            flex-shrink: 0;
            margin-top: 2px
        }

        .bench-sg-content {
            flex: 1
        }

        .bench-sg-content strong {
            display: block;
            margin-bottom: 2px
        }

        .bench-sg-content span {
            font-size: 11px;
            color: var(--muted)
        }

        @media(max-width:768px) {
            .main-content {
                padding: 16px
            }

            .bench-overall,
            .bench-radar-wrap,
            .bench-sg {
                grid-template-columns: 1fr
            }
        }
    </style>
</head>

<body>
    <div class="page-wrapper">
        <div id="sidebar-container"></div>
        <div class="main-content">
            <div class="bench-header">
                <div>
                    <h1 class="bench-title"><i class="bi bi-bar-chart-steps"></i> المقارنة <span>المعيارية</span></h1>
                    <div style="font-size:13px;color:var(--muted);margin-top:4px">قارن أداء منظمتك مع معايير القطاع
                        والمنافسين</div>
                </div>
                <div style="display:flex;gap:8px">
                    <select
                        style="padding:8px 14px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--text);font-family:inherit;font-size:13px">
                        <option>قطاع الخدمات التقنية</option>
                        <option>القطاع الصحي</option>
                        <option>القطاع المالي</option>
                    </select>
                </div>
            </div>

            <!-- Overall Score -->
            <div class="bench-overall">
                <div class="bench-score-card">
                    <div class="bench-score-ring">
                        <svg viewBox="0 0 100 100">
                            <circle class="bench-ring-bg" cx="50" cy="50" r="42" />
                            <circle class="bench-ring-fill" cx="50" cy="50" r="42" stroke="var(--primary)"
                                stroke-dasharray="0 264" id="scoreRing" />
                        </svg>
                        <div class="bench-score-num" id="overallScore" style="color:var(--primary)">0</div>
                    </div>
                    <div class="bench-score-label">التصنيف العام مقارنة بالقطاع</div>
                    <div class="bench-score-rank" style="background:rgba(102,126,234,0.1);color:var(--primary)">الربع
                        الأعلى (Top 25%)</div>
                </div>
                <div class="bench-positions" id="benchPositions"></div>
            </div>

            <!-- Radar Chart Comparison -->
            <div class="bench-radar-wrap">
                <div class="bench-radar-card">
                    <div class="bench-radar-title"><i class="bi bi-diagram-3" style="color:var(--primary)"></i> مقارنة
                        رادارية — أنت vs القطاع</div>
                    <div style="display:flex;justify-content:center">
                        <svg id="benchRadar" viewBox="0 0 400 400" style="width:100%;max-width:400px;height:auto"></svg>
                    </div>
                    <div style="display:flex;gap:16px;justify-content:center;margin-top:12px;font-size:12px">
                        <span style="display:flex;align-items:center;gap:4px"><span
                                style="width:12px;height:3px;border-radius:2px;background:var(--primary);display:inline-block"></span>
                            منظمتك</span>
                        <span style="display:flex;align-items:center;gap:4px"><span
                                style="width:12px;height:3px;border-radius:2px;background:var(--muted);display:inline-block"></span>
                            متوسط القطاع</span>
                    </div>
                </div>
                <div class="bench-radar-card">
                    <div class="bench-radar-title"><i class="bi bi-award" style="color:var(--green)"></i> ملخص الموقع
                        التنافسي</div>
                    <div id="competitiveSummary"></div>
                </div>
            </div>

            <!-- Comparison Table -->
            <div class="bench-table-wrap">
                <div class="bench-table-title"><i class="bi bi-table" style="color:var(--blue)"></i> مقارنة المؤشرات
                    الرئيسية</div>
                <table class="bench-table" id="benchTable"></table>
            </div>

            <!-- Strengths & Gaps -->
            <div class="bench-sg" id="benchSG"></div>
        </div>
    </div>

    <script src="/js/api.js?v=4"></script>
    <script src="/js/steps-config.js?v=4"></script>
    <script src="/js/sidebar.js?v=4"></script>
    <script src="/js/ai-advisor.js?v=4"></script>
    <script src="/js/achievements.js?v=4"></script>
    <script src="/js/notifications.js?v=4"></script>
    <script>
        // === Data ===
        const metrics = [
            { name: 'رضا العملاء (NPS)', ours: 82, sectorAvg: 65, top25: 80, top10: 90, icon: '😊' },
            { name: 'معدل الاحتفاظ بالعملاء', ours: 94, sectorAvg: 80, top25: 90, top10: 96, icon: '🔄', suffix: '%' },
            { name: 'نمو الإيرادات', ours: 22, sectorAvg: 12, top25: 20, top10: 30, icon: '📈', suffix: '%' },
            { name: 'هامش الربح', ours: 18, sectorAvg: 15, top25: 20, top10: 28, icon: '💰', suffix: '%' },
            { name: 'إنتاجية الموظف', ours: 87, sectorAvg: 70, top25: 82, top10: 92, icon: '⚡', suffix: '%' },
            { name: 'معدل دوران الموظفين', ours: 18, sectorAvg: 22, top25: 15, top10: 8, icon: '🚪', suffix: '%', inverted: true },
            { name: 'سرعة طرح المنتج', ours: 4.5, sectorAvg: 8, top25: 5, top10: 3, icon: '🚀', suffix: ' شهر', inverted: true },
            { name: 'التحول الرقمي', ours: 65, sectorAvg: 45, top25: 70, top10: 85, icon: '💻', suffix: '%' },
            { name: 'الابتكار (براءات/سنة)', ours: 3, sectorAvg: 1, top25: 4, top10: 8, icon: '💡' },
            { name: 'رضا الموظفين', ours: 72, sectorAvg: 60, top25: 75, top10: 88, icon: '😃', suffix: '%' },
        ];

        const overallScoreVal = 78;

        // === Render Ring ===
        function renderRing() {
            const circumference = 2 * Math.PI * 42;
            const dashLen = (overallScoreVal / 100) * circumference;
            setTimeout(() => {
                document.getElementById('scoreRing').setAttribute('stroke-dasharray', `${dashLen} ${circumference}`);
                animNum('overallScore', overallScoreVal);
            }, 300);
        }

        function animNum(id, target) {
            const el = document.getElementById(id);
            let cur = 0; const step = Math.max(1, Math.ceil(target / 30));
            const iv = setInterval(() => { cur += step; if (cur >= target) { cur = target; clearInterval(iv); } el.textContent = cur; }, 25);
        }

        // === Position Bars ===
        function renderPositions() {
            const categories = [
                { name: 'الأداء المالي', ours: 75, avg: 55, color: 'var(--green)' },
                { name: 'تجربة العميل', ours: 82, avg: 60, color: 'var(--primary)' },
                { name: 'التميز التشغيلي', ours: 68, avg: 55, color: 'var(--orange)' },
                { name: 'رأس المال البشري', ours: 65, avg: 58, color: 'var(--purple)' },
                { name: 'الابتكار والتقنية', ours: 72, avg: 42, color: 'var(--blue)' },
            ];

            document.getElementById('benchPositions').innerHTML = `
        <div class="bench-pos-title"><i class="bi bi-bar-chart-line" style="color:var(--primary)"></i> موقعك في القطاع</div>
        ${categories.map(c => `
          <div class="bench-pos-item">
            <div class="bench-pos-header">
              <span class="bench-pos-name">${c.name}</span>
              <span class="bench-pos-val" style="color:${c.color}">${c.ours}%</span>
            </div>
            <div class="bench-pos-bar">
              <div class="bench-pos-fill" style="width:${c.avg}%;background:rgba(255,255,255,0.06)"></div>
              <div class="bench-pos-fill" style="width:${c.ours}%;background:${c.color}30"></div>
              <div class="bench-pos-marker" style="right:${100 - c.avg}%;background:var(--muted)" title="متوسط القطاع"></div>
              <div class="bench-pos-marker" style="right:${100 - c.ours}%;background:${c.color}" title="منظمتك"></div>
            </div>
            <div class="bench-pos-legend">
              <span><div class="bench-pos-legend-dot" style="background:${c.color}"></div> منظمتك</span>
              <span><div class="bench-pos-legend-dot" style="background:var(--muted)"></div> متوسط القطاع</span>
            </div>
          </div>
        `).join('')}
      `;
        }

        // === Comparison Table ===
        function renderTable() {
            let html = `
        <thead><tr>
          <th>المؤشر</th>
          <th style="color:var(--primary)">🏢 منظمتك</th>
          <th>📊 متوسط القطاع</th>
          <th>🏅 أعلى 25%</th>
          <th>⭐ أعلى 10%</th>
          <th>الفرق عن المتوسط</th>
        </tr></thead><tbody>
      `;

            metrics.forEach(m => {
                const diff = m.inverted ? (m.sectorAvg - m.ours) : (m.ours - m.sectorAvg);
                const pct = m.inverted ? ((m.sectorAvg - m.ours) / m.sectorAvg * 100) : ((m.ours - m.sectorAvg) / m.sectorAvg * 100);
                const isPos = diff > 0;
                const s = m.suffix || '';

                html += `<tr>
          <td>${m.icon} ${m.name}</td>
          <td class="company-col">${m.ours}${s}</td>
          <td>${m.sectorAvg}${s}</td>
          <td>${m.top25}${s}</td>
          <td>${m.top10}${s}</td>
          <td><span class="bench-diff ${isPos ? 'pos' : 'neg'}">${isPos ? '↑' : '↓'} ${Math.abs(Math.round(pct))}%</span></td>
        </tr>`;
            });

            html += '</tbody>';
            document.getElementById('benchTable').innerHTML = html;
        }

        // === Strengths & Gaps ===
        function renderSG() {
            const strengths = metrics.filter(m => {
                const diff = m.inverted ? (m.sectorAvg - m.ours) : (m.ours - m.sectorAvg);
                return diff > 0;
            }).sort((a, b) => {
                const da = a.inverted ? (a.sectorAvg - a.ours) : (a.ours - a.sectorAvg);
                const db = b.inverted ? (b.sectorAvg - b.ours) : (b.ours - b.sectorAvg);
                return db - da;
            }).slice(0, 5);

            const gaps = metrics.filter(m => {
                const diff = m.inverted ? (m.sectorAvg - m.ours) : (m.ours - m.sectorAvg);
                return diff <= 0;
            }).slice(0, 5);

            document.getElementById('benchSG').innerHTML = `
        <div class="bench-sg-card">
          <div class="bench-sg-title"><i class="bi bi-trophy" style="color:var(--green)"></i> نقاط التفوق على القطاع</div>
          ${strengths.map(m => {
                const diff = m.inverted ? (m.sectorAvg - m.ours) : (m.ours - m.sectorAvg);
                return `
            <div class="bench-sg-item">
              <div class="bench-sg-icon">✅</div>
              <div class="bench-sg-content">
                <strong>${m.icon} ${m.name}</strong>
                <span>أعلى من المتوسط بـ <span style="color:var(--green);font-weight:700">${Math.abs(Math.round(diff / m.sectorAvg * 100))}%</span> — ميزة تنافسية</span>
              </div>
            </div>`;
            }).join('')}
        </div>
        <div class="bench-sg-card">
          <div class="bench-sg-title"><i class="bi bi-exclamation-triangle" style="color:var(--yellow)"></i> فجوات تحتاج تحسين</div>
          ${gaps.length ? gaps.map(m => {
                const diff = m.inverted ? (m.sectorAvg - m.ours) : (m.ours - m.sectorAvg);
                return `
            <div class="bench-sg-item">
              <div class="bench-sg-icon">⚠️</div>
              <div class="bench-sg-content">
                <strong>${m.icon} ${m.name}</strong>
                <span>أقل من المتوسط بـ <span style="color:var(--red);font-weight:700">${Math.abs(Math.round(diff / m.sectorAvg * 100))}%</span> — فرصة تحسين</span>
              </div>
            </div>`;
            }).join('') : '<div style="text-align:center;padding:20px;color:var(--muted)">🎉 لا توجد فجوات — أداء ممتاز!</div>'}
        </div>
      `;
        }

        // Init
        renderRing();
        renderPositions();
        renderRadarChart();
        renderCompetitiveSummary();
        renderTable();
        renderSG();

        // === Radar Chart ===
        function renderRadarChart() {
            const categories = [
                { name: 'الأداء المالي', ours: 75, avg: 55 },
                { name: 'تجربة العميل', ours: 82, avg: 60 },
                { name: 'التميز التشغيلي', ours: 68, avg: 55 },
                { name: 'رأس المال البشري', ours: 65, avg: 58 },
                { name: 'الابتكار', ours: 72, avg: 42 },
            ];
            const cx = 200, cy = 200, maxR = 140, n = 5;
            let html = '';

            // Rings
            for (let r = 1; r <= 5; r++) {
                const radius = (r / 5) * maxR;
                let points = '';
                for (let i = 0; i < n; i++) {
                    const angle = (Math.PI * 2 * i / n) - Math.PI / 2;
                    points += `${cx + radius * Math.cos(angle)},${cy + radius * Math.sin(angle)} `;
                }
                html += `<polygon points="${points}" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>`;
            }

            // Axes
            for (let i = 0; i < n; i++) {
                const angle = (Math.PI * 2 * i / n) - Math.PI / 2;
                html += `<line x1="${cx}" y1="${cy}" x2="${cx + maxR * Math.cos(angle)}" y2="${cy + maxR * Math.sin(angle)}" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>`;
            }

            // Sector avg polygon
            let avgPts = '';
            for (let i = 0; i < n; i++) {
                const angle = (Math.PI * 2 * i / n) - Math.PI / 2;
                const r = (categories[i].avg / 100) * maxR;
                avgPts += `${cx + r * Math.cos(angle)},${cy + r * Math.sin(angle)} `;
            }
            html += `<polygon points="${avgPts}" fill="rgba(122,133,153,0.1)" stroke="#7a8599" stroke-width="1.5" stroke-dasharray="4"/>`;

            // Our polygon
            let ourPts = '';
            for (let i = 0; i < n; i++) {
                const angle = (Math.PI * 2 * i / n) - Math.PI / 2;
                const r = (categories[i].ours / 100) * maxR;
                ourPts += `${cx + r * Math.cos(angle)},${cy + r * Math.sin(angle)} `;
            }
            html += `<polygon points="${ourPts}" fill="rgba(102,126,234,0.15)" stroke="#667eea" stroke-width="2"/>`;

            // Dots + Labels
            for (let i = 0; i < n; i++) {
                const angle = (Math.PI * 2 * i / n) - Math.PI / 2;
                const r = (categories[i].ours / 100) * maxR;
                const x = cx + r * Math.cos(angle);
                const y = cy + r * Math.sin(angle);
                html += `<circle cx="${x}" cy="${y}" r="4" fill="#667eea" stroke="white" stroke-width="2"/>`;
                const lR = maxR + 24;
                const lx = cx + lR * Math.cos(angle);
                const ly = cy + lR * Math.sin(angle);
                html += `<text x="${lx}" y="${ly}" fill="#7a8599" font-size="11" font-weight="700" text-anchor="middle" dominant-baseline="middle">${categories[i].name}</text>`;
            }

            document.getElementById('benchRadar').innerHTML = html;
        }

        // === Competitive Summary ===
        function renderCompetitiveSummary() {
            const aboveAvg = metrics.filter(m => {
                return m.inverted ? (m.ours < m.sectorAvg) : (m.ours > m.sectorAvg);
            }).length;
            const totalMetrics = metrics.length;
            const pct = Math.round((aboveAvg / totalMetrics) * 100);

            document.getElementById('competitiveSummary').innerHTML = `
                <div style="text-align:center;padding:16px">
                    <div style="font-size:48px;font-weight:900;color:var(--primary)">${pct}%</div>
                    <div style="font-size:13px;color:var(--muted);margin-bottom:16px">من المؤشرات أعلى من المتوسط</div>
                    <div style="font-size:12px;text-align:right;line-height:2">
                        <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.06)">
                            <span>🏅 التصنيف</span>
                            <span style="color:var(--primary);font-weight:700">الربع الأعلى</span>
                        </div>
                        <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.06)">
                            <span>📊 مؤشرات فوق المتوسط</span>
                            <span style="color:var(--green);font-weight:700">${aboveAvg} من ${totalMetrics}</span>
                        </div>
                        <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.06)">
                            <span>🎯 أقوى ميزة</span>
                            <span style="color:var(--green);font-weight:700">تجربة العميل</span>
                        </div>
                        <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.06)">
                            <span>⚠️ أكبر فجوة</span>
                            <span style="color:var(--red);font-weight:700">دوران الموظفين</span>
                        </div>
                        <div style="display:flex;justify-content:space-between;padding:6px 0">
                            <span>📈 الاتجاه العام</span>
                            <span style="color:var(--green);font-weight:700">↑ تحسّن ربعي</span>
                        </div>
                    </div>
                </div>
            `;
        }
    </script>
