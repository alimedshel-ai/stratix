<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مفتش النظام الاستراتيجي — ستارتكس</title>
    <meta name="description" content="فحص وتحليل ومقارنة المنهجيات الـ 15 في النظام الاستراتيجي">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #0f1117;
            --bg-card: #1a1d2e;
            --bg-card-hover: #222640;
            --border: rgba(255, 255, 255, 0.08);
            --text: #e2e8f0;
            --text-muted: #94a3b8;
            --primary: #667eea;
            --secondary: #764ba2;
            --success: #22c55e;
            --warning: #facc15;
            --danger: #ef4444;
            --orange: #f97316;
            --cyan: #06b6d4;
            --purple: #8b5cf6;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            font-family: 'Tajawal', sans-serif;
            color: var(--text);
            min-height: 100vh;
        }

        .top-nav {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            padding: 14px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .top-nav .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            color: white;
            text-decoration: none;
            font-size: 20px;
            font-weight: 700;
        }

        .top-nav .nav-links {
            display: flex;
            gap: 6px;
        }

        .top-nav .nav-links a {
            color: rgba(255, 255, 255, 0.85);
            text-decoration: none;
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 13px;
            transition: .2s;
        }

        .top-nav .nav-links a:hover,
        .top-nav .nav-links a.active {
            background: rgba(255, 255, 255, 0.15);
            color: white;
        }

        .page-layout {
            display: flex;
            height: calc(100vh - 60px);
        }

        .main-content {
            flex: 1;
            padding: 30px;
            max-width: 1200px;
            margin: 0 auto;
            overflow-y: auto;
        }

        /* Hero Section */
        .inspector-hero {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.15), rgba(118, 75, 162, 0.1));
            border: 1px solid rgba(102, 126, 234, 0.2);
            border-radius: 16px;
            padding: 30px 36px;
            margin-bottom: 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .hero-info h1 {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .hero-info p {
            color: var(--text-muted);
            font-size: 14px;
            max-width: 500px;
        }

        .hero-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .btn-scan-now {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: all .3s;
            font-family: 'Tajawal', sans-serif;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-scan-now:hover {
            transform: scale(1.03);
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-scan-now:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-scan-now.scanning i {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Overall Score */
        .overall-section {
            display: grid;
            grid-template-columns: 200px 1fr;
            gap: 24px;
            margin-bottom: 28px;
        }

        .score-ring {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .score-ring svg {
            width: 120px;
            height: 120px;
            transform: rotate(-90deg);
        }

        .score-ring circle {
            fill: none;
            stroke-width: 10;
            stroke-linecap: round;
        }

        .score-ring .bg-circle {
            stroke: rgba(255, 255, 255, 0.06);
        }

        .score-ring .fg-circle {
            transition: stroke-dashoffset 1.2s ease;
        }

        .score-ring-text {
            position: absolute;
            font-size: 32px;
            font-weight: 900;
        }

        .score-ring-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .score-label {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 10px;
        }

        .score-level {
            font-size: 12px;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: 700;
            margin-top: 6px;
        }

        .summary-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 12px;
        }

        .summary-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
        }

        .summary-card .sc-num {
            font-size: 28px;
            font-weight: 800;
        }

        .summary-card .sc-label {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        /* Level Sections */
        .level-section {
            margin-bottom: 28px;
        }

        .level-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 20px;
            border-radius: 12px 12px 0 0;
            font-weight: 700;
            font-size: 15px;
        }

        .level-header.strategic {
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.15), rgba(139, 92, 246, 0.05));
            border: 1px solid rgba(139, 92, 246, 0.2);
        }

        .level-header.tactical {
            background: linear-gradient(135deg, rgba(6, 182, 212, 0.15), rgba(6, 182, 212, 0.05));
            border: 1px solid rgba(6, 182, 212, 0.2);
        }

        .level-header.operational {
            background: linear-gradient(135deg, rgba(34, 197, 94, 0.15), rgba(34, 197, 94, 0.05));
            border: 1px solid rgba(34, 197, 94, 0.2);
        }

        .level-score {
            font-size: 20px;
            font-weight: 800;
        }

        /* Methodology Cards */
        .method-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 14px;
            border: 1px solid var(--border);
            border-top: none;
            border-radius: 0 0 12px 12px;
            padding: 16px;
            background: rgba(26, 29, 46, 0.5);
        }

        .method-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 18px;
            transition: all .2s;
            position: relative;
            overflow: hidden;
        }

        .method-card:hover {
            border-color: rgba(102, 126, 234, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .method-card.status-healthy {
            border-right: 4px solid var(--success);
        }

        .method-card.status-warning {
            border-right: 4px solid var(--warning);
        }

        .method-card.status-critical {
            border-right: 4px solid var(--danger);
        }

        .method-card.status-empty {
            border-right: 4px solid var(--text-muted);
        }

        .method-card.status-not_built {
            border-right: 4px solid rgba(255, 255, 255, 0.1);
            opacity: 0.5;
        }

        .method-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .method-id {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 12px;
            background: rgba(102, 126, 234, 0.15);
            color: var(--primary);
        }

        .method-score-badge {
            font-size: 18px;
            font-weight: 800;
        }

        .method-name {
            font-weight: 700;
            font-size: 14px;
            margin-bottom: 2px;
        }

        .method-tech {
            font-size: 11px;
            color: var(--primary);
            font-weight: 600;
            margin-bottom: 10px;
        }

        .method-status {
            display: inline-block;
            font-size: 10px;
            padding: 3px 10px;
            border-radius: 20px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .status-badge-healthy {
            background: rgba(34, 197, 94, 0.15);
            color: var(--success);
        }

        .status-badge-warning {
            background: rgba(250, 204, 21, 0.15);
            color: var(--warning);
        }

        .status-badge-critical {
            background: rgba(239, 68, 68, 0.15);
            color: var(--danger);
        }

        .status-badge-empty {
            background: rgba(148, 163, 184, 0.15);
            color: var(--text-muted);
        }

        .status-badge-not_built {
            background: rgba(148, 163, 184, 0.08);
            color: rgba(148, 163, 184, 0.5);
        }

        /* Metrics */
        .method-metrics {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 10px;
        }

        .metric-pill {
            font-size: 10px;
            padding: 3px 8px;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-muted);
        }

        .metric-pill b {
            color: var(--text);
        }

        /* Issues */
        .method-issues {
            margin-top: 8px;
        }

        .method-issue {
            font-size: 11px;
            color: var(--warning);
            padding: 4px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            display: flex;
            align-items: flex-start;
            gap: 4px;
        }

        .method-issue:last-child {
            border-bottom: none;
        }

        .method-issue i {
            flex-shrink: 0;
            margin-top: 2px;
        }

        /* Action */
        .method-action {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .method-action span {
            font-size: 11px;
            color: var(--primary);
            font-weight: 600;
        }

        .method-action a {
            font-size: 11px;
            color: var(--primary);
            text-decoration: none;
            padding: 4px 10px;
            border-radius: 6px;
            background: rgba(102, 126, 234, 0.1);
            transition: .2s;
        }

        .method-action a:hover {
            background: rgba(102, 126, 234, 0.2);
        }

        /* Mini Progress Bar */
        .method-progress {
            height: 4px;
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.06);
            margin-bottom: 10px;
            overflow: hidden;
        }

        .method-progress-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 1s ease;
        }

        /* Golden Thread Section */
        .thread-section {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 28px;
        }

        .thread-title {
            font-size: 18px;
            font-weight: 800;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .thread-chain {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .thread-obj {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px;
        }

        .thread-obj-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .thread-obj-name {
            font-weight: 700;
            font-size: 13px;
        }

        .thread-badge {
            font-size: 10px;
            padding: 3px 8px;
            border-radius: 12px;
            font-weight: 600;
        }

        .thread-connected {
            background: rgba(34, 197, 94, 0.15);
            color: var(--success);
        }

        .thread-partial {
            background: rgba(250, 204, 21, 0.15);
            color: var(--warning);
        }

        .thread-broken {
            background: rgba(239, 68, 68, 0.15);
            color: var(--danger);
        }

        .thread-children {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .thread-child {
            font-size: 10px;
            padding: 4px 8px;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.04);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* Loading */
        .loading-state {
            text-align: center;
            padding: 60px;
            color: var(--text-muted);
        }

        .loading-state i {
            font-size: 40px;
            display: block;
            margin-bottom: 12px;
            animation: spin 1.5s linear infinite;
        }

        /* Timestamp */
        .scan-time {
            text-align: center;
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 20px;
            padding: 10px;
        }

        @media (max-width: 768px) {
            .overall-section {
                grid-template-columns: 1fr;
            }

            .method-grid {
                grid-template-columns: 1fr;
            }

            .inspector-hero {
                flex-direction: column;
                text-align: center;
                gap: 16px;
            }
        }
    </style>
</head>

<body>
    <!-- Navbar -->
    <nav class="top-nav">
        <a href="/dashboard" class="brand"><i class="bi bi-activity"></i> ستارتكس</a>
        <div class="nav-links">
            <a href="/dashboard"><i class="bi bi-house"></i> الرئيسية</a>
            <a href="/kpis"><i class="bi bi-graph-up"></i> المؤشرات</a>
            <a href="/inspector" class="active"><i class="bi bi-shield-check"></i> مفتش النظام</a>
        </div>
    </nav>

    <div class="page-layout">
        <!-- Sidebar -->
        <nav class="sidebar"></nav>

        <div class="main-content">
            <!-- Hero -->
            <div class="inspector-hero">
                <div class="hero-info">
                    <h1><i class="bi bi-shield-check" style="color:var(--primary)"></i> مفتش النظام الاستراتيجي</h1>
                    <p>فحص شامل للـ 15 منهجية — يقارن الوضع الفعلي بالمطلوب ويكشف الفجوات والعناصر اليتيمة والوصلات
                        المقطوعة</p>
                </div>
                <div class="hero-actions">
                    <button id="scanBtn" class="btn-scan-now" onclick="runScan()">
                        <i class="bi bi-radar"></i> افحص الآن
                    </button>
                </div>
            </div>

            <!-- Results Container -->
            <div id="resultsContainer">
                <div class="loading-state">
                    <i class="bi bi-shield-check"></i>
                    <div>اضغط <strong>"افحص الآن"</strong> لبدء فحص النظام</div>
                </div>
            </div>

            <div id="scanTime" class="scan-time" style="display:none"></div>
        </div>
    </div>

    <script src="/assets/js/api.js"></script>
    <script src="/assets/js/sidebar.js"></script>
    <script src="/assets/js/ai-advisor.js"></script>
    <script>
        const token = localStorage.getItem('token');
        const api = async (url) => {
            const res = await fetch(url, { headers: { 'Authorization': `Bearer ${token}` } });
            if (!res.ok) throw new Error(`API Error: ${res.status}`);
            return res.json();
        };

        const LEVEL_LABELS = {
            strategic: { name: 'المستوى الاستراتيجي', subtitle: 'تحديد الاتجاه', icon: 'bi-compass', class: 'strategic' },
            tactical: { name: 'المستوى التكتيكي', subtitle: 'الترجمة والربط', icon: 'bi-link-45deg', class: 'tactical' },
            operational: { name: 'المستوى التشغيلي', subtitle: 'التنفيذ اليومي', icon: 'bi-lightning', class: 'operational' }
        };

        const STATUS_LABELS = {
            healthy: 'سليم ✅', warning: 'تحذير ⚠️', critical: 'حرج ⛔',
            empty: 'فارغ 📭', not_built: 'لم يُبنى 🔴'
        };

        function getScoreColor(score) {
            if (score >= 70) return '#22c55e';
            if (score >= 40) return '#facc15';
            if (score >= 20) return '#f97316';
            return '#ef4444';
        }

        function getProgressColor(score) {
            if (score >= 70) return 'var(--success)';
            if (score >= 40) return 'var(--warning)';
            return 'var(--danger)';
        }

        async function runScan() {
            const btn = document.getElementById('scanBtn');
            const container = document.getElementById('resultsContainer');

            btn.disabled = true;
            btn.classList.add('scanning');
            btn.innerHTML = '<i class="bi bi-arrow-repeat"></i> جاري الفحص...';

            container.innerHTML = `
        <div class="loading-state">
          <i class="bi bi-arrow-repeat"></i>
          <div>جاري فحص الـ 15 منهجية...</div>
        </div>`;

            try {
                const data = await api('/api/inspector/scan');
                renderResults(data);

                document.getElementById('scanTime').style.display = 'block';
                document.getElementById('scanTime').textContent =
                    `آخر فحص: ${new Date(data.scannedAt).toLocaleString('ar-SA')}`;

            } catch (err) {
                container.innerHTML = `<div class="loading-state" style="color:var(--danger)">
          <i class="bi bi-exclamation-triangle" style="animation:none"></i>
          <div>فشل الفحص: ${err.message}</div>
        </div>`;
            } finally {
                btn.disabled = false;
                btn.classList.remove('scanning');
                btn.innerHTML = '<i class="bi bi-radar"></i> افحص الآن';
            }
        }

        function renderResults(data) {
            const container = document.getElementById('resultsContainer');
            const circumference = 2 * Math.PI * 48;
            const offset = circumference - (data.overallScore / 100) * circumference;
            const color = getScoreColor(data.overallScore);

            let html = `
        <!-- Overall Score -->
        <div class="overall-section">
          <div class="score-ring">
            <div class="score-ring-wrapper">
              <svg viewBox="0 0 120 120">
                <circle class="bg-circle" cx="60" cy="60" r="48" stroke-dasharray="${circumference}" />
                <circle class="fg-circle" cx="60" cy="60" r="48" stroke="${color}"
                  stroke-dasharray="${circumference}" stroke-dashoffset="${offset}" />
              </svg>
              <span class="score-ring-text" style="color:${color}">${data.overallScore}</span>
            </div>
            <span class="score-label">درجة النظام الكلية</span>
            <span class="score-level" style="background:${color}22;color:${color}">${data.systemLevel}</span>
          </div>

          <div class="summary-cards">
            <div class="summary-card">
              <div class="sc-num" style="color:var(--primary)">${data.summary.totalMethodologies}</div>
              <div class="sc-label">إجمالي المنهجيات</div>
            </div>
            <div class="summary-card">
              <div class="sc-num" style="color:var(--success)">${data.summary.built}</div>
              <div class="sc-label">مبنية</div>
            </div>
            <div class="summary-card">
              <div class="sc-num" style="color:var(--success)">${data.summary.healthy}</div>
              <div class="sc-label">سليمة</div>
            </div>
            <div class="summary-card">
              <div class="sc-num" style="color:var(--warning)">${data.summary.warning}</div>
              <div class="sc-label">تحذير</div>
            </div>
            <div class="summary-card">
              <div class="sc-num" style="color:var(--danger)">${data.summary.critical}</div>
              <div class="sc-label">حرجة</div>
            </div>
            <div class="summary-card">
              <div class="sc-num" style="color:var(--text-muted)">${data.summary.notBuilt}</div>
              <div class="sc-label">لم تُبنَ</div>
            </div>
            <div class="summary-card">
              <div class="sc-num" style="color:var(--orange)">${data.summary.totalIssues}</div>
              <div class="sc-label">ملاحظة</div>
            </div>
            <div class="summary-card">
              <div class="sc-num" style="color:var(--danger)">${data.summary.criticalIssues}</div>
              <div class="sc-label">بحاجة تدخل فوري</div>
            </div>
          </div>
        </div>

        <p style="text-align:center;color:var(--text-muted);font-size:14px;margin-bottom:24px;">
          <i class="bi bi-info-circle"></i> ${data.systemMessage}
        </p>
      `;

            // Render each level
            ['strategic', 'tactical', 'operational'].forEach(level => {
                const levelData = data.levels[level];
                const levelInfo = LEVEL_LABELS[level];
                const levelColor = getScoreColor(levelData.score);

                html += `
          <div class="level-section">
            <div class="level-header ${levelInfo.class}">
              <span><i class="bi ${levelInfo.icon}"></i> ${levelInfo.name} — ${levelInfo.subtitle}</span>
              <span class="level-score" style="color:${levelColor}">${levelData.score}%</span>
            </div>
            <div class="method-grid">
              ${levelData.methodologies.map(m => renderMethodCard(m)).join('')}
            </div>
          </div>
        `;
            });

            container.innerHTML = html;
        }

        function renderMethodCard(m) {
            const color = getScoreColor(m.score);
            const statusLabel = STATUS_LABELS[m.status] || m.status;

            // Build metrics pills
            const metricPills = Object.entries(m.metrics || {})
                .filter(([k, v]) => v !== undefined && v !== null)
                .map(([k, v]) => {
                    const labels = {
                        total: 'الإجمالي', completed: 'مكتمل', analysisPoints: 'نقاط تحليل',
                        sectors: 'قطاعات', entities: 'كيانات', versionsLinked: 'استراتيجيات',
                        totalItems: 'عناصر', evaluated: 'مقيّمة', pending: 'بانتظار',
                        objectives: 'أهداف', kpis: 'مؤشرات', initiatives: 'مبادرات',
                        causalLinks: 'روابط سببية', orphanKpis: 'KPI يتيم', orphanInitiatives: 'مبادرة يتيمة',
                        kpisWithoutData: 'بدون بيانات', totalRisks: 'مخاطر', mitigated: 'مُحتواة',
                        withoutPlan: 'بدون خطة', highRisks: 'عالية الخطورة',
                        strengths: 'قوة', weaknesses: 'ضعف', opportunities: 'فرص', threats: 'تهديدات',
                        totalPoints: 'إجمالي نقاط', towsStrategies: 'TOWS',
                        strategicPipeline: 'مسارات', directions: 'توجهات',
                        totalObjectives: 'أهداف', hierarchical: 'متسلسلة', withPerspective: 'مع منظور',
                        kpisLinked: 'KPIs مربوطة', financialDecisions: 'قرارات مالية',
                        totalInitiatives: 'مبادرات', overdue: 'متأخرة', reviews: 'مراجعات',
                        reviewsCompleted: 'مراجعة مكتملة', decisionsSet: 'قرارات'
                    };
                    return `<span class="metric-pill"><b>${v}</b> ${labels[k] || k}</span>`;
                }).join('');

            // Build issues
            const issuesHtml = (m.issues || []).map(issue =>
                `<div class="method-issue"><i class="bi bi-exclamation-circle"></i> ${issue}</div>`
            ).join('');

            return `
        <div class="method-card status-${m.status}">
          <div class="method-top">
            <div class="method-id">${m.id}</div>
            <span class="method-score-badge" style="color:${color}">${m.score}%</span>
          </div>
          <div class="method-name">${m.name}</div>
          <div class="method-tech"><i class="bi bi-cpu"></i> ${m.technique}</div>
          <span class="method-status status-badge-${m.status}">${statusLabel}</span>

          <div class="method-progress">
            <div class="method-progress-fill" style="width:${m.score}%;background:${getProgressColor(m.score)}"></div>
          </div>

          ${metricPills ? `<div class="method-metrics">${metricPills}</div>` : ''}
          ${issuesHtml ? `<div class="method-issues">${issuesHtml}</div>` : ''}

          <div class="method-action">
            <span><i class="bi bi-arrow-left"></i> ${m.action || ''}</span>
            ${m.status !== 'not_built' ? `<a href="${m.page}">افتح <i class="bi bi-box-arrow-in-left"></i></a>` : ''}
          </div>
        </div>
      `;
        }

        // Auto-scan on load
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(runScan, 500);
        });
    </script>
</body>

</html>
