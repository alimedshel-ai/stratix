<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ستارتكس | التقييم الوصفي الجنائي - المالية</title>
    <!-- Frameworks -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap"
        rel="stylesheet">

    <!-- Custom Styles -->
    <link rel="stylesheet" href="/css/shared.css">
    <link rel="stylesheet" href="/css/dept-pages.css">

    <style>
        :root {
            --stx-bg: #0b0d12;
            --stx-card: rgba(22, 27, 34, 0.7);
            --stx-border: rgba(255, 255, 255, 0.08);
            --stx-primary: #6366f1;
            --stx-success: #10b981;
            --stx-warn: #f59e0b;
            --stx-danger: #ef4444;
        }

        body {
            background-color: var(--stx-bg);
            color: #f8fafc;
            font-family: 'Tajawal', sans-serif;
            overflow: hidden;
        }

        .stx-wrapper {
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .stx-sidebar-container {
            width: 260px;
            flex-shrink: 0;
            border-left: 1px solid var(--stx-border);
        }

        .btn-stx-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-outline-stx {
            border: 1px solid var(--stx-primary);
            background: transparent;
            color: var(--stx-primary);
            border-radius: 14px;
            padding: 10px 20px;
            font-weight: 700;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-outline-stx:hover {
            background: var(--stx-primary);
            color: white;
            transform: translateY(-2px);
        }

        .stx-main-content {
            flex: 1;
            overflow-y: auto;
            height: 100vh;
        }

        .stx-header {
            background: rgba(11, 13, 18, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--stx-border);
            padding: 15px 30px;
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .stats-bar {
            background: linear-gradient(90deg, rgba(99, 102, 241, 0.1) 0%, rgba(11, 13, 18, 0) 100%);
            border: 1px solid var(--stx-border);
            border-radius: 20px;
            padding: 20px 30px;
            margin: 30px;
            display: flex;
            flex-wrap: wrap;
            gap: 40px;
            align-items: center;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .stat-label {
            font-size: 0.75rem;
            color: #94a3b8;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-value {
            font-size: 1.25rem;
            font-weight: 800;
            color: #fff;
        }

        .audit-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(450px, 1fr));
            gap: 24px;
            padding: 0 30px 120px;
        }

        .audit-card {
            background: var(--stx-card);
            border: 1px solid var(--stx-border);
            border-radius: 24px;
            padding: 24px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .audit-card:hover {
            border-color: var(--stx-primary);
            transform: translateY(-4px);
            background: rgba(255, 255, 255, 0.03);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .audit-card.unanswered {
            border: 2px solid var(--stx-danger) !important;
            background: rgba(239, 68, 68, 0.02);
        }

        .card-header-stx {
            display: flex;
            align-items: flex-start;
            gap: 15px;
            margin-bottom: 20px;
        }

        .card-icon {
            width: 42px;
            height: 42px;
            background: rgba(99, 102, 241, 0.1);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--stx-primary);
            font-size: 1.25rem;
            flex-shrink: 0;
        }

        .card-title {
            font-size: 1rem;
            font-weight: 700;
            margin: 0;
            line-height: 1.4;
            color: #f1f5f9;
        }

        .option-group {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin-bottom: 20px;
        }

        .opt-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 10px 12px;
            font-size: 0.85rem;
            font-weight: 600;
            color: #94a3b8;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .opt-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
        }

        .opt-btn.active.success {
            background: var(--stx-success);
            color: #fff;
            border-color: transparent;
        }

        .opt-btn.active.warning {
            background: var(--stx-warn);
            color: #fff;
            border-color: transparent;
        }

        .opt-btn.active.danger {
            background: var(--stx-danger);
            color: #fff;
            border-color: transparent;
        }

        .audit-textarea {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--stx-border);
            border-radius: 14px;
            padding: 12px 16px;
            color: #e2e8f0;
            font-size: 0.85rem;
            resize: none;
            height: 60px;
            transition: all 0.2s;
        }

        .audit-textarea:focus {
            outline: none;
            border-color: var(--stx-primary);
            background: rgba(0, 0, 0, 0.3);
            height: 100px;
        }

        .action-footer {
            position: fixed;
            bottom: 0;
            right: 260px;
            left: 0;
            background: rgba(11, 13, 18, 0.9);
            backdrop-filter: blur(15px);
            border-top: 1px solid var(--stx-border);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1100;
            box-shadow: 0 -10px 30px rgba(0, 0, 0, 0.5);
        }

        .btn-stx-primary {
            background: var(--stx-primary);
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 14px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        .btn-stx-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.5);
            background: #4f46e5;
        }

        .step-hub-icon {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: var(--stx-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.1rem;
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.4);
        }
    </style>
</head>

<body>
    <script>window.__REQUIRED_DEPT = 'FINANCE';</script>
    <script src="/js/dept-guard.js?v=4"></script>
    <div class="stx-wrapper">
        <aside class="stx-sidebar-container"></aside>

        <main class="stx-main-content">
            <header class="stx-header">
                <div class="d-flex align-items-center gap-3">
                    <div class="step-hub-icon"><i class="bi bi-bank"></i></div>
                    <div>
                        <h1 class="h5 fw-bold m-0">الفحص التنظيمي الأولي - المالية</h1>
                        <p class="small text-muted m-0">تقييم كفاءة العمليات وحوكمة الإدارة المالية</p>
                    </div>
                </div>
                <div class="d-flex gap-2">
                    <a href="/finance-kpis.html" class="btn-outline-stx"><i class="bi bi-speedometer2"></i> لوحة
                        المؤشرات (KPIs)</a>
                </div>
            </header>

            <div class="stats-bar shadow-sm">
                <div class="stat-item">
                    <span class="stat-label">الإيرادات المحملة</span>
                    <span class="stat-value" id="revenueVal">—</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">هامش الربح</span>
                    <span class="stat-value" id="marginVal">—</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">نسبة السيولة</span>
                    <span class="stat-value" id="ratioVal">—</span>
                </div>
                <div class="ms-auto">
                    <div
                        class="badge bg-primary-subtle text-primary rounded-pill px-3 py-2 border border-primary-subtle">
                        <i class="bi bi-shield-lock-fill me-1"></i> فحص كفاءة النظم المالية
                    </div>
                </div>
            </div>

            <form id="forensicAudit">
                <div class="audit-grid" id="auditQuestions"></div>

                <div class="action-footer">
                    <div id="saveProgress" class="text-muted small fw-bold">
                        <i class="bi bi-info-circle"></i> يرجى تقييم جميع الجوانب التنظيمية للمتابعة
                    </div>
                    <button type="submit" class="btn-stx-primary" id="btnSave">
                        حفظ ومتابعة للميزانية والتحديات <i class="bi bi-arrow-left"></i>
                    </button>
                </div>
            </form>
        </main>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/api.js?v=4"></script>
    <script src="/js/context-manager.js?v=4"></script>
    <script src="/js/page-guard.js?v=4"></script>
    <script src="/js/utils.js?v=4"></script>
    <script src="/js/dept-page.js?v=4"></script>
    <script src="/js/sidebar.js?v=4"></script>

    <script>
        const QUESTIONS = [
            { id: 'financial_policies', label: 'سياسات وإجراءات الإدارة المالية', icon: 'bi-journal-check', opts: ['موثقة ومحدثة', 'موجودة قديمة', 'شبه موجودة', 'لا توجد'] },
            { id: 'segregation_duties', label: 'فصل المهام (صلاحيات الصرف والتعميد)', icon: 'bi-person-lock', opts: ['فصل تام وقوي', 'فصل جزئي', 'تداخل بسيط', 'لا يوجد فصل'] },
            { id: 'closing_delay', label: 'سرعة الإغلاق المالي وإصدار التقارير', icon: 'bi-clock-history', opts: ['خلال 5 أيام', 'خلال 10 أيام', 'أكثر من 15 يوم', 'غير منتظم'] },
            { id: 'zatca_compliance', label: 'الالتزام بمتطلبات الفوترة الإلكترونية', icon: 'bi-shield-check', opts: ['ربط كامل (مرحلة ٢)', 'ربط جزئي', 'مرحلة ١ فقط', 'غير ملتزم'] },
            { id: 'internal_audit', label: 'دورية التدقيق المالي الداخلي', icon: 'bi-search', opts: ['ربع سنوي', 'نصف سنوي', 'سنوي', 'لا يوجد تدقيق'] },
            { id: 'budget_accuracy', label: 'دقة الميزانيات التقديرية (Variance)', icon: 'bi-graph-down', opts: ['انحراف أقل من 5%', 'انحراف 10%', 'انحراف كبير', 'لا توجد ميزانية'] },
            { id: 'cash_forecasting', label: 'التنبؤ بالتدفقات النقدية (Cash Flow)', icon: 'bi-water', opts: ['أسبوعي دقيق', 'شهري تقديري', 'عند الحاجة', 'لا يوجد تنبؤ'] },
            { id: 'erpsystem', label: 'كفاءة النظام المحاسبي (ERP)', icon: 'bi-pc-display', opts: ['نظام متكامل وفعال', 'نظام جزئي', 'Excel بنسبة كبيرة', 'يدوي بالكامل'] },
            { id: 'asset_management', label: 'نظام إدارة وأرشفة الأصول الثابتة', icon: 'bi-box-seam', opts: ['سجل إلكتروني محدث', 'سجل يدوي', 'بيانات ناقصة', 'لا يوجد سجل'] },
            { id: 'procurement_link', label: 'ربط المشتريات بالدورة المالية', icon: 'bi-link-45deg', opts: ['ربط آلي كامل', 'ربط ورقي منظم', 'تواصل مباشر', 'لا يوجد ربط'] },
            { id: 'payment_approvals', label: 'نظام موافقات المدفوعات', icon: 'bi-check-all', opts: ['مصفوفة صلاحيات إلكترونية', 'توقيعات ورقية منظمة', 'قرار فردي موثق', 'قرار شفوي'] },
            { id: 'team_qualification', label: 'كفاءة الفريق المالي (شهادات مهنية)', icon: 'bi-award', opts: ['أكثر من شهادة (CPA/CMA)', 'خبرة واسعة فقط', 'مستويات متفاوتة', 'ضعيفة جداً'] },
            { id: 'working_capital', label: 'إدارة رأس المال العامل (تحصيل/سداد)', icon: 'bi-arrow-repeat', opts: ['تحصيل سريع ومنظم', 'تأخير في التحصيل', 'تراكم ديون معدومة', 'لا توجد إدارة'] },
            { id: 'cost_control', label: 'الرقابة على تكاليف الأقسام', icon: 'bi-calculator', opts: ['تقارير تكلفة دقيقة', 'مراقبة عامة', 'إجمالي فقط', 'لا توجد رقابة'] },
            { id: 'external_audit_ready', label: 'الجاهزية للتدقيق الخارجي والزكاة', icon: 'bi-file-earmark-medical', opts: ['جاهزية عالية دائماً', 'جهد كبير للتجهيز', 'أخطاء في المتطلبات', 'فشل في التدقيق'] }
        ];

        let auditState = {};
        const urlParams = new URLSearchParams(window.location.search);
        const dept = 'finance';
        if (window.DeptPage) DeptPage.dept = dept;

        function initAudit() {
            const container = document.getElementById('auditQuestions');
            container.innerHTML = QUESTIONS.map(q => `
                <div class="audit-card" data-id="${q.id}">
                    <div class="card-header-stx">
                        <div class="card-icon"><i class="bi ${q.icon}"></i></div>
                        <h3 class="card-title">${q.label}</h3>
                    </div>
                    <div class="option-group">
                        ${q.opts.map((opt, idx) => `
                            <div class="opt-btn" data-val="${idx}" onclick="setVal('${q.id}', '${idx}', this)">${opt}</div>
                        `).join('')}
                    </div>
                    <textarea class="audit-textarea" placeholder="أضف ملاحظات تنظيمية هنا..."></textarea>
                </div>
            `).join('');
            loadData();
        }

        function setVal(id, val, btn) {
            if (!auditState[id]) auditState[id] = { val: '', note: '' };
            auditState[id].val = val;
            const q = QUESTIONS.find(x => x.id === id);
            auditState[id].label = q.opts[parseInt(val)];

            const parent = btn.parentElement;
            parent.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('active', 'success', 'warning', 'danger'));
            btn.classList.add('active');
            const idx = parseInt(val);
            if (idx === 0) btn.classList.add('success');
            else if (idx === q.opts.length - 1) btn.classList.add('danger');
            else btn.classList.add('warning');

            btn.closest('.audit-card').classList.remove('unanswered');
            updateProgress();
        }

        function updateProgress() {
            const answeredCount = Object.keys(auditState).filter(k => auditState[k] && auditState[k].val !== '').length;
            const prog = document.getElementById('saveProgress');
            if (answeredCount === QUESTIONS.length) {
                prog.innerHTML = '<i class="bi bi-check-circle-fill text-success"></i> جاهز للحفظ والمتابعة';
                prog.className = 'small fw-bold text-success';
            } else {
                prog.innerHTML = `<i class="bi bi-info-circle"></i> تم تقييم ${answeredCount} من أصل ${QUESTIONS.length} نقطة تنظيمية`;
            }
        }

        async function loadData() {
            const savedFromAPI = await DeptPage.loadFromAPI(`AUDIT_FINANCE`).catch(() => null);
            const saved = savedFromAPI || DeptPage.safeGetLocal('stratix_finance_audit_v2', {});
            auditState = saved;

            Object.keys(saved).forEach(id => {
                const card = document.querySelector(`.audit-card[data-id="${id}"]`);
                if (card) {
                    const btn = card.querySelector(`.opt-btn[data-val="${saved[id].val}"]`);
                    if (btn) setVal(id, saved[id].val, btn);
                    const area = card.querySelector('textarea');
                    if (area) area.value = saved[id].note || '';
                }
            });

            const deep = await DeptPage.loadFromAPI('DEEP').catch(() => ({}));
            document.getElementById('revenueVal').textContent = (deep.revenue || '0') + ' ر.س';
            document.getElementById('marginVal').textContent = (deep.profit_margin || '0') + '%';
            document.getElementById('ratioVal').textContent = (deep.current_ratio || '0');

            updateProgress();
        }

        document.getElementById('forensicAudit').addEventListener('submit', async (e) => {
            e.preventDefault();
            const answeredCount = Object.keys(auditState).filter(k => auditState[k] && auditState[k].val !== '').length;
            if (answeredCount < QUESTIONS.length) {
                DeptPage.showMessage(`⚠️ يرجى تقييم جميع النقاط المتبقية`, true);
                return;
            }

            const btn = document.getElementById('btnSave');
            btn.disabled = true;
            btn.innerHTML = 'جاري الحفظ...';

            const strengths = [];
            const weaknesses = [];
            QUESTIONS.forEach(q => {
                const item = auditState[q.id];
                if (item) {
                    const idx = parseInt(item.val);
                    if (idx <= 1) strengths.push(q.label + ': ' + item.label);
                    if (idx >= 2) weaknesses.push(q.label + ': ' + item.label);
                }
            });

            Context.setItem(`finance_strengths`, strengths);
            Context.setItem(`finance_weaknesses`, weaknesses);
            DeptPage.safeSetLocal('stratix_finance_audit_v2', auditState);

            await DeptPage.saveToAPI(`AUDIT_FINANCE`, auditState);
            DeptPage.showMessage('✅ تم حفظ التقييم بنجاح! جاري الانتقال للميزانية والتحديات', false);
            setTimeout(() => window.location.href = `/dept-report.html?dept=finance`, 1500);
        });

        document.addEventListener('DOMContentLoaded', () => {
            if (window.initSidebar) window.initSidebar();
            initAudit();
        });
    </script>
</body>

</html>
