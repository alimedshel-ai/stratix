    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/dept-pages.css">
</head>

<body>
    <div class="stx-wrapper">
        <aside class="stx-sidebar-container"></aside>
        <main class="stx-main-content">
            <div class="sticky-top p-4 d-flex justify-content-between align-items-center"
                style="background: rgba(15,17,23,0.9); backdrop-filter: blur(10px); z-index: 100; border-bottom: 1px solid var(--border);">

                    <h1 class="fw-bold mb-0" style="color:#fff; font-size:1.5rem;">التقييم الوصفي المالي (Finance Audit)
                    </h1>
                    <p class="text-muted mb-0 small">التدقيق الجنائي لسلامة الإدارة وفاعلية الرقابة المالية</p>
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" form="auditForm" class="btn btn-primary px-4 fw-bold">حفظ ومتابعة لتحليل
                        SWOT</button>
                    <a href="/dept-dashboard.html?dept=finance" class="btn btn-outline-light px-4">رجوع للرادار</a>
                </div>
            </div>

            <div class="p-4">

                    </div>
                </form>

                <script src="/js/steps-config.js"></script>
                <script src="/js/sidebar.js"></script>

                        { id: 'erp_utilization', label: 'مدى الاستفادة من نظام ERP المالي', icon: 'bi-cpu', opts: ['استفادة كاملة وآلية', 'استخدام جزئي', 'مجرد مدخل بيانات', 'نظام قديم/يدوي'] },

                        { id: 'fixed_assets_register', label: 'دقة سجل الأصول الثابتة وإهلاكاتها', icon: 'bi-intersect', opts: ['سجل رقمي محدّث', 'سجل يدوي قديم', 'أصول مفقودة ورقياً', 'لا يوجد سجل'] },
                        { id: 'payment_cycle_efficiency', label: 'كفاءة دورة دفع الموردين (AP)', icon: 'bi-truck', opts: ['دفع منظم وخصومات', 'دفع عند المطالبة', 'تأخير يؤثر على التوريد', 'فوضى في الدفع'] },
                        { id: 'financial_transparency', label: 'مستوى الشفافية المالية داخل الإدارة', icon: 'bi-eye', opts: ['وضوح كامل للتدفقات', 'بيانات محدودة', 'تعتيم على الأرقام', 'انعدام الشفافية'] },
                        { id: 'budget_variance_analysis', label: 'تحليل الانحرافات عن الموازنة المعتمدة', icon: 'bi-exclamation-octagon', opts: ['تحليل شهري وإجراءات', 'تحليل روتيني', 'تجاهل للانحرافات', 'لا توجد موازنة'] },
                        { id: 'data_security_finance', label: 'أمن البيانات المالية والنسخ الاحتياطي', icon: 'bi-lock', opts: ['تشفير ونسخ سحابي', 'كلمات مرور بسيطة', 'سجلات ورقية حساسة', 'لا يوجد أمن'] },
                        { id: 'audit_trail', label: 'وجود سجل تتبع للعمليات (Audit Trail)', icon: 'bi-journal-code', opts: ['مفعل 100% آلياً', 'سجل جزئي', 'سجل يدوي', 'غير موجود'] },
                        { id: 'fraud_prevention', label: 'سياسات الحماية من الاحتيال المالي', icon: 'bi-patch-exclamation', opts: ['سياسات صارمة ومطبقة', 'سياسات عامة', 'إجراءات شكلية', 'لا توجد سياسات'] },
                        { id: 'liquidity_ratio', label: 'مراقبة نسب السيولة السريعة (Acid Test)', icon: 'bi-droplet', opts: ['نسب ممتازة ومستقرة', 'نسب مقبولة (حدية)', 'مخاطر سيولة', 'عجز نقدي'] },
                        { id: 'investment_roi', label: 'قياس العائد على الاستثمارات المالية', icon: 'bi-graph-up', opts: ['قياس دقيق ومنتظم', 'تقديرات تقريبية', 'لا يتم القياس', 'خسائر غير مبررة'] },
                        { id: 'pricing_strategy', label: 'توافق استراتيجية التسعير مع التكاليف', icon: 'bi-tag', opts: ['توافق تام وديناميكي', 'مراجعة سنوية', 'تسعير عشوائي', 'البيع بأقل من التكلفة'] },
                        { id: 'procurement_governance', label: 'حوكمة المشتريات والتعاقدات المالية', icon: 'bi-cart-check', opts: ['نظام مناقصات تنافسي', 'موردون ثابتون', 'اجتهادات إدارية', 'غياب الحوكمة'] },
                        { id: 'petty_cash_control', label: 'الرقابة على عهود النثرية والمصاريف', icon: 'bi-wallet', opts: ['تسويات يومية صارمة', 'تسويات أسبوعية', 'تراكم فواتير', 'فوضى نثرية'] },
                        { id: 'financial_delegation', label: 'مصفوفة الصلاحيات المالية (DOA)', icon: 'bi-key', opts: ['محددة ومفعلة رقمياً', 'موجودة ورقياً', 'صلاحيات غير واضحة', 'مركزية مطلقة'] },
                        { id: 'asset_utilization', label: 'تحليل معدل دوران الأصول (Turnover)', icon: 'bi-arrow-repeat', opts: ['تشغيل أمثل للأصول', 'أصول معطلة', 'أصول غير منتجة', 'تقادم أصول'] },
                        { id: 'insurance_coverage', label: 'كفاية التغطية التأمينية للأصول', icon: 'bi-umbrella', opts: ['تغطية كاملة وشاملة', 'تغطية أساسية فقط', 'ثغرات في التأمين', 'بدون تأمين'] },
                        { id: 'dividend_policy', label: 'سياسة توزيع الأرباح والاحتياطيات', icon: 'bi-distribute-vertical', opts: ['سياسة معتمدة وواضحة', 'توزيع حسب السيولة', 'لا توجد سياسة', 'خسائر مرحلة'] },
                        { id: 'compliance_monitoring', label: 'مراقبة التغيرات في الأنظمة المالية', icon: 'bi-clipboard-check', opts: ['تحديث فوري للسياسات', 'استجابة متأخرة', 'عدم دراية بالنظام', 'خروقات نظامية'] },
                        { id: 'debt_to_equity', label: 'مستوى الرافعة المالية (Debt/Equity)', icon: 'bi-balance-scale', opts: ['مستوى آمن ومدروس', 'اعتماد عالٍ على الدين', 'مخاطر ائتمانية', 'إفلاس تقني'] },
                        { id: 'forecast_accuracy', label: 'دقة التوقعات المالية المستقبلية', icon: 'bi-binoculars', opts: ['انحراف أقل من 5%', 'انحراف 10-20%', 'توقعات غير واقعية', 'لا توجد توقعات'] },
                        { id: 'shareholders_reporting', label: 'جودة التقارير المرفوعة للمساهمين', icon: 'bi-journal-richtext', opts: ['شفافية ومهنية عالية', 'تقارير مقتضبة', 'معلومات ناقصة', 'غياب التقارير'] },
                        { id: 'cost_allocation', label: 'نظام توزيع التكاليف غير المباشرة', icon: 'bi-diagram-2', opts: ['على أساس النشاط (ABC)', 'توزيع تقديري منتظم', 'توزيع عشوائي', 'لا يوجد توزيع'] },
                        { id: 'financial_talent', label: 'كفاءة وخبرة الفريق المالي', icon: 'bi-person-gear', opts: ['فريق محترف ومعتمد', 'خبرات متوسطة', 'بحاجة لتدريب مكثف', 'ضعف شديد بالكفاءة'] },
                        { id: 'it_audit_finance', label: 'التدقيق التقني على الأنظمة المالية', icon: 'bi-database-check', opts: ['فحص دوري للثغرات', 'فحص سنوي', 'رد فعل عند العطل', 'لا يتم الفحص'] },
                        { id: 'bank_reconciliation', label: 'دورية وسرعة المطابقات البنكية', icon: 'bi-layout-text-sidebar-reverse', opts: ['مطابقة يومية آلية', 'مطابقة أسبوعية', 'مطابقة شهرية متأخرة', 'تراكم فروقات'] },
                        { id: 'risk_management_manual', label: 'وجود سجل مخاطر مالية محدّث', icon: 'bi-journal-x', opts: ['سجل شامل وإجراءات', 'سجل عام', 'في الأذهان فقط', 'لا يوجد سجل'] },
                        { id: 'overhead_control', label: 'السيطرة على المصاريف الإدارية والبيعية', icon: 'bi-stoplights', opts: ['رقابة شديدة وترشيد', 'صرف ضمن الميزانية', 'زيادة غير مبررة', 'انفلات المصاريف'] },
                        { id: 'earning_quality', label: 'تحليل جودة الأرباح (Earning Quality)', icon: 'bi-gem', opts: ['أرباح تشغيلية مستدامة', 'أرباح غير متكررة', 'تجميل محاسبي', 'أرباح وهمية'] },
                        { id: 'merger_acquisition_readiness', label: 'الجاهزية لعمليات الاندماج أو الاستقواذ', icon: 'bi-intersect', opts: ['سجلات نظيفة وجاهزة', 'ثغرات يمكن إصلاحها', 'فوضى في السجلات', 'غير جاهز نهائياً'] },
                        { id: 'financial_policy_updating', label: 'دورية مراجعة السياسات المالية', icon: 'bi-arrow-clockwise', opts: ['مراجعة سنوية شاملة', 'عند التغيير الجوهري', 'نادراً ما تُحدث', 'سياسات منسية'] },
                        { id: 'working_from_home_control', label: 'الرقابة المالية على العمل عن بعد', icon: 'bi-house-gear', opts: ['أنظمة رقابة رقمية صلبة', 'اعتماد على الأمانة', 'ضعف الرقابة التقنية', 'لا تتوفر رقابة'] },
                        { id: 'tax_planning', label: 'استراتيجية التخطيط الضريبي القانوني', icon: 'bi-percent', opts: ['وفورات ضريبية ذكية', 'التزام روتيني فقط', 'مخاطر ضريبية', 'عشوائية'] },
                        { id: 'credit_policy_customers', label: 'سياسة الائتمان الممنوحة للعملاء', icon: 'bi-person-check', opts: ['صارمة ومبنية على ملاءة', 'سياسة مرنة جداً', 'لا توجد سياسة واضحة', 'ديون معدومة'] },
                        { id: 'financial_transparency_intl', label: 'الالتزام بمعايير التقارير الدولية (IFRS)', icon: 'bi-globe', opts: ['تبني كامل ومبكر', 'امتثال جزئي', 'خطة للتحول', 'لا يوجد التزام'] },
                        { id: 'board_financial_reporting', label: 'مدى وعي مجلس الإدارة بالتقارير المالية', icon: 'bi-people-fill', opts: ['تفاعل ومناقشة عميقة', 'متابعة عامة', 'مجرد اعتماد شكلي', 'عدم دراية مالية'] },
                        { id: 'exit_valuation_readiness', label: 'وضوح هيكل التكاليف للتقييم الختامي', icon: 'bi-door-closed', opts: ['بيانات جاهزة للتقييم', 'تحتاج تنظيف بيانات', 'بيانات مضللة', 'لا يوجد هيكل'] }
                    ];

                    let auditState = {};

                    function initAudit() {
                        const container = document.getElementById('auditQuestions');
                        container.innerHTML = QUESTIONS.map(q => `
                            <div class="audit-card" data-id="${q.id}">
                                <div class="card-header">
                                    <h3><i class="${q.icon}"></i> ${q.label}</h3>
                                    <div class="control-panel">
                                        ${q.opts.map((opt, idx) => `
                                            <div class="control-btn" data-val="${idx}" onclick="setVal('${q.id}', '${idx}', this)">${opt}</div>
                                        `).join('')}
                                    </div>
                                </div>
                                <textarea placeholder="لماذا اخترت هذا التقييم؟ أضف ملاحظاتك..." oninput="setNote('${q.id}', this.value)"></textarea>
                            </div>
                        `).join('');

                        loadSavedData();
                    }

                    function setVal(id, val, btn) {
                        if (!auditState[id]) auditState[id] = { val: '', note: '', label: '' };
                        auditState[id].val = val;

                        const q = QUESTIONS.find(x => x.id === id);
                        auditState[id].label = q.opts[parseInt(val)];

                        const parent = btn.parentElement;
                        parent.querySelectorAll('.control-btn').forEach(b => b.classList.remove('active', 'success', 'warning', 'danger'));
                        btn.classList.add('active');

                        const idx = parseInt(val);
                        if (idx === 0) btn.classList.add('success');
                        else if (idx === q.opts.length - 1) btn.classList.add('danger');
                        else btn.classList.add('warning');
                    }

                    function setNote(id, note) {
                        if (!auditState[id]) auditState[id] = { val: '', note: '', label: (auditState[id]?.label || '') };
                        auditState[id].note = note;
                    }

                    async function loadSavedData() {
                        if (typeof DeptPage === 'undefined') return;
                        const saved = await DeptPage.loadFromAPI('AUDIT_FINANCE') || JSON.parse(localStorage.getItem('stratix_finance_audit_v2') || '{}');
                        auditState = saved;
                        Object.keys(saved).forEach(id => {
                            const card = document.querySelector(`.audit-card[data-id="${id}"]`);
                            if (card) {
                                const btn = card.querySelector(`.control-btn[data-val="${saved[id].val}"]`);
                                if (btn) setVal(id, saved[id].val, btn);
                                const area = card.querySelector('textarea');
                                if (area) area.value = saved[id].note || '';
                            }
                        });
                    }

                    document.getElementById('auditForm').addEventListener('submit', async (e) => {
                        e.preventDefault();

                        const totalQuestions = QUESTIONS.length;
                        const answeredCount = Object.keys(auditState).filter(k => auditState[k] && auditState[k].val !== '').length;

                        if (answeredCount < totalQuestions) {
                            if (typeof DeptPage !== 'undefined') {
                                DeptPage.showMessage(`⚠️ يرجى تقييم جميع النقاط المالية (أجبت على ${answeredCount} من ${totalQuestions}) لضمان دقة تحليل SWOT.`, true);
                            }
                            document.querySelectorAll('.audit-card').forEach(card => {
                                const id = card.dataset.id;
                                if (!auditState[id] || auditState[id].val === '') {
                                    card.style.borderRight = '4px solid #ef4444';
                                } else {
                                    card.style.borderRight = 'none';
                                }
                            });
                            return;
                        }

                        if (typeof DeptPage !== 'undefined') {
                            const btn = e.target.querySelector('button[type="submit"]');
                            if (btn) {
                                btn.disabled = true;
                                btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> جاري الحفظ والتوجيه لـ SWOT...';
                            }

                            localStorage.setItem('stratix_finance_audit_v2', JSON.stringify(auditState));
                            await DeptPage.saveToAPI('AUDIT_FINANCE', auditState);
                            DeptPage.showMessage('✅ تم حفظ التدقيق المالي الجنائي بنجاح.');
                        }
                        setTimeout(() => window.location.href = '/swot.html?dept=finance&t=' + Date.now(), 1500);
                    });

                    document.addEventListener('DOMContentLoaded', () => {
                        initAudit();
                        if (typeof initSidebar === 'function') initSidebar();
                    });
                </script>
            </div>
        </main>
    </div>
</body>

</html>
