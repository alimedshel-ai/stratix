<!DOCTYPE html>
<html lang="ar" dir="rtl">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ستارتكس | تحليل PESTEL الاستراتيجي</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/shared.css">
    <style>
        :root {
            --bg-dark: #0f1117;
            --card-bg: rgba(30, 41, 59, 0.7);
            --border: rgba(255, 255, 255, 0.1);
            --primary: #6366f1;
            --secondary: #0ea5e9;
        }

        body {
            background-color: var(--bg-dark);
            color: #e2e8f0;
            font-family: 'Tajawal', sans-serif;
            margin: 0;
            padding: 0;
        }

        .stx-wrapper {
            display: flex;
            min-height: 100vh;
        }

        .stx-sidebar-container {
            position: fixed !important;
            top: 0; right: -260px !important;
            width: 260px; height: 100vh;
            background: #1a1d2e;
            border-left: 1px solid var(--border);
            z-index: 1050;
            transition: right 0.3s ease !important;
            display: block !important;
            overflow-y: auto;
        }
        .stx-sidebar-container.sidebar-visible { right: 0 !important; }
        .sidebar-trigger {
            position: fixed; top: 0; right: 0;
            width: 18px; height: 100vh;
            z-index: 1040; cursor: pointer;
        }
        .sidebar-hint {
            position: fixed; top: 50%; right: 0;
            transform: translateY(-50%);
            width: 6px; height: 60px;
            background: linear-gradient(180deg, #6366f1, #8b5cf6);
            border-radius: 4px 0 0 4px;
            opacity: 0.5; z-index: 1041;
            transition: opacity 0.3s;
        }
        .sidebar-trigger:hover ~ .sidebar-hint,
        .sidebar-hint:hover { opacity: 1; }
        .sidebar-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.4); z-index: 1045;
        }
        .sidebar-overlay.active { display: block; }

        .stx-main-content {
            flex: 1;
            padding: 40px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .pestel-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
            gap: 24px;
        }

        .pestel-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 24px;
            transition: all 0.3s ease;
            height: 100%;
            display: flex;
            flex-direction: column;
            gap: 15px;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(12px);
        }

        .pestel-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.05);
        }

        .pestel-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: var(--primary);
        }

        .form-control {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border);
            color: white;
            border-radius: 12px;
            padding: 12px;
        }

        .suggestion-chip {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            cursor: pointer;
            margin: 3px;
            display: inline-block;
            transition: 0.2s;
        }

        .suggestion-chip:hover {
            border-color: var(--secondary);
            background: rgba(14, 165, 233, 0.1);
        }

        .btn-modern {
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 700;
        }
    </style>
</head>

    <div class="sidebar-trigger" id="sidebarTrigger"></div>
    <div class="sidebar-hint"></div>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <aside class="stx-sidebar-container" id="sidebar"></aside>
    <div class="stx-wrapper">

                    </button>
                </div>
            </div>

            <form id="pestelForm">
                <div class="pestel-grid">
                    <!-- Political -->
                    <div class="pestel-card">
                        <div class="d-flex align-items-center gap-2 mb-2">
                            <i class="bi bi-bank text-primary fs-4"></i>

                        </div>
                        <div id="political-suggestions" class="mb-2"></div>
                        <textarea id="political" class="form-control" rows="4"
                            placeholder="مثال: توجهات الخصخصة، سياسات التوطين، الاستقرار..."></textarea>
                    </div>

                    <!-- Economic -->
                    <div class="pestel-card">
                        <div class="d-flex align-items-center gap-2 mb-2">
                            <i class="bi bi-currency-dollar text-primary fs-4"></i>
                            <h5 class="m-0 fw-700">العوامل الاقتصادية</h5>
                        </div>
                        <div id="economic-suggestions" class="mb-2"></div>
                        <textarea id="economic" class="form-control" rows="4"
                            placeholder="مثال: نسب التضخم، القوة الشرائية، ميزانيات التشغيل..."></textarea>
                    </div>

                    <!-- Social -->
                    <div class="pestel-card">
                        <div class="d-flex align-items-center gap-2 mb-2">
                            <i class="bi bi-people text-primary fs-4"></i>
                            <h5 class="m-0 fw-700">العوامل الاجتماعية</h5>
                        </div>
                        <div id="social-suggestions" class="mb-2"></div>
                        <textarea id="social" class="form-control" rows="4"
                            placeholder="مثال: العقلية الريادية، توازن العمل والحياة، جيل Z..."></textarea>
                    </div>

                    <!-- Technological -->
                    <div class="pestel-card">
                        <div class="d-flex align-items-center gap-2 mb-2">
                            <i class="bi bi-cpu text-primary fs-4"></i>
                            <h5 class="m-0 fw-700">العوامل التقنية</h5>
                        </div>
                        <div id="technological-suggestions" class="mb-2"></div>
                        <textarea id="technological" class="form-control" rows="4"
                            placeholder="مثال: الأتمتة، تطبيقات السحابة، الذكاء الاصطناعي..."></textarea>
                    </div>

                    <!-- Environmental -->
                    <div class="pestel-card">
                        <div class="d-flex align-items-center gap-2 mb-2">
                            <i class="bi bi-tree text-primary fs-4"></i>
                            <h5 class="m-0 fw-700">العوامل البيئية</h5>
                        </div>
                        <div id="environmental-suggestions" class="mb-2"></div>
                        <textarea id="environmental" class="form-control" rows="4"
                            placeholder="مثال: سياسات الاستدامة، التقليل من الورق، ترشيد الطاقة..."></textarea>
                    </div>

                    <!-- Legal -->
                    <div class="pestel-card">
                        <div class="d-flex align-items-center gap-2 mb-2">
                            <i class="bi bi-briefcase text-primary fs-4"></i>
                            <h5 class="m-0 fw-700">العوامل القانونية</h5>
                        </div>
                        <div id="legal-suggestions" class="mb-2"></div>
                        <textarea id="legal" class="form-control" rows="4"
                            placeholder="مثال: نظام العمل الجديد، حماية الأجور، حوكمة البيانات..."></textarea>
                    </div>
                </div>

                <div

                    <button type="button" onclick="history.back()"
                        class="btn btn-link text-muted text-decoration-none fw-800">
                        <i class="bi bi-arrow-right me-2"></i> العودة
                    </button>
                    <button type="submit" class="btn btn-primary px-5 btn-modern" id="saveBtn">
                        حفظ ومتابعة لصحة الإدارة <i class="bi bi-arrow-left ms-2"></i>
                    </button>
                </div>
            </form>
        </main>
    </div>

            const DEPT_LABELS = {
                company: 'المنظمة', sales: 'المبيعات', marketing: 'التسويق',
                finance: 'المالية', hr: 'الموارد البشرية', it: 'تقنية المعلومات',
                operations: 'العمليات', quality: 'الجودة', support: 'الدعم',
                projects: 'المشاريع', governance: 'الحوكمة', compliance: 'الامتثال', cs: 'خدمة العملاء'
            };
            document.getElementById('dept-name').textContent = DEPT_LABELS[dept.toLowerCase()] || dept.toUpperCase();

            // تهيئة DeptPage (مهم جداً للحفظ)
            await DeptPage.init(dept);

            if (window.initSidebar) window.initSidebar();

            const pool = SUGGESTIONS[dept.toLowerCase()] || SUGGESTIONS.hr;
            Object.keys(pool).forEach(key => {
                const container = document.getElementById(`${key}-suggestions`);
                if (container) {
                    container.innerHTML = pool[key].map(s => `
                        <div class="suggestion-chip" onclick="applySuggestion('${key}', '${s}')">${s}</div>
                    `).join('');
                }
            });

            const data = await DeptPage.loadFromAPI('PESTEL_' + dept.toUpperCase()) || {};
            DeptPage.fillForm(data);

            // هندلة النموذج
            document.getElementById('pestelForm').onsubmit = async (e) => {
                e.preventDefault();
                const btn = document.getElementById('saveBtn');
                btn.disabled = true;
                btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> جاري الحفظ...';

                const dataPayload = {
                    political: document.getElementById('political').value,
                    economic: document.getElementById('economic').value,
                    social: document.getElementById('social').value,
                    technological: document.getElementById('technological').value,
                    environmental: document.getElementById('environmental').value,
                    legal: document.getElementById('legal').value
                };

                const success = await DeptPage.saveToAPI('PESTEL_' + dept.toUpperCase(), dataPayload);
                if (success) {
                    DeptPage.showMessage('✅ تم حفظ تحليل PESTEL بنجاح.');
                    if (Context.markStepCompleted) await Context.markStepCompleted('pestel');

                    // 🔗 Smart Redirect: التوجيه للمرحلة التالية مع الحفاظ على القسم
                    const targetUrl = `/dept-health.html?dept=${dept}`;
                    setTimeout(() => window.location.replace(targetUrl), 1500);
                } else {
                    btn.disabled = false;
                    btn.innerHTML = 'حفظ ومتابعة لصحة الإدارة <i class="bi bi-arrow-left ms-2"></i>';
                }
            };
        })();

        function applySuggestion(id, text) {
            const area = document.getElementById(id);
            area.value = area.value.trim() ? area.value + '\n- ' + text : '- ' + text;
        }

        function fillAll() {
            const dept = (Context && Context.getDept ? Context.getDept() : null) || DeptPage?.dept || 'hr';
            const pool = SUGGESTIONS[dept.toLowerCase()] || SUGGESTIONS.hr;
            let filled = 0;
            Object.keys(pool).forEach(key => {
                const area = document.getElementById(key);
                if (area) {
                    area.value = pool[key].map(s => '- ' + s).join('\n');
                    filled++;
                }
            });
            if (filled > 0) {
                DeptPage.showMessage('تم تعبئة ' + filled + ' حقول بمقترحات ذكية لإدارة ' + dept.toUpperCase());
            }
        }

        function clearAll() {
            if (confirm('هل أنت متأكد من مسح جميع الحقول؟')) {
                ['political', 'economic', 'social', 'technological', 'environmental', 'legal'].forEach(id => {
                    document.getElementById(id).value = '';
                });
            }
        }
    </script>
    <script>
    // ── Sidebar Hover System ──
    (function() {
        const trigger = document.getElementById('sidebarTrigger');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebarOverlay');
        let closeTimer = null;
        function openSidebar() { clearTimeout(closeTimer); sidebar.classList.add('sidebar-visible'); if(window.innerWidth < 768) overlay.classList.add('active'); }
        function closeSidebar() { closeTimer = setTimeout(() => { sidebar.classList.remove('sidebar-visible'); overlay.classList.remove('active'); }, 300); }
        trigger.addEventListener('mouseenter', openSidebar);
        sidebar.addEventListener('mouseenter', function() { clearTimeout(closeTimer); });
        sidebar.addEventListener('mouseleave', closeSidebar);
        overlay.addEventListener('click', function() { sidebar.classList.remove('sidebar-visible'); overlay.classList.remove('active'); });
    })();
    </script>
</body>
