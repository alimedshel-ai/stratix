<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ستارتكس - تحليل التناقضات</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #0a0b10;
            --bg2: #12141f;
            --card: #171a2a;
            --text: #e2e8f0;
            --muted: #7a8599;
            --border: rgba(255, 255, 255, 0.06);
            --primary: #667eea;
            --secondary: #764ba2;
            --green: #22c55e;
            --red: #ef4444;
            --yellow: #f59e0b;
            --blue: #38bdf8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        .page-wrapper {
            display: flex;
            min-height: 100vh;
        }

        .main-content {
            flex: 1;
            padding: 0;
            overflow-x: hidden;
        }

        /* Header */
        .ct-header {
            padding: 28px 40px 0;
        }

        .ct-back {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--muted);
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 12px;
            transition: color 0.2s;
        }

        .ct-back:hover {
            color: var(--primary);
        }

        .ct-title-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 24px;
        }

        .ct-title {
            font-size: 26px;
            font-weight: 900;
        }

        .ct-title span {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .ct-subtitle {
            font-size: 13px;
            color: var(--muted);
            margin-top: 4px;
        }

        /* Stats Bar */
        .ct-stats {
            display: flex;
            gap: 16px;
            padding: 0 40px 24px;
            flex-wrap: wrap;
        }

        .ct-stat {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 16px 24px;
            flex: 1;
            min-width: 140px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .ct-stat-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .ct-stat-value {
            font-size: 26px;
            font-weight: 900;
        }

        .ct-stat-label {
            font-size: 12px;
            color: var(--muted);
        }

        /* Filter Tabs */
        .ct-filters {
            display: flex;
            gap: 8px;
            padding: 0 40px 20px;
            flex-wrap: wrap;
        }

        .ct-filter-btn {
            padding: 8px 18px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--muted);
            font-family: inherit;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .ct-filter-btn:hover {
            background: rgba(255, 255, 255, 0.04);
            color: var(--text);
        }

        .ct-filter-btn.active {
            background: rgba(102, 126, 234, 0.1);
            color: var(--primary);
            border-color: rgba(102, 126, 234, 0.3);
        }

        /* Contradiction Cards */
        .ct-list {
            padding: 0 40px 40px;
        }

        .ct-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 0;
            margin-bottom: 16px;
            overflow: hidden;
            transition: all 0.3s;
        }

        .ct-card:hover {
            border-color: rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
        }

        .ct-card-header {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 20px 24px;
            cursor: pointer;
            user-select: none;
        }

        .ct-severity {
            width: 4px;
            height: 48px;
            border-radius: 2px;
            flex-shrink: 0;
        }

        .ct-card-icon {
            font-size: 28px;
            flex-shrink: 0;
        }

        .ct-card-title {
            font-size: 16px;
            font-weight: 800;
            flex: 1;
        }

        .ct-card-badges {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .ct-badge {
            padding: 4px 12px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 700;
        }

        .ct-badge.critical {
            background: rgba(239, 68, 68, 0.1);
            color: var(--red);
        }

        .ct-badge.high {
            background: rgba(245, 158, 11, 0.1);
            color: var(--yellow);
        }

        .ct-badge.medium {
            background: rgba(56, 189, 248, 0.1);
            color: var(--blue);
        }

        .ct-badge.cross {
            background: rgba(167, 139, 250, 0.1);
            color: #a78bfa;
        }

        .ct-chevron {
            color: var(--muted);
            font-size: 16px;
            transition: transform 0.3s;
            flex-shrink: 0;
        }

        .ct-card.open .ct-chevron {
            transform: rotate(90deg);
        }

        /* Card Body (collapsible) */
        .ct-card-body {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease;
            border-top: 1px solid transparent;
        }

        .ct-card.open .ct-card-body {
            max-height: 800px;
            border-top-color: var(--border);
        }

        .ct-card-inner {
            padding: 20px 24px;
        }

        .ct-desc {
            font-size: 14px;
            color: var(--muted);
            line-height: 1.8;
            margin-bottom: 16px;
        }

        /* Evidence */
        .ct-evidence {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .ct-evidence-title {
            font-size: 12px;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .ct-evidence-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            padding: 6px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }

        .ct-evidence-item:last-child {
            border-bottom: none;
        }

        .ct-evidence-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--primary);
            flex-shrink: 0;
        }

        /* Suggested OKR */
        .ct-okr {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.06), rgba(118, 75, 162, 0.06));
            border: 1px solid rgba(102, 126, 234, 0.12);
            border-radius: 14px;
            padding: 20px;
        }

        .ct-okr-title {
            font-size: 14px;
            font-weight: 800;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .ct-okr-objective {
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(102, 126, 234, 0.12);
        }

        .ct-okr-kr {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            font-size: 13px;
            padding: 5px 0;
            color: var(--muted);
        }

        .ct-okr-kr-num {
            width: 22px;
            height: 22px;
            border-radius: 6px;
            background: rgba(102, 126, 234, 0.1);
            color: var(--primary);
            font-size: 11px;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .ct-okr-meta {
            display: flex;
            gap: 20px;
            margin-top: 14px;
            font-size: 12px;
            color: var(--muted);
        }

        .ct-okr-meta strong {
            color: var(--text);
        }

        /* Refresh Button */
        .ct-refresh-btn {
            padding: 10px 22px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            font-family: inherit;
            font-size: 14px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .ct-refresh-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(102, 126, 234, 0.4);
        }

        .ct-refresh-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Empty State */
        .ct-empty {
            text-align: center;
            padding: 60px 40px;
        }

        /* Loading */
        .ct-loading {
            text-align: center;
            padding: 60px;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @media(max-width:768px) {

            .ct-header,
            .ct-stats,
            .ct-filters,
            .ct-list {
                padding-right: 16px;
                padding-left: 16px;
            }

            .ct-stats {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>
    <div class="page-wrapper">
        <div id="sidebar-container"></div>
        <div class="main-content">

            <div class="ct-header">
                <a href="/ceo-dashboard.html" class="ct-back">
                    <i class="bi bi-arrow-right"></i> العودة للوحة التحكم
                </a>
                <div class="ct-title-row">
                    <div>
                        <h1 class="ct-title"><i class="bi bi-lightning-charge"></i> المستشار <span>الاستراتيجي
                                الذكي</span></h1>
                        <div class="ct-subtitle">تحليل تلقائي للتناقضات بين الأقسام مع حلول OKR مقترحة</div>
                    </div>
                    <button class="ct-refresh-btn" id="refreshBtn" onclick="runAnalysis()">
                        <i class="bi bi-arrow-clockwise"></i> تحليل جديد
                    </button>
                </div>
            </div>

            <!-- Stats -->
            <div class="ct-stats" id="statsBar" style="display:none">
                <div class="ct-stat">
                    <div class="ct-stat-icon" style="background:rgba(239,68,68,0.1);color:var(--red)">🔴</div>
                    <div>
                        <div class="ct-stat-value" id="statCritical">0</div>
                        <div class="ct-stat-label">حرج</div>
                    </div>
                </div>
                <div class="ct-stat">
                    <div class="ct-stat-icon" style="background:rgba(245,158,11,0.1);color:var(--yellow)">🟡</div>
                    <div>
                        <div class="ct-stat-value" id="statHigh">0</div>
                        <div class="ct-stat-label">عالي</div>
                    </div>
                </div>
                <div class="ct-stat">
                    <div class="ct-stat-icon" style="background:rgba(56,189,248,0.1);color:var(--blue)">🔵</div>
                    <div>
                        <div class="ct-stat-value" id="statMedium">0</div>
                        <div class="ct-stat-label">متوسط</div>
                    </div>
                </div>
                <div class="ct-stat">
                    <div class="ct-stat-icon" style="background:rgba(34,197,94,0.1);color:var(--green)">✅</div>
                    <div>
                        <div class="ct-stat-value" id="statTotal">0</div>
                        <div class="ct-stat-label">إجمالي النتائج</div>
                    </div>
                </div>
            </div>

            <!-- Filters -->
            <div class="ct-filters" id="filtersBar" style="display:none">
                <button class="ct-filter-btn active" data-filter="all" onclick="filterResults('all', this)">
                    <i class="bi bi-grid-3x3-gap"></i> الكل
                </button>
                <button class="ct-filter-btn" data-filter="CRITICAL" onclick="filterResults('CRITICAL', this)">
                    🔴 حرج
                </button>
                <button class="ct-filter-btn" data-filter="HIGH" onclick="filterResults('HIGH', this)">
                    🟡 عالي
                </button>
                <button class="ct-filter-btn" data-filter="CROSS_DEPT" onclick="filterResults('CROSS_DEPT', this)">
                    🔗 بين الأقسام
                </button>
            </div>

            <!-- Results -->
            <div class="ct-list" id="resultsList">
                <div class="ct-loading">
                    <div class="spinner"></div>
                    <div style="color:var(--muted);font-size:15px">جارٍ تحليل بيانات الأقسام...</div>
                </div>
            </div>

        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/steps-config.js"></script>
    <script src="/js/sidebar.js"></script>
    <script src="/js/impersonation.js"></script>
    <script>
        let allInsights = [];
        let currentFilter = 'all';

        // XSS Prevention Utility
        function escapeHtml(str) {
            if (str == null) return '';
            const div = document.createElement('div');
            div.textContent = String(str);
            return div.innerHTML;
        }

        async function runAnalysis() {
            const entityId = localStorage.getItem('entityId');
            if (!entityId) return showEmpty('لم يتم تحديد كيان للعرض.');

            const btn = document.getElementById('refreshBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="bi bi-hourglass-split"></i> جارٍ التحليل...';

            document.getElementById('resultsList').innerHTML = `
                <div class="ct-loading">
                    <div class="spinner"></div>
                    <div style="color:var(--muted);font-size:15px">جارٍ تحليل بيانات الأقسام...</div>
                </div>
            `;

            try {
                // Using the centralized API wrapper for automatic auth/error handling
                const data = await window.api.post(`/api/rules-engine/analyze/${entityId}`);

                allInsights = data.insights || [];

                if (allInsights.length === 0) {
                    showEmpty('لا توجد تناقضات مكتشفة حالياً — وضع ممتاز! 🎉');
                } else {
                    updateStats();
                    renderInsights();
                }

            } catch (e) {
                showEmpty(e.message || 'خطأ في الاتصال بالخادم');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="bi bi-arrow-clockwise"></i> تحليل جديد';
            }
        }

        function updateStats() {
            const critical = allInsights.filter(i => i.severity === 'CRITICAL').length;
            const high = allInsights.filter(i => i.severity === 'HIGH').length;
            const medium = allInsights.filter(i => i.severity === 'MEDIUM' || i.severity === 'LOW').length;

            document.getElementById('statCritical').textContent = critical;
            document.getElementById('statHigh').textContent = high;
            document.getElementById('statMedium').textContent = medium;
            document.getElementById('statTotal').textContent = allInsights.length;
            document.getElementById('statsBar').style.display = 'flex';
            document.getElementById('filtersBar').style.display = 'flex';
        }

        function filterResults(filter, btn) {
            currentFilter = filter;
            document.querySelectorAll('.ct-filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderInsights();
        }

        function renderInsights() {
            const filtered = currentFilter === 'all'
                ? allInsights
                : allInsights.filter(i =>
                    currentFilter === 'CROSS_DEPT' ? i.type === 'CROSS_DEPT' : i.severity === currentFilter
                );

            if (filtered.length === 0) {
                document.getElementById('resultsList').innerHTML = `
                    <div class="ct-empty">
                        <div style="font-size:48px;margin-bottom:12px">📭</div>
                        <h3>لا توجد نتائج لهذا الفلتر</h3>
                    </div>
                `;
                return;
            }

            const severityOrder = { CRITICAL: 0, HIGH: 1, MEDIUM: 2, LOW: 3 };
            filtered.sort((a, b) => (severityOrder[a.severity] || 3) - (severityOrder[b.severity] || 3));

            document.getElementById('resultsList').innerHTML = filtered.map((ins, i) => {
                const severityColor = {
                    CRITICAL: 'var(--red)', HIGH: 'var(--yellow)',
                    MEDIUM: 'var(--blue)', LOW: 'var(--green)'
                }[ins.severity] || 'var(--muted)';

                const severityLabel = {
                    CRITICAL: 'حرج', HIGH: 'عالي', MEDIUM: 'متوسط', LOW: 'منخفض'
                }[ins.severity] || '';

                const severityClass = (ins.severity || 'medium').toLowerCase();
                const okr = ins.suggestedOKR;

                return `
                <div class="ct-card" id="card-${i}">
                    <div class="ct-card-header" onclick="toggleCard(${i})">
                        <div class="ct-severity" style="background:${severityColor}"></div>
                        <div class="ct-card-icon">${escapeHtml(ins.icon) || '⚠️'}</div>
                        <div style="flex:1;min-width:0">
                            <div class="ct-card-title">${escapeHtml(ins.title)}</div>
                            <div style="font-size:12px;color:var(--muted);margin-top:2px">
                                ${escapeHtml((ins.departments || []).join(' ↔ '))}
                            </div>
                        </div>
                        <div class="ct-card-badges">
                            <span class="ct-badge ${severityClass}">${severityLabel}</span>
                            ${ins.type === 'CROSS_DEPT' ? '<span class="ct-badge cross">بين الأقسام</span>' : ''}
                        </div>
                        <i class="bi bi-chevron-left ct-chevron"></i>
                    </div>
                    <div class="ct-card-body">
                        <div class="ct-card-inner">
                            <div class="ct-desc">${escapeHtml(ins.description)}</div>

                            ${ins.evidence && ins.evidence.length > 0 ? `
                            <div class="ct-evidence">
                                <div class="ct-evidence-title">
                                    <i class="bi bi-clipboard-data"></i> الأدلة والبيانات
                                </div>
                                ${ins.evidence.map(e => `
                                    <div class="ct-evidence-item">
                                        <div class="ct-evidence-dot"></div>
                                        <span>${escapeHtml(e)}</span>
                                    </div>
                                `).join('')}
                            </div>
                            ` : ''}

                            ${okr ? `
                            <div class="ct-okr">
                                <div class="ct-okr-title">
                                    <i class="bi bi-lightbulb" style="color:var(--yellow)"></i>
                                    OKR مقترح
                                </div>
                                <div class="ct-okr-objective">🎯 ${escapeHtml(okr.objective)}</div>
                                ${okr.keyResults.map((kr, ki) => `
                                    <div class="ct-okr-kr">
                                        <div class="ct-okr-kr-num">${ki + 1}</div>
                                        <span>${escapeHtml(kr)}</span>
                                    </div>
                                `).join('')}
                                <div class="ct-okr-meta">
                                    <span>⏱️ المدة: <strong>${escapeHtml(okr.timeline) || '—'}</strong></span>
                                    <span>👤 المسؤول: <strong>${escapeHtml(okr.owner) || '—'}</strong></span>
                                </div>
                            </div>
                            ` : ''}
                        </div>
                    </div>
                </div>
                `;
            }).join('');
        }

        function toggleCard(index) {
            const card = document.getElementById(`card-${index}`);
            card.classList.toggle('open');
        }

        function showEmpty(msg) {
            document.getElementById('resultsList').innerHTML = `
                <div class="ct-empty">
                    <div style="font-size:64px;margin-bottom:16px">🔍</div>
                    <h3 style="margin-bottom:8px">${msg}</h3>
                    <p style="color:var(--muted);font-size:14px">تأكد من ملء استبيانات الأقسام (CFO, CMO, COO) ثم أعد التحليل</p>
                </div>
            `;
        }

        document.addEventListener('DOMContentLoaded', async () => {
            try {
                // Wait for central auth check
                const user = await window.api.getCurrentUser();
                if (!user) {
                    sessionStorage.setItem('stratix_return_url', location.pathname + location.search);
                    location.href = '/login.html';
                    return;
                }

                if (localStorage.getItem('entityId')) {
                    runAnalysis();
                } else {
                    showEmpty('لم يتم تحديد كيان. يرجى اختيار كيان من لوحة التحكم.');
                }
            } catch (err) {
                console.error("Auth check failed", err);
            }
        });
    </script>
</body>

</html>
