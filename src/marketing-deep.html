<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <title>ستارتكس | التحليل الرقمي - التسويق</title>
    <link rel="stylesheet" href="/css/dept-pages.css">
    <script src="/js/context-manager.js?v=4"></script>
    <script src="/js/dept-page.js?v=4"></script>
</head>

<body>
    <div class="container">
        <h1>📊 التحليل الرقمي – التسويق</h1>
        <div class="sub">أدخل الأرقام والمؤشرات الرئيسية لقسم التسويق</div>
        <form id="deepForm">
            <div class="question">
                <label>الميزانية التسويقية السنوية (ريال)</label>
                <input type="number" name="budget" placeholder="مثال: 500000" required>
            </div>
            <div class="question">
                <label>نسبة العائد على الاستثمار التسويقي (%)</label>
                <input type="number" name="roi" placeholder="مثال: 15" step="0.1" required>
            </div>
            <div class="question">
                <label>عدد العملاء الجدد شهرياً</label>
                <input type="number" name="new_customers" placeholder="مثال: 200" required>
            </div>
            <div class="question">
                <label>نسبة الوعي بالعلامة التجارية (%)</label>
                <input type="number" name="brand_awareness" placeholder="مثال: 45" required>
            </div>
            <div class="question">
                <label>معدل التفاعل على وسائل التواصل (%)</label>
                <input type="number" name="engagement_rate" placeholder="مثال: 3.5" step="0.1" required>
            </div>
            <button type="submit">حفظ ومتابعة للتقييم الوصفي</button>
        </form>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const ok = await DeptPage.init('marketing');
            if (!ok) return;
            let saved = await DeptPage.loadFromAPI('DEEP') || Context.getTemp('deep_results') || DeptPage.migrateFromLocalStorage('stratix_marketing_deep_results');
            DeptPage.fillForm(saved);
            document.getElementById('deepForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const results = Object.fromEntries(new FormData(e.target));
                Context.setTemp('deep_results', results);
                const ok = await DeptPage.saveToAPI('DEEP', results);
                DeptPage.showMessage(ok ? 'تم حفظ التحليل الرقمي بنجاح' : 'تم حفظ التحليل محلياً', !ok);
                setTimeout(() => window.location.href = `/marketing-audit.html?dept=marketing`, 1500);
            });
        });
    </script>
</body>

</html>
