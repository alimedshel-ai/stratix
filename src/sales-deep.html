<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <title>ستارتكس | التحليل الرقمي - المبيعات</title>
    <link rel="stylesheet" href="/css/dept-pages.css">
    <script src="/js/context-manager.js?v=4"></script>
    <script src="/js/dept-page.js?v=4"></script>
</head>

<body>
    <div class="container">
        <h1>📊 التحليل الرقمي – المبيعات</h1>
        <div class="sub">أدخل الأرقام والمؤشرات الرئيسية لقسم المبيعات</div>
        <form id="deepForm">
            <div class="question"><label>قيمة المبيعات السنوية (ريال)</label><input type="number" name="annual_sales"
                    placeholder="مثال: 3000000" required></div>
            <div class="question"><label>عدد العملاء النشطين</label><input type="number" name="active_customers"
                    placeholder="مثال: 500" required></div>
            <div class="question"><label>متوسط قيمة الصفقة (ريال)</label><input type="number" name="avg_deal_size"
                    placeholder="مثال: 6000" required></div>
            <div class="question"><label>دورة المبيعات (أيام)</label><input type="number" name="sales_cycle"
                    placeholder="مثال: 30" required></div>
            <div class="question"><label>نسبة نجاح الصفقات (%)</label><input type="number" name="win_rate"
                    placeholder="مثال: 25" required></div>
            <button type="submit">حفظ ومتابعة للتقييم الوصفي</button>
        </form>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const ok = await DeptPage.init('sales');
            if (!ok) return;
            let saved = await DeptPage.loadFromAPI('DEEP') || Context.getTemp('deep_results') || DeptPage.migrateFromLocalStorage('stratix_sales_deep_results');
            DeptPage.fillForm(saved);
            document.getElementById('deepForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const results = Object.fromEntries(new FormData(e.target));
                Context.setTemp('deep_results', results);
                const ok = await DeptPage.saveToAPI('DEEP', results);
                DeptPage.showMessage(ok ? 'تم حفظ التحليل الرقمي بنجاح' : 'تم حفظ التحليل محلياً', !ok);
                setTimeout(() => window.location.href = `/sales-audit.html?dept=sales`, 1500);
            });
        });
    </script>
</body>

</html>
