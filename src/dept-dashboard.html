<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ستارتكيس — لوحة مدير الإدارة</title>
    <meta name="description" content="لوحة تحكم مدير الإدارة لمتابعة مؤشرات القسم والمهام">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <script src="/assets/js/sidebar.js" defer></script>
    <style>
        :root {
            --bg: #0f1219;
            --bg-2: #161b26;
            --bg-card: #1a1f2e;
            --bg-card-hover: #1f2538;
            --text: #e2e8f0;
            --text-muted: #8b8ba7;
            --border: rgba(255, 255, 255, 0.06);
            --accent: #f59e0b;
            --accent-glow: rgba(245, 158, 11, 0.1);
            --green: #22c55e;
            --yellow: #f59e0b;
            --red: #ef4444;
            --blue: #3b82f6;
            --purple: #a78bfa;
            --sidebar-w: 280px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        .main-content {
            margin-right: var(--sidebar-w);
            padding: 28px 32px;
            min-height: 100vh;
        }

        @media (max-width: 768px) {
            .main-content {
                margin-right: 0;
                padding: 16px;
            }
        }

        /* Header */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 28px;
            flex-wrap: wrap;
            gap: 16px;
        }

        .page-header h1 {
            font-size: 26px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .page-header h1 span {
            background: linear-gradient(135deg, #f59e0b, #ef4444);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 14px;
            margin-top: 4px;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text);
            font-family: 'Tajawal', sans-serif;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn:hover {
            background: var(--bg-card-hover);
            border-color: var(--accent);
        }

        /* Stats Row */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 14px;
            margin-bottom: 28px;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .stat-card::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 50% 0%, var(--card-glow, transparent), transparent 70%);
            pointer-events: none;
        }

        .stat-card:hover {
            transform: translateY(-2px);
            border-color: var(--accent);
        }

        .stat-value {
            font-size: 32px;
            font-weight: 800;
            line-height: 1;
            margin-bottom: 6px;
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 500;
        }

        /* Grid Layout */
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 24px;
        }

        @media (max-width: 900px) {
            .grid-2 {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
        }

        .card-title {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* KPI List */
        .kpi-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.02);
            margin-bottom: 8px;
            transition: background 0.2s;
        }

        .kpi-item:hover {
            background: rgba(255, 255, 255, 0.04);
        }

        .kpi-info {
            flex: 1;
        }

        .kpi-name {
            font-size: 13px;
            font-weight: 600;
        }

        .kpi-sub {
            font-size: 11px;
            color: var(--text-muted);
        }

        .kpi-progress {
            width: 80px;
            height: 6px;
            background: var(--border);
            border-radius: 3px;
            overflow: hidden;
            flex-shrink: 0;
        }

        .kpi-progress-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 1s ease;
        }

        .kpi-value {
            font-size: 14px;
            font-weight: 700;
            min-width: 48px;
            text-align: center;
        }

        /* Tasks */
        .task-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.02);
            margin-bottom: 8px;
            transition: all 0.2s;
        }

        .task-item:hover {
            background: rgba(255, 255, 255, 0.04);
        }

        .task-status {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .task-info {
            flex: 1;
        }

        .task-name {
            font-size: 13px;
            font-weight: 600;
        }

        .task-meta {
            font-size: 11px;
            color: var(--text-muted);
        }

        .task-badge {
            padding: 3px 10px;
            border-radius: 8px;
            font-size: 10px;
            font-weight: 600;
            white-space: nowrap;
        }

        /* Alerts Section */
        .alert-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 8px;
            border-right: 3px solid var(--alert-color, var(--yellow));
            background: rgba(255, 255, 255, 0.02);
        }

        .alert-icon {
            flex-shrink: 0;
            font-size: 18px;
        }

        .alert-title {
            font-size: 13px;
            font-weight: 600;
        }

        .alert-desc {
            font-size: 11px;
            color: var(--text-muted);
        }

        .alert-time {
            font-size: 10px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        /* Quick Actions */
        .quick-actions {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 10px;
            margin-bottom: 24px;
        }

        .quick-action {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px 14px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            color: var(--text);
        }

        .quick-action:hover {
            transform: translateY(-2px);
            border-color: var(--accent);
            background: var(--bg-card-hover);
        }

        .quick-action i {
            font-size: 22px;
            display: block;
            margin-bottom: 6px;
        }

        .quick-action span {
            font-size: 12px;
            font-weight: 600;
        }

        /* Full-width card */
        .full-card {
            grid-column: 1 / -1;
        }

        /* Health indicator */
        .health-meter {
            display: flex;
            align-items: center;
            gap: 16px;
            background: rgba(255, 255, 255, 0.02);
            padding: 16px 20px;
            border-radius: 12px;
            margin-bottom: 16px;
        }

        .health-score {
            font-size: 36px;
            font-weight: 800;
            flex-shrink: 0;
        }

        .health-bar {
            flex: 1;
            height: 8px;
            background: var(--border);
            border-radius: 4px;
            overflow: hidden;
        }

        .health-bar-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 1.2s ease;
        }

        .health-label {
            font-size: 13px;
            font-weight: 600;
        }

        .health-sub {
            font-size: 11px;
            color: var(--text-muted);
        }

        /* Loading */
        .loading-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 24px;
            color: var(--text-muted);
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 16px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .fade-in {
            animation: fadeIn 0.5s ease both;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .empty-text {
            text-align: center;
            padding: 24px;
            color: var(--text-muted);
            font-size: 13px;
        }
    </style>
</head>

<body>

    <aside class="sidebar-placeholder" id="sidebarContainer"></aside>

    <main class="main-content" id="mainContent">
        <div class="loading-state" id="loadingState">
            <div class="spinner"></div>
            <p>جاري تحميل بيانات إدارتك...</p>
        </div>

        <div id="contentArea" style="display:none">
            <!-- Header -->
            <div class="page-header fade-in">
                <div>
                    <h1>📊 <span>لوحة مدير الإدارة</span></h1>
                    <div class="subtitle" id="welcomeMsg">مرحباً — إليك أداء إدارتك اليوم</div>
                </div>
                <div style="display:flex;gap:10px">
                    <button class="btn" onclick="location.reload()"><i class="bi bi-arrow-clockwise"></i> تحديث</button>
                    <button class="btn" onclick="location.href='/dashboard.html'"><i class="bi bi-speedometer2"></i>
                        القيادة</button>
                </div>
            </div>

            <!-- Health Meter -->
            <div class="health-meter fade-in" id="healthMeter">
                <div>
                    <div class="health-score" id="healthScore" style="color:var(--yellow)">—</div>
                    <div class="health-sub">من 100</div>
                </div>
                <div style="flex:1">
                    <div class="health-label" id="healthLabel">صحة الإدارة</div>
                    <div class="health-bar">
                        <div class="health-bar-fill" id="healthFill" style="width:0%;background:var(--yellow)"></div>
                    </div>
                    <div class="health-sub" id="healthMsg" style="margin-top:4px">جاري الحساب...</div>
                </div>
            </div>

            <!-- Stats -->
            <div class="stats-row fade-in" id="statsRow"></div>

            <!-- Quick Actions -->
            <div class="quick-actions fade-in" id="quickActions"></div>

            <!-- Main Grid -->
            <div class="grid-2">
                <!-- KPIs -->
                <div class="card fade-in">
                    <div class="card-title">📈 مؤشرات الإدارة (KPIs)</div>
                    <div id="kpiList"></div>
                </div>

                <!-- Initiatives / Tasks -->
                <div class="card fade-in">
                    <div class="card-title">🚀 مبادرات ومهام</div>
                    <div id="taskList"></div>
                </div>

                <!-- Alerts -->
                <div class="card fade-in">
                    <div class="card-title">🔔 تنبيهات مهمة</div>
                    <div id="alertList"></div>
                </div>

                <!-- Recent Activity -->
                <div class="card fade-in">
                    <div class="card-title">📋 آخر النشاطات</div>
                    <div id="activityList"></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const token = localStorage.getItem('token');
        if (!token) location.href = '/login.html';

        const user = JSON.parse(localStorage.getItem('user') || '{}');
        const entityId = user?.entity?.id || localStorage.getItem('entityId') || '';

        init();

        async function init() {
            try {
                // Fetch entity dashboard data & health in parallel
                const [dashRes, healthRes, alertRes] = await Promise.all([
                    fetch(`/api/dashboard/entity/${entityId}`, { headers: { 'Authorization': `Bearer ${token}` } }),
                    fetch(`/api/dashboard/health/${entityId}`, { headers: { 'Authorization': `Bearer ${token}` } }),
                    fetch(`/api/alert-engine/entity/${entityId}`, { headers: { 'Authorization': `Bearer ${token}` } }).catch(() => null),
                ]);

                const dashData = dashRes.ok ? await dashRes.json() : {};
                const healthData = healthRes.ok ? await healthRes.json() : {};
                const alertData = alertRes && alertRes.ok ? await alertRes.json() : {};

                document.getElementById('loadingState').style.display = 'none';
                document.getElementById('contentArea').style.display = 'block';

                if (user.name) {
                    document.getElementById('welcomeMsg').textContent = `مرحباً ${user.name} — إليك أداء إدارتك اليوم`;
                }

                renderHealth(healthData);
                renderStats(dashData, healthData);
                renderQuickActions();
                renderKPIs(dashData);
                renderTasks(dashData);
                renderAlerts(alertData);
                renderActivity(dashData);

            } catch (err) {
                console.error('Error loading dept dashboard:', err);
                document.getElementById('loadingState').innerHTML = `
                    <i class="bi bi-exclamation-triangle" style="font-size:48px;color:var(--red);margin-bottom:16px"></i>
                    <p>فشل في تحميل البيانات</p>
                    <button class="btn" onclick="location.reload()" style="margin-top:16px"><i class="bi bi-arrow-clockwise"></i> إعادة المحاولة</button>
                `;
            }
        }

        function renderHealth(data) {
            const score = data.healthScore || 0;
            const color = getHealthColor(score);
            document.getElementById('healthScore').textContent = score;
            document.getElementById('healthScore').style.color = color;
            document.getElementById('healthFill').style.width = score + '%';
            document.getElementById('healthFill').style.background = color;
            document.getElementById('healthMsg').textContent = data.message || '';
        }

        function renderStats(dash, health) {
            const kpi = dash.kpiSummary || {};
            const ini = dash.initiativeSummary || {};
            const stats = [
                { value: kpi.total || 0, label: '📊 مؤشرات', color: '#3b82f6', glow: 'rgba(59,130,246,0.08)' },
                { value: kpi.onTrack || 0, label: '✅ على المسار', color: '#22c55e', glow: 'rgba(34,197,94,0.08)' },
                { value: kpi.warning || 0, label: '⚠️ تحذير', color: '#f59e0b', glow: 'rgba(245,158,11,0.08)' },
                { value: kpi.critical || 0, label: '🔴 حرج', color: '#ef4444', glow: 'rgba(239,68,68,0.08)' },
                { value: ini.total || 0, label: '🚀 مبادرات', color: '#a78bfa', glow: 'rgba(167,139,250,0.08)' },
                { value: ini.overdue || 0, label: '⏰ متأخرة', color: '#f97316', glow: 'rgba(249,115,22,0.08)' },
            ];
            document.getElementById('statsRow').innerHTML = stats.map(s => `
                <div class="stat-card" style="--card-glow:${s.glow}">
                    <div class="stat-value" style="color:${s.color}">${s.value}</div>
                    <div class="stat-label">${s.label}</div>
                </div>
            `).join('');
        }

        function renderQuickActions() {
            const actions = [
                { icon: 'bi-graph-up', label: 'تحديث KPIs', href: '/kpis.html', color: '#3b82f6' },
                { icon: 'bi-list-task', label: 'المبادرات', href: '/initiatives.html', color: '#22c55e' },
                { icon: 'bi-clipboard-check', label: 'مراجعة دورية', href: '/reviews.html', color: '#a78bfa' },
                { icon: 'bi-shield-exclamation', label: 'المخاطر', href: '/risk-map.html', color: '#f59e0b' },
                { icon: 'bi-bar-chart', label: 'التحليل', href: '/analysis.html', color: '#ef4444' },
            ];
            document.getElementById('quickActions').innerHTML = actions.map(a => `
                <a class="quick-action" href="${a.href}">
                    <i class="bi ${a.icon}" style="color:${a.color}"></i>
                    <span>${a.label}</span>
                </a>
            `).join('');
        }

        function renderKPIs(data) {
            const list = document.getElementById('kpiList');
            const kpi = data.kpiSummary || {};

            // We don't have individual KPIs from the dashboard API, so show summary
            if (kpi.total === 0) {
                list.innerHTML = '<div class="empty-text">لا توجد مؤشرات بعد — <a href="/kpis.html" style="color:var(--accent)">ابدأ بإضافة KPIs</a></div>';
                return;
            }

            const items = [];
            if (kpi.onTrack > 0) items.push({ name: 'مؤشرات على المسار', value: kpi.onTrack, pct: kpi.total > 0 ? (kpi.onTrack / kpi.total) * 100 : 0, color: 'var(--green)' });
            if (kpi.warning > 0) items.push({ name: 'مؤشرات تحذيرية', value: kpi.warning, pct: kpi.total > 0 ? (kpi.warning / kpi.total) * 100 : 0, color: 'var(--yellow)' });
            if (kpi.critical > 0) items.push({ name: 'مؤشرات حرجة', value: kpi.critical, pct: kpi.total > 0 ? (kpi.critical / kpi.total) * 100 : 0, color: 'var(--red)' });
            const noData = kpi.total - (kpi.onTrack + kpi.warning + kpi.critical);
            if (noData > 0) items.push({ name: 'بدون بيانات', value: noData, pct: kpi.total > 0 ? (noData / kpi.total) * 100 : 0, color: 'var(--text-muted)' });

            list.innerHTML = items.map(k => `
                <div class="kpi-item">
                    <div class="kpi-info">
                        <div class="kpi-name">${k.name}</div>
                        <div class="kpi-sub">${k.value} من ${kpi.total} مؤشر</div>
                    </div>
                    <div class="kpi-progress"><div class="kpi-progress-fill" style="width:${k.pct}%;background:${k.color}"></div></div>
                    <div class="kpi-value" style="color:${k.color}">${Math.round(k.pct)}%</div>
                </div>
            `).join('') + `
                <div style="text-align:center;margin-top:12px">
                    <a href="/kpis.html" class="btn" style="display:inline-flex;font-size:12px;padding:8px 16px">
                        <i class="bi bi-pencil-square"></i> تحديث المؤشرات
                    </a>
                </div>
            `;
        }

        function renderTasks(data) {
            const list = document.getElementById('taskList');
            const ini = data.initiativeSummary || {};

            if (ini.total === 0) {
                list.innerHTML = '<div class="empty-text">لا توجد مبادرات بعد — <a href="/initiatives.html" style="color:var(--accent)">ابدأ بإضافة مبادرات</a></div>';
                return;
            }

            const statuses = [
                { name: 'مكتملة', count: ini.completed || 0, color: 'var(--green)', icon: '✅' },
                { name: 'قيد التنفيذ', count: ini.inProgress || 0, color: 'var(--blue)', icon: '🔵' },
                { name: 'مخططة', count: ini.planned || 0, color: 'var(--text-muted)', icon: '⬜' },
                { name: 'متأخرة', count: ini.overdue || 0, color: 'var(--red)', icon: '🔴' },
            ].filter(s => s.count > 0);

            list.innerHTML = statuses.map(s => `
                <div class="task-item">
                    <div class="task-status" style="background:${s.color}"></div>
                    <div class="task-info">
                        <div class="task-name">${s.icon} ${s.name}</div>
                        <div class="task-meta">${s.count} مبادرة</div>
                    </div>
                    <span class="task-badge" style="background:${s.color}22;color:${s.color}">${s.count}</span>
                </div>
            `).join('') + `
                <div style="text-align:center;margin-top:12px">
                    <a href="/initiatives.html" class="btn" style="display:inline-flex;font-size:12px;padding:8px 16px">
                        <i class="bi bi-list-task"></i> إدارة المبادرات
                    </a>
                </div>
            `;
        }

        function renderAlerts(data) {
            const list = document.getElementById('alertList');
            const alerts = data.alerts || data.recentAlerts || [];

            if (!alerts.length) {
                list.innerHTML = '<div class="empty-text">🎉 لا توجد تنبيهات — ممتاز!</div>';
                return;
            }

            list.innerHTML = alerts.slice(0, 5).map(a => {
                const severityColors = { HIGH: 'var(--red)', MEDIUM: 'var(--yellow)', LOW: 'var(--blue)' };
                const color = severityColors[a.severity] || 'var(--yellow)';
                const icons = { HIGH: '🔴', MEDIUM: '⚠️', LOW: 'ℹ️' };
                return `
                <div class="alert-item" style="--alert-color:${color}">
                    <span class="alert-icon">${icons[a.severity] || '⚠️'}</span>
                    <div>
                        <div class="alert-title">${a.title || a.type || 'تنبيه'}</div>
                        <div class="alert-desc">${a.description || ''}</div>
                        <div class="alert-time">${a.createdAt ? new Date(a.createdAt).toLocaleDateString('ar-SA') : ''}</div>
                    </div>
                </div>
                `;
            }).join('');
        }

        function renderActivity(data) {
            const list = document.getElementById('activityList');
            const reviews = data.recentReviews || [];

            if (!reviews.length) {
                list.innerHTML = '<div class="empty-text">لا توجد مراجعات حديثة — <a href="/reviews.html" style="color:var(--accent)">ابدأ المراجعة</a></div>';
                return;
            }

            list.innerHTML = reviews.map(r => {
                const decisionIcons = { CONTINUE: '✅', ADJUST: '🔄', PIVOT: '🔀', NONE: '⬜' };
                const decisionLabels = { CONTINUE: 'استمرار', ADJUST: 'تعديل', PIVOT: 'تحول', NONE: 'بدون' };
                return `
                <div class="task-item">
                    <span style="font-size:18px">${decisionIcons[r.decision] || '📋'}</span>
                    <div class="task-info">
                        <div class="task-name">${r.title || 'مراجعة'}</div>
                        <div class="task-meta">${r.createdAt ? new Date(r.createdAt).toLocaleDateString('ar-SA') : ''} • ${r.status}</div>
                    </div>
                    <span class="task-badge" style="background:rgba(167,139,250,0.15);color:var(--purple)">${decisionLabels[r.decision] || r.decision || '—'}</span>
                </div>
                `;
            }).join('');
        }

        function getHealthColor(score) {
            if (score >= 80) return '#22c55e';
            if (score >= 60) return '#3b82f6';
            if (score >= 40) return '#f59e0b';
            if (score >= 20) return '#ef4444';
            return '#8b8ba7';
        }
    </script>
    <script src="/assets/js/ai-advisor.js"></script>
</body>
