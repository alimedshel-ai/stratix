<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ستارتكس - إنشاء حساب جديد</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #667eea;
            --secondary: #764ba2;
            --bg: #0f1117;
            --bg-card: #1a1d2e;
            --text: #e2e8f0;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.08);
            --success: #10b981;
        }

        body {
            background: var(--bg);
            font-family: 'Tajawal', sans-serif;
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        .signup-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px 36px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 480px;
            animation: slideUp 0.6s ease;
        }

        @keyframes slideUp {
            from {
                transform: translateY(30px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .form-label {
            font-weight: 500;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .form-control {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            color: white;
            border-radius: 12px;
            padding: 12px 15px;
            transition: all 0.3s ease;
        }

        /* تأثير الإضاءة عند الكتابة */
        .form-control:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(102, 126, 234, 0.4);
            color: white;
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.2);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-weight: bold;
            font-size: 1.1rem;
            transition: transform 0.2s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .password-rules {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 10px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5px;
        }

        .rule.valid {
            color: var(--success);
        }

        .info-icon {
            cursor: pointer;
            color: var(--primary);
        }
    </style>
</head>

<body>
    <!-- بوابة: الدخول فقط من صفحة الهبوط -->
    <script src="/js/api.js?v=4"></script>
    <script src="/js/diagnostic-engine.js?v=4"></script>
    <script src="/js/context-manager.js?v=4"></script>
    <script src="/js/auth-handler.js?v=4"></script>
    <script>
        (function () {
            if (localStorage.getItem('token')) return;
            const params = new URLSearchParams(window.location.search);
            if (params.get('from') === 'landing') return;
            const ref = document.referrer;
            if (ref) {
                try {
                    const refUrl = new URL(ref);
                    if (refUrl.origin === window.location.origin) return;
                } catch (e) { }
            }
            window.location.replace('/');
        })();
    </script>

    <div class="signup-card">
        <div class="text-center mb-4">
            <h2
                style="font-weight: 800; background: linear-gradient(135deg, var(--primary), #a78bfa); -webkit-background-clip: text; background-clip: text; color: transparent;">
                background-clip: text;
                ستارتكس</h2>
            <p class="text-muted">مرحباً بك في بوابتك للإدارة الاستراتيجية</p>
        </div>

        <form id="signupForm">
            <div class="mb-3">
                <label class="form-label">
                    الاسم الكامل
                    <i class="bi bi-info-circle info-icon" data-bs-toggle="tooltip"
                        title="اكتب اسمك كما تحب أن يظهر في لوحة التحكم"></i>
                </label>
                <input type="text" id="name" class="form-control" placeholder="مثال: أحمد محمد" required>
            </div>

            <div class="mb-3">
                <label class="form-label">
                    البريد الإلكتروني
                    <i class="bi bi-info-circle info-icon" data-bs-toggle="tooltip"
                        title="سنرسل إشعارات النظام المهمة على هذا البريد"></i>
                </label>
                <input type="email" id="email" class="form-control" placeholder="name@company.com" required>
            </div>

            <div class="mb-3">
                <label class="form-label">
                    اسم المنشأة
                    <i class="bi bi-info-circle info-icon" data-bs-toggle="tooltip"
                        title="اسم شركتك أو مؤسستك لإنشاء مساحة العمل الخاصة بك"></i>
                </label>
                <input type="text" id="companyName" class="form-control" placeholder="شركة التقنية الحديثة" required>
            </div>

            <div class="mb-3">
                <label class="form-label">
                    رقم الجوال
                    <i class="bi bi-info-circle info-icon" data-bs-toggle="tooltip"
                        title="لتسهيل التواصل مع فريقك ودعوتهم عبر واتساب"></i>
                </label>
                <input type="tel" id="phone" class="form-control" placeholder="05xxxxxxxx" dir="ltr"
                    style="text-align:left">
            </div>

            <div class="mb-4">
                <label class="form-label">
                    كلمة المرور
                    <i class="bi bi-info-circle info-icon" data-bs-toggle="tooltip"
                        title="كلمة المرور القوية تحمي بيانات شركتك الاستراتيجية"></i>
                </label>
                <input type="password" class="form-control" id="password" placeholder="••••••••" required>
                <div class="password-rules">
                    <div class="rule" id="rule-length"><i class="bi bi-circle"></i> 8 أحرف على الأقل</div>
                    <div class="rule" id="rule-upper"><i class="bi bi-circle"></i> حرف كبير (A-Z)</div>
                    <div class="rule" id="rule-lower"><i class="bi bi-circle"></i> حرف صغير (a-z)</div>
                    <div class="rule" id="rule-number"><i class="bi bi-circle"></i> رقم (0-9)</div>
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100" data-bs-toggle="tooltip"
                title="اضغط هنا للبدء في تشخيص وبناء استراتيجيتك">إنشاء الحساب الآن</button>

            <div class="text-center mt-4">
                <span class="text-muted">لديك حساب بالفعل؟ </span>
                <a href="/login.html" class="text-decoration-none"
                    style="color: var(--primary); font-weight: bold;">تسجيل الدخول</a>
            </div>
        </form>
    </div>

    <!-- مكتبات التلميحات (Bootstrap JS) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // تشغيل التلميحات (Tooltips)
        var tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'))
        var tooltipList = tooltipTriggerList.map(function (tooltipTriggerEl) {
            return new bootstrap.Tooltip(tooltipTriggerEl)
        });

        // تشغيل التحقق من قوة كلمة المرور وتغيير الألوان
        const passwordInput = document.getElementById('password');
        const rules = {
            length: { id: 'rule-length', regex: /.{8,}/ },
            upper: { id: 'rule-upper', regex: /[A-Z]/ },
            lower: { id: 'rule-lower', regex: /[a-z]/ },
            number: { id: 'rule-number', regex: /[1-9]/ }
        };

        // Submit handler — إرسال البيانات للـ API
        document.getElementById('signupForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const btn = this.querySelector('button[type="submit"]');
            const originalText = btn.textContent;
            btn.disabled = true;
            btn.textContent = 'جاري إنشاء الحساب...';

            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const companyName = document.getElementById('companyName').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const password = document.getElementById('password').value;

            // استرجاع بيانات التشخيص
            const diagnosticData = window.Context ? Context.getTemp('diagnostic_payload') : JSON.parse(sessionStorage.getItem('stratix_diagnostic_payload'));
            let selectedRole = window.Context ? Context.getTemp('role') : sessionStorage.getItem('stratix_role');
            let userCategory = window.Context ? Context.getTemp('user_category') : sessionStorage.getItem('stratix_user_category');

            if (selectedRole === 'dept_manager' && (!userCategory && diagnosticData && diagnosticData.department)) {
                userCategory = 'DEPT_' + diagnosticData.department.toUpperCase();
            }

            const payload = {
                name, email, companyName, phone, password,
                diagnosticData,
                userType: selectedRole,
                userCategory: userCategory
            };

            try {
                const res = await window.apiRequest('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload),
                    credentials: 'include'

                });
                const data = await res.json();

                if (res.ok && (data.token || data.user)) {
                    // الاعتماد على الموجه المركزي للتطبيقات المتقدمة
                    if (window.handleAuthResponse) {
                        handleAuthResponse(data);
                    } else {
                        window.location.href = '/dashboard.html';
                    }
                } else {
                    // عرض رسالة الخطأ التفصيلية من الـ validation
                    let errorMsg = data.error || 'فشل إنشاء الحساب';
                    if (data.errors && data.errors.length > 0) {
                        const errorMap = {
                            'Please provide a valid email': 'يرجى إدخال بريد إلكتروني صحيح',
                            'Password must be at least 8 characters': 'كلمة المرور يجب أن تكون 8 أحرف على الأقل',
                            'Password must contain uppercase, lowercase, and number': 'كلمة المرور يجب أن تحتوي على حرف كبير وصغير ورقم',
                            'Name must be between 2 and 100 characters': 'الاسم يجب أن يكون بين 2 و 100 حرف'
                        };
                        errorMsg = data.errors.map(e => errorMap[e.msg] || e.msg).join('\n');
                    }
                    alert(errorMsg);
                    btn.disabled = false;
                    btn.textContent = originalText;
                }
            } catch (err) {
                alert('خطأ في الاتصال بالسيرفر');
                btn.disabled = false;
                btn.textContent = originalText;
            }
        });

        passwordInput.addEventListener('input', function (e) {
            const val = e.target.value;
            for (const key in rules) {
                const ruleDiv = document.getElementById(rules[key].id);
                const icon = ruleDiv.querySelector('i');
                if (rules[key].regex.test(val)) {
                    ruleDiv.classList.add('valid');
                    icon.classList.replace('bi-circle', 'bi-check-circle-fill');
                } else {
                    ruleDiv.classList.remove('valid');
                    icon.classList.replace('bi-check-circle-fill', 'bi-circle');
                }
            }
        });
    </script>
</body>

</html>
