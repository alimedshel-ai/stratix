<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ستارتكيس - تحليل SWOT</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #667eea;
            --secondary: #764ba2;
            --bg: #0f1117;
            --bg-card: #1a1d2e;
            --text: #e2e8f0;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.08);
            --strength: #10b981; 
            --weakness: #f59e0b; 
            --opportunity: #3b82f6; 
            --threat: #ef4444; 
            --sidebar-width: 260px;
        }

        body {
            background: var(--bg);
            font-family: 'Tajawal', sans-serif;
            color: var(--text);
            min-height: 100vh;
            margin: 0;
            display: flex;
        }

        /* القائمة الجانبية */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--bg-card);
            border-left: 1px solid var(--border);
            height: 100vh;
            position: fixed;
            right: 0;
            top: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .brand-logo {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), #a78bfa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 40px;
            text-align: center;
        }

        .nav-item {
            padding: 12px 15px;
            border-radius: 12px;
            color: var(--text-muted);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
            transition: 0.3s;
            font-weight: 500;
        }

        .nav-item:hover, .nav-item.active {
            background: rgba(102, 126, 234, 0.1);
            color: var(--primary);
        }

        /* المحتوى الرئيسي */
        .main-content {
            margin-right: var(--sidebar-width);
            padding: 30px 40px;
            width: calc(100% - var(--sidebar-width));
        }

        .swot-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        .swot-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            transition: all 0.3s ease;
        }

        .swot-textarea {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            color: white;
            border-radius: 10px;
            padding: 12px;
            min-height: 140px;
            resize: none;
            margin-top: 15px;
            transition: 0.3s;
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .swot-textarea:focus { outline: none; }

        .card-strength:hover { border-color: var(--strength); box-shadow: 0 5px 20px rgba(16, 185, 129, 0.15); }
        .card-strength .swot-textarea:focus { border-color: var(--strength); box-shadow: 0 0 10px rgba(16, 185, 129, 0.2); }

        .card-weakness:hover { border-color: var(--weakness); box-shadow: 0 5px 20px rgba(245, 158, 11, 0.15); }
        .card-weakness .swot-textarea:focus { border-color: var(--weakness); box-shadow: 0 0 10px rgba(245, 158, 11, 0.2); }

        .card-opportunity:hover { border-color: var(--opportunity); box-shadow: 0 5px 20px rgba(59, 130, 246, 0.15); }
        .card-opportunity .swot-textarea:focus { border-color: var(--opportunity); box-shadow: 0 0 10px rgba(59, 130, 246, 0.2); }

        .card-threat:hover { border-color: var(--threat); box-shadow: 0 5px 20px rgba(239, 68, 68, 0.15); }
        .card-threat .swot-textarea:focus { border-color: var(--threat); box-shadow: 0 0 10px rgba(239, 68, 68, 0.2); }
    </style>
</head>
<body>

    <!-- القائمة الجانبية -->
    <div class="sidebar">
        <div class="brand-logo">ستارتكيس</div>
        <a href="/dashboard.html" class="nav-item"><i class="bi bi-grid-1x2-fill"></i> لوحة القيادة</a>
        <a href="#" class="nav-item active"><i class="bi bi-bar-chart-fill"></i> استوديو الاستراتيجية</a>
        <a href="/operations.html" class="nav-item"><i class="bi bi-bullseye"></i> محرك العمليات</a>
        <a href="#" class="nav-item"><i class="bi bi-lightning-charge-fill"></i> مركز الذكاء</a>
    </div>

    <!-- المحتوى الرئيسي -->
    <div class="main-content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h3 style="font-weight: 800; margin: 0;">تحليل SWOT</h3>
                <p class="text-muted mt-1 mb-0">قم بتشخيص بيئة عملك الداخلية والخارجية بدقة.</p>
            </div>
            <div>
                <input type="hidden" id="version-id" value="1">
                <input type="hidden" id="ai-endpoint" value="/api/company-analysis/generate">
                <button id="save-btn" class="btn btn-outline-light me-2" style="border-radius: 8px;">حفظ التعديلات</button>
                <button id="ai-btn" class="btn btn-primary" style="background: linear-gradient(135deg, var(--primary), var(--secondary)); border: none; border-radius: 8px;">
                    <i class="bi bi-magic"></i> توليد أهداف بالذكاء الاصطناعي
                </button>
                <span id="save-status" style="margin-left:12px;color:var(--text-muted);font-size:0.95rem"></span>
                <div id="ai-output" style="margin-top:10px;color:var(--text-muted);font-size:0.95rem"></div>
            </div>
        </div>

        <div class="swot-grid">
            <!-- نقاط القوة -->
            <div class="swot-card card-strength">
                <h5 style="color: var(--strength); font-weight: 700; margin: 0;"><i class="bi bi-arrow-up-right-circle-fill"></i> نقاط القوة (Strengths)</h5>
                <textarea id="strengths" class="swot-textarea">- فريق عمل يمتلك خبرات تقنية متقدمة.
- سيولة مالية ممتازة ومستقرة للشركة.
- ولاء عالي من العملاء الحاليين.
- علامة تجارية معروفة في السوق المحلي.</textarea>
            </div>

            <!-- نقاط الضعف -->
            <div class="swot-card card-weakness">
                <h5 style="color: var(--weakness); font-weight: 700; margin: 0;"><i class="bi bi-arrow-down-right-circle-fill"></i> نقاط الضعف (Weaknesses)</h5>
                <textarea id="weaknesses" class="swot-textarea">- ضعف في ميزانية التسويق الرقمي.
- نقص في عدد موظفي خدمة العملاء.
- الاعتماد على منتج واحد بشكل رئيسي.
- تأخر في تحديث البنية التحتية الداخلية.</textarea>
            </div>

            <!-- الفرص -->
            <div class="swot-card card-opportunity">
                <h5 style="color: var(--opportunity); font-weight: 700; margin: 0;"><i class="bi bi-star-fill"></i> الفرص (Opportunities)</h5>
                <textarea id="opportunities" class="swot-textarea">- نمو متوقع في السوق بنسبة 15% هذا العام.
- توفر تقنيات ذكاء اصطناعي لتقليل التكاليف.
- مبادرات حكومية جديدة لدعم القطاع.
- إمكانية التوسع لأسواق الدول المجاورة.</textarea>
            </div>

            <!-- التهديدات -->
            <div class="swot-card card-threat">
                <h5 style="color: var(--threat); font-weight: 700; margin: 0;"><i class="bi bi-shield-fill-exclamation"></i> التهديدات (Threats)</h5>
                <textarea id="threats" class="swot-textarea">- دخول منافسين دوليين جدد للسوق.
- التغير السريع والمفاجئ في سلوك المستهلك.
- ارتفاع تكاليف التشغيل بشكل عام.
- تغيرات محتملة في التشريعات والقوانين.</textarea>
            </div>
        </div>
    </div>

</script>
<script src="/sidebar.js"></script>
<script>
(function(){
    const byId = id => document.getElementById(id);
    const saveBtn = byId('save-btn');
    const statusEl = byId('save-status');
    const aiBtn = byId('ai-btn');
    const aiOutput = byId('ai-output');
    async function saveAnalysis(){
        if(!saveBtn) return;
        const payload = {
            versionId: parseInt((byId('version-id') && byId('version-id').value) || 1, 10),
            toolCode: 'SWOT',
            data: {
                strengths: byId('strengths') ? byId('strengths').value : '',
                weaknesses: byId('weaknesses') ? byId('weaknesses').value : '',
                opportunities: byId('opportunities') ? byId('opportunities').value : '',
                threats: byId('threats') ? byId('threats').value : ''
            },
            status: 'IN_PROGRESS'
        };
        const storedId = localStorage.getItem('companyAnalysisId');
        try{
            saveBtn.disabled = true;
            if(statusEl) statusEl.textContent = 'جارٍ الحفظ...';
            let res;
            if(storedId){
                res = await fetch('/api/company-analysis/' + encodeURIComponent(storedId), {
                    method: 'PATCH',
                    headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({ data: payload.data, status: payload.status })
                });
                if(!res.ok) throw new Error(res.status+'');
                if(statusEl) statusEl.textContent = 'تم التحديث';
            } else {
                res = await fetch('/api/company-analysis', {
                    method: 'POST',
                    headers: {'Content-Type':'application/json'},
                    body: JSON.stringify(payload)
                });
                if(!res.ok) throw new Error(res.status+'');
                const json = await res.json();
                const id = json.id || json._id || (json.data && json.data.id);
                if(id) localStorage.setItem('companyAnalysisId', id);
                if(statusEl) statusEl.textContent = 'تم الحفظ';
            }
        }catch(e){
            if(statusEl) statusEl.textContent = 'خطأ: ' + (e.message || e);
        }finally{
            saveBtn.disabled = false;
            setTimeout(()=>{ if(statusEl) statusEl.textContent = ''; }, 4000);
        }
    }
    if(saveBtn) saveBtn.addEventListener('click', saveAnalysis);
    if(aiBtn){
        aiBtn.addEventListener('click', async function(){
            const endpoint = (byId('ai-endpoint') && byId('ai-endpoint').value) || '/api/company-analysis/generate';
            const payload = {
                versionId: parseInt((byId('version-id') && byId('version-id').value) || 1, 10),
                toolCode: 'SWOT',
                data: {
                    strengths: byId('strengths') ? byId('strengths').value : '',
                    weaknesses: byId('weaknesses') ? byId('weaknesses').value : '',
                    opportunities: byId('opportunities') ? byId('opportunities').value : '',
                    threats: byId('threats') ? byId('threats').value : ''
                }
            };
            try{
                aiBtn.disabled = true;
                if(aiOutput) aiOutput.textContent = 'جاري توليد الأهداف...';
                const res = await fetch(endpoint, {
                    method: 'POST',
                    headers: {'Content-Type':'application/json'},
                    body: JSON.stringify(payload)
                });
                if(!res.ok) throw new Error(res.statusText || res.status);
                const json = await res.json();
                if(json.goals && Array.isArray(json.goals)){
                    if(aiOutput) aiOutput.textContent = json.goals.join(' — ');
                } else if(json.data){
                    const d = json.data;
                    if(d.strengths && byId('strengths')) byId('strengths').value = d.strengths;
                    if(d.weaknesses && byId('weaknesses')) byId('weaknesses').value = d.weaknesses;
                    if(d.opportunities && byId('opportunities')) byId('opportunities').value = d.opportunities;
                    if(d.threats && byId('threats')) byId('threats').value = d.threats;
                    if(aiOutput) aiOutput.textContent = 'تم التوليد والتعبئة';
                } else {
                    if(aiOutput) aiOutput.textContent = JSON.stringify(json).slice(0,300);
                }
            }catch(err){
                if(aiOutput) aiOutput.textContent = 'خطأ: ' + (err.message || err);
            }finally{
                aiBtn.disabled = false;
                setTimeout(()=>{ if(aiOutput) aiOutput.textContent = ''; }, 8000);
            }
        });
    }
})();
</script>
</body>
</html>
